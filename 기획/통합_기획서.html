야 했다. 그런데 재윤은 알고 있었다. 자신이 지금 가야 할 곳에 누군가가 있다는 것을. 학교 뒤편 야외 소무대. 축제 동안 작은 공연과 안내 방송, 사진 촬영 장소로 쓰였던 곳이었다. 낮에는 학생들이 아무렇지 않게 올라가 포즈를 취했고, 누군가는 그늘에 앉아 음료를 마셨다. 그러나 밤이 되자 같은 공간이 전혀 다른 장소처럼 보였다. 무대 옆 임시 조명 프레임은 아직 철거되지 않았고, 검은 전선 몇 가닥이 바닥을 따라 느슨하게 놓여 있었다. 바람이 불 때마다 철제 지지대가 아주 작게 울었다. 낮게 만든 단차는 어둠 속에서 평평한 바닥처럼 보였다가, 가까이 가면 갑자기 그림자를 만들었다. 출입 제한 표지는 무대 옆 박스에 기대어 있었고, 한쪽 모서리가 바람에 흔들릴 때마다 마른 종이 소리를 냈다. 이곳은 아름다운 고백 장소가 아니었다. 축제가 끝난 뒤 남은 장비와, 치우지 못한 위험과, 그래도 누군가는 마음을 꺼내기 위해 찾아올 만큼 조용한 가장자리가 함께 있는 장소였다. 재윤은 숨을 들이마셨다. 그곳에 은하연이 서 있었다. 하연은 무대 가장자리에서 운동장 쪽을 보고 있었다. 얇은 가디건이 밤바람에 흔들렸다. 낮 동안 하연은 카페 안에서 거의 웃지 않았지만, 손님이 문구를 칭찬할 때마다 아주 작게 눈을 내렸다. 축제 둘째 날 오후, 함께 부스를 빠져나와 운동장을 걸을 때도 하연은 뭔가를 말하려다 여러 번 멈췄다. 재윤도 그때마다 같은 얼굴이 되었을 것이다. 두 사람 모두 오늘이 끝나기 전 반드시 해야 할 말이 있다는 것을 알고 있었다. 하연이 먼저 돌아보았다. > 왔네. 평범한 인사였다. 하지만 재윤에게는 하루 종일 기다린 문장처럼 들렸다. > 응. 재윤은 대답하고도 한참 말을 잇지 못했다. 목 안쪽이 말라 있었다. 고백을 하려고 이곳에 온 것인지, 확인을 하려고 온 것인지, 아니면 이미 정해진 장면 속으로 걸어 들어온 것인지 스스로도 알 수 없었다. 하연은 재윤의 침묵을 재촉하지 않았다. 그녀는 늘 그랬다. 쉽게 다가오지 않았고, 쉽게 밀어내지도 않았다. 하연의 거리감은 차가움이 아니라 속도에 가까웠다. 재윤이 그 속도를 이해하기까지 거의 한 달이 걸렸다. > 어제 말한 거. 하연이 조용히 입을 열었다. > 오늘, 네가 어디로 갔는지 내가 알 것 같았어. > 응. 재윤은 손끝에 힘을 주었다. 그는 그 한 달을 떠올렸다. D-25 월요일, 하연이 교실 문을 열고 들어오던 순간. D-23 수요일, 칠판에 축제와 방학식 일정이 적히던 순간. D-18 월요일, `쉬어가 카페`라는 이름이 정해지던 순간. 축제 내내 하연이 시끄러운 곳보다 조용한 가장자리를 바라보던 순간들. 모든 장면이 이 밤으로 이어지고 있었다. 그리고 동시에 다른 장면들도 떠올랐다. 소하와 걸었던 오래된 등굣길. 서린이 내밀었던 점검표. 미루가 놓지 못하던 옷자락. 재윤이 숨을 수 있었던 세 개의 길. 그 길들은 모두 다정했지만, 결국 이곳을 피해 가는 길이었다. 이번에는 피하지 않아야 했다. 재윤은 하연을 바라보았다. > 나, 너한테 할 말 있어. 하연의 눈이 흔들렸다. 놀란 얼굴은 아니었다. 기다리던 말이 드디어 도착했을 때의 얼굴이었다. > 처음 봤을 때부터 이상했어. 처음 보는 사람인데, 계속 알고 있던 사람 같았고. 말 걸고 싶은데, 너무 빨리 다가가면 네가 멀어질 것 같아서 기다리는 척했어. 사실은 기다린 게 아니라 계속 미룬 건데. 하연은 아무 말도 하지 않았다. 하지만 시선을 피하지 않았다. > 축제 준비 끝나면 말해야지. 카페 이름 정해지면 말해야지. 첫날 끝나면 말해야지. 오늘 낮에 말해야지. 그렇게 계속 넘겼어. 근데 지금도 넘기면… 난 또 아무것도 못 할 것 같아. 재윤은 숨을 삼켰다. > 좋아해. 은하연. 하연의 얼굴이 무너질 듯 부드러워졌다. 그녀는 잠깐 입술을 열었다가 닫았다. 짧은 침묵이 두 사람 사이에 내려앉았다. 재윤은 그 침묵이 무서웠다. 그러나 이번에는 도망치지 않았다. 하연은 말했다. > 나도. 그 말은 낮았다. 밤바람에 섞이면 사라질 만큼 작았다. 그러나 재윤은 분명히 들었다. > 나도 말하려고 했어. 오늘. 네가 먼저 말 안 했으면, 또 조금 늦었을지도 몰라. 그래도... 없던 말로 만들고 싶진 않았어. 재윤은 웃을 뻔했다. 울 뻔하기도 했다. 한 달 동안 미뤄온 말이 이렇게 짧은 대답으로 돌아왔다는 것이 믿기지 않았다. 그때 금속이 흔들리는 소리가 났다. 처음에는 바람이 지지대를 스치는 소리 같았다. 그러나 곧 쇠가 비틀리는 둔한 울림이 뒤따랐다. 하연이 먼저 고개를 돌렸다. 재윤도 같은 방향을 보았다. 임시 조명 프레임의 한쪽이 기울고 있었다. 바닥에 놓인 고정끈 하나가 풀려 있었고, 무대 옆 그림자가 하연 쪽으로 빠르게 넘어왔다. 생각할 시간은 없었다. 재윤은 하연의 이름을 부르려 했다. 그러나 몸이 먼저 움직였다. 그는 하연을 밀어냈다. 하연의 눈이 커졌다. 그녀가 무언가를 외쳤다. 아마 재윤의 이름이었을 것이다. 다음 순간, 소리가 모든 것을 덮었다. 철제 지지대가 바닥을 때렸다. 무대의 나무판이 울렸다. 재윤은 어깨와 옆구리에 둔한 충격을 느꼈고, 시야가 아래로 무너졌다. 하연이 손을 뻗고 있었다. 재윤은 그 손을 잡으려 했지만, 손끝이 닿기 전에 어둠이 밀려왔다. 큰 외상은 없었다. 훗날 의사는 그렇게 말했다. 검사상 심각한 손상은 발견되지 않는다고. 찰과상과 타박상, 일시적 충격 외에는 설명할 것이 많지 않다고. 하지만 재윤은 깨어나지 않았다. 하연은 현실에 남았다. 병실 밖 의자에 앉아, 자신이 그 밤에 재윤을 불렀다는 사실을 몇 번이고 되짚었다. 소하는 화를 냈고, 서린은 조용히 수첩을 닫았고, 미루는 복도 끝에서 울었다. 병원 복도는 학교 복도와 달리 지나치게 깨끗했다. 안내 표지판은 모든 길을 정확히 가리키고 있었지만, 하연에게 필요한 방향은 어디에도 적혀 있지 않았다. 병실 문 옆의 작은 이름표와 보호자용 접이 의자, 반쯤 식은 종이컵 물만이 토요일이 실제로 흘러가고 있음을 보여주었다. 재윤의 의식은 그 모든 목소리에서 멀어졌다. 그는 끝났어야 할 금요일 밤에서 빠져나오지 못한 채, 자기 마음이 만든 학교로 떨어졌다. 그리고 그 세계에서, 이야기는 훨씬 더 이른 월요일부터 다시 시작되었다. ## 1장: D-32, 평범한 시작을 가장한 세계 재윤은 책상 위에 엎드린 채 눈을 떴다. 처음 느낀 것은 햇빛이었다. 여름방학을 앞둔 교실 특유의 눅눅한 빛이 창문을 지나 책상 위로 쏟아져 있었다. 두 번째로 느낀 것은 소음이었다. 누군가는 수행평가를 욕했고, 누군가는 축제가 언제냐고 물었고, 뒤쪽에서는 의자를 끄는 소리가 났다. 칠판에는 지난주에 지우다 만 공식과 담임이 적어 둔 제출물 마감일이 희미하게 남아 있었다. 교실 뒤 게시판에는 아직 축제와 관계없는 수행평가 안내문이 더 많았고, 창가 커튼은 눅눅한 여름빛을 머금은 채 느리게 흔들렸다. 너무 평범한 교실이라서, 방금 전까지 들었던 금속음이 더 꿈처럼 느껴졌다. 병실도, 소독약 냄새도, 하연의 울음도 없었다. > 야, 유재윤. 또 잤냐? 한소하가 앞자리 책상을 두드렸다. 소하는 언제나처럼 익숙했다. 짧게 묶은 머리, 장난기 많은 눈, 오래 알고 지낸 사람만이 가질 수 있는 무례할 만큼 편한 말투. 그녀의 존재는 재윤에게 설명이 필요 없는 일상이었다. 재윤은 멍하니 소하를 보았다. > 왜 그렇게 봐? 꿈이라도 꿨어? > 꿈… 입 안에서 말이 굴렀다. 꿈. 뭔가 꾼 것 같았다. 밤, 무대, 누군가의 손, 금속이 부딪히는 소리. 그러나 기억은 물에 젖은 종이처럼 쉽게 찢어졌다. > 모르겠어. 이상한 꿈이었던 것 같은데. 소하는 어이없다는 듯 웃었다. > 너 맨날 이상한 꿈 꾸잖아. 가자. 매점 줄 길어지기 전에. 그렇게 D-32 월요일이 시작되었다. 처음 하루는 지나치게 자연스러웠다. 국어 시간에는 선생님이 기말 수행평가를 언급했고, 점심시간에는 소하가 급식의 미묘한 국 맛을 두고 과장되게 불평했다. 재윤은 그 불평에 맞장구를 치며 웃었다. 웃음은 쉽게 나왔다. 몸은 조금 무거웠지만, 잠을 설쳤기 때문이라고 생각했다. 방과후에는 백서린과 마주쳤다. 서린은 복도 끝 게시판 앞에서 프린트 몇 장을 정리하고 있었다. 아직 축제 준비가 본격화되기도 전인데, 그녀의 손에는 이미 일정표처럼 보이는 종이가 들려 있었다. 서린은 2학년 학생회 업무와 방송실 보조를 동시에 맡고 있었다. 정확히 말하면, 남들이 느슨하게 맡긴 일을 결국 서린이 정확하게 정리하는 구조였다. 게시판 주변에는 삐뚤게 붙은 공지와 오래된 테이프 자국이 많았지만, 서린이 손댄 종이만은 모서리가 정확히 맞았다. 그녀의 클립보드에는 반별 연락망, 방송실 사용 시간표, 아직 빈칸이 많은 축제 준비 표가 차례로 끼워져 있었다. 복도는 학생들이 지나가며 어수선했지만, 서린 주변의 작은 반경만큼은 임시 사무실처럼 정돈되어 있었다. > 벌써 뭐 해? 재윤이 묻자 서린은 고개도 들지 않고 대답했다. > 축제 관련 공지 초안. > 아직 멀지 않았어? > 멀었다고 생각할 때 시작해야 겨우 맞춰. 서린은 펜으로 줄을 그었다. 그녀의 글씨는 성격처럼 단정했다. 한 치의 흔들림 없이 필요한 정보만 남기는 글씨. > 너도 나중에 반행사 정해지면 대충 하지 마. > 내가 언제 대충 했다고. 서린은 그제야 재윤을 보았다. > 지금 그 질문을 진심으로 한 거면 더 문제야. 재윤은 웃었다. 서린의 말은 날카로웠지만, 그 안에는 이상한 안정감이 있었다. 그녀와 있으면 세계가 정돈되는 느낌이었다. 해야 할 일과 하지 말아야 할 일, 가야 할 곳과 피해야 할 곳이 명확해졌다. 나미루를 만난 것은 그날 저녁 무렵이었다. 미루는 1학년 교실 앞 복도에서 재윤을 기다리고 있었다. 두 손으로 노트를 꼭 쥔 채, 지나가는 선배들을 피해 벽 쪽에 붙어 있었다. 재윤을 발견하자 얼굴이 조금 밝아졌다. 미루가 선 자리 옆에는 분실물 상자와 낡은 벤치가 있었다. 벤치 위에는 누군가 놓고 간 체육복 주머니와 구겨진 안내문이 있었고, 복도 문틈으로는 1학년 교실의 떠드는 소리가 새어 나왔다. 미루는 그 소리 안으로 들어가기보다, 문밖에서 먼저 확인받을 사람을 기다리는 쪽에 더 익숙해 보였다. > 선배. > 또 뭐 놓쳤어? > 놓친 건 아니고요. 놓치기 전에 물어보는 거예요. 미루는 노트를 펼쳤다. 수행평가 일정, 발표 준비, 제출물 마감일, 봉사활동 신청 가능 기간이 빼곡히 적혀 있었다. 재윤은 한숨을 쉬는 척했지만, 옆 벤치에 앉아 펜을 들었다. > 일단 날짜순으로 다시 써. 네가 보기 편하게. 그리고 이건 담임한테 확인하고, 이건 친구랑 같이 하면 되고. 미루는 고개를 열심히 끄덕였다. > 선배가 있으면 좀 괜찮아져요. 그 말은 재윤을 기쁘게 했다. 소하의 익숙함, 서린의 정확함과는 다른 종류의 감각이었다. 누군가에게 자신이 필요하다는 느낌. 그것은 사람을 쉽게 붙잡는다. D-32부터 D-26까지의 일주일은 그렇게 흘렀다. 낮에는 평범했다. 소하와 등교하고, 서린에게 잔소리를 듣고, 미루의 노트를 정리해 주었다. 축제 이야기는 아직 멀리 있었고, 방학식은 더 멀리 있었다. 재윤은 그 일주일이 편했다. 너무 편해서, 자신이 왜 매일 밤 같은 꿈을 꾸는지 깊이 생각하지 않았다. 꿈속에서 재윤은 늘 어두운 곳에 있었다. 누군가가 그를 불렀다. > 재윤아. 목소리는 가까웠다. 그런데 얼굴은 보이지 않았다. 손을 뻗으면 금속이 부딪히는 소리가 났고, 바닥이 기울었다. 재윤은 누군가를 밀어내려 했던 것 같았다. 아니, 붙잡으려 했던 것 같기도 했다. 눈을 뜨면 아침이었다. 소하는 매번 말했다. > 또 멍하네. 너 요즘 진짜 이상해. 재윤은 웃고 넘겼다. > 잠을 못 잤나 봐. 하지만 D-25 월요일 아침, 꿈속에서 들리던 목소리가 교실 문 앞에 섰다. ### 첫 번째 일주일의 균열 D-31 화요일 아침, 재윤은 꿈에서 깬 직후 한동안 손바닥을 내려다보았다. 무언가를 놓친 감각이 남아 있었다. 꿈속에서 누군가가 손을 뻗었고, 자신도 손을 뻗었다. 그러나 닿기 직전 금속이 부딪히는 소리가 났다. 그 소리가 너무 선명해서, 눈을 뜬 뒤에도 귓속에 남았다. 소하는 등굣길에서 그를 보자마자 말했다. > 너 오늘도 이상하다. > 내가 원래 좀 이상하긴 하지. > 농담으로 넘기지 말고. 얼굴이 꼭 어디 맞고 온 사람 같아. 재윤은 웃어넘기려 했지만, 소하의 말에 이상하게 가슴이 철렁했다. 맞고 온 사람. 다친 사람. 그런 단어가 낯설지 않았다. > 잠을 잘못 잤나 봐. > 병원 가볼래? > 꿈 때문에 병원을 왜 가. 소하는 더 묻지 않았다. 대신 편의점에 들러 우유 대신 이온음료를 사서 재윤에게 던졌다. > 마셔. 꿈에서 얻어맞았으면 수분 보충이라도 해. 그런 식의 다정함이 소하였다. 걱정한다는 말을 하지 않고, 툴툴대며 필요한 것을 챙겨주는 사람. D-30 수요일에는 서린과 처음으로 축제 예비 회의에 끌려갔다. 아직 반행사도 정해지지 않은 시점이었지만, 서린은 이미 작년 축제에서 문제가 되었던 사례를 정리해 두었다. 전기선이 복도에 노출되었던 일, 공연 장비 반납이 늦어진 일, 임시 구조물을 폐장 후까지 방치했던 일. 재윤은 종이를 넘기다 `임시 구조물`이라는 단어에서 손을 멈췄다. > 왜? 서린이 물었다. > 아니. 그냥. > 그냥 멈춘 얼굴이 아닌데. 재윤은 대답하지 못했다. 종이 위의 글자가 잠깐 흔들리는 것처럼 보였다. 임시 구조물. 철제 지지대. 폐장 후 철거. 아직 일어나지 않은 일인데, 어딘가 이미 지나간 일처럼 느껴졌다. D-29 목요일, 미루는 처음으로 축제 도움 인원 이야기를 꺼냈다. > 선배, 저도 뭔가 해보고 싶은데요. > 갑자기? > 갑자기 아니에요. 계속 생각했어요. 미루는 노트 모서리를 만지작거렸다. 그녀는 항상 질문하기 전에 먼저 미안해했다. 물어보는 것 자체가 폐가 될까 봐 겁내는 사람처럼. > 선배가 도와줘서 여기까지 왔잖아요. 근데 계속 도움만 받으면, 방학식 지나고 나서 제가 너무… 아무것도 못 하는 사람 같을까 봐요. 재윤은 미루를 놀릴 수 없었다. > 아무것도 못 하는 사람은 아니지. > 선배가 있으니까 그런 척 가능한 거 아닐까요? 그 말은 생각보다 깊었다. 재윤은 미루가 단순히 의존적인 후배라고만 생각했던 자신을 조금 부끄럽게 여겼다. D-28 금요일에는 세 사람이 이상하게 한 장면에 모였다. 소하는 재윤에게 매점에 가자고 했고, 서린은 재윤을 불러 반별 축제 아이디어 후보를 나눠주었고, 미루는 도움 인원 모집 공지가 언제 나는지 물으러 왔다. 재윤은 세 방향에서 동시에 이름이 불리자 웃었다. > 나 인기 많네. 소하가 바로 받아쳤다. > 착각은 자유지. 서린은 한숨을 쉬었다. > 한 명씩 처리해. 동시에 하려다 다 놓치지 말고. 미루는 작은 목소리로 말했다. > 저는 나중에 와도 돼요. 그 순간 재윤은 세 사람의 차이를 보았다. 소하는 당연히 옆에 있는 사람처럼 굴었고, 서린은 해야 할 일을 놓치지 말라고 말했다. 미루는 먼저 물러서려 했다. 그때는 몰랐다. 세 사람이 모두, 나중에 자신이 넘어야 할 마음의 모양이라는 것을. D-27 토요일과 D-26 일요일은 조용히 지나갔다. 겉으로는 평범한 주말이었다. 하지만 재윤은 잠들 때마다 같은 목소리를 들었다. 점점 더 또렷해지는 목소리. > 재윤아. 이름을 부르는 목소리는 울고 있었다. 재윤은 꿈속에서 묻고 싶었다. 너는 누구냐고. 왜 나를 그렇게 부르냐고. 그런데 입을 열면 물 대신 어둠이 밀려들었다. 그리고 월요일, 그 목소리는 이름을 가지고 교실에 들어왔다. ## 2장: 전학생 은하연 담임은 평소보다 조금 들뜬 얼굴로 교실에 들어왔다. > 오늘 전학생이 왔다. 교실이 술렁였다. 1학기 말에 전학생이라니, 애매한 시기였다. 곧 축제고, 곧 방학식이었다. 누군가는 불쌍하다고 했고, 누군가는 얼굴 예쁘면 좋겠다고 했다. 소하는 별 관심 없는 척했지만, 재윤은 이상하게 가슴이 답답해졌다. 창밖 운동장은 평범하게 밝았고, 교실 안에는 여름 특유의 축축한 공기와 학생들의 작은 기대감이 뒤섞여 있었다. 칠판 아래 분필가루, 책상 위 문제집, 뒤 게시판의 방학식 공지까지 모든 것이 늘 있던 그대로였는데, 문이 열리기 직전 교실의 공기만 아주 잠깐 낮아졌다. 문이 열렸다. 은하연이 들어왔다. 재윤은 숨을 쉬는 법을 잠깐 잊었다. 하연은 긴 자기소개를 하지 않았다. 칠판 앞에 서서 담임이 이름을 적는 동안 조용히 기다렸다. 교실 안의 시선이 자신에게 모였는데도 크게 흔들리지 않았다. 그렇다고 무심한 얼굴도 아니었다. 마치 낯선 곳에 들어왔지만, 어딘가에서는 이미 이 장면을 본 적이 있다는 듯한 눈이었다. 담임이 말했다. > 자리 저쪽 창가 괜찮지? 하연은 고개를 끄덕였다. 그리고 교실을 훑던 시선이 재윤에게 닿았다. 가슴 한쪽이 아팠다. 처음 보는 사람이어야 했다. 그런데 그럴 수가 없었다. 재윤은 그녀의 목소리를 알고 있는 것 같았다. 꿈속에서 자신을 부르던 목소리, 어둠 속에서 붙잡지 못한 손, 금속이 부딪히는 소리 사이로 끊기던 이름. > 은하연입니다. 잘 부탁해. 그 한마디가 끝나자 교실은 다시 평범해졌다. 누군가는 작게 박수를 쳤고, 누군가는 옆 친구에게 귓속말을 했다. 그러나 재윤의 시간만 잠깐 멈춰 있었다. 소하가 옆에서 팔꿈치로 찔렀다. > 야. > 왜. > 왜 그렇게 봐? > 내가? > 응. 엄청 티 나. 재윤은 대답하지 못했다. 점심시간, 하연은 혼자 있었다. 전학생에게 말을 걸려는 학생들은 많았지만, 하연은 필요한 대답만 하고 다시 조용해졌다. 재윤은 도시락 뚜껑을 열었다 닫았다 하며 망설였다. 소하는 그런 재윤을 한동안 보다가 젓가락을 내려놓았다. > 갈 거면 가. > 뭐? > 신경 쓰이잖아. > 아니, 그냥 전학생이니까. 소하는 눈을 가늘게 떴다. > 네가 그렇게 변명할 때는 보통 진짜야. 재윤은 결국 자리에서 일어났다. 하연의 책상 앞에 섰을 때, 하연이 먼저 고개를 들었다. > 유재윤. 재윤은 놀랐다. > 내 이름 알아? > 아까 출석 부를 때 들었어. > 아. 당연한 대답이었다. 그런데 재윤은 이상하게 실망했다. 혹시 하연도 자신을 어디선가 본 적 있다고 말해주길 기대했던 것 같다. > 학교는 좀 어때? 하연은 잠깐 생각했다. > 아직 모르겠어. > 그렇지. 첫날이니까. 짧은 침묵이 생겼다. 재윤은 무엇을 더 말해야 할지 몰랐다. 평소라면 아무 말이나 했을 텐데, 하연 앞에서는 말이 쉽게 나오지 않았다. 하연이 먼저 입을 열었다. > 근데… 그리고 멈췄다. > 뭔데? 하연은 시선을 내렸다. > 아니야. 대화는 거기서 끝났다. 너무 짧고 어색해서 아무것도 아닌 장면처럼 보였다. 하지만 재윤은 그날 밤까지 하연의 `아니야`를 떠올렸다. 말하려다 멈춘 사람의 얼굴. 자신과 닮아 있었다. 다음 날, 재윤은 복도 창가에서 하연을 다시 만났다. 하연은 운동장 쪽을 보고 있었다. 아직 축제 준비가 시작되지 않은 운동장은 평범했다. 학생 몇 명이 공을 차고 있었고, 햇빛은 하얗게 바닥을 덮고 있었다. 복도 창틀에는 오래된 먼지가 얇게 앉아 있었고, 유리 너머 운동장 가장자리에는 아직 아무 장식도 세워지지 않았다. 하연은 떠드는 학생들이 있는 중앙이 아니라, 운동장 끝과 학교 뒤편으로 이어지는 조용한 선을 보고 있었다. 재윤은 그때는 몰랐지만, 하연의 시선은 언제나 사람이 몰리는 중심보다 숨을 고를 수 있는 가장자리를 먼저 찾았다. 재윤은 옆에 섰다. > 어제 하려던 말. 하연이 돌아보았다. > 무슨 말? > 근데… 하고 말았잖아. 하연은 조금 놀란 듯했다. 누군가 자신의 멈춘 말을 기억하고 있을 거라고 생각하지 못한 얼굴이었다. > 별거 아니야. > 별거 아니면 말해도 되잖아. 하연은 창밖으로 시선을 돌렸다. > 여기, 처음 온 것 같지가 않아서. 재윤은 아무 말도 못 했다. 하연이 작게 웃었다. > 이상하지? 재윤은 천천히 고개를 저었다. > 아니. 나도 그래. 두 사람은 그 뒤로 한동안 말하지 않았다. 하지만 그 침묵은 첫날의 어색함과 달랐다. 서로가 같은 이상함을 느끼고 있다는 사실만으로, 아주 얇은 실 하나가 두 사람 사이에 걸린 것 같았다. 그날 이후 재윤은 하연에게 조금씩 말을 걸었다. 하연은 빠르게 가까워지는 사람이 아니었다. 재윤이 한꺼번에 다가가면 물러섰고, 재윤이 기다리면 조금 다가왔다. 좋아하는 음식도, 전 학교 이야기도, 왜 이 시기에 전학을 왔는지도 쉽게 말하지 않았다. 대신 사소한 것을 기억했다. 재윤이 우유를 잘 마시지 않는다는 것, 소하와 말할 때 표정이 편하다는 것, 서린 앞에서는 괜히 장난을 치지만 결국 말을 잘 듣는다는 것. 어느 날 하연이 말했다. > 너는 사람마다 얼굴이 다르네. > 그거 욕이야? > 아니. 그냥 신기해서. > 네 앞에서는 어떤데? 하연은 대답하지 않았다. 재윤은 그 침묵을 오래 기억했다. ### 하연의 속도 하연과 가까워지는 일은 공략처럼 진행되지 않았다. 재윤이 말을 걸면 하연은 대답했다. 하지만 대답이 끝나면 다시 조용해졌다. 좋아하는 것을 물으면 `조용한 곳`이라고 했고, 싫어하는 것을 물으면 `너무 시끄러운 것`이라고 했다. 전 학교 이야기를 꺼내면 잠깐 멈췄고, 가족 이야기는 거의 하지 않았다. 재윤은 처음엔 그 거리감이 답답했다. > 너는 원래 이렇게 말 아껴? 어느 날 재윤이 묻자, 하연은 책을 덮으며 대답했다. > 말 많이 하면 가까워져? > 꼭 그런 건 아니지만. > 그럼 조금씩 해도 되잖아. 그 말에 재윤은 반박하지 못했다. D-24 화요일 방과후, 두 사람은 처음으로 같이 운동장을 돌았다. 하연은 새 학교의 구조를 아직 헷갈려했고, 재윤은 자연스럽게 안내를 자처했다. > 여기가 방송실 있는 쪽. 저쪽은 학생회실. 운동장 뒤로 가면 작은 무대가 있는데, 축제 때 공연 같은 거 할 거야. 재윤은 무심코 소무대 쪽을 가리켰다. 그 순간 하연이 멈췄다. > 왜? > 아니. 하연은 소무대 쪽을 바라보았다. 낮의 소무대는 아무것도 아니었다. 작은 단상과 임시 조명 프레임, 아직 쓰이지 않는 전선 몇 개. 그런데 하연은 그곳을 보는 얼굴이 낯설게 굳어 있었다. 햇빛 아래의 소무대는 위험해 보이지 않았다. 낮은 단차는 운동장 흙먼지와 같은 색으로 묻혀 있었고, 검은 전선은 무대 뒤쪽에 정리된 척 모여 있었다. 출입 제한 표지는 아직 세워지지도 않은 채 장비 박스 위에 놓여 있었다. 그런데도 하연은 그 평범한 임시 시설을 쉽게 지나치지 못했다. > 저기, 좀 이상해. > 이상해? > 처음 보는 곳인데… 가본 것 같아. 재윤은 대답하지 못했다. 자신도 같은 감각을 느끼고 있었기 때문이다. 그날 이후, 소무대는 두 사람 사이에 말하지 않은 장소가 되었다. 아직 아무 일도 일어나지 않은 곳. 그러나 이미 무언가가 기다리고 있는 곳. ## 3장: 칠판에 적힌 먼 월요일 D-23 수요일 종례 시간, 담임은 칠판에 축제 일정을 적었다. 축제 1일차 목요일. 축제 2일차 금요일. 주말. 월요일 방학식. 교실은 곧바로 소란스러워졌다. 어떤 반은 귀신의 집을 한다더라, 어떤 반은 먹거리 부스를 준비한다더라, 방송부는 공연 순서를 짠다더라. 학생들에게 중요한 것은 축제였다. 방학식은 그저 축제가 끝난 뒤 자연스럽게 오는 일정일 뿐이었다. 재윤도 처음에는 그렇게 받아들였다. 그러나 칠판 맨 아래 `월요일 방학식`이라는 글자를 보는 순간, 설명할 수 없는 거리감이 생겼다. 월요일은 가까운 미래여야 했다. 금요일이 지나고 주말이 지나면 자연스럽게 오는 날. 그런데 이상하게 그 월요일은 아주 멀리 있는 것처럼 느껴졌다. 하연도 칠판을 보고 있었다. 둘의 시선이 잠깐 마주쳤다. 하연의 얼굴에도 재윤과 비슷한 낯섦이 있었다. 방과후, 서린은 이미 축제 관련 자료를 들고 있었다. > 2학년 5반도 반 단위 참여를 해야 할 거야. 아직 확정은 아니지만, 먹거리보다는 휴식형 부스가 현실적이야. > 벌써 거기까지 생각했어? > 생각만 한 게 아니라 후보안까지 적었어. 서린은 파일을 펼쳤다. 교실 배치, 물품 신청, 전기 사용 여부, 예상 동선. 재윤은 그 꼼꼼함에 감탄했다. > 이런 거 다 지키면 사고 같은 건 안 나겠네. 말하고 나서 재윤은 스스로 놀랐다. 왜 하필 사고라는 말을 했을까. 서린의 손이 멈췄다. > 사고는 준비한다고 완전히 없어지는 게 아니야. 그 말투는 평소보다 무거웠다. > 그래도 줄일 수는 있지. 그래서 확인하는 거야. 사람들이 대충 넘기는 것까지. 재윤은 서린의 얼굴을 보았다. 그녀는 다시 평소처럼 차분한 표정을 하고 있었지만, 방금 전의 정적은 사라지지 않았다. 며칠 뒤 미루는 축제 도움 인원 신청서를 들고 왔다. > 선배, 저 이거 해봐도 될까요? > 축제 보조? 힘들 수도 있어. > 알아요. 근데 해보고 싶어요. 멘토링 끝나기 전에, 저 혼자 뭔가 해냈다는 걸 만들고 싶어서요. 재윤은 그 말을 쉽게 말릴 수 없었다. 미루의 멘토링은 1학기 한정이었다. 공부뿐 아니라 학교생활 적응, 제출물 관리, 발표 준비, 모르는 일이 생겼을 때 누구에게 질문해야 하는지까지 도와주는 관계. 방학식이 지나면 공식적으로 끝난다. 미루는 그 사실을 알고 있었고, 그래서 더 조급해 보였다. > 그럼 같이 정리해보자. 네가 할 수 있는 일, 도움 받아야 하는 일 나눠서. 미루는 환하게 웃었다. > 역시 선배한테 먼저 물어보길 잘했어요. 재윤은 웃었지만, 마음 한쪽이 조금 무거웠다. D-18 월요일, 2학년 5반의 반행사는 `쉬어가 카페`로 확정되었다. 처음에는 이름 때문에 다들 웃었다. 너무 대충 지은 것 아니냐는 말도 나왔다. 하지만 하연이 칠판 한쪽에 작은 글씨로 문구를 적자 분위기가 달라졌다. `잠깐 쉬어가도 괜찮은 곳.` 교실이 잠깐 조용해졌다. 재윤은 그 문구를 보며 하연을 보았다. 하연은 분필 가루가 묻은 손끝을 털며 아무렇지 않은 척했다. > 네가 생각한 거야? > 그냥 떠올랐어. > 좋은데. 하연은 재윤을 보지 않고 말했다. > 너무 조용하지 않아? > 시끄러운 축제에 조용한 곳 하나쯤 있어도 되지. 하연은 아주 작게 웃었다. 그 웃음 하나가 재윤에게는 하루 종일 남았다. 카페 준비는 두 사람을 자연스럽게 묶었다. 재윤은 책상을 옮기고, 안내판을 세우고, 필요한 물품을 날랐다. 하연은 메뉴판 문구와 교실 분위기를 정리했다. 말수가 적은 대신 세세한 부분을 잘 봤다. > 이쪽 문구, 너무 직접적인가? 하연이 물었다. 재윤은 종이를 읽었다. `쉬다 가면 다시 걸을 수 있음.` > 난 좋은데. > 정말? > 우리 반 이름부터 쉬어가 카페인데 뭘. 여기서 갑자기 철학적이면 더 이상해. 하연은 이번엔 조금 더 분명하게 웃었다. 소하는 그런 재윤을 보고 있었다. 처음에는 놀리기만 했다. > 전학생 앞에서 말투 달라지는 거 알아? > 안 달라지거든. > 달라져. 평소보다 덜 멍청해 보이려고 노력해. 그러나 시간이 지날수록 소하의 농담은 줄어들었다. 서린은 축제 준비의 빈틈을 더 자주 지적했고, 미루는 방학식이 가까워질수록 재윤에게 확인받고 싶은 일이 늘어났다. 세계는 조용히 갈라지고 있었다. 하연에게 가는 길과, 하연에게 가지 않아도 되는 길들 사이로. ### 쉬어가 카페가 만들어지는 시간 `쉬어가 카페` 준비는 생각보다 손이 많이 갔다. 교실 책상을 어떻게 배치할지, 음료는 어떤 식으로 준비할지, 메뉴판은 누가 만들지, 손님이 들어오고 나가는 동선은 어디로 잡을지. 처음에는 이름 하나 정하면 끝날 것처럼 말하던 학생들도 막상 준비가 시작되자 각자 맡은 일을 들고 허둥댔다. 교실은 조금씩 카페 흉내를 내기 시작했다. 책상 네 개를 붙인 카운터 위에는 종이컵과 빨대, 투명 테이프와 매직이 뒤섞여 있었고, 칠판 한쪽에는 아직 삐뚤게 붙은 가격표가 흔들렸다. 창가에는 여분 의자가 기대어 있었고, 누군가 잘라 놓은 색종이 꽃잎이 바닥에 흩어져 있었다. 완성된 카페와는 거리가 멀었지만, 학생들이 손으로 만든 어설픈 온기가 있었다. 재윤은 자연스럽게 몸 쓰는 일을 맡았다. 책상을 옮기고, 박스를 나르고, 칠판 위쪽에 장식을 붙였다. 하연은 메뉴판과 안내 문구를 맡았다. 그녀는 색을 많이 쓰지 않았다. 대신 읽는 사람이 잠깐 멈출 수 있는 문장을 골랐다. `오늘은 여기서 숨 고르기.` `다 마시고 나면 조금 괜찮아질지도.` `쉬었다 가도 늦지 않음.` 재윤은 그 문구들을 보며 말했다. > 너 문장 되게 하연 같다. > 그게 뭔데? > 조용한데 오래 남는 거. 하연은 대답하지 않았다. 하지만 귀 끝이 조금 붉어졌다. 소하는 그 장면을 멀리서 보고 있었다. 그녀는 장식용 리본을 자르다 말고 가위질을 멈췄다. 재윤이 하연에게 웃는 얼굴은, 소하가 오래 알던 얼굴과 조금 달랐다. 서린은 준비 현장을 점검하러 왔다가 동선이 엉망이라며 한숨을 쉬었다. > 입구와 출구가 같으면 막혀. 컵 반납 위치도 카운터랑 너무 가까워. > 아직 임시 배치야. 재윤이 말하자 서린은 바로 받아쳤다. > 임시 배치가 마지막 배치 되는 경우를 너무 많이 봤어. 하연은 서린의 말을 듣고 조용히 책상 위치를 다시 표시했다. > 이쪽으로 돌리면 어때요? 서린은 잠깐 하연을 보았다. 그러고는 펜으로 새 동선을 그었다. > 그게 낫겠네. 미루는 축제 도움 인원 교육을 받고 와서 카페 준비를 구경했다. > 선배네 반 진짜 카페 같아요. > 아직 엉망인데. > 그래도 뭔가… 들어오면 마음 편할 것 같아요. 미루는 하연이 쓴 문구를 오래 보았다. > 쉬었다 가도 늦지 않음. 그녀는 작게 읽고 웃었다. > 저한테 하는 말 같아요. 그 순간만 보면 모든 것이 괜찮아 보였다. 소하도, 서린도, 미루도, 하연도 같은 축제를 향해 움직이고 있었다. 그러나 재윤은 알 수 없는 불안을 느꼈다. 모두가 같은 장소를 준비하고 있지만, 각자가 보고 있는 끝은 다르다는 느낌. 축제는 가까워지고 있었다. ## 4장: 한소하, 아무 일도 없던 날의 유혹 소하는 재윤을 가장 오래 알고 있는 사람이었다. 재윤이 어떤 농담에 웃는지, 어떤 상황에서 대충 넘기는지, 거짓말할 때 눈을 어디에 두는지 알고 있었다. 그래서 재윤이 하연을 신경 쓰기 시작한 것도 가장 먼저 알아차렸다. 처음에는 놀렸다. > 그렇게 보면 부담스러워한다? > 뭘 그렇게 봐. > 은하연. 재윤은 대답하지 못했고, 소하는 승리한 사람처럼 웃었다. 하지만 축제 준비가 본격화되고 재윤이 하연과 함께 있는 시간이 늘어나자, 소하의 웃음은 조금씩 달라졌다. 농담처럼 시작한 말 끝에 작은 가시가 남았다. > 우리는 이렇게 오래 봤는데. 그 말은 어느 날 갑자기 튀어나왔다. D-11 월요일 아침, 소하는 재윤을 오래된 등굣길로 끌고 갔다. 평소보다 돌아가는 길이었다. 재윤은 왜 굳이 이쪽으로 가느냐고 물었지만, 소하는 대답하지 않았다. 골목은 그대로였다. 문방구는 편의점으로 바뀌었지만, 낡은 담벼락과 작은 공원은 남아 있었다. 소하는 천천히 걸었다. 낮은 담장 위에는 여름 먼지가 얇게 앉아 있었고, 색이 바랜 표지판은 아직도 오래전 동네 이름을 가리키고 있었다. 문방구였던 편의점 앞 유리문에는 새 할인 포스터가 붙어 있었지만, 그 옆 전봇대의 스티커 자국과 작은 공원의 녹슨 그네는 그대로였다. 따뜻한 길이었다. 그래서 더 쉽게 사람을 붙잡는 길이었다. > 옛날엔 맨날 이쪽으로 갔잖아. > 그랬지. > 너 그때 맨날 늦어서 내가 기다렸고. > 지금은 내가 더 일찍 나오거든. > 그게 더 재수 없어. 재윤은 웃었다. 소하와 있으면 말이 쉽게 나왔다. 굳이 생각하지 않아도 주고받을 수 있는 대화. 실수해도 크게 문제가 되지 않는 관계. 그 편함은 오래된 이불처럼 몸에 맞았다. 소하는 공원 앞에서 멈췄다. > 너 요즘 좀 멀어진 것 같아. 재윤도 걸음을 멈췄다. > 내가? > 응. 몸은 여기 있는데, 자꾸 다른 데 보고 있어. 소하의 목소리는 가벼웠지만, 눈은 그렇지 않았다. > 하연이 때문이야? 재윤은 바로 대답하지 못했다. 소하는 웃었다. > 이상하지 않아? 갑자기 나타난 애한테 그렇게 신경 쓰는 거. 우리는 이렇게 오래 봤는데. 그 말은 질투처럼 들렸다. 하지만 그보다 더 깊은 감정이 있었다. 소하는 재윤을 빼앗기고 싶지 않은 것이기도 했지만, 재윤이 낯선 미래로 걸어가는 것을 막고 싶어 하는 것처럼 보였다. 익숙한 과거에 남으면 다치지 않아도 되고, 잃지 않아도 되고, 말하지 않아도 된다. 그날 밤 재윤은 꿈을 꾸었다. 소하와 같은 등굣길을 계속 걷는 꿈이었다. 편의점 앞을 지나고, 횡단보도 앞에 섰다가, 다시 편의점 앞을 지났다. 학교는 가까워지지 않았고, 하늘은 계속 아침이었다. 소하는 옆에서 웃으며 물었다. > 그냥 이대로 있으면 안 돼? 재윤은 대답하지 못했다. 꿈에서 깬 뒤에도 그 질문이 남았다. 재윤은 소하를 싫어하지 않았다. 오히려 좋아했다. 오래된 친구로서, 자신을 가장 잘 아는 사람으로서, 어떤 날에는 가족처럼 편한 사람으로서. 그래서 더 어려웠다. 소하에게서 벗어나는 일은 소하를 버리는 것처럼 느껴졌다. 그러나 D-9 수요일, 재윤은 깨달았다. 소하와 함께 있는 과거는 따뜻하지만, 그 안에는 하연이 없다. 축제 마지막 밤도 없다. 자신이 왜 그 밤에 소무대로 갔는지도 없다. 아무 일도 없던 날은 평화로운 날이 아니라, 중요한 일을 모두 지워버린 날이었다. 재윤은 소하에게 말했다. > 난 네가 편해. 네가 있어서 버틴 것도 많아. 소하는 대답하지 않았다. > 근데 편하다는 이유로 계속 여기만 보면 안 될 것 같아. 소하의 눈이 흔들렸다. > 그럼 나는? > 너를 없던 일로 하겠다는 게 아니야. 그냥… 내가 가야 할 곳이 너랑 같은 곳은 아닌 것 같아. 소하는 화를 내지 않았다. 오히려 아주 오래 참은 사람처럼 고개를 숙였다. > 나도 알아. 네가 자꾸 어디로 가려고 하는지. > 소하야. > 근데 좀 억울하잖아. 나는 계속 옆에 있었는데. 그 말은 재윤의 가슴을 찔렀다. 소하는 주머니에서 오래된 사진 한 장을 꺼냈다. 초등학교 때 찍은 사진이었다. 어색한 표정의 재윤과 장난스럽게 브이를 한 소하가 있었다. > 가져. 네가 자꾸 까먹는 것 같아서. > 뭘? > 과거는 도망칠 곳이 아니라, 네가 지나온 곳이라는 거. 재윤은 사진을 받았다. 그 순간 꿈속에서 반복되던 등굣길이 멈췄다. 소하는 여전히 소하였다. 재윤을 붙잡는 과거가 아니라, 재윤이 지나온 시간을 증명하는 친구. 재윤은 처음으로 과거를 부정하지 않고 앞으로 걸었다. ## 5장: 백서린, 정답 없는 선택지 서린은 축제 준비가 진행될수록 예민해졌다. 그녀는 방송 일정, 학생회 지원표, 반별 부스 전기 사용 여부, 비상 동선까지 모두 확인했다. 누군가는 유난이라고 했고, 누군가는 서린이 있으니 안심된다고 했다. 서린은 어느 쪽 말에도 크게 반응하지 않았다. 하지만 재윤은 가끔 서린의 손끝이 떨리는 것을 봤다. D-8 목요일, 방송실에서였다. 서린은 큐시트를 정리하고 있었다. 공연 순서, 안내 방송 멘트, 장비 이동 시간. 재윤은 그녀를 도와 종이를 분류했다. 방송실에는 오래된 장비 냄새와 먼지가 섞여 있었다. 좁은 책상 위에는 마이크와 헤드폰, 라벨링된 케이블, 반별 방송 순서표가 빈틈없이 놓여 있었다. 믹서의 작은 불빛은 낮에도 꺼지지 않았고, 창문 너머로는 운동장 한쪽 천막이 작게 보였다. 방송실은 서린을 닮아 있었다. 완벽히 깨끗하지는 않았지만, 누군가 끝까지 확인하고 있어서 겨우 질서가 유지되는 공간이었다. > 너는 왜 이렇게까지 해? 재윤이 물었다. 서린은 펜을 멈추지 않았다. > 누군가는 해야 하니까. > 그래도 너무 혼자 짊어지는 것 같아. 그제야 서린이 고개를 들었다. > 혼자 짊어지는 게 아니야. 혼자 확인하는 거야. 다른 사람이 놓칠 수 있으니까. > 모든 걸 다 확인할 수는 없잖아. 서린의 표정이 굳었다. > 그래서 사고가 나는 거야. 재윤은 숨을 삼켰다. 또 사고라는 말이었다. 이 세계는 사고를 직접 말하지 않으면서도 계속 그 주변을 맴돌았다. 서린의 수첩, 미루의 고정끈, 하연의 침묵, 소무대의 그림자. 모든 것이 아직 오지 않은 금요일 밤을 향해 있었다. 서린은 자신의 말을 후회한 듯 시선을 피했다. > 미안. 예민했어. 하지만 재윤은 이미 들었다. 서린이 두려워하는 것은 실수가 아니라, 통제할 수 없는 결과였다. D-7 금요일, 서린은 재윤에게 명확한 선택지를 제시했다. 하연과 너무 깊게 엮이지 말 것. 소무대 주변에는 가지 말 것. 축제 마지막 날 폐장 후에는 공개된 장소에 있을 것. 감정적인 약속은 하지 말 것. 그 선택지들은 모두 안전해 보였다. 재윤은 잠깐 흔들렸다. 서린을 따르면 사고를 피할 수 있을지도 모른다. 하연에게 가지 않으면, 그 밤에 다치지 않을지도 모른다. 말하지 않으면, 잃지 않을지도 모른다. 하지만 그것은 살아남는 것이 아니라 멈추는 것이었다. 재윤은 서린의 수첩을 내려다보았다. > 너는 내가 뭘 선택해야 하는지 다 정해줄 수 있어? 서린은 바로 대답했다. > 최선의 선택지는 줄 수 있어. > 그게 내 선택이야? 서린은 입을 다물었다. 방송실 스피커에서 잡음이 흘렀다. 아주 잠깐, 잡음 사이로 하연이 재윤의 이름을 부르는 듯한 소리가 섞였다. 재윤은 고개를 들었다. > 나 무서워. 틀릴까 봐. 내가 선택해서 누가 다치게 될까 봐. 그래서 네가 정답을 주면 편할 것 같았어. 서린은 수첩을 꽉 쥐었다. > 정답이 없으면? > 그래도 내가 골라야지. 서린의 얼굴에서 무언가 무너졌다. 그녀는 화내지 않았다. 대신 아주 천천히 수첩을 닫았다. > 나는 네가 틀리지 않게 만들고 싶었어. > 알아. > 그런데 그게 네가 선택하지 않아도 된다는 뜻은 아니었겠지. 서린은 수첩에서 한 장을 찢어 재윤에게 건넸다. 소무대 점검표 일부였다. 빨간 펜으로 `임시 프레임`, `고정끈 재확인`, `폐장 후 철거 예정`이라는 글씨가 표시되어 있었다. > 이건 네가 가져. > 괜찮아? > 내 수첩에만 있으면, 결국 내 책임으로만 남아. 네가 봐야 해. 재윤은 그 종이를 받았다. 그 순간 선택지가 달라졌다. 서린은 더 이상 정답을 대신 골라주는 사람이 아니었다. 그녀는 재윤에게 자기 선택을 돌려주는 사람이 되었다. ## 6장: 나미루, 닫힌 문을 여는 법 미루는 점점 더 자주 재윤을 찾았다. 처음에는 평범한 질문이었다. 축제 도움 인원 신청서 작성법, 수행평가 제출 일정, 방학식 전까지 끝내야 하는 멘토링 체크리스트. 재윤은 늘 하던 대로 도와주었다. 그러나 D-6 토요일, 미루는 다른 질문을 했다. > 선배, 방학식 지나면 멘토링 끝나는 거 맞죠? 재윤은 펜을 멈췄다. > 응. 공식적으로는 그렇지. > 그럼 그 뒤에는요? > 그 뒤에도 모르는 거 있으면 물어봐도 돼. 미루는 안심한 듯하면서도 완전히 웃지 못했다. > 근데 그건 멘토링이 아니잖아요. 그 말이 이상하게 오래 남았다. 미루에게 멘토링은 단순한 공부 도움이 아니었다. 처음 학교생활이 버거웠던 몇 달 동안, 재윤은 미루에게 길을 정리해 주는 사람이었다. 어디에 물어봐야 하는지, 무엇을 먼저 해야 하는지, 실수했을 때 누구에게 말해야 하는지. 미루는 재윤을 통해 학교 안에서 버티는 법을 배웠다. 그래서 끝나는 것이 두려웠다. 그리고 재윤도 미루가 자신을 필요로 하는 것이 싫지 않았다. 하연에게 가는 길은 무섭고 불확실했지만, 미루 옆에 있으면 자신이 분명히 쓸모 있는 사람이라는 감각이 있었다. D-5 일요일, 미루의 세계는 조금 이상해졌다. 재윤은 분명 학교 복도에 있었는데, 문을 열자 미루의 방처럼 좁은 공간이 나왔다. 책상 위에는 체크리스트가 산처럼 쌓여 있었고, 벽에는 방학식 안내문이 붙어 있었다. 그러나 날짜는 번져 읽을 수 없었다. 그 방은 실제 미루의 방이라기보다, 미루가 두려워하는 일들을 쌓아 둔 임시 대기 장소 같았다. 책상 한쪽에는 명찰, 여분 안내 표지, 테이프와 끈, 클립보드가 차례 없이 놓여 있었고, 분실물 박스에는 이름표 없는 물건들이 가득했다. 문은 있었지만 손잡이가 멀어 보였고, 복도에서 새어 들어오는 빛은 체크리스트 더미에 막혀 바닥까지 닿지 못했다. 미루는 문 앞에 서 있었다. > 선배, 오늘까지만 도와주면 안 돼요? 재윤은 오늘까지만이라고 생각했다. 하지만 하나를 끝내면 다른 하나가 생겼다. 수행평가를 정리하면 봉사활동 신청서가 나왔고, 신청서를 쓰면 발표 대본이 나왔고, 발표 대본을 보면 축제 도움 인원 배치표가 나왔다. 미루는 미안한 얼굴로 계속 말했다. > 이것만요. > 진짜 이것만요. > 선배가 없으면 저 못 할 것 같아서요. 그 말은 재윤을 붙잡았다. 문밖에서는 아주 멀리 하연의 목소리가 들리는 것 같았다. 하지만 미루가 울 것 같은 얼굴로 재윤을 보면, 재윤은 문을 열 수 없었다. > 미루야. > 네. > 내가 계속 옆에 있으면, 너는 편할 거야. 미루는 고개를 끄덕이려다 멈췄다. > 근데 그럼 너 혼자 해냈다는 건 영영 안 생겨. 미루의 눈에 눈물이 고였다. > 선배는 제가 혼자 해도 괜찮을 것 같아요? 재윤은 쉽게 대답하지 않았다. 예전 같으면 괜찮다고 바로 말했을 것이다. 그러나 지금은 그런 말이 무책임한 위로처럼 느껴졌다. 재윤은 미루의 노트를 펼쳤다. 그 안에는 엉성하지만 미루가 스스로 정리한 흔적들이 있었다. 틀린 부분도 있었고, 빠진 것도 있었지만, 분명 미루가 혼자 해보려 한 것들이었다. > 무서울 거야. 실수도 할 거고. 미루는 고개를 숙였다. > 그래도 너는 할 수 있어. 내가 없어야만 할 수 있다는 뜻은 아니야. 그냥 내가 계속 대신 해주면, 네가 할 수 있다는 걸 너도 모르게 돼. 미루는 한참 동안 아무 말도 하지 않았다. 문밖의 복도에서 바람이 불었다. 닫혀 있던 문이 아주 조금 열렸다. 미루는 재윤의 옷자락을 잡고 있던 손을 천천히 놓았다. > 멘토링 끝나도… 인사해도 돼요? > 당연하지. > 물어봐도 돼요? > 물어봐도 돼. 대신 네가 먼저 해보고. 미루는 울면서 웃었다. 그 순간 방 안에 쌓여 있던 체크리스트들이 사라졌다. 방학식 안내문의 날짜가 또렷해졌다. 월요일. D+3. 미루는 작은 키링을 재윤에게 건넸다. 축제 도움 인원 표식으로 쓰려던 것이었다. 키링에는 짧은 고정끈이 묶여 있었다. > 저도 기억할게요. 놓아도 끝나는 건 아니라는 거. 재윤은 키링을 받았다. 닫힌 문이 열렸다. ### 관계를 정리한다는 것 D-4 월요일, 재윤은 소하와 다시 오래된 등굣길을 걸었다. 이번에는 소하가 먼저 끌고 간 것이 아니었다. 재윤이 먼저 말했다. > 오늘 그쪽으로 갈래? 소하는 놀란 얼굴을 했다. > 왜? > 그냥. 마지막으로 확인하고 싶어서. > 마지막이라니, 말이 좀 재수 없는데. 그러면서도 소하는 함께 걸었다. 편의점 앞을 지나고, 작은 공원 옆을 지났다. 꿈속에서 끝없이 반복되던 길이었다. 하지만 이번에는 학교가 가까워졌다. 같은 길인데도, 더 이상 제자리걸음이 아니었다. 재윤은 말했다. > 나 옛날이 싫은 건 아니야. > 알아. > 너랑 같이 있던 시간도 싫은 게 아니야. > 그것도 알아. 소하는 앞만 보고 걸었다. > 근데도 가는 거잖아. 재윤은 고개를 끄덕였다. > 응. 소하는 한참 뒤에 말했다. > 그럼 제대로 가. 어중간하게 뒤돌아보면서 가지 말고. 그 말은 허락처럼 들렸다. 축복은 아니었다. 소하는 아직 상처받아 있었다. 하지만 재윤을 과거에 가두지는 않았다. D-3 화요일, 재윤은 방송실에서 서린을 도왔다. 서린은 여전히 바빴고, 여전히 정확했다. 그러나 더 이상 재윤에게 모든 선택지를 정해주려 하지 않았다. > 네가 폐장 후 어디로 갈지는 내가 결정할 문제가 아니야. 서린이 말했다. > 하지만 위험을 모른 척하고 가는 것도 선택은 아니야. 알고 가. 그녀는 소무대 점검표를 다시 보여주었다. 임시 조명 프레임, 폐장 후 철거 예정, 고정끈 재확인 필요. 단어들은 이제 단순한 안전 항목이 아니었다. 기억의 조각이었다. > 내가 그걸 봤는데도 가면? > 그럼 적어도 네가 왜 가는지는 알아야 해. 서린은 펜을 내려놓았다. > 누군가를 구하려고만 가지 마. 네 마음을 말하러 가. D-3 저녁, 미루는 재윤에게 체크리스트를 보여주었다. 예전 같으면 재윤이 빨간 펜으로 고쳐주기를 기다렸을 것이다. 그러나 이번에는 스스로 수정한 흔적이 많았다. > 저, 먼저 해봤어요. > 보이네. > 틀린 것도 있죠? > 있지. 근데 네가 고칠 수 있는 틀림이야. 미루는 그 말을 듣고 한참 노트를 내려다보았다. > 선배, 저 방학식 지나도 괜찮겠죠? > 응. > 선배도요? 재윤은 바로 대답하지 못했다. 미루는 조심스럽게 말했다. > 선배도 어디 가야 하는 거 있으면… 가도 돼요. 그 말은 미루가 처음으로 재윤을 놓아주는 말이었다. 이렇게 관계는 정리되었다. 끝내는 것이 아니라 제자리로 돌리는 방식으로. 소하는 과거로, 서린은 선택의 책임으로, 미루는 스스로 걸어갈 미래로. 그리고 재윤은 하연에게 갈 준비를 했다. ## 7장: 말하지 못한 예감 D-4 월요일부터 세계는 더 자주 금요일 밤을 비쳤다. 재윤은 복도를 걷다가 금속이 흔들리는 소리를 들었다. 아무것도 없는 교실 모서리에서 조명 프레임의 그림자를 보았다. 운동장 끝을 지나갈 때, 하연이 누군가에게 밀려나는 듯한 잔상이 스쳤다. 사고 단서들이 하나씩 이어졌다. 서린의 점검표에는 소무대 임시 프레임이 있었다. 미루의 키링에는 풀린 고정끈이 있었다. 소하의 사진은 아무 일도 없던 과거가 진짜 기억을 덮을 수 없다는 것을 알려주었다. 그리고 하연은 여전히 말하지 못한 얼굴이었다. D-2 수요일, 축제 준비가 거의 끝난 교실에서 두 사람은 마지막 장식을 붙이고 있었다. 창밖은 노을이었고, 교실 안에는 종이컵과 메뉴판, 임시로 만든 카운터가 어지럽게 놓여 있었다. 노을빛은 창가 커튼을 지나 종이 장식 위에 길게 번졌고, 손글씨 메뉴판 아래의 테이프 자국은 빛을 받아 반짝였다. 교실 안은 따뜻했지만 창밖 운동장 끝은 벌써 그림자가 내려앉기 시작했다. 멀리 야외 소무대의 조명 프레임이 작게 보였다. 아직 낮의 일부처럼 보였지만, 다른 천막들보다 먼저 조용해지는 방향이었다. 하연은 메뉴판 한쪽을 고치다 말고 말했다. > 축제가 끝나면 학교가 엄청 조용해지겠지. 재윤은 고개를 들었다. > 아마. 다들 방학식 얘기하면서 바로 빠질걸. 하연은 창밖을 보았다. 운동장 뒤편, 낮에도 사람이 많지 않은 소무대 쪽이었다. > 조용해지면… 말하기 쉬워질까. > 무슨 말? 하연은 바로 대답하지 않았다. 대신 메뉴판에 붙은 작은 종이를 손끝으로 눌렀다. > 아니야. 아직은. 그 말은 약속이 아니었다. 장소도, 시간도 정해지지 않았다. 하지만 재윤은 그 말이 그냥 혼잣말이 아니라는 것을 알았다. 하연은 시끄러운 곳에서 마음을 꺼내는 사람이 아니었다. 하연은 언제나 한 걸음 물러난 곳, 숨을 고를 수 있는 자리에서 조금씩 자기 말을 꺼냈다. 재윤도 같은 말을 삼켰다. > 나도… 아직은 못 하겠다. 하연이 그를 보았다. 두 사람은 그 자리에서 더 말하지 않았다. 고백도 약속도 없었다. 다만 서로에게 아직 끝내지 못한 말이 있다는 사실만 남았다. 그 예감이 생긴 순간, 세계는 잠깐 조용해졌다. 마치 그동안 흩어져 있던 모든 장면이 축제 마지막 날의 한 선택으로 모여드는 것처럼. D-1 목요일, 축제 1일차가 열렸다. `쉬어가 카페`는 생각보다 바빴다. 학생들은 웃으며 교실에 들어왔고, 하연이 적은 문구를 보고 사진을 찍었다. 재윤은 주문을 받고, 컵을 나르고, 소하와 티격태격하고, 서린에게 동선 지적을 받고, 미루가 실수하지 않도록 멀리서 눈짓을 보냈다. 임시 카운터 앞에는 종이컵이 빠르게 쌓였다가 사라졌고, 칠판의 문구 카드는 손님들이 드나들 때마다 살짝 흔들렸다. 교실 밖 복도에서는 다른 반 학생들이 뛰어가며 웃었고, 창문 너머 운동장에서는 스피커 테스트음이 짧게 울렸다. 그 소란 속에서도 하연이 정리한 메뉴판과 문구들은 이상하게 차분했다. 하연은 카운터 안쪽에서 조용히 움직였다. 손님이 몰리면 재윤에게 컵을 건네고, 재윤이 허둥대면 말없이 필요한 것을 밀어주었다. 두 사람은 많은 말을 하지 않아도 서로의 다음 행동을 조금씩 알게 되었다. 잠깐 손님이 끊겼을 때, 하연은 창가에 기대어 말했다. > 진짜 쉬어가는 곳 같네. > 네가 문구 잘 써서 그래. > 너도 생각보다 잘하고. > 생각보다? 하연은 작게 웃었다. > 응. 생각보다. 재윤은 그 웃음을 오래 보고 싶었다. 그러나 동시에 알고 있었다. 이 평온함도 금요일을 지나야 진짜가 된다는 것을. 축제 첫날이 끝난 뒤, 교실에는 종이컵 냄새와 달달한 음료 향이 남았다. 학생들은 지쳤지만 들떠 있었다. 내일만 지나면 축제가 끝나고, 주말이 오고, 월요일 방학식이 온다. 재윤은 칠판에 적힌 방학식 일정을 보았다. 이번에는 그 월요일이 아주 멀게만 느껴지지 않았다. ## 8장: 축제 마지막 날 D-Day 금요일. 아침부터 학교는 들떠 있었다. 축제 2일차는 1일차보다 자유로웠다. 부스는 축소 운영되고, 학생들은 서로의 반을 돌아다니며 마지막 날을 즐겼다. 운동장에는 반별 천막과 손으로 만든 현수막이 줄지어 있었고, 학생들은 음료와 간식을 들고 햇빛 속을 오갔다. 중심부는 음악과 웃음으로 밝았지만, 가장자리로 갈수록 소리는 낮아졌다. 하연이 편하게 숨을 고를 수 있는 공간은 언제나 그 경계에 있었다. 재윤은 낮 동안 많은 사람을 만났다. 소하는 카페 앞에서 음료를 들고 서 있었다. 소하 뒤로는 학생들이 사진을 찍는 밝은 복도가 이어졌지만, 그녀가 기대 선 벽에는 오래된 등굣길에서 보던 것과 비슷한 햇빛이 비쳤다. 소하는 어디에 서 있어도 익숙한 길의 사람처럼 보였다. > 무리하지 마라. 너 꼭 중요한 날에 삐끗하더라. 말투는 장난이었지만 눈은 진지했다. > 알아. > 알고만 있지 말고. 소하는 잠깐 머뭇거리다 덧붙였다. > 그래도 가야 하면 가. 대신 까먹지 마. 너 돌아올 곳 없어진 거 아니니까. 재윤은 고개를 끄덕였다. 서린은 방송실 앞에서 마지막 큐시트를 확인하고 있었다. 방송실 문은 반쯤 열려 있었고, 안쪽 책상 위에는 헤드폰과 마이크, 폐장 안내문, 장비 회수 목록이 나란히 놓여 있었다. 케이블에는 작은 라벨이 붙어 있었고, 서린의 손가락은 큐시트의 빈칸을 한 번 더 짚고 지나갔다. > 폐장 후 소무대 근처는 원래 철거 예정이야. 가능하면 가지 않는 게 맞아. > 그래도 가야 할 것 같아. 서린은 재윤을 오래 보았다. > 그렇다면 적어도 눈을 뜨고 가. 피하려고 가는 건지, 마주하려고 가는 건지 구분해. > 마주하러 가는 거야. 서린은 수첩을 닫았다. > 그럼 네 선택이야. 미루는 운동장 쪽에서 도움 인원 완장을 차고 있었다. 조금 긴장한 얼굴이었지만, 예전처럼 재윤에게 모든 것을 확인받으려 하지는 않았다. 미루 옆 임시 책상에는 체크리스트와 명찰, 여분 안내 표지, 테이프와 끈이 정리되어 있었다. 복도 쪽으로 나가는 길은 열려 있었고, 미루는 그 길을 등지고 숨는 대신 필요한 사람에게 먼저 다가가고 있었다. > 선배, 저 오늘 실수 조금 했어요. > 큰일 났어? > 아니요. 제가 말해서 해결했어요. 미루는 뿌듯한 듯 웃었다. > 그래도 고정끈은 다시 확인했어요. 왠지 해야 할 것 같아서. 재윤은 미루의 머리를 가볍게 두드리려다 멈추고, 대신 엄지를 들어 보였다. > 잘했어. 그리고 하연. 하연은 축제의 밝은 소음 속에서도 조금 조용했다. 재윤과 함께 부스를 정리하고, 운동장을 걷고, 공연이 끝나는 것을 보았다. 두 사람은 종종 눈이 마주쳤지만, 낮에는 어젯밤 남은 말을 꺼내지 않았다. 두 사람이 걷는 길은 운동장 한가운데가 아니라 천막 그림자가 끊기는 가장자리였다. 멀리서는 음악이 이어졌지만, 하연이 걸음을 늦출 때마다 학생들의 소음은 조금씩 뒤로 밀렸다. 재윤은 이제 그 속도를 알아볼 수 있었다. 하연이 아무 말 없이 조용한 곳을 찾을 때, 그것은 사라지고 싶다는 뜻이 아니라 마음을 정리할 자리가 필요하다는 뜻이었다. 말해야 할 시간은 누가 정해둔 일정처럼 오지 않았다. 해가 기울고, 방송에서 축제 종료 안내가 흘러나왔다. 학생들은 아쉬워하면서도 하나둘 정리를 시작했다. 교실의 장식이 내려가고, 운동장의 천막이 접히고, 음악이 끊겼다. 밝은 천막 아래에는 아직 웃음이 남아 있었지만, 학교 뒤편은 먼저 어두워졌다. 접힌 현수막이 박스 위에 놓이고, 쓰레기봉투 옆으로 컵 받침이 굴러갔다. 운동장 중심의 소리는 늦게까지 남았지만, 소무대 쪽에서는 바람이 전선을 스치는 소리가 더 또렷했다. 재윤은 손에 남은 컵을 정리하다가 하연이 보이지 않는다는 것을 알아차렸다. 처음에는 화장실에 갔거나, 교실 밖에서 누군가와 이야기하고 있을 거라고 생각했다. 하지만 카운터 주변에도, 복도에도, 운동장 쪽에도 하연은 없었다. 재윤은 그제야 낮 동안 하연이 자주 시선을 두던 곳들을 떠올렸다. 축제 소리가 멀어지는 가장자리. 사람이 몰리지 않는 길. 그리고 D-24에 하연이 오래 바라보던 학교 뒤편 야외 소무대. 만약 하연을 제대로 보지 않았다면 알 수 없었을 것이다. 하연이 시끄러운 곳에서 바로 마음을 꺼내는 사람이 아니라는 것도, 숨을 고를 수 있는 조용한 자리로 물러나는 사람이라는 것도. 재윤은 심장이 빠르게 뛰는 것을 느꼈다. 이번에는 하연이 부른 것이 아니었다. 이번에는 재윤이 먼저 찾아가는 것이었다. 그는 교실에 남은 메뉴판을 보았다. `쉬었다 가도 늦지 않음.` 늦지 않다. 그 문장이 거짓말이 되기 전에, 재윤은 복도로 나갔다. 본관의 소음이 멀어지고, 야외 소무대가 보였다. 재윤은 걸음을 멈추지 않았다. 무서웠다. 하지만 이제는 무서움을 이유로 돌아서고 싶지 않았다. 소무대 앞에 섰을 때, 밤바람이 불었다. 낮게 남은 단차와 검은 전선, 임시 조명 프레임, 출입 제한 표지가 하나씩 눈에 들어왔다. 낮에는 평범한 행사 시설처럼 보이던 것들이 폐장 후에는 모두 다른 의미를 갖고 있었다. 그러나 이번에는 그 소품들이 재윤을 막는 위험만은 아니었다. 자신이 왜 이곳으로 오려 했는지 되찾게 하는 기억의 조각이기도 했다. 하연은 재윤을 보았다. > 어제 하려던 말. > 응. 재윤은 숨을 들이마셨다. 소하의 사진, 서린의 점검표, 미루의 키링, 하연의 목소리. 모든 조각이 한곳으로 모였다. > 나, 계속 미뤘어. 하연은 기다렸다. > 네가 신경 쓰였는데, 좋아하는 것 같았는데, 말하면 뭔가 바뀔까 봐. 아니, 사실은 내가 선택해야 하는 게 무서워서. 계속 핑계 찾았어. 재윤은 하연의 눈을 피하지 않았다. > 근데 이제는 말할게. 좋아해. 너한테 가고 싶어. 아무 일도 없던 척하는 데 말고, 정답 뒤에 숨는 데 말고, 누가 날 필요로 하는 꿈속 말고. 너한테. 하연의 입술이 떨렸다. > 나도… 그 말이 끝나기 전에 금속이 울었다. 이번에는 재윤도 알고 있었다. 이 소리가 무엇인지. 어디에서 오는지. 어떤 기억으로 이어지는지. 하연이 고개를 돌렸다. 임시 조명 프레임이 흔들렸다. 풀린 고정끈이 바닥을 스쳤고, 철제 지지대의 그림자가 하연 쪽으로 기울었다. 이전의 재윤이라면 그저 몸이 먼저 움직였을 것이다. 이유도 모른 채, 기억도 잃은 채, 누군가를 밀어내고 쓰러졌을 것이다. 이번에는 달랐다. 재윤은 하연의 이름을 불렀다. > 하연아! 그리고 그녀를 밀어냈다. 하연은 넘어지며 재윤의 손을 붙잡으려 했다. 재윤은 그 손끝을 보았다. 이번에는 그 손을 기억했다. 하연의 목소리도, 자신이 왜 이곳에 왔는지도, 방금 전 말한 마음도 잊지 않았다. 충격이 왔다. 세계가 부서졌다. 교실, 등굣길, 방송실, 미루의 닫힌 방, 카페의 메뉴판, 소무대의 조명이 한꺼번에 뒤섞였다. 선택지가 떠올랐다. ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 그 선택지들은 희미해졌다. 소하의 목소리가 들렸다. > 과거는 도망칠 곳이 아니라, 지나온 곳이야. 서린의 목소리가 들렸다. > 네 선택이야. 미루의 목소리가 들렸다. > 놓아도 끝나는 건 아니죠? 마지막으로 하연의 목소리가 들렸다. > 재윤아. 새로운 선택지가 나타났다. ```text [하연에게 말하러 간다] ``` 그리고 그 아래, 더 선명한 문장이 떠올랐다. ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 재윤은 그 선택지를 골랐다. 어둠 속에서 그는 하연에게 말했다. > 아무 일도 없던 날로 돌아가고 싶은 게 아니야. 목소리가 제대로 나오는지 알 수 없었다. 그래도 말했다. > 다친 것도, 무서웠던 것도 기억한 채로 너에게 갈게. 그 순간 금요일 밤이 끝났다. ### 사고 기억의 중심 철제 지지대가 무너지는 순간, 재윤은 처음으로 모든 장면을 동시에 보았다. 첫 회차의 교실. 하연이 처음 들어오던 문. 소하와 걸었던 등굣길. 서린의 수첩. 미루의 닫힌 방. 카페의 문구. 그리고 밤의 소무대. 그동안 세계는 재윤에게 여러 길을 보여주었다. 아무 일도 없던 과거로 돌아가도 된다고. 정답을 주는 사람 뒤에 숨어도 된다고. 누군가에게 필요한 꿈속에 남아도 된다고. 하지만 그 모든 길에는 하연의 목소리가 없었다. 재윤은 드디어 알았다. 자신이 두려워한 것은 단순히 다치는 일이 아니었다. 하연을 좋아했다는 사실과, 하연도 자신에게 오고 있었다는 사실과, 그 마음을 말하려던 선택 끝에 사고가 일어났다는 사실을 동시에 받아들이는 일이었다. 다치지 않은 과거를 찾으면 마음도 안전해질 것 같았다. 정답을 고르면 아무도 다치지 않을 것 같았다. 꿈속에 남으면 현실의 병실과 하연의 눈물을 보지 않아도 될 것 같았다. 그러나 그 모든 회피는 금요일 밤을 끝내지 못했다. 재윤은 어둠 속에서 하연의 이름을 불렀다. > 은하연. 멀리서 하연이 대답하는 것 같았다. > 들려. 그 목소리가 길이 되었다. 재윤은 선택했다. 사고를 없애는 선택이 아니라, 사고가 있었던 기억까지 가지고 돌아가는 선택을. 그 선택이 끝난 뒤에야 세계는 무너질 수 있었다. ## 9장: D+1, 보이지 않는 토요일 토요일은 화면에 표시되지 않는다. 재윤에게 그 하루의 기억은 없다. 플레이어도 그 하루를 직접 걷지 않는다. 금요일 밤의 암전 이후, 세계는 숨을 멈춘 채 어딘가를 건너간다. 하지만 현실에는 토요일이 있었다. 병실의 시간은 느리게 흘렀다. 창밖은 밝아졌다가 어두워졌고, 간호사는 몇 번이나 들어와 재윤의 상태를 확인했다. 의사는 검사 결과를 설명했지만, 설명할 수 없는 부분이 더 많았다. 외상은 크지 않았다. 생명에 직접적인 위험이 있는 상태도 아니었다. 그런데 재윤은 눈을 뜨지 않았다. 병실은 조용했다. 흰 커튼은 에어컨 바람에 아주 조금씩 흔들렸고, 작은 모니터의 규칙적인 빛만이 시간이 멈추지 않았다는 사실을 알려주었다. 침대 옆 의자에는 보호자용 담요가 접혀 있었고, 물컵 하나는 손댄 흔적 없이 반쯤 차 있었다. 이곳은 극적인 사고 현장이 아니라, 아무 일도 끝나지 않은 채 기다림만 길어지는 장소였다. 하연은 병실 앞 의자에 앉아 있었다. 처음에는 울지 않았다. 울면 정말 큰일이 난 것 같아서, 울지 않으려고 했다. 소하가 와서 거칠게 물었다. 왜 아직 안 일어나냐고. 서린은 의사에게 같은 질문을 여러 방식으로 반복했다. 미루는 병실 안을 들여다보다가 결국 복도 끝에서 울었다. 하연은 그 모든 것을 보았다. 그리고 자신이 그 밤에 재윤을 불렀다는 사실을 계속 떠올렸다. 자신이 먼저 사라지지 않았다면. 재윤이 자신을 찾아오지 않았다면. 더 일찍 마음을 말했다면. 재윤이 자신을 밀어내지 않았더라면. 생각은 끝없이 돌아갔다. 그러나 재윤은 돌아오지 않았다. 밤이 되었을 때, 하연은 병실 안으로 들어갔다. 재윤은 조용히 누워 있었다. 얼굴에는 큰 상처가 없었고, 팔에는 작은 처치 흔적이 있었다. 그래서 더 비현실적이었다. 금방이라도 눈을 뜨고, 왜 그렇게 심각한 얼굴이냐고 말할 것 같았다. 하연은 침대 옆에 앉았다. > 늦어. 대답은 없었다. 하연은 그제야 울었다. 이 하루는 재윤이 기억하지 못하는 하루다. 하지만 하연에게는 가장 긴 하루다. ## 10장: D+2, 일요일 오후 재윤은 소독약 냄새 속에서 눈을 떴다. 일요일 오후의 빛이 병실 창문으로 비스듬히 들어오고 있었다. 커튼은 완전히 닫히지 않아 바깥 하늘의 밝은 색이 얇게 번졌고, 침대 옆 작은 선반에는 물컵과 접힌 가디건, 구겨진 휴지가 놓여 있었다. 재윤은 그 사소한 물건들이 자신이 없는 동안 누군가 이곳에 오래 머물렀다는 증거처럼 느껴졌다. 처음에는 자신이 어디에 있는지 알 수 없었다. 천장이 낯설었다. 팔이 무거웠고, 어깨와 옆구리가 둔하게 아팠다. 머릿속에는 금속이 무너지는 소리와 하연이 자신을 부르는 목소리가 남아 있었다. 그는 천천히 고개를 돌렸다. 하연이 있었다. 하연은 의자에 앉은 채 잠들어 있었다. 제대로 잔 사람의 얼굴이 아니었다. 눈가가 붉었고, 손에는 구겨진 휴지가 들려 있었다. 재윤은 그녀를 부르려 했지만 목이 잘 움직이지 않았다. > 하연아. 아주 작은 목소리였다. 하연은 그 소리에 바로 깼다. 처음에는 믿지 못하는 얼굴이었다. 그리고 다음 순간, 눈물이 차올랐다. > 유재윤. 재윤은 웃으려 했다. > 나… 얼마나 잤어? 하연은 입술을 깨물었다. > 오늘 일요일이야. > 일요일? 재윤은 눈을 감았다가 다시 떴다. > 하루가 지났어? > 하루 넘게. 계속 안 일어났어. 그 말이 이상하게 익숙했다. 재윤은 꿈속에서 자신이 왜 돌아오지 못했는지 이제야 알 것 같았다. 몸이 못 일어난 것이 아니었다. 마음이 금요일 밤에서 빠져나오지 못했던 것이다. > 나 많이 다쳤어? 하연은 고개를 저었다. > 아니. > 아닌데 왜 병원이야? 하연의 얼굴이 일그러졌다. > 안 일어났어. 짧은 대답이었다. 그 안에 토요일 하루가 모두 들어 있었다. 재윤은 손을 움직이려 했다. 하연이 먼저 그의 손을 잡았다. 힘이 세지 않았지만, 놓치지 않겠다는 듯 꼭 잡았다. > 미안. 재윤이 말했다. 하연은 바로 고개를 저었다. > 그런 말 하지 마. > 그래도. > 네가 사과할 일이 아니야. 재윤은 하연을 보았다. > 나 기억해. 하연의 손에 힘이 들어갔다. > 뭐를? > 네가 거기 있었던 거. 내가 너한테 말하려고 했던 거. 네가 나한테 말하려고 했던 거. 금속 소리도, 내가 널 밀어낸 것도. 하연은 숨을 멈춘 듯했다. 재윤은 천천히 말했다. > 이번엔 기억하고 왔어. 그 말에 하연은 끝내 울음을 터뜨렸다. 재윤은 손을 들어 하연의 손등을 약하게 쥐었다. 몸은 무겁고, 말은 자꾸 끊겼지만, 이번에는 도망치고 싶지 않았다. > 하연아. > 응. > 좋아해. 병실의 고백은 축제 밤의 고백보다 초라했다. 조명도, 음악도, 완벽한 분위기도 없었다. 소독약 냄새와 작은 기계음, 피곤에 젖은 얼굴뿐이었다. 하지만 그래서 더 진짜였다. 하연은 눈물을 닦지 않은 채 대답했다. > 나도... 좋아해. 두 사람은 한동안 아무 말도 하지 않았다. 침묵은 더 이상 미룬 마음의 침묵이 아니었다. 이미 말했기 때문에 가능한 침묵이었다. 금요일 밤은 끝났다. ## 11장: D+3, 월요일이 왔으니까 월요일 아침, 재윤은 병원에서 오래 실랑이를 했다. 의사는 무리하지 말라고 했고, 부모님도 방학식 같은 건 가지 않아도 된다고 했다. 소하라면 분명 욕을 할 것이고, 서린은 일정상 불필요한 이동이라고 말할 것이고, 미루는 울먹이며 말릴 것이다. 그래도 재윤은 가고 싶었다. 방학식은 대단한 행사가 아니었다. 짧은 인사, 방학 안내, 학생들의 들뜬 소란. 평소라면 귀찮다고 넘겼을 날이었다. 하지만 재윤에게 그 월요일은 가장 먼 하루였다. 실패한 루프에서는 언제나 금요일 밤 이후 시간이 끊겼다. D+3은 칠판에 적혀 있었지만 도달하지 못했다. 미루의 멘토링이 끝나는 날, 축제가 정말 끝났음을 확인하는 날, 하연과 말한 마음이 꿈속이 아니라 현실에 남아 있음을 증명하는 날. 재윤은 천천히 교문을 지났다. 몸은 무거웠다. 걸음도 평소보다 느렸다. 팔의 밴드와 얼굴의 작은 상처 때문에 지나가는 학생들이 그를 돌아보았다. 그러나 재윤은 멈추지 않았다. 교문 안쪽에는 이미 방학식 분위기가 번져 있었다. 학생들은 종이가방과 실내화를 들고 웃으며 지나갔고, 축제 때 세워졌던 천막 자리에는 흙먼지와 희미한 눌린 자국만 남아 있었다. 며칠 전까지만 해도 모든 선택이 모여들던 학교는 다시 평범한 여름 학교가 되어 있었다. 교실에 들어서자 가장 먼저 소하가 소리쳤다. 2학년 5반 교실은 축제 전의 형태로 거의 돌아와 있었다. 책상은 줄을 맞추었고, 카운터로 쓰던 흔적은 사라졌지만 칠판 구석에는 지워지지 않은 테이프 자국과 작은 분필 가루가 남아 있었다. 창밖 햇빛은 밝았고, 뒤 게시판에는 방학 중 유의사항이 새로 붙어 있었다. > 야, 유재윤! 누가 오랬냐? 재윤은 문틀에 기대어 숨을 골랐다. > 너라면 올 줄 알았잖아. 소하는 화난 얼굴로 다가왔지만, 눈가가 붉었다. > 진짜 짜증나. 사람 걱정시키는 것도 정도가 있지. > 미안. > 사과는 나중에 해. 지금은 앉아. 쓰러지면 진짜 가만 안 둬. 재윤은 웃었다. 소하의 잔소리는 익숙했다. 하지만 이제 그 익숙함은 그를 붙잡는 과거가 아니었다. 돌아올 수 있는 자리였다. 서린은 교실 앞쪽에서 재윤을 보더니 곧장 다가왔다. > 오래 있으면 안 돼. > 알겠습니다, 회장님. > 농담할 상태 아닌데. 서린은 차갑게 말했지만, 손에는 이미 의자를 끌어올 준비가 되어 있었다. > 그래도… 와줘서 다행이야. 그 말은 아주 작았다. 재윤은 못 들은 척하지 않았다. > 나도. 미루는 한참 뒤에야 교실 문 앞에 나타났다. 1학년이라 다른 교실에 있어야 했지만, 방학식 전 잠깐 찾아온 모양이었다. 미루는 재윤을 보자마자 울 것 같은 얼굴이 되었다. > 선배. > 울지 마. 나 괜찮아. > 안 괜찮아 보여요. > 조금 안 괜찮긴 해. 미루는 웃다 울음을 삼켰다. > 멘토링 끝나도… 가끔 인사해도 되죠? 재윤은 고개를 끄덕였다. > 당연하지. > 모르는 거 생기면요? > 먼저 해보고. 그래도 모르겠으면 물어봐. 미루는 힘껏 고개를 끄덕였다. 이제 그 말은 이별이 아니었다. 끝나야 다음으로 갈 수 있다는 약속이었다. 그리고 하연이 왔다. 하연은 교실 문 앞에서 잠깐 멈췄다. 재윤을 발견하고도 바로 다가오지 않았다. 둘 사이에는 병실에서 이미 나눈 말들이 있었다. 그래서 오히려 교실에서는 조심스러웠다. 재윤이 먼저 손을 들었다. 하연이 다가왔다. > 진짜 왔네. 재윤은 웃었다. > 월요일이 왔으니까. 하연은 그 말을 듣고 잠깐 고개를 숙였다. 웃는 것 같기도 하고, 우는 것 같기도 했다. 방학식은 짧았다. 담임은 방학 중 안전 수칙과 개학일을 말했다. 학생들은 반쯤 듣고 반쯤 떠들었다. 창밖에서는 여름 햇빛이 운동장을 밝히고 있었다. 며칠 전 축제 천막이 있던 자리에는 아무것도 없었다. 소무대도 정리되었고, 안내문도 떼어졌다. 그래도 완전히 사라진 것은 아니었다. 운동장 흙 위에는 천막 다리가 눌렀던 네모난 자국이 남아 있었고, 복도 한쪽에는 아직 회수하지 못한 박스가 쌓여 있었다. 축제는 철거되었지만, 지나간 흔적은 현실적인 방식으로 남아 있었다. 그 흔적이 오히려 재윤을 안심시켰다. 기억은 사라지지 않아도, 장소는 다음 용도로 넘어갈 수 있었다. 모든 것이 평범했다. 그래서 재윤은 눈물이 날 것 같았다. 평범한 월요일이 왔다. 금요일 다음의 월요일이. 끝내 도달하지 못하던 하루가. 방학식이 끝난 뒤, 교실은 천천히 비었다. 소하는 친구들과 떠들면서도 계속 재윤 쪽을 확인했고, 서린은 담임에게 재윤이 오래 있지 않게 하겠다고 말했고, 미루는 복도 끝에서 몇 번이나 손을 흔들었다. 재윤은 창가에 섰다. 하연이 옆에 왔다. 두 사람은 한동안 아무 말도 하지 않았다. 이제 침묵은 두렵지 않았다. > 아직 아파? 하연이 물었다. > 조금. > 무서웠어? 재윤은 솔직하게 고개를 끄덕였다. > 응. 하연도 고개를 끄덕였다. > 나도. 재윤은 창밖을 보았다. > 그래도 왔어. > 어디에? > 월요일에. 하연은 작게 웃었다. 그 웃음은 축제 첫날 카페 안에서 보았던 웃음과 닮아 있었다. 하지만 이제 그 웃음 뒤에는 숨겨진 말이 없었다. 재윤은 말했다. > 앞으로도 무서울 것 같아. 그날 생각도 날 거고. 네가 울던 것도 생각날 거고. > 응. > 그래도 이번엔 도망 안 갈게. 하연은 재윤을 보았다. > 나도 안 미룰게. 두 사람은 나란히 창밖을 보았다. 축제는 끝났다. 방학식도 끝났다. 사고의 기억은 사라지지 않았다. 재윤의 몸에는 아직 상처가 남아 있었고, 하연의 눈가에는 지워지지 않은 피로가 있었다. 하지만 시간은 앞으로 갔다. 그리고 그것만으로도, 두 사람은 조금 숨을 쉴 수 있었다. ## 에필로그: 끝난 축제, 남은 마음 방학식이 끝나고 학생들이 모두 돌아간 뒤, 2학년 5반 교실에는 햇빛만 남았다. 의자를 끄는 소리와 종례 후의 떠들썩함이 빠져나가자, 교실은 다시 숨을 고르는 공간이 되었다. 칠판 아래에는 떨어진 분필 조각이 하나 있었고, 창가에는 누군가 떼다 만 종이 꽃잎이 책상 사이에 끼어 있었다. `쉬어가 카페`는 끝났지만, 교실은 아직 그 문장의 의미를 조금 간직하고 있었다. 칠판 구석에는 누군가 지우지 않은 작은 글씨가 있었다. `쉬어가 카페` 재윤은 그 글씨를 보고 웃었다. 정말 쉬어가는 곳이었다. 끝없이 머무는 곳이 아니라, 다시 걸어가기 위해 잠깐 숨을 고르는 곳. 하연은 교실 문 앞에서 기다리고 있었다. > 갈 수 있어? > 천천히면. > 그럼 천천히 가. 두 사람은 복도를 걸었다. 빠르지 않았다. 병원으로 돌아가야 했고, 재윤은 아직 오래 걸을 수 없었다. 하지만 이번에는 목적지를 알고 있었다. 복도는 실패 루프의 복도처럼 비어 있지 않았다. 멀리서 학생들이 웃으며 계단을 내려가는 소리가 들렸고, 창문으로 들어온 여름빛이 바닥에 길게 놓였다. 하연은 앞서가지 않았고, 재윤도 무리해서 따라잡으려 하지 않았다. 둘의 걸음은 느렸지만 같은 속도였다. 계단을 내려가며 재윤은 문득 물었다. > 너 그때, 처음 전학 왔을 때. > 응. > 나 본 적 있는 것 같다고 했잖아. 하연은 잠깐 생각하다가 말했다. > 지금도 그래. > 지금도? > 응. 처음 본 것 같지 않았어. 근데 이제는 알아. 처음이라서 낯선 게 아니라, 다시 만난 것 같아서 그랬던 거야. 재윤은 대답하지 못했다. 하연은 먼저 현관 밖으로 나갔다. 여름 햇빛이 그녀의 어깨에 내려앉았다. 재윤은 한 걸음 늦게 따라 나갔다. 현관 밖 공기는 병실보다 훨씬 덥고 습했다. 운동장에서는 매미 소리가 들렸고, 교문 너머 도로에는 방학을 맞은 학생들이 흩어지고 있었다. 학교 뒤편으로 이어지는 길은 시야에서 비껴 있었지만, 재윤은 그 방향을 피하듯 외면하지 않았다. 이제 그곳은 머물러야 할 밤이 아니라, 지나온 장소였다. 학교 뒤편 소무대가 있던 쪽은 이제 보이지 않았다. 그러나 그곳에서 있었던 일은 사라지지 않는다. 사라지지 않아도 괜찮다. 그 기억은 두 사람을 가두는 밤이 아니라, 서로에게 돌아온 길이 되었으니까. 하연이 손을 내밀었다. 재윤은 그 손을 잡았다. 이번에는 놓치지 않았다. 교문을 나서기 직전, 하연의 휴대폰이 짧게 울렸다. 병원에서 보낸 재검사 안내였다. 하연은 화면을 보고 잠깐 미간을 찌푸리더니, 곧 재윤에게 보여주었다. > 내일 오전이래. > 알고 있어. 엄마가 세 번 말했어. > 그럼 내일은 병원. 하연은 아주 당연한 일처럼 말했다. 재윤은 그녀를 보았다. > 같이 와줄 거야? > 안 돼? > 아니. 재윤은 웃었다. > 와줬으면 좋겠어. 하연은 대답 대신 고개를 끄덕였다. 그리고 조금 늦게, 덧붙였다. > 모레는? > 모레? > 병원 안 가는 날이면. 하연은 운동장 너머를 보았다. 축제 천막이 사라진 자리 위로 여름 햇빛이 흔들리고 있었다. > 학교 도서관은 방학에도 열어. 오전에만. 재윤은 그 말을 알아들었다. 축제는 끝났다. 방학식도 끝났다. 하지만 두 사람이 만날 이유까지 끝난 것은 아니었다. 병원 재검사, 도서관 반납일, 너무 더우면 잠깐 들어갈 카페, 하연이 아직 가보지 못한 학교 뒤편 산책길, 재윤이 천천히 걸을 수 있을 만큼만 이어지는 오후들. 그 장소들은 모두 작고 현실적이었다. 병원 대기실의 차가운 의자, 방학 중 운영 시간표가 붙은 학교 도서관 입구, 물방울 맺힌 컵이 놓인 작은 카페 창가, 소무대가 있던 방향을 직접 바라보지 않아도 걸을 수 있는 밝은 산책길. 거창한 장면은 아니었지만, 오히려 그래서 두 사람이 계속 만날 수 있는 미래처럼 느껴졌다. 거창한 약속은 아니었다. 매일 만나자는 말도 아니었고, 절대로 떨어지지 말자는 말도 아니었다. 다만 이제는 다음을 말할 수 있었다. 내일을, 모레를, 방학 중 어느 평범한 오전을. > 그럼 모레는 도서관. 재윤이 말했다. 하연은 아주 작게 웃었다. > 천천히 와. > 너도 기다리다 그냥 가지 말고. > 안 가. 짧은 대답이었다. 하지만 재윤은 그 말이 좋았다. 축제 마지막 밤에 미처 끝내지 못했던 문장보다, 병실에서 떨리는 목소리로 주고받은 고백보다, 어쩌면 지금 이 말이 더 현실 같았다. 기다리겠다는 말. 이번에는 끝나지 않는 루프 안이 아니라, 정말로 시간이 흐르는 여름 안에서. 두 사람은 교문 밖으로 천천히 걸어 나갔다. 하연의 걸음은 재윤보다 반 박자 느렸고, 재윤의 걸음은 평소보다 훨씬 조심스러웠다. 그래서 둘은 자연스럽게 같은 속도가 되었다. > 축제는 끝났다. > 방학식도 끝났다. > 그래도 월요일은 사라지지 않았다. > 그리고 여름은, 아직 남아 있었다. ## 엔딩 크레딧 연출: 아직 남은 여름 진엔딩 본편이 끝나면 바로 검은 화면으로 끊지 않고, 잔잔한 엔딩곡과 함께 짧은 애니메이션 컷이 이어진다. 음악은 느린 피아노로 시작해, 중반부터 얇은 어쿠스틱 기타와 여름 매미 소리, 멀리서 들리는 학교 방송 잡음을 아주 작게 섞는다. 분위기는 슬프게 끝나는 곡이 아니라, 사고의 기억을 안고도 앞으로 걸어가는 따뜻한 여운이다. 크레딧 애니메이션은 대사 없이 짧은 생활 컷으로 구성한다. 1. 병원 대기실. 재윤의 손목 밴드가 클로즈업되고, 옆 의자에 앉은 하연의 손이 조용히 물병을 밀어준다. 2. 학교 도서관 입구. 방학 중 운영 시간 안내문이 붙어 있고, 하연이 먼저 도착해 책 한 권을 들고 기다린다. 3. 여름 햇빛 아래 버스 정류장. 재윤은 천천히 걸어오고, 하연은 먼저 타지 않고 그를 기다린다. 4. 작은 카페 창가. 두 사람 사이에는 축제 때 쓰던 컵과 닮은 종이컵이 놓여 있고, 둘은 말없이 같은 페이지를 본다. 5. 학교 뒤편 산책길. 소무대가 있던 방향은 직접 보여주지 않고, 두 사람이 그 반대편 밝은 길로 걸어간다. 6. 마지막 컷. 하연의 휴대폰 캘린더에 방학 중 표시된 작은 약속들이 보인다. `병원`, `도서관`, `카페`, `천천히 걷기`. 화면이 밝은 여름 하늘로 페이드아웃된다. 각 컷의 배경은 화려하게 꾸미지 않는다. 병원은 차분하고 실제적이어야 하고, 도서관은 방학 중에도 조용히 열리는 작은 학교 시설이어야 하며, 카페는 `쉬어가 카페`의 완성형이 아니라 동네의 평범한 창가 자리여야 한다. 산책길은 사고 장소를 아름답게 다시 포장하지 않고, 그곳을 지나 다음 밝은 길로 걸어가는 감각을 준다. 크레딧의 핵심은 두 사람이 모든 상처를 즉시 극복했다는 선언이 아니다. 방학 동안 계속 만나며, 무리하지 않는 속도로 서로의 일상에 남아 있을 것이라는 암시다.", "excerpt": "# 전체 스토리 이 문서는 게임의 진엔딩 정본을 기준으로 처음부터 끝까지 읽히는 본편 원고형 스토리다. 세부 시스템, 날짜별 이벤트, 루트 조건은 다른 문서에서 관리하되, 플레이어가 최종적으로 도달해야 하는 이야기의 감정선과 사건 흐름은 이 문서를 기준으로 잡는다. 실패 루프와 새드엔딩은 본편을 대체하지 않고, [전체 스토리 외전: 실패 루프와 새드엔딩](./07_전체_스토리_외전_실패루프."}, {"path": "스토리/01_스토리_컨셉_개요.md", "category": "스토리", "title": "스토리 컨셉 개요", "id": "스토리-01스토리컨셉개요-md", "html": "<h2 id=\"스토리-01스토리컨셉개요-md-스토리-컨셉-개요\">스토리 컨셉 개요<\/h2>\n<h3 id=\"스토리-01스토리컨셉개요-md-핵심-컨셉\">핵심 컨셉<\/h3>\n<p>1학기 말 축제날 은하연을 지키려다 사고로 혼수상태에 빠진 고등학교 2학년 주인공 유재윤이, 미연시처럼 재구성된 내면세계에서 하연 등장 후 약 4주를 반복하며 은하연과 서로의 마음을 확인하고, 기존 관계에 남은 미련과 후회, 사고의 진실을 받아들이고 현실로 돌아가는 루프 로맨스 미스터리 비주얼노벨.<\/p>\n<p>겉으로는 1학기 말 학교 축제까지 이어지는 미연시다. 첫 회차 초반에는 기존 히로인들과 연애 루트를 타는 게임처럼 보이지만, 은하연이 전학 온 뒤 관계와 기억이 조금씩 어긋난다.<\/p>\n<p>진엔딩의 핵심은 재윤이 기존 관계 뒤에 숨지 않고 먼저 자기 마음과 선택을 말한 뒤, 하연과 서로의 마음을 확인하고 <code>하연에게 돌아간다<\/code>는 선택이다.<\/p>\n<h3 id=\"스토리-01스토리컨셉개요-md-이야기의-핵심-질문\">이야기의 핵심 질문<\/h3>\n<p>이 이야기는 사고를 없던 일로 만드는 이야기가 아니다.<\/p>\n<p>재윤은 하연을 좋아했고, 하연 역시 그 마음을 전하려 했다. 그 마음 때문에 축제 마지막 밤 두 사람은 소무대에서 마주했고, 재윤은 하연을 지키려다 다쳤다. 내면세계의 루프는 그 선택을 후회로 지우려는 마음과, 그래도 서로의 마음을 기억하고 돌아가려는 마음 사이에서 반복된다.<\/p>\n<p>루프가 끝나는 조건은 완벽하게 안전한 과거를 찾는 것이 아니라, 다친 기억까지 포함해 자신이 선택한 마음과 하연의 마음을 함께 받아들이는 것이다.<\/p>\n<p>핵심 주제문:<\/p>\n<blockquote>다치지 않은 과거로 돌아가는 이야기가 아니라, 다친 기억까지 안고도 서로 선택한 마음을 인정하는 이야기.<\/blockquote>\n<p>또 다른 표현:<\/p>\n<blockquote>미룬 마음은 끝난 하루를 끝나게 하지 못한다.<\/blockquote>\n<h3 id=\"스토리-01스토리컨셉개요-md-루프의-이유\">루프의 이유<\/h3>\n<p>루프는 시간마법이나 외부 초자연 현상이 아니라, 혼수상태에 빠진 재윤의 내면이 만든 반복이다.<\/p>\n<p>재윤은 다음 세 가지를 동시에 받아들이지 못한다.<\/p>\n<ol>\n<li>자신이 은하연을 좋아했다는 사실<\/li>\n<li>하연 역시 마음을 전하려 했다는 사실<\/li>\n<li>두 사람의 마음이 만난 그 밤, 하연을 지키려다 자신이 다쳤다는 기억<\/li>\n<\/ol>\n<p>그래서 내면세계는 D-25 월요일 하연 등장 직전부터 D-Day 금요일 축제 2일차 사고까지를 반복한다. 이 반복은 사고를 완벽히 피할 방법을 찾기 위한 것이 아니라, 재윤이 미뤄온 선택과 끝내지 못한 관계를 정리하고 현실로 돌아갈 이유를 회복하기 위한 구조다.<\/p>\n<p>하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 사고 기억에서 하연을 잃는다. 폐장 후 학교 뒤편 야외 소무대에 서 있지만, 누가 자신을 불렀는지, 누구에게 가려 했는지 기억하지 못한다. 그 루프의 사고는 <code>하연을 지키려던 밤<\/code>이 아니라 <code>혼자 소무대에 선 채 반복되는 사고<\/code>로 재구성된다.<\/p>\n<p>금요일 다음 월요일이 오려면, 재윤이 끝내지 않은 것들을 끝내야 한다.<\/p>\n<h3 id=\"스토리-01스토리컨셉개요-md-전체-진행-구조\">전체 진행 구조<\/h3>\n<h4 id=\"스토리-01스토리컨셉개요-md-첫-회차\">첫 회차<\/h4>\n<pre><code>D-32 ~ D-26: 첫 회차 전용 기존 히로인 관계 기준점 / 장르 오인 구간\nD-25 아침: 교실에서 짧은 꿈 / 은하연 전학 / 주인공 첫눈에 반함\nD-24 ~ D-23: 하연 적응 / 첫 접점 / 교실 분위기 변화\nD-23: 담임이 학기말 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공식 공지\nD-22 ~ D-15: 관계 확장 / 2학년 5반이 축제 준비에 참여하며 하연과의 접점이 생활 속으로 들어오기 시작\nD-14 ~ D-8: 축제 준비 본격화 / 관계와 기억의 어긋남 시작\nD-7 ~ D-2: 기억 회복 심화 / 사고 단서 집중 / 하연이 조용한 곳에서 마음을 정리한다는 감각 형성\nD-1 목요일: 축제 1일차 / 부스 운영 중심 / 하연과 `쉬어가 카페` 운영으로 관계 강화\nD-Day 금요일: 축제 2일차 / 부스 축소 운영 후 히로인들과 축제를 둘러봄 / 하연 공략이 충분하면 폐장 후 재윤이 하연의 동선을 알아차려 직접 찾아가고, 학교 뒤편 야외 소무대에서 선고백과 사고가 발생\nD+3 월요일: 방학식 예정 / 실패 루프에서는 도달하지 못하는 다음 월요일 / 진엔딩에서는 방학 동안 하연과 재윤이 계속 만날 암시와 엔딩 크레딧으로 연결<\/code><\/pre>\n<h4 id=\"스토리-01스토리컨셉개요-md-루프-이후\">루프 이후<\/h4>\n<p>새드엔딩 또는 실패 후에는 첫 회차 전용 1주일을 반복하지 않는다.<\/p>\n<p>루프 시작점:<\/p>\n<pre><code>D-25 아침\n교실에서 짧은 꿈을 꾼 직후\n담임이 은하연을 소개하기 직전<\/code><\/pre>\n<p>루프 후에는 첫 회차 전용 프롤로그를 건너뛰고, 하연 등장일부터 D-Day 금요일 축제 2일차까지 약 4주만 다시 진행한다. 달력에는 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 D-Day 사고 이후 그 날짜에 도달하지 못하고 다시 D-25 월요일로 돌아간다.<\/p>\n<h3 id=\"스토리-01스토리컨셉개요-md-오프닝\">오프닝<\/h3>\n<p>은하연이 전학 오기 직전, 주인공은 교실에서 잠깐 엎드려 잠든다.<\/p>\n<p>첫 회차에서는 전날인 D-26 일요일 오후 아이스하키 연습의 여파로 몸이 무겁고 매우 졸린 상태다. 그래서 교실에서 잠드는 일이 이상한 사건처럼 보이지 않고, 평범한 피로처럼 자연스럽게 받아들여진다.<\/p>\n<p>꿈속 장면:<\/p>\n<ul>\n<li>축제 폐장 후 학교 뒤편 야외 소무대<\/li>\n<li>어두운 조명<\/li>\n<li>바람에 흔들리는 현수막<\/li>\n<li>하연의 목소리<\/li>\n<li>서로 말하지 못한 문장<\/li>\n<li>금속이 삐걱이는 소리<\/li>\n<\/ul>\n<p>하연의 말은 중간에 끊긴다.<\/p>\n<blockquote>나, 너를—<\/blockquote>\n<p>금속음과 함께 암전된다.<\/p>\n<p>주인공이 눈을 뜨면 담임이 전학생을 소개한다.<\/p>\n<blockquote>은하연입니다. 잘 부탁해.<\/blockquote>\n<p>주인공은 꿈속 목소리와 하연을 겹쳐 느끼고 첫눈에 반한다. 플레이어는 예지몽처럼 받아들이지만, 실제로는 이미 혼수상태 내면세계가 시작된 상태다.<\/p>\n<h3 id=\"스토리-01스토리컨셉개요-md-현실-사고\">현실 사고<\/h3>\n<p>축제 2일차인 D-Day 금요일 밤, 모든 운영이 끝난 뒤. 장소는 학교 뒤편 야외 소무대다. 전날 1일차에는 부스 운영이 중심이었고, 마지막 날인 2일차에는 부스를 조금만 운영한 뒤 학생들이 축제를 둘러보는 시간이 많다. 주말이 지나면 월요일 방학식이 예정되어 있어, 학생들에게는 1학기 말의 마지막 큰 행사처럼 보인다.<\/p>\n<ul>\n<li>학생들은 대부분 돌아감<\/li>\n<li>본관 쪽에는 정리 소리만 남음<\/li>\n<li>소무대에는 현수막, 임시 조명 프레임, 철제 지지대가 남아 있음<\/li>\n<\/ul>\n<p>은하연은 시끄러운 폐장 분위기에서 벗어나 마음을 정리하려고 조용한 소무대 쪽으로 향하고, 하연을 충분히 이해한 재윤만이 그 동선을 알아차려 직접 찾아간다. 재윤은 더는 자기 마음을 미루지 않기 위해 그곳에서 먼저 말한다.<\/p>\n<blockquote>사람들 앞에서는 못 하겠어서.<\/blockquote>\n<p>두 사람이 서로의 마음을 말하려는 순간, 철거되지 않은 임시 조명 프레임 또는 철제 지지대가 무너진다. 주인공은 하연을 밀어내거나 감싸고 함께 넘어진다.<\/p>\n<p>큰 외상은 없어 보인다. 충격과 찰과상, 가벼운 타박상은 있지만 검사 결과는 이상할 만큼 멀쩡하다. 문제는 재윤이 깨어나지 않는다는 것뿐이다.<\/p>\n<p>현실의 하연은 살아 있으며, 병실에서 주인공이 깨어나기를 기다리고 있다.<\/p>\n<h3 id=\"스토리-01스토리컨셉개요-md-사고-책임-구조\">사고 책임 구조<\/h3>\n<p>사고는 한 사람의 잘못으로 발생하지 않았다.<\/p>\n<blockquote>사고는 누군가 한 명의 죄가 아니라, 모두가 조금씩 후회하는 밤이었다.<\/blockquote>\n<div class=\"table-wrap\"><table><thead><tr><th>인물<\/th><th>현실의 책임/후회<\/th><th>내면세계에서의 감정적 변형<\/th><\/tr><\/thead><tbody><tr><td>백서린<\/td><td>축제 안전 담당. 소무대 임시 구조물의 불안정함을 어렴풋이 알았지만 일정과 인력 부족 때문에 폐장 후 철거 예정으로 넘김<\/td><td>모든 선택과 동선을 통제해야 같은 후회를 반복하지 않을 수 있다고 믿음<\/td><\/tr><tr><td>나미루<\/td><td>축제 도움 인원. 출입금지 표지나 고정끈 확인을 완벽히 하지 못함<\/td><td>자신이 주인공을 다치게 했다고 믿고, 주인공이 깨어나는 것을 두려워함<\/td><\/tr><tr><td>은하연<\/td><td>사람 많은 폐장 분위기에서 벗어나 조용한 곳에서 마음을 정리하려고 소무대 쪽으로 향함. 하연을 충분히 이해한 재윤만이 그 동선을 알아차려 찾아감<\/td><td>내가 먼저 숨지 않았다면, 혹은 더 일찍 마음을 말했더라면 주인공이 다치지 않았을지도 모른다는 죄책감<\/td><\/tr><tr><td>주인공<\/td><td>하연을 지키려 몸을 던졌지만, 더 일찍 마음을 말했다면 이 장소까지 오지 않았을지도 모른다고 후회함<\/td><td>선택을 미루던 자신을 탓하며 내면세계에 갇힘<\/td><\/tr><tr><td>현실적 우연<\/td><td>바람, 노후 장비, 철거 지연, 임시 설치물의 불안정성이 겹침<\/td><td>금속음, 흔들리는 조명, 떨어지는 그림자로 침투함<\/td><\/tr><\/tbody><\/table><\/div>", "headings": [{"level": 1, "text": "스토리 컨셉 개요", "id": "스토리-01스토리컨셉개요-md-스토리-컨셉-개요"}, {"level": 2, "text": "핵심 컨셉", "id": "스토리-01스토리컨셉개요-md-핵심-컨셉"}, {"level": 2, "text": "이야기의 핵심 질문", "id": "스토리-01스토리컨셉개요-md-이야기의-핵심-질문"}, {"level": 2, "text": "루프의 이유", "id": "스토리-01스토리컨셉개요-md-루프의-이유"}, {"level": 2, "text": "전체 진행 구조", "id": "스토리-01스토리컨셉개요-md-전체-진행-구조"}, {"level": 3, "text": "첫 회차", "id": "스토리-01스토리컨셉개요-md-첫-회차"}, {"level": 3, "text": "루프 이후", "id": "스토리-01스토리컨셉개요-md-루프-이후"}, {"level": 2, "text": "오프닝", "id": "스토리-01스토리컨셉개요-md-오프닝"}, {"level": 2, "text": "현실 사고", "id": "스토리-01스토리컨셉개요-md-현실-사고"}, {"level": 2, "text": "사고 책임 구조", "id": "스토리-01스토리컨셉개요-md-사고-책임-구조"}], "plain": "# 스토리 컨셉 개요 ## 핵심 컨셉 1학기 말 축제날 은하연을 지키려다 사고로 혼수상태에 빠진 고등학교 2학년 주인공 유재윤이, 미연시처럼 재구성된 내면세계에서 하연 등장 후 약 4주를 반복하며 은하연과 서로의 마음을 확인하고, 기존 관계에 남은 미련과 후회, 사고의 진실을 받아들이고 현실로 돌아가는 루프 로맨스 미스터리 비주얼노벨. 겉으로는 1학기 말 학교 축제까지 이어지는 미연시다. 첫 회차 초반에는 기존 히로인들과 연애 루트를 타는 게임처럼 보이지만, 은하연이 전학 온 뒤 관계와 기억이 조금씩 어긋난다. 진엔딩의 핵심은 재윤이 기존 관계 뒤에 숨지 않고 먼저 자기 마음과 선택을 말한 뒤, 하연과 서로의 마음을 확인하고 `하연에게 돌아간다`는 선택이다. ## 이야기의 핵심 질문 이 이야기는 사고를 없던 일로 만드는 이야기가 아니다. 재윤은 하연을 좋아했고, 하연 역시 그 마음을 전하려 했다. 그 마음 때문에 축제 마지막 밤 두 사람은 소무대에서 마주했고, 재윤은 하연을 지키려다 다쳤다. 내면세계의 루프는 그 선택을 후회로 지우려는 마음과, 그래도 서로의 마음을 기억하고 돌아가려는 마음 사이에서 반복된다. 루프가 끝나는 조건은 완벽하게 안전한 과거를 찾는 것이 아니라, 다친 기억까지 포함해 자신이 선택한 마음과 하연의 마음을 함께 받아들이는 것이다. 핵심 주제문: > 다치지 않은 과거로 돌아가는 이야기가 아니라, 다친 기억까지 안고도 서로 선택한 마음을 인정하는 이야기. 또 다른 표현: > 미룬 마음은 끝난 하루를 끝나게 하지 못한다. ## 루프의 이유 루프는 시간마법이나 외부 초자연 현상이 아니라, 혼수상태에 빠진 재윤의 내면이 만든 반복이다. 재윤은 다음 세 가지를 동시에 받아들이지 못한다. 1. 자신이 은하연을 좋아했다는 사실 2. 하연 역시 마음을 전하려 했다는 사실 3. 두 사람의 마음이 만난 그 밤, 하연을 지키려다 자신이 다쳤다는 기억 그래서 내면세계는 D-25 월요일 하연 등장 직전부터 D-Day 금요일 축제 2일차 사고까지를 반복한다. 이 반복은 사고를 완벽히 피할 방법을 찾기 위한 것이 아니라, 재윤이 미뤄온 선택과 끝내지 못한 관계를 정리하고 현실로 돌아갈 이유를 회복하기 위한 구조다. 하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 사고 기억에서 하연을 잃는다. 폐장 후 학교 뒤편 야외 소무대에 서 있지만, 누가 자신을 불렀는지, 누구에게 가려 했는지 기억하지 못한다. 그 루프의 사고는 `하연을 지키려던 밤`이 아니라 `혼자 소무대에 선 채 반복되는 사고`로 재구성된다. 금요일 다음 월요일이 오려면, 재윤이 끝내지 않은 것들을 끝내야 한다. ## 전체 진행 구조 ### 첫 회차 ```text D-32 ~ D-26: 첫 회차 전용 기존 히로인 관계 기준점 / 장르 오인 구간 D-25 아침: 교실에서 짧은 꿈 / 은하연 전학 / 주인공 첫눈에 반함 D-24 ~ D-23: 하연 적응 / 첫 접점 / 교실 분위기 변화 D-23: 담임이 학기말 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공식 공지 D-22 ~ D-15: 관계 확장 / 2학년 5반이 축제 준비에 참여하며 하연과의 접점이 생활 속으로 들어오기 시작 D-14 ~ D-8: 축제 준비 본격화 / 관계와 기억의 어긋남 시작 D-7 ~ D-2: 기억 회복 심화 / 사고 단서 집중 / 하연이 조용한 곳에서 마음을 정리한다는 감각 형성 D-1 목요일: 축제 1일차 / 부스 운영 중심 / 하연과 `쉬어가 카페` 운영으로 관계 강화 D-Day 금요일: 축제 2일차 / 부스 축소 운영 후 히로인들과 축제를 둘러봄 / 하연 공략이 충분하면 폐장 후 재윤이 하연의 동선을 알아차려 직접 찾아가고, 학교 뒤편 야외 소무대에서 선고백과 사고가 발생 D+3 월요일: 방학식 예정 / 실패 루프에서는 도달하지 못하는 다음 월요일 / 진엔딩에서는 방학 동안 하연과 재윤이 계속 만날 암시와 엔딩 크레딧으로 연결 ``` ### 루프 이후 새드엔딩 또는 실패 후에는 첫 회차 전용 1주일을 반복하지 않는다. 루프 시작점: ```text D-25 아침 교실에서 짧은 꿈을 꾼 직후 담임이 은하연을 소개하기 직전 ``` 루프 후에는 첫 회차 전용 프롤로그를 건너뛰고, 하연 등장일부터 D-Day 금요일 축제 2일차까지 약 4주만 다시 진행한다. 달력에는 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 D-Day 사고 이후 그 날짜에 도달하지 못하고 다시 D-25 월요일로 돌아간다. ## 오프닝 은하연이 전학 오기 직전, 주인공은 교실에서 잠깐 엎드려 잠든다. 첫 회차에서는 전날인 D-26 일요일 오후 아이스하키 연습의 여파로 몸이 무겁고 매우 졸린 상태다. 그래서 교실에서 잠드는 일이 이상한 사건처럼 보이지 않고, 평범한 피로처럼 자연스럽게 받아들여진다. 꿈속 장면: - 축제 폐장 후 학교 뒤편 야외 소무대 - 어두운 조명 - 바람에 흔들리는 현수막 - 하연의 목소리 - 서로 말하지 못한 문장 - 금속이 삐걱이는 소리 하연의 말은 중간에 끊긴다. > 나, 너를— 금속음과 함께 암전된다. 주인공이 눈을 뜨면 담임이 전학생을 소개한다. > 은하연입니다. 잘 부탁해. 주인공은 꿈속 목소리와 하연을 겹쳐 느끼고 첫눈에 반한다. 플레이어는 예지몽처럼 받아들이지만, 실제로는 이미 혼수상태 내면세계가 시작된 상태다. ## 현실 사고 축제 2일차인 D-Day 금요일 밤, 모든 운영이 끝난 뒤. 장소는 학교 뒤편 야외 소무대다. 전날 1일차에는 부스 운영이 중심이었고, 마지막 날인 2일차에는 부스를 조금만 운영한 뒤 학생들이 축제를 둘러보는 시간이 많다. 주말이 지나면 월요일 방학식이 예정되어 있어, 학생들에게는 1학기 말의 마지막 큰 행사처럼 보인다. - 학생들은 대부분 돌아감 - 본관 쪽에는 정리 소리만 남음 - 소무대에는 현수막, 임시 조명 프레임, 철제 지지대가 남아 있음 은하연은 시끄러운 폐장 분위기에서 벗어나 마음을 정리하려고 조용한 소무대 쪽으로 향하고, 하연을 충분히 이해한 재윤만이 그 동선을 알아차려 직접 찾아간다. 재윤은 더는 자기 마음을 미루지 않기 위해 그곳에서 먼저 말한다. > 사람들 앞에서는 못 하겠어서. 두 사람이 서로의 마음을 말하려는 순간, 철거되지 않은 임시 조명 프레임 또는 철제 지지대가 무너진다. 주인공은 하연을 밀어내거나 감싸고 함께 넘어진다. 큰 외상은 없어 보인다. 충격과 찰과상, 가벼운 타박상은 있지만 검사 결과는 이상할 만큼 멀쩡하다. 문제는 재윤이 깨어나지 않는다는 것뿐이다. 현실의 하연은 살아 있으며, 병실에서 주인공이 깨어나기를 기다리고 있다. ## 사고 책임 구조 사고는 한 사람의 잘못으로 발생하지 않았다. > 사고는 누군가 한 명의 죄가 아니라, 모두가 조금씩 후회하는 밤이었다. | 인물 | 현실의 책임/후회 | 내면세계에서의 감정적 변형 | | --- | --- | --- | | 백서린 | 축제 안전 담당. 소무대 임시 구조물의 불안정함을 어렴풋이 알았지만 일정과 인력 부족 때문에 폐장 후 철거 예정으로 넘김 | 모든 선택과 동선을 통제해야 같은 후회를 반복하지 않을 수 있다고 믿음 | | 나미루 | 축제 도움 인원. 출입금지 표지나 고정끈 확인을 완벽히 하지 못함 | 자신이 주인공을 다치게 했다고 믿고, 주인공이 깨어나는 것을 두려워함 | | 은하연 | 사람 많은 폐장 분위기에서 벗어나 조용한 곳에서 마음을 정리하려고 소무대 쪽으로 향함. 하연을 충분히 이해한 재윤만이 그 동선을 알아차려 찾아감 | 내가 먼저 숨지 않았다면, 혹은 더 일찍 마음을 말했더라면 주인공이 다치지 않았을지도 모른다는 죄책감 | | 주인공 | 하연을 지키려 몸을 던졌지만, 더 일찍 마음을 말했다면 이 장소까지 오지 않았을지도 모른다고 후회함 | 선택을 미루던 자신을 탓하며 내면세계에 갇힘 | | 현실적 우연 | 바람, 노후 장비, 철거 지연, 임시 설치물의 불안정성이 겹침 | 금속음, 흔들리는 조명, 떨어지는 그림자로 침투함 |", "excerpt": "# 스토리 컨셉 개요 ## 핵심 컨셉 1학기 말 축제날 은하연을 지키려다 사고로 혼수상태에 빠진 고등학교 2학년 주인공 유재윤이, 미연시처럼 재구성된 내면세계에서 하연 등장 후 약 4주를 반복하며 은하연과 서로의 마음을 확인하고, 기존 관계에 남은 미련과 후회, 사고의 진실을 받아들이고 현실로 돌아가는 루프 로맨스 미스터리 비주얼노벨. 겉으로는 1학기 말 학교 축제까지 이어지는 미연시다. 첫"}, {"path": "스토리/02_캐릭터와_관계.md", "category": "스토리", "title": "캐릭터와 관계", "id": "스토리-02캐릭터와관계-md", "html": "<h2 id=\"스토리-02캐릭터와관계-md-캐릭터와-관계\">캐릭터와 관계<\/h2>\n<h3 id=\"스토리-02캐릭터와관계-md-유재윤-주인공\">유재윤 / 주인공<\/h3>\n<p>고등학교 2학년 5반 남학생.<\/p>\n<p>이름은 유재윤. 평소 서술에서는 <code>주인공<\/code>으로 부르되, 인물 간 대사와 감정 장면에서는 <code>재윤<\/code>이라는 이름을 사용한다.<\/p>\n<p>호칭 예시:<\/p>\n<ul>\n<li>은하연: 재윤아<\/li>\n<li>한소하: 야, 유재윤<\/li>\n<li>백서린: 재윤아<\/li>\n<li>나미루: 재윤 선배<\/li>\n<\/ul>\n<p>학년/반 기준:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>인물<\/th><th>학년/반<\/th><th>비고<\/th><\/tr><\/thead><tbody><tr><td>유재윤<\/td><td>2학년 5반<\/td><td>주인공. 은하연이 전학 오는 반<\/td><\/tr><tr><td>은하연<\/td><td>2학년 5반<\/td><td>D-25 월요일에 2학년 5반으로 전학<\/td><\/tr><tr><td>한소하<\/td><td>2학년 2반<\/td><td>재윤과 같은 학년이지만 다른 반인 소꿉친구<\/td><\/tr><tr><td>백서린<\/td><td>3학년 7반<\/td><td>방송반/학생회 선배. 3학년은 축제 반 행사를 준비하지 않고 참가/지원 역할<\/td><\/tr><tr><td>나미루<\/td><td>1학년 3반<\/td><td>1학기 한정 멘토링이 끝나가고 있는 후배이자 축제 도움 인원<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-02캐릭터와관계-md-외형-기준\">외형 기준<\/h3>\n<p>외형은 현실 인물 기준으로 먼저 잡고, 내면세계에서는 같은 외형이 감정 방어기제에 맞춰 조금씩 강조되거나 왜곡된다.<\/p>\n<p>이 섹션은 AI 이미지 생성용 기준으로도 사용한다. 프롬프트를 만들 때는 각 캐릭터의 <code>기본 프롬프트<\/code>, <code>색감<\/code>, <code>의상 후보<\/code>, <code>표정/포즈<\/code>, <code>소품 후보<\/code>, <code>금지 요소<\/code>를 장면에 맞게 골라 사용한다. 복장·액세서리·소품은 매번 동일하게 고정하지 않는다.<\/p>\n<p>공통 이미지 톤:<\/p>\n<ul>\n<li>현대 한국 고등학교 배경의 미연시/비주얼노벨풍 캐릭터 일러스트.<\/li>\n<li>현실적인 교복과 생활감이 있는 청춘 로맨스 미스터리 분위기.<\/li>\n<li>과한 판타지 장식, 전투복, 아이돌풍 무대 의상, 지나친 노출은 사용하지 않는다.<\/li>\n<li>인물은 10대 고등학생으로 보이되, 선정적 표현 없이 깨끗하고 자연스럽게 그린다.<\/li>\n<li>선은 부드럽고, 색은 과포화보다 차분한 파스텔/내추럴 톤을 우선한다.<\/li>\n<\/ul>\n<p>고정/가변 원칙:<\/p>\n<ul>\n<li>고정 요소: 나이대, 체형 실루엣, 얼굴 인상, 머리 길이와 기본 색, 눈빛, 캐릭터별 분위기.<\/li>\n<li>가변 요소: 복장 상태, 겉옷, 가방, 액세서리, 손에 든 물건, 상처/피로도, 배경 소품.<\/li>\n<li>같은 캐릭터라도 등교길, 수업 중, 방과후, 축제 준비, D-Day, 병실/루프 장면에서는 복장과 소품이 달라질 수 있다.<\/li>\n<li>프롬프트를 만들 때는 의상 후보와 소품 후보를 전부 넣지 말고, 장면에 맞는 1~3개만 선택한다.<\/li>\n<li>교복은 기본 생활권을 보여주는 기준일 뿐이며, 하복/춘추복/체육복/트레이닝복/축제 스태프 표식/병원복에 가까운 편한 옷 등으로 상황에 맞게 변형할 수 있다.<\/li>\n<li>단, 어떤 변형도 캐릭터의 취향·성격·생활 습관 안에서만 선택한다. 예쁘거나 화려하다는 이유만으로 뜬금없는 복장을 입히지 않는다.<\/li>\n<li>AI 이미지 프롬프트에서 의상을 고를 때는 먼저 이 인물이 스스로 골랐을 법한가?, 이 장면에서 실제로 입을 이유가 있는가?를 확인한다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-유재윤\">유재윤<\/h4>\n<p>역할/인상:<\/p>\n<ul>\n<li>주인공. 조용히 배려하지만 자기 마음을 말하는 데 한 박자 늦는 남학생.<\/li>\n<li>교실에서는 평범하고 약간 피곤해 보이지만, 운동할 때는 빠르고 단단한 인상.<\/li>\n<li><code>착하지만 애매한 사람<\/code>이 아니라, 자기 마음을 미루는 습관 때문에 표정에 생각이 많은 느낌이 남아야 한다.<\/li>\n<\/ul>\n<p>기본 프롬프트:<\/p>\n<pre><code>Korean high school boy, 17 years old, slightly tall, lean athletic build from ice hockey, short dark brown almost black hair, natural messy bangs slightly covering eyebrows, gentle dark eyes, thoughtful and slightly tired expression, scene-appropriate practical Korean high school outfit, understated and slightly worn styling, optional athletic wrist tape or small bandage only when the scene needs it, visual novel character art, soft natural lighting, realistic school romance mystery mood<\/code><\/pre>\n<p>세부 외형:<\/p>\n<ul>\n<li>키/체형: 같은 학년 남학생 중 약간 큰 편. 어깨와 허벅지는 운동부답게 단단하지만, 과한 근육질은 아니다. 마른 운동부 실루엣.<\/li>\n<li>얼굴형: 날카롭기보다 부드러운 턱선. 무표정일 때는 멍해 보일 수 있지만, 가까이 보면 주변을 신경 쓰는 눈이다.<\/li>\n<li>머리: 검은색에 가까운 짙은 갈색. 손질을 많이 하지 않은 짧은 머리. 앞머리는 가끔 눈썹을 살짝 덮고, 운동 후에는 조금 흐트러진다.<\/li>\n<li>눈: 짙은 갈색. 눈매는 순하고, 피곤하거나 생각이 많을 때 초점이 늦게 따라온다.<\/li>\n<li>피부/상처: 건강한 피부톤. 손등, 손목, 팔에 작은 멍, 반창고, 운동 테이프 흔적이 가끔 있다.<\/li>\n<li>의상 후보: 하복/춘추복 교복, 흰 셔츠와 어두운 바지, 학교 넥타이, 조끼, 체육복, 어두운 트레이닝복, 하키 보호 장비 일부. 넥타이와 소매 상태는 장면의 피로도에 맞춰 조절한다.<\/li>\n<li>소품 후보: 아이스하키 스틱 가방, 낡은 스포츠백, 손목 테이프, 작은 반창고, 구겨진 프린트, 병원 팔찌, 휴대폰. 장면마다 필요한 것만 고른다.<\/li>\n<li>복장 취향/선택 기준: 재윤은 옷으로 자신을 드러내려 하지 않는다. 편하고 움직이기 쉬운 옷, 오래 입은 듯한 실용적인 옷, 살짝 흐트러졌지만 불량해 보이지 않는 상태가 어울린다. 하키 관련 소품은 운동 장면이나 피로 누적을 보여줄 때만 사용한다.<\/li>\n<li>어울리지 않는 복장: 화려한 스트리트 패션, 과한 액세서리, 완벽하게 꾸민 모델식 교복, 불량학생처럼 과장된 착장, 아이돌풍 의상.<\/li>\n<\/ul>\n<p>색감:<\/p>\n<ul>\n<li>메인 색: 짙은 갈색, 네이비, 흰 셔츠, 회색 그림자.<\/li>\n<li>포인트 색: 손목 테이프의 흰색, 작은 반창고의 살구색.<\/li>\n<li>조명: 교실에서는 오후 햇빛, 병실 이후에는 차가운 흰빛과 창가 햇빛을 섞는다.<\/li>\n<\/ul>\n<p>표정/포즈:<\/p>\n<ul>\n<li>기본 표정: 말하려다 멈춘 듯한 생각 많은 표정.<\/li>\n<li>하연 앞: 조심스럽게 시선을 맞추거나, 대답을 기다리는 얼굴.<\/li>\n<li>소하 앞: 편하고 장난스럽지만 완전히 풀어지지는 않음.<\/li>\n<li>서린 앞: 지적을 듣고 살짝 찔린 듯한 표정.<\/li>\n<li>미루 앞: 투덜대지만 챙겨주는 부드러운 표정.<\/li>\n<li>포즈: 한 손으로 뒷목을 만지거나, 손목 테이프를 감거나, 교실 창가에 기대어 바깥을 보는 자세.<\/li>\n<\/ul>\n<p>장면별 변형:<\/p>\n<ul>\n<li>루프 반복: 눈 밑 피로감, 셔츠 구김, 손의 작은 상처가 조금씩 강조된다.<\/li>\n<li>빙판/하키 장면: 교복 대신 어두운 트레이닝복 또는 하키 보호 장비 일부. 관계 장면보다 눈빛이 빠르고 확실하다.<\/li>\n<li>진엔딩 후: 팔과 얼굴에 작은 처치 흔적. 큰 외상은 없지만, 병원에서 막 돌아온 듯한 창백함과 무거운 걸음.<\/li>\n<\/ul>\n<p>금지 요소:<\/p>\n<ul>\n<li>지나치게 냉미남, 불량학생, 과한 근육질, 판타지 기사, 아이돌 스타일 금지.<\/li>\n<li>상처를 과하게 피투성이로 그리지 않는다. 핵심은 큰 외상보다 깨어나지 못한 상태다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-은하연\">은하연<\/h4>\n<p>역할/인상:<\/p>\n<ul>\n<li>진히로인. 말수가 적고 감정 표현이 느리지만, 무심한 사람은 아니다.<\/li>\n<li>시끄러운 중심보다 조용한 가장자리에 서 있는 인물.<\/li>\n<li>전학생이지만 튀는 전학생이 아니라, 조용히 들어와 오래 시선에 남는 사람.<\/li>\n<\/ul>\n<p>기본 프롬프트:<\/p>\n<pre><code>Korean high school girl, 17 years old, slightly below average height, slender and quiet posture, dark ash brown or soft black straight hair falling just below shoulders, neat see-through bangs not covering eyes, deep dark brown eyes, calm reserved expression with subtle sadness, scene-appropriate neat Korean high school outfit in quiet muted colors, optional thin cardigan or minimal accessory only when the scene needs it, standing near a quiet classroom window or edge of a school festival, visual novel heroine character art, soft muted colors, quiet melancholy romance mood<\/code><\/pre>\n<p>세부 외형:<\/p>\n<ul>\n<li>키/체형: 평균보다 약간 작은 편. 체형은 가늘고 움직임이 조용하다. 존재감은 크지 않지만 시선이 오래 남는다.<\/li>\n<li>얼굴형: 작고 단정한 얼굴. 표정 변화가 적어 처음에는 차가워 보일 수 있다.<\/li>\n<li>머리: 어깨 아래로 살짝 내려오는 차분한 생머리. 검은색 또는 어두운 애쉬 브라운. 빛을 받으면 아주 약하게 갈색이 돈다.<\/li>\n<li>앞머리/옆머리: 앞머리는 눈을 가리지 않게 가볍게 정리. 고개를 숙이면 옆머리가 얼굴선을 조금 가린다.<\/li>\n<li>눈: 크기보다 깊이가 먼저 느껴지는 짙은 갈색 눈. 오래 응시하기보다 잠깐 보고 피하는 시선.<\/li>\n<li>의상 후보: 기본 교복, 얇은 크림색 또는 연회색 가디건, 단정한 리본/넥타이, 축제 당일의 간단한 스태프 표식, 병실 장면의 얇은 겉옷. 가디건은 하연의 대표 이미지지만 모든 장면에 반드시 넣지는 않는다.<\/li>\n<li>소품 후보: 작은 무광 머리핀, 얇은 손목끈, 구겨진 손수건, 문구 카드, 작은 메모지, 책 한 권, 접힌 축제 안내지. 장면마다 필요한 것만 고른다.<\/li>\n<li>복장 취향/선택 기준: 하연은 눈에 띄기보다 조용히 배경에 섞이는 옷을 고른다. 단정하고 얇고 가벼운 소재, 크림·회색·흰색처럼 낮은 채도의 색, 작은 장식 하나 정도가 어울린다. 가디건은 대표 선택지지만, 더운 날이나 축제 동선에서는 단정한 셔츠/조끼만으로도 충분하다.<\/li>\n<li>어울리지 않는 복장: 선명한 원색 코디, 큰 리본이나 화려한 헤어 장식, 아이돌 무대 의상, 과한 프릴/고스로리, 시선을 끌기 위한 노출 있는 옷.<\/li>\n<\/ul>\n<p>색감:<\/p>\n<ul>\n<li>메인 색: 크림색, 연회색, 어두운 애쉬 브라운, 흰 셔츠.<\/li>\n<li>포인트 색: 아주 옅은 파란색 또는 연보라 그림자. 감정을 직접 드러내지 않는 차가운 색감.<\/li>\n<li>조명: 창가의 부드러운 역광, 축제 폐장 후의 어두운 남색, 병실의 흰 조명.<\/li>\n<\/ul>\n<p>표정/포즈:<\/p>\n<ul>\n<li>기본 표정: 무표정에 가깝지만 눈에 미묘한 망설임이 있다.<\/li>\n<li>호감 상승: 입꼬리가 크게 올라가지 않고, 눈가가 조금 풀리는 정도.<\/li>\n<li>불안: 시선을 아래로 내리거나 손수건/가디건 소매를 만진다.<\/li>\n<li>포즈: 창밖을 바라보기, 교실 가장자리 의자에 조용히 앉기, 가디건 소매를 손끝으로 잡기, 축제 소음에서 한 걸음 물러나 서 있기.<\/li>\n<\/ul>\n<p>장면별 변형:<\/p>\n<ul>\n<li>하연 공략 부족: 군중 속에서 흐릿하게 보이고, 뒤돌아선 실루엣이나 멀어진 시선이 많다.<\/li>\n<li>하연 공략 충분: 재윤이 알아차릴 수 있도록 시선 방향, 멈추는 자리, 조용한 동선이 선명해진다.<\/li>\n<li>D-Day 폐장 후: 축제 조명이 꺼진 뒤 소무대 근처에 홀로 서 있는 조용한 실루엣. 먼저 부르는 느낌이 아니라, 재윤이 찾아내야 하는 이미지.<\/li>\n<li>병실 장면: 평소의 단정함이 무너져 눈가가 붉고, 구겨진 손수건과 밤새 기다린 피로감이 보인다.<\/li>\n<\/ul>\n<p>금지 요소:<\/p>\n<ul>\n<li>차갑고 오만한 여왕님 인상 금지. 하연은 무심한 사람이 아니라 느리게 마음을 여는 사람이다.<\/li>\n<li>과한 고스로리, 판타지 드레스, 화려한 액세서리, 강한 아이돌풍 표정 금지.<\/li>\n<li>지나치게 병약한 캐릭터처럼 그리지 않는다. 조용하지만 약하기만 한 인물은 아니다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-한소하\">한소하<\/h4>\n<p>역할/인상:<\/p>\n<ul>\n<li>소꿉친구. 재윤에게 가장 익숙하고 오래된 일상.<\/li>\n<li>밝고 활동적이지만, 재윤이 멀어지는 것을 가장 먼저 눈치채는 사람.<\/li>\n<li>편한 친구의 장난기와, 놓기 싫은 과거의 서운함이 동시에 보여야 한다.<\/li>\n<\/ul>\n<p>기본 프롬프트:<\/p>\n<pre><code>Korean high school girl, 17 years old, average height, lively athletic casual posture, warm medium brown hair tied in a short low ponytail or half-up style, loose flyaway hairs, bright sharp brown eyes, playful confident smile with hidden jealousy, scene-appropriate relaxed Korean high school outfit with active casual styling, optional rolled sleeves, hair tie, worn bag or sporty detail only when the scene needs it, sunny neighborhood street or school hallway, visual novel character art, warm nostalgic colors<\/code><\/pre>\n<p>세부 외형:<\/p>\n<ul>\n<li>키/체형: 평균 정도. 움직임이 빠르고 가벼운 활동형 체형.<\/li>\n<li>얼굴형: 표정이 크게 바뀌는 편. 웃을 때 장난기가 먼저 보이고, 서운할 때는 눈이 먼저 가라앉는다.<\/li>\n<li>머리: 자연스러운 갈색 계열. 짧게 묶은 머리, 낮은 반묶음, 또는 활동적인 단발 묶음. 잔머리가 자주 튄다.<\/li>\n<li>눈: 또렷한 갈색 눈. 상대를 바로 보는 편이며, 재윤의 거짓말이나 망설임을 빠르게 눈치챈다.<\/li>\n<li>의상 후보: 살짝 풀어 입은 교복, 걷어 올린 셔츠 소매, 허리에 묶은 가디건, 체육복 상의, 방과후 후드집업, 편한 운동화. 장면마다 활동성의 정도를 다르게 준다.<\/li>\n<li>소품 후보: 손목시계, 여분 머리끈, 오래 쓴 학생 가방, 편의점 음료, 오래된 사진, 체육복 주머니의 작은 간식, 접힌 메시지. 장면마다 필요한 것만 고른다.<\/li>\n<li>복장 취향/선택 기준: 소하는 활동성과 편안함을 먼저 고른다. 단정함보다 움직이기 쉬운 상태, 조금 흐트러진 소매, 편한 운동화, 가방을 대충 멘 느낌이 어울린다. 꾸민 날에도 귀엽게 과장하기보다 평소보다 정리된 정도에 그친다.<\/li>\n<li>어울리지 않는 복장: 지나치게 여성스럽고 조심스러운 공주풍 의상, 굽 높은 구두, 과한 메이크업, 차갑고 도도한 패션, 하연처럼 조용히 숨는 스타일.<\/li>\n<\/ul>\n<p>색감:<\/p>\n<ul>\n<li>메인 색: 따뜻한 갈색, 햇빛 노랑, 교복 네이비.<\/li>\n<li>포인트 색: 편의점 음료 라벨, 머리끈의 붉은색 또는 주황색.<\/li>\n<li>조명: 아침 등굣길 햇빛, 방과후 골목의 따뜻한 색감.<\/li>\n<\/ul>\n<p>표정/포즈:<\/p>\n<ul>\n<li>기본 표정: 장난스럽게 웃으며 팔짱을 끼거나, 한쪽 눈썹을 올린 표정.<\/li>\n<li>질투/서운함: 웃고 있지만 눈이 따라 웃지 않는다.<\/li>\n<li>정리 장면: 고개를 돌리고 괜찮은 척하지만 손에 힘이 들어간다.<\/li>\n<li>포즈: 재윤의 책상을 두드리기, 편의점 음료를 던지기, 오래된 등굣길에서 앞서 걷기, 허리에 손을 얹고 투덜대기.<\/li>\n<\/ul>\n<p>장면별 변형:<\/p>\n<ul>\n<li>소하 루트가 깊어질수록 등굣길, 편의점, 오래된 골목의 따뜻한 색감이 강해진다.<\/li>\n<li>새드엔딩에서는 같은 길, 같은 햇빛, 같은 표정이 반복되어 편안함이 정지된 세계처럼 변한다.<\/li>\n<li>진엔딩 쪽에서는 장난기 뒤에 서운함을 인정하고, 재윤을 붙잡지 않는 오래된 친구의 표정으로 돌아온다.<\/li>\n<\/ul>\n<p>금지 요소:<\/p>\n<ul>\n<li>지나치게 섹시하거나 갸루 스타일로 만들지 않는다.<\/li>\n<li>소하를 단순 활발 바보처럼 그리지 않는다. 눈치가 빠르고 감정이 깊은 소꿉친구다.<\/li>\n<li>하연의 라이벌 악역처럼 과장하지 않는다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-백서린\">백서린<\/h4>\n<p>역할/인상:<\/p>\n<ul>\n<li>3학년 선배. 방송반/학생회 소속으로 축제의 말과 순서를 정리하는 사람.<\/li>\n<li>차갑게 보이지만 책임감이 강하고, 압박이 큰 상황에서 먼저 판단하는 사람.<\/li>\n<li><code>정답을 주는 선배<\/code>처럼 보이지만, 진짜 역할은 재윤에게 선택권을 돌려주는 것이다.<\/li>\n<\/ul>\n<p>기본 프롬프트:<\/p>\n<pre><code>Korean high school senior girl, 18 years old, tall and straight posture, long black hair with subtle navy tint tied low or neatly tucked behind ear, calm sharp dark eyes, composed serious expression, scene-appropriate neat Korean high school outfit with controlled student council or broadcasting-room styling, optional armband, badge, binder, cue sheets or metal pen only when the scene needs it, standing in school broadcasting room under cool fluorescent light, visual novel character art, clean lines, cool desaturated colors, responsible and controlled atmosphere<\/code><\/pre>\n<p>세부 외형:<\/p>\n<ul>\n<li>키/체형: 여학생 중 큰 편. 자세가 곧고 어깨선이 단정하다. 걸음이 빠르고 불필요한 움직임이 적다.<\/li>\n<li>얼굴형: 선이 깔끔하고 차분한 인상. 표정 변화는 작지만 눈매가 정확하다.<\/li>\n<li>머리: 긴 검은 머리 또는 짙은 남색빛 흑발. 낮게 묶거나 한쪽 귀 뒤로 단정하게 넘긴다. 잔머리가 거의 없다.<\/li>\n<li>눈: 차분하고 날카로운 짙은 눈. 상대를 노려보기보다 필요한 순간 정확히 본다.<\/li>\n<li>의상 후보: 흐트러짐 없는 교복, 단정한 조끼, 학생회 배지, 방송반 명찰, 축제 운영 완장, 방송실 헤드셋 착용 상태. 배지·명찰·완장은 역할을 드러낼 때만 선택한다.<\/li>\n<li>소품 후보: 검은 바인더, 큐시트, 방송 대본, 금속 펜, 체크리스트, 무전기, 방송실 헤드셋, 케이블 묶음. 장면마다 필요한 것만 고른다.<\/li>\n<li>복장 취향/선택 기준: 서린은 흐트러짐 없는 정돈과 역할성을 중시한다. 교복이든 축제 운영 복장이든 선이 깔끔하고 기능이 분명해야 한다. 배지·완장·헤드셋은 권위 과시가 아니라 책임과 업무를 보여줄 때만 쓴다.<\/li>\n<li>어울리지 않는 복장: 귀엽게 흐트러진 캐주얼, 장식 많은 패션, 과하게 부드러운 파스텔 코디, 불필요하게 화려한 액세서리, 성인 비서처럼 보이는 정장.<\/li>\n<\/ul>\n<p>색감:<\/p>\n<ul>\n<li>메인 색: 흑발, 네이비, 차가운 회색, 흰 셔츠.<\/li>\n<li>포인트 색: 금속 펜의 은색, 학생회 배지의 작은 금색, 큐시트의 붉은 체크 표시.<\/li>\n<li>조명: 방송실의 차가운 형광등, 모니터 빛, 정돈된 실내 그림자.<\/li>\n<\/ul>\n<p>표정/포즈:<\/p>\n<ul>\n<li>기본 표정: 침착하고 진지한 얼굴. 입꼬리는 거의 움직이지 않는다.<\/li>\n<li>당황: 눈이 아주 조금 커지거나 펜을 쥔 손에 힘이 들어간다.<\/li>\n<li>인정: 정면으로 보지 않고 수첩을 닫으며 짧게 말한다.<\/li>\n<li>포즈: 바인더를 가슴 앞에 들기, 큐시트에 체크하기, 방송 장비 앞에서 헤드셋을 한 손으로 누르기, 재윤에게 종이를 건네기.<\/li>\n<\/ul>\n<p>장면별 변형:<\/p>\n<ul>\n<li>서린 루트가 깊어질수록 수첩, 체크표, 케이블, 방송 장비 같은 직선적이고 정돈된 요소가 많아진다.<\/li>\n<li>새드엔딩에서는 교복과 배경이 지나치게 정돈되고 표정이 더 줄어들어 안전하지만 멈춘 세계처럼 보인다.<\/li>\n<li>진엔딩 보조 장면에서는 바인더를 닫거나 점검표를 재윤에게 건네며, 통제가 아니라 선택권을 돌려주는 이미지를 사용한다.<\/li>\n<\/ul>\n<p>금지 요소:<\/p>\n<ul>\n<li>비서/교사처럼 성인화하지 않는다. 3학년 고등학생이다.<\/li>\n<li>냉혹한 악역, 군복, 판타지 마법사, 과도한 권위적 의상 금지.<\/li>\n<li>과한 미소나 감정 과잉보다 작고 절제된 변화가 어울린다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-나미루\">나미루<\/h4>\n<p>역할/인상:<\/p>\n<ul>\n<li>1학년 후배. 재윤의 1학기 한정 멘토링 대상이자 축제 도움 인원.<\/li>\n<li>보호본능을 자극하지만, 단순히 약한 아이가 아니라 혼자 해보고 싶은 마음이 있다.<\/li>\n<li>귀여움은 달콤하지만, 루프 안에서는 <code>놓지 못하게 하는 위험<\/code>으로도 변한다.<\/li>\n<\/ul>\n<p>기본 프롬프트:<\/p>\n<pre><code>Korean first-year high school girl, 16 years old, short petite build, soft light brown bob haircut just above shoulders, round bangs, large expressive warm brown eyes, anxious but hopeful expression, scene-appropriate soft Korean high school outfit with slightly oversized or carefully prepared styling, optional cardigan, vest, checklist notebook, keychain, helper armband or name tag only when the scene needs it, visual novel character art, soft warm colors, gentle vulnerable junior character mood<\/code><\/pre>\n<p>세부 외형:<\/p>\n<ul>\n<li>키/체형: 작은 편. 전체적으로 1학년다운 앳된 인상이 남아 있다. 어깨가 좁고 자세가 살짝 움츠러들 때가 많다.<\/li>\n<li>얼굴형: 둥글고 부드러운 얼굴. 감정이 얼굴에 바로 드러난다.<\/li>\n<li>머리: 밝은 갈색 또는 부드러운 밤색 단발. 어깨에 닿지 않는 길이. 앞머리는 둥글게 내려와 어려 보이는 인상을 만든다.<\/li>\n<li>눈: 크고 따뜻한 갈색. 불안할 때는 아래를 보고, 안심하면 눈 전체가 밝아진다.<\/li>\n<li>의상 후보: 기본 교복, 조금 큰 가디건, 조끼, 축제 도움 인원 완장, 작은 명찰, 방과후 편한 겉옷. 완장과 명찰은 축제 준비/당일 장면에서만 사용한다.<\/li>\n<li>소품 후보: 작은 키링이 달린 가방, 체크리스트 노트, 제출물 파일, 고정끈, 축제 도움 인원 표식, 작은 필통, 접힌 안내문. 장면마다 필요한 것만 고른다.<\/li>\n<li>복장 취향/선택 기준: 미루는 편안하고 안전해 보이는 옷을 고른다. 조금 큰 가디건이나 조끼, 부드러운 색, 작고 사적인 키링처럼 스스로 안심할 수 있는 요소가 어울린다. 축제 도움 장면에서는 준비를 열심히 한 티가 나는 단정함이 중요하다.<\/li>\n<li>어울리지 않는 복장: 성숙한 언니처럼 보이는 옷, 강한 색의 공격적인 패션, 과한 노출, 메이드/로리타처럼 콘셉트가 앞서는 의상, 지나치게 꾸민 아이돌풍 의상.<\/li>\n<\/ul>\n<p>색감:<\/p>\n<ul>\n<li>메인 색: 밝은 밤색, 크림색 가디건, 부드러운 베이지.<\/li>\n<li>포인트 색: 키링의 연분홍/민트/노랑, 도움 인원 완장의 작은 색.<\/li>\n<li>조명: 따뜻하고 부드러운 실내광. 새드엔딩에서는 방처럼 좁아지는 그림자.<\/li>\n<\/ul>\n<p>표정/포즈:<\/p>\n<ul>\n<li>기본 표정: 불안하지만 기대하는 얼굴. 입술을 살짝 다물고 눈으로 먼저 묻는다.<\/li>\n<li>안심: 얼굴 전체가 밝아지고 어깨 힘이 풀린다.<\/li>\n<li>의존: 가방끈이나 소매를 꼭 쥐고 재윤을 올려다본다.<\/li>\n<li>성장: 체크리스트를 품에 숨기지 않고 앞으로 내민다.<\/li>\n<li>포즈: 노트를 가슴 앞에 안기, 가방끈 잡기, 도움 인원 완장을 만지작거리기, 문 앞에서 망설이기.<\/li>\n<\/ul>\n<p>장면별 변형:<\/p>\n<ul>\n<li>미루 루트가 깊어질수록 교실과 복도가 좁아지고, 가디건 소매, 가방끈, 키링 같은 사적인 소품이 크게 보인다.<\/li>\n<li>새드엔딩에서는 귀엽고 보호본능을 자극하는 외형이 닫힌 방, 끝나지 않는 체크리스트와 결합해 위험하게 달콤한 분위기가 된다.<\/li>\n<li>진엔딩 보조 장면에서는 미루가 체크리스트를 스스로 들고 와 <code>먼저 해봤어요<\/code>라고 말할 수 있는 작은 성장의 이미지를 사용한다.<\/li>\n<\/ul>\n<p>금지 요소:<\/p>\n<ul>\n<li>지나치게 유아화하지 않는다. 고등학교 1학년 후배로 보이게 한다.<\/li>\n<li>과한 메이드풍, 로리타풍, 판타지 요정 스타일 금지.<\/li>\n<li>의존을 귀엽게만 포장하지 않는다. 성장 가능성이 함께 보여야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-02캐릭터와관계-md-이미지-생성용-공통-프롬프트-템플릿\">이미지 생성용 공통 프롬프트 템플릿<\/h3>\n<p>캐릭터 단독 전신:<\/p>\n<pre><code>[캐릭터 기본 프롬프트], [장면에 맞는 의상 후보 1개], [장면에 맞는 소품 후보 0~2개], full body character design, standing pose, clean visual novel style, soft natural lighting, detailed but not overly decorated, neutral school background, character sheet quality<\/code><\/pre>\n<p>캐릭터 상반신/표정:<\/p>\n<pre><code>[캐릭터 기본 프롬프트], [현재 감정에 맞는 복장 상태], [필요하면 작은 액세서리 1개], upper body portrait, expressive eyes, subtle emotion, clean line art, soft shading, visual novel dialogue portrait, simple blurred school background<\/code><\/pre>\n<p>장면 일러스트:<\/p>\n<pre><code>[캐릭터 기본 프롬프트], [장면 배경], [상황에 맞는 의상], [상황에 맞는 소품 1~3개], cinematic visual novel scene, soft emotional lighting, school romance mystery atmosphere, detailed background props, natural pose, no exaggerated fantasy elements<\/code><\/pre>\n<p>부정 프롬프트:<\/p>\n<pre><code>fantasy armor, idol costume, overly revealing outfit, adult office worker, teacher appearance, heavy makeup, extreme hair color, animal ears, magic effects, weapon, cyberpunk, gothic lolita, chibi, super deformed, sexualized pose, excessive injury, blood splatter<\/code><\/pre>\n<h3 id=\"스토리-02캐릭터와관계-md-외형-사용-원칙\">외형 사용 원칙<\/h3>\n<ul>\n<li>모든 인물은 현실에서 먼저 자연스러워야 한다. 과한 판타지 색감이나 장식은 피한다.<\/li>\n<li>복장과 액세서리는 캐릭터 고정값이 아니라 장면 연출값이다. 같은 인물이라도 날짜·장소·감정에 따라 달라져야 한다.<\/li>\n<li>장면 연출값이라도 캐릭터 취향을 벗어나면 안 된다. 의상은 항상 성격, 생활 습관, 관계 상태, 그날의 목적과 연결되어야 한다.<\/li>\n<li>내면세계의 변화는 무조건 새 의상으로 해결하지 말고, 빛, 배경, 소품, 표정 변화도 함께 사용한다.<\/li>\n<li>진엔딩에 가까워질수록 외형은 화려해지지 않고 오히려 현실감이 돌아온다.<\/li>\n<li>실패 루프에서는 같은 외형이 반복되지만, 피로감·정돈 과잉·공간 왜곡으로 불안감을 준다.<\/li>\n<li>프롬프트에서 특정 유명 작품명, 작가명, 실존 배우명, 유명 캐릭터명은 쓰지 않는다. 고유한 원작 캐릭터로 유지한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-02캐릭터와관계-md-성격-기준\">성격 기준<\/h3>\n<p>이 섹션은 캐릭터 대사, 이벤트 선택지, 이미지 프롬프트, 새드엔딩 왜곡을 판단하는 기준이다. 외형·복장·소품은 장면마다 달라질 수 있지만, 아래 성격 기준을 벗어나면 안 된다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>인물<\/th><th>한 줄 성격<\/th><th>핵심 욕망<\/th><th>핵심 두려움<\/th><th>관계 왜곡<\/th><\/tr><\/thead><tbody><tr><td>유재윤<\/td><td>남의 마음을 배려하느라 자기 마음을 미루는 사람<\/td><td>아무도 상처 입히지 않고 옳은 선택을 하고 싶음<\/td><td>내가 고른 선택 때문에 누군가 다치는 것<\/td><td>회피와 유예<\/td><\/tr><tr><td>은하연<\/td><td>조용히 느리게 마음을 여는 사람<\/td><td>자신의 속도를 존중받은 상태에서 마음을 말하고 싶음<\/td><td>시끄러운 관계 속에서 자기 마음이 지워지는 것<\/td><td>사고 기억에서 사라짐<\/td><\/tr><tr><td>한소하<\/td><td>밝고 빠르지만 오래된 관계를 놓기 어려운 사람<\/td><td>재윤과의 익숙한 일상이 계속 의미 있기를 바람<\/td><td>재윤이 낯선 미래로 가며 자신을 두고 가는 것<\/td><td>과거 도피<\/td><\/tr><tr><td>백서린<\/td><td>필요한 말을 먼저 정리해두는 책임감 강한 사람<\/td><td>모두가 덜 다치도록 상황을 통제하고 싶음<\/td><td>통제하지 못한 선택이 다시 사고로 이어지는 것<\/td><td>정답 의존<\/td><\/tr><tr><td>나미루<\/td><td>불안하지만 혼자 해내고 싶은 마음이 있는 후배<\/td><td>도움받던 사람이 아니라 해낼 수 있는 사람이 되고 싶음<\/td><td>멘토링이 끝나면 자신도 관계도 버려지는 것<\/td><td>의존 고착<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-02캐릭터와관계-md-유재윤-성격-기준\">유재윤 성격 기준<\/h4>\n<blockquote>남의 마음을 배려하느라 자기 마음을 미루던 사람.<\/blockquote>\n<p>기본 성격:<\/p>\n<ul>\n<li>조용히 배려하고, 상대의 불편함을 빨리 알아차린다.<\/li>\n<li>갈등을 크게 만들지 않으려고 말끝을 흐리거나 답을 미룬다.<\/li>\n<li>작은 책임은 잘 떠안지만, 큰 선택의 책임은 오래 미룬다.<\/li>\n<li>반 행사나 공동 작업에서는 먼저 주도하기보다 듣고 있다가 떠밀리듯 역할을 맡는 편이다.<\/li>\n<li>자기 마음을 직접 말하는 것은 서툴지만, 몸을 움직여 도와주는 일에는 빠르다.<\/li>\n<\/ul>\n<p>장점:<\/p>\n<ul>\n<li>눈치가 빠르고, 상대가 말하지 않은 불안을 실무적인 도움으로 줄여준다.<\/li>\n<li>위급한 순간에는 계산보다 몸이 먼저 움직인다.<\/li>\n<li>누군가를 얕게 대하지 않고, 오래 이어진 관계를 쉽게 버리지 않는다.<\/li>\n<\/ul>\n<p>결함:<\/p>\n<ul>\n<li>누군가를 상처 입히지 않기 위해 선택을 미루지만, 그 결과 모두에게 애매한 희망을 남긴다.<\/li>\n<li>갈등을 만들지 않으려는 태도가 때로는 갈등을 더 오래 지속시킨다.<\/li>\n<li><code>나중에 말해도 된다<\/code>는 생각으로 중요한 감정 표현을 늦춘다.<\/li>\n<li>자신이 다치거나 불편해지는 것은 감수하면서도, 상대가 상처받는 장면은 과하게 피하려 한다.<\/li>\n<\/ul>\n<p>말투:<\/p>\n<ul>\n<li>평소에는 짧고 부드럽다. “아, 괜찮아.”, “내가 할게.”, “나중에 말해도 돼?”처럼 상대를 먼저 살피는 문장이 많다.<\/li>\n<li>당황하면 농담이나 변명보다 침묵이 먼저 나온다.<\/li>\n<li>진심을 말할 때는 문장이 길어지기보다, 짧은 문장을 끊어서 반복한다.<\/li>\n<li>하연 앞에서는 조심스럽게 묻고 기다린다.<\/li>\n<li>소하 앞에서는 편하게 받아치지만, 중요한 이야기가 나오면 말을 흐린다.<\/li>\n<li>서린 앞에서는 정답을 묻는 말투가 나오기 쉽다.<\/li>\n<li>미루 앞에서는 투덜대면서도 행동으로 먼저 챙긴다.<\/li>\n<\/ul>\n<p>취미/대비:<\/p>\n<ul>\n<li>학교 밖 지역 아이스링크에서 아이스하키를 한다.<\/li>\n<li>포지션은 윙어.<\/li>\n<li>빠른 가속과 측면 돌파를 좋아하지만, 무리한 슛보다 패스를 자주 고른다.<\/li>\n<li>평소에는 선택을 미루는 편이지만, 빙판 위에서는 오래 망설이지 않는다.<\/li>\n<\/ul>\n<p>빙판 위에서는 틈을 보면 바로 들어가지만, 사람 마음 앞에서는 늘 한 박자 늦는다. 빙판 위에서는 위험한 순간 몸을 던질 수 있지만, 관계에서는 마음을 말해야 하는 순간을 자주 미룬다.<\/p>\n<p>관계별로 재윤이 남긴 유예:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>인물<\/th><th>재윤이 미룬 것<\/th><th>루프 안에서의 의미<\/th><\/tr><\/thead><tbody><tr><td>한소하<\/td><td>오래된 관계에 분명한 선을 긋지 않음<\/td><td>아무 일도 없던 과거로 돌아가고 싶은 회피<\/td><\/tr><tr><td>백서린<\/td><td>스스로 고르기보다 정답을 맡기려 함<\/td><td>선택의 책임을 넘기고 싶은 마음<\/td><\/tr><tr><td>나미루<\/td><td><code>언제든 도와줄게<\/code>라는 말로 멘토링 종료를 흐리게 함<\/td><td>필요한 사람으로 남아 현실 복귀를 늦추고 싶은 마음<\/td><\/tr><tr><td>은하연<\/td><td>좋아한다는 마음을 제때 말하지 못함<\/td><td>루프를 끝내기 위해 인정해야 하는 진짜 선택<\/td><\/tr><\/tbody><\/table><\/div>\n<p>진엔딩 변화:<\/p>\n<ul>\n<li>처음으로 자기 선택을 끝까지 책임진다.<\/li>\n<li><code>[하연에게 돌아간다]<\/code>는 단순히 깨어나는 선택이 아니라, 이번엔 자기 마음을 미루지 않겠다는 선택이다.<\/li>\n<li>진엔딩 후에는 무리하게 씩씩한 척하지 않고, 늦더라도 직접 말하려는 사람으로 남는다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-은하연-성격-기준\">은하연 성격 기준<\/h4>\n<p>고등학교 2학년 1학기 말, 축제 약 4주 전 2학년 5반으로 전학 온 학생. 주인공은 전학 첫날 하연에게 첫눈에 반한다.<\/p>\n<p>기본 성격:<\/p>\n<ul>\n<li>말수가 적고 감정 표현이 느리다.<\/li>\n<li>차가워 보일 수 있지만 무심한 것은 아니다.<\/li>\n<li>사람 많은 중심보다 가장자리에서 상황을 관찰하는 편이다.<\/li>\n<li>작은 배려를 크게 드러내지 않고 조용히 한다.<\/li>\n<li>자신의 속도를 침범받으면 물러나지만, 기다려주는 사람에게는 조금씩 마음을 연다.<\/li>\n<li>시끄럽고 과하게 들뜬 분위기보다 오래 있어도 피곤하지 않은 조용한 공간을 선호한다.<\/li>\n<\/ul>\n<p>장점:<\/p>\n<ul>\n<li>말은 적지만, 한 번 마음에 둔 말과 행동을 오래 기억한다.<\/li>\n<li>상대가 자신을 억지로 끌고 가지 않는지 민감하게 알아차린다.<\/li>\n<li>직접 나서서 분위기를 장악하지 않아도, 조용한 방향성을 제안할 수 있다.<\/li>\n<li>재윤이 기다려주면 그 기다림을 허투루 넘기지 않는다.<\/li>\n<\/ul>\n<p>결함/취약점:<\/p>\n<ul>\n<li>중요한 말을 바로 꺼내지 못하고, 먼저 조용한 곳으로 물러나는 습관이 있다.<\/li>\n<li>자기 마음을 강하게 주장하는 데 익숙하지 않아, 반 분위기나 다른 사람의 속도에 쉽게 묻힌다.<\/li>\n<li>상대가 알아차려주기를 기다리는 시간이 길어질 수 있다.<\/li>\n<li>상처받았을 때 화를 내기보다 조용히 멀어져, 오해가 오래 남을 수 있다.<\/li>\n<\/ul>\n<p>말투:<\/p>\n<ul>\n<li>짧고 낮은 문장을 쓴다. “괜찮아.”, “그쪽이 조용해서.”, “조금만.”처럼 설명을 많이 붙이지 않는다.<\/li>\n<li>친밀도가 낮을 때는 필요한 답만 하고 시선을 오래 두지 않는다.<\/li>\n<li>친밀도가 오르면 말수가 크게 늘기보다, 같은 짧은 말 안에 이유를 조금 더 붙인다.<\/li>\n<li>고백이나 진심 장면에서도 감정을 과하게 터뜨리지 않는다. 대신 멈춤, 숨 고르기, 늦은 한 문장으로 마음을 드러낸다.<\/li>\n<\/ul>\n<p>관계 변화:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>단계<\/th><th>태도<\/th><\/tr><\/thead><tbody><tr><td>초반<\/td><td>전학생으로서 가장자리에 머물고, 반 행사에도 적극적으로 나서지 않는다.<\/td><\/tr><tr><td>신뢰 상승<\/td><td>재윤에게 짧은 취향과 동선을 흘리고, 그가 알아차리는지 본다.<\/td><\/tr><tr><td>D-2 예감<\/td><td>직접 약속하지 않고, 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해하게 만든다.<\/td><\/tr><tr><td>D-Day<\/td><td>하연이 부르는 것이 아니라, 재윤이 하연이 있을 곳을 알아차려 찾아와야 한다.<\/td><\/tr><tr><td>진엔딩 후<\/td><td>여전히 조용하지만, 다음 약속을 피하지 않고 작게 받아들인다.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>루프 왜곡:<\/p>\n<ul>\n<li>하연과 서로의 마음을 확인하지 못하면, 내면세계는 사고 기억에서 하연을 지워버린다.<\/li>\n<li>이때 재윤은 폐장 후 야외 소무대에 혼자 서 있고, 자신이 누구에게 가려 했는지 기억하지 못한 채 사고를 반복한다.<\/li>\n<li>하연은 사라진 히로인이 아니라, 재윤이 선택을 기억하지 못해 놓친 목적지다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-한소하-성격-기준\">한소하 성격 기준<\/h4>\n<p>주인공을 오래 좋아해 온 진짜 소꿉친구. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니다. 등굣길과 쉬는 시간, 방과후에 자연스럽게 마주치는 관계다.<\/p>\n<p>기본 성격:<\/p>\n<ul>\n<li>밝고 활동적이며, 오래 알고 지낸 사람에게는 거리감이 거의 없다.<\/li>\n<li>재윤의 작은 변화와 거짓말을 빨리 눈치챈다.<\/li>\n<li>장난스럽고 투덜대는 말투 뒤에 서운함을 숨긴다.<\/li>\n<li>자기 반 행사나 공동 작업에서는 후보를 줄이고 사람들을 움직이는 생활력이 있다.<\/li>\n<li>익숙한 관계를 소중히 여기지만, 그 익숙함이 흔들릴 때 방어적으로 굴 수 있다.<\/li>\n<\/ul>\n<p>장점:<\/p>\n<ul>\n<li>분위기를 빠르게 읽고 먼저 움직인다.<\/li>\n<li>오래된 관계를 가볍게 여기지 않는다.<\/li>\n<li>재윤이 도망치는 말을 할 때 가장 먼저 이상함을 알아차린다.<\/li>\n<li>감정이 깊지만, 상대를 악역으로 몰아세우지 않을 여지가 있다.<\/li>\n<\/ul>\n<p>결함/취약점:<\/p>\n<ul>\n<li>오래된 친밀함을 근거로 재윤의 현재 마음도 당연히 자신이 잘 안다고 생각하기 쉽다.<\/li>\n<li>불안할수록 더 장난스럽게 굴거나, 평소처럼 굴어 문제를 덮으려 한다.<\/li>\n<li>하연을 직접 공격하기보다 재윤이 변했다는 사실 자체에 서운함을 느낀다.<\/li>\n<li><code>예전처럼<\/code>이라는 말이 따뜻한 추억이 아니라 도피처가 될 수 있다.<\/li>\n<\/ul>\n<p>말투:<\/p>\n<ul>\n<li>재윤에게는 편하고 조금 거친 호칭을 쓴다. “야, 유재윤.”이 기본이다.<\/li>\n<li>농담, 핀잔, 반말이 많지만 악의적이지 않다.<\/li>\n<li>서운할수록 웃는 말투가 짧아지고, 장난 뒤에 날이 선다.<\/li>\n<li>중요한 장면에서는 일부러 아무렇지 않은 척하다가 끝에 진심이 새어 나온다.<\/li>\n<\/ul>\n<p>관계 변화:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>단계<\/th><th>태도<\/th><\/tr><\/thead><tbody><tr><td>초반<\/td><td>오래된 등굣길과 편한 장난으로 재윤의 일상 기준점이 된다.<\/td><\/tr><tr><td>하연 등장 후<\/td><td>하연을 노골적으로 견제하기보다, 재윤이 달라진 것을 먼저 눈치챈다.<\/td><\/tr><tr><td>압박 상승<\/td><td><code>예전처럼<\/code> 돌아가자는 말이 많아지고, 익숙한 장소와 습관으로 재윤을 붙잡는다.<\/td><\/tr><tr><td>정리 성공<\/td><td>재윤이 하연을 좋아했다는 사실을 인정하고, 오래된 관계를 거짓 과거로 만들지 않는다.<\/td><\/tr><tr><td>진엔딩 후<\/td><td>잔소리와 장난은 남지만, 재윤을 붙잡는 과거가 아니라 돌아올 수 있는 자리로 남는다.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>새드엔딩 왜곡:<\/p>\n<ul>\n<li>따뜻한 등굣길, 오래된 편의점, 같은 햇빛이 반복된다.<\/li>\n<li>편안하지만 날짜가 앞으로 나아가지 않는다.<\/li>\n<li>소하는 악역이 아니라, 아무 일도 없던 과거에 머물고 싶은 마음의 얼굴이다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-백서린-성격-기준\">백서린 성격 기준<\/h4>\n<p>3학년 7반. 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배. 축제 기간에는 말과 순서, 방송 흐름, 지원 동선을 정리한다.<\/p>\n<p>기본 성격:<\/p>\n<ul>\n<li>침착하고 책임감이 강하다.<\/li>\n<li>감정을 크게 드러내기보다 필요한 일과 필요한 말을 먼저 정리한다.<\/li>\n<li>압박이 큰 상황에서 먼저 판단하고, 다른 사람이 당황하지 않도록 순서를 제공한다.<\/li>\n<li>틀리는 것보다 애매한 상태로 방치되는 것을 더 불안해한다.<\/li>\n<li>차갑게 보이지만, 실제로는 누군가가 덜 다치게 하려는 책임감이 강하다.<\/li>\n<\/ul>\n<p>장점:<\/p>\n<ul>\n<li>복잡한 상황을 구조화하고 우선순위를 잡는 데 능하다.<\/li>\n<li>재윤이 당황했을 때 실제로 도움을 준 경험이 있어 신뢰의 근거가 있다.<\/li>\n<li>감정 상담도 즉흥 위로보다 기준을 나눠주는 방식으로 한다.<\/li>\n<li>진짜 성장은 재윤이 정답을 받는 것이 아니라 자기 이유를 찾게 만드는 방향으로 이끈다.<\/li>\n<\/ul>\n<p>결함/취약점:<\/p>\n<ul>\n<li>책임감이 커질수록 선택권까지 대신 쥐려 한다.<\/li>\n<li>상대가 틀릴 가능성을 견디기 어려워, 안전한 답을 먼저 제시한다.<\/li>\n<li>자신의 불안과 죄책감을 <code>관리<\/code>와 <code>순서<\/code>로 덮는다.<\/li>\n<li>다정함을 직접 표현하기보다 지시나 점검으로 바꾸기 때문에 오해받기 쉽다.<\/li>\n<\/ul>\n<p>말투:<\/p>\n<ul>\n<li>짧고 정확하다. 불필요한 수식어가 적다.<\/li>\n<li>“정리해.”, “구분해.”, “그 질문은 틀렸어.”처럼 기준을 세우는 문장이 많다.<\/li>\n<li>화가 나도 목소리를 높이기보다 문장이 더 차가워진다.<\/li>\n<li>인정할 때도 칭찬을 길게 하지 않고, 자료를 넘기거나 다음 행동을 맡기는 방식으로 표현한다.<\/li>\n<li>상담 장면에서는 감정을 대신 결론 내리지 않고, 감정을 분류할 기준을 준다.<\/li>\n<\/ul>\n<p>관계 변화:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>단계<\/th><th>태도<\/th><\/tr><\/thead><tbody><tr><td>초반<\/td><td>재윤에게 정확한 순서와 안정감을 주는 선배다.<\/td><\/tr><tr><td>의존 상승<\/td><td>재윤이 스스로 고르지 않아도 되게 선택지를 정리해준다.<\/td><\/tr><tr><td>D-9 상담<\/td><td>좋아함, 미안함, 책임감, 익숙함을 구분하게 하지만 결론은 대신 고르지 않는다.<\/td><\/tr><tr><td>D-3 정리<\/td><td><code>정답<\/code>이 아니라 재윤이 고른 이유를 끝까지 보라고 말한다.<\/td><\/tr><tr><td>진엔딩 보조<\/td><td>점검표와 단서를 넘기며 통제 대신 선택권을 돌려준다.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>새드엔딩 왜곡:<\/p>\n<ul>\n<li>방송실, 학생회실, 일정표가 지나치게 정돈된다.<\/li>\n<li>모든 위험은 통제되지만, 재윤이 고른 것은 없다.<\/li>\n<li>서린은 냉혹한 악역이 아니라, 다시 다치게 만들지 않기 위해 선택을 대신하려는 책임감의 얼굴이다.<\/li>\n<\/ul>\n<h4 id=\"스토리-02캐릭터와관계-md-나미루-성격-기준\">나미루 성격 기준<\/h4>\n<p>1학년 3반. 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원. 재윤의 <code>1학기 한정 학습·학교생활 적응 멘토링<\/code> 대상이다.<\/p>\n<p>기본 성격:<\/p>\n<ul>\n<li>불안이 많고, 질문하기 전에 먼저 미안해한다.<\/li>\n<li>도움받는 일에 익숙하지만, 마음속에는 혼자 해내고 싶은 욕구가 있다.<\/li>\n<li>칭찬이나 작은 성공에 크게 안심한다.<\/li>\n<li>상대의 반응을 살피며, 거절당할 가능성을 과하게 걱정한다.<\/li>\n<li>준비물을 꼼꼼히 챙기려 하지만, 긴장하면 순서를 놓치기 쉽다.<\/li>\n<\/ul>\n<p>장점:<\/p>\n<ul>\n<li>배운 것을 기억하려고 노력하고, 작은 메모와 체크리스트를 성실히 쓴다.<\/li>\n<li>겁이 많아도 완전히 포기하지 않는다.<\/li>\n<li>자신이 해낸 일을 인정받으면 다음 행동으로 이어갈 수 있다.<\/li>\n<li>진엔딩 쪽에서는 <code>도움받는 후배<\/code>에서 <code>혼자 해보는 후배<\/code>로 성장할 수 있다.<\/li>\n<\/ul>\n<p>결함/취약점:<\/p>\n<ul>\n<li>불안할수록 스스로 확인하기보다 재윤에게 마지막 판단을 맡기려 한다.<\/li>\n<li><code>선배가 없으면 못 한다<\/code>는 생각이 강해지면, 멘토링 종료를 관계의 끝으로 착각한다.<\/li>\n<li>상대가 자신을 떠날까 봐 먼저 붙잡고, 그 붙잡음이 죄책감으로 변할 수 있다.<\/li>\n<li>작은 실수도 크게 받아들여 자신이 사고를 만들었다고 믿기 쉽다.<\/li>\n<\/ul>\n<p>말투:<\/p>\n<ul>\n<li>조심스럽고 사과가 앞선다. “죄송한데요.”, “이거 맞아요?”, “제가 해도 돼요?” 같은 문장이 많다.<\/li>\n<li>재윤에게는 <code>선배<\/code> 호칭을 자주 붙인다.<\/li>\n<li>불안하면 말이 길어지고, 같은 확인을 반복한다.<\/li>\n<li>성장 후에는 “제가 먼저 해봤어요.”처럼 결과를 들고 온다.<\/li>\n<li>감정이 터질 때도 공격적이기보다 울먹이며 붙잡는 쪽에 가깝다.<\/li>\n<\/ul>\n<p>관계 변화:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>단계<\/th><th>태도<\/th><\/tr><\/thead><tbody><tr><td>초반<\/td><td>재윤에게 확인받아야 안심하는 후배다.<\/td><\/tr><tr><td>의존 상승<\/td><td>과제, 발표, 행사 신청처럼 스스로 할 수 있는 일도 재윤에게 맡기려 한다.<\/td><\/tr><tr><td>단서 획득<\/td><td>출입 제한 표지, 고정끈, 도움 인원 동선처럼 사고 현장과 연결된 작은 단서를 가져온다.<\/td><\/tr><tr><td>정리 성공<\/td><td>재윤이 대신 해주지 않아도, 자신이 먼저 해볼 수 있음을 받아들인다.<\/td><\/tr><tr><td>진엔딩 후<\/td><td>멘토링 종료를 이별이 아니라 다음 관계로 넘어가는 약속으로 받아들인다.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>새드엔딩 왜곡:<\/p>\n<ul>\n<li>학교 복도와 교실이 미루의 방처럼 좁아진다.<\/li>\n<li>체크리스트는 끝나지 않고, 방학식 안내문은 문밖에만 있다.<\/li>\n<li>미루는 약한 아이가 아니라, 끝나는 관계를 견디지 못해 재윤을 꿈속에 붙잡는 의존의 얼굴이다.<\/li>\n<\/ul>\n<h3 id=\"스토리-02캐릭터와관계-md-일반-히로인-구조\">일반 히로인 구조<\/h3>\n<p>한소하, 백서린, 나미루는 현실에도 존재하며 주인공과 인연이 있는 사람들이다.<\/p>\n<p>내면세계의 이들은 다음 요소가 합쳐진 존재다.<\/p>\n<blockquote>현실 인물의 관계 기억 + 주인공의 감정 방어기제 + 사고 이후 혼수상태에서 굳어진 미련과 회피<\/blockquote>\n<p>일반 히로인 진행은 현실 인물과 실제 연애를 완성하는 것이 아니다.<\/p>\n<p>진행의 의미:<\/p>\n<ul>\n<li>현실 인연을 떠올림<\/li>\n<li>내면세계가 덧씌운 미련, 회피, 의존을 분리함<\/li>\n<li>사고의 진실과 하연에게 돌아가야 할 이유를 회복함<\/li>\n<\/ul>\n<h3 id=\"스토리-02캐릭터와관계-md-관계-축\">관계 축<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>캐릭터<\/th><th>관계 축<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>한소하<\/td><td>과거<\/td><td>오래된 소꿉친구, 익숙한 관계로 돌아가고 싶은 마음<\/td><\/tr><tr><td>백서린<\/td><td>정답<\/td><td>흔들릴 때 방향을 잡아주던 선배에게 선택을 맡기고 싶은 마음<\/td><\/tr><tr><td>나미루<\/td><td>의존<\/td><td>자신을 믿고 따르던 후배를 지켜줘야 한다는 책임감<\/td><\/tr><tr><td>은하연<\/td><td>선택<\/td><td>처음으로 자기 마음을 미루지 않고 향해야 하는 사람<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-02캐릭터와관계-md-캐릭터별-현실-관계\">캐릭터별 현실 관계<\/h3>\n<h4 id=\"스토리-02캐릭터와관계-md-한소하-2\">한소하<\/h4>\n<p>주인공을 오래 좋아해 온 진짜 소꿉친구. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니다. 등굣길과 쉬는 시간, 방과후에 자연스럽게 마주치는 관계다.<\/p>\n<p>소하는 재윤보다 적극적으로 움직이는 편이다. 축제 같은 공동 행사에서는 자기 반 안에서 후보를 줄이고 사람들을 움직이려 하며, 가만히 듣고만 있는 재윤과 대비된다. 다만 하연 전학 직후에는 하연을 직접 견제하기보다 재윤이 평소와 다르게 멍한 것을 눈치채는 정도에 머문다.<\/p>\n<p>내면세계에서는 <code>돌아가고 싶은 평범한 과거<\/code>와 <code>하연에게 향한 마음을 회피하고 싶은 마음<\/code>을 상징한다.<\/p>\n<h4 id=\"스토리-02캐릭터와관계-md-백서린-2\">백서린<\/h4>\n<p>3학년 7반. 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배. 3학년은 축제 반 행사를 직접 준비하지 않고 참가하며, 서린은 학생회/방송반 소속으로 축제 진행 지원과 방송 흐름을 맡고 있다.<\/p>\n<p>축제 기간 서린의 역할은 단순 안내 방송 하나가 아니라, 축제 전체의 말과 순서를 정리하는 쪽에 가깝다.<\/p>\n<ul>\n<li>교내 방송 멘트 정리<\/li>\n<li>각 반 행사 소개 문구 취합<\/li>\n<li>방송 큐시트 작성<\/li>\n<li>진행 순서 확인<\/li>\n<li>분실물 / 호출 방송 문구 준비<\/li>\n<li>방송 장비 체크<\/li>\n<li>학생회 쪽 동선 공지와 방송 문구 연결<\/li>\n<li>당일 돌발 상황용 멘트 템플릿 준비<\/li>\n<\/ul>\n<p>현실의 서린은 들뜬 사람들을 통제하려는 사람이 아니라, 축제처럼 말이 많고 순서가 쉽게 꼬이는 상황에서 필요한 말을 먼저 준비해두는 사람이다. 이 장점이 내면세계에서는 <code>사람들이 말하기 전에 필요한 말을 미리 정해두는 통제<\/code>로 뒤틀릴 수 있다.<\/p>\n<p>재윤은 방송반에서 마이크 앞에 서는 아나운서 역할이 아니다. 앞에서 말하는 사람보다, 방송이 끊기지 않도록 뒤에서 받쳐주는 기술/대본 보조 역할에 가깝다.<\/p>\n<ul>\n<li>마이크 테스트<\/li>\n<li>스피커 출력 확인<\/li>\n<li>케이블 연결과 장비 전원 순서 확인<\/li>\n<li>믹서 / 볼륨 확인<\/li>\n<li>반별 행사 소개 문구 취합<\/li>\n<li>대본 순서 정렬<\/li>\n<li>수정본 / 최종본 구분<\/li>\n<li>인쇄본 번호 붙이기<\/li>\n<li>큐시트와 대본 매칭<\/li>\n<li>리허설 중 빠진 멘트 표시<\/li>\n<li>방송실 안에서 다음 멘트와 장비 상태를 조용히 준비<\/li>\n<\/ul>\n<p>주인공은 1학년 때 방송반에 들어갔고, 첫 방송이나 행사 안내에서 장비 전원 순서와 대본 넘기는 타이밍을 놓칠 뻔한 적이 있다. 그때 서린이 침착하게 상황을 수습해주었다.<\/p>\n<blockquote>괜찮아. 당황하지 말고, 내가 말하는 순서대로 해.<\/blockquote>\n<p>이후 주인공에게 서린은 <code>당황했을 때 정답을 알려주는 사람<\/code>, <code>실수해도 상황을 바로잡아주는 사람<\/code>, <code>내가 틀리지 않게 해주는 선배<\/code>로 각인되었다. 재윤에게 방송반 일은 앞에 나서서 말하는 일이 아니라, 정해진 순서가 끊기지 않게 뒤에서 맞추는 일이 되었다.<\/p>\n<p>이런 경험 때문에 서린은 재윤에게 유능하지만 차가운 사람이 아니라, 압박이 큰 상황에서 먼저 판단하고 책임지는 사람으로 남아 있다. 다만 내면세계에서는 그 신뢰가 <code>선택을 대신해주는 통제<\/code>로 뒤틀린다.<\/p>\n<p>내면세계에서는 <code>선택을 잘못했다는 불안<\/code>, <code>서린에게 의지하던 기억<\/code>, <code>그 밤을 통제하지 못했다는 서린의 책임감<\/code>이 합쳐진 존재다.<\/p>\n<h4 id=\"스토리-02캐릭터와관계-md-나미루-2\">나미루<\/h4>\n<p>1학년 3반. 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원.<\/p>\n<p>현실의 미루는 1학년 초반 학교생활 적응과 성적 문제로 힘들어했고, 주인공은 선생님 또는 학생회 부탁으로 미루의 <code>1학기 한정 학습·학교생활 적응 멘토<\/code>를 맡았다.<\/p>\n<p>이 멘토링은 단순한 학교생활 안내만이 아니라, 학교 안에서 혼자 해내야 하는 일들을 처음 몇 달 동안 재윤이 옆에서 같이 정리해준 관계다. 현재는 1학기 말이라 멘토링 종료까지 얼마 남지 않았고, 축제 2일차 뒤 D+3 월요일 방학식이 오면 공식적으로 끝난다. 미루는 선배에게 계속 기대고 싶은 마음과 혼자 해내야 한다는 부담을 동시에 느낀다.<\/p>\n<p>멘토링 범위:<\/p>\n<ul>\n<li>수학이나 영어 기초 보충<\/li>\n<li>수행평가 정리<\/li>\n<li>발표문 준비와 발표 연습<\/li>\n<li>시험 전 공부 계획 확인<\/li>\n<li>제출물, 준비물, 마감일 정리<\/li>\n<li>학교생활 적응<\/li>\n<li>선생님이나 선배에게 질문하는 법<\/li>\n<li>동아리, 봉사활동, 행사 신청 도움<\/li>\n<li>행사 도움 인원 역할 이해<\/li>\n<li>모르는 일이 생겼을 때 누구에게 보고할지 정하기<\/li>\n<\/ul>\n<p>멘토링은 사적인 보호자 역할이나 매일 붙어 다니는 관계가 아니다. 학교 안에서 혼자 해야 할 일을 처음부터 모두 떠안기지 않고, 질문하는 법과 정리하는 법을 같이 연습해준 관계에 가깝다. 방학식 이후에는 재윤과 미루가 완전히 남이 되는 것이 아니라, <code>멘토링 관계<\/code>가 끝나고 평범한 선후배 관계로 바뀐다.<\/p>\n<p>미루가 주인공을 특별하게 따르는 이유는 단순한 선후배 호감이 아니라, 힘들 때 실제로 도와준 사람이 주인공이었기 때문이다.<\/p>\n<p>축제 도움 인원에 참여하게 된 것도 주인공의 격려와, 멘토링이 끝나기 전에 혼자 해낼 수 있는 일을 만들어보고 싶은 마음이 계기다.<\/p>\n<blockquote>너도 할 수 있어. 너무 겁먹지 마.<\/blockquote>\n<p>이 말은 현실에서는 미루를 앞으로 나아가게 한 말이지만, 사고 이후 내면세계에서는 미루의 죄책감으로 뒤틀린다.<\/p>\n<p>미루의 작은 실수는 안전 관리 부실, 철거 지연, 우연한 바람과 겹쳐 사고에 일부 연결된다.<\/p>\n<p>내면세계에서는 <code>깨어나기 싫은 마음<\/code>, <code>곧 끝나는 멘토링을 끝내고 싶지 않은 마음<\/code>, <code>미루가 주인공에게 의지하던 관계<\/code>, <code>사고에 대한 미루의 죄책감<\/code>이 합쳐진 존재다.<\/p>\n<p>루프 안에서 의존이 굳어진 미루는 주인공에게 이렇게 매달린다.<\/p>\n<blockquote>선배가 없으면 저는 아무것도 못 해요.<\/blockquote>", "headings": [{"level": 1, "text": "캐릭터와 관계", "id": "스토리-02캐릭터와관계-md-캐릭터와-관계"}, {"level": 2, "text": "유재윤 / 주인공", "id": "스토리-02캐릭터와관계-md-유재윤-주인공"}, {"level": 2, "text": "외형 기준", "id": "스토리-02캐릭터와관계-md-외형-기준"}, {"level": 3, "text": "유재윤", "id": "스토리-02캐릭터와관계-md-유재윤"}, {"level": 3, "text": "은하연", "id": "스토리-02캐릭터와관계-md-은하연"}, {"level": 3, "text": "한소하", "id": "스토리-02캐릭터와관계-md-한소하"}, {"level": 3, "text": "백서린", "id": "스토리-02캐릭터와관계-md-백서린"}, {"level": 3, "text": "나미루", "id": "스토리-02캐릭터와관계-md-나미루"}, {"level": 2, "text": "이미지 생성용 공통 프롬프트 템플릿", "id": "스토리-02캐릭터와관계-md-이미지-생성용-공통-프롬프트-템플릿"}, {"level": 2, "text": "외형 사용 원칙", "id": "스토리-02캐릭터와관계-md-외형-사용-원칙"}, {"level": 2, "text": "성격 기준", "id": "스토리-02캐릭터와관계-md-성격-기준"}, {"level": 3, "text": "유재윤 성격 기준", "id": "스토리-02캐릭터와관계-md-유재윤-성격-기준"}, {"level": 3, "text": "은하연 성격 기준", "id": "스토리-02캐릭터와관계-md-은하연-성격-기준"}, {"level": 3, "text": "한소하 성격 기준", "id": "스토리-02캐릭터와관계-md-한소하-성격-기준"}, {"level": 3, "text": "백서린 성격 기준", "id": "스토리-02캐릭터와관계-md-백서린-성격-기준"}, {"level": 3, "text": "나미루 성격 기준", "id": "스토리-02캐릭터와관계-md-나미루-성격-기준"}, {"level": 2, "text": "일반 히로인 구조", "id": "스토리-02캐릭터와관계-md-일반-히로인-구조"}, {"level": 2, "text": "관계 축", "id": "스토리-02캐릭터와관계-md-관계-축"}, {"level": 2, "text": "캐릭터별 현실 관계", "id": "스토리-02캐릭터와관계-md-캐릭터별-현실-관계"}, {"level": 3, "text": "한소하", "id": "스토리-02캐릭터와관계-md-한소하-2"}, {"level": 3, "text": "백서린", "id": "스토리-02캐릭터와관계-md-백서린-2"}, {"level": 3, "text": "나미루", "id": "스토리-02캐릭터와관계-md-나미루-2"}], "plain": "# 캐릭터와 관계 ## 유재윤 / 주인공 고등학교 2학년 5반 남학생. 이름은 유재윤. 평소 서술에서는 `주인공`으로 부르되, 인물 간 대사와 감정 장면에서는 `재윤`이라는 이름을 사용한다. 호칭 예시: - 은하연: 재윤아 - 한소하: 야, 유재윤 - 백서린: 재윤아 - 나미루: 재윤 선배 학년/반 기준: | 인물 | 학년/반 | 비고 | | --- | --- | --- | | 유재윤 | 2학년 5반 | 주인공. 은하연이 전학 오는 반 | | 은하연 | 2학년 5반 | D-25 월요일에 2학년 5반으로 전학 | | 한소하 | 2학년 2반 | 재윤과 같은 학년이지만 다른 반인 소꿉친구 | | 백서린 | 3학년 7반 | 방송반/학생회 선배. 3학년은 축제 반 행사를 준비하지 않고 참가/지원 역할 | | 나미루 | 1학년 3반 | 1학기 한정 멘토링이 끝나가고 있는 후배이자 축제 도움 인원 | ## 외형 기준 외형은 현실 인물 기준으로 먼저 잡고, 내면세계에서는 같은 외형이 감정 방어기제에 맞춰 조금씩 강조되거나 왜곡된다. 이 섹션은 AI 이미지 생성용 기준으로도 사용한다. 프롬프트를 만들 때는 각 캐릭터의 `기본 프롬프트`, `색감`, `의상 후보`, `표정/포즈`, `소품 후보`, `금지 요소`를 장면에 맞게 골라 사용한다. 복장·액세서리·소품은 매번 동일하게 고정하지 않는다. 공통 이미지 톤: - 현대 한국 고등학교 배경의 미연시/비주얼노벨풍 캐릭터 일러스트. - 현실적인 교복과 생활감이 있는 청춘 로맨스 미스터리 분위기. - 과한 판타지 장식, 전투복, 아이돌풍 무대 의상, 지나친 노출은 사용하지 않는다. - 인물
