<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miyeansi 통합 기획서</title>
  <style>
    :root {
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --ink:#172033;
      --muted:#667085;
      --line:#d9e2ee;
      --accent:#4f46e5;
      --accent-2:#0ea5e9;
      --accent-soft:#eef2ff;
      --shadow:0 20px 50px rgba(15,23,42,.08);
      --shadow-soft:0 8px 24px rgba(15,23,42,.06);
      --radius:18px;
      --library:360px;
      --reader-max:1040px;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 10% 0%, rgba(79,70,229,.12), transparent 28rem),
        radial-gradient(circle at 90% 0%, rgba(14,165,233,.12), transparent 28rem),
        linear-gradient(180deg,#f8fbff 0,var(--bg) 100%);
      color:var(--ink);
      font-family:"Pretendard","Inter","Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      line-height:1.72;
      letter-spacing:-.01em;
    }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; text-underline-offset:3px; }
    .topbar {
      position:sticky;
      top:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px 22px;
      background:rgba(255,255,255,.84);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(18px);
    }
    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .logo {
      width:38px; height:38px; border-radius:13px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      box-shadow:0 10px 24px rgba(79,70,229,.24);
    }
    .brand h1 { margin:0; font-size:18px; line-height:1.1; letter-spacing:-.045em; }
    .brand p { margin:2px 0 0; color:var(--muted); font-size:12px; }
    .top-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    button, .button {
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--ink);
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
      font:inherit;
      font-size:13px;
      text-decoration:none;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, border-color .12s ease, background .12s ease, color .12s ease;
    }
    button:hover, .button:hover { border-color:var(--accent); color:var(--accent); text-decoration:none; transform:translateY(-1px); }
    button.active { border-color:var(--accent); color:var(--accent); font-weight:800; background:var(--accent-soft); }
    .shell {
      display:grid;
      grid-template-columns:var(--library) minmax(0,1fr);
      gap:22px;
      max-width:1520px;
      margin:0 auto;
      padding:22px;
    }
    .library {
      position:sticky;
      top:82px;
      height:calc(100vh - 104px);
      overflow:auto;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .library-head h2 { margin:0; font-size:20px; letter-spacing:-.045em; }
    .library-head p { margin:6px 0 14px; color:var(--muted); font-size:13px; }
    .reader { min-width:0; max-width:var(--reader-max); width:100%; margin:0 auto; }
    .search-box { display:grid; gap:10px; margin:14px 0; }
    input[type="search"] {
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:var(--panel);
      color:var(--ink);
      font:inherit;
      font-size:14px;
      outline:none;
      box-shadow:var(--shadow-soft);
    }
    input[type="search"]:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(79,70,229,.12); }
    .chips { display:flex; flex-wrap:wrap; gap:7px; }
    .result { color:var(--muted); font-size:13px; margin:6px 0; }
    .doc-list { display:grid; gap:9px; }
    .doc-button {
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,.88);
      border-radius:16px;
      padding:13px;
      text-align:left;
      display:grid;
      gap:6px;
      box-shadow:none;
    }
    .doc-button strong { display:block; line-height:1.3; font-size:14px; }
    .doc-button small { color:var(--muted); word-break:break-all; }
    .doc-button.active { border-color:var(--accent); background:var(--accent-soft); box-shadow:0 10px 28px rgba(79,70,229,.14); }
    .badge { display:inline-flex; width:max-content; align-items:center; border-radius:999px; padding:4px 9px; background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:800; }
    .dashboard, .doc-view {
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
    }
    .dashboard {
      overflow:hidden;
    }
    .doc-view { overflow:visible; }
    .dashboard-head, .doc-head { padding:34px 38px; border-bottom:1px solid var(--line); background:linear-gradient(135deg,#ffffff 0,#f6f8ff 100%); }
    .dashboard h2, .doc-head h2 { margin:8px 0 0; font-size:clamp(30px,4vw,50px); line-height:1.13; letter-spacing:-.06em; }
    .dashboard-head p, .doc-head p { max-width:760px; color:#475467; margin:14px 0 0; font-size:16px; }
    .dashboard-body, .doc-body { padding:32px 40px; }
    .doc-reading {
      display:grid;
      grid-template-columns:minmax(0,1fr) 260px;
      align-items:start;
    }
    .doc-side-toc {
      position:sticky;
      top:86px;
      max-height:calc(100vh - 108px);
      overflow:auto;
      border-left:1px solid var(--line);
      background:linear-gradient(180deg,#fbfdff 0,#ffffff 100%);
      padding:26px 18px;
    }
    .doc-side-toc strong { display:block; margin-bottom:10px; font-size:14px; letter-spacing:-.035em; }
    .doc-side-toc nav { display:grid; gap:3px; }
    .doc-side-toc a {
      display:block;
      color:#475467;
      font-size:13px;
      line-height:1.35;
      border-radius:9px;
      padding:6px 7px;
      word-break:keep-all;
    }
    .doc-side-toc a:hover { background:var(--accent-soft); color:var(--accent); text-decoration:none; }
    .doc-side-toc .lv2 { font-weight:800; color:#27364f; }
    .doc-side-toc .lv3 { padding-left:16px; }
    .doc-side-toc .lv4, .doc-side-toc .lv5, .doc-side-toc .lv6 { padding-left:26px; color:var(--muted); }
    .grid { display:grid; gap:14px; }
    .grid.cards { grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
    .stat, .quick-card {
      background:var(--panel-soft);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow-soft);
    }
    .stat b { display:block; color:var(--accent); font-size:32px; line-height:1; margin-bottom:8px; }
    .quick-card h3 { margin:0 0 8px; font-size:20px; }
    .quick-card p { margin:0 0 12px; color:var(--muted); font-size:14px; }
    .quick-card button { border-radius:12px; width:100%; text-align:left; background:var(--panel); }
    .doc-tools { display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; }
    .path { color:var(--muted); font-size:13px; word-break:break-all; }
    .inline-toc {
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.78);
      overflow:hidden;
    }
    .inline-toc summary { cursor:pointer; padding:12px 14px; font-weight:800; }
    .inline-toc nav { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:4px 10px; padding:0 14px 14px; }
    .inline-toc a { color:#344054; font-size:13px; padding:5px 6px; border-radius:8px; }
    .inline-toc a:hover { background:var(--accent-soft); color:var(--accent); text-decoration:none; }
    .inline-toc .lv3 { padding-left:16px; color:#4b5563; }
    .inline-toc .lv4, .inline-toc .lv5, .inline-toc .lv6 { padding-left:26px; color:var(--muted); }
    .doc-body { font-size:16px; }
    .doc-body h2, .doc-body h3, .doc-body h4, .doc-body h5, .doc-body h6 { line-height:1.28; letter-spacing:-.04em; scroll-margin-top:92px; color:#111827; }
    .doc-body h2 { font-size:34px; border-bottom:2px solid var(--line); padding-bottom:12px; margin:0 0 18px; }
    .doc-body h3 { font-size:26px; margin:38px 0 14px; }
    .doc-body h4 { font-size:21px; margin:30px 0 10px; }
    .doc-body p { margin:11px 0; }
    .doc-body ul, .doc-body ol { padding-left:1.35rem; }
    .doc-body li { margin:5px 0; }
    .doc-body code { background:#eef2ff; color:#3730a3; border:1px solid #dfe3ff; border-radius:6px; padding:1px 5px; }
    .doc-body pre { background:#111827; color:#e5e7eb; border-radius:16px; padding:16px; overflow:auto; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08); }
    .doc-body pre code { background:transparent; color:inherit; border:0; padding:0; }
    .doc-body blockquote { margin:14px 0; border-left:4px solid var(--accent); background:#f5f7ff; padding:12px 15px; border-radius:12px; color:#30364a; }
    .doc-body .table-wrap { overflow:auto; margin:16px 0; border:1px solid var(--line); border-radius:14px; background:var(--panel); }
    .doc-body table { width:100%; border-collapse:collapse; min-width:620px; background:var(--panel); }
    .doc-body th, .doc-body td { border:1px solid var(--line); padding:10px 11px; vertical-align:top; }
    .doc-body th { background:#f1f5f9; text-align:left; color:#344054; }
    .doc-body tr:nth-child(even) td { background:#fbfdff; }
    .doc-body.sectioned > h2:first-child { margin-bottom:24px; }
    .planning-section {
      margin:18px 0;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }
    .planning-section[open] { border-color:#c7d2fe; }
    .planning-section summary {
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:10px 14px;
      align-items:center;
      cursor:pointer;
      list-style:none;
      padding:16px 18px;
      background:linear-gradient(135deg,#ffffff 0,#f8faff 100%);
    }
    .planning-section summary::-webkit-details-marker { display:none; }
    .planning-section summary::after {
      content:'펼치기';
      grid-column:2;
      grid-row:1;
      align-self:start;
      color:var(--accent);
      background:var(--accent-soft);
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .planning-section[open] summary::after { content:'접기'; }
    .planning-section h3 {
      grid-column:1;
      margin:0;
      border:0;
      padding:0;
      font-size:23px;
      line-height:1.28;
    }
    .planning-section h3.compact-date-title { font-size:28px; letter-spacing:-.03em; }
    .section-preview {
      grid-column:1 / -1;
      margin:0;
      color:#667085;
      font-size:14px;
      line-height:1.55;
    }
    .section-content {
      padding:4px 20px 20px;
      border-top:1px solid var(--line);
    }
    .section-content > :first-child { margin-top:14px; }
    .mobile-library-toggle { display:none; }
    .hidden { display:none!important; }
    @media (max-width:1120px) {
      .shell { grid-template-columns:300px minmax(0,1fr); padding:16px; gap:16px; }
      .library { top:76px; height:calc(100vh - 92px); }
      .dashboard-head, .doc-head { padding:28px; }
      .dashboard-body, .doc-body { padding:28px; }
      .doc-reading { grid-template-columns:1fr; }
      .doc-side-toc {
        position:relative;
        top:auto;
        max-height:none;
        border-left:0;
        border-bottom:1px solid var(--line);
        padding:20px 28px;
      }
      .doc-side-toc nav { grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
    }
    @media (max-width:820px) {
      .topbar { align-items:flex-start; flex-direction:column; }
      .mobile-library-toggle { display:inline-flex; }
      .shell { grid-template-columns:1fr; }
      .library { position:relative; top:auto; height:auto; display:none; }
      .library.open { display:block; }
      .reader { max-width:none; }
      .dashboard-head, .doc-head, .dashboard-body, .doc-body { padding:20px; }
      .doc-body { font-size:15px; }
      .doc-side-toc { padding:18px 20px; }
      .planning-section summary { grid-template-columns:1fr; }
      .planning-section summary::after { grid-column:1; grid-row:auto; width:max-content; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>Miyeansi 통합 기획서</h1>
        <p>문서 라이브러리에서 하나씩 골라 읽는 웹형 기획서</p>
      </div>
    </div>
    <div class="top-actions">
      <button id="mobileLibraryToggle" class="mobile-library-toggle">문서 목록</button>
      <button id="homeBtn">홈</button>
      <a class="button" href="README.md">원본 안내</a>
    </div>
  </header>

  <div class="shell">
    <aside class="library" id="library">
      <div class="library-head">
        <h2>문서 라이브러리</h2>
        <p>검색하거나 카테고리를 골라 필요한 기획서를 연다.</p>
      </div>
      <div class="search-box">
        <input id="search" type="search" placeholder="검색: 하연, 플래그, 하루 행동…" />
        <div class="chips" id="chips">
          <button class="active" data-filter="all">전체</button>
          <button data-filter="기획">기획</button>
          <button data-filter="스토리">스토리</button>
          <button data-filter="시스템">시스템</button>
        </div>
        <div id="result" class="result"></div>
      </div>
      <div id="docList" class="doc-list"></div>
    </aside>

    <main class="reader" id="content"></main>

d<\/code><\/td><td>상세 수치는 12로 링크<\/td><\/tr><tr><td>루트별 플래그<\/td><td><code>04_루트_세부기획.md<\/code><\/td><td>실제 D-Day 판정 수치는 12로 링크<\/td><\/tr><tr><td>날짜 흐름<\/td><td><code>06_날짜별_진행_달력.md<\/code><\/td><td>D-3/D-2/D-Day 상세는 08~10 링크<\/td><\/tr><tr><td>D-Day 수치 조건<\/td><td><code>12_D-1_D-Day_조건_수치화.md<\/code><\/td><td>03/04/06/10/13에는 요약 또는 참조만 유지<\/td><\/tr><tr><td>진엔딩 크레딧<\/td><td><code>11_진엔딩_크레딧_콘티_초안.md<\/code><\/td><td>05에는 방향 요약만 유지<\/td><\/tr><tr><td>D-Day 실제 스크립트<\/td><td><code>13_D-Day_스크립트_분할.md<\/code><\/td><td>10은 대본 정본, 13은 제작 단위 분할 정본<\/td><\/tr><tr><td>장소/배경 묘사<\/td><td><code>14_장소와_배경_묘사.md<\/code><\/td><td>장면 대본에는 필요한 만큼만 요약하고 배경 원화/AI 이미지 기준은 14를 우선<\/td><\/tr><tr><td>시스템 구현 상태<\/td><td><code>시스템/<\/code> 문서<\/td><td>스토리 문서에는 구현 세부를 과하게 넣지 않음<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"문서정본가이드-md-6-오래된-문서-삭제-기준\">6. 오래된 문서 삭제 기준<\/h3>\n<p>현재 삭제 대상 문서는 없다.<\/p>\n<p>아래 기준에 해당하면 역할 표시로 보존하지 않고, 최신 정본에 필요한 내용을 흡수한 뒤 삭제한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>처리<\/th><\/tr><\/thead><tbody><tr><td>최신 문서와 내용이 거의 같은 오래된 문서<\/td><td>최신 정본에 없는 내용만 옮긴 뒤 오래된 문서 삭제<\/td><\/tr><tr><td>상위 요약으로 유효한 문서<\/td><td><code>요약 인덱스<\/code>로 표시하고 상세 정본 링크 보강<\/td><\/tr><tr><td>생성물<\/td><td><code>직접 수정 금지<\/code> 표시 또는 README에서 생성물로 분류<\/td><\/tr><tr><td>실제로 불필요한 문서<\/td><td>링크/참조 여부 확인 후 삭제<\/td><\/tr><\/tbody><\/table><\/div>\n<p><code>스토리_컨셉.md<\/code>는 삭제 대상이 아니라 상위 요약 인덱스로 유지한다. 세부 정본은 <code>스토리/00~14<\/code> 문서다.<\/p>\n<h3 id=\"문서정본가이드-md-7-통합-웹-갱신-규칙\">7. 통합 웹 갱신 규칙<\/h3>\n<p>Markdown 원본을 수정한 뒤 아래 명령으로 통합 웹을 재생성한다.<\/p>\n<pre><code>python 기획/build_planning_web.py<\/code><\/pre>\n<p>검증 기준:<\/p>\n<ul>\n<li>생성 로그의 Markdown 문서 수 확인<\/li>\n<li>새 문서가 통합 웹 데이터에 포함되는지 확인<\/li>\n<li>Markdown 내부 링크 누락 여부 확인<\/li>\n<li><code>통합_기획서.html<\/code>은 직접 수정하지 않고 생성 결과만 커밋한다.<\/li>\n<\/ul>\n<h3 id=\"문서정본가이드-md-8-다음-정리-후보\">8. 다음 정리 후보<\/h3>\n<ol>\n<li>D+2 병실, D+3 방학식 컷신 문서가 추가되면 05와 06에는 요약만 남긴다.<\/li>\n<li>13의 스크립트 분할을 시스템 문서의 StoryFlow Scene/Branch/Transition 설계와 맞춘다.<\/li>\n<li>크레딧 콘티가 확정되면 11을 초안에서 확정 콘티 문서로 승격하거나 별도 확정본을 만든다.<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "기획 문서 정본 가이드", "id": "문서정본가이드-md-기획-문서-정본-가이드"}, {"level": 2, "text": "1. 문서 운용 원칙", "id": "문서정본가이드-md-1-문서-운용-원칙"}, {"level": 2, "text": "2. 최상위 문서 역할", "id": "문서정본가이드-md-2-최상위-문서-역할"}, {"level": 2, "text": "3. 스토리 정본 구조", "id": "문서정본가이드-md-3-스토리-정본-구조"}, {"level": 2, "text": "4. 시스템 정본 구조", "id": "문서정본가이드-md-4-시스템-정본-구조"}, {"level": 2, "text": "5. 중복 기준 정리", "id": "문서정본가이드-md-5-중복-기준-정리"}, {"level": 2, "text": "6. 오래된 문서 삭제 기준", "id": "문서정본가이드-md-6-오래된-문서-삭제-기준"}, {"level": 2, "text": "7. 통합 웹 갱신 규칙", "id": "문서정본가이드-md-7-통합-웹-갱신-규칙"}, {"level": 2, "text": "8. 다음 정리 후보", "id": "문서정본가이드-md-8-다음-정리-후보"}], "plain": "# 기획 문서 정본 가이드 이 문서는 `기획/` 아래 문서들의 역할과 정본 기준을 정리한다. 목표는 모든 내용을 하나의 거대한 Markdown에 합치는 것이 아니라, 원본 문서는 주제별로 분리하고 통합 웹은 읽기용 생성물로 유지하는 것이다. ## 1. 문서 운용 원칙 - Markdown 원본이 정본이다. - `통합_기획서.html`은 원본 Markdown을 모아 만든 읽기용 생성물이다. - 큰 방향은 README와 요약 문서에 두고, 세부 조건·대본·수치 기준은 전용 문서에 둔다. - 같은 내용을 여러 문서에 길게 복제하지 않는다. 중복이 필요한 경우 한 문서만 정본으로 두고 다른 문서는 링크와 요약만 둔다. - 오래된 문서가 최신 정본과 충돌하거나 중복되면 역할 표시로 남기지 말고, 링크/참조를 확인한 뒤 삭제하거나 최신 정본으로 흡수한다. ## 2. 최상위 문서 역할 | 문서 | 역할 | 정본 여부 | | --- | --- | --- | | [README](./README.md) | 기획 폴더 안내, 원본/생성물 구분, 빌드 방법 | 안내 정본 | | [스토리 컨셉](./스토리_컨셉.md) | 스토리 전체를 빠르게 읽기 위한 요약 인덱스 | 요약 문서. 세부 정본은 `스토리/` | | [문서 정본 가이드](./문서_정본_가이드.md) | 문서 운용 규칙과 오래된 문서 삭제 기준 | 운용 정본 | | [통합 기획서 웹 뷰](./통합_기획서.html) | 읽기/검색용 HTML | 생성물. 직접 수정 금지 | | [build_planning_web.py](./build_planning_web.py) | 통합 웹 생성 스크립트 | 도구 | ## 3. 스토리 정본 구조 스토리 문서는 `기획/스토리/` 아래 번호 순서로 관리한다. | 번호 | 문서 | 역할 | | --- | --- | --- | | 00 | [전체 스토리](./스토리/00_전체_스토리.md) | 진엔딩 기준 본편 전체를 소설형으로 읽는 정본 | | 01 | [스토리 컨셉 개요](./스토리/01_스토리_컨셉_개요.md) | 핵심 컨셉, 시간 구조, 오프닝, 현실 사고 개요 | | 02 | [캐릭터와 관계](./스토리/02_캐릭터와_관계.md) | 인물 성격 기준, 관계, 외형/이미지 생성 기준 | | 03 | [진행 구조와 진엔딩 조건](./스토리/03_진행구조_진엔딩조건.md) | 진엔딩 조건과 루프 구조의 상위 정리 | | 04 | [루트 세부 기획](./스토리/04_루트_세부기획.md) | 히로인별 루트, 플래그, 클라이맥스 연결 | | 예감.md\">D-2 말하지 못한 예감<\/a><\/li>\n<li><a href=\"./스토리/10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a><\/li>\n<li><a href=\"./스토리/11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a><\/li>\n<li><a href=\"./스토리/12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a><\/li>\n<li><a href=\"./스토리/13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a><\/li>\n<li><a href=\"./스토리/14_장소와_배경_묘사.md\">장소와 배경 묘사<\/a><\/li>\n<\/ul>\n<h3 id=\"스토리컨셉-md-문서-상태\">문서 상태<\/h3>\n<ul>\n<li>역할: 요약 인덱스<\/li>\n<li>세부 정본: <a href=\"./스토리/README.md\">스토리 기획 문서 안내<\/a>와 <code>스토리/00~14<\/code> 문서<\/li>\n<li>삭제 대상 아님: 상위 요약과 빠른 진입점으로 유지<\/li>\n<\/ul>\n<h3 id=\"스토리컨셉-md-현재-핵심\">현재 핵심<\/h3>\n<p>1학기 말 축제날 은하연을 지키려다 사고로 혼수상태에 빠진 고등학교 2학년 주인공 유재윤이, 미연시처럼 재구성된 내면세계에서 하연 등장 후 약 4주를 반복하며 은하연과 서로의 마음을 확인하고, 기존 관계에 남은 미련과 후회, 사고의 진실을 받아들이고 현실로 돌아가는 루프 로맨스 미스터리 비주얼노벨.<\/p>\n<p>첫 회차는 D-32 월요일에 시작해 기존 히로인 관계를 보여주는 1주 프롤로그를 거친다. D-25 월요일에 은하연이 2학년 5반으로 전학 오고, D-23 수요일에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공지한다. D-18 월요일에는 2학년 5반 반행사가 <code>쉬어가 카페<\/code>로 확정된다. 축제는 D-1 목요일 1일차와 D-Day 금요일 2일차의 이틀 구성으로 진행된다. 1일차는 부스 운영 중심으로 재윤과 하연이 <code>쉬어가 카페<\/code>를 함께 운영하며 가까워지고, 2일차는 부스 축소 운영 후 히로인들과 축제를 둘러보는 선택을 거쳐 폐장 후 사고로 이어진다. D-2에는 약속을 잡지 않고 하연이 조용한 곳에서 마음을 정리하는 사람이라는 예감만 남긴다. 하연 공략이 충분하면 D-Day 폐장 후 재윤이 하연의 동선을 알아차려 직접 찾아가고, 먼저 자기 마음과 선택을 말할 수 있는지가 분기의 핵심이 된다. D-Day 금요일 축제 2일차 후에는 주말을 지나 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 그 월요일에 도달하지 못하고 D-25 월요일로 되돌아간다.<\/p>\n<p>진엔딩에서는 금요일 밤 사고 이후 토요일을 표기하지 않고 일요일 오후 병실로 바로 점프한다. 재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못하다가, 일요일에 의식을 되찾고 D+3 월요일 방학식에 겨우 참석한다. 방학식 후에는 병원 재검사, 학교 도서관, 카페, 짧은 산책 같은 작은 다음 약속을 통해 하연과 재윤이 방학 동안 계속 만날 것을 암시하며, 음악과 짧은 애니메이션 컷이 들어간 엔딩 크레딧으로 여운을 남긴다.<\/p>\n<p>하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 하연이 있던 사고 기억을 온전히 떠올리지 못한다. 그 결과 축제 2일차 폐장 후, 자신이 누구에게 무엇을 말하려 했는지 모른 채 혼자 학교 뒤편 야외 소무대에 서고, 사고를 반복한 뒤 다시 D-25 월요일로 돌아간다.<\/p>\n<p>진엔딩 조건은 <code>하연과의 상호 마음 확인<\/code>, <code>기존 관계 정리<\/code>, <code>사고 단서 확보<\/code> 세 축이며, 핵심은 재윤이 미루던 선택과 기억을 끝까지 받아들이고 하연에게 먼저 말하러 가는 데 있다.<\/p>\n<h3 id=\"스토리컨셉-md-이야기의-핵심-질문\">이야기의 핵심 질문<\/h3>\n<p>이 이야기는 사고를 없던 일로 만드는 이야기가 아니다.<\/p>\n<p>재윤은 하연을 좋아했고, 하연 역시 그 마음을 전하려 했다. 하연 공략이 충분한 진엔딩 흐름에서 재윤은 폐장 후 하연이 조용한 소무대 쪽으로 향했음을 알아차려 직접 찾아가고, 그곳에서 먼저 마음을 말한다. 그 마음 때문에 축제 마지막 밤 두 사람은 소무대에서 마주했고, 재윤은 하연을 지키려다 다쳤다. 내면세계의 루프는 그 선택을 후회로 지우려는 마음과, 그래도 서로의 마음을 기억하고 돌아가려는 마음 사이에서 반복된다.<\/p>\n<p>루프가 끝나는 조건은 완벽하게 안전한 과거를 찾는 것이 아니라, 다친 기억까지 포함해 자신이 선택한 마음과 하연의 마음을 함께 받아들이는 것이다.<\/p>\n<p>핵심 주제문:<\/p>\n<blockquote>다치지 않은 과거로 돌아가는 이야기가 아니라, 다친 기억까지 안고도 자신이 선택한 마음을 인정하는 이야기.<\/blockquote>\n<p>또 다른 표현:<\/p>\n<blockquote>미룬 마음은 끝난 하루를 끝나게 하지 못한다.<\/blockquote>", "headings": [{"level": 1, "text": "스토리 컨셉 요약 인덱스", "id": "스토리컨셉-md-스토리-컨셉-요약-인덱스"}, {"level": 2, "text": "바로가기", "id": "스토리컨셉-md-바로가기"}, {"level": 2, "text": "문서 상태", "id": "스토리컨셉-md-문서-상태"}, {"level": 2, "text": "현재 핵심", "id": "스토리컨셉-md-현재-핵심"}, {"level": 2, "text": "이야기의 핵심 질문", "id": "스토리컨셉-md-이야기의-핵심-질문"}], "plain": "# 스토리 컨셉 요약 인덱스 이 문서는 전체 스토리를 빠르게 파악하기 위한 요약 인덱스다. 세부 정본은 `기획/스토리/` 아래 번호 문서를 따른다. 문서 역할과 오래된 문서 삭제 기준은 [기획 문서 정본 가이드](./문서_정본_가이드.md)를 기준으로 한다. 장소와 배경의 시각 기준은 [장소와 배경 묘사](./스토리/14_장소와_배경_묘사.md)를 따른다. ## 바로가기 - [스토리 기획 문서 안내](./스토리/README.md) - [전체 스토리](./스토리/00_전체_스토리.md) - [스토리 컨셉 개요](./스토리/01_스토리_컨셉_개요.md) - [캐릭터와 관계](./스토리/02_캐릭터와_관계.md) - [진행 구조와 진엔딩 조건](./스토리/03_진행구조_진엔딩조건.md) - [루트 세부 기획](./스토리/04_루트_세부기획.md) - [엔딩과 루프](./스토리/05_엔딩과_루프.md) - [날짜별 진행 달력](./스토리/06_날짜별_진행_달력.md) - [전체 스토리 외전: 실패 루프와 새드엔딩](./스토리/07_전체_스토리_외전_실패루프.md) - [D-3 관계 정리 클라이맥스](./스토리/08_D-3_관계정리_클라이맥스.md) - [D-2 말하지 못한 예감](./스토리/09_D-2_말하지_못한_예감.md) - [D-Day 축제 마지막 날 분기](./스토리/10_D-Day_축제마지막날_분기.md) - [진엔딩 크레딧 콘티 초안](./스토리/11_진엔딩_크레딧_콘티_초안.md) - [D-1/D-Day 조건 수치화](./스토리/12_D-1_D-Day_조건_수치화.md) - [D-Day 스크립트 분할](./스토리/13_D-Day_스크립트_분할.md) - [장소와 배경 묘사](./스토리/14_장소와_배경_묘사.md) ## 문서 상태 - 역할: 요약 인덱스 - 세부 정본: [스토리 기획 문서 안내](./스토리/README.md)와 `스토리/00~14` 문서 - 삭제 대상 아님: 상위 요약과 빠른 진입점으로 유지 ## 현재 핵심 1학기 말 축제날 은하연을 지키려다 사고로 혼수상태에 빠진 고등학교 2학년 주인공 유재윤이, 미연시처럼 재구성된 내면세계에서 하연 등장 후 약 4주를 반복하며 은하연과 서로의 마음을 확인하고, 기존 관계에 남은 미련과 후회, 사고의 진실을 받아들이고 현실로 돌아가는 루프 로맨스 미스터리 비주얼노벨. 첫 회차는 D-32 월요일에 시작해 기존 히로인 관계를 보여주는 1주 프롤로그를 거친다. D-25 월요일에 은하연이 2학년 5반으로 전학 오고, D-23 수요일에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공지한다. D-18 월요일에는 2학년 5반 반행사가 `쉬어가 카페`로 확정된다. 축제는 D-1 목요일 1일차와 D-Day 금요일 2일차의 이틀 구성으로 진행된다. 1일차는 부스 운영 중심으로 재윤과 하연이 `쉬어가 카페`를 함께 운영하며 가까워지고, 2일차는 부스 축소 운영 후 히로인들과 축제를 둘러보는 선택을 거쳐 폐장 후 사고로 이어진다. D-2에는 약속을 잡지 않고 하연이 조용한 곳에서 마음을 정리하는 사람이라는 예감만 남긴다. 하연 공략이 충분하면 D-Day 폐장 후 재윤이 하연의 동선을 알아차려 직접 찾아가고, 먼저 자기 마음과 선택을 말할 수 있는지가 분기의 핵심이 된다. D-Day 금요일 축제 2일차 후에는 주말을 지나 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 그 월요일에 도달하지 못하고 D-25 월요일로 되돌아간다. 진엔딩에서는 금요일 밤 사고 이후 토요일을 표기하지 않고 일요일 오후 병실로 바로 점프한다. 재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못하다가, 일요일에 의식을 되찾고 D+3 월요일 방학식에 겨우 참석한다. 방학식 후에는 병원 재검사, 학교 도서관, 카페, 짧은 산책 같은 작은 다음 약속을 통해 하연과 재윤이 방학 동안 계속 만날 것을 암시하며, 음악과 짧은 애니메이션 컷이 들어간 엔딩 크레딧으로 여운을 남긴다. 하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 하연이 있던 사고 기억을 온전히 떠올리지 못한다. 그 결과 축제 2일차 폐장 후, 자신이 누구에게 무엇을 말하려 했는지 모른 채 혼자 학교 뒤편 야외 소무대에 서고, 사고를 반복한 뒤 다시 D-25 월요일로 돌아간다. 진엔딩 조건은 `하연과의 상호 마음 확인`, `기존 관계 정리`, `사고 단서 확보` 세 축이며, 핵심은 재윤이 미루던 선택과 기억을 끝까지 받아들이고 하연에게 먼저 말하러 가는 데 있다. ## 이야기의 핵심 질문 이 이야기는 사고를 없던 일로 만드는 이야기가 아니다. 재윤은 하연을 좋아했고, 하연 역시 그 마음을 전하려 했다. 하연 공략이 충분한 진엔딩 흐름에서 재윤은 폐장 후 하연이 조용한 소무대 쪽으로 향했음을 알아차려 직접 찾아가고, 그곳에서 먼저 마음을 말한다. 그 마음 때문에 축제 마지막 밤 두 사람은 소무대에서 마주했고, 재윤은 하연을 지키려다 다쳤다. 내면세계의 루프는 그 선택을 후회로 지우려는 마음과, 그래도 서로의 마음을 기억하고 돌아가려는 마음 사이에서 반복된다. 루프가 끝나는 조건은 완벽하게 안전한 과거를 찾는 것이 아니라, 다친 기억까지 포함해 자신이 선택한 마음과 하연의 마음을 함께 받아들이는 것이다. 핵심 주제문: > 다치지 않은 과거로 돌아가는 이야기가 아니라, 다친 기억까지 안고도 자신이 선택한 마음을 인정하는 이야기. 또 다른 표현: > 미룬 마음은 끝난 하루를 끝나게 하지 못한다.", "excerpt": "# 스토리 컨셉 요약 인덱스 이 문서는 전체 스토리를 빠르게 파악하기 위한 요약 인덱스다. 세부 정본은 `기획/스토리/` 아래 번호 문서를 따른다. 문서 역할과 오래된 문서 삭제 기준은 [기획 문서 정본 가이드](./문서_정본_가이드.md)를 기준으로 한다. 장소와 배경의 시각 기준은 [장소와 배경 묘사](./스토리/14_장소와_배경_묘사.md)를 따른다. ## 바로가기 - [스토리 기획 문"}, {"path": "스토리/00_전체_스토리.md", "category": "스토리", "title": "전체 스토리", "id": "스토리-00전체스토리-md", "html": "<h2 id=\"스토리-00전체스토리-md-전체-스토리\">전체 스토리<\/h2>\n<p>이 문서는 게임의 진엔딩 정본을 기준으로 처음부터 끝까지 읽히는 본편 원고형 스토리다.<\/p>\n<p>세부 시스템, 날짜별 이벤트, 루트 조건은 다른 문서에서 관리하되, 플레이어가 최종적으로 도달해야 하는 이야기의 감정선과 사건 흐름은 이 문서를 기준으로 잡는다.<\/p>\n<p>실패 루프와 새드엔딩은 본편을 대체하지 않고, <a href=\"./07_전체_스토리_외전_실패루프.md\">전체 스토리 외전: 실패 루프와 새드엔딩<\/a>에서 짧은 외전 장면으로 다룬다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-프롤로그-끝나지-못한-금요일-밤\">프롤로그: 끝나지 못한 금요일 밤<\/h3>\n<p>축제 마지막 날 밤, 학교는 낮의 열기를 천천히 잃어가고 있었다.<\/p>\n<p>운동장 쪽에서 들리던 음악은 끊겼고, 공연을 보며 환호하던 학생들의 목소리도 어느새 먼 골목의 소음처럼 희미해졌다. 본관 현관 앞에는 반쯤 접힌 천막이 기대어 있었고, 쓰레기봉투 옆으로 굴러간 종이컵 하나가 바람에 밀려 느리게 움직였다. 게시판에 붙은 축제 안내문은 모서리가 들뜬 채 떨리고 있었다. 종일 학교 전체를 떠받치던 들뜬 공기가 빠져나가자, 교정에는 이상할 정도로 빈 공간이 많아졌다.<\/p>\n<p>2학년 5반의 <code>쉬어가 카페<\/code>도 문을 닫았다.<\/p>\n<p>낮 동안 손님들이 줄을 서던 교실은 조용했다. 책상 위에는 컵 받침 몇 장과 지우다 만 메뉴판이 남아 있었다. 칠판 한쪽에는 하연이 쓴 문구가 아직 지워지지 않았다.<\/p>\n<p>책상 네 개를 붙여 만든 임시 카운터는 한쪽 다리가 살짝 어긋나 있었고, 투명 테이프 끝은 말려 올라가 책상 모서리에 달라붙어 있었다. 손글씨 메뉴판 아래에는 누군가 급하게 그린 작은 커피잔 그림이 남아 있었다. 낮에는 그 모든 것이 어설퍼서 귀여웠지만, 폐장 후에는 끝난 하루의 흔적처럼 보였다.<\/p>\n<p><code>잠깐 쉬어가도 괜찮은 곳.<\/code><\/p>\n<p>유재윤은 그 문구 앞에서 잠시 멈췄다.<\/p>\n<p>오늘 하루, 그 문구는 수십 명의 학생들에게 농담처럼 읽혔고, 사진 배경처럼 쓰였고, 가벼운 칭찬을 들었다. 하지만 재윤에게는 하루가 끝날수록 다르게 보였다. 쉬어가는 곳. 머무는 곳이 아니라, 다시 걸어가기 위해 숨을 고르는 곳. 카페 문구가 아니라, 자신에게 하는 말처럼 느껴졌다.<\/p>\n<p>그는 교실 불을 끄지 않은 채 복도로 나왔다.<\/p>\n<p>복도는 낮과 달랐다. 축제 장식으로 붙인 종이 꽃 몇 개가 바닥에 떨어져 있었고, 창문 너머 운동장에는 아직 철거되지 않은 조명 몇 개가 점처럼 켜져 있었다. 재윤의 발소리가 복도에 울렸다. 이상하게도 그 소리는 너무 컸다. 누군가 뒤에서 자신을 부를 것 같아 몇 번이나 돌아보았지만, 복도에는 아무도 없었다.<\/p>\n<p>교실 번호판은 형광등 아래에서 희미하게 빛났고, 게시판에는 축제 포스터와 방학식 안내문이 겹쳐 붙어 있었다. 낮 동안 복도를 가득 채우던 학생들의 웃음소리는 빠져나갔는데, 테이프 자국과 떨어진 장식만 남아 축제가 실제로 있었음을 증명하고 있었다. 복도 끝 비상구 표시등은 지나치게 선명해서, 재윤은 자신이 지금 어디로든 도망칠 수 있는데도 그러지 않는다는 사실을 의식했다.<\/p>\n<p>아니, 아무도 없어야 했다.<\/p>\n<p>그런데 재윤은 알고 있었다. 자신이 지금 가야 할 곳에 누군가가 있다는 것을.<\/p>\n<p>학교 뒤편 야외 소무대.<\/p>\n<p>축제 동안 작은 공연과 안내 방송, 사진 촬영 장소로 쓰였던 곳이었다. 낮에는 학생들이 아무렇지 않게 올라가 포즈를 취했고, 누군가는 그늘에 앉아 음료를 마셨다. 그러나 밤이 되자 같은 공간이 전혀 다른 장소처럼 보였다. 무대 옆 임시 조명 프레임은 아직 철거되지 않았고, 검은 전선 몇 가닥이 바닥을 따라 느슨하게 놓여 있었다. 바람이 불 때마다 철제 지지대가 아주 작게 울었다.<\/p>\n<p>낮게 만든 단차는 어둠 속에서 평평한 바닥처럼 보였다가, 가까이 가면 갑자기 그림자를 만들었다. 출입 제한 표지는 무대 옆 박스에 기대어 있었고, 한쪽 모서리가 바람에 흔들릴 때마다 마른 종이 소리를 냈다. 이곳은 아름다운 고백 장소가 아니었다. 축제가 끝난 뒤 남은 장비와, 치우지 못한 위험과, 그래도 누군가는 마음을 꺼내기 위해 찾아올 만큼 조용한 가장자리가 함께 있는 장소였다.<\/p>\n<p>재윤은 숨을 들이마셨다.<\/p>\n<p>그곳에 은하연이 서 있었다.<\/p>\n<p>하연은 무대 가장자리에서 운동장 쪽을 보고 있었다. 얇은 가디건이 밤바람에 흔들렸다. 낮 동안 하연은 카페 안에서 거의 웃지 않았지만, 손님이 문구를 칭찬할 때마다 아주 작게 눈을 내렸다. 축제 둘째 날 오후, 함께 부스를 빠져나와 운동장을 걸을 때도 하연은 뭔가를 말하려다 여러 번 멈췄다. 재윤도 그때마다 같은 얼굴이 되었을 것이다.<\/p>\n<p>두 사람 모두 오늘이 끝나기 전 반드시 해야 할 말이 있다는 것을 알고 있었다.<\/p>\n<p>하연이 먼저 돌아보았다.<\/p>\n<blockquote>왔네.<\/blockquote>\n<p>평범한 인사였다. 하지만 재윤에게는 하루 종일 기다린 문장처럼 들렸다.<\/p>\n<blockquote>응.<\/blockquote>\n<p>재윤은 대답하고도 한참 말을 잇지 못했다. 목 안쪽이 말라 있었다. 고백을 하려고 이곳에 온 것인지, 확인을 하려고 온 것인지, 아니면 이미 정해진 장면 속으로 걸어 들어온 것인지 스스로도 알 수 없었다.<\/p>\n<p>하연은 재윤의 침묵을 재촉하지 않았다. 그녀는 늘 그랬다. 쉽게 다가오지 않았고, 쉽게 밀어내지도 않았다. 하연의 거리감은 차가움이 아니라 속도에 가까웠다. 재윤이 그 속도를 이해하기까지 거의 한 달이 걸렸다.<\/p>\n<blockquote>어제 말한 거.<\/blockquote>\n<p>하연이 조용히 입을 열었다.<\/p>\n<blockquote>오늘, 네가 어디로 갔는지 내가 알 것 같았어.<\/blockquote>\n<blockquote>응.<\/blockquote>\n<p>재윤은 손끝에 힘을 주었다.<\/p>\n<p>그는 그 한 달을 떠올렸다. D-25 월요일, 하연이 교실 문을 열고 들어오던 순간. D-23 수요일, 칠판에 축제와 방학식 일정이 적히던 순간. D-18 월요일, <code>쉬어가 카페<\/code>라는 이름이 정해지던 순간. 축제 내내 하연이 시끄러운 곳보다 조용한 가장자리를 바라보던 순간들. 모든 장면이 이 밤으로 이어지고 있었다.<\/p>\n<p>그리고 동시에 다른 장면들도 떠올랐다.<\/p>\n<p>소하와 걸었던 오래된 등굣길. 서린이 내밀었던 점검표. 미루가 놓지 못하던 옷자락. 재윤이 숨을 수 있었던 세 개의 길. 그 길들은 모두 다정했지만, 결국 이곳을 피해 가는 길이었다.<\/p>\n<p>이번에는 피하지 않아야 했다.<\/p>\n<p>재윤은 하연을 바라보았다.<\/p>\n<blockquote>나, 너한테 할 말 있어.<\/blockquote>\n<p>하연의 눈이 흔들렸다. 놀란 얼굴은 아니었다. 기다리던 말이 드디어 도착했을 때의 얼굴이었다.<\/p>\n<blockquote>처음 봤을 때부터 이상했어. 처음 보는 사람인데, 계속 알고 있던 사람 같았고. 말 걸고 싶은데, 너무 빨리 다가가면 네가 멀어질 것 같아서 기다리는 척했어. 사실은 기다린 게 아니라 계속 미룬 건데.<\/blockquote>\n<p>하연은 아무 말도 하지 않았다. 하지만 시선을 피하지 않았다.<\/p>\n<blockquote>축제 준비 끝나면 말해야지. 카페 이름 정해지면 말해야지. 첫날 끝나면 말해야지. 오늘 낮에 말해야지. 그렇게 계속 넘겼어. 근데 지금도 넘기면… 난 또 아무것도 못 할 것 같아.<\/blockquote>\n<p>재윤은 숨을 삼켰다.<\/p>\n<blockquote>좋아해. 은하연.<\/blockquote>\n<p>하연의 얼굴이 무너질 듯 부드러워졌다.<\/p>\n<p>그녀는 잠깐 입술을 열었다가 닫았다. 짧은 침묵이 두 사람 사이에 내려앉았다. 재윤은 그 침묵이 무서웠다. 그러나 이번에는 도망치지 않았다.<\/p>\n<p>하연은 말했다.<\/p>\n<blockquote>나도.<\/blockquote>\n<p>그 말은 낮았다. 밤바람에 섞이면 사라질 만큼 작았다. 그러나 재윤은 분명히 들었다.<\/p>\n<blockquote>나도 말하려고 했어. 오늘. 네가 먼저 말 안 했으면, 또 조금 늦었을지도 몰라. 그래도... 없던 말로 만들고 싶진 않았어.<\/blockquote>\n<p>재윤은 웃을 뻔했다. 울 뻔하기도 했다. 한 달 동안 미뤄온 말이 이렇게 짧은 대답으로 돌아왔다는 것이 믿기지 않았다.<\/p>\n<p>그때 금속이 흔들리는 소리가 났다.<\/p>\n<p>처음에는 바람이 지지대를 스치는 소리 같았다. 그러나 곧 쇠가 비틀리는 둔한 울림이 뒤따랐다. 하연이 먼저 고개를 돌렸다. 재윤도 같은 방향을 보았다. 임시 조명 프레임의 한쪽이 기울고 있었다. 바닥에 놓인 고정끈 하나가 풀려 있었고, 무대 옆 그림자가 하연 쪽으로 빠르게 넘어왔다.<\/p>\n<p>생각할 시간은 없었다.<\/p>\n<p>재윤은 하연의 이름을 부르려 했다. 그러나 몸이 먼저 움직였다. 그는 하연을 밀어냈다. 하연의 눈이 커졌다. 그녀가 무언가를 외쳤다. 아마 재윤의 이름이었을 것이다.<\/p>\n<p>다음 순간, 소리가 모든 것을 덮었다.<\/p>\n<p>철제 지지대가 바닥을 때렸다. 무대의 나무판이 울렸다. 재윤은 어깨와 옆구리에 둔한 충격을 느꼈고, 시야가 아래로 무너졌다. 하연이 손을 뻗고 있었다. 재윤은 그 손을 잡으려 했지만, 손끝이 닿기 전에 어둠이 밀려왔다.<\/p>\n<p>큰 외상은 없었다.<\/p>\n<p>훗날 의사는 그렇게 말했다. 검사상 심각한 손상은 발견되지 않는다고. 찰과상과 타박상, 일시적 충격 외에는 설명할 것이 많지 않다고.<\/p>\n<p>하지만 재윤은 깨어나지 않았다.<\/p>\n<p>하연은 현실에 남았다. 병실 밖 의자에 앉아, 자신이 그 밤에 재윤을 불렀다는 사실을 몇 번이고 되짚었다. 소하는 화를 냈고, 서린은 조용히 수첩을 닫았고, 미루는 복도 끝에서 울었다.<\/p>\n<p>병원 복도는 학교 복도와 달리 지나치게 깨끗했다. 안내 표지판은 모든 길을 정확히 가리키고 있었지만, 하연에게 필요한 방향은 어디에도 적혀 있지 않았다. 병실 문 옆의 작은 이름표와 보호자용 접이 의자, 반쯤 식은 종이컵 물만이 토요일이 실제로 흘러가고 있음을 보여주었다.<\/p>\n<p>재윤의 의식은 그 모든 목소리에서 멀어졌다.<\/p>\n<p>그는 끝났어야 할 금요일 밤에서 빠져나오지 못한 채, 자기 마음이 만든 학교로 떨어졌다.<\/p>\n<p>그리고 그 세계에서, 이야기는 훨씬 더 이른 월요일부터 다시 시작되었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-1장-d-32-평범한-시작을-가장한-세계\">1장: D-32, 평범한 시작을 가장한 세계<\/h3>\n<p>재윤은 책상 위에 엎드린 채 눈을 떴다.<\/p>\n<p>처음 느낀 것은 햇빛이었다. 여름방학을 앞둔 교실 특유의 눅눅한 빛이 창문을 지나 책상 위로 쏟아져 있었다. 두 번째로 느낀 것은 소음이었다. 누군가는 수행평가를 욕했고, 누군가는 축제가 언제냐고 물었고, 뒤쪽에서는 의자를 끄는 소리가 났다.<\/p>\n<p>칠판에는 지난주에 지우다 만 공식과 담임이 적어 둔 제출물 마감일이 희미하게 남아 있었다. 교실 뒤 게시판에는 아직 축제와 관계없는 수행평가 안내문이 더 많았고, 창가 커튼은 눅눅한 여름빛을 머금은 채 느리게 흔들렸다. 너무 평범한 교실이라서, 방금 전까지 들었던 금속음이 더 꿈처럼 느껴졌다.<\/p>\n<p>병실도, 소독약 냄새도, 하연의 울음도 없었다.<\/p>\n<blockquote>야, 유재윤. 또 잤냐?<\/blockquote>\n<p>한소하가 앞자리 책상을 두드렸다.<\/p>\n<p>소하는 언제나처럼 익숙했다. 짧게 묶은 머리, 장난기 많은 눈, 오래 알고 지낸 사람만이 가질 수 있는 무례할 만큼 편한 말투. 그녀의 존재는 재윤에게 설명이 필요 없는 일상이었다.<\/p>\n<p>재윤은 멍하니 소하를 보았다.<\/p>\n<blockquote>왜 그렇게 봐? 꿈이라도 꿨어?<\/blockquote>\n<blockquote>꿈…<\/blockquote>\n<p>입 안에서 말이 굴렀다. 꿈. 뭔가 꾼 것 같았다. 밤, 무대, 누군가의 손, 금속이 부딪히는 소리. 그러나 기억은 물에 젖은 종이처럼 쉽게 찢어졌다.<\/p>\n<blockquote>모르겠어. 이상한 꿈이었던 것 같은데.<\/blockquote>\n<p>소하는 어이없다는 듯 웃었다.<\/p>\n<blockquote>너 맨날 이상한 꿈 꾸잖아. 가자. 매점 줄 길어지기 전에.<\/blockquote>\n<p>그렇게 D-32 월요일이 시작되었다.<\/p>\n<p>처음 하루는 지나치게 자연스러웠다. 국어 시간에는 선생님이 기말 수행평가를 언급했고, 점심시간에는 소하가 급식의 미묘한 국 맛을 두고 과장되게 불평했다. 재윤은 그 불평에 맞장구를 치며 웃었다. 웃음은 쉽게 나왔다. 몸은 조금 무거웠지만, 잠을 설쳤기 때문이라고 생각했다.<\/p>\n<p>방과후에는 백서린과 마주쳤다.<\/p>\n<p>서린은 복도 끝 게시판 앞에서 프린트 몇 장을 정리하고 있었다. 아직 축제 준비가 본격화되기도 전인데, 그녀의 손에는 이미 일정표처럼 보이는 종이가 들려 있었다. 서린은 2학년 학생회 업무와 방송실 보조를 동시에 맡고 있었다. 정확히 말하면, 남들이 느슨하게 맡긴 일을 결국 서린이 정확하게 정리하는 구조였다.<\/p>\n<p>게시판 주변에는 삐뚤게 붙은 공지와 오래된 테이프 자국이 많았지만, 서린이 손댄 종이만은 모서리가 정확히 맞았다. 그녀의 클립보드에는 반별 연락망, 방송실 사용 시간표, 아직 빈칸이 많은 축제 준비 표가 차례로 끼워져 있었다. 복도는 학생들이 지나가며 어수선했지만, 서린 주변의 작은 반경만큼은 임시 사무실처럼 정돈되어 있었다.<\/p>\n<blockquote>벌써 뭐 해?<\/blockquote>\n<p>재윤이 묻자 서린은 고개도 들지 않고 대답했다.<\/p>\n<blockquote>축제 관련 공지 초안.<\/blockquote>\n<blockquote>아직 멀지 않았어?<\/blockquote>\n<blockquote>멀었다고 생각할 때 시작해야 겨우 맞춰.<\/blockquote>\n<p>서린은 펜으로 줄을 그었다. 그녀의 글씨는 성격처럼 단정했다. 한 치의 흔들림 없이 필요한 정보만 남기는 글씨.<\/p>\n<blockquote>너도 나중에 반행사 정해지면 대충 하지 마.<\/blockquote>\n<blockquote>내가 언제 대충 했다고.<\/blockquote>\n<p>서린은 그제야 재윤을 보았다.<\/p>\n<blockquote>지금 그 질문을 진심으로 한 거면 더 문제야.<\/blockquote>\n<p>재윤은 웃었다. 서린의 말은 날카로웠지만, 그 안에는 이상한 안정감이 있었다. 그녀와 있으면 세계가 정돈되는 느낌이었다. 해야 할 일과 하지 말아야 할 일, 가야 할 곳과 피해야 할 곳이 명확해졌다.<\/p>\n<p>나미루를 만난 것은 그날 저녁 무렵이었다.<\/p>\n<p>미루는 1학년 교실 앞 복도에서 재윤을 기다리고 있었다. 두 손으로 노트를 꼭 쥔 채, 지나가는 선배들을 피해 벽 쪽에 붙어 있었다. 재윤을 발견하자 얼굴이 조금 밝아졌다.<\/p>\n<p>미루가 선 자리 옆에는 분실물 상자와 낡은 벤치가 있었다. 벤치 위에는 누군가 놓고 간 체육복 주머니와 구겨진 안내문이 있었고, 복도 문틈으로는 1학년 교실의 떠드는 소리가 새어 나왔다. 미루는 그 소리 안으로 들어가기보다, 문밖에서 먼저 확인받을 사람을 기다리는 쪽에 더 익숙해 보였다.<\/p>\n<blockquote>선배.<\/blockquote>\n<blockquote>또 뭐 놓쳤어?<\/blockquote>\n<blockquote>놓친 건 아니고요. 놓치기 전에 물어보는 거예요.<\/blockquote>\n<p>미루는 노트를 펼쳤다. 수행평가 일정, 발표 준비, 제출물 마감일, 봉사활동 신청 가능 기간이 빼곡히 적혀 있었다. 재윤은 한숨을 쉬는 척했지만, 옆 벤치에 앉아 펜을 들었다.<\/p>\n<blockquote>일단 날짜순으로 다시 써. 네가 보기 편하게. 그리고 이건 담임한테 확인하고, 이건 친구랑 같이 하면 되고.<\/blockquote>\n<p>미루는 고개를 열심히 끄덕였다.<\/p>\n<blockquote>선배가 있으면 좀 괜찮아져요.<\/blockquote>\n<p>그 말은 재윤을 기쁘게 했다. 소하의 익숙함, 서린의 정확함과는 다른 종류의 감각이었다. 누군가에게 자신이 필요하다는 느낌. 그것은 사람을 쉽게 붙잡는다.<\/p>\n<p>D-32부터 D-26까지의 일주일은 그렇게 흘렀다.<\/p>\n<p>낮에는 평범했다. 소하와 등교하고, 서린에게 잔소리를 듣고, 미루의 노트를 정리해 주었다. 축제 이야기는 아직 멀리 있었고, 방학식은 더 멀리 있었다. 재윤은 그 일주일이 편했다. 너무 편해서, 자신이 왜 매일 밤 같은 꿈을 꾸는지 깊이 생각하지 않았다.<\/p>\n<p>꿈속에서 재윤은 늘 어두운 곳에 있었다.<\/p>\n<p>누군가가 그를 불렀다.<\/p>\n<blockquote>재윤아.<\/blockquote>\n<p>목소리는 가까웠다. 그런데 얼굴은 보이지 않았다. 손을 뻗으면 금속이 부딪히는 소리가 났고, 바닥이 기울었다. 재윤은 누군가를 밀어내려 했던 것 같았다. 아니, 붙잡으려 했던 것 같기도 했다.<\/p>\n<p>눈을 뜨면 아침이었다.<\/p>\n<p>소하는 매번 말했다.<\/p>\n<blockquote>또 멍하네. 너 요즘 진짜 이상해.<\/blockquote>\n<p>재윤은 웃고 넘겼다.<\/p>\n<blockquote>잠을 못 잤나 봐.<\/blockquote>\n<p>하지만 D-25 월요일 아침, 꿈속에서 들리던 목소리가 교실 문 앞에 섰다.<\/p>\n<h4 id=\"스토리-00전체스토리-md-첫-번째-일주일의-균열\">첫 번째 일주일의 균열<\/h4>\n<p>D-31 화요일 아침, 재윤은 꿈에서 깬 직후 한동안 손바닥을 내려다보았다.<\/p>\n<p>무언가를 놓친 감각이 남아 있었다. 꿈속에서 누군가가 손을 뻗었고, 자신도 손을 뻗었다. 그러나 닿기 직전 금속이 부딪히는 소리가 났다. 그 소리가 너무 선명해서, 눈을 뜬 뒤에도 귓속에 남았다.<\/p>\n<p>소하는 등굣길에서 그를 보자마자 말했다.<\/p>\n<blockquote>너 오늘도 이상하다.<\/blockquote>\n<blockquote>내가 원래 좀 이상하긴 하지.<\/blockquote>\n<blockquote>농담으로 넘기지 말고. 얼굴이 꼭 어디 맞고 온 사람 같아.<\/blockquote>\n<p>재윤은 웃어넘기려 했지만, 소하의 말에 이상하게 가슴이 철렁했다. 맞고 온 사람. 다친 사람. 그런 단어가 낯설지 않았다.<\/p>\n<blockquote>잠을 잘못 잤나 봐.<\/blockquote>\n<blockquote>병원 가볼래?<\/blockquote>\n<blockquote>꿈 때문에 병원을 왜 가.<\/blockquote>\n<p>소하는 더 묻지 않았다. 대신 편의점에 들러 우유 대신 이온음료를 사서 재윤에게 던졌다.<\/p>\n<blockquote>마셔. 꿈에서 얻어맞았으면 수분 보충이라도 해.<\/blockquote>\n<p>그런 식의 다정함이 소하였다. 걱정한다는 말을 하지 않고, 툴툴대며 필요한 것을 챙겨주는 사람.<\/p>\n<p>D-30 수요일에는 서린과 처음으로 축제 예비 회의에 끌려갔다. 아직 반행사도 정해지지 않은 시점이었지만, 서린은 이미 작년 축제에서 문제가 되었던 사례를 정리해 두었다. 전기선이 복도에 노출되었던 일, 공연 장비 반납이 늦어진 일, 임시 구조물을 폐장 후까지 방치했던 일.<\/p>\n<p>재윤은 종이를 넘기다 <code>임시 구조물<\/code>이라는 단어에서 손을 멈췄다.<\/p>\n<blockquote>왜?<\/blockquote>\n<p>서린이 물었다.<\/p>\n<blockquote>아니. 그냥.<\/blockquote>\n<blockquote>그냥 멈춘 얼굴이 아닌데.<\/blockquote>\n<p>재윤은 대답하지 못했다. 종이 위의 글자가 잠깐 흔들리는 것처럼 보였다. 임시 구조물. 철제 지지대. 폐장 후 철거. 아직 일어나지 않은 일인데, 어딘가 이미 지나간 일처럼 느껴졌다.<\/p>\n<p>D-29 목요일, 미루는 처음으로 축제 도움 인원 이야기를 꺼냈다.<\/p>\n<blockquote>선배, 저도 뭔가 해보고 싶은데요.<\/blockquote>\n<blockquote>갑자기?<\/blockquote>\n<blockquote>갑자기 아니에요. 계속 생각했어요.<\/blockquote>\n<p>미루는 노트 모서리를 만지작거렸다. 그녀는 항상 질문하기 전에 먼저 미안해했다. 물어보는 것 자체가 폐가 될까 봐 겁내는 사람처럼.<\/p>\n<blockquote>선배가 도와줘서 여기까지 왔잖아요. 근데 계속 도움만 받으면, 방학식 지나고 나서 제가 너무… 아무것도 못 하는 사람 같을까 봐요.<\/blockquote>\n<p>재윤은 미루를 놀릴 수 없었다.<\/p>\n<blockquote>아무것도 못 하는 사람은 아니지.<\/blockquote>\n<blockquote>선배가 있으니까 그런 척 가능한 거 아닐까요?<\/blockquote>\n<p>그 말은 생각보다 깊었다. 재윤은 미루가 단순히 의존적인 후배라고만 생각했던 자신을 조금 부끄럽게 여겼다.<\/p>\n<p>D-28 금요일에는 세 사람이 이상하게 한 장면에 모였다.<\/p>\n<p>소하는 재윤에게 매점에 가자고 했고, 서린은 재윤을 불러 반별 축제 아이디어 후보를 나눠주었고, 미루는 도움 인원 모집 공지가 언제 나는지 물으러 왔다. 재윤은 세 방향에서 동시에 이름이 불리자 웃었다.<\/p>\n<blockquote>나 인기 많네.<\/blockquote>\n<p>소하가 바로 받아쳤다.<\/p>\n<blockquote>착각은 자유지.<\/blockquote>\n<p>서린은 한숨을 쉬었다.<\/p>\n<blockquote>한 명씩 처리해. 동시에 하려다 다 놓치지 말고.<\/blockquote>\n<p>미루는 작은 목소리로 말했다.<\/p>\n<blockquote>저는 나중에 와도 돼요.<\/blockquote>\n<p>그 순간 재윤은 세 사람의 차이를 보았다. 소하는 당연히 옆에 있는 사람처럼 굴었고, 서린은 해야 할 일을 놓치지 말라고 말했다. 미루는 먼저 물러서려 했다.<\/p>\n<p>그때는 몰랐다. 세 사람이 모두, 나중에 자신이 넘어야 할 마음의 모양이라는 것을.<\/p>\n<p>D-27 토요일과 D-26 일요일은 조용히 지나갔다. 겉으로는 평범한 주말이었다. 하지만 재윤은 잠들 때마다 같은 목소리를 들었다. 점점 더 또렷해지는 목소리.<\/p>\n<blockquote>재윤아.<\/blockquote>\n<p>이름을 부르는 목소리는 울고 있었다.<\/p>\n<p>재윤은 꿈속에서 묻고 싶었다. 너는 누구냐고. 왜 나를 그렇게 부르냐고. 그런데 입을 열면 물 대신 어둠이 밀려들었다.<\/p>\n<p>그리고 월요일, 그 목소리는 이름을 가지고 교실에 들어왔다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-2장-전학생-은하연\">2장: 전학생 은하연<\/h3>\n<p>담임은 평소보다 조금 들뜬 얼굴로 교실에 들어왔다.<\/p>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>교실이 술렁였다. 1학기 말에 전학생이라니, 애매한 시기였다. 곧 축제고, 곧 방학식이었다. 누군가는 불쌍하다고 했고, 누군가는 얼굴 예쁘면 좋겠다고 했다. 소하는 별 관심 없는 척했지만, 재윤은 이상하게 가슴이 답답해졌다.<\/p>\n<p>창밖 운동장은 평범하게 밝았고, 교실 안에는 여름 특유의 축축한 공기와 학생들의 작은 기대감이 뒤섞여 있었다. 칠판 아래 분필가루, 책상 위 문제집, 뒤 게시판의 방학식 공지까지 모든 것이 늘 있던 그대로였는데, 문이 열리기 직전 교실의 공기만 아주 잠깐 낮아졌다.<\/p>\n<p>문이 열렸다.<\/p>\n<p>은하연이 들어왔다.<\/p>\n<p>재윤은 숨을 쉬는 법을 잠깐 잊었다.<\/p>\n<p>하연은 긴 자기소개를 하지 않았다. 칠판 앞에 서서 담임이 이름을 적는 동안 조용히 기다렸다. 교실 안의 시선이 자신에게 모였는데도 크게 흔들리지 않았다. 그렇다고 무심한 얼굴도 아니었다. 마치 낯선 곳에 들어왔지만, 어딘가에서는 이미 이 장면을 본 적이 있다는 듯한 눈이었다.<\/p>\n<p>담임이 말했다.<\/p>\n<blockquote>자리 저쪽 창가 괜찮지?<\/blockquote>\n<p>하연은 고개를 끄덕였다.<\/p>\n<p>그리고 교실을 훑던 시선이 재윤에게 닿았다.<\/p>\n<p>가슴 한쪽이 아팠다.<\/p>\n<p>처음 보는 사람이어야 했다. 그런데 그럴 수가 없었다. 재윤은 그녀의 목소리를 알고 있는 것 같았다. 꿈속에서 자신을 부르던 목소리, 어둠 속에서 붙잡지 못한 손, 금속이 부딪히는 소리 사이로 끊기던 이름.<\/p>\n<blockquote>은하연입니다. 잘 부탁해.<\/blockquote>\n<p>그 한마디가 끝나자 교실은 다시 평범해졌다. 누군가는 작게 박수를 쳤고, 누군가는 옆 친구에게 귓속말을 했다. 그러나 재윤의 시간만 잠깐 멈춰 있었다.<\/p>\n<p>소하가 옆에서 팔꿈치로 찔렀다.<\/p>\n<blockquote>야.<\/blockquote>\n<blockquote>왜.<\/blockquote>\n<blockquote>왜 그렇게 봐?<\/blockquote>\n<blockquote>내가?<\/blockquote>\n<blockquote>응. 엄청 티 나.<\/blockquote>\n<p>재윤은 대답하지 못했다.<\/p>\n<p>점심시간, 하연은 혼자 있었다.<\/p>\n<p>전학생에게 말을 걸려는 학생들은 많았지만, 하연은 필요한 대답만 하고 다시 조용해졌다. 재윤은 도시락 뚜껑을 열었다 닫았다 하며 망설였다. 소하는 그런 재윤을 한동안 보다가 젓가락을 내려놓았다.<\/p>\n<blockquote>갈 거면 가.<\/blockquote>\n<blockquote>뭐?<\/blockquote>\n<blockquote>신경 쓰이잖아.<\/blockquote>\n<blockquote>아니, 그냥 전학생이니까.<\/blockquote>\n<p>소하는 눈을 가늘게 떴다.<\/p>\n<blockquote>네가 그렇게 변명할 때는 보통 진짜야.<\/blockquote>\n<p>재윤은 결국 자리에서 일어났다.<\/p>\n<p>하연의 책상 앞에 섰을 때, 하연이 먼저 고개를 들었다.<\/p>\n<blockquote>유재윤.<\/blockquote>\n<p>재윤은 놀랐다.<\/p>\n<blockquote>내 이름 알아?<\/blockquote>\n<blockquote>아까 출석 부를 때 들었어.<\/blockquote>\n<blockquote>아.<\/blockquote>\n<p>당연한 대답이었다. 그런데 재윤은 이상하게 실망했다. 혹시 하연도 자신을 어디선가 본 적 있다고 말해주길 기대했던 것 같다.<\/p>\n<blockquote>학교는 좀 어때?<\/blockquote>\n<p>하연은 잠깐 생각했다.<\/p>\n<blockquote>아직 모르겠어.<\/blockquote>\n<blockquote>그렇지. 첫날이니까.<\/blockquote>\n<p>짧은 침묵이 생겼다. 재윤은 무엇을 더 말해야 할지 몰랐다. 평소라면 아무 말이나 했을 텐데, 하연 앞에서는 말이 쉽게 나오지 않았다.<\/p>\n<p>하연이 먼저 입을 열었다.<\/p>\n<blockquote>근데…<\/blockquote>\n<p>그리고 멈췄다.<\/p>\n<blockquote>뭔데?<\/blockquote>\n<p>하연은 시선을 내렸다.<\/p>\n<blockquote>아니야.<\/blockquote>\n<p>대화는 거기서 끝났다.<\/p>\n<p>너무 짧고 어색해서 아무것도 아닌 장면처럼 보였다. 하지만 재윤은 그날 밤까지 하연의 <code>아니야<\/code>를 떠올렸다. 말하려다 멈춘 사람의 얼굴. 자신과 닮아 있었다.<\/p>\n<p>다음 날, 재윤은 복도 창가에서 하연을 다시 만났다.<\/p>\n<p>하연은 운동장 쪽을 보고 있었다. 아직 축제 준비가 시작되지 않은 운동장은 평범했다. 학생 몇 명이 공을 차고 있었고, 햇빛은 하얗게 바닥을 덮고 있었다.<\/p>\n<p>복도 창틀에는 오래된 먼지가 얇게 앉아 있었고, 유리 너머 운동장 가장자리에는 아직 아무 장식도 세워지지 않았다. 하연은 떠드는 학생들이 있는 중앙이 아니라, 운동장 끝과 학교 뒤편으로 이어지는 조용한 선을 보고 있었다. 재윤은 그때는 몰랐지만, 하연의 시선은 언제나 사람이 몰리는 중심보다 숨을 고를 수 있는 가장자리를 먼저 찾았다.<\/p>\n<p>재윤은 옆에 섰다.<\/p>\n<blockquote>어제 하려던 말.<\/blockquote>\n<p>하연이 돌아보았다.<\/p>\n<blockquote>무슨 말?<\/blockquote>\n<blockquote>근데… 하고 말았잖아.<\/blockquote>\n<p>하연은 조금 놀란 듯했다. 누군가 자신의 멈춘 말을 기억하고 있을 거라고 생각하지 못한 얼굴이었다.<\/p>\n<blockquote>별거 아니야.<\/blockquote>\n<blockquote>별거 아니면 말해도 되잖아.<\/blockquote>\n<p>하연은 창밖으로 시선을 돌렸다.<\/p>\n<blockquote>여기, 처음 온 것 같지가 않아서.<\/blockquote>\n<p>재윤은 아무 말도 못 했다.<\/p>\n<p>하연이 작게 웃었다.<\/p>\n<blockquote>이상하지?<\/blockquote>\n<p>재윤은 천천히 고개를 저었다.<\/p>\n<blockquote>아니. 나도 그래.<\/blockquote>\n<p>두 사람은 그 뒤로 한동안 말하지 않았다. 하지만 그 침묵은 첫날의 어색함과 달랐다. 서로가 같은 이상함을 느끼고 있다는 사실만으로, 아주 얇은 실 하나가 두 사람 사이에 걸린 것 같았다.<\/p>\n<p>그날 이후 재윤은 하연에게 조금씩 말을 걸었다.<\/p>\n<p>하연은 빠르게 가까워지는 사람이 아니었다. 재윤이 한꺼번에 다가가면 물러섰고, 재윤이 기다리면 조금 다가왔다. 좋아하는 음식도, 전 학교 이야기도, 왜 이 시기에 전학을 왔는지도 쉽게 말하지 않았다. 대신 사소한 것을 기억했다. 재윤이 우유를 잘 마시지 않는다는 것, 소하와 말할 때 표정이 편하다는 것, 서린 앞에서는 괜히 장난을 치지만 결국 말을 잘 듣는다는 것.<\/p>\n<p>어느 날 하연이 말했다.<\/p>\n<blockquote>너는 사람마다 얼굴이 다르네.<\/blockquote>\n<blockquote>그거 욕이야?<\/blockquote>\n<blockquote>아니. 그냥 신기해서.<\/blockquote>\n<blockquote>네 앞에서는 어떤데?<\/blockquote>\n<p>하연은 대답하지 않았다.<\/p>\n<p>재윤은 그 침묵을 오래 기억했다.<\/p>\n<h4 id=\"스토리-00전체스토리-md-하연의-속도\">하연의 속도<\/h4>\n<p>하연과 가까워지는 일은 공략처럼 진행되지 않았다.<\/p>\n<p>재윤이 말을 걸면 하연은 대답했다. 하지만 대답이 끝나면 다시 조용해졌다. 좋아하는 것을 물으면 <code>조용한 곳<\/code>이라고 했고, 싫어하는 것을 물으면 <code>너무 시끄러운 것<\/code>이라고 했다. 전 학교 이야기를 꺼내면 잠깐 멈췄고, 가족 이야기는 거의 하지 않았다.<\/p>\n<p>재윤은 처음엔 그 거리감이 답답했다.<\/p>\n<blockquote>너는 원래 이렇게 말 아껴?<\/blockquote>\n<p>어느 날 재윤이 묻자, 하연은 책을 덮으며 대답했다.<\/p>\n<blockquote>말 많이 하면 가까워져?<\/blockquote>\n<blockquote>꼭 그런 건 아니지만.<\/blockquote>\n<blockquote>그럼 조금씩 해도 되잖아.<\/blockquote>\n<p>그 말에 재윤은 반박하지 못했다.<\/p>\n<p>D-24 화요일 방과후, 두 사람은 처음으로 같이 운동장을 돌았다. 하연은 새 학교의 구조를 아직 헷갈려했고, 재윤은 자연스럽게 안내를 자처했다.<\/p>\n<blockquote>여기가 방송실 있는 쪽. 저쪽은 학생회실. 운동장 뒤로 가면 작은 무대가 있는데, 축제 때 공연 같은 거 할 거야.<\/blockquote>\n<p>재윤은 무심코 소무대 쪽을 가리켰다.<\/p>\n<p>그 순간 하연이 멈췄다.<\/p>\n<blockquote>왜?<\/blockquote>\n<blockquote>아니.<\/blockquote>\n<p>하연은 소무대 쪽을 바라보았다. 낮의 소무대는 아무것도 아니었다. 작은 단상과 임시 조명 프레임, 아직 쓰이지 않는 전선 몇 개. 그런데 하연은 그곳을 보는 얼굴이 낯설게 굳어 있었다.<\/p>\n<p>햇빛 아래의 소무대는 위험해 보이지 않았다. 낮은 단차는 운동장 흙먼지와 같은 색으로 묻혀 있었고, 검은 전선은 무대 뒤쪽에 정리된 척 모여 있었다. 출입 제한 표지는 아직 세워지지도 않은 채 장비 박스 위에 놓여 있었다. 그런데도 하연은 그 평범한 임시 시설을 쉽게 지나치지 못했다.<\/p>\n<blockquote>저기, 좀 이상해.<\/blockquote>\n<blockquote>이상해?<\/blockquote>\n<blockquote>처음 보는 곳인데… 가본 것 같아.<\/blockquote>\n<p>재윤은 대답하지 못했다. 자신도 같은 감각을 느끼고 있었기 때문이다.<\/p>\n<p>그날 이후, 소무대는 두 사람 사이에 말하지 않은 장소가 되었다. 아직 아무 일도 일어나지 않은 곳. 그러나 이미 무언가가 기다리고 있는 곳.<\/p>\n<h3 id=\"스토리-00전체스토리-md-3장-칠판에-적힌-먼-월요일\">3장: 칠판에 적힌 먼 월요일<\/h3>\n<p>D-23 수요일 종례 시간, 담임은 칠판에 축제 일정을 적었다.<\/p>\n<p>축제 1일차 목요일. 축제 2일차 금요일. 주말. 월요일 방학식.<\/p>\n<p>교실은 곧바로 소란스러워졌다. 어떤 반은 귀신의 집을 한다더라, 어떤 반은 먹거리 부스를 준비한다더라, 방송부는 공연 순서를 짠다더라. 학생들에게 중요한 것은 축제였다. 방학식은 그저 축제가 끝난 뒤 자연스럽게 오는 일정일 뿐이었다.<\/p>\n<p>재윤도 처음에는 그렇게 받아들였다.<\/p>\n<p>그러나 칠판 맨 아래 <code>월요일 방학식<\/code>이라는 글자를 보는 순간, 설명할 수 없는 거리감이 생겼다. 월요일은 가까운 미래여야 했다. 금요일이 지나고 주말이 지나면 자연스럽게 오는 날. 그런데 이상하게 그 월요일은 아주 멀리 있는 것처럼 느껴졌다.<\/p>\n<p>하연도 칠판을 보고 있었다.<\/p>\n<p>둘의 시선이 잠깐 마주쳤다. 하연의 얼굴에도 재윤과 비슷한 낯섦이 있었다.<\/p>\n<p>방과후, 서린은 이미 축제 관련 자료를 들고 있었다.<\/p>\n<blockquote>2학년 5반도 반 단위 참여를 해야 할 거야. 아직 확정은 아니지만, 먹거리보다는 휴식형 부스가 현실적이야.<\/blockquote>\n<blockquote>벌써 거기까지 생각했어?<\/blockquote>\n<blockquote>생각만 한 게 아니라 후보안까지 적었어.<\/blockquote>\n<p>서린은 파일을 펼쳤다. 교실 배치, 물품 신청, 전기 사용 여부, 예상 동선. 재윤은 그 꼼꼼함에 감탄했다.<\/p>\n<blockquote>이런 거 다 지키면 사고 같은 건 안 나겠네.<\/blockquote>\n<p>말하고 나서 재윤은 스스로 놀랐다. 왜 하필 사고라는 말을 했을까.<\/p>\n<p>서린의 손이 멈췄다.<\/p>\n<blockquote>사고는 준비한다고 완전히 없어지는 게 아니야.<\/blockquote>\n<p>그 말투는 평소보다 무거웠다.<\/p>\n<blockquote>그래도 줄일 수는 있지. 그래서 확인하는 거야. 사람들이 대충 넘기는 것까지.<\/blockquote>\n<p>재윤은 서린의 얼굴을 보았다. 그녀는 다시 평소처럼 차분한 표정을 하고 있었지만, 방금 전의 정적은 사라지지 않았다.<\/p>\n<p>며칠 뒤 미루는 축제 도움 인원 신청서를 들고 왔다.<\/p>\n<blockquote>선배, 저 이거 해봐도 될까요?<\/blockquote>\n<blockquote>축제 보조? 힘들 수도 있어.<\/blockquote>\n<blockquote>알아요. 근데 해보고 싶어요. 멘토링 끝나기 전에, 저 혼자 뭔가 해냈다는 걸 만들고 싶어서요.<\/blockquote>\n<p>재윤은 그 말을 쉽게 말릴 수 없었다.<\/p>\n<p>미루의 멘토링은 1학기 한정이었다. 공부뿐 아니라 학교생활 적응, 제출물 관리, 발표 준비, 모르는 일이 생겼을 때 누구에게 질문해야 하는지까지 도와주는 관계. 방학식이 지나면 공식적으로 끝난다. 미루는 그 사실을 알고 있었고, 그래서 더 조급해 보였다.<\/p>\n<blockquote>그럼 같이 정리해보자. 네가 할 수 있는 일, 도움 받아야 하는 일 나눠서.<\/blockquote>\n<p>미루는 환하게 웃었다.<\/p>\n<blockquote>역시 선배한테 먼저 물어보길 잘했어요.<\/blockquote>\n<p>재윤은 웃었지만, 마음 한쪽이 조금 무거웠다.<\/p>\n<p>D-18 월요일, 2학년 5반의 반행사는 <code>쉬어가 카페<\/code>로 확정되었다.<\/p>\n<p>처음에는 이름 때문에 다들 웃었다. 너무 대충 지은 것 아니냐는 말도 나왔다. 하지만 하연이 칠판 한쪽에 작은 글씨로 문구를 적자 분위기가 달라졌다.<\/p>\n<p><code>잠깐 쉬어가도 괜찮은 곳.<\/code><\/p>\n<p>교실이 잠깐 조용해졌다.<\/p>\n<p>재윤은 그 문구를 보며 하연을 보았다. 하연은 분필 가루가 묻은 손끝을 털며 아무렇지 않은 척했다.<\/p>\n<blockquote>네가 생각한 거야?<\/blockquote>\n<blockquote>그냥 떠올랐어.<\/blockquote>\n<blockquote>좋은데.<\/blockquote>\n<p>하연은 재윤을 보지 않고 말했다.<\/p>\n<blockquote>너무 조용하지 않아?<\/blockquote>\n<blockquote>시끄러운 축제에 조용한 곳 하나쯤 있어도 되지.<\/blockquote>\n<p>하연은 아주 작게 웃었다.<\/p>\n<p>그 웃음 하나가 재윤에게는 하루 종일 남았다.<\/p>\n<p>카페 준비는 두 사람을 자연스럽게 묶었다. 재윤은 책상을 옮기고, 안내판을 세우고, 필요한 물품을 날랐다. 하연은 메뉴판 문구와 교실 분위기를 정리했다. 말수가 적은 대신 세세한 부분을 잘 봤다.<\/p>\n<blockquote>이쪽 문구, 너무 직접적인가?<\/blockquote>\n<p>하연이 물었다.<\/p>\n<p>재윤은 종이를 읽었다.<\/p>\n<p><code>쉬다 가면 다시 걸을 수 있음.<\/code><\/p>\n<blockquote>난 좋은데.<\/blockquote>\n<blockquote>정말?<\/blockquote>\n<blockquote>우리 반 이름부터 쉬어가 카페인데 뭘. 여기서 갑자기 철학적이면 더 이상해.<\/blockquote>\n<p>하연은 이번엔 조금 더 분명하게 웃었다.<\/p>\n<p>소하는 그런 재윤을 보고 있었다.<\/p>\n<p>처음에는 놀리기만 했다.<\/p>\n<blockquote>전학생 앞에서 말투 달라지는 거 알아?<\/blockquote>\n<blockquote>안 달라지거든.<\/blockquote>\n<blockquote>달라져. 평소보다 덜 멍청해 보이려고 노력해.<\/blockquote>\n<p>그러나 시간이 지날수록 소하의 농담은 줄어들었다. 서린은 축제 준비의 빈틈을 더 자주 지적했고, 미루는 방학식이 가까워질수록 재윤에게 확인받고 싶은 일이 늘어났다.<\/p>\n<p>세계는 조용히 갈라지고 있었다.<\/p>\n<p>하연에게 가는 길과, 하연에게 가지 않아도 되는 길들 사이로.<\/p>\n<h4 id=\"스토리-00전체스토리-md-쉬어가-카페가-만들어지는-시간\">쉬어가 카페가 만들어지는 시간<\/h4>\n<p><code>쉬어가 카페<\/code> 준비는 생각보다 손이 많이 갔다.<\/p>\n<p>교실 책상을 어떻게 배치할지, 음료는 어떤 식으로 준비할지, 메뉴판은 누가 만들지, 손님이 들어오고 나가는 동선은 어디로 잡을지. 처음에는 이름 하나 정하면 끝날 것처럼 말하던 학생들도 막상 준비가 시작되자 각자 맡은 일을 들고 허둥댔다.<\/p>\n<p>교실은 조금씩 카페 흉내를 내기 시작했다. 책상 네 개를 붙인 카운터 위에는 종이컵과 빨대, 투명 테이프와 매직이 뒤섞여 있었고, 칠판 한쪽에는 아직 삐뚤게 붙은 가격표가 흔들렸다. 창가에는 여분 의자가 기대어 있었고, 누군가 잘라 놓은 색종이 꽃잎이 바닥에 흩어져 있었다. 완성된 카페와는 거리가 멀었지만, 학생들이 손으로 만든 어설픈 온기가 있었다.<\/p>\n<p>재윤은 자연스럽게 몸 쓰는 일을 맡았다. 책상을 옮기고, 박스를 나르고, 칠판 위쪽에 장식을 붙였다. 하연은 메뉴판과 안내 문구를 맡았다. 그녀는 색을 많이 쓰지 않았다. 대신 읽는 사람이 잠깐 멈출 수 있는 문장을 골랐다.<\/p>\n<p><code>오늘은 여기서 숨 고르기.<\/code><\/p>\n<p><code>다 마시고 나면 조금 괜찮아질지도.<\/code><\/p>\n<p><code>쉬었다 가도 늦지 않음.<\/code><\/p>\n<p>재윤은 그 문구들을 보며 말했다.<\/p>\n<blockquote>너 문장 되게 하연 같다.<\/blockquote>\n<blockquote>그게 뭔데?<\/blockquote>\n<blockquote>조용한데 오래 남는 거.<\/blockquote>\n<p>하연은 대답하지 않았다. 하지만 귀 끝이 조금 붉어졌다.<\/p>\n<p>소하는 그 장면을 멀리서 보고 있었다. 그녀는 장식용 리본을 자르다 말고 가위질을 멈췄다. 재윤이 하연에게 웃는 얼굴은, 소하가 오래 알던 얼굴과 조금 달랐다.<\/p>\n<p>서린은 준비 현장을 점검하러 왔다가 동선이 엉망이라며 한숨을 쉬었다.<\/p>\n<blockquote>입구와 출구가 같으면 막혀. 컵 반납 위치도 카운터랑 너무 가까워.<\/blockquote>\n<blockquote>아직 임시 배치야.<\/blockquote>\n<p>재윤이 말하자 서린은 바로 받아쳤다.<\/p>\n<blockquote>임시 배치가 마지막 배치 되는 경우를 너무 많이 봤어.<\/blockquote>\n<p>하연은 서린의 말을 듣고 조용히 책상 위치를 다시 표시했다.<\/p>\n<blockquote>이쪽으로 돌리면 어때요?<\/blockquote>\n<p>서린은 잠깐 하연을 보았다. 그러고는 펜으로 새 동선을 그었다.<\/p>\n<blockquote>그게 낫겠네.<\/blockquote>\n<p>미루는 축제 도움 인원 교육을 받고 와서 카페 준비를 구경했다.<\/p>\n<blockquote>선배네 반 진짜 카페 같아요.<\/blockquote>\n<blockquote>아직 엉망인데.<\/blockquote>\n<blockquote>그래도 뭔가… 들어오면 마음 편할 것 같아요.<\/blockquote>\n<p>미루는 하연이 쓴 문구를 오래 보았다.<\/p>\n<blockquote>쉬었다 가도 늦지 않음.<\/blockquote>\n<p>그녀는 작게 읽고 웃었다.<\/p>\n<blockquote>저한테 하는 말 같아요.<\/blockquote>\n<p>그 순간만 보면 모든 것이 괜찮아 보였다. 소하도, 서린도, 미루도, 하연도 같은 축제를 향해 움직이고 있었다. 그러나 재윤은 알 수 없는 불안을 느꼈다. 모두가 같은 장소를 준비하고 있지만, 각자가 보고 있는 끝은 다르다는 느낌.<\/p>\n<p>축제는 가까워지고 있었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-4장-한소하-아무-일도-없던-날의-유혹\">4장: 한소하, 아무 일도 없던 날의 유혹<\/h3>\n<p>소하는 재윤을 가장 오래 알고 있는 사람이었다.<\/p>\n<p>재윤이 어떤 농담에 웃는지, 어떤 상황에서 대충 넘기는지, 거짓말할 때 눈을 어디에 두는지 알고 있었다. 그래서 재윤이 하연을 신경 쓰기 시작한 것도 가장 먼저 알아차렸다.<\/p>\n<p>처음에는 놀렸다.<\/p>\n<blockquote>그렇게 보면 부담스러워한다?<\/blockquote>\n<blockquote>뭘 그렇게 봐.<\/blockquote>\n<blockquote>은하연.<\/blockquote>\n<p>재윤은 대답하지 못했고, 소하는 승리한 사람처럼 웃었다.<\/p>\n<p>하지만 축제 준비가 본격화되고 재윤이 하연과 함께 있는 시간이 늘어나자, 소하의 웃음은 조금씩 달라졌다. 농담처럼 시작한 말 끝에 작은 가시가 남았다.<\/p>\n<blockquote>우리는 이렇게 오래 봤는데.<\/blockquote>\n<p>그 말은 어느 날 갑자기 튀어나왔다.<\/p>\n<p>D-11 월요일 아침, 소하는 재윤을 오래된 등굣길로 끌고 갔다. 평소보다 돌아가는 길이었다. 재윤은 왜 굳이 이쪽으로 가느냐고 물었지만, 소하는 대답하지 않았다.<\/p>\n<p>골목은 그대로였다. 문방구는 편의점으로 바뀌었지만, 낡은 담벼락과 작은 공원은 남아 있었다. 소하는 천천히 걸었다.<\/p>\n<p>낮은 담장 위에는 여름 먼지가 얇게 앉아 있었고, 색이 바랜 표지판은 아직도 오래전 동네 이름을 가리키고 있었다. 문방구였던 편의점 앞 유리문에는 새 할인 포스터가 붙어 있었지만, 그 옆 전봇대의 스티커 자국과 작은 공원의 녹슨 그네는 그대로였다. 따뜻한 길이었다. 그래서 더 쉽게 사람을 붙잡는 길이었다.<\/p>\n<blockquote>옛날엔 맨날 이쪽으로 갔잖아.<\/blockquote>\n<blockquote>그랬지.<\/blockquote>\n<blockquote>너 그때 맨날 늦어서 내가 기다렸고.<\/blockquote>\n<blockquote>지금은 내가 더 일찍 나오거든.<\/blockquote>\n<blockquote>그게 더 재수 없어.<\/blockquote>\n<p>재윤은 웃었다. 소하와 있으면 말이 쉽게 나왔다. 굳이 생각하지 않아도 주고받을 수 있는 대화. 실수해도 크게 문제가 되지 않는 관계. 그 편함은 오래된 이불처럼 몸에 맞았다.<\/p>\n<p>소하는 공원 앞에서 멈췄다.<\/p>\n<blockquote>너 요즘 좀 멀어진 것 같아.<\/blockquote>\n<p>재윤도 걸음을 멈췄다.<\/p>\n<blockquote>내가?<\/blockquote>\n<blockquote>응. 몸은 여기 있는데, 자꾸 다른 데 보고 있어.<\/blockquote>\n<p>소하의 목소리는 가벼웠지만, 눈은 그렇지 않았다.<\/p>\n<blockquote>하연이 때문이야?<\/blockquote>\n<p>재윤은 바로 대답하지 못했다.<\/p>\n<p>소하는 웃었다.<\/p>\n<blockquote>이상하지 않아? 갑자기 나타난 애한테 그렇게 신경 쓰는 거. 우리는 이렇게 오래 봤는데.<\/blockquote>\n<p>그 말은 질투처럼 들렸다. 하지만 그보다 더 깊은 감정이 있었다. 소하는 재윤을 빼앗기고 싶지 않은 것이기도 했지만, 재윤이 낯선 미래로 걸어가는 것을 막고 싶어 하는 것처럼 보였다. 익숙한 과거에 남으면 다치지 않아도 되고, 잃지 않아도 되고, 말하지 않아도 된다.<\/p>\n<p>그날 밤 재윤은 꿈을 꾸었다.<\/p>\n<p>소하와 같은 등굣길을 계속 걷는 꿈이었다. 편의점 앞을 지나고, 횡단보도 앞에 섰다가, 다시 편의점 앞을 지났다. 학교는 가까워지지 않았고, 하늘은 계속 아침이었다.<\/p>\n<p>소하는 옆에서 웃으며 물었다.<\/p>\n<blockquote>그냥 이대로 있으면 안 돼?<\/blockquote>\n<p>재윤은 대답하지 못했다.<\/p>\n<p>꿈에서 깬 뒤에도 그 질문이 남았다.<\/p>\n<p>재윤은 소하를 싫어하지 않았다. 오히려 좋아했다. 오래된 친구로서, 자신을 가장 잘 아는 사람으로서, 어떤 날에는 가족처럼 편한 사람으로서. 그래서 더 어려웠다. 소하에게서 벗어나는 일은 소하를 버리는 것처럼 느껴졌다.<\/p>\n<p>그러나 D-9 수요일, 재윤은 깨달았다.<\/p>\n<p>소하와 함께 있는 과거는 따뜻하지만, 그 안에는 하연이 없다. 축제 마지막 밤도 없다. 자신이 왜 그 밤에 소무대로 갔는지도 없다. 아무 일도 없던 날은 평화로운 날이 아니라, 중요한 일을 모두 지워버린 날이었다.<\/p>\n<p>재윤은 소하에게 말했다.<\/p>\n<blockquote>난 네가 편해. 네가 있어서 버틴 것도 많아.<\/blockquote>\n<p>소하는 대답하지 않았다.<\/p>\n<blockquote>근데 편하다는 이유로 계속 여기만 보면 안 될 것 같아.<\/blockquote>\n<p>소하의 눈이 흔들렸다.<\/p>\n<blockquote>그럼 나는?<\/blockquote>\n<blockquote>너를 없던 일로 하겠다는 게 아니야. 그냥… 내가 가야 할 곳이 너랑 같은 곳은 아닌 것 같아.<\/blockquote>\n<p>소하는 화를 내지 않았다. 오히려 아주 오래 참은 사람처럼 고개를 숙였다.<\/p>\n<blockquote>나도 알아. 네가 자꾸 어디로 가려고 하는지.<\/blockquote>\n<blockquote>소하야.<\/blockquote>\n<blockquote>근데 좀 억울하잖아. 나는 계속 옆에 있었는데.<\/blockquote>\n<p>그 말은 재윤의 가슴을 찔렀다.<\/p>\n<p>소하는 주머니에서 오래된 사진 한 장을 꺼냈다. 초등학교 때 찍은 사진이었다. 어색한 표정의 재윤과 장난스럽게 브이를 한 소하가 있었다.<\/p>\n<blockquote>가져. 네가 자꾸 까먹는 것 같아서.<\/blockquote>\n<blockquote>뭘?<\/blockquote>\n<blockquote>과거는 도망칠 곳이 아니라, 네가 지나온 곳이라는 거.<\/blockquote>\n<p>재윤은 사진을 받았다.<\/p>\n<p>그 순간 꿈속에서 반복되던 등굣길이 멈췄다. 소하는 여전히 소하였다. 재윤을 붙잡는 과거가 아니라, 재윤이 지나온 시간을 증명하는 친구.<\/p>\n<p>재윤은 처음으로 과거를 부정하지 않고 앞으로 걸었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-5장-백서린-정답-없는-선택지\">5장: 백서린, 정답 없는 선택지<\/h3>\n<p>서린은 축제 준비가 진행될수록 예민해졌다.<\/p>\n<p>그녀는 방송 일정, 학생회 지원표, 반별 부스 전기 사용 여부, 비상 동선까지 모두 확인했다. 누군가는 유난이라고 했고, 누군가는 서린이 있으니 안심된다고 했다. 서린은 어느 쪽 말에도 크게 반응하지 않았다.<\/p>\n<p>하지만 재윤은 가끔 서린의 손끝이 떨리는 것을 봤다.<\/p>\n<p>D-8 목요일, 방송실에서였다.<\/p>\n<p>서린은 큐시트를 정리하고 있었다. 공연 순서, 안내 방송 멘트, 장비 이동 시간. 재윤은 그녀를 도와 종이를 분류했다. 방송실에는 오래된 장비 냄새와 먼지가 섞여 있었다.<\/p>\n<p>좁은 책상 위에는 마이크와 헤드폰, 라벨링된 케이블, 반별 방송 순서표가 빈틈없이 놓여 있었다. 믹서의 작은 불빛은 낮에도 꺼지지 않았고, 창문 너머로는 운동장 한쪽 천막이 작게 보였다. 방송실은 서린을 닮아 있었다. 완벽히 깨끗하지는 않았지만, 누군가 끝까지 확인하고 있어서 겨우 질서가 유지되는 공간이었다.<\/p>\n<blockquote>너는 왜 이렇게까지 해?<\/blockquote>\n<p>재윤이 물었다.<\/p>\n<p>서린은 펜을 멈추지 않았다.<\/p>\n<blockquote>누군가는 해야 하니까.<\/blockquote>\n<blockquote>그래도 너무 혼자 짊어지는 것 같아.<\/blockquote>\n<p>그제야 서린이 고개를 들었다.<\/p>\n<blockquote>혼자 짊어지는 게 아니야. 혼자 확인하는 거야. 다른 사람이 놓칠 수 있으니까.<\/blockquote>\n<blockquote>모든 걸 다 확인할 수는 없잖아.<\/blockquote>\n<p>서린의 표정이 굳었다.<\/p>\n<blockquote>그래서 사고가 나는 거야.<\/blockquote>\n<p>재윤은 숨을 삼켰다.<\/p>\n<p>또 사고라는 말이었다. 이 세계는 사고를 직접 말하지 않으면서도 계속 그 주변을 맴돌았다. 서린의 수첩, 미루의 고정끈, 하연의 침묵, 소무대의 그림자. 모든 것이 아직 오지 않은 금요일 밤을 향해 있었다.<\/p>\n<p>서린은 자신의 말을 후회한 듯 시선을 피했다.<\/p>\n<blockquote>미안. 예민했어.<\/blockquote>\n<p>하지만 재윤은 이미 들었다. 서린이 두려워하는 것은 실수가 아니라, 통제할 수 없는 결과였다.<\/p>\n<p>D-7 금요일, 서린은 재윤에게 명확한 선택지를 제시했다.<\/p>\n<p>하연과 너무 깊게 엮이지 말 것. 소무대 주변에는 가지 말 것. 축제 마지막 날 폐장 후에는 공개된 장소에 있을 것. 감정적인 약속은 하지 말 것.<\/p>\n<p>그 선택지들은 모두 안전해 보였다.<\/p>\n<p>재윤은 잠깐 흔들렸다. 서린을 따르면 사고를 피할 수 있을지도 모른다. 하연에게 가지 않으면, 그 밤에 다치지 않을지도 모른다. 말하지 않으면, 잃지 않을지도 모른다.<\/p>\n<p>하지만 그것은 살아남는 것이 아니라 멈추는 것이었다.<\/p>\n<p>재윤은 서린의 수첩을 내려다보았다.<\/p>\n<blockquote>너는 내가 뭘 선택해야 하는지 다 정해줄 수 있어?<\/blockquote>\n<p>서린은 바로 대답했다.<\/p>\n<blockquote>최선의 선택지는 줄 수 있어.<\/blockquote>\n<blockquote>그게 내 선택이야?<\/blockquote>\n<p>서린은 입을 다물었다.<\/p>\n<p>방송실 스피커에서 잡음이 흘렀다. 아주 잠깐, 잡음 사이로 하연이 재윤의 이름을 부르는 듯한 소리가 섞였다.<\/p>\n<p>재윤은 고개를 들었다.<\/p>\n<blockquote>나 무서워. 틀릴까 봐. 내가 선택해서 누가 다치게 될까 봐. 그래서 네가 정답을 주면 편할 것 같았어.<\/blockquote>\n<p>서린은 수첩을 꽉 쥐었다.<\/p>\n<blockquote>정답이 없으면?<\/blockquote>\n<blockquote>그래도 내가 골라야지.<\/blockquote>\n<p>서린의 얼굴에서 무언가 무너졌다. 그녀는 화내지 않았다. 대신 아주 천천히 수첩을 닫았다.<\/p>\n<blockquote>나는 네가 틀리지 않게 만들고 싶었어.<\/blockquote>\n<blockquote>알아.<\/blockquote>\n<blockquote>그런데 그게 네가 선택하지 않아도 된다는 뜻은 아니었겠지.<\/blockquote>\n<p>서린은 수첩에서 한 장을 찢어 재윤에게 건넸다. 소무대 점검표 일부였다. 빨간 펜으로 <code>임시 프레임<\/code>, <code>고정끈 재확인<\/code>, <code>폐장 후 철거 예정<\/code>이라는 글씨가 표시되어 있었다.<\/p>\n<blockquote>이건 네가 가져.<\/blockquote>\n<blockquote>괜찮아?<\/blockquote>\n<blockquote>내 수첩에만 있으면, 결국 내 책임으로만 남아. 네가 봐야 해.<\/blockquote>\n<p>재윤은 그 종이를 받았다.<\/p>\n<p>그 순간 선택지가 달라졌다. 서린은 더 이상 정답을 대신 골라주는 사람이 아니었다. 그녀는 재윤에게 자기 선택을 돌려주는 사람이 되었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-6장-나미루-닫힌-문을-여는-법\">6장: 나미루, 닫힌 문을 여는 법<\/h3>\n<p>미루는 점점 더 자주 재윤을 찾았다.<\/p>\n<p>처음에는 평범한 질문이었다. 축제 도움 인원 신청서 작성법, 수행평가 제출 일정, 방학식 전까지 끝내야 하는 멘토링 체크리스트. 재윤은 늘 하던 대로 도와주었다.<\/p>\n<p>그러나 D-6 토요일, 미루는 다른 질문을 했다.<\/p>\n<blockquote>선배, 방학식 지나면 멘토링 끝나는 거 맞죠?<\/blockquote>\n<p>재윤은 펜을 멈췄다.<\/p>\n<blockquote>응. 공식적으로는 그렇지.<\/blockquote>\n<blockquote>그럼 그 뒤에는요?<\/blockquote>\n<blockquote>그 뒤에도 모르는 거 있으면 물어봐도 돼.<\/blockquote>\n<p>미루는 안심한 듯하면서도 완전히 웃지 못했다.<\/p>\n<blockquote>근데 그건 멘토링이 아니잖아요.<\/blockquote>\n<p>그 말이 이상하게 오래 남았다.<\/p>\n<p>미루에게 멘토링은 단순한 공부 도움이 아니었다. 처음 학교생활이 버거웠던 몇 달 동안, 재윤은 미루에게 길을 정리해 주는 사람이었다. 어디에 물어봐야 하는지, 무엇을 먼저 해야 하는지, 실수했을 때 누구에게 말해야 하는지. 미루는 재윤을 통해 학교 안에서 버티는 법을 배웠다.<\/p>\n<p>그래서 끝나는 것이 두려웠다.<\/p>\n<p>그리고 재윤도 미루가 자신을 필요로 하는 것이 싫지 않았다. 하연에게 가는 길은 무섭고 불확실했지만, 미루 옆에 있으면 자신이 분명히 쓸모 있는 사람이라는 감각이 있었다.<\/p>\n<p>D-5 일요일, 미루의 세계는 조금 이상해졌다.<\/p>\n<p>재윤은 분명 학교 복도에 있었는데, 문을 열자 미루의 방처럼 좁은 공간이 나왔다. 책상 위에는 체크리스트가 산처럼 쌓여 있었고, 벽에는 방학식 안내문이 붙어 있었다. 그러나 날짜는 번져 읽을 수 없었다.<\/p>\n<p>그 방은 실제 미루의 방이라기보다, 미루가 두려워하는 일들을 쌓아 둔 임시 대기 장소 같았다. 책상 한쪽에는 명찰, 여분 안내 표지, 테이프와 끈, 클립보드가 차례 없이 놓여 있었고, 분실물 박스에는 이름표 없는 물건들이 가득했다. 문은 있었지만 손잡이가 멀어 보였고, 복도에서 새어 들어오는 빛은 체크리스트 더미에 막혀 바닥까지 닿지 못했다.<\/p>\n<p>미루는 문 앞에 서 있었다.<\/p>\n<blockquote>선배, 오늘까지만 도와주면 안 돼요?<\/blockquote>\n<p>재윤은 오늘까지만이라고 생각했다.<\/p>\n<p>하지만 하나를 끝내면 다른 하나가 생겼다. 수행평가를 정리하면 봉사활동 신청서가 나왔고, 신청서를 쓰면 발표 대본이 나왔고, 발표 대본을 보면 축제 도움 인원 배치표가 나왔다. 미루는 미안한 얼굴로 계속 말했다.<\/p>\n<blockquote>이것만요.<\/blockquote>\n<blockquote>진짜 이것만요.<\/blockquote>\n<blockquote>선배가 없으면 저 못 할 것 같아서요.<\/blockquote>\n<p>그 말은 재윤을 붙잡았다.<\/p>\n<p>문밖에서는 아주 멀리 하연의 목소리가 들리는 것 같았다. 하지만 미루가 울 것 같은 얼굴로 재윤을 보면, 재윤은 문을 열 수 없었다.<\/p>\n<blockquote>미루야.<\/blockquote>\n<blockquote>네.<\/blockquote>\n<blockquote>내가 계속 옆에 있으면, 너는 편할 거야.<\/blockquote>\n<p>미루는 고개를 끄덕이려다 멈췄다.<\/p>\n<blockquote>근데 그럼 너 혼자 해냈다는 건 영영 안 생겨.<\/blockquote>\n<p>미루의 눈에 눈물이 고였다.<\/p>\n<blockquote>선배는 제가 혼자 해도 괜찮을 것 같아요?<\/blockquote>\n<p>재윤은 쉽게 대답하지 않았다. 예전 같으면 괜찮다고 바로 말했을 것이다. 그러나 지금은 그런 말이 무책임한 위로처럼 느껴졌다.<\/p>\n<p>재윤은 미루의 노트를 펼쳤다. 그 안에는 엉성하지만 미루가 스스로 정리한 흔적들이 있었다. 틀린 부분도 있었고, 빠진 것도 있었지만, 분명 미루가 혼자 해보려 한 것들이었다.<\/p>\n<blockquote>무서울 거야. 실수도 할 거고.<\/blockquote>\n<p>미루는 고개를 숙였다.<\/p>\n<blockquote>그래도 너는 할 수 있어. 내가 없어야만 할 수 있다는 뜻은 아니야. 그냥 내가 계속 대신 해주면, 네가 할 수 있다는 걸 너도 모르게 돼.<\/blockquote>\n<p>미루는 한참 동안 아무 말도 하지 않았다.<\/p>\n<p>문밖의 복도에서 바람이 불었다. 닫혀 있던 문이 아주 조금 열렸다.<\/p>\n<p>미루는 재윤의 옷자락을 잡고 있던 손을 천천히 놓았다.<\/p>\n<blockquote>멘토링 끝나도… 인사해도 돼요?<\/blockquote>\n<blockquote>당연하지.<\/blockquote>\n<blockquote>물어봐도 돼요?<\/blockquote>\n<blockquote>물어봐도 돼. 대신 네가 먼저 해보고.<\/blockquote>\n<p>미루는 울면서 웃었다.<\/p>\n<p>그 순간 방 안에 쌓여 있던 체크리스트들이 사라졌다. 방학식 안내문의 날짜가 또렷해졌다. 월요일. D+3.<\/p>\n<p>미루는 작은 키링을 재윤에게 건넸다. 축제 도움 인원 표식으로 쓰려던 것이었다. 키링에는 짧은 고정끈이 묶여 있었다.<\/p>\n<blockquote>저도 기억할게요. 놓아도 끝나는 건 아니라는 거.<\/blockquote>\n<p>재윤은 키링을 받았다.<\/p>\n<p>닫힌 문이 열렸다.<\/p>\n<h4 id=\"스토리-00전체스토리-md-관계를-정리한다는-것\">관계를 정리한다는 것<\/h4>\n<p>D-4 월요일, 재윤은 소하와 다시 오래된 등굣길을 걸었다.<\/p>\n<p>이번에는 소하가 먼저 끌고 간 것이 아니었다. 재윤이 먼저 말했다.<\/p>\n<blockquote>오늘 그쪽으로 갈래?<\/blockquote>\n<p>소하는 놀란 얼굴을 했다.<\/p>\n<blockquote>왜?<\/blockquote>\n<blockquote>그냥. 마지막으로 확인하고 싶어서.<\/blockquote>\n<blockquote>마지막이라니, 말이 좀 재수 없는데.<\/blockquote>\n<p>그러면서도 소하는 함께 걸었다. 편의점 앞을 지나고, 작은 공원 옆을 지났다. 꿈속에서 끝없이 반복되던 길이었다. 하지만 이번에는 학교가 가까워졌다. 같은 길인데도, 더 이상 제자리걸음이 아니었다.<\/p>\n<p>재윤은 말했다.<\/p>\n<blockquote>나 옛날이 싫은 건 아니야.<\/blockquote>\n<blockquote>알아.<\/blockquote>\n<blockquote>너랑 같이 있던 시간도 싫은 게 아니야.<\/blockquote>\n<blockquote>그것도 알아.<\/blockquote>\n<p>소하는 앞만 보고 걸었다.<\/p>\n<blockquote>근데도 가는 거잖아.<\/blockquote>\n<p>재윤은 고개를 끄덕였다.<\/p>\n<blockquote>응.<\/blockquote>\n<p>소하는 한참 뒤에 말했다.<\/p>\n<blockquote>그럼 제대로 가. 어중간하게 뒤돌아보면서 가지 말고.<\/blockquote>\n<p>그 말은 허락처럼 들렸다. 축복은 아니었다. 소하는 아직 상처받아 있었다. 하지만 재윤을 과거에 가두지는 않았다.<\/p>\n<p>D-3 화요일, 재윤은 방송실에서 서린을 도왔다. 서린은 여전히 바빴고, 여전히 정확했다. 그러나 더 이상 재윤에게 모든 선택지를 정해주려 하지 않았다.<\/p>\n<blockquote>네가 폐장 후 어디로 갈지는 내가 결정할 문제가 아니야.<\/blockquote>\n<p>서린이 말했다.<\/p>\n<blockquote>하지만 위험을 모른 척하고 가는 것도 선택은 아니야. 알고 가.<\/blockquote>\n<p>그녀는 소무대 점검표를 다시 보여주었다. 임시 조명 프레임, 폐장 후 철거 예정, 고정끈 재확인 필요. 단어들은 이제 단순한 안전 항목이 아니었다. 기억의 조각이었다.<\/p>\n<blockquote>내가 그걸 봤는데도 가면?<\/blockquote>\n<blockquote>그럼 적어도 네가 왜 가는지는 알아야 해.<\/blockquote>\n<p>서린은 펜을 내려놓았다.<\/p>\n<blockquote>누군가를 구하려고만 가지 마. 네 마음을 말하러 가.<\/blockquote>\n<p>D-3 저녁, 미루는 재윤에게 체크리스트를 보여주었다. 예전 같으면 재윤이 빨간 펜으로 고쳐주기를 기다렸을 것이다. 그러나 이번에는 스스로 수정한 흔적이 많았다.<\/p>\n<blockquote>저, 먼저 해봤어요.<\/blockquote>\n<blockquote>보이네.<\/blockquote>\n<blockquote>틀린 것도 있죠?<\/blockquote>\n<blockquote>있지. 근데 네가 고칠 수 있는 틀림이야.<\/blockquote>\n<p>미루는 그 말을 듣고 한참 노트를 내려다보았다.<\/p>\n<blockquote>선배, 저 방학식 지나도 괜찮겠죠?<\/blockquote>\n<blockquote>응.<\/blockquote>\n<blockquote>선배도요?<\/blockquote>\n<p>재윤은 바로 대답하지 못했다.<\/p>\n<p>미루는 조심스럽게 말했다.<\/p>\n<blockquote>선배도 어디 가야 하는 거 있으면… 가도 돼요.<\/blockquote>\n<p>그 말은 미루가 처음으로 재윤을 놓아주는 말이었다.<\/p>\n<p>이렇게 관계는 정리되었다. 끝내는 것이 아니라 제자리로 돌리는 방식으로. 소하는 과거로, 서린은 선택의 책임으로, 미루는 스스로 걸어갈 미래로.<\/p>\n<p>그리고 재윤은 하연에게 갈 준비를 했다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-7장-말하지-못한-예감\">7장: 말하지 못한 예감<\/h3>\n<p>D-4 월요일부터 세계는 더 자주 금요일 밤을 비쳤다.<\/p>\n<p>재윤은 복도를 걷다가 금속이 흔들리는 소리를 들었다. 아무것도 없는 교실 모서리에서 조명 프레임의 그림자를 보았다. 운동장 끝을 지나갈 때, 하연이 누군가에게 밀려나는 듯한 잔상이 스쳤다.<\/p>\n<p>사고 단서들이 하나씩 이어졌다.<\/p>\n<p>서린의 점검표에는 소무대 임시 프레임이 있었다. 미루의 키링에는 풀린 고정끈이 있었다. 소하의 사진은 아무 일도 없던 과거가 진짜 기억을 덮을 수 없다는 것을 알려주었다.<\/p>\n<p>그리고 하연은 여전히 말하지 못한 얼굴이었다.<\/p>\n<p>D-2 수요일, 축제 준비가 거의 끝난 교실에서 두 사람은 마지막 장식을 붙이고 있었다. 창밖은 노을이었고, 교실 안에는 종이컵과 메뉴판, 임시로 만든 카운터가 어지럽게 놓여 있었다.<\/p>\n<p>노을빛은 창가 커튼을 지나 종이 장식 위에 길게 번졌고, 손글씨 메뉴판 아래의 테이프 자국은 빛을 받아 반짝였다. 교실 안은 따뜻했지만 창밖 운동장 끝은 벌써 그림자가 내려앉기 시작했다. 멀리 야외 소무대의 조명 프레임이 작게 보였다. 아직 낮의 일부처럼 보였지만, 다른 천막들보다 먼저 조용해지는 방향이었다.<\/p>\n<p>하연은 메뉴판 한쪽을 고치다 말고 말했다.<\/p>\n<blockquote>축제가 끝나면 학교가 엄청 조용해지겠지.<\/blockquote>\n<p>재윤은 고개를 들었다.<\/p>\n<blockquote>아마. 다들 방학식 얘기하면서 바로 빠질걸.<\/blockquote>\n<p>하연은 창밖을 보았다. 운동장 뒤편, 낮에도 사람이 많지 않은 소무대 쪽이었다.<\/p>\n<blockquote>조용해지면… 말하기 쉬워질까.<\/blockquote>\n<blockquote>무슨 말?<\/blockquote>\n<p>하연은 바로 대답하지 않았다. 대신 메뉴판에 붙은 작은 종이를 손끝으로 눌렀다.<\/p>\n<blockquote>아니야. 아직은.<\/blockquote>\n<p>그 말은 약속이 아니었다. 장소도, 시간도 정해지지 않았다. 하지만 재윤은 그 말이 그냥 혼잣말이 아니라는 것을 알았다. 하연은 시끄러운 곳에서 마음을 꺼내는 사람이 아니었다. 하연은 언제나 한 걸음 물러난 곳, 숨을 고를 수 있는 자리에서 조금씩 자기 말을 꺼냈다.<\/p>\n<p>재윤도 같은 말을 삼켰다.<\/p>\n<blockquote>나도… 아직은 못 하겠다.<\/blockquote>\n<p>하연이 그를 보았다.<\/p>\n<p>두 사람은 그 자리에서 더 말하지 않았다. 고백도 약속도 없었다. 다만 서로에게 아직 끝내지 못한 말이 있다는 사실만 남았다.<\/p>\n<p>그 예감이 생긴 순간, 세계는 잠깐 조용해졌다.<\/p>\n<p>마치 그동안 흩어져 있던 모든 장면이 축제 마지막 날의 한 선택으로 모여드는 것처럼.<\/p>\n<p>D-1 목요일, 축제 1일차가 열렸다.<\/p>\n<p><code>쉬어가 카페<\/code>는 생각보다 바빴다. 학생들은 웃으며 교실에 들어왔고, 하연이 적은 문구를 보고 사진을 찍었다. 재윤은 주문을 받고, 컵을 나르고, 소하와 티격태격하고, 서린에게 동선 지적을 받고, 미루가 실수하지 않도록 멀리서 눈짓을 보냈다.<\/p>\n<p>임시 카운터 앞에는 종이컵이 빠르게 쌓였다가 사라졌고, 칠판의 문구 카드는 손님들이 드나들 때마다 살짝 흔들렸다. 교실 밖 복도에서는 다른 반 학생들이 뛰어가며 웃었고, 창문 너머 운동장에서는 스피커 테스트음이 짧게 울렸다. 그 소란 속에서도 하연이 정리한 메뉴판과 문구들은 이상하게 차분했다.<\/p>\n<p>하연은 카운터 안쪽에서 조용히 움직였다. 손님이 몰리면 재윤에게 컵을 건네고, 재윤이 허둥대면 말없이 필요한 것을 밀어주었다. 두 사람은 많은 말을 하지 않아도 서로의 다음 행동을 조금씩 알게 되었다.<\/p>\n<p>잠깐 손님이 끊겼을 때, 하연은 창가에 기대어 말했다.<\/p>\n<blockquote>진짜 쉬어가는 곳 같네.<\/blockquote>\n<blockquote>네가 문구 잘 써서 그래.<\/blockquote>\n<blockquote>너도 생각보다 잘하고.<\/blockquote>\n<blockquote>생각보다?<\/blockquote>\n<p>하연은 작게 웃었다.<\/p>\n<blockquote>응. 생각보다.<\/blockquote>\n<p>재윤은 그 웃음을 오래 보고 싶었다. 그러나 동시에 알고 있었다. 이 평온함도 금요일을 지나야 진짜가 된다는 것을.<\/p>\n<p>축제 첫날이 끝난 뒤, 교실에는 종이컵 냄새와 달달한 음료 향이 남았다. 학생들은 지쳤지만 들떠 있었다. 내일만 지나면 축제가 끝나고, 주말이 오고, 월요일 방학식이 온다.<\/p>\n<p>재윤은 칠판에 적힌 방학식 일정을 보았다.<\/p>\n<p>이번에는 그 월요일이 아주 멀게만 느껴지지 않았다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-8장-축제-마지막-날\">8장: 축제 마지막 날<\/h3>\n<p>D-Day 금요일.<\/p>\n<p>아침부터 학교는 들떠 있었다. 축제 2일차는 1일차보다 자유로웠다. 부스는 축소 운영되고, 학생들은 서로의 반을 돌아다니며 마지막 날을 즐겼다.<\/p>\n<p>운동장에는 반별 천막과 손으로 만든 현수막이 줄지어 있었고, 학생들은 음료와 간식을 들고 햇빛 속을 오갔다. 중심부는 음악과 웃음으로 밝았지만, 가장자리로 갈수록 소리는 낮아졌다. 하연이 편하게 숨을 고를 수 있는 공간은 언제나 그 경계에 있었다.<\/p>\n<p>재윤은 낮 동안 많은 사람을 만났다.<\/p>\n<p>소하는 카페 앞에서 음료를 들고 서 있었다.<\/p>\n<p>소하 뒤로는 학생들이 사진을 찍는 밝은 복도가 이어졌지만, 그녀가 기대 선 벽에는 오래된 등굣길에서 보던 것과 비슷한 햇빛이 비쳤다. 소하는 어디에 서 있어도 익숙한 길의 사람처럼 보였다.<\/p>\n<blockquote>무리하지 마라. 너 꼭 중요한 날에 삐끗하더라.<\/blockquote>\n<p>말투는 장난이었지만 눈은 진지했다.<\/p>\n<blockquote>알아.<\/blockquote>\n<blockquote>알고만 있지 말고.<\/blockquote>\n<p>소하는 잠깐 머뭇거리다 덧붙였다.<\/p>\n<blockquote>그래도 가야 하면 가. 대신 까먹지 마. 너 돌아올 곳 없어진 거 아니니까.<\/blockquote>\n<p>재윤은 고개를 끄덕였다.<\/p>\n<p>서린은 방송실 앞에서 마지막 큐시트를 확인하고 있었다.<\/p>\n<p>방송실 문은 반쯤 열려 있었고, 안쪽 책상 위에는 헤드폰과 마이크, 폐장 안내문, 장비 회수 목록이 나란히 놓여 있었다. 케이블에는 작은 라벨이 붙어 있었고, 서린의 손가락은 큐시트의 빈칸을 한 번 더 짚고 지나갔다.<\/p>\n<blockquote>폐장 후 소무대 근처는 원래 철거 예정이야. 가능하면 가지 않는 게 맞아.<\/blockquote>\n<blockquote>그래도 가야 할 것 같아.<\/blockquote>\n<p>서린은 재윤을 오래 보았다.<\/p>\n<blockquote>그렇다면 적어도 눈을 뜨고 가. 피하려고 가는 건지, 마주하려고 가는 건지 구분해.<\/blockquote>\n<blockquote>마주하러 가는 거야.<\/blockquote>\n<p>서린은 수첩을 닫았다.<\/p>\n<blockquote>그럼 네 선택이야.<\/blockquote>\n<p>미루는 운동장 쪽에서 도움 인원 완장을 차고 있었다. 조금 긴장한 얼굴이었지만, 예전처럼 재윤에게 모든 것을 확인받으려 하지는 않았다.<\/p>\n<p>미루 옆 임시 책상에는 체크리스트와 명찰, 여분 안내 표지, 테이프와 끈이 정리되어 있었다. 복도 쪽으로 나가는 길은 열려 있었고, 미루는 그 길을 등지고 숨는 대신 필요한 사람에게 먼저 다가가고 있었다.<\/p>\n<blockquote>선배, 저 오늘 실수 조금 했어요.<\/blockquote>\n<blockquote>큰일 났어?<\/blockquote>\n<blockquote>아니요. 제가 말해서 해결했어요.<\/blockquote>\n<p>미루는 뿌듯한 듯 웃었다.<\/p>\n<blockquote>그래도 고정끈은 다시 확인했어요. 왠지 해야 할 것 같아서.<\/blockquote>\n<p>재윤은 미루의 머리를 가볍게 두드리려다 멈추고, 대신 엄지를 들어 보였다.<\/p>\n<blockquote>잘했어.<\/blockquote>\n<p>그리고 하연.<\/p>\n<p>하연은 축제의 밝은 소음 속에서도 조금 조용했다. 재윤과 함께 부스를 정리하고, 운동장을 걷고, 공연이 끝나는 것을 보았다. 두 사람은 종종 눈이 마주쳤지만, 낮에는 어젯밤 남은 말을 꺼내지 않았다.<\/p>\n<p>두 사람이 걷는 길은 운동장 한가운데가 아니라 천막 그림자가 끊기는 가장자리였다. 멀리서는 음악이 이어졌지만, 하연이 걸음을 늦출 때마다 학생들의 소음은 조금씩 뒤로 밀렸다. 재윤은 이제 그 속도를 알아볼 수 있었다. 하연이 아무 말 없이 조용한 곳을 찾을 때, 그것은 사라지고 싶다는 뜻이 아니라 마음을 정리할 자리가 필요하다는 뜻이었다.<\/p>\n<p>말해야 할 시간은 누가 정해둔 일정처럼 오지 않았다.<\/p>\n<p>해가 기울고, 방송에서 축제 종료 안내가 흘러나왔다. 학생들은 아쉬워하면서도 하나둘 정리를 시작했다. 교실의 장식이 내려가고, 운동장의 천막이 접히고, 음악이 끊겼다.<\/p>\n<p>밝은 천막 아래에는 아직 웃음이 남아 있었지만, 학교 뒤편은 먼저 어두워졌다. 접힌 현수막이 박스 위에 놓이고, 쓰레기봉투 옆으로 컵 받침이 굴러갔다. 운동장 중심의 소리는 늦게까지 남았지만, 소무대 쪽에서는 바람이 전선을 스치는 소리가 더 또렷했다.<\/p>\n<p>재윤은 손에 남은 컵을 정리하다가 하연이 보이지 않는다는 것을 알아차렸다.<\/p>\n<p>처음에는 화장실에 갔거나, 교실 밖에서 누군가와 이야기하고 있을 거라고 생각했다. 하지만 카운터 주변에도, 복도에도, 운동장 쪽에도 하연은 없었다. 재윤은 그제야 낮 동안 하연이 자주 시선을 두던 곳들을 떠올렸다. 축제 소리가 멀어지는 가장자리. 사람이 몰리지 않는 길. 그리고 D-24에 하연이 오래 바라보던 학교 뒤편 야외 소무대.<\/p>\n<p>만약 하연을 제대로 보지 않았다면 알 수 없었을 것이다. 하연이 시끄러운 곳에서 바로 마음을 꺼내는 사람이 아니라는 것도, 숨을 고를 수 있는 조용한 자리로 물러나는 사람이라는 것도.<\/p>\n<p>재윤은 심장이 빠르게 뛰는 것을 느꼈다.<\/p>\n<p>이번에는 하연이 부른 것이 아니었다.<\/p>\n<p>이번에는 재윤이 먼저 찾아가는 것이었다.<\/p>\n<p>그는 교실에 남은 메뉴판을 보았다.<\/p>\n<p><code>쉬었다 가도 늦지 않음.<\/code><\/p>\n<p>늦지 않다.<\/p>\n<p>그 문장이 거짓말이 되기 전에, 재윤은 복도로 나갔다.<\/p>\n<p>본관의 소음이 멀어지고, 야외 소무대가 보였다. 재윤은 걸음을 멈추지 않았다. 무서웠다. 하지만 이제는 무서움을 이유로 돌아서고 싶지 않았다.<\/p>\n<p>소무대 앞에 섰을 때, 밤바람이 불었다.<\/p>\n<p>낮게 남은 단차와 검은 전선, 임시 조명 프레임, 출입 제한 표지가 하나씩 눈에 들어왔다. 낮에는 평범한 행사 시설처럼 보이던 것들이 폐장 후에는 모두 다른 의미를 갖고 있었다. 그러나 이번에는 그 소품들이 재윤을 막는 위험만은 아니었다. 자신이 왜 이곳으로 오려 했는지 되찾게 하는 기억의 조각이기도 했다.<\/p>\n<p>하연은 재윤을 보았다.<\/p>\n<blockquote>어제 하려던 말.<\/blockquote>\n<blockquote>응.<\/blockquote>\n<p>재윤은 숨을 들이마셨다.<\/p>\n<p>소하의 사진, 서린의 점검표, 미루의 키링, 하연의 목소리. 모든 조각이 한곳으로 모였다.<\/p>\n<blockquote>나, 계속 미뤘어.<\/blockquote>\n<p>하연은 기다렸다.<\/p>\n<blockquote>네가 신경 쓰였는데, 좋아하는 것 같았는데, 말하면 뭔가 바뀔까 봐. 아니, 사실은 내가 선택해야 하는 게 무서워서. 계속 핑계 찾았어.<\/blockquote>\n<p>재윤은 하연의 눈을 피하지 않았다.<\/p>\n<blockquote>근데 이제는 말할게. 좋아해. 너한테 가고 싶어. 아무 일도 없던 척하는 데 말고, 정답 뒤에 숨는 데 말고, 누가 날 필요로 하는 꿈속 말고. 너한테.<\/blockquote>\n<p>하연의 입술이 떨렸다.<\/p>\n<blockquote>나도…<\/blockquote>\n<p>그 말이 끝나기 전에 금속이 울었다.<\/p>\n<p>이번에는 재윤도 알고 있었다. 이 소리가 무엇인지. 어디에서 오는지. 어떤 기억으로 이어지는지.<\/p>\n<p>하연이 고개를 돌렸다. 임시 조명 프레임이 흔들렸다. 풀린 고정끈이 바닥을 스쳤고, 철제 지지대의 그림자가 하연 쪽으로 기울었다.<\/p>\n<p>이전의 재윤이라면 그저 몸이 먼저 움직였을 것이다. 이유도 모른 채, 기억도 잃은 채, 누군가를 밀어내고 쓰러졌을 것이다.<\/p>\n<p>이번에는 달랐다.<\/p>\n<p>재윤은 하연의 이름을 불렀다.<\/p>\n<blockquote>하연아!<\/blockquote>\n<p>그리고 그녀를 밀어냈다.<\/p>\n<p>하연은 넘어지며 재윤의 손을 붙잡으려 했다. 재윤은 그 손끝을 보았다. 이번에는 그 손을 기억했다. 하연의 목소리도, 자신이 왜 이곳에 왔는지도, 방금 전 말한 마음도 잊지 않았다.<\/p>\n<p>충격이 왔다.<\/p>\n<p>세계가 부서졌다.<\/p>\n<p>교실, 등굣길, 방송실, 미루의 닫힌 방, 카페의 메뉴판, 소무대의 조명이 한꺼번에 뒤섞였다. 선택지가 떠올랐다.<\/p>\n<pre><code>[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>그 선택지들은 희미해졌다.<\/p>\n<p>소하의 목소리가 들렸다.<\/p>\n<blockquote>과거는 도망칠 곳이 아니라, 지나온 곳이야.<\/blockquote>\n<p>서린의 목소리가 들렸다.<\/p>\n<blockquote>네 선택이야.<\/blockquote>\n<p>미루의 목소리가 들렸다.<\/p>\n<blockquote>놓아도 끝나는 건 아니죠?<\/blockquote>\n<p>마지막으로 하연의 목소리가 들렸다.<\/p>\n<blockquote>재윤아.<\/blockquote>\n<p>새로운 선택지가 나타났다.<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>그리고 그 아래, 더 선명한 문장이 떠올랐다.<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>재윤은 그 선택지를 골랐다.<\/p>\n<p>어둠 속에서 그는 하연에게 말했다.<\/p>\n<blockquote>아무 일도 없던 날로 돌아가고 싶은 게 아니야.<\/blockquote>\n<p>목소리가 제대로 나오는지 알 수 없었다. 그래도 말했다.<\/p>\n<blockquote>다친 것도, 무서웠던 것도 기억한 채로 너에게 갈게.<\/blockquote>\n<p>그 순간 금요일 밤이 끝났다.<\/p>\n<h4 id=\"스토리-00전체스토리-md-사고-기억의-중심\">사고 기억의 중심<\/h4>\n<p>철제 지지대가 무너지는 순간, 재윤은 처음으로 모든 장면을 동시에 보았다.<\/p>\n<p>첫 회차의 교실. 하연이 처음 들어오던 문. 소하와 걸었던 등굣길. 서린의 수첩. 미루의 닫힌 방. 카페의 문구. 그리고 밤의 소무대.<\/p>\n<p>그동안 세계는 재윤에게 여러 길을 보여주었다. 아무 일도 없던 과거로 돌아가도 된다고. 정답을 주는 사람 뒤에 숨어도 된다고. 누군가에게 필요한 꿈속에 남아도 된다고.<\/p>\n<p>하지만 그 모든 길에는 하연의 목소리가 없었다.<\/p>\n<p>재윤은 드디어 알았다.<\/p>\n<p>자신이 두려워한 것은 단순히 다치는 일이 아니었다. 하연을 좋아했다는 사실과, 하연도 자신에게 오고 있었다는 사실과, 그 마음을 말하려던 선택 끝에 사고가 일어났다는 사실을 동시에 받아들이는 일이었다.<\/p>\n<p>다치지 않은 과거를 찾으면 마음도 안전해질 것 같았다. 정답을 고르면 아무도 다치지 않을 것 같았다. 꿈속에 남으면 현실의 병실과 하연의 눈물을 보지 않아도 될 것 같았다.<\/p>\n<p>그러나 그 모든 회피는 금요일 밤을 끝내지 못했다.<\/p>\n<p>재윤은 어둠 속에서 하연의 이름을 불렀다.<\/p>\n<blockquote>은하연.<\/blockquote>\n<p>멀리서 하연이 대답하는 것 같았다.<\/p>\n<blockquote>들려.<\/blockquote>\n<p>그 목소리가 길이 되었다.<\/p>\n<p>재윤은 선택했다. 사고를 없애는 선택이 아니라, 사고가 있었던 기억까지 가지고 돌아가는 선택을.<\/p>\n<p>그 선택이 끝난 뒤에야 세계는 무너질 수 있었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-9장-d-1-보이지-않는-토요일\">9장: D+1, 보이지 않는 토요일<\/h3>\n<p>토요일은 화면에 표시되지 않는다.<\/p>\n<p>재윤에게 그 하루의 기억은 없다. 플레이어도 그 하루를 직접 걷지 않는다. 금요일 밤의 암전 이후, 세계는 숨을 멈춘 채 어딘가를 건너간다.<\/p>\n<p>하지만 현실에는 토요일이 있었다.<\/p>\n<p>병실의 시간은 느리게 흘렀다. 창밖은 밝아졌다가 어두워졌고, 간호사는 몇 번이나 들어와 재윤의 상태를 확인했다. 의사는 검사 결과를 설명했지만, 설명할 수 없는 부분이 더 많았다. 외상은 크지 않았다. 생명에 직접적인 위험이 있는 상태도 아니었다. 그런데 재윤은 눈을 뜨지 않았다.<\/p>\n<p>병실은 조용했다. 흰 커튼은 에어컨 바람에 아주 조금씩 흔들렸고, 작은 모니터의 규칙적인 빛만이 시간이 멈추지 않았다는 사실을 알려주었다. 침대 옆 의자에는 보호자용 담요가 접혀 있었고, 물컵 하나는 손댄 흔적 없이 반쯤 차 있었다. 이곳은 극적인 사고 현장이 아니라, 아무 일도 끝나지 않은 채 기다림만 길어지는 장소였다.<\/p>\n<p>하연은 병실 앞 의자에 앉아 있었다.<\/p>\n<p>처음에는 울지 않았다. 울면 정말 큰일이 난 것 같아서, 울지 않으려고 했다. 소하가 와서 거칠게 물었다. 왜 아직 안 일어나냐고. 서린은 의사에게 같은 질문을 여러 방식으로 반복했다. 미루는 병실 안을 들여다보다가 결국 복도 끝에서 울었다.<\/p>\n<p>하연은 그 모든 것을 보았다.<\/p>\n<p>그리고 자신이 그 밤에 재윤을 불렀다는 사실을 계속 떠올렸다.<\/p>\n<p>자신이 먼저 사라지지 않았다면. 재윤이 자신을 찾아오지 않았다면. 더 일찍 마음을 말했다면. 재윤이 자신을 밀어내지 않았더라면.<\/p>\n<p>생각은 끝없이 돌아갔다.<\/p>\n<p>그러나 재윤은 돌아오지 않았다.<\/p>\n<p>밤이 되었을 때, 하연은 병실 안으로 들어갔다. 재윤은 조용히 누워 있었다. 얼굴에는 큰 상처가 없었고, 팔에는 작은 처치 흔적이 있었다. 그래서 더 비현실적이었다. 금방이라도 눈을 뜨고, 왜 그렇게 심각한 얼굴이냐고 말할 것 같았다.<\/p>\n<p>하연은 침대 옆에 앉았다.<\/p>\n<blockquote>늦어.<\/blockquote>\n<p>대답은 없었다.<\/p>\n<p>하연은 그제야 울었다.<\/p>\n<p>이 하루는 재윤이 기억하지 못하는 하루다. 하지만 하연에게는 가장 긴 하루다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-10장-d-2-일요일-오후\">10장: D+2, 일요일 오후<\/h3>\n<p>재윤은 소독약 냄새 속에서 눈을 떴다.<\/p>\n<p>일요일 오후의 빛이 병실 창문으로 비스듬히 들어오고 있었다. 커튼은 완전히 닫히지 않아 바깥 하늘의 밝은 색이 얇게 번졌고, 침대 옆 작은 선반에는 물컵과 접힌 가디건, 구겨진 휴지가 놓여 있었다. 재윤은 그 사소한 물건들이 자신이 없는 동안 누군가 이곳에 오래 머물렀다는 증거처럼 느껴졌다.<\/p>\n<p>처음에는 자신이 어디에 있는지 알 수 없었다. 천장이 낯설었다. 팔이 무거웠고, 어깨와 옆구리가 둔하게 아팠다. 머릿속에는 금속이 무너지는 소리와 하연이 자신을 부르는 목소리가 남아 있었다.<\/p>\n<p>그는 천천히 고개를 돌렸다.<\/p>\n<p>하연이 있었다.<\/p>\n<p>하연은 의자에 앉은 채 잠들어 있었다. 제대로 잔 사람의 얼굴이 아니었다. 눈가가 붉었고, 손에는 구겨진 휴지가 들려 있었다. 재윤은 그녀를 부르려 했지만 목이 잘 움직이지 않았다.<\/p>\n<blockquote>하연아.<\/blockquote>\n<p>아주 작은 목소리였다.<\/p>\n<p>하연은 그 소리에 바로 깼다.<\/p>\n<p>처음에는 믿지 못하는 얼굴이었다. 그리고 다음 순간, 눈물이 차올랐다.<\/p>\n<blockquote>유재윤.<\/blockquote>\n<p>재윤은 웃으려 했다.<\/p>\n<blockquote>나… 얼마나 잤어?<\/blockquote>\n<p>하연은 입술을 깨물었다.<\/p>\n<blockquote>오늘 일요일이야.<\/blockquote>\n<blockquote>일요일?<\/blockquote>\n<p>재윤은 눈을 감았다가 다시 떴다.<\/p>\n<blockquote>하루가 지났어?<\/blockquote>\n<blockquote>하루 넘게. 계속 안 일어났어.<\/blockquote>\n<p>그 말이 이상하게 익숙했다. 재윤은 꿈속에서 자신이 왜 돌아오지 못했는지 이제야 알 것 같았다. 몸이 못 일어난 것이 아니었다. 마음이 금요일 밤에서 빠져나오지 못했던 것이다.<\/p>\n<blockquote>나 많이 다쳤어?<\/blockquote>\n<p>하연은 고개를 저었다.<\/p>\n<blockquote>아니.<\/blockquote>\n<blockquote>아닌데 왜 병원이야?<\/blockquote>\n<p>하연의 얼굴이 일그러졌다.<\/p>\n<blockquote>안 일어났어.<\/blockquote>\n<p>짧은 대답이었다. 그 안에 토요일 하루가 모두 들어 있었다.<\/p>\n<p>재윤은 손을 움직이려 했다. 하연이 먼저 그의 손을 잡았다. 힘이 세지 않았지만, 놓치지 않겠다는 듯 꼭 잡았다.<\/p>\n<blockquote>미안.<\/blockquote>\n<p>재윤이 말했다.<\/p>\n<p>하연은 바로 고개를 저었다.<\/p>\n<blockquote>그런 말 하지 마.<\/blockquote>\n<blockquote>그래도.<\/blockquote>\n<blockquote>네가 사과할 일이 아니야.<\/blockquote>\n<p>재윤은 하연을 보았다.<\/p>\n<blockquote>나 기억해.<\/blockquote>\n<p>하연의 손에 힘이 들어갔다.<\/p>\n<blockquote>뭐를?<\/blockquote>\n<blockquote>네가 거기 있었던 거. 내가 너한테 말하려고 했던 거. 네가 나한테 말하려고 했던 거. 금속 소리도, 내가 널 밀어낸 것도.<\/blockquote>\n<p>하연은 숨을 멈춘 듯했다.<\/p>\n<p>재윤은 천천히 말했다.<\/p>\n<blockquote>이번엔 기억하고 왔어.<\/blockquote>\n<p>그 말에 하연은 끝내 울음을 터뜨렸다. 재윤은 손을 들어 하연의 손등을 약하게 쥐었다. 몸은 무겁고, 말은 자꾸 끊겼지만, 이번에는 도망치고 싶지 않았다.<\/p>\n<blockquote>하연아.<\/blockquote>\n<blockquote>응.<\/blockquote>\n<blockquote>좋아해.<\/blockquote>\n<p>병실의 고백은 축제 밤의 고백보다 초라했다. 조명도, 음악도, 완벽한 분위기도 없었다. 소독약 냄새와 작은 기계음, 피곤에 젖은 얼굴뿐이었다.<\/p>\n<p>하지만 그래서 더 진짜였다.<\/p>\n<p>하연은 눈물을 닦지 않은 채 대답했다.<\/p>\n<blockquote>나도... 좋아해.<\/blockquote>\n<p>두 사람은 한동안 아무 말도 하지 않았다. 침묵은 더 이상 미룬 마음의 침묵이 아니었다. 이미 말했기 때문에 가능한 침묵이었다.<\/p>\n<p>금요일 밤은 끝났다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-11장-d-3-월요일이-왔으니까\">11장: D+3, 월요일이 왔으니까<\/h3>\n<p>월요일 아침, 재윤은 병원에서 오래 실랑이를 했다.<\/p>\n<p>의사는 무리하지 말라고 했고, 부모님도 방학식 같은 건 가지 않아도 된다고 했다. 소하라면 분명 욕을 할 것이고, 서린은 일정상 불필요한 이동이라고 말할 것이고, 미루는 울먹이며 말릴 것이다.<\/p>\n<p>그래도 재윤은 가고 싶었다.<\/p>\n<p>방학식은 대단한 행사가 아니었다. 짧은 인사, 방학 안내, 학생들의 들뜬 소란. 평소라면 귀찮다고 넘겼을 날이었다. 하지만 재윤에게 그 월요일은 가장 먼 하루였다.<\/p>\n<p>실패한 루프에서는 언제나 금요일 밤 이후 시간이 끊겼다. D+3은 칠판에 적혀 있었지만 도달하지 못했다. 미루의 멘토링이 끝나는 날, 축제가 정말 끝났음을 확인하는 날, 하연과 말한 마음이 꿈속이 아니라 현실에 남아 있음을 증명하는 날.<\/p>\n<p>재윤은 천천히 교문을 지났다.<\/p>\n<p>몸은 무거웠다. 걸음도 평소보다 느렸다. 팔의 밴드와 얼굴의 작은 상처 때문에 지나가는 학생들이 그를 돌아보았다. 그러나 재윤은 멈추지 않았다.<\/p>\n<p>교문 안쪽에는 이미 방학식 분위기가 번져 있었다. 학생들은 종이가방과 실내화를 들고 웃으며 지나갔고, 축제 때 세워졌던 천막 자리에는 흙먼지와 희미한 눌린 자국만 남아 있었다. 며칠 전까지만 해도 모든 선택이 모여들던 학교는 다시 평범한 여름 학교가 되어 있었다.<\/p>\n<p>교실에 들어서자 가장 먼저 소하가 소리쳤다.<\/p>\n<p>2학년 5반 교실은 축제 전의 형태로 거의 돌아와 있었다. 책상은 줄을 맞추었고, 카운터로 쓰던 흔적은 사라졌지만 칠판 구석에는 지워지지 않은 테이프 자국과 작은 분필 가루가 남아 있었다. 창밖 햇빛은 밝았고, 뒤 게시판에는 방학 중 유의사항이 새로 붙어 있었다.<\/p>\n<blockquote>야, 유재윤! 누가 오랬냐?<\/blockquote>\n<p>재윤은 문틀에 기대어 숨을 골랐다.<\/p>\n<blockquote>너라면 올 줄 알았잖아.<\/blockquote>\n<p>소하는 화난 얼굴로 다가왔지만, 눈가가 붉었다.<\/p>\n<blockquote>진짜 짜증나. 사람 걱정시키는 것도 정도가 있지.<\/blockquote>\n<blockquote>미안.<\/blockquote>\n<blockquote>사과는 나중에 해. 지금은 앉아. 쓰러지면 진짜 가만 안 둬.<\/blockquote>\n<p>재윤은 웃었다. 소하의 잔소리는 익숙했다. 하지만 이제 그 익숙함은 그를 붙잡는 과거가 아니었다. 돌아올 수 있는 자리였다.<\/p>\n<p>서린은 교실 앞쪽에서 재윤을 보더니 곧장 다가왔다.<\/p>\n<blockquote>오래 있으면 안 돼.<\/blockquote>\n<blockquote>알겠습니다, 회장님.<\/blockquote>\n<blockquote>농담할 상태 아닌데.<\/blockquote>\n<p>서린은 차갑게 말했지만, 손에는 이미 의자를 끌어올 준비가 되어 있었다.<\/p>\n<blockquote>그래도… 와줘서 다행이야.<\/blockquote>\n<p>그 말은 아주 작았다. 재윤은 못 들은 척하지 않았다.<\/p>\n<blockquote>나도.<\/blockquote>\n<p>미루는 한참 뒤에야 교실 문 앞에 나타났다. 1학년이라 다른 교실에 있어야 했지만, 방학식 전 잠깐 찾아온 모양이었다. 미루는 재윤을 보자마자 울 것 같은 얼굴이 되었다.<\/p>\n<blockquote>선배.<\/blockquote>\n<blockquote>울지 마. 나 괜찮아.<\/blockquote>\n<blockquote>안 괜찮아 보여요.<\/blockquote>\n<blockquote>조금 안 괜찮긴 해.<\/blockquote>\n<p>미루는 웃다 울음을 삼켰다.<\/p>\n<blockquote>멘토링 끝나도… 가끔 인사해도 되죠?<\/blockquote>\n<p>재윤은 고개를 끄덕였다.<\/p>\n<blockquote>당연하지.<\/blockquote>\n<blockquote>모르는 거 생기면요?<\/blockquote>\n<blockquote>먼저 해보고. 그래도 모르겠으면 물어봐.<\/blockquote>\n<p>미루는 힘껏 고개를 끄덕였다. 이제 그 말은 이별이 아니었다. 끝나야 다음으로 갈 수 있다는 약속이었다.<\/p>\n<p>그리고 하연이 왔다.<\/p>\n<p>하연은 교실 문 앞에서 잠깐 멈췄다. 재윤을 발견하고도 바로 다가오지 않았다. 둘 사이에는 병실에서 이미 나눈 말들이 있었다. 그래서 오히려 교실에서는 조심스러웠다.<\/p>\n<p>재윤이 먼저 손을 들었다.<\/p>\n<p>하연이 다가왔다.<\/p>\n<blockquote>진짜 왔네.<\/blockquote>\n<p>재윤은 웃었다.<\/p>\n<blockquote>월요일이 왔으니까.<\/blockquote>\n<p>하연은 그 말을 듣고 잠깐 고개를 숙였다. 웃는 것 같기도 하고, 우는 것 같기도 했다.<\/p>\n<p>방학식은 짧았다.<\/p>\n<p>담임은 방학 중 안전 수칙과 개학일을 말했다. 학생들은 반쯤 듣고 반쯤 떠들었다. 창밖에서는 여름 햇빛이 운동장을 밝히고 있었다. 며칠 전 축제 천막이 있던 자리에는 아무것도 없었다. 소무대도 정리되었고, 안내문도 떼어졌다.<\/p>\n<p>그래도 완전히 사라진 것은 아니었다. 운동장 흙 위에는 천막 다리가 눌렀던 네모난 자국이 남아 있었고, 복도 한쪽에는 아직 회수하지 못한 박스가 쌓여 있었다. 축제는 철거되었지만, 지나간 흔적은 현실적인 방식으로 남아 있었다. 그 흔적이 오히려 재윤을 안심시켰다. 기억은 사라지지 않아도, 장소는 다음 용도로 넘어갈 수 있었다.<\/p>\n<p>모든 것이 평범했다.<\/p>\n<p>그래서 재윤은 눈물이 날 것 같았다.<\/p>\n<p>평범한 월요일이 왔다. 금요일 다음의 월요일이. 끝내 도달하지 못하던 하루가.<\/p>\n<p>방학식이 끝난 뒤, 교실은 천천히 비었다. 소하는 친구들과 떠들면서도 계속 재윤 쪽을 확인했고, 서린은 담임에게 재윤이 오래 있지 않게 하겠다고 말했고, 미루는 복도 끝에서 몇 번이나 손을 흔들었다.<\/p>\n<p>재윤은 창가에 섰다.<\/p>\n<p>하연이 옆에 왔다.<\/p>\n<p>두 사람은 한동안 아무 말도 하지 않았다. 이제 침묵은 두렵지 않았다.<\/p>\n<blockquote>아직 아파?<\/blockquote>\n<p>하연이 물었다.<\/p>\n<blockquote>조금.<\/blockquote>\n<blockquote>무서웠어?<\/blockquote>\n<p>재윤은 솔직하게 고개를 끄덕였다.<\/p>\n<blockquote>응.<\/blockquote>\n<p>하연도 고개를 끄덕였다.<\/p>\n<blockquote>나도.<\/blockquote>\n<p>재윤은 창밖을 보았다.<\/p>\n<blockquote>그래도 왔어.<\/blockquote>\n<blockquote>어디에?<\/blockquote>\n<blockquote>월요일에.<\/blockquote>\n<p>하연은 작게 웃었다.<\/p>\n<p>그 웃음은 축제 첫날 카페 안에서 보았던 웃음과 닮아 있었다. 하지만 이제 그 웃음 뒤에는 숨겨진 말이 없었다.<\/p>\n<p>재윤은 말했다.<\/p>\n<blockquote>앞으로도 무서울 것 같아. 그날 생각도 날 거고. 네가 울던 것도 생각날 거고.<\/blockquote>\n<blockquote>응.<\/blockquote>\n<blockquote>그래도 이번엔 도망 안 갈게.<\/blockquote>\n<p>하연은 재윤을 보았다.<\/p>\n<blockquote>나도 안 미룰게.<\/blockquote>\n<p>두 사람은 나란히 창밖을 보았다.<\/p>\n<p>축제는 끝났다. 방학식도 끝났다. 사고의 기억은 사라지지 않았다. 재윤의 몸에는 아직 상처가 남아 있었고, 하연의 눈가에는 지워지지 않은 피로가 있었다.<\/p>\n<p>하지만 시간은 앞으로 갔다.<\/p>\n<p>그리고 그것만으로도, 두 사람은 조금 숨을 쉴 수 있었다.<\/p>\n<h3 id=\"스토리-00전체스토리-md-에필로그-끝난-축제-남은-마음\">에필로그: 끝난 축제, 남은 마음<\/h3>\n<p>방학식이 끝나고 학생들이 모두 돌아간 뒤, 2학년 5반 교실에는 햇빛만 남았다.<\/p>\n<p>의자를 끄는 소리와 종례 후의 떠들썩함이 빠져나가자, 교실은 다시 숨을 고르는 공간이 되었다. 칠판 아래에는 떨어진 분필 조각이 하나 있었고, 창가에는 누군가 떼다 만 종이 꽃잎이 책상 사이에 끼어 있었다. <code>쉬어가 카페<\/code>는 끝났지만, 교실은 아직 그 문장의 의미를 조금 간직하고 있었다.<\/p>\n<p>칠판 구석에는 누군가 지우지 않은 작은 글씨가 있었다.<\/p>\n<p><code>쉬어가 카페<\/code><\/p>\n<p>재윤은 그 글씨를 보고 웃었다. 정말 쉬어가는 곳이었다. 끝없이 머무는 곳이 아니라, 다시 걸어가기 위해 잠깐 숨을 고르는 곳.<\/p>\n<p>하연은 교실 문 앞에서 기다리고 있었다.<\/p>\n<blockquote>갈 수 있어?<\/blockquote>\n<blockquote>천천히면.<\/blockquote>\n<blockquote>그럼 천천히 가.<\/blockquote>\n<p>두 사람은 복도를 걸었다. 빠르지 않았다. 병원으로 돌아가야 했고, 재윤은 아직 오래 걸을 수 없었다. 하지만 이번에는 목적지를 알고 있었다.<\/p>\n<p>복도는 실패 루프의 복도처럼 비어 있지 않았다. 멀리서 학생들이 웃으며 계단을 내려가는 소리가 들렸고, 창문으로 들어온 여름빛이 바닥에 길게 놓였다. 하연은 앞서가지 않았고, 재윤도 무리해서 따라잡으려 하지 않았다. 둘의 걸음은 느렸지만 같은 속도였다.<\/p>\n<p>계단을 내려가며 재윤은 문득 물었다.<\/p>\n<blockquote>너 그때, 처음 전학 왔을 때.<\/blockquote>\n<blockquote>응.<\/blockquote>\n<blockquote>나 본 적 있는 것 같다고 했잖아.<\/blockquote>\n<p>하연은 잠깐 생각하다가 말했다.<\/p>\n<blockquote>지금도 그래.<\/blockquote>\n<blockquote>지금도?<\/blockquote>\n<blockquote>응. 처음 본 것 같지 않았어. 근데 이제는 알아. 처음이라서 낯선 게 아니라, 다시 만난 것 같아서 그랬던 거야.<\/blockquote>\n<p>재윤은 대답하지 못했다.<\/p>\n<p>하연은 먼저 현관 밖으로 나갔다. 여름 햇빛이 그녀의 어깨에 내려앉았다. 재윤은 한 걸음 늦게 따라 나갔다.<\/p>\n<p>현관 밖 공기는 병실보다 훨씬 덥고 습했다. 운동장에서는 매미 소리가 들렸고, 교문 너머 도로에는 방학을 맞은 학생들이 흩어지고 있었다. 학교 뒤편으로 이어지는 길은 시야에서 비껴 있었지만, 재윤은 그 방향을 피하듯 외면하지 않았다. 이제 그곳은 머물러야 할 밤이 아니라, 지나온 장소였다.<\/p>\n<p>학교 뒤편 소무대가 있던 쪽은 이제 보이지 않았다. 그러나 그곳에서 있었던 일은 사라지지 않는다. 사라지지 않아도 괜찮다. 그 기억은 두 사람을 가두는 밤이 아니라, 서로에게 돌아온 길이 되었으니까.<\/p>\n<p>하연이 손을 내밀었다.<\/p>\n<p>재윤은 그 손을 잡았다.<\/p>\n<p>이번에는 놓치지 않았다.<\/p>\n<p>교문을 나서기 직전, 하연의 휴대폰이 짧게 울렸다. 병원에서 보낸 재검사 안내였다. 하연은 화면을 보고 잠깐 미간을 찌푸리더니, 곧 재윤에게 보여주었다.<\/p>\n<blockquote>내일 오전이래.<\/blockquote>\n<blockquote>알고 있어. 엄마가 세 번 말했어.<\/blockquote>\n<blockquote>그럼 내일은 병원.<\/blockquote>\n<p>하연은 아주 당연한 일처럼 말했다.<\/p>\n<p>재윤은 그녀를 보았다.<\/p>\n<blockquote>같이 와줄 거야?<\/blockquote>\n<blockquote>안 돼?<\/blockquote>\n<blockquote>아니.<\/blockquote>\n<p>재윤은 웃었다.<\/p>\n<blockquote>와줬으면 좋겠어.<\/blockquote>\n<p>하연은 대답 대신 고개를 끄덕였다. 그리고 조금 늦게, 덧붙였다.<\/p>\n<blockquote>모레는?<\/blockquote>\n<blockquote>모레?<\/blockquote>\n<blockquote>병원 안 가는 날이면.<\/blockquote>\n<p>하연은 운동장 너머를 보았다. 축제 천막이 사라진 자리 위로 여름 햇빛이 흔들리고 있었다.<\/p>\n<blockquote>학교 도서관은 방학에도 열어. 오전에만.<\/blockquote>\n<p>재윤은 그 말을 알아들었다.<\/p>\n<p>축제는 끝났다. 방학식도 끝났다. 하지만 두 사람이 만날 이유까지 끝난 것은 아니었다. 병원 재검사, 도서관 반납일, 너무 더우면 잠깐 들어갈 카페, 하연이 아직 가보지 못한 학교 뒤편 산책길, 재윤이 천천히 걸을 수 있을 만큼만 이어지는 오후들.<\/p>\n<p>그 장소들은 모두 작고 현실적이었다. 병원 대기실의 차가운 의자, 방학 중 운영 시간표가 붙은 학교 도서관 입구, 물방울 맺힌 컵이 놓인 작은 카페 창가, 소무대가 있던 방향을 직접 바라보지 않아도 걸을 수 있는 밝은 산책길. 거창한 장면은 아니었지만, 오히려 그래서 두 사람이 계속 만날 수 있는 미래처럼 느껴졌다.<\/p>\n<p>거창한 약속은 아니었다.<\/p>\n<p>매일 만나자는 말도 아니었고, 절대로 떨어지지 말자는 말도 아니었다. 다만 이제는 다음을 말할 수 있었다. 내일을, 모레를, 방학 중 어느 평범한 오전을.<\/p>\n<blockquote>그럼 모레는 도서관.<\/blockquote>\n<p>재윤이 말했다.<\/p>\n<p>하연은 아주 작게 웃었다.<\/p>\n<blockquote>천천히 와.<\/blockquote>\n<blockquote>너도 기다리다 그냥 가지 말고.<\/blockquote>\n<blockquote>안 가.<\/blockquote>\n<p>짧은 대답이었다.<\/p>\n<p>하지만 재윤은 그 말이 좋았다. 축제 마지막 밤에 미처 끝내지 못했던 문장보다, 병실에서 떨리는 목소리로 주고받은 고백보다, 어쩌면 지금 이 말이 더 현실 같았다.<\/p>\n<p>기다리겠다는 말.<\/p>\n<p>이번에는 끝나지 않는 루프 안이 아니라, 정말로 시간이 흐르는 여름 안에서.<\/p>\n<p>두 사람은 교문 밖으로 천천히 걸어 나갔다. 하연의 걸음은 재윤보다 반 박자 느렸고, 재윤의 걸음은 평소보다 훨씬 조심스러웠다. 그래서 둘은 자연스럽게 같은 속도가 되었다.<\/p>\n<blockquote>축제는 끝났다.  <\/blockquote>\n<blockquote>방학식도 끝났다.  <\/blockquote>\n<blockquote>그래도 월요일은 사라지지 않았다.  <\/blockquote>\n<blockquote>그리고 여름은, 아직 남아 있었다.<\/blockquote>\n<h3 id=\"스토리-00전체스토리-md-엔딩-크레딧-연출-아직-남은-여름\">엔딩 크레딧 연출: 아직 남은 여름<\/h3>\n<p>진엔딩 본편이 끝나면 바로 검은 화면으로 끊지 않고, 잔잔한 엔딩곡과 함께 짧은 애니메이션 컷이 이어진다.<\/p>\n<p>음악은 느린 피아노로 시작해, 중반부터 얇은 어쿠스틱 기타와 여름 매미 소리, 멀리서 들리는 학교 방송 잡음을 아주 작게 섞는다. 분위기는 슬프게 끝나는 곡이 아니라, 사고의 기억을 안고도 앞으로 걸어가는 따뜻한 여운이다.<\/p>\n<p>크레딧 애니메이션은 대사 없이 짧은 생활 컷으로 구성한다.<\/p>\n<ol>\n<li>병원 대기실. 재윤의 손목 밴드가 클로즈업되고, 옆 의자에 앉은 하연의 손이 조용히 물병을 밀어준다.<\/li>\n<li>학교 도서관 입구. 방학 중 운영 시간 안내문이 붙어 있고, 하연이 먼저 도착해 책 한 권을 들고 기다린다.<\/li>\n<li>여름 햇빛 아래 버스 정류장. 재윤은 천천히 걸어오고, 하연은 먼저 타지 않고 그를 기다린다.<\/li>\n<li>작은 카페 창가. 두 사람 사이에는 축제 때 쓰던 컵과 닮은 종이컵이 놓여 있고, 둘은 말없이 같은 페이지를 본다.<\/li>\n<li>학교 뒤편 산책길. 소무대가 있던 방향은 직접 보여주지 않고, 두 사람이 그 반대편 밝은 길로 걸어간다.<\/li>\n<li>마지막 컷. 하연의 휴대폰 캘린더에 방학 중 표시된 작은 약속들이 보인다. <code>병원<\/code>, <code>도서관<\/code>, <code>카페<\/code>, <code>천천히 걷기<\/code>. 화면이 밝은 여름 하늘로 페이드아웃된다.<\/li>\n<\/ol>\n<p>각 컷의 배경은 화려하게 꾸미지 않는다. 병원은 차분하고 실제적이어야 하고, 도서관은 방학 중에도 조용히 열리는 작은 학교 시설이어야 하며, 카페는 <code>쉬어가 카페<\/code>의 완성형이 아니라 동네의 평범한 창가 자리여야 한다. 산책길은 사고 장소를 아름답게 다시 포장하지 않고, 그곳을 지나 다음 밝은 길로 걸어가는 감각을 준다.<\/p>\n<p>크레딧의 핵심은 두 사람이 모든 상처를 즉시 극복했다는 선언이 아니다. 방학 동안 계속 만나며, 무리하지 않는 속도로 서로의 일상에 남아 있을 것이라는 암시다.<\/p>", "headings": [{"level": 1, "text": "전체 스토리", "id": "스토리-00전체스토리-md-전체-스토리"}, {"level": 2, "text": "프롤로그: 끝나지 못한 금요일 밤", "id": "스토리-00전체스토리-md-프롤로그-끝나지-못한-금요일-밤"}, {"level": 2, "text": "1장: D-32, 평범한 시작을 가장한 세계", "id": "스토리-00전체스토리-md-1장-d-32-평범한-시작을-가장한-세계"}, {"level": 3, "text": "첫 번째 일주일의 균열", "id": "스토리-00전체스토리-md-첫-번째-일주일의-균열"}, {"level": 2, "text": "2장: 전학생 은하연", "id": "스토리-00전체스토리-md-2장-전학생-은하연"}, {"level": 3, "text": "하연의 속도", "id": "스토리-00전체스토리-md-하연의-속도"}, {"level": 2, "text": "3장: 칠판에 적힌 먼 월요일", "id": "스토리-00전체스토리-md-3장-칠판에-적힌-먼-월요일"}, {"level": 3, "text": "쉬어가 카페가 만들어지는 시간", "id": "스토리-00전체스토리-md-쉬어가-카페가-만들어지는-시간"}, {"level": 2, "text": "4장: 한소하, 아무 일도 없던 날의 유혹", "id": "스토리-00전체스토리-md-4장-한소하-아무-일도-없던-날의-유혹"}, {"level": 2, "text": "5장: 백서린, 정답 없는 선택지", "id": "스토리-00전체스토리-md-5장-백서린-정답-없는-선택지"}, {"level": 2, "text": "6장: 나미루, 닫힌 문을 여는 법", "id": "스토리-00전체스토리-md-6장-나미루-닫힌-문을-여는-법"}, {"level": 3, "text": "관계를 정리한다는 것", "id": "스토리-00전체스토리-md-관계를-정리한다는-것"}, {"level": 2, "text": "7장: 말하지 못한 예감", "id": "스토리-00전체스토리-md-7장-말하지-못한-예감"}, {"level": 2, "text": "8장: 축제 마지막 날", "id": "스토리-00전체스토리-md-8장-축제-마지막-날"}, {"level": 3, "text": "사고 기억의 중심", "id": "스토리-00전체스토리-md-사고-기억의-중심"}, {"level": 2, "text": "9장: D+1, 보이지 않는 토요일", "id": "스토리-00전체스토리-md-9장-d-1-보이지-않는-토요일"}, {"level": 2, "text": "10장: D+2, 일요일 오후", "id": "스토리-00전체스토리-md-10장-d-2-일요일-오후"}, {"level": 2, "text": "11장: D+3, 월요일이 왔으니까", "id": "스토리-00전체스토리-md-11장-d-3-월요일이-왔으니까"}, {"level": 2, "text": "에필로그: 끝난 축제, 남은 마음", "id": "스토리-00전체스토리-md-에필로그-끝난-축제-남은-마음"}, {"level": 2, "text": "엔딩 크레딧 연출: 아직 남은 여름", "id": "스토리-00전체스토리-md-엔딩-크레딧-연출-아직-남은-여름"}], "plain": "# 전체 스토리 이 문서는 게임의 진엔딩 정본을 기준으로 처음부터 끝까지 읽히는 본편 원고형 스토리다. 세부 시스템, 날짜별 이벤트, 루트 조건은 다른 문서에서 관리하되, 플레이어가 최종적으로 도달해야 하는 이야기의 감정선과 사건 흐름은 이 문서를 기준으로 잡는다. 실패 루프와 새드엔딩은 본편을 대체하지 않고, [전체 스토리 외전: 실패 루프와 새드엔딩](./07_전체_스토리_외전_실패루프.md)에서 짧은 외전 장면으로 다룬다. ## 프롤로그: 끝나지 못한 금요일 밤 축제 마지막 날 밤, 학교는 낮의 열기를 천천히 잃어가고 있었다. 운동장 쪽에서 들리던 음악은 끊겼고, 공연을 보며 환호하던 학생들의 목소리도 어느새 먼 골목의 소음처럼 희미해졌다. 본관 현관 앞에는 반쯤 접힌 천막이 기대어 있었고, 쓰레기봉투 옆으로 굴러간 종이컵 하나가 바람에 밀려 느리게 움직였다. 게시판에 붙은 축제 안내문은 모서리가 들뜬 채 떨리고 있었다. 종일 학교 전체를 떠받치던 들뜬 공기가 빠져나가자, 교정에는 이상할 정도로 빈 공간이 많아졌다. 2학년 5반의 `쉬어가 카페`도 문을 닫았다. 낮 동안 손님들이 줄을 서던 교실은 조용했다. 책상 위에는 컵 받침 몇 장과 지우다 만 메뉴판이 남아 있었다. 칠판 한쪽에는 하연이 쓴 문구가 아직 지워지지 않았다. 책상 네 개를 붙여 만든 임시 카운터는 한쪽 다리가 살짝 어긋나 있었고, 투명 테이프 끝은 말려 올라가 책상 모서리에 달라붙어 있었다. 손글씨 메뉴판 아래에는 누군가 급하게 그린 작은 커피잔 그림이 남아 있었다. 낮에는 그 모든 것이 어설퍼서 귀여웠지만, 폐장 후에는 끝난 하루의 흔적처럼 보였다. `잠깐 쉬어가도 괜찮은 곳.` 유재윤은 그 문구 앞에서 잠시 멈췄다. 오늘 하루, 그 문구는 수십 명의 학생들에게 농담처럼 읽혔고, 사진 배경처럼 쓰였고, 가벼운 칭찬을 들었다. 하지만 재윤에게는 하루가 끝날수록 다르게 보였다. 쉬어가는 곳. 머무는 곳이 아니라, 다시 걸어가기 위해 숨을 고르는 곳. 카페 문구가 아니라, 자신에게 하는 말처럼 느껴졌다. 그는 교실 불을 끄지 않은 채 복도로 나왔다. 복도는 낮과 달랐다. 축제 장식으로 붙인 종이 꽃 몇 개가 바닥에 떨어져 있었고, 창문 너머 운동장에는 아직 철거되지 않은 조명 몇 개가 점처럼 켜져 있었다. 재윤의 발소리가 복도에 울렸다. 이상하게도 그 소리는 너무 컸다. 누군가 뒤에서 자신을 부를 것 같아 몇 번이나 돌아보았지만, 복도에는 아무도 없었다. 교실 번호판은 형광등 아래에서 희미하게 빛났고, 게시판에는 축제 포스터와 방학식 안내문이 겹쳐 붙어 있었다. 낮 동안 복도를 가득 채우던 학생들의 웃음소리는 빠져나갔는데, 테이프 자국과 떨어진 장식만 남아 축제가 실제로 있었음을 증명하고 있었다. 복도 끝 비상구 표시등은 지나치게 선명해서, 재윤은 자신이 지금 어디로든 도망칠 수 있는데도 그러지 않는다는 사실을 의식했다. 아니, 아무도 없어
