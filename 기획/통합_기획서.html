템 요구사항", "id": "시스템-미연시코어시스템요구사항-md", "html": "<h2 id=\"시스템-미연시코어시스템요구사항-md-미연시-코어-시스템-요구사항\">미연시 코어 시스템 요구사항<\/h2>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-1-목적\">1. 목적<\/h3>\n<p>이 문서는 현재 스토리 기획을 실제 게임 시스템으로 구현하기 위해 필요한 코어 로직을 정리한다.<\/p>\n<p>현재 StoryFlow는 Scene / Shot / Branch / Transition 기반의 스토리 실행 구조를 제공한다. 미연시 게임을 만들기 위해서는 그 위에 날짜, 이벤트 선택, 캐릭터 진행도, 플래그, 루프, 엔딩 기록 같은 게임 상태 관리 계층이 필요하다.<\/p>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-2-현재-storyflow-기준\">2. 현재 StoryFlow 기준<\/h3>\n<p><code>StoryFlow<\/code>의 현재 기능 요약:<\/p>\n<ul>\n<li><code>StorySceneAsset<\/code> 하나가 하나의 Scene 흐름을 가짐<\/li>\n<li>Scene 안에는 Shot / Branch / Transition 그래프가 있음<\/li>\n<li>Shot은 실제 진행 단계<\/li>\n<li>Branch는 여러 출력 중 다음 경로 선택<\/li>\n<li>Transition은 다음 Scene으로 이동<\/li>\n<li>저장/복원 최소 단위는 <code>FStoryFlowRef = SceneID + ShotID<\/code><\/li>\n<\/ul>\n<p>현재 구조는 장면 실행에는 적합하지만, 미연시의 장기 상태를 직접 표현하기에는 부족하다.<\/p>\n<p>따라서 추가 코어 시스템은 StoryFlow를 대체하지 않고, StoryFlow가 참조할 수 있는 <code>스토리 상태 레이어<\/code>로 설계하는 것이 좋다.<\/p>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-3-게임-구조-요약\">3. 게임 구조 요약<\/h3>\n<p>현재 스토리 구조:<\/p>\n<pre><code>첫 회차 D-32 ~ D-26: 기존 히로인 관계 기준점\nD-25: 은하연 전학 / 루프 시작점\nD-23: 담임의 축제 이틀 일정 공식 공지 / 2학년 5반의 반 단위 참여 확정\nD-25 ~ D-19: 하연 적응 / 관계 변화 시작\nD-18 ~ D-12: 2학년 5반 반행사 `쉬어가 카페` 확정 / 축제 준비 진입 / 관계 확장\nD-11 ~ D-5: 관계 균열 심화 / 사고 단서 구체화\nD-4 ~ D-2: 기억 회복 심화 / 관계 정리 클라이맥스 / 하연 고백 예고\nD-1 목요일: 축제 1일차 / 부스 정상 운영 / 하연과 `쉬어가 카페` 운영으로 관계 강화\nD-Day 금요일: 축제 2일차 / 부스 축소 운영 후 히로인 선택 / 사고 재현 / 엔딩 분기\nD+3 월요일: 방학식 예정 / 실패 루프에서는 도달하지 못하는 다음 월요일 / 진엔딩에서는 일요일 기상 후 참석<\/code><\/pre>\n<p>표기 규칙:<\/p>\n<ul>\n<li><code>D-Day<\/code>는 내부 날짜 상태, 조건 평가, 엔딩 분기 기준으로만 사용한다.<\/li>\n<li>게임 내 대사, 칠판, 일정표, UI에는 <code>D-Day<\/code>를 직접 노출하지 않는다.<\/li>\n<li>게임 내 표기는 <code>축제 1일차/첫날/목요일<\/code>, <code>축제 2일차/마지막 날/금요일<\/code>, <code>폐장 후<\/code>를 사용한다.<\/li>\n<\/ul>\n<p>루프 이후에는 D-32 ~ D-26 구간을 반복하지 않고 D-25 월요일에서 시작한다. D+3 월요일 방학식은 일정상 존재하지만, 실패 루프에서는 D-Day 이후 그 날짜에 도달하지 못한다. 진엔딩에서는 D-Day 금요일 밤 이후 토요일을 날짜 표기로 보여주지 않고 일요일 오후 병실로 점프하며, 재윤이 깨어난 뒤 D+3 월요일 방학식에 겨우 참석한다.<\/p>\n<p>진엔딩 조건은 세 축이다.<\/p>\n<ol>\n<li>하연과의 상호 마음 확인<\/li>\n<li>기존 관계 정리<\/li>\n<li>사고 단서 확보<\/li>\n<\/ol>\n<p>하연과 서로의 마음을 확인하지 못한 상태로 D-Day 금요일 밤에 도달하면, 재윤은 하연이 있던 사고 기억을 온전히 복구하지 못한다. 이 경우 폐장 후 학교 뒤편 야외 소무대에 혼자 선 사고로 재구성되고, D+3 월요일 방학식에 도달하지 못한 채 D-25 월요일로 루프한다.<\/p>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-4-필수-런타임-상태\">4. 필수 런타임 상태<\/h3>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-4-1-날짜-회차-상태\">4.1 날짜 / 회차 상태<\/h4>\n<p>필요 상태:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>예시<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td>현재 날짜<\/td><td><code>D-25<\/code>, <code>D-14<\/code>, <code>D-1<\/code>, <code>D-Day<\/code>, <code>D+3<\/code><\/td><td>이벤트 개방과 루프 시작점, 축제 1일차/2일차, 방학식 예정일 표시에 사용<\/td><\/tr><tr><td>현재 주차<\/td><td><code>Week1<\/code>, <code>Week2<\/code>, <code>Week3<\/code>, <code>FinalWeek<\/code><\/td><td>이벤트 단계 관리용<\/td><\/tr><tr><td>첫 회차 여부<\/td><td><code>bIsFirstRun<\/code><\/td><td>첫 회차 전용 1주 프롤로그 표시 여부<\/td><\/tr><tr><td>루프 횟수<\/td><td><code>LoopCount<\/code><\/td><td>반복 연출, 히든 엔딩 조건에 사용<\/td><\/tr><tr><td>D-Day 진입 여부<\/td><td><code>bReachedDDay<\/code><\/td><td>엔딩 분기 트리거<\/td><\/tr><tr><td>방학식 예정 인지 여부<\/td><td><code>bKnowsVacationCeremony<\/code><\/td><td>D+3 월요일 방학식 안내와 미루 멘토링 종료 불안에 사용<\/td><\/tr><\/tbody><\/table><\/div>\n<p>요구 기능:<\/p>\n<ul>\n<li>날짜 진행<\/li>\n<li>특정 날짜 범위 이벤트 개방<\/li>\n<li>첫 회차와 루프 이후 시작점 분리<\/li>\n<li>D-1 도달 시 축제 1일차 부스 운영 이벤트와 D-Day 진입 전 최종 정산 처리<\/li>\n<li>D-Day 도달 시 축제 2일차 선택과 엔딩 조건 평가<\/li>\n<li>D+3 월요일 방학식은 예정일로 관리하되, 실패 루프에서는 실제 일반 진행 날짜로 진입하지 않음<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-4-2-캐릭터-진행도\">4.2 캐릭터 진행도<\/h4>\n<p>필요 캐릭터:<\/p>\n<ul>\n<li>은하연<\/li>\n<li>한소하<\/li>\n<li>백서린<\/li>\n<li>나미루<\/li>\n<\/ul>\n<p>각 캐릭터별 상태:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td>관계도 / 호감도<\/td><td>하연과의 상호 마음 확인과 일반 히로인 이벤트 진행에 사용<\/td><\/tr><tr><td>이벤트 단계<\/td><td>Week별 이벤트 진행도<\/td><\/tr><tr><td>클라이맥스 해결 여부<\/td><td>진엔딩 조건 B에 사용<\/td><\/tr><tr><td>관계 균열 단계<\/td><td>미련, 회피, 의존, 기억 혼선 연출 강도에 사용<\/td><\/tr><tr><td>마지막 선택 날짜<\/td><td>병렬 이벤트 선택 균형 확인용<\/td><\/tr><\/tbody><\/table><\/div>\n<p>주의:<\/p>\n<ul>\n<li>일반 히로인의 관계도는 연애 성공을 뜻하지 않는다.<\/li>\n<li>일반 히로인 진행도는 <code>기존 관계 정리<\/code>와 <code>미련/회피/의존 해소<\/code>를 의미한다.<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-4-3-플래그-조건-상태\">4.3 플래그 / 조건 상태<\/h4>\n<p>필요 플래그 예시:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>플래그<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td><code>MetHayeon<\/code><\/td><td>은하연 전학 이벤트 완료<\/td><\/tr><tr><td><code>HayeonEvent_FirstTalk<\/code><\/td><td>하연 첫 대화 완료<\/td><\/tr><tr><td><code>HayeonEvent_TrustTalk<\/code><\/td><td>하연이 자기 속도와 마음을 말할 수 있을 만큼 신뢰가 쌓인 핵심 대화 완료<\/td><\/tr><tr><td><code>HayeonEvent_FestivalBoothDay1<\/code><\/td><td>D-1 축제 1일차에 하연과 <code>쉬어가 카페<\/code> 부스 운영을 함께하며 관계 강화 완료<\/td><\/tr><tr><td><code>HayeonEvent_Premonition<\/code><\/td><td>하연이 직접 약속을 잡지 않고, 재윤이 하연의 조용한 동선과 속도를 이해함<\/td><\/tr><tr><td><code>HayeonMutualHeartConfirmed<\/code><\/td><td>하연과 재윤이 서로의 마음을 확인할 조건 충족<\/td><\/tr><tr><td><code>HayeonMissingFromAccidentMemory<\/code><\/td><td>하연 조건 부족으로 사고 기억에서 하연이 빠지고 혼자 소무대 사고로 재구성됨<\/td><\/tr><tr><td><code>SohaClimaxResolved<\/code><\/td><td>소하 클라이맥스 해결<\/td><\/tr><tr><td><code>SeorinClimaxResolved<\/code><\/td><td>서린 클라이맥스 해결<\/td><\/tr><tr><td><code>MiruClimaxResolved<\/code><\/td><td>미루 클라이맥스 해결<\/td><\/tr><tr><td><code>MiruMentoringEndingSoon<\/code><\/td><td>미루의 1학기 한정 멘토링 종료가 가까워졌음을 인지<\/td><\/tr><tr><td><code>VacationCeremonyAnnounced<\/code><\/td><td>D+3 월요일 방학식 일정 공지 확인<\/td><\/tr><tr><td><code>SundayWakeUpAfterDDay<\/code><\/td><td>진엔딩에서 토요일 표기 없이 일요일 오후 병실에서 깨어남<\/td><\/tr><tr><td><code>AttendedVacationCeremony<\/code><\/td><td>진엔딩 이후 D+3 월요일 방학식 참석<\/td><\/tr><tr><td><code>DDayUnlockedTrueChoice<\/code><\/td><td>하연과의 상호 마음 확인, D-1 하연 부스 운영, D-2 말하지 못한 예감, 기존 관계 정리, 사고 단서 조건을 충족해 D-Day 진엔딩 선택지 개방<\/td><\/tr><\/tbody><\/table><\/div>\n<p>요구 기능:<\/p>\n<ul>\n<li>플래그 설정 / 해제 / 조회<\/li>\n<li>Branch에서 플래그 기반 분기<\/li>\n<li>여러 플래그 조합으로 선택지 개방<\/li>\n<\/ul>\n<p>D-1 밤 정산과 D-Day 낮 보정의 구체 점수·우선순위 기준은 <a href=\"../스토리/12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>를 따른다. 해당 문서는 <code>HaYeonTrust<\/code>, <code>HaYeonPaceRead<\/code>, 기존 관계 <code>Resolved<\/code> 플래그, 사고 단서 수, <code>Avoidance<\/code>를 조합해 폐장 후 최종 분기를 평가하는 기준표다.<\/p>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-4-4-사고-단서-기억-조각\">4.4 사고 단서 / 기억 조각<\/h4>\n<p>사고 단서는 진엔딩 조건에 직접 연결된다.<\/p>\n<p>필요 단서:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>단서<\/th><th>획득 경로<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>하연을 좋아했다는 사실<\/td><td>한소하 루트<\/td><td>감정 단서<\/td><\/tr><tr><td>소무대 임시 구조물 위험<\/td><td>백서린 루트<\/td><td>사고 환경 단서<\/td><\/tr><tr><td>출입금지 표지 / 고정끈 문제<\/td><td>나미루 루트<\/td><td>사고 원인 단서<\/td><\/tr><tr><td>고백 장소, 끊긴 문장, 혼자가 아니었던 사고 기억<\/td><td>하연 루트<\/td><td>D-Day 기억 단서<\/td><\/tr><\/tbody><\/table><\/div>\n<p>요구 기능:<\/p>\n<ul>\n<li>단서 획득<\/li>\n<li>단서 보유 여부 조회<\/li>\n<li>단서 수량 / 특정 조합 검사<\/li>\n<li>루프 이후 단서 유지 여부 결정<\/li>\n<\/ul>\n<p>권장:<\/p>\n<ul>\n<li>단서는 단순 불리언보다 <code>MemoryFragment<\/code> 형태로 관리한다.<\/li>\n<li>UI에서 확인 가능한 <code>기억 조각<\/code> 목록으로 확장 가능하게 한다.<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-4-5-엔딩-기록\">4.5 엔딩 기록<\/h4>\n<p>필요 상태:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td>본 엔딩 목록<\/td><td>엔딩 수집용<\/td><\/tr><tr><td>새드엔딩별 관람 횟수<\/td><td>반복 새드엔딩 압축 / 특수 대사 조건<\/td><\/tr><tr><td>총 새드엔딩 횟수<\/td><td>기억 혼선 / 루프 피로 / 히든 엔딩 조건<\/td><\/tr><tr><td>진엔딩 완료 여부<\/td><td>클리어 후 콘텐츠 조건<\/td><\/tr><tr><td>히든 엔딩 완료 여부<\/td><td>복구 이벤트 개방 조건<\/td><\/tr><\/tbody><\/table><\/div>\n<p>요구 기능:<\/p>\n<ul>\n<li>엔딩 기록 저장<\/li>\n<li>같은 엔딩 반복 횟수 증가<\/li>\n<li>반복 횟수에 따라 연출 분기<\/li>\n<li>엔딩 수집 UI로 확장 가능하게 설계<\/li>\n<\/ul>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-5-핵심-시스템-요구사항\">5. 핵심 시스템 요구사항<\/h3>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-1-날짜-기반-이벤트-허브\">5.1 날짜 기반 이벤트 허브<\/h4>\n<p>미연시의 기본 루프는 날짜별 허브다.<\/p>\n<p>예시 선택지:<\/p>\n<pre><code>[하연과 시간을 보낸다]\n[소하와 등교한다]\n[서린을 돕는다]\n[미루의 멘토링을 봐준다]\n[축제 준비를 조사한다]<\/code><\/pre>\n<p>필요 기능:<\/p>\n<ul>\n<li>현재 날짜와 캐릭터 진행도에 따라 선택 가능한 이벤트 목록 생성<\/li>\n<li>이미 완료한 이벤트 제외 또는 압축판 제공<\/li>\n<li>특정 이벤트 우선순위 처리<\/li>\n<li>선택 결과로 StoryFlow Scene 시작<\/li>\n<\/ul>\n<p>StoryFlow 연결:<\/p>\n<ul>\n<li>날짜 허브는 별도 Scene으로 구성 가능<\/li>\n<li>각 선택지는 Transition으로 이벤트 Scene에 진입<\/li>\n<li>이벤트 종료 후 다시 허브 Scene으로 복귀<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-2-조건-기반-선택지\">5.2 조건 기반 선택지<\/h4>\n<p>D-Day와 주요 클라이맥스에서는 조건에 따라 선택지가 달라진다.<\/p>\n<p>예:<\/p>\n<p>조건 부족:<\/p>\n<pre><code>[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>조건 충족:<\/p>\n<pre><code>[하연에게 돌아간다]<\/code><\/pre>\n<p>완전 조건 충족:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>진엔딩 복귀 처리:<\/p>\n<ul>\n<li>금요일 밤 D-Day 선택 이후 토요일 날짜 허브는 생성하지 않는다.<\/li>\n<li>바로 일요일 오후 병실 Scene으로 전환한다.<\/li>\n<li>재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못했던 상태로 처리한다.<\/li>\n<li>일요일 병실 Scene 이후 D+3 월요일 방학식 에필로그 Scene을 개방한다.<\/li>\n<\/ul>\n<p>필요 기능:<\/p>\n<ul>\n<li>선택지별 표시 조건<\/li>\n<li>선택지별 비활성 조건 또는 숨김 조건<\/li>\n<li>선택 시 상태 변경<\/li>\n<li>조건 미충족 시 대체 선택지 제공<\/li>\n<\/ul>\n<p>StoryFlow 연결:<\/p>\n<ul>\n<li>BranchTemplate에서 상태를 조회해 출력 인덱스를 선택할 수 있어야 함<\/li>\n<li>또는 선택지 UI가 상태 조건을 평가하고, 결과를 StoryFlow에 전달해야 함<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-3-병렬-진행도-관리\">5.3 병렬 진행도 관리<\/h4>\n<p>한 명씩 공략하는 구조가 아니므로 병렬 상태가 필요하다.<\/p>\n<p>필요 기능:<\/p>\n<ul>\n<li>캐릭터별 이벤트 단계 저장<\/li>\n<li>선택하지 않은 캐릭터의 관계 균열 단계 증가<\/li>\n<li>특정 주차 이후 클라이맥스 이벤트 개방<\/li>\n<li>하연과의 상호 마음 확인, D-1 하연 부스 운영 이벤트와 여러 캐릭터 조건이 D-Day 진엔딩 조건에 합산<\/li>\n<\/ul>\n<p>권장 모델:<\/p>\n<pre><code>CharacterProgress\n- CharacterID\n- AffectionOrBond\n- EventStage\n- DistortionLevel\n- bClimaxResolved\n- LastEventDay<\/code><\/pre>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-4-루프-처리\">5.4 루프 처리<\/h4>\n<p>루프는 메인 반복 플레이를 강요하는 시스템이 아니라, 실패 후 재도전 장치다.<\/p>\n<p>필요 기능:<\/p>\n<ul>\n<li>D-Day 실패 시 D-25로 복귀<\/li>\n<li>D+3 월요일 방학식은 실패 루프에서 도달하지 못하는 예정일로 유지<\/li>\n<li>첫 회차 전용 프롤로그는 반복하지 않음<\/li>\n<li>기억 조각 / 엔딩 기록 / 일부 플래그 유지<\/li>\n<li>일반 관계도와 날짜는 루프 시작점에 맞게 재초기화<\/li>\n<\/ul>\n<p>유지할 상태:<\/p>\n<ul>\n<li>엔딩 기록<\/li>\n<li>기억 조각<\/li>\n<li>히든 엔딩 여부<\/li>\n<li>기억 혼선 / 루프 피로<\/li>\n<li>일부 메타 플래그<\/li>\n<\/ul>\n<p>초기화할 상태:<\/p>\n<ul>\n<li>현재 날짜<\/li>\n<li>일반 이벤트 진행도<\/li>\n<li>일시적 선택 플래그<\/li>\n<li>D-Day 진입 상태<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-5-이벤트-재방문-압축\">5.5 이벤트 재방문 압축<\/h4>\n<p>루프 피로도를 줄이기 위해 필요하다.<\/p>\n<p>필요 기능:<\/p>\n<ul>\n<li>이벤트 최초 관람 여부 저장<\/li>\n<li>재관람 시 압축 이벤트로 전환<\/li>\n<li>플레이어가 스킵/요약을 선택 가능<\/li>\n<li>단, 중요한 선택지는 다시 제공<\/li>\n<\/ul>\n<p>예:<\/p>\n<ul>\n<li>최초 관람: 전체 대화와 연출<\/li>\n<li>2회차: 핵심 문장 + 선택지만 표시<\/li>\n<li>기억 조각 보유 시: 바로 분기 선택지 제공<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-6-기억-혼선과-루프-피로\">5.6 기억 혼선과 루프 피로<\/h4>\n<p>새드엔딩 반복과 히든 엔딩 조건에 사용한다.<\/p>\n<p>필요 상태:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td><code>MemoryConfusion<\/code><\/td><td>기억 혼선과 루프 피로 정도<\/td><\/tr><tr><td><code>RepeatedSadEndingCount<\/code><\/td><td>같은 새드엔딩 반복 여부<\/td><\/tr><tr><td><code>IgnoredHayeonCount<\/code><\/td><td>하연 이벤트 무시 횟수<\/td><\/tr><\/tbody><\/table><\/div>\n<p>효과 예시:<\/p>\n<ul>\n<li>날짜 표시 깨짐<\/li>\n<li>배경음에 병원 기계음 증가<\/li>\n<li>선택지 문구 변경<\/li>\n<li>히든 세계 붕괴 엔딩 개방<\/li>\n<\/ul>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-5-7-히든-엔딩-복구-상태\">5.7 히든 엔딩 복구 상태<\/h4>\n<p>히든 엔딩 후 <code>망가진 D-25<\/code> 복구 이벤트가 필요하다.<\/p>\n<p>필요 기능:<\/p>\n<ul>\n<li>히든 엔딩 후 루프 시작 Scene 변경<\/li>\n<li>복구 조각 수집 상태 저장<\/li>\n<li>하연 이름표 획득 후 정상 D-25 복구<\/li>\n<\/ul>\n<p>복구 조각:<\/p>\n<ul>\n<li>소하의 팔찌 또는 오래된 사진<\/li>\n<li>서린의 점검표 조각<\/li>\n<li>미루의 키링 또는 고정끈<\/li>\n<li>하연의 이름표<\/li>\n<\/ul>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-6-데이터-설계-후보\">6. 데이터 설계 후보<\/h3>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-6-1-story-state\">6.1 Story State<\/h4>\n<pre><code>StoryState\n- CurrentDay\n- CurrentWeek\n- bIsFirstRun\n- LoopCount\n- MemoryConfusion\n- CurrentPhase\n- CharacterProgressList\n- Flags\n- MemoryFragments\n- EndingRecords<\/code><\/pre>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-6-2-event-definition\">6.2 Event Definition<\/h4>\n<pre><code>StoryEventDefinition\n- EventID\n- DisplayName\n- CharacterID\n- WeekRange\n- RequiredFlags\n- RequiredFragments\n- RequiredProgress\n- SetFlagsOnComplete\n- AddFragmentsOnComplete\n- NextSceneID\n- bCanCompressOnReplay<\/code><\/pre>\n<h4 id=\"시스템-미연시코어시스템요구사항-md-6-3-ending-definition\">6.3 Ending Definition<\/h4>\n<pre><code>EndingDefinition\n- EndingID\n- EndingType\n- RequiredFlags\n- RequiredFragments\n- RequiredCorruption\n- SceneID\n- bCountsForCollection<\/code><\/pre>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-7-최소-구현-범위\">7. 최소 구현 범위<\/h3>\n<p>먼저 필요한 최소 범위:<\/p>\n<ol>\n<li>날짜 상태<\/li>\n<li>캐릭터별 진행도<\/li>\n<li>플래그 저장/조회<\/li>\n<li>기억 조각 저장/조회<\/li>\n<li>조건 기반 선택지<\/li>\n<li>D-1 축제 1일차 정산 및 D-Day 엔딩 조건 평가<\/li>\n<li>루프 시 D-25 복귀<\/li>\n<li>엔딩 기록<\/li>\n<\/ol>\n<p>이 범위만 있어도 현재 스토리의 핵심 구조는 구현 가능하다.<\/p>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-8-후순위-구현-범위\">8. 후순위 구현 범위<\/h3>\n<p>나중에 추가해도 되는 기능:<\/p>\n<ol>\n<li>이벤트 재방문 압축<\/li>\n<li>엔딩 수집 UI<\/li>\n<li>기억 혼선과 루프 피로에 따른 연출 변화<\/li>\n<li>히든 엔딩 복구 전용 UI<\/li>\n<li>기억 조각 도감<\/li>\n<li>자동 이벤트 추천 / 알림<\/li>\n<\/ol>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-9-storyflow-추가-기능-후보\">9. StoryFlow 추가 기능 후보<\/h3>\n<p>현재 StoryFlow는 Scene/Shot/Branch 실행에 강점이 있으므로, 미연시 시스템은 별도 상태 계층으로 두는 것이 좋다.<\/p>\n<p>추가 후보:<\/p>\n<ol>\n<li><code>StoryStateSubsystem<\/code><\/li>\n<\/ol>\n<ul>\n<li>날짜, 플래그, 기억 조각, 캐릭터 진행도, 엔딩 기록 관리<\/li>\n<\/ul>\n<ol>\n<li><code>StoryEventRegistryAsset<\/code><\/li>\n<\/ol>\n<ul>\n<li>날짜/조건별 이벤트 정의 관리<\/li>\n<\/ul>\n<ol>\n<li><code>StoryConditionEvaluator<\/code><\/li>\n<\/ol>\n<ul>\n<li>조건 기반 선택지와 Branch 평가<\/li>\n<\/ul>\n<ol>\n<li><code>StoryLoopManager<\/code><\/li>\n<\/ol>\n<ul>\n<li>루프 초기화, 유지/초기화할 상태 구분<\/li>\n<\/ul>\n<ol>\n<li><code>StoryEndingManager<\/code><\/li>\n<\/ol>\n<ul>\n<li>엔딩 조건 평가와 엔딩 기록<\/li>\n<\/ul>\n<h3 id=\"시스템-미연시코어시스템요구사항-md-10-다음-설계-과제\">10. 다음 설계 과제<\/h3>\n<ol>\n<li>실제 코드에 이미 존재하는 저장/플래그/이벤트 관련 시스템 확인<\/li>\n<li><code>StoryState<\/code> 데이터 구조 확정<\/li>\n<li>이벤트 정의 에셋을 만들지, DataTable로 갈지 결정<\/li>\n<li>조건 기반 선택지를 StoryFlow Branch로 처리할지 UI 선택지 시스템에서 처리할지 결정<\/li>\n<li>최소 구현 범위 기준으로 개발 순서 작성<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "미연시 코어 시스템 요구사항", "id": "시스템-미연시코어시스템요구사항-md-미연시-코어-시스템-요구사항"}, {"level": 2, "text": "1. 목적", "id": "시스템-미연시코어시스템요구사항-md-1-목적"}, {"level": 2, "text": "2. 현재 StoryFlow 기준", "id": "시스템-미연시코어시스템요구사항-md-2-현재-storyflow-기준"}, {"level": 2, "text": "3. 게임 구조 요약", "id": "시스템-미연시코어시스템요구사항-md-3-게임-구조-요약"}, {"level": 2, "text": "4. 필수 런타임 상태", "id": "시스템-미연시코어시스템요구사항-md-4-필수-런타임-상태"}, {"level": 3, "text": "4.1 날짜 / 회차 상태", "id": "시스템-미연시코어시스템요구사항-md-4-1-날짜-회차-상태"}, {"level": 3, "text": "4.2 캐릭터 진행도", "id": "시스템-미연시코어시스템요구사항-md-4-2-캐릭터-진행도"}, {"level": 3, "text": "4.3 플래그 / 조건 상태", "id": "시스템-미연시코어시스템요구사항-md-4-3-플래그-조건-상태"}, {"level": 3, "text": "4.4 사고 단서 / 기억 조각", "id": "시스템-미연시코어시스템요구사항-md-4-4-사고-단서-기억-조각"}, {"level": 3, "text": "4.5 엔딩 기록", "id": "시스템-미연시코어시스템요구사항-md-4-5-엔딩-기록"}, {"level": 2, "text": "5. 핵심 시스템 요구사항", "id": "시스템-미연시코어시스템요구사항-md-5-핵심-시스템-요구사항"}, {"level": 3, "text": "5.1 날짜 기반 이벤트 허브", "id": "시스템-미연시코어시스템요구사항-md-5-1-날짜-기반-이벤트-허브"}, {"level": 3, "text": "5.2 조건 기반 선택지", "id": "시스템-미연시코어시스템요구사항-md-5-2-조건-기반-선택지"}, {"level": 3, "text": "5.3 병렬 진행도 관리", "id": "시스템-미연시코어시스템요구사항-md-5-3-병렬-진행도-관리"}, {"level": 3, "text": "5.4 루프 처리", "id": "시스템-미연시코어시스템요구사항-md-5-4-루프-처리"}, {"level": 3, "text": "5.5 이벤트 재방문 압축", "id": "시스템-미연시코어시스템요구사항-md-5-5-이벤트-재방문-압축"}, {"level": 3, "text": "5.6 기억 혼선과 루프 피로", "id": "시스템-미연시코어시스템요구사항-md-5-6-기억-혼선과-루프-피로"}, {"level": 3, "text": "5.7 히든 엔딩 복구 상태", "id": "시스템-미연시코어시스템요구사항-md-5-7-히든-엔딩-복구-상태"}, {"level": 2, "text": "6. 데이터 설계 후보", "id": "시스템-미연시코어시스템요구사항-md-6-데이터-설계-후보"}, {"level": 3, "text": "6.1 Story State", "id": "시스템-미연시코어시스템요구사항-md-6-1-story-state"}, {"level": 3, "text": "6.2 Event Definition", "id": "시스템-미연시코어시스템요구사항-md-6-2-event-definition"}, {"level": 3, "text": "6.3 Ending Definition", "id": "시스템-미연시코어시스템요구사항-md-6-3-ending-definition"}, {"level": 2, "text": "7. 최소 구현 범위", "id": "시스템-미연시코어시스템요구사항-md-7-최소-구현-범위"}, {"level": 2, "text": "8. 후순위 구현 범위", "id": "시스템-미연시코어시스템요구사항-md-8-후순위-구현-범위"}, {"level": 2, "text": "9. StoryFlow 추가 기능 후보", "id": "시스템-미연시코어시스템요구사항-md-9-storyflow-추가-기능-후보"}, {"level": 2, "text": "10. 다음 설계 과제", "id": "시스템-미연시코어시스템요구사항-md-10-다음-설계-과제"}], "plain": "# 미연시 코어 시스템 요구사항 ## 1. 목적 이 문서는 현재 스토리 기획을 실제 게임 시스템으로 구현하기 위해 필요한 코어 로직을 정리한다. 현재 StoryFlow는 Scene / Shot / Branch / Transition 기반의 스토리 실행 구조를 제공한다. 미연시 게임을 만들기 위해서는 그 위에 날짜, 이벤트 선택, 캐릭터 진행도, 플래그, 루프, 엔딩 기록 같은 게임 상태 관리 계층이 필요하다. ## 2. 현재 StoryFlow 기준 `StoryFlow`의 현재 기능 요약: - `StorySceneAsset` 하나가 하나의 Scene 흐름을 가짐 - Scene 안에는 Shot / Branch / Transition 그래프가 있음 - Shot은 실제 진행 단계 - Branch는 여러 출력 중 다음 경로 선택 - Transition은 다음 Scene으로 이동 - 저장/복원 최소 단위는 `FStoryFlowRef = SceneID + ShotID` 현재 구조는 장면 실행에는 적합하지만, 미연시의 장기 상태를 직접 표현하기에는 부족하다. 따라서 추가 코어 시스템은 StoryFlow를 대체하지 않고, StoryFlow가 참조할 수 있는 `스토리 상태 레이어`로 설계하는 것이 좋다. ## 3. 게임 구조 요약 현재 스토리 구조: ```text 첫 회차 D-32 ~ D-26: 기존 히로인 관계 기준점 D-25: 은하연 전학 / 루프 시작점 D-23: 담임의 축제 이틀 일정 공식 공지 / 2학년 5반의 반 단위 참여 확정 D-25 ~ D-19: 하연 적응 / 관계 변화 시작 D-18 ~ D-12: 2학년 5반 반행사 `쉬어가 카페` 확정 / 축제 준비 진입 / 관계 확장 D-11 ~ D-5: 관계 균열 심화 / 사고 단서 구체화 D-4 ~ D-2: 기억 회복 심화 / 관계 정리 클라이맥스 / 하연 고백 예고 D-1 목요일: 축제 1일차 / 부스 정상 운영 / 하연과 `쉬어가 카페` 운영으로 관계 강화 D-Day 금요일: 축제 2일차 / 부스 축소 운영 후 히로인 선택 / 사고 재현 / 엔딩 분기 D+3 월요일: 방학식 예정 / 실패 루프에서는 도달하지 못하는 다음 월요일 / 진엔딩에서는 일요일 기상 후 참석 ``` 표기 규칙: - `D-Day`는 내부 날짜 상태, 조건 평가, 엔딩 분기 기준으로만 사용한다. - 게임 내 대사, 칠판, 일정표, UI에는 `D-Day`를 직접 노출하지 않는다. - 게임 내 표기는 `축제 1일차/첫날/목요일`, `축제 2일차/마지막 날/금요일`, `폐장 후`를 사용한다. 루프 이후에는 D-32 ~ D-26 구간을 반복하지 않고 D-25 월요일에서 시작한다. D+3 월요일 방학식은 일정상 존재하지만, 실패 루프에서는 D-Day 이후 그 날짜에 도달하지 못한다. 진엔딩에서는 D-Day 금요일 밤 이후 토요일을 날짜 표기로 보여주지 않고 일요일 오후 병실로 점프하며, 재윤이 깨어난 뒤 D+3 월요일 방학식에 겨우 참석한다. 진엔딩 조건은 세 축이다. 1. 하연과의 상호 마음 확인 2. 기존 관계 정리 3. 사고 단서 확보 하연과 서로의 마음을 확인하지 못한 상태로 D-Day 금요일 밤에 도달하면, 재윤은 하연이 있던 사고 기억을 온전히 복구하지 못한다. 이 경우 폐장 후 학교 뒤편 야외 소무대에 혼자 선 사고로 재구성되고, D+3 월요일 방학식에 도달하지 못한 채 D-25 월요일로 루프한다. ## 4. 필수 런타임 상태 ### 4.1 날짜 / 회차 상태 필요 상태: | 상태 | 예시 | 설명 | | --- | --- | --- | | 현재 날짜 | `D-25`, `D-14`, `D-1`, `D-Day`, `D+3` | 이벤트 개방과 루프 시작점, 축제 1일차/2일차, 방학식 예정일 표시에 사용 | | 현재 주차 | `Week1`, `Week2`, `Week3`, `FinalWeek` | 이벤트 단계 관리용 | | 첫 회차 여부 | `bIsFirstRun` | 첫 회차 전용 1주 프롤로그 표시 여부 | | 루프 횟수 | `LoopCount` | 반복 연출, 히든 엔딩 조건에 사용 | | D-Day 진입 여부 | `bReachedDDay` | 엔딩 분기 트리거 | | 방학식 예정 인지 여부 | `bKnowsVacationCeremony` | D+3 월요일 방학식 안내와 미루 멘토링 종료 불안에 사용 | 요구 기능: - 날짜 진행 - 특정 날짜 범위 이벤트 개방 - 첫 회차와 루프 이후 시작점 분리 - D-1 도달 시 축제 1일차 부스 운영 이벤트와 D-Day 진입 전 최종 정산 처리 - D-Day 도달 시 축제 2일차 선택과 엔딩 조건 평가 - D+3 월요일 방학식은 예정일로 관리하되, 실패 루프에서는 실제 일반 진행 날짜로 진입하지 않음 ### 4.2 캐릭터 진행도 필요 캐릭터: - 은하연 - 한소하 - 백서린 - 나미루 각 캐릭터별 상태: | 상태 | 설명 | | --- | --- | | 관계도 / 호감도 | 하연과의 상호 마음 확인과 일반 히로인 이벤트 진행에 사용 | | 이벤트 단계 | Week별 이벤트 진행도 | | 클라이맥스 해결 여부 | 진엔딩 조건 B에 사용 | | 관계 균열 단계 | 미련, 회피, 의존, 기억 혼선 연출 강도에 사용 | | 마지막 선택 날짜 | 병렬 이벤트 선택 균형 확인용 | 주의: - 일반 히로인의 관계도는 연애 성공을 뜻하지 않는다. - 일반 히로인 진행도는 `기존 관계 정리`와 `미련/회피/의존 해소`를 의미한다. ### 4.3 플래그 / 조건 상태 필요 플래그 예시: | 플래그 | 설명 | | --- | --- | | `MetHayeon` | 은하연 전학 이벤트 완료 | | `HayeonEvent_FirstTalk` | 하연 첫 대화 완료 | | `HayeonEvent_TrustTalk` | 하연이 자기 속도와 마음을 말할 수 있을 만큼 신뢰가 쌓인 핵심 대화 완료 | | `HayeonEvent_FestivalBoothDay1` | D-1 축제 1일차에 하연과 `쉬어가 카페` 부스 운영을 함께하며 관계 강화 완료 | | `HayeonEvent_Premonition` | 하연이 직접 약속을 잡지 않고, 재윤이 하연의 조용한 동선과 속도를 이해함 | | `HayeonMutualHeartConfirmed` | 하연과 재윤이 서로의 마음을 확인할 조건 충족 | | `HayeonMissingFromAccidentMemory` | 하연 조건 부족으로 사고 기억에서 하연이 빠지고 혼자 소무대 사고로 재구성됨 | | `SohaClimaxResolved` | 소하 클라이맥스 해결 | | `SeorinClimaxResolved` | 서린 클라이맥스 해결 | | `MiruClimaxResolved` | 미루 클라이맥스 해결 | | `MiruMentoringEndingSoon` | 미루의 1학기 한정 멘토링 종료가 가까워졌음을 인지 | | `VacationCeremonyAnnounced` | D+3 월요일 방학식 일정 공지 확인 | | `SundayWakeUpAfterDDay` | 진엔딩에서 토요일 표기 없이 일요일 오후 병실에서 깨어남 | | `AttendedVacationCeremony` | 진엔딩 이후 D+3 월요일 방학식 참석 | | `DDayUnlockedTrueChoice` | 하연과의 상호 마음 확인, D-1 하연 부스 운영, D-2 말하지 못한 예감, 기존 관계 정리, 사고 단서 조건을 충족해 D-Day 진엔딩 선택지 개방 | 요구 기능: - 플래그 설정 / 해제 / 조회 - Branch에서 플래그 기반 분기 - 여러 플래그 조합으로 선택지 개방 D-1 밤 정산과 D-Day 낮 보정의 구체 점수·우선순위 기준은 [D-1/D-Day 조건 수치화](../스토리/12_D-1_D-Day_조건_수치화.md)를 따른다. 해당 문서는 `HaYeonTrust`, `HaYeonPaceRead`, 기존 관계 `Resolved` 플래그, 사고 단서 수, `Avoidance`를 조합해 폐장 후 최종 분기를 평가하는 기준표다. ### 4.4 사고 단서 / 기억 조각 사고 단서는 진엔딩 조건에 직접 연결된다. 필요 단서: | 단서 | 획득 경로 | 의미 | | --- | --- | --- | | 하연을 좋아했다는 사실 | 한소하 루트 | 감정 단서 | | 소무대 임시 구조물 위험 | 백서린 루트 | 사고 환경 단서 | | 출입금지 표지 / 고정끈 문제 | 나미루 루트 | 사고 원인 단서 | | 고백 장소, 끊긴 문장, 혼자가 아니었던 사고 기억 | 하연 루트 | D-Day 기억 단서 | 요구 기능: - 단서 획득 - 단서 보유 여부 조회 - 단서 수량 / 특정 조합 검사 - 루프 이후 단서 유지 여부 결정 권장: - 단서는 단순 불리언보다 `MemoryFragment` 형태로 관리한다. - UI에서 확인 가능한 `기억 조각` 목록으로 확장 가능하게 한다. ### 4.5 엔딩 기록 필요 상태: | 상태 | 설명 | | --- | --- | | 본 엔딩 목록 | 엔딩 수집용 | | 새드엔딩별 관람 횟수 | 반복 새드엔딩 압축 / 특수 대사 조건 | | 총 새드엔딩 횟수 | 기억 혼선 / 루프 피로 / 히든 엔딩 조건 | | 진엔딩 완료 여부 | 클리어 후 콘텐츠 조건 | | 히든 엔딩 완료 여부 | 복구 이벤트 개방 조건 | 요구 기능: - 엔딩 기록 저장 - 같은 엔딩 반복 횟수 증가 - 반복 횟수에 따라 연출 분기 - 엔딩 수집 UI로 확장 가능하게 설계 ## 5. 핵심 시스템 요구사항 ### 5.1 날짜 기반 이벤트 허브 미연시의 기본 루프는 날짜별 허브다. 예시 선택지: ```text [하연과 시간을 보낸다] [소하와 등교한다] [서린을 돕는다] [미루의 멘토링을 봐준다] [축제 준비를 조사한다] ``` 필요 기능: - 현재 날짜와 캐릭터 진행도에 따라 선택 가능한 이벤트 목록 생성 - 이미 완료한 이벤트 제외 또는 압축판 제공 - 특정 이벤트 우선순위 처리 - 선택 결과로 StoryFlow Scene 시작 StoryFlow 연결: - 날짜 허브는 별도 Scene으로 구성 가능 - 각 선택지는 Transition으로 이벤트 Scene에 진입 - 이벤트 종료 후 다시 허브 Scene으로 복귀 ### 5.2 조건 기반 선택지 D-Day와 주요 클라이맥스에서는 조건에 따라 선택지가 달라진다. 예: 조건 부족: ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 조건 충족: ```text [하연에게 돌아간다] ``` 완전 조건 충족: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 진엔딩 복귀 처리: - 금요일 밤 D-Day 선택 이후 토요일 날짜 허브는 생성하지 않는다. - 바로 일요일 오후 병실 Scene으로 전환한다. - 재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못했던 상태로 처리한다. - 일요일 병실 Scene 이후 D+3 월요일 방학식 에필로그 Scene을 개방한다. 필요 기능: - 선택지별 표시 조건 - 선택지별 비활성 조건 또는 숨김 조건 - 선택 시 상태 변경 - 조건 미충족 시 대체 선택지 제공 StoryFlow 연결: - BranchTemplate에서 상태를 조회해 출력 인덱스를 선택할 수 있어야 함 - 또는 선택지 UI가 상태 조건을 평가하고, 결과를 StoryFlow에 전달해야 함 ### 5.3 병렬 진행도 관리 한 명씩 공략하는 구조가 아니므로 병렬 상태가 필요하다. 필요 기능: - 캐릭터별 이벤트 단계 저장 - 선택하지 않은 캐릭터의 관계 균열 단계 증가 - 특정 주차 이후 클라이맥스 이벤트 개방 - 하연과의 상호 마음 확인, D-1 하연 부스 운영 이벤트와 여러 캐릭터 조건이 D-Day 진엔딩 조건에 합산 권장 모델: ```text CharacterProgress - CharacterID - AffectionOrBond - EventStage - DistortionLevel - bClimaxResolved - LastEventDay ``` ### 5.4 루프 처리 루프는 메인 반복 플레이를 강요하는 시스템이 아니라, 실패 후 재도전 장치다. 필요 기능: - D-Day 실패 시 D-25로 복귀 - D+3 월요일 방학식은 실패 루프에서 도달하지 못하는 예정일로 유지 - 첫 회차 전용 프롤로그는 반복하지 않음 - 기억 조각 / 엔딩 기록 / 일부 플래그 유지 - 일반 관계도와 날짜는 루프 시작점에 맞게 재초기화 유지할 상태: - 엔딩 기록 - 기억 조각 - 히든 엔딩 여부 - 기억 혼선 / 루프 피로 - 일부 메타 플래그 초기화할 상태: - 현재 날짜 - 일반 이벤트 진행도 - 일시적 선택 플래그 - D-Day 진입 상태 ### 5.5 이벤트 재방문 압축 루프 피로도를 줄이기 위해 필요하다. 필요 기능: - 이벤트 최초 관람 여부 저장 - 재관람 시 압축 이벤트로 전환 - 플레이어가 스킵/요약을 선택 가능 - 단, 중요한 선택지는 다시 제공 예: - 최초 관람: 전체 대화와 연출 - 2회차: 핵심 문장 + 선택지만 표시 - 기억 조각 보유 시: 바로 분기 선택지 제공 ### 5.6 기억 혼선과 루프 피로 새드엔딩 반복과 히든 엔딩 조건에 사용한다. 필요 상태: | 상태 | 설명 | | --- | --- | | `MemoryConfusion` | 기억 혼선과 루프 피로 정도 | | `RepeatedSadEndingCount` | 같은 새드엔딩 반복 여부 | | `IgnoredHayeonCount` | 하연 이벤트 무시 횟수 | 효과 예시: - 날짜 표시 깨짐 - 배경음에 병원 기계음 증가 - 선택지 문구 변경 - 히든 세계 붕괴 엔딩 개방 ### 5.7 히든 엔딩 복구 상태 히든 엔딩 후 `망가진 D-25` 복구 이벤트가 필요하다. 필요 기능: - 히든 엔딩 후 루프 시작 Scene 변경 - 복구 조각 수집 상태 저장 - 하연 이름표 획득 후 정상 D-25 복구 복구 조각: - 소하의 팔찌 또는 오래된 사진 - 서린의 점검표 조각 - 미루의 키링 또는 고정끈 - 하연의 이름표 ## 6. 데이터 설계 후보 ### 6.1 Story State ```text StoryState - CurrentDay - CurrentWeek - bIsFirstRun - LoopCount - MemoryConfusion - CurrentPhase - CharacterProgressList - Flags - MemoryFragments - EndingRecords ``` ### 6.2 Event Definition ```text StoryEventDefinition - EventID - DisplayName - CharacterID - WeekRange - RequiredFlags - RequiredFragments - RequiredProgress - SetFlagsOnComplete - AddFragmentsOnComplete - NextSceneID - bCanCompressOnReplay ``` ### 6.3 Ending Definition ```text EndingDefinition - EndingID - EndingType - RequiredFlags - RequiredFragments - RequiredCorruption - SceneID - bCountsForCollection ``` ## 7. 최소 구현 범위 먼저 필요한 최소 범위: 1. 날짜 상태 2. 캐릭터별 진행도 3. 플래그 저장/조회 4. 기억 조각 저장/조회 5. 조건 기반 선택지 6. D-1 축제 1일차 정산 및 D-Day 엔딩 조건 평가 7. 루프 시 D-25 복귀 8. 엔딩 기록 이 범위만 있어도 현재 스토리의 핵심 구조는 구현 가능하다. ## 8. 후순위 구현 범위 나중에 추가해도 되는 기능: 1. 이벤트 재방문 압축 2. 엔딩 수집 UI 3. 기억 혼선과 루프 피로에 따른 연출 변화 4. 히든 엔딩 복구 전용 UI 5. 기억 조각 도감 6. 자동 이벤트 추천 / 알림 ## 9. StoryFlow 추가 기능 후보 현재 StoryFlow는 Scene/Shot/Branch 실행에 강점이 있으므로, 미연시 시스템은 별도 상태 계층으로 두는 것이 좋다. 추가 후보: 1. `StoryStateSubsystem` - 날짜, 플래그, 기억 조각, 캐릭터 진행도, 엔딩 기록 관리 2. `StoryEventRegistryAsset` - 날짜/조건별 이벤트 정의 관리 3. `StoryConditionEvaluator` - 조건 기반 선택지와 Branch 평가 4. `StoryLoopManager` - 루프 초기화, 유지/초기화할 상태 구분 5. `StoryEndingManager` - 엔딩 조건 평가와 엔딩 기록 ## 10. 다음 설계 과제 1. 실제 코드에 이미 존재하는 저장/플래그/이벤트 관련 시스템 확인 2. `StoryState` 데이터 구조 확정 3. 이벤트 정의 에셋을 만들지, DataTable로 갈지 결정 4. 조건 기반 선택지를 StoryFlow Branch로 처리할지 UI 선택지 시스템에서 처리할지 결정 5. 최소 구현 범위 기준으로 개발 순서 작성", "excerpt": "# 미연시 코어 시스템 요구사항 ## 1. 목적 이 문서는 현재 스토리 기획을 실제 게임 시스템으로 구현하기 위해 필요한 코어 로직을 정리한다. 현재 StoryFlow는 Scene / Shot / Branch / Transition 기반의 스토리 실행 구조를 제공한다. 미연시 게임을 만들기 위해서는 그 위에 날짜, 이벤트 선택, 캐릭터 진행도, 플래그, 루프, 엔딩 기록 같은 게임 상태 관리"}, {"path": "시스템/하루_행동_시스템.md", "category": "시스템", "title": "하루 행동 시스템 기획", "id": "시스템-하루행동시스템-md", "html": "<h2 id=\"시스템-하루행동시스템-md-하루-행동-시스템-기획\">하루 행동 시스템 기획<\/h2>\n<h3 id=\"시스템-하루행동시스템-md-1-목적\">1. 목적<\/h3>\n<p>이 문서는 날짜 기반 미연시 진행에서 플레이어가 하루 동안 무엇을 할 수 있는지 정의한다.<\/p>\n<p>현재 스토리는 1학기 말 첫 회차에서 D-32부터 시작하고, 루프 이후에는 D-25 월요일부터 내부 기준 D-Day 금요일까지 약 4주를 진행한다. 축제는 D-1 목요일 1일차와 D-Day 금요일 2일차의 이틀 구성이다. 1일차는 부스 운영 중심으로 하연과 <code>쉬어가 카페<\/code>를 함께 운영하며 가까워지고, 2일차는 부스 축소 운영 후 히로인들과 축제를 둘러보는 선택을 거쳐 폐장 후 사고로 이어진다. 단, <code>D-Day<\/code>는 내부 기획/시스템 용어이며 게임 내 대사/UI에서는 <code>축제 2일차<\/code>, <code>축제 마지막 날<\/code>, <code>금요일<\/code>로 표기한다. 달력상 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 그 날짜에 도달하지 못한다. 진엔딩에서는 D-Day 금요일 밤 이후 토요일 날짜를 건너뛰고 일요일 오후 병실에서 깨어난 뒤, D+3 월요일 방학식에 겨우 참석한다. 플레이어는 한정된 시간 안에 다음 세 축을 모두 충족해야 한다.<\/p>\n<ol>\n<li>하연과의 상호 마음 확인<\/li>\n<li>기존 관계 정리<\/li>\n<li>사고 단서 확보<\/li>\n<\/ol>\n<p>하연과 서로의 마음을 확인하지 못하면, D-Day 금요일 밤 사고 기억에서 하연이 빠지고 재윤은 혼자 야외 소무대에 선 채 사고를 반복한다. 따라서 하연 관련 행동은 단순 호감도 상승이 아니라, 하연이 마음을 말할 수 있을 만큼의 신뢰와 재윤이 그 마음을 받아들일 준비를 쌓는 행동이어야 한다.<\/p>\n<p>따라서 하루 행동 시스템은 단순 호감도 선택이 아니라, 제한된 시간 안에서 감정 / 관계 / 조사 사이의 균형을 선택하게 만드는 구조여야 한다.<\/p>\n<p>D-1 밤 정산과 D-Day 낮 보정은 <a href=\"../스토리/12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>의 점수 기준을 사용한다. 하루 행동의 누적 결과는 D-Day 폐장 후 <code>하연 실패 루프<\/code>, 기존 관계 새드엔딩, 사고 의미 미연결 루프, 진엔딩 중 하나로 판정된다.<\/p>\n<h3 id=\"시스템-하루행동시스템-md-2-기본-원칙\">2. 기본 원칙<\/h3>\n<ul>\n<li>평일과 주말의 플레이 감각을 구분한다.<\/li>\n<li>평일은 학교 루틴 안에서 작은 선택을 쌓는 구조다.<\/li>\n<li>주말은 큰 이벤트, 데이트, 조사, 클라이맥스가 발생하는 특별한 날이다.<\/li>\n<li>모든 행동은 최소 하나 이상의 상태에 영향을 준다.<\/li>\n<li>하연만 따라가도, 기존 히로인만 따라가도, 조사만 해도 진엔딩은 열리지 않는다.<\/li>\n<\/ul>\n<h3 id=\"시스템-하루행동시스템-md-3-평일-구조\">3. 평일 구조<\/h3>\n<p>평일은 학교에 가는 날이다.<\/p>\n<p>기본 슬롯:<\/p>\n<pre><code>등교\n수업\n하교 / 방과후\n저녁<\/code><\/pre>\n<h4 id=\"시스템-하루행동시스템-md-3-1-등교-슬롯\">3.1 등교 슬롯<\/h4>\n<p>등교 슬롯은 하루의 분위기를 정하는 짧은 구간이다.<\/p>\n<p>주요 역할:<\/p>\n<ul>\n<li>날짜 시작<\/li>\n<li>전날 선택 결과 반영<\/li>\n<li>짧은 히로인 접점<\/li>\n<li>기억과 감정의 어긋남 암시<\/li>\n<\/ul>\n<p>가능 이벤트:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>이벤트<\/th><th>설명<\/th><th>주요 효과<\/th><\/tr><\/thead><tbody><tr><td>소하와 등교<\/td><td>소꿉친구 관계를 자연스럽게 보여줌<\/td><td>소하 관계 / 과거 축<\/td><\/tr><tr><td>하연을 멀리서 봄<\/td><td>하연에게 끌리는 감정 강화<\/td><td>하연 관심<\/td><\/tr><tr><td>서린의 공지<\/td><td>축제 일정, 방송반/학생회 일정 전달<\/td><td>일정 정보<\/td><\/tr><tr><td>미루의 인사<\/td><td>미루가 주인공을 따르는 모습<\/td><td>미루 관계<\/td><\/tr><tr><td>이상 현상<\/td><td>날짜 표시 오류, 금속음, 기시감<\/td><td>기억 균열 암시<\/td><\/tr><\/tbody><\/table><\/div>\n<p>등교 슬롯은 대부분 자동 이벤트지만, 특정 날짜에는 선택지를 줄 수 있다.<\/p>\n<p>예:<\/p>\n<pre><code>[소하와 같이 간다]\n[먼저 학교로 간다]\n[하연을 기다려본다]<\/code><\/pre>\n<h4 id=\"시스템-하루행동시스템-md-3-2-수업-슬롯\">3.2 수업 슬롯<\/h4>\n<p>수업 슬롯은 큰 선택보다는 상태 변화와 짧은 연출 중심이다.<\/p>\n<p>주요 역할:<\/p>\n<ul>\n<li>하연의 존재감 누적<\/li>\n<li>다른 히로인의 미세한 반응 표시<\/li>\n<li>루프/내면세계 위화감 삽입<\/li>\n<\/ul>\n<p>가능 이벤트:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>이벤트<\/th><th>설명<\/th><th>주요 효과<\/th><\/tr><\/thead><tbody><tr><td>하연이 답하지 못함<\/td><td>전학생의 어색함과 주인공의 관심<\/td><td>하연 신뢰 암시<\/td><\/tr><tr><td>소하의 쪽지<\/td><td>소하가 익숙한 관계를 강조<\/td><td>소하 미련 씨앗<\/td><\/tr><tr><td>서린의 호출<\/td><td>방송반 또는 학생회 업무 연결<\/td><td>서린 이벤트 예고<\/td><\/tr><tr><td>미루의 실수 소문<\/td><td>축제 도움 인원으로서의 서툼<\/td><td>미루 이벤트 예고<\/td><\/tr><tr><td>졸음 / 짧은 꿈<\/td><td>야외 소무대 이미지 침투<\/td><td>기억 조각 암시<\/td><\/tr><\/tbody><\/table><\/div>\n<p>수업 슬롯은 보통 자동 진행으로 두고, 플레이어 피로도를 줄인다.<\/p>\n<h4 id=\"시스템-하루행동시스템-md-3-3-하교-방과후-슬롯\">3.3 하교 / 방과후 슬롯<\/h4>\n<p>방과후는 평일의 핵심 선택 슬롯이다.<\/p>\n<p>플레이어는 누구와 시간을 보낼지 선택한다.<\/p>\n<p>기본 선택지:<\/p>\n<pre><code>[하연과 축제 준비를 한다]\n[소하와 같이 돌아간다]\n[서린의 일을 돕는다]\n[미루의 멘토링을 봐준다]\n[소무대를 조사한다]\n[혼자 생각한다]<\/code><\/pre>\n<p>행동별 효과:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>행동<\/th><th>주요 효과<\/th><th>리스크<\/th><\/tr><\/thead><tbody><tr><td>하연과 축제 준비<\/td><td>하연 신뢰 상승, 상호 마음 확인 이벤트 진행<\/td><td>기존 관계 정리 지연 가능<\/td><\/tr><tr><td>소하와 같이 돌아감<\/td><td>소하 관계 정리 진행, 과거 단서<\/td><td>하연 이벤트 부족 가능<\/td><\/tr><tr><td>서린의 일을 도움<\/td><td>방송 대본, 안전 안내, 구조물 단서<\/td><td>선택 회피/의존 증가 가능<\/td><\/tr><tr><td>미루의 멘토링을 봐줌<\/td><td>곧 끝나는 멘토링, 미루 죄책감, 고정끈 단서<\/td><td>의존 심화 가능<\/td><\/tr><tr><td>소무대 조사<\/td><td>사고 단서 직접 획득<\/td><td>감정 조건 부족 가능<\/td><\/tr><tr><td>혼자 생각<\/td><td>기억 조각 정리, 기억 혼선 완화<\/td><td>관계 진행 부족<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"시스템-하루행동시스템-md-3-4-저녁-슬롯\">3.4 저녁 슬롯<\/h4>\n<p>저녁 슬롯은 하루 정산과 기억 균열 연출 구간이다.<\/p>\n<p>주요 역할:<\/p>\n<ul>\n<li>오늘 선택 결과 정리<\/li>\n<li>기억 조각 획득 연출<\/li>\n<li>기억 혼선 변화<\/li>\n<li>관계 균열 단계 업데이트<\/li>\n<li>악몽 또는 짧은 현실 신호 삽입<\/li>\n<\/ul>\n<p>가능 연출:<\/p>\n<ul>\n<li>금속이 삐걱이는 소리<\/li>\n<li>병원 기계음처럼 들리는 알람<\/li>\n<li>오늘 찍은 사진에서 하연만 흐릿함<\/li>\n<li>소하와의 기억이 하연과의 기억을 덮어씀<\/li>\n<li>서린의 일정표가 선택지처럼 보임<\/li>\n<li>미루의 메시지가 읽지 않았는데 읽음 처리됨<\/li>\n<\/ul>\n<p>저녁 슬롯은 보통 자동 정산이지만, 특정 조건에서는 선택지를 제공한다.<\/p>\n<p>예:<\/p>\n<pre><code>[오늘 일을 일기에 적는다]\n[기억 조각을 확인한다]\n[그냥 잠든다]<\/code><\/pre>\n<h3 id=\"시스템-하루행동시스템-md-4-주말-구조\">4. 주말 구조<\/h3>\n<p>주말은 학교와 직접 관련 없는 특별한 날이다.<\/p>\n<p>평일의 축제 준비 / 학생회 / 등하교 루틴에서 벗어나, 인물의 사적인 면과 관계의 깊이를 보여준다.<\/p>\n<p>기본 슬롯:<\/p>\n<pre><code>오전\n오후\n밤<\/code><\/pre>\n<p>주말은 다음 용도로 사용한다.<\/p>\n<ul>\n<li>학교 밖 데이트 / 외출<\/li>\n<li>우연한 만남<\/li>\n<li>만나지 않고 혼자 보내는 날<\/li>\n<li>약속 이벤트<\/li>\n<li>봉사활동 / 가족 심부름 / 동네 행사<\/li>\n<li>루프 후 기억 조각 반응<\/li>\n<\/ul>\n<p>중요한 제한:<\/p>\n<blockquote>주말에는 원칙적으로 학교 무대 준비나 소무대 작업을 하지 않는다.<\/blockquote>\n<p>학교 관련 사고 단서는 평일 방과후, 학생회 업무, 축제 준비 시간, 또는 별도 조사 행동에서 다룬다.<\/p>\n<h3 id=\"시스템-하루행동시스템-md-5-주말-행동-종류\">5. 주말 행동 종류<\/h3>\n<h4 id=\"시스템-하루행동시스템-md-5-0-주말-메신저-선택-구조\">5.0 주말 메신저 선택 구조<\/h4>\n<p>특정 주말에는 아침에 여러 연락이 동시에 와 있는 구조를 사용할 수 있다.<\/p>\n<p>예:<\/p>\n<pre><code>2학년 5반 단톡방\n소하 개인 메시지\n방송반 단톡방\n미루 개인 메시지<\/code><\/pre>\n<p>처리 원칙:<\/p>\n<ul>\n<li>플레이어는 각 연락을 모두 읽어볼 수 있다.<\/li>\n<li>실제로 갈 곳은 하나만 선택한다.<\/li>\n<li>하나를 선택하면 나머지는 자동으로 거절하거나 다음으로 미룬다.<\/li>\n<li>자동 거절은 관계 단절이 아니라 하루 시간 제약을 표현하는 장치다.<\/li>\n<li>선택한 연락만 해당 날짜의 관계/후보/단서 씨앗을 강화한다.<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-1-하연과-외출\">5.1 하연과 외출<\/h4>\n<p>하연과 학교 밖에서 긴 시간을 보내는 이벤트.<\/p>\n<p>가능 내용:<\/p>\n<ul>\n<li>서점, 조용한 카페, 공원, 강변 산책<\/li>\n<li>하연이 시끄러운 장소보다 조용한 장소를 편하게 느끼는 이유를 보여줌<\/li>\n<li>말이 적어도 함께 있는 시간이 불편하지 않다는 감정선 강화<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>하연 신뢰 큰 폭 상승<\/li>\n<li>하연과의 상호 마음 확인 이벤트 진행<\/li>\n<li>하연의 현실적인 매력 강화<\/li>\n<\/ul>\n<p>리스크:<\/p>\n<ul>\n<li>다른 관계의 미련과 균열이 배경에서 진행됨<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-2-소하와-추억의-장소-방문\">5.2 소하와 추억의 장소 방문<\/h4>\n<p>소하 루트의 큰 이벤트.<\/p>\n<p>가능 내용:<\/p>\n<ul>\n<li>어릴 때 자주 갔던 문방구, 놀이터, 동네 분식집<\/li>\n<li>오래된 사진 / 팔찌 / 약속<\/li>\n<li>주인공은 익숙함을 느끼지만, 그 익숙함이 하연에게 향한 마음을 덮으려 한다는 위화감도 느낀다.<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>소하 관계 정리 진행<\/li>\n<li>감정 단서 획득<\/li>\n<\/ul>\n<p>리스크:<\/p>\n<ul>\n<li>하연과의 마음 확인 진행 지연<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-3-서린과-학교-밖-업무-상담\">5.3 서린과 학교 밖 업무 / 상담<\/h4>\n<p>서린 루트의 주말 이벤트는 학교 무대 준비가 아니라, 학교 밖에서 발생하는 방송반 / 학생회 관련 외부 업무나 상담으로 처리한다.<\/p>\n<p>가능 내용:<\/p>\n<ul>\n<li>축제 협찬 물품 수령<\/li>\n<li>문구점 / 인쇄소 / 대여 업체 방문<\/li>\n<li>학생회 자료 정리 카페 회의<\/li>\n<li>방송 대본 출력물 확인<\/li>\n<li>안전 안내 방송 문구 검토<\/li>\n<li>서린이 주인공에게 선택과 책임에 대한 조언을 함<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>서린과의 현실 관계 강화<\/li>\n<li>서린이 왜 주인공에게 <code>정답을 알려주는 사람<\/code>처럼 각인되었는지 보여줌<\/li>\n<li>안전 점검 단서의 간접 예고 가능<\/li>\n<li>방송/안내가 선택지 통제 불안으로 변질될 씨앗 제시<\/li>\n<\/ul>\n<p>리스크:<\/p>\n<ul>\n<li>서린의 선택 회피/통제 불안 증가<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-4-미루와-봉사활동-동네-심부름\">5.4 미루와 봉사활동 / 동네 심부름<\/h4>\n<p>미루 루트의 주말 이벤트는 학교 밖에서 주인공이 미루를 챙기는 관계를 보여준다.<\/p>\n<p>미루는 주인공의 <code>1학기 한정 학습·학교생활 적응 멘토링<\/code>을 받던 후배다. 이 멘토링은 수학/영어 보충, 수행평가 정리, 발표 연습, 제출물과 마감일 정리, 봉사활동이나 행사 신청 도움, 모르는 일이 생겼을 때 누구에게 질문하고 보고할지 정하는 연습까지 포함한다. D+3 월요일 방학식이 오면 공식적으로 끝나며, 이후에는 멘토링 관계가 평범한 선후배 관계로 바뀐다. 주말 이벤트는 단순한 데이트보다, 미루가 주인공에게 왜 특별히 의지하게 되었는지와 멘토링이 끝나기 전에 혼자 해보려는 부담을 함께 보여주는 방향이 좋다.<\/p>\n<p>가능 내용:<\/p>\n<ul>\n<li>지역 봉사활동<\/li>\n<li>동네 행사 보조<\/li>\n<li>분실물 찾기<\/li>\n<li>무거운 물건 옮기기<\/li>\n<li>미루가 실수하고 주인공이 도와줌<\/li>\n<li>수행평가 자료 찾기<\/li>\n<li>발표 연습을 봐주기<\/li>\n<li>봉사활동 신청서를 같이 작성하기<\/li>\n<li>축제 도움 인원 체크표 만들기<\/li>\n<li>실수했을 때 보고할 사람 정하기<\/li>\n<li>물어봐도 되는 일과 혼자 해볼 일을 나누기<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>미루와의 의존 관계 강화<\/li>\n<li>D+3 월요일 방학식과 함께 1학기 한정 멘토링이 끝난다는 불안<\/li>\n<li>미루의 서툼과 죄책감의 씨앗을 자연스럽게 보여줌<\/li>\n<li>미루가 축제 도움 인원에 참여하게 된 계기 제시<\/li>\n<\/ul>\n<p>리스크:<\/p>\n<ul>\n<li>미루의 의존 심화<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-5-우연한-만남\">5.5 우연한 만남<\/h4>\n<p>플레이어가 특정 약속을 잡지 않았거나 혼자 외출했을 때 발생할 수 있다.<\/p>\n<p>가능 예시:<\/p>\n<ul>\n<li>서점에서 하연과 우연히 만남<\/li>\n<li>동네 분식집에서 소하와 마주침<\/li>\n<li>버스 정류장에서 서린과 만남<\/li>\n<li>봉사활동 현장에서 미루와 마주침<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>선택하지 않은 캐릭터도 세계 안에 살아 있다는 느낌 제공<\/li>\n<li>낮은 확률 또는 조건부 보너스 이벤트로 활용<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-5-6-혼자-보내기-기억-정리\">5.6 혼자 보내기 / 기억 정리<\/h4>\n<p>플레이어가 아무도 만나지 않고 하루를 보내는 행동.<\/p>\n<p>가능 내용:<\/p>\n<ul>\n<li>집에서 쉬기<\/li>\n<li>일기 쓰기<\/li>\n<li>기억 조각 정리<\/li>\n<li>꿈속 장면 복기<\/li>\n<li>산책 중 금속음이나 병원 신호를 떠올림<\/li>\n<\/ul>\n<p>효과:<\/p>\n<ul>\n<li>기억 혼선 완화<\/li>\n<li>기억 조각 힌트 제공<\/li>\n<li>루프 후 빠른 진행 도움<\/li>\n<\/ul>\n<p>리스크:<\/p>\n<ul>\n<li>관계 진행 기회 소모<\/li>\n<\/ul>\n<h3 id=\"시스템-하루행동시스템-md-6-수업-이벤트-처리\">6. 수업 이벤트 처리<\/h3>\n<p>수업은 1교시부터 여러 교시까지 모두 플레이하지 않는다.<\/p>\n<p>평소 수업은 축약하고, 특정 이벤트가 있을 때만 <code>수업 이벤트<\/code>로 보여준다.<\/p>\n<h4 id=\"시스템-하루행동시스템-md-기본-처리\">기본 처리<\/h4>\n<p>일반적인 날의 수업은 한두 문장으로 넘긴다.<\/p>\n<p>예:<\/p>\n<blockquote>오전 수업은 별일 없이 지나갔다.  <\/blockquote>\n<blockquote>창밖 운동장에는 축제 천막이 하나둘 세워지고 있었다.<\/blockquote>\n<h4 id=\"시스템-하루행동시스템-md-수업-이벤트가-발생하는-경우\">수업 이벤트가 발생하는 경우<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>유형<\/th><th>설명<\/th><th>예시<\/th><\/tr><\/thead><tbody><tr><td>하연 이벤트<\/td><td>하연의 전학생 적응, 짧은 반응<\/td><td>하연이 대답을 망설이자 주인공이 대신 분위기를 풀어줌<\/td><\/tr><tr><td>소하 이벤트<\/td><td>소하의 익숙한 관계 강조<\/td><td>소하가 주인공의 과거 답안을 기억하고 있음<\/td><\/tr><tr><td>서린 이벤트<\/td><td>학생회/방송/공지 개입<\/td><td>수업 중 방송으로 서린의 목소리가 나오고, 특정 문장이 반복됨<\/td><\/tr><tr><td>미루 이벤트<\/td><td>후배의 실수 소문<\/td><td>복도에서 1학년 도움 인원이 실수했다는 이야기가 들림<\/td><\/tr><tr><td>기억 균열 이벤트<\/td><td>내면세계 위화감<\/td><td>칠판 날짜가 바뀌거나, 종소리가 병원 기계음처럼 들림<\/td><\/tr><tr><td>루프 이벤트<\/td><td>반복 감각<\/td><td>선생님이 지난 회차와 같은 말을 하지만 일부 단어가 달라짐<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"시스템-하루행동시스템-md-수업-중-깜짝-이벤트-후보\">수업 중 깜짝 이벤트 후보<\/h4>\n<p>수업 이벤트는 짧고 인상적으로 처리한다.<\/p>\n<p>후보:<\/p>\n<ol>\n<li>칠판 날짜 오류<\/li>\n<\/ol>\n<ul>\n<li>수업 시작 때 칠판에는 <code>D-14<\/code>라고 적혀 있었는데, 눈을 깜빡이면 <code>D-7<\/code>로 보임.<\/li>\n<\/ul>\n<ol>\n<li>종소리 변조<\/li>\n<\/ol>\n<ul>\n<li>수업 종료 종이 잠깐 심전도 소리처럼 들림.<\/li>\n<\/ul>\n<ol>\n<li>하연 이름 공백<\/li>\n<\/ol>\n<ul>\n<li>출석부에서 하연 이름만 흐릿하게 보임.<\/li>\n<\/ul>\n<ol>\n<li>반복 문장<\/li>\n<\/ol>\n<ul>\n<li>선생님이 <code>중요한 건 선택을 미루지 않는 것<\/code> 같은 문장을 이상할 정도로 강조함.<\/li>\n<\/ul>\n<ol>\n<li>책상 수 불일치<\/li>\n<\/ol>\n<ul>\n<li>교실에 책상이 하나 많거나 적어 보임.<\/li>\n<\/ul>\n<ol>\n<li>소무대 낙서<\/li>\n<\/ol>\n<ul>\n<li>교과서 여백에 자신이 쓴 적 없는 <code>소무대에 가지 마<\/code>라는 글씨가 있음.<\/li>\n<\/ul>\n<ol>\n<li>순간 암전<\/li>\n<\/ol>\n<ul>\n<li>형광등이 깜빡이고, 교실 천장이 야외 조명 프레임처럼 보임.<\/li>\n<\/ul>\n<ol>\n<li>방송 잡음<\/li>\n<\/ol>\n<ul>\n<li>학교 방송에서 축제 안내가 나오다가 금속이 긁히는 소리로 변함.<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-수업-이벤트-설계-원칙\">수업 이벤트 설계 원칙<\/h4>\n<ul>\n<li>한 수업 이벤트는 짧게 끝낸다.<\/li>\n<li>하루에 여러 교시를 모두 플레이하지 않는다.<\/li>\n<li>중요한 날에만 특정 교시를 명명한다. 예: <code>3교시 국어<\/code>, <code>5교시 자습<\/code>.<\/li>\n<li>수업 이벤트는 상태값을 크게 바꾸기보다 위화감, 힌트, 다음 행동 유도에 사용한다.<\/li>\n<\/ul>\n<h3 id=\"시스템-하루행동시스템-md-7-주차별-행동-변화\">7. 주차별 행동 변화<\/h3>\n<h4 id=\"시스템-하루행동시스템-md-week-1-d-25-d-19\">Week 1: D-25 ~ D-19<\/h4>\n<p>평일:<\/p>\n<ul>\n<li>선택지는 비교적 평범함<\/li>\n<li>하연과의 첫 대화와 기존 히로인의 미묘한 반응 중심<\/li>\n<li>D-23 수요일에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공식 공지하고 최종 목표가 D-Day로 고정됨<\/li>\n<li>D-23 수요일에 축제 2일차 뒤 D+3 월요일 방학식이 있다는 일정도 함께 공지되어, 첫 회차에는 평범한 학기말 일정으로 보이고 루프 이후에는 도달하지 못하는 다음 월요일처럼 느껴짐<\/li>\n<\/ul>\n<p>주말:<\/p>\n<ul>\n<li>하연과 첫 긴 대화 가능<\/li>\n<li>소하/서린/미루 중 하나와 큰 이벤트 가능<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-week-2-d-18-d-12\">Week 2: D-18 ~ D-12<\/h4>\n<p>평일:<\/p>\n<ul>\n<li>축제 준비가 본격화됨<\/li>\n<li>D-18 월요일에 2학년 5반 반행사를 <code>쉬어가 카페<\/code>로 확정하고, 이후 평일 방과후 선택에서 축제 준비 접점이 본격화됨<\/li>\n<li>D-18 이후부터는 선택 결과가 세계에 반영되는 감각과 아주 약한 어긋남을 서서히 늘린다.<\/li>\n<li>소무대 조사, 서린 업무, 미루 정리 작업 선택지가 중요해짐<\/li>\n<\/ul>\n<p>주말:<\/p>\n<ul>\n<li>사고 단서 집중 이벤트 가능<\/li>\n<li>기존 관계의 미련과 균열이 뚜렷해짐<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-week-3-d-11-d-5\">Week 3: D-11 ~ D-5<\/h4>\n<p>평일:<\/p>\n<ul>\n<li>관계 균열이 뚜렷해짐<\/li>\n<li>사고 단서가 구체화됨<\/li>\n<li>소무대 조사, 서린 점검표, 미루 고정끈 관련 이벤트 중요도 상승<\/li>\n<\/ul>\n<p>주말:<\/p>\n<ul>\n<li>학교 밖 큰 이벤트<\/li>\n<li>히로인 클라이맥스 진입 조건 확보<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-final-week-d-4-d-1\">Final Week: D-4 ~ D-1<\/h4>\n<p>평일 / 축제 1일차:<\/p>\n<ul>\n<li>기억 회복과 불안 연출 강화<\/li>\n<li>선택하지 않은 관계의 미련과 균열도 배경에서 진행<\/li>\n<li>D-1에는 하연과의 부스 운영, 기존 관계 정리, 사고 단서 최종 확인을 통해 D-Day 조건을 맞추기 위한 마지막 조정<\/li>\n<li>D-1 목요일은 축제 1일차로, 2학년 5반 <code>쉬어가 카페<\/code> 등 부스가 정상 운영됨<\/li>\n<li>D-1에는 재윤과 하연이 같은 부스 운영 시간대에 묶여 함께 일하며 가까워지고, 축제 2일차에는 약속 예약이 아니라 재윤이 하연의 동선과 속도를 읽는 구조로 이어짐<\/li>\n<li>D-Day 진입 전 최종 정산과 하연의 말하지 못한 예감 이해 여부 확인<\/li>\n<\/ul>\n<h4 id=\"시스템-하루행동시스템-md-d-3-월요일-방학식-예정\">D+3 월요일: 방학식 예정<\/h4>\n<ul>\n<li>D-1 목요일 축제 1일차와 D-Day 금요일 축제 2일차 뒤 주말을 지나 예정된 1학기 방학식<\/li>\n<li>실패 루프에서는 일반 날짜 진행으로 도달하지 못하고 D-25 월요일로 돌아감<\/li>\n<li>진엔딩에서는 D-Day 금요일 밤 이후 토요일 허브 없이 일요일 오후 병실 Scene으로 점프하고, 그 다음 날 방학식 에필로그 Scene으로 진입함<\/li>\n<li>재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못했던 상태이며, 월요일 방학식에는 오래 머물 수 없는 조건으로 짧게 참석함<\/li>\n<li>미루의 1학기 한정 멘토링 종료일과 연결되어, 미루 루트에서는 <code>멘토링이 끝나면 선배와 이어지는 이유도 사라진다<\/code>는 불안을 강화함<\/li>\n<li>진엔딩 이후 에필로그나 회복 장면에서는 처음으로 도달할 수 있는 날짜 후보로 사용할 수 있음<\/li>\n<\/ul>\n<h3 id=\"시스템-하루행동시스템-md-8-루프-후-행동-변화\">8. 루프 후 행동 변화<\/h3>\n<p>루프 후에는 같은 일상을 그대로 반복하지 않는다.<\/p>\n<p>변화:<\/p>\n<ul>\n<li>첫 회차 전용 1주 프롤로그 스킵<\/li>\n<li>이미 본 이벤트는 압축판 제공<\/li>\n<li>기억 조각 보유 시 조사 선택지 조기 개방<\/li>\n<li>같은 새드엔딩 반복 시 해당 루트 압축 / 특수 대사 적용<\/li>\n<\/ul>\n<p>예:<\/p>\n<p>첫 회차:<\/p>\n<pre><code>[소무대를 둘러본다]<\/code><\/pre>\n<p>루프 후, <code>금속음<\/code> 조각 보유:<\/p>\n<pre><code>[소무대의 임시 조명 프레임을 확인한다]<\/code><\/pre>\n<h3 id=\"시스템-하루행동시스템-md-9-d-day-조건-연결\">9. D-Day 조건 연결<\/h3>\n<p>하루 행동은 D-Day 조건에 연결된다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>조건<\/th><th>관련 행동<\/th><\/tr><\/thead><tbody><tr><td>하연과의 상호 마음 확인<\/td><td>하연과 축제 준비, D-1 하연 부스 운영, D-2 말하지 못한 예감, 하연 신뢰 대화, 하연이 마음을 말할 수 있는 상태<\/td><\/tr><tr><td>소하 관계 정리<\/td><td>소하와 등교, 추억의 장소 방문, 소하 클라이맥스<\/td><\/tr><tr><td>서린 관계 정리<\/td><td>서린의 일을 도움, 방송반/학생회 작업, 선택권 회복 클라이맥스<\/td><\/tr><tr><td>미루 관계 정리<\/td><td>곧 끝나는 멘토링, 발표 연습, 정리 작업, 꿈속에 남지 않는 클라이맥스<\/td><\/tr><tr><td>사고 단서<\/td><td>소무대 조사, 서린 점검표, 미루 고정끈, 하연 고백 장소, 혼자가 아니었던 사고 기억<\/td><\/tr><tr><td>기억 혼선 관리<\/td><td>혼자 생각, 기억 정리, 휴식<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"시스템-하루행동시스템-md-10-구현-요구사항\">10. 구현 요구사항<\/h3>\n<p>하루 행동 시스템을 구현하려면 다음 상태가 필요하다.<\/p>\n<ul>\n<li>현재 날짜<\/li>\n<li>요일 / 평일 여부 / 주말 여부<\/li>\n<li>현재 슬롯<\/li>\n<li>오늘 선택한 행동 목록<\/li>\n<li>캐릭터별 이벤트 가능 여부<\/li>\n<li>주말 특별 이벤트 가능 여부<\/li>\n<li>이미 본 이벤트 여부<\/li>\n<li>루프 후 압축 이벤트 여부<\/li>\n<\/ul>\n<p>이 시스템은 <code>미연시_코어_시스템_요구사항.md<\/code>의 날짜 기반 이벤트 허브와 연결된다.<\/p>\n<h3 id=\"시스템-하루행동시스템-md-11-다음-설계-과제\">11. 다음 설계 과제<\/h3>\n<ol>\n<li>날짜별 실제 이벤트 세부 확정<\/li>\n<li>학교 밖 주말 이벤트를 히로인별로 2~3개씩 작성<\/li>\n<li>각 슬롯별 이벤트 후보와 수업 깜짝 이벤트 조건 세분화<\/li>\n<li>행동별 상태 변화 수치화<\/li>\n<li>루프 후 압축 이벤트 규칙 구체화<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "하루 행동 시스템 기획", "id": "시스템-하루행동시스템-md-하루-행동-시스템-기획"}, {"level": 2, "text": "1. 목적", "id": "시스템-하루행동시스템-md-1-목적"}, {"level": 2, "text": "2. 기본 원칙", "id": "시스템-하루행동시스템-md-2-기본-원칙"}, {"level": 2, "text": "3. 평일 구조", "id": "시스템-하루행동시스템-md-3-평일-구조"}, {"level": 3, "text": "3.1 등교 슬롯", "id": "시스템-하루행동시스템-md-3-1-등교-슬롯"}, {"level": 3, "text": "3.2 수업 슬롯", "id": "시스템-하루행동시스템-md-3-2-수업-슬롯"}, {"level": 3, "text": "3.3 하교 / 방과후 슬롯", "id": "시스템-하루행동시스템-md-3-3-하교-방과후-슬롯"}, {"level": 3, "text": "3.4 저녁 슬롯", "id": "시스템-하루행동시스템-md-3-4-저녁-슬롯"}, {"level": 2, "text": "4. 주말 구조", "id": "시스템-하루행동시스템-md-4-주말-구조"}, {"level": 2, "text": "5. 주말 행동 종류", "id": "시스템-하루행동시스템-md-5-주말-행동-종류"}, {"level": 3, "text": "5.0 주말 메신저 선택 구조", "id": "시스템-하루행동시스템-md-5-0-주말-메신저-선택-구조"}, {"level": 3, "text": "5.1 하연과 외출", "id": "시스템-하루행동시스템-md-5-1-하연과-외출"}, {"level": 3, "text": "5.2 소하와 추억의 장소 방문", "id": "시스템-하루행동시스템-md-5-2-소하와-추억의-장소-방문"}, {"level": 3, "text": "5.3 서린과 학교 밖 업무 / 상담", "id": "시스템-하루행동시스템-md-5-3-서린과-학교-밖-업무-상담"}, {"level": 3, "text": "5.4 미루와 봉사활동 / 동네 심부름", "id": "시스템-하루행동시스템-md-5-4-미루와-봉사활동-동네-심부름"}, {"level": 3, "text": "5.5 우연한 만남", "id": "시스템-하루행동시스템-md-5-5-우연한-만남"}, {"level": 3, "text": "5.6 혼자 보내기 / 기억 정리", "id": "시스템-하루행동시스템-md-5-6-혼자-보내기-기억-정리"}, {"level": 2, "text": "6. 수업 이벤트 처리", "id": "시스템-하루행동시스템-md-6-수업-이벤트-처리"}, {"level": 3, "text": "기본 처리", "id": "시스템-하루행동시스템-md-기본-처리"}, {"level": 3, "text": "수업 이벤트가 발생하는 경우", "id": "시스템-하루행동시스템-md-수업-이벤트가-발생하는-경우"}, {"level": 3, "text": "수업 중 깜짝 이벤트 후보", "id": "시스템-하루행동시스템-md-수업-중-깜짝-이벤트-후보"}, {"level": 3, "text": "수업 이벤트 설계 원칙", "id": "시스템-하루행동시스템-md-수업-이벤트-설계-원칙"}, {"level": 2, "text": "7. 주차별 행동 변화", "id": "시스템-하루행동시스템-md-7-주차별-행동-변화"}, {"level": 3, "text": "Week 1: D-25 ~ D-19", "id": "시스템-하루행동시스템-md-week-1-d-25-d-19"}, {"level": 3, "text": "Week 2: D-18 ~ D-12", "id": "시스템-하루행동시스템-md-week-2-d-18-d-12"}, {"level": 3, "text": "Week 3: D-11 ~ D-5", "id": "시스템-하루행동시스템-md-week-3-d-11-d-5"}, {"level": 3, "text": "Final Week: D-4 ~ D-1", "id": "시스템-하루행동시스템-md-final-week-d-4-d-1"}, {"level": 3, "text": "D+3 월요일: 방학식 예정", "id": "시스템-하루행동시스템-md-d-3-월요일-방학식-예정"}, {"level": 2, "text": "8. 루프 후 행동 변화", "id": "시스템-하루행동시스템-md-8-루프-후-행동-변화"}, {"level": 2, "text": "9. D-Day 조건 연결", "id": "시스템-하루행동시스템-md-9-d-day-조건-연결"}, {"level": 2, "text": "10. 구현 요구사항", "id": "시스템-하루행동시스템-md-10-구현-요구사항"}, {"level": 2, "text": "11. 다음 설계 과제", "id": "시스템-하루행동시스템-md-11-다음-설계-과제"}], "plain": "# 하루 행동 시스템 기획 ## 1. 목적 이 문서는 날짜 기반 미연시 진행에서 플레이어가 하루 동안 무엇을 할 수 있는지 정의한다. 현재 스토리는 1학기 말 첫 회차에서 D-32부터 시작하고, 루프 이후에는 D-25 월요일부터 내부 기준 D-Day 금요일까지 약 4주를 진행한다. 축제는 D-1 목요일 1일차와 D-Day 금요일 2일차의 이틀 구성이다. 1일차는 부스 운영 중심으로 하연과 `쉬어가 카페`를 함께 운영하며 가까워지고, 2일차는 부스 축소 운영 후 히로인들과 축제를 둘러보는 선택을 거쳐 폐장 후 사고로 이어진다. 단, `D-Day`는 내부 기획/시스템 용어이며 게임 내 대사/UI에서는 `축제 2일차`, `축제 마지막 날`, `금요일`로 표기한다. 달력상 D+3 월요일 방학식이 예정되어 있지만, 실패 루프에서는 그 날짜에 도달하지 못한다. 진엔딩에서는 D-Day 금요일 밤 이후 토요일 날짜를 건너뛰고 일요일 오후 병실에서 깨어난 뒤, D+3 월요일 방학식에 겨우 참석한다. 플레이어는 한정된 시간 안에 다음 세 축을 모두 충족해야 한다. 1. 하연과의 상호 마음 확인 2. 기존 관계 정리 3. 사고 단서 확보 하연과 서로의 마음을 확인하지 못하면, D-Day 금요일 밤 사고 기억에서 하연이 빠지고 재윤은 혼자 야외 소무대에 선 채 사고를 반복한다. 따라서 하연 관련 행동은 단순 호감도 상승이 아니라, 하연이 마음을 말할 수 있을 만큼의 신뢰와 재윤이 그 마음을 받아들일 준비를 쌓는 행동이어야 한다. 따라서 하루 행동 시스템은 단순 호감도 선택이 아니라, 제한된 시간 안에서 감정 / 관계 / 조사 사이의 균형을 선택하게 만드는 구조여야 한다. D-1 밤 정산과 D-Day 낮 보정은 [D-1/D-Day 조건 수치화](../스토리/12_D-1_D-Day_조건_수치화.md)의 점수 기준을 사용한다. 하루 행동의 누적 결과는 D-Day 폐장 후 `하연 실패 루프`, 기존 관계 새드엔딩, 사고 의미 미연결 루프, 진엔딩 중 하나로 판정된다. ## 2. 기본 원칙 - 평일과 주말의 플레이 감각을 구분한다. - 평일은 학교 루틴 안에서 작은 선택을 쌓는 구조다. - 주말은 큰 이벤트, 데이트, 조사, 클라이맥스가 발생하는 특별한 날이다. - 모든 행동은 최소 하나 이상의 상태에 영향을 준다. - 하연만 따라가도, 기존 히로인만 따라가도, 조사만 해도 진엔딩은 열리지 않는다. ## 3. 평일 구조 평일은 학교에 가는 날이다. 기본 슬롯: ```text 등교 수업 하교 / 방과후 저녁 ``` ### 3.1 등교 슬롯 등교 슬롯은 하루의 분위기를 정하는 짧은 구간이다. 주요 역할: - 날짜 시작 - 전날 선택 결과 반영 - 짧은 히로인 접점 - 기억과 감정의 어긋남 암시 가능 이벤트: | 이벤트 | 설명 | 주요 효과 | | --- | --- | --- | | 소하와 등교 | 소꿉친구 관계를 자연스럽게 보여줌 | 소하 관계 / 과거 축 | | 하연을 멀리서 봄 | 하연에게 끌리는 감정 강화 | 하연 관심 | | 서린의 공지 | 축제 일정, 방송반/학생회 일정 전달 | 일정 정보 | | 미루의 인사 | 미루가 주인공을 따르는 모습 | 미루 관계 | | 이상 현상 | 날짜 표시 오류, 금속음, 기시감 | 기억 균열 암시 | 등교 슬롯은 대부분 자동 이벤트지만, 특정 날짜에는 선택지를 줄 수 있다. 예: ```text [소하와 같이 간다] [먼저 학교로 간다] [하연을 기다려본다] ``` ### 3.2 수업 슬롯 수업 슬롯은 큰 선택보다는 상태 변화와 짧은 연출 중심이다. 주요 역할: - 하연의 존재감 누적 - 다른 히로인의 미세한 반응 표시 - 루프/내면세계 위화감 삽입 가능 이벤트: | 이벤트 | 설명 | 주요 효과 | | --- | --- | --- | | 하연이 답하지 못함 | 전학생의 어색함과 주인공의 관심 | 하연 신뢰 암시 | | 소하의 쪽지 | 소하가 익숙한 관계를 강조 | 소하 미련 씨앗 | | 서린의 호출 | 방송반 또는 학생회 업무 연결 | 서린 이벤트 예고 | | 미루의 실수 소문 | 축제 도움 인원으로서의 서툼 | 미루 이벤트 예고 | | 졸음 / 짧은 꿈 | 야외 소무대 이미지 침투 | 기억 조각 암시 | 수업 슬롯은 보통 자동 진행으로 두고, 플레이어 피로도를 줄인다. ### 3.3 하교 / 방과후 슬롯 방과후는 평일의 핵심 선택 슬롯이다. 플레이어는 누구와 시간을 보낼지 선택한다. 기본 선택지: ```text [하연과 축제 준비를 한다] [소하와 같이 돌아간다] [서린의 일을 돕는다] [미루의 멘토링을 봐준다] [소무대를 조사한다] [혼자 생각한다] ``` 행동별 효과: | 행동 | 주요 효과 | 리스크 | | --- | --- | --- | | 하연과 축제 준비 | 하연 신뢰 상승, 상호 마음 확인 이벤트 진행 | 기존 관계 정리 지연 가능 | | 소하와 같이 돌아감 | 소하 관계 정리 진행, 과거 단서 | 하연 이벤트 부족 가능 | | 서린의 일을 도움 | 방송 대본, 안전 안내, 구조물 단서 | 선택 회피/의존 증가 가능 | | 미루의 멘토링을 봐줌 | 곧 끝나는 멘토링, 미루 죄책감, 고정끈 단서 | 의존 심화 가능 | | 소무대 조사 | 사고 단서 직접 획득 | 감정 조건 부족 가능 | | 혼자 생각 | 기억 조각 정리, 기억 혼선 완화 | 관계 진행 부족 | ### 3.4 저녁 슬롯 저녁 슬롯은 하루 정산과 기억 균열 연출 구간이다. 주요 역할: - 오늘 선택 결과 정리 - 기억 조각 획득 연출 - 기억 혼선 변화 - 관계 균열 단계 업데이트 - 악몽 또는 짧은 현실 신호 삽입 가능 연출: - 금속이 삐걱이는 소리 - 병원 기계음처럼 들리는 알람 - 오늘 찍은 사진에서 하연만 흐릿함 - 소하와의 기억이 하연과의 기억을 덮어씀 - 서린의 일정표가 선택지처럼 보임 - 미루의 메시지가 읽지 않았는데 읽음 처리됨 저녁 슬롯은 보통 자동 정산이지만, 특정 조건에서는 선택지를 제공한다. 예: ```text [오늘 일을 일기에 적는다] [기억 조각을 확인한다] [그냥 잠든다] ``` ## 4. 주말 구조 주말은 학교와 직접 관련 없는 특별한 날이다. 평일의 축제 준비 / 학생회 / 등하교 루틴에서 벗어나, 인물의 사적인 면과 관계의 깊이를 보여준다. 기본 슬롯: ```text 오전 오후 밤 ``` 주말은 다음 용도로 사용한다. - 학교 밖 데이트 / 외출 - 우연한 만남 - 만나지 않고 혼자 보내는 날 - 약속 이벤트 - 봉사활동 / 가족 심부름 / 동네 행사 - 루프 후 기억 조각 반응 중요한 제한: > 주말에는 원칙적으로 학교 무대 준비나 소무대 작업을 하지 않는다. 학교 관련 사고 단서는 평일 방과후, 학생회 업무, 축제 준비 시간, 또는 별도 조사 행동에서 다룬다. ## 5. 주말 행동 종류 ### 5.0 주말 메신저 선택 구조 특정 주말에는 아침에 여러 연락이 동시에 와 있는 구조를 사용할 수 있다. 예: ```text 2학년 5반 단톡방 소하 개인 메시지 방송반 단톡방 미루 개인 메시지 ``` 처리 원칙: - 플레이어는 각 연락을 모두 읽어볼 수 있다. - 실제로 갈 곳은 하나만 선택한다. - 하나를 선택하면 나머지는 자동으로 거절하거나 다음으로 미룬다. - 자동 거절은 관계 단절이 아니라 하루 시간 제약을 표현하는 장치다. - 선택한 연락만 해당 날짜의 관계/후보/단서 씨앗을 강화한다. ### 5.1 하연과 외출 하연과 학교 밖에서 긴 시간을 보내는 이벤트. 가능 내용: - 서점, 조용한 카페, 공원, 강변 산책 - 하연이 시끄러운 장소보다 조용한 장소를 편하게 느끼는 이유를 보여줌 - 말이 적어도 함께 있는 시간이 불편하지 않다는 감정선 강화 효과: - 하연 신뢰 큰 폭 상승 - 하연과의 상호 마음 확인 이벤트 진행 - 하연의 현실적인 매력 강화 리스크: - 다른 관계의 미련과 균열이 배경에서 진행됨 ### 5.2 소하와 추억의 장소 방문 소하 루트의 큰 이벤트. 가능 내용: - 어릴 때 자주 갔던 문방구, 놀이터, 동네 분식집 - 오래된 사진 / 팔찌 / 약속 - 주인공은 익숙함을 느끼지만, 그 익숙함이 하연에게 향한 마음을 덮으려 한다는 위화감도 느낀다. 효과: - 소하 관계 정리 진행 - 감정 단서 획득 리스크: - 하연과의 마음 확인 진행 지연 ### 5.3 서린과 학교 밖 업무 / 상담 서린 루트의 주말 이벤트는 학교 무대 준비가 아니라, 학교 밖에서 발생하는 방송반 / 학생회 관련 외부 업무나 상담으로 처리한다. 가능 내용: - 축제 협찬 물품 수령 - 문구점 / 인쇄소 / 대여 업체 방문 - 학생회 자료 정리 카페 회의 - 방송 대본 출력물 확인 - 안전 안내 방송 문구 검토 - 서린이 주인공에게 선택과 책임에 대한 조언을 함 효과: - 서린과의 현실 관계 강화 - 서린이 왜 주인공에게 `정답을 알려주는 사람`처럼 각인되었는지 보여줌 - 안전 점검 단서의 간접 예고 가능 - 방송/안내가 선택지 통제 불안으로 변질될 씨앗 제시 리스크: - 서린의 선택 회피/통제 불안 증가 ### 5.4 미루와 봉사활동 / 동네 심부름 미루 루트의 주말 이벤트는 학교 밖에서 주인공이 미루를 챙기는 관계를 보여준다. 미루는 주인공의 `1학기 한정 학습·학교생활 적응 멘토링`을 받던 후배다. 이 멘토링은 수학/영어 보충, 수행평가 정리, 발표 연습, 제출물과 마감일 정리, 봉사활동이나 행사 신청 도움, 모르는 일이 생겼을 때 누구에게 질문하고 보고할지 정하는 연습까지 포함한다. D+3 월요일 방학식이 오면 공식적으로 끝나며, 이후에는 멘토링 관계가 평범한 선후배 관계로 바뀐다. 주말 이벤트는 단순한 데이트보다, 미루가 주인공에게 왜 특별히 의지하게 되었는지와 멘토링이 끝나기 전에 혼자 해보려는 부담을 함께 보여주는 방향이 좋다. 가능 내용: - 지역 봉사활동 - 동네 행사 보조 - 분실물 찾기 - 무거운 물건 옮기기 - 미루가 실수하고 주인공이 도와줌 - 수행평가 자료 찾기 - 발표 연습을 봐주기 - 봉사활동 신청서를 같이 작성하기 - 축제 도움 인원 체크표 만들기 - 실수했을 때 보고할 사람 정하기 - 물어봐도 되는 일과 혼자 해볼 일을 나누기 효과: - 미루와의 의존 관계 강화 - D+3 월요일 방학식과 함께 1학기 한정 멘토링이 끝난다는 불안 - 미루의 서툼과 죄책감의 씨앗을 자연스럽게 보여줌 - 미루가 축제 도움 인원에 참여하게 된 계기 제시 리스크: - 미루의 의존 심화 ### 5.5 우연한 만남 플레이어가 특정 약속을 잡지 않았거나 혼자 외출했을 때 발생할 수 있다. 가능 예시: - 서점에서 하연과 우연히 만남 - 동네 분식집에서 소하와 마주침 - 버스 정류장에서 서린과 만남 - 봉사활동 현장에서 미루와 마주침 효과: - 선택하지 않은 캐릭터도 세계 안에 살아 있다는 느낌 제공 - 낮은 확률 또는 조건부 보너스 이벤트로 활용 ### 5.6 혼자 보내기 / 기억 정리 플레이어가 아무도 만나지 않고 하루를 보내는 행동. 가능 내용: - 집에서 쉬기 - 일기 쓰기 - 기억 조각 정리 - 꿈속 장면 복기 - 산책 중 금속음이나 병원 신호를 떠올림 효과: - 기억 혼선 완화 - 기억 조각 힌트 제공 - 루프 후 빠른 진행 도움 리스크: - 관계 진행 기회 소모 ## 6. 수업 이벤트 처리 수업은 1교시부터 여러 교시까지 모두 플레이하지 않는다. 평소 수업은 축약하고, 특정 이벤트가 있을 때만 `수업 이벤트`로 보여준다. ### 기본 처리 일반적인 날의 수업은 한두 문장으로 넘긴다. 예: > 오전 수업은 별일 없이 지나갔다. > 창밖 운동장에는 축제 천막이 하나둘 세워지고 있었다. ### 수업 이벤트가 발생하는 경우 | 유형 | 설명 | 예시 | | --- | --- | --- | | 하연 이벤트 | 하연의 전학생 적응, 짧은 반응 | 하연이 대답을 망설이자 주인공이 대신 분위기를 풀어줌 | | 소하 이벤트 | 소하의 익숙한 관계 강조 | 소하가 주인공의 과거 답안을 기억하고 있음 | | 서린 이벤트 | 학생회/방송/공지 개입 | 수업 중 방송으로 서린의 목소리가 나오고, 특정 문장이 반복됨 | | 미루 이벤트 | 후배의 실수 소문 | 복도에서 1학년 도움 인원이 실수했다는 이야기가 들림 | | 기억 균열 이벤트 | 내면세계 위화감 | 칠판 날짜가 바뀌거나, 종소리가 병원 기계음처럼 들림 | | 루프 이벤트 | 반복 감각 | 선생님이 지난 회차와 같은 말을 하지만 일부 단어가 달라짐 | ### 수업 중 깜짝 이벤트 후보 수업 이벤트는 짧고 인상적으로 처리한다. 후보: 1. 칠판 날짜 오류 - 수업 시작 때 칠판에는 `D-14`라고 적혀 있었는데, 눈을 깜빡이면 `D-7`로 보임. 2. 종소리 변조 - 수업 종료 종이 잠깐 심전도 소리처럼 들림. 3. 하연 이름 공백 - 출석부에서 하연 이름만 흐릿하게 보임. 4. 반복 문장 - 선생님이 `중요한 건 선택을 미루지 않는 것` 같은 문장을 이상할 정도로 강조함. 5. 책상 수 불일치 - 교실에 책상이 하나 많거나 적어 보임. 6. 소무대 낙서 - 교과서 여백에 자신이 쓴 적 없는 `소무대에 가지 마`라는 글씨가 있음. 7. 순간 암전 - 형광등이 깜빡이고, 교실 천장이 야외 조명 프레임처럼 보임. 8. 방송 잡음 - 학교 방송에서 축제 안내가 나오다가 금속이 긁히는 소리로 변함. ### 수업 이벤트 설계 원칙 - 한 수업 이벤트는 짧게 끝낸다. - 하루에 여러 교시를 모두 플레이하지 않는다. - 중요한 날에만 특정 교시를 명명한다. 예: `3교시 국어`, `5교시 자습`. - 수업 이벤트는 상태값을 크게 바꾸기보다 위화감, 힌트, 다음 행동 유도에 사용한다. ## 7. 주차별 행동 변화 ### Week 1: D-25 ~ D-19 평일: - 선택지는 비교적 평범함 - 하연과의 첫 대화와 기존 히로인의 미묘한 반응 중심 - D-23 수요일에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공식 공지하고 최종 목표가 D-Day로 고정됨 - D-23 수요일에 축제 2일차 뒤 D+3 월요일 방학식이 있다는 일정도 함께 공지되어, 첫 회차에는 평범한 학기말 일정으로 보이고 루프 이후에는 도달하지 못하는 다음 월요일처럼 느껴짐 주말: - 하연과 첫 긴 대화 가능 - 소하/서린/미루 중 하나와 큰 이벤트 가능 ### Week 2: D-18 ~ D-12 평일: - 축제 준비가 본격화됨 - D-18 월요일에 2학년 5반 반행사를 `쉬어가 카페`로 확정하고, 이후 평일 방과후 선택에서 축제 준비 접점이 본격화됨 - D-18 이후부터는 선택 결과가 세계에 반영되는 감각과 아주 약한 어긋남을 서서히 늘린다. - 소무대 조사, 서린 업무, 미루 정리 작업 선택지가 중요해짐 주말: - 사고 단서 집중 이벤트 가능 - 기존 관계의 미련과 균열이 뚜렷해짐 ### Week 3: D-11 ~ D-5 평일: - 관계 균열이 뚜렷해짐 - 사고 단서가 구체화됨 - 소무대 조사, 서린 점검표, 미루 고정끈 관련 이벤트 중요도 상승 주말: - 학교 밖 큰 이벤트 - 히로인 클라이맥스 진입 조건 확보 ### Final Week: D-4 ~ D-1 평일 / 축제 1일차: - 기억 회복과 불안 연출 강화 - 선택하지 않은 관계의 미련과 균열도 배경에서 진행 - D-1에는 하연과의 부스 운영, 기존 관계 정리, 사고 단서 최종 확인을 통해 D-Day 조건을 맞추기 위한 마지막 조정 - D-1 목요일은 축제 1일차로, 2학년 5반 `쉬어가 카페` 등 부스가 정상 운영됨 - D-1에는 재윤과 하연이 같은 부스 운영 시간대에 묶여 함께 일하며 가까워지고, 축제 2일차에는 약속 예약이 아니라 재윤이 하연의 동선과 속도를 읽는 구조로 이어짐 - D-Day 진입 전 최종 정산과 하연의 말하지 못한 예감 이해 여부 확인 ### D+3 월요일: 방학식 예정 - D-1 목요일 축제 1일차와 D-Day 금요일 축제 2일차 뒤 주말을 지나 예정된 1학기 방학식 - 실패 루프에서는 일반 날짜 진행으로 도달하지 못하고 D-25 월요일로 돌아감 - 진엔딩에서는 D-Day 금요일 밤 이후 토요일 허브 없이 일요일 오후 병실 Scene으로 점프하고, 그 다음 날 방학식 에필로그 Scene으로 진입함 - 재윤은 큰 외상은 없지만 알 수 없는 이유로 깨어나지 못했던 상태이며, 월요일 방학식에는 오래 머물 수 없는 조건으로 짧게 참석함 - 미루의 1학기 한정 멘토링 종료일과 연결되어, 미루 루트에서는 `멘토링이 끝나면 선배와 이어지는 이유도 사라진다`는 불안을 강화함 - 진엔딩 이후 에필로그나 회복 장면에서는 처음으로 도달할 수 있는 날짜 후보로 사용할 수 있음 ## 8. 루프 후 행동 변화 루프 후에는 같은 일상을 그대로 반복하지 않는다. 변화: - 첫 회차 전용 1주 프롤로그 스킵 - 이미 본 이벤트는 압축판 제공 - 기억 조각 보유 시 조사 선택지 조기 개방 - 같은 새드엔딩 반복 시 해당 루트 압축 / 특수 대사 적용 예: 첫 회차: ```text [소무대를 둘러본다] ``` 루프 후, `금속음` 조각 보유: ```text [소무대의 임시 조명 프레임을 확인한다] ``` ## 9. D-Day 조건 연결 하루 행동은 D-Day 조건에 연결된다. | 조건 | 관련 행동 | | --- | --- | | 하연과의 상호 마음 확인 | 하연과 축제 준비, D-1 하연 부스 운영, D-2 말하지 못한 예감, 하연 신뢰 대화, 하연이 마음을 말할 수 있는 상태 | | 소하 관계 정리 | 소하와 등교, 추억의 장소 방문, 소하 클라이맥스 | | 서린 관계 정리 | 서린의 일을 도움, 방송반/학생회 작업, 선택권 회복 클라이맥스 | | 미루 관계 정리 | 곧 끝나는 멘토링, 발표 연습, 정리 작업, 꿈속에 남지 않는 클라이맥스 | | 사고 단서 | 소무대 조사, 서린 점검표, 미루 고정끈, 하연 고백 장소, 혼자가 아니었던 사고 기억 | | 기억 혼선 관리 | 혼자 생각, 기억 정리, 휴식 | ## 10. 구현 요구사항 하루 행동 시스템을 구현하려면 다음 상태가 필요하다. - 현재 날짜 - 요일 / 평일 여부 / 주말 여부 - 현재 슬롯 - 오늘 선택한 행동 목록 - 캐릭터별 이벤트 가능 여부 - 주말 특별 이벤트 가능 여부 - 이미 본 이벤트 여부 - 루프 후 압축 이벤트 여부 이 시스템은 `미연시_코어_시스템_요구사항.md`의 날짜 기반 이벤트 허브와 연결된다. ## 11. 다음 설계 과제 1. 날짜별 실제 이벤트 세부 확정 2. 학교 밖 주말 이벤트를 히로인별로 2~3개씩 작성 3. 각 슬롯별 이벤트 후보와 수업 깜짝 이벤트 조건 세분화 4. 행동별 상태 변화 수치화 5. 루프 후 압축 이벤트 규칙 구체화", "excerpt": "# 하루 행동 시스템 기획 ## 1. 목적 이 문서는 날짜 기반 미연시 진행에서 플레이어가 하루 동안 무엇을 할 수 있는지 정의한다. 현재 스토리는 1학기 말 첫 회차에서 D-32부터 시작하고, 루프 이후에는 D-25 월요일부터 내부 기준 D-Day 금요일까지 약 4주를 진행한다. 축제는 D-1 목요일 1일차와 D-Day 금요일 2일차의 이틀 구성이다. 1일차는 부스 운영 중심으로 하연과 `"}]</script>

    const search = document.getElementById('search');
    const buttons = [...document.querySelectorAll('[data-filter]')];
    const library = document.getElementById('library');
    let filter = 'all';
    let currentId = null;

    const categories = docs.reduce((acc, doc) => {
      acc[doc.category] = (acc[doc.category] || 0) + 1;
      return acc;
    }, {});

    function norm(value) { return (value || '').toLowerCase().trim(); }
    function getFilteredDocs() {
      const q = norm(search.value);
      return docs.filter(doc => {
        const categoryMatch = filter === 'all' || doc.category === filter;
        const haystack = norm([doc.title, doc.path, doc.plain].join(' '));
        return categoryMatch && (!q || haystack.includes(q));
      });
    }
    function renderList() {
      const filtered = getFilteredDocs();
      result.textContent = filtered.length + '개 문서';
      docList.innerHTML = filtered.map(doc => `
        <button class="doc-button ${doc.id === currentId ? 'active' : ''}" data-doc="${doc.id}">
          <span class="badge">${doc.category}</span>
          <strong>${doc.title}</strong>
          <small>${doc.path}</small>
        </button>
      `).join('') || '<p class="result">검색 결과가 없습니다.</p>';
      docList.querySelectorAll('[data-doc]').forEach(btn => {
        btn.addEventListener('click', () => openDoc(btn.dataset.doc));
      });
    }
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }
    function tocHtml(doc) {
      const headings = (doc.headings || []).filter(h => h.level > 1).slice(0, 120);
      if (!headings.length) return '';
      return `
        <details class="inline-toc" open>
          <summary>이 문서 목차</summary>
          <nav>${headings.map(h => `<a class="lv${h.level}" href="#${h.id}" title="${escapeHtml(h.text)}">${escapeHtml(headingLabel(doc, h.text))}</a>`).join('')}</nav>
        </details>
      `;
    }
    function sideTocHtml(doc) {
      const headings = (doc.headings || []).filter(h => h.level > 1).slice(0, 160);
      if (!headings.length) return '';
      return `
        <aside class="doc-side-toc" aria-label="현재 문서 목차">
          <strong>현재 문서 목차</strong>
          <nav>${headings.map(h => `<a class="lv${h.level}" href="#${h.id}" title="${escapeHtml(h.text)}">${escapeHtml(headingLabel(doc, h.text))}</a>`).join('')}</nav>
        </aside>
      `;
    }
    function isCalendarDoc(doc) {
      return doc?.path === '스토리/06_날짜별_진행_달력.md' || doc?.title === '날짜별 진행 달력';
    }
    function isContinuousReadingDoc(doc) {
      return doc?.path === '스토리/00_전체_스토리.md'
        || doc?.path === '스토리/07_전체_스토리_외전_실패루프.md'
        || doc?.title === '전체 스토리'
        || doc?.title === '전체 스토리 외전: 실패 루프와 새드엔딩';
    }
    function dateHeadingLabel(text) {
      const match = (text || '').match(/^(D(?:-\d+|\+\d+|-Day))\b/);
      return match ? match[1] : '';
    }
    function headingLabel(doc, text) {
      return isCalendarDoc(doc) ? (dateHeadingLabel(text) || text) : text;
    }
    function previewText(node) {
      const text = (node?.textContent || '').replace(/\s+/g, ' ').trim();
      if (!text) return '';
      return text.length > 140 ? text.slice(0, 140) + '…' : text;
    }
    function enhanceDocBody(doc) {
      const body = content.querySelector('.doc-body');
      if (!body) return false;
      if (isContinuousReadingDoc(doc)) return false;
      const headings = [...body.querySelectorAll('h3')];
      if (!headings.length) return false;
      headings.forEach(heading => {
        const originalHeadingText = heading.textContent.trim();
        const compactHeadingText = headingLabel(doc, originalHeadingText);
        if (compactHeadingText !== originalHeadingText) {
          heading.dataset.fullTitle = originalHeadingText;
          heading.title = originalHeadingText;
          heading.textContent = compactHeadingText;
          heading.classList.add('compact-date-title');
        }

        const section = document.createElement('details');
        section.className = 'planning-section';
        section.open = true;

        const summary = document.createElement('summary');
        const sectionContent = document.createElement('div');
        sectionContent.className = 'section-content';

        heading.parentNode.insertBefore(section, heading);
        section.appendChild(summary);
        section.appendChild(sectionContent);
        summary.appendChild(heading);

        while (section.nextSibling) {
          const node = section.nextSibling;
          if (node.nodeType === Node.ELEMENT_NODE && ['H2', 'H3'].includes(node.tagName)) break;
          sectionContent.appendChild(node);
        }

        const source = sectionContent.querySelector('p, li, blockquote');
        const preview = previewText(source);
        if (preview) {
          const previewEl = document.createElement('p');
          previewEl.className = 'section-preview';
          previewEl.textContent = preview;
          summary.appendChild(previewEl);
        }
      });
      body.classList.add('sectioned');
      return true;
    }
    function setAllSections(open) {
      content.querySelectorAll('.planning-section').forEach(section => {
        section.open = open;
      });
    }
    function revealHeading(hash) {
      const id = decodeURIComponent((hash || '').replace(/^#/, ''));
      if (!id) return false;
      const target = document.getElementById(id);
      if (!target) return false;
      const section = target.closest('details.planning-section');
      if (section) section.open = true;
      setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 0);
      return true;
    }
    function normalizeDocPath(path) {
      const parts = [];
      String(path || '').split('/').forEach(part => {
        if (!part || part === '.') return;
        if (part === '..') parts.pop();
        else parts.push(part);
      });
      return parts.join('/');
    }
    function docFromMarkdownHref(href, currentDoc) {
      if (!href || !currentDoc) return null;
      if (/^[a-z][a-z0-9+.-]*:/i.test(href) || href.startsWith('#')) return null;
      const [rawPath, rawHash = ''] = href.split('#');
      if (!rawPath.toLowerCase().endsWith('.md')) return null;
      const decodedPath = decodeURIComponent(rawPath).replace(/\\/g, '/');
      const baseParts = (currentDoc.path || '').split('/');
      baseParts.pop();
      const base = baseParts.join('/');
      const normalized = normalizeDocPath((base ? base + '/' : '') + decodedPath);
      const doc = docs.find(d => d.path === normalized);
      return doc ? { doc, hash: rawHash ? decodeURIComponent(rawHash) : '' } : null;
    }
    function bindInternalMarkdownLinks(doc) {
      content.querySelectorAll('.doc-body a[href]').forEach(link => {
        const target = docFromMarkdownHref(link.getAttribute('href'), doc);
        if (!target) return;
        link.dataset.docLink = target.doc.id;
        link.title = `통합 기획서에서 ${target.doc.title} 열기`;
      });
    }
    function openDoc(id, headingHash = '') {
      const doc = docs.find(d => d.id === id) || docs[0];
      currentId = doc.id;
      content.innerHTML = `
        <article class="doc-view">
          <header class="doc-head">
            <span class="badge">${doc.category}</span>
            <h2>${doc.title}</h2>
            <p class="path">${doc.path}</p>
            <div class="doc-tools">
              <button id="copyPath">경로 복사</button>
              <button id="expandSections">모두 펼치기</button>
              <button id="collapseSections">모두 접기</button>
              <button id="backHome">홈으로</button>
            </div>
            ${tocHtml(doc)}
          </header>
          <div class="doc-reading">
            <div class="doc-body">${doc.html}</div>
            ${sideTocHtml(doc)}
          </div>
        </article>
      `;
      const hasSections = enhanceDocBody(doc);
      bindInternalMarkdownLinks(doc);
      document.getElementById('copyPath').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(doc.path); } catch (_) {}
      });
      const expandSections = document.getElementById('expandSections');
      const collapseSections = document.getElementById('collapseSections');
      if (hasSections) {
        expandSections.addEventListener('click', () => setAllSections(true));
        collapseSections.addEventListener('click', () => setAllSections(false));
      } else {
        expandSections.classList.add('hidden');
        collapseSections.classList.add('hidden');
      }
      document.getElementById('backHome').addEventListener('click', renderHome);
      renderList();
      if (headingHash && revealHeading('#' + headingHash)) {
        history.replaceState(null, '', '#' + headingHash);
      } else {
        location.hash = doc.id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      if (window.innerWidth <= 820) library.classList.remove('open');
    }
    function quickCard(label, title, desc) {
      const doc = docs.find(d => d.title === title);
      if (!doc) return '';
      return `<div class="quick-card"><h3>${label}</h3><p>${desc}</p><button data-quick="${doc.id}">${title} 열기</button></div>`;
    }
    function renderHome() {
      currentId = null;
      content.innerHTML = `
        <section class="dashboard" id="home">
          <header class="dashboard-head">
            <span class="badge">Overview</span>
            <h2>문서 하나씩 빠르게 읽는 통합 기획서</h2>
            <p>왼쪽 문서 라이브러리에서 필요한 기획서를 고르면 이 영역에 해당 문서만 표시됩니다. 목차는 문서 상단의 접이식 목차로 확인합니다.</p>
          </header>
          <div class="dashboard-body">
            <div class="grid cards">
              <div class="stat"><b>${docs.length}</b>전체 문서</div>
              <div class="stat"><b>${categories['스토리'] || 0}</b>스토리 문서</div>
              <div class="stat"><b>${categories['시스템'] || 0}</b>시스템 문서</div>
              <div class="stat"><b>2패널</b>라이브러리 + 리더</div>
            </div>
            <h3>빠른 시작</h3>
            <div class="grid cards">
              ${quickCard('전체 스토리 보기', '전체 스토리', 'D-32부터 진엔딩 후 D+3까지 확정된 본편 흐름을 소설형으로 읽습니다.')}
              ${quickCard('실패 외전 보기', '전체 스토리 외전: 실패 루프와 새드엔딩', '하연 실패 루프와 새드엔딩을 짧고 선명한 외전 장면으로 확인합니다.')}
              ${quickCard('날짜 흐름 보기', '날짜별 진행 달력', 'D-32부터 축제 마지막 날, D+3 방학식까지의 전체 진행을 확인합니다.')}
              ${quickCard('핵심 시스템 보기', '미연시 코어 시스템 요구사항', '날짜, 회차, 플래그, 조건, 엔딩 기록 같은 런타임 상태를 확인합니다.')}
              ${quickCard('하루 행동 보기', '하루 행동 시스템 기획', '평일/주말 슬롯과 선택 행동 구조를 확인합니다.')}
              ${quickCard('캐릭터 관계 보기', '캐릭터와 관계', '재윤, 하연, 소하, 서린, 미루의 관계 축을 확인합니다.')}
            </div>
          </div>
        </section>
      `;
      renderList();
      location.hash = 'home';
    }

    content.addEventListener('click', event => {
      const quick = event.target.closest('[data-quick]');
      if (quick) {
        event.preventDefault();
        openDoc(quick.dataset.quick);
        return;
      }
      const markdownLink = event.target.closest('.doc-body a[href]');
      if (markdownLink) {
        const currentDoc = docs.find(d => d.id === currentId);
        const target = docFromMarkdownHref(markdownLink.getAttribute('href'), currentDoc);
        if (target) {
          event.preventDefault();
          openDoc(target.doc.id, target.hash);
          return;
        }
      }
      const tocLink = event.target.closest('.inline-toc a, .doc-side-toc a');
      if (tocLink && tocLink.hash) {
        event.preventDefault();
        revealHeading(tocLink.hash);
        history.replaceState(null, '', tocLink.hash);
      }
    });
    search.addEventListener('input', renderList);
    buttons.forEach(btn => btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      renderList();
    }));
    document.getElementById('homeBtn').addEventListener('click', renderHome);
    document.getElementById('mobileLibraryToggle').addEventListener('click', () => library.classList.toggle('open'));

    const initial = decodeURIComponent(location.hash.replace(/^#/, ''));
    const initialDoc = docs.find(d => d.id === initial);
    const initialHeadingDoc = docs.find(d => (d.headings || []).some(h => h.id === initial));
    if (initial && initial !== 'home' && initialDoc) {
      openDoc(initialDoc.id);
    } else if (initial && initialHeadingDoc) {
      openDoc(initialHeadingDoc.id);
      revealHeading('#' + initial);
      history.replaceState(null, '', '#' + initial);
    } else {
      renderHome();
    }
  </script>
</body>
</html>
