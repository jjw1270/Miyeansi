e><\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-6-2-d-1-밤-상태-등급\">6.2 D-1 밤 상태 등급<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>등급<\/th><th>조건<\/th><th>D-Day 낮 처리<\/th><\/tr><\/thead><tbody><tr><td><code>Ready<\/code><\/td><td>모든 항목 안정<\/td><td>낮 선택은 확인/대사 변주. 폐장 후 성공 가능<\/td><\/tr><tr><td><code>OneAxisShort<\/code><\/td><td>보정 가능 항목이 정확히 1개<\/td><td>낮 선택으로 해당 축을 보정하면 성공 가능<\/td><\/tr><tr><td><code>TwoAxisShort<\/code><\/td><td>보정 가능 항목 2개 또는 위험 항목 1개<\/td><td>낮 선택 하나로 전부 보정 불가. 진엔딩 선택지 잠김 가능<\/td><\/tr><tr><td><code>CriticalShort<\/code><\/td><td>D-2 실패, 하연 위험, 미해결 2개 이상, 사고 정보 부족, 회피 위험 중 하나<\/td><td>폐장 후 실패/새드/루프 우선<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-6-3-d-1-밤-연출-규칙\">6.3 D-1 밤 연출 규칙<\/h4>\n<p>수치를 UI로 보여주지 않고 아래처럼 표현한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>부족 축<\/th><th>연출<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰 부족<\/td><td>하연의 말이 짧아지고, 재윤 독백이 <code>묻지 못했다<\/code>로 끝남<\/td><\/tr><tr><td>동선 이해 부족<\/td><td>하연이 바라본 방향을 재윤이 놓침<\/td><\/tr><tr><td>기존 관계 미정리<\/td><td>해당 인물의 목소리나 메시지가 밤 정산에 끼어듦<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>소무대 이미지가 장소만 남고 이유가 비어 있음<\/td><\/tr><tr><td>회피 높음<\/td><td>선택지 텍스트가 <code>내일 생각한다<\/code>, <code>괜찮은 척한다<\/code>처럼 미루는 말투로 변함<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-7-d-day-낮-보정\">7. D-Day 낮 보정<\/h3>\n<p>D-Day 낮 선택은 한 번만 가능하다. 선택한 축만 보정하고, 다른 축은 그대로 확정한다.<\/p>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-7-1-낮-선택별-보정량\">7.1 낮 선택별 보정량<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>낮 선택<\/th><th>보정 조건<\/th><th>성공 보정<\/th><th>한계<\/th><\/tr><\/thead><tbody><tr><td>하연과 축제를 둘러본다<\/td><td><code>HaYeonTrust &gt;= 5<\/code> 또는 <code>HaYeonPaceRead &gt;= 2<\/code><\/td><td><code>HaYeonTrust +1<\/code>, <code>HaYeonPaceRead +1<\/code>, 조건 충족 시 <code>AccidentClueHaYeon = true<\/code><\/td><td>기존 관계 미해결은 해결하지 못함<\/td><\/tr><tr><td>소하와 마지막으로 오래된 길을 걷는다<\/td><td><code>SoHaPressure &lt;= 2<\/code><\/td><td>올바른 선택 시 <code>SoHaResolved = true<\/code>, <code>AccidentClueSoHa = true<\/code><\/td><td>하연 신뢰/동선은 보정하지 못함<\/td><\/tr><tr><td>서린의 방송 마무리를 돕는다<\/td><td><code>SeoRinControl &lt;= 2<\/code><\/td><td>올바른 선택 시 <code>SeoRinResolved = true<\/code>, <code>AccidentClueSeoRin = true<\/code><\/td><td>자기 선택을 서린에게 맡기면 실패<\/td><\/tr><tr><td>미루의 도움 인원 마무리를 확인한다<\/td><td><code>MiRuDependence &lt;= 2<\/code><\/td><td>올바른 선택 시 <code>MiRuResolved = true<\/code>, <code>AccidentClueMiRu = true<\/code><\/td><td>대신 책임지면 실패<\/td><\/tr><tr><td>혼자 야외 소무대 쪽을 본다<\/td><td><code>AccidentClueScore == 2<\/code> 이상 권장<\/td><td>부족한 물리 단서 1개 보강 가능<\/td><td><code>AccidentClueHaYeon<\/code>은 단독 조사로 획득 불가. 회피가 높으면 <code>Avoidance +1<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-7-2-낮-선택-실패-처리\">7.2 낮 선택 실패 처리<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>실패 상황<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>하연 선택에서 축제 놀이에만 집중<\/td><td>하연 신뢰/동선 보정 없음<\/td><\/tr><tr><td>소하 선택에서 애매하게 말함<\/td><td><code>SoHaResolved<\/code> false 유지, <code>SoHaPressure<\/code> 3으로 상승 가능<\/td><\/tr><tr><td>서린 선택에서 서린 안을 그대로 따름<\/td><td><code>SeoRinResolved<\/code> false 유지, <code>SeoRinControl<\/code> 3으로 상승 가능<\/td><\/tr><tr><td>미루 선택에서 대신 책임짐<\/td><td><code>MiRuResolved<\/code> false 유지, <code>MiRuDependence<\/code> 3으로 상승 가능<\/td><\/tr><tr><td>혼자 선택으로 단서만 확인하고 공유하지 않음<\/td><td>물리 단서는 늘 수 있으나 하연 연결 부족. <code>Avoidance +1<\/code> 가능<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-8-폐장-후-최종-판정\">8. 폐장 후 최종 판정<\/h3>\n<p>D-Day 폐장 후에는 아래 순서로 판정한다.<\/p>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-8-1-진엔딩-필수-조건\">8.1 진엔딩 필수 조건<\/h4>\n<pre><code>HaYeonTrust &gt;= 6\nHaYeonPaceRead &gt;= 3\nD2PremonitionPassed == true\nSoHaResolved == true\nSeoRinResolved == true\nMiRuResolved == true\nAccidentClueScore &gt;= 3\nAccidentClueHaYeon == true\nAvoidance &lt;= 3\n히든 붕괴 조건 미충족<\/code><\/pre>\n<p>이 조건을 모두 만족하면 <code>[하연에게 말하러 간다]<\/code> 또는 이후 실제 스크립트에서 사용할 진엔딩 선택지가 열린다.<\/p>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-8-2-분기-우선순위\">8.2 분기 우선순위<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>우선순위<\/th><th>조건<\/th><th>분기<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>히든 붕괴 조건 충족<\/td><td>히든 세계 붕괴 엔딩<\/td><\/tr><tr><td>2<\/td><td><code>D2PremonitionPassed == false<\/code> 또는 <code>HaYeonTrust &lt; 6<\/code> 또는 <code>HaYeonPaceRead &lt; 3<\/code><\/td><td>하연 실패 루프<\/td><\/tr><tr><td>3<\/td><td><code>SoHaResolved == false<\/code> 그리고 <code>SoHaPressure == 3<\/code><\/td><td>소하 새드엔딩<\/td><\/tr><tr><td>4<\/td><td><code>SeoRinResolved == false<\/code> 그리고 <code>SeoRinControl == 3<\/code><\/td><td>서린 새드엔딩<\/td><\/tr><tr><td>5<\/td><td><code>MiRuResolved == false<\/code> 그리고 <code>MiRuDependence == 3<\/code><\/td><td>미루 새드엔딩<\/td><\/tr><tr><td>6<\/td><td>미해결 관계가 1개 이상 남음<\/td><td>기존 관계 미정리 루프 또는 해당 인물 새드엔딩 약화판<\/td><\/tr><tr><td>7<\/td><td><code>AccidentClueScore &lt; 3<\/code> 또는 <code>AccidentClueHaYeon == false<\/code><\/td><td>사고 의미 미연결 루프<\/td><\/tr><tr><td>8<\/td><td><code>Avoidance &gt;= 4<\/code><\/td><td>회피 루프. 하연에게 가려 하지만 마지막 말을 미룸<\/td><\/tr><tr><td>9<\/td><td>모든 필수 조건 충족<\/td><td>진엔딩<\/td><\/tr><\/tbody><\/table><\/div>\n<p>우선순위 6의 약화판은 실제 구현 단계에서 새드엔딩 컷을 짧게 처리할지, D-25 루프 복귀로 처리할지 결정한다. 현재 스토리 기준에서는 강한 압박값 3이 아니면 완전 새드엔딩보다 루프 복귀에 가깝다.<\/p>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-9-선택지-노출-기준\">9. 선택지 노출 기준<\/h3>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-9-1-폐장-후-선택지-세트\">9.1 폐장 후 선택지 세트<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>선택지 노출<\/th><\/tr><\/thead><tbody><tr><td>모든 조건 충족<\/td><td><code>[하연에게 말하러 간다]<\/code> 노출<\/td><\/tr><tr><td>하연 조건 부족<\/td><td><code>[소무대 쪽으로 가본다]<\/code>만 노출. 이유를 모름<\/td><\/tr><tr><td>기존 관계 압박 높음<\/td><td>해당 도피 선택지가 함께 노출. 예: <code>[예전처럼 돌아간다]<\/code><\/td><\/tr><tr><td>사고 단서 부족<\/td><td><code>[확인하러 간다]<\/code>처럼 조사형 선택지만 노출. 마음 고백 선택지 없음<\/td><\/tr><tr><td>회피 높음<\/td><td><code>[내일 말한다]<\/code>, <code>[아직은 말하지 않는다]<\/code> 같은 미루는 선택지 노출<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-9-2-진엔딩-선택지-명칭-후보\">9.2 진엔딩 선택지 명칭 후보<\/h4>\n<p>실제 스크립트 분할 전 기준 후보:<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>조금 더 결말 선택지에 가깝게 쓰는 후보:<\/p>\n<pre><code>[이번에는 내가 먼저 간다]<\/code><\/pre>\n<p>최종 진엔딩 선택지 후보:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>D-Day 실제 스크립트 분할 문서에서는 위 셋 중 장면 톤에 맞는 하나를 고른다.<\/p>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-10-예시-케이스\">10. 예시 케이스<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>케이스<\/th><th>상태<\/th><th>낮 선택<\/th><th>최종 분기<\/th><\/tr><\/thead><tbody><tr><td>안정 진엔딩<\/td><td>하연 6/3, 세 관계 정리, 단서 3+하연, 회피 2<\/td><td>아무 선택이나 확인 장면<\/td><td>진엔딩 가능<\/td><\/tr><tr><td>하연만 1 부족<\/td><td>하연 5/3, 세 관계 정리, 단서 충분<\/td><td>하연 선택 성공<\/td><td>진엔딩 가능<\/td><\/tr><tr><td>관계 1개 미정리<\/td><td>하연 충분, 소하 미정리+압박2, 단서 충분<\/td><td>소하 선택 성공<\/td><td>진엔딩 가능<\/td><\/tr><tr><td>단서 1개 부족<\/td><td>하연 충분, 관계 정리, 단서2+하연<\/td><td>서린/미루/혼자 중 부족 단서 보정<\/td><td>진엔딩 가능<\/td><\/tr><tr><td>D-2 실패<\/td><td>D2PremonitionPassed false<\/td><td>하연 선택을 해도 회복 불가<\/td><td>하연 실패 루프<\/td><\/tr><tr><td>하연 단서 없음<\/td><td>단서3이지만 AccidentClueHaYeon false<\/td><td>혼자 조사로 회복 불가<\/td><td>사고 의미 미연결 루프 또는 하연 실패 루프<\/td><\/tr><tr><td>미정리 2개<\/td><td>소하/미루 미정리<\/td><td>낮 한 번으로 모두 해결 불가<\/td><td>진엔딩 잠김, 압박 높은 쪽 우선<\/td><\/tr><tr><td>회피 높음<\/td><td>Avoidance 4<\/td><td>어떤 선택을 해도 말하기 직전 미룸<\/td><td>회피 루프<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-11-실제-구현-메모\">11. 실제 구현 메모<\/h3>\n<ul>\n<li><code>HaYeonTrust<\/code>와 <code>HaYeonPaceRead<\/code>는 정수형으로 관리한다.<\/li>\n<li><code>Resolved<\/code>와 <code>AccidentClue*<\/code>는 우선 불리언으로 관리한다.<\/li>\n<li><code>AccidentClueScore<\/code>는 저장 변수보다 평가 시 계산값으로 두는 편이 안전하다.<\/li>\n<li>D-1 밤에는 <code>DDayReadinessGrade<\/code> 같은 임시 평가 결과를 생성할 수 있다.<\/li>\n<li>D-Day 낮 선택 후에는 동일 평가 함수를 한 번 더 돌려 최종 분기만 결정한다.<\/li>\n<li>실제 UI에는 점수와 등급을 노출하지 않고, 선택지 잠김/문장 변화/회상 컷으로만 표현한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-12-다음-연결\">12. 다음 연결<\/h3>\n<p>이 문서 기준은 <a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a>에 반영했다. 이후 조건 관련 변경은 먼저 이 문서에서 기준을 조정한 뒤, 13의 Scene 라우팅과 평가 함수 초안에 반영한다.<\/p>\n<p>다음 우선 작업:<\/p>\n<ol>\n<li>D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다.<\/li>\n<li>D-Day 스크립트 분할을 시스템 문서의 StoryFlow Scene/Branch/Transition 설계와 맞춘다.<\/li>\n<li>크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "D-1/D-Day 조건 수치화", "id": "스토리-12d-1d-day조건수치화-md-d-1-d-day-조건-수치화"}, {"level": 2, "text": "1. 기본 원칙", "id": "스토리-12d-1d-day조건수치화-md-1-기본-원칙"}, {"level": 2, "text": "2. 상태 변수 기준", "id": "스토리-12d-1d-day조건수치화-md-2-상태-변수-기준"}, {"level": 3, "text": "2.1 하연 축", "id": "스토리-12d-1d-day조건수치화-md-2-1-하연-축"}, {"level": 2, "text": "3. 기존 관계 축", "id": "스토리-12d-1d-day조건수치화-md-3-기존-관계-축"}, {"level": 3, "text": "3.1 관계 정리 변수", "id": "스토리-12d-1d-day조건수치화-md-3-1-관계-정리-변수"}, {"level": 3, "text": "3.2 압박 변수", "id": "스토리-12d-1d-day조건수치화-md-3-2-압박-변수"}, {"level": 2, "text": "4. 사고 단서 축", "id": "스토리-12d-1d-day조건수치화-md-4-사고-단서-축"}, {"level": 2, "text": "5. 회피 축", "id": "스토리-12d-1d-day조건수치화-md-5-회피-축"}, {"level": 2, "text": "6. D-1 밤 정산", "id": "스토리-12d-1d-day조건수치화-md-6-d-1-밤-정산"}, {"level": 3, "text": "6.1 정산 항목", "id": "스토리-12d-1d-day조건수치화-md-6-1-정산-항목"}, {"level": 3, "text": "6.2 D-1 밤 상태 등급", "id": "스토리-12d-1d-day조건수치화-md-6-2-d-1-밤-상태-등급"}, {"level": 3, "text": "6.3 D-1 밤 연출 규칙", "id": "스토리-12d-1d-day조건수치화-md-6-3-d-1-밤-연출-규칙"}, {"level": 2, "text": "7. D-Day 낮 보정", "id": "스토리-12d-1d-day조건수치화-md-7-d-day-낮-보정"}, {"level": 3, "text": "7.1 낮 선택별 보정량", "id": "스토리-12d-1d-day조건수치화-md-7-1-낮-선택별-보정량"}, {"level": 3, "text": "7.2 낮 선택 실패 처리", "id": "스토리-12d-1d-day조건수치화-md-7-2-낮-선택-실패-처리"}, {"level": 2, "text": "8. 폐장 후 최종 판정", "id": "스토리-12d-1d-day조건수치화-md-8-폐장-후-최종-판정"}, {"level": 3, "text": "8.1 진엔딩 필수 조건", "id": "스토리-12d-1d-day조건수치화-md-8-1-진엔딩-필수-조건"}, {"level": 3, "text": "8.2 분기 우선순위", "id": "스토리-12d-1d-day조건수치화-md-8-2-분기-우선순위"}, {"level": 2, "text": "9. 선택지 노출 기준", "id": "스토리-12d-1d-day조건수치화-md-9-선택지-노출-기준"}, {"level": 3, "text": "9.1 폐장 후 선택지 세트", "id": "스토리-12d-1d-day조건수치화-md-9-1-폐장-후-선택지-세트"}, {"level": 3, "text": "9.2 진엔딩 선택지 명칭 후보", "id": "스토리-12d-1d-day조건수치화-md-9-2-진엔딩-선택지-명칭-후보"}, {"level": 2, "text": "10. 예시 케이스", "id": "스토리-12d-1d-day조건수치화-md-10-예시-케이스"}, {"level": 2, "text": "11. 실제 구현 메모", "id": "스토리-12d-1d-day조건수치화-md-11-실제-구현-메모"}, {"level": 2, "text": "12. 다음 연결", "id": "스토리-12d-1d-day조건수치화-md-12-다음-연결"}], "plain": "# D-1/D-Day 조건 수치화 이 문서는 D-1 밤 정산과 D-Day 낮 보정, 폐장 후 최종 분기를 실제 게임 시스템으로 옮기기 위한 조건 기준 v0.1이다. 목표는 `충분하다`, `부족하다`로 적혀 있던 감정 조건을 구현 가능한 점수·불리언·우선순위로 정리하는 것이다. 수치는 최종 밸런스가 아니라 스토리 구조를 흔들지 않기 위한 1차 기준이다. ## 1. 기본 원칙 - 수치는 플레이어에게 직접 노출하지 않는다. - 게임 내에서는 재윤의 독백, 하연의 반응, 기존 인물의 대사, 선택지 잠김/변형으로만 상태를 보여준다. - D-1 밤은 `현재 상태 진단`이다. - D-Day 낮은 `마지막 보정`이다. - D-Day 폐장 후에는 더 이상 보정하지 않고 분기만 판정한다. - 진엔딩은 하연 점수만 높다고 열리지 않는다. 하연 신뢰, 하연 동선 이해, 기존 관계 정리, 사고 단서, 회피 누적이 모두 기준을 통과해야 한다. ## 2. 상태 변수 기준 ### 2.1 하연 축 | 변수 | 범위 | 의미 | 주요 상승 시점 | | --- | --- | --- | --- | | `HaYeonTrust` | 0~8 | 하연이 재윤에게 자기 침묵과 속도를 맡길 수 있는 신뢰 | D-25, D-24, D-18~D-16, D-13, D-7, D-2, D-1, D-Day 낮 하연 선택 | | `HaYeonPaceRead` | 0~4 | 재윤이 하연의 조용한 자리 선호와 동선을 읽는 정도 | D-17, D-16, D-2, D-1, D-Day 낮 하연 선택 | | `D2PremonitionPassed` | true/false | D-2 말하지 못한 예감에서 하연을 성급히 몰아붙이지 않고 이해했는지 | D-2 | | `AccidentClueHaYeon` | true/false | 사고 기억이 `하연에게 가려던 선택`과 연결되는 핵심 조각 | D-2, D-1, D-Day 낮 하연 선택 | 하연 축 판정: | 상태 | 조건 | 의미 | | --- | --- | --- | | 안정 | `HaYeonTrust >= 6` 그리고 `HaYeonPaceRead >= 3` | 폐장 후 하연이 있을 곳을 알아차릴 수 있음 | | 보정 가능 | `HaYeonTrust == 5` 또는 `HaYeonPaceRead == 2` | D-Day 낮 하연 선택으로 보정 가능 | | 위험 | `HaYeonTrust <= 4` 또는 `HaYeonPaceRead <= 1` | D-Day 낮 한 번으로는 회복이 어려움 | | 실패 확정 | `D2PremonitionPassed == false` | 하연의 침묵과 동선을 읽지 못해 폐장 후 실패 쪽으로 기움 | ## 3. 기존 관계 축 ### 3.1 관계 정리 변수 | 변수 | 범위 | 의미 | | --- | --- | --- | | `SoHaResolved` | true/false | 과거로 돌아가 숨는 길을 정리했는지 | | `SeoRinResolved` | true/false | 정답과 순서 뒤에 숨는 길을 정리했는지 | | `MiRuResolved` | true/false | 필요한 사람 역할 뒤에 숨는 길을 정리했는지 | ### 3.2 압박 변수 | 변수 | 범위 | 의미 | 높을 때 | | --- | --- | --- | --- | | `SoHaPressure` | 0~3 | 소하와의 과거 미련 압박 | 예전처럼 돌아가는 선택지가 강해짐 | | `SeoRinControl` | 0~3 | 서린에게 선택권을 맡기는 정도 | 안전한 정답 뒤에 숨는 선택지가 강해짐 | | `MiRuDependence` | 0~3 | 미루에게 필요한 사람으로 남으려는 정도 | 누군가를 두고 가는 죄책감이 강해짐 | 기존 관계 판정: | 상태 | 조건 | 의미 | | --- | --- | --- | | 정리 완료 | 세 `Resolved` 모두 true | 진엔딩 조건 B 충족 | | 1축 보정 가능 | 미해결 1개 + 해당 압박값 `<= 2` | D-Day 낮 해당 인물 선택으로 마지막 보정 가능 | | 위험 | 미해결 1개 + 해당 압박값 `3` | D-Day 낮 실패 시 해당 새드엔딩 우선 | | 실패 위험 큼 | 미해결 2개 이상 | D-Day 낮 한 번으로 모두 보정 불가. 진엔딩 선택지 잠김 | ## 4. 사고 단서 축 사고 단서는 단순 정보가 아니라 `다친 기억까지 안고 현실로 돌아갈 수 있는 기억 조각`이다. | 변수 | 범위 | 의미 | | --- | --- | --- | | `AccidentClueSoHa` | true/false | 재윤이 축제날 하연을 향했다는 감정 단서 | | `AccidentClueSeoRin` | true/false | 소무대 임시 구조물/조명 프레임 위험 단서 | | `AccidentClueMiRu` | true/false | 출입 제한 표지/고정끈/보고 대상 단서 | | `AccidentClueHaYeon` | true/false | 서로 말하려던 장소와 끊긴 문장 단서 | | `AccidentClueScore` | 0~4 | 위 네 단서의 true 개수 | 사고 단서 판정: | 상태 | 조건 | 의미 | | --- | --- | --- | | 안정 | `AccidentClueScore >= 3` 그리고 `AccidentClueHaYeon == true` | 사고를 하연에게 가려던 선택의 결과로 연결 가능 | | 보정 가능 | `AccidentClueScore == 2` 그리고 `AccidentClueHaYeon == true` | D-Day 낮 조사/인물 선택으로 1개 보강 가능 | | 감정 연결 부족 | `AccidentClueScore >= 3` 하지만 `AccidentClueHaYeon == false` | 장소와 물건은 알아도 하연에게 가려던 의미가 비어 있음 | | 정보 부족 | `AccidentClueScore <= 1` | D-Day 낮 한 번으로는 사고 의미 연결이 어려움 | ## 5. 회피 축 | 변수 | 범위 | 의미 | 주요 상승 | | --- | --- | --- | --- | | `Avoidance` | 0~5 | 중요한 선택과 대화를 미룬 누적치 | 답장 미루기, 혼자 확인하기, 애매한 대답, 하연/기존 관계 모두 회피 | 회피 판정: | 상태 | 조건 | 의미 | | --- | --- | --- | | 안정 | `Avoidance <= 2` | 폐장 후 자기 선택을 말할 수 있음 | | 경고 | `Avoidance == 3` | 다른 조건이 충분하면 통과하지만 고백 전 흔들림 대사 추가 | | 위험 | `Avoidance >= 4` | 하연 조건이 충분해도 중요한 말을 미룰 위험. 실패/루프 쪽 선택지가 강해짐 | ## 6. D-1 밤 정산 D-1 밤은 축제 1일차 `쉬어가 카페` 운영이 끝난 뒤 실행한다. ### 6.1 정산 항목 | 정산 항목 | 안정 기준 | D-Day 낮 보정 가능 기준 | 위험 기준 | | --- | --- | --- | --- | | 하연 신뢰 | `HaYeonTrust >= 6` | `HaYeonTrust == 5` | `HaYeonTrust <= 4` | | 하연 동선 이해 | `HaYeonPaceRead >= 3` | `HaYeonPaceRead == 2` | `HaYeonPaceRead <= 1` | | D-2 예감 | `D2PremonitionPassed == true` | 없음 | false면 실패 위험 큼 | | 기존 관계 정리 | 세 `Resolved` true | 미해결 1개 + 압박 `<= 2` | 미해결 2개 이상 또는 압박 3 | | 사고 단서 | `AccidentClueScore >= 3` + `AccidentClueHaYeon` | `Score == 2` + `AccidentClueHaYeon` | `Score <= 1` 또는 하연 단서 없음 | | 회피 | `Avoidance <= 2` | `Avoidance == 3` | `Avoidance >= 4` | ### 6.2 D-1 밤 상태 등급 | 등급 | 조건 | D-Day 낮 처리 | | --- | --- | --- | | `Ready` | 모든 항목 안정 | 낮 선택은 확인/대사 변주. 폐장 후 성공 가능 | | `OneAxisShort` | 보정 가능 항목이 정확히 1개 | 낮 선택으로 해당 축을 보정하면 성공 가능 | | `TwoAxisShort` | 보정 가능 항목 2개 또는 위험 항목 1개 | 낮 선택 하나로 전부 보정 불가. 진엔딩 선택지 잠김 가능 | | `CriticalShort` | D-2 실패, 하연 위험, 미해결 2개 이상, 사고 정보 부족, 회피 위험 중 하나 | 폐장 후 실패/새드/루프 우선 | ### 6.3 D-1 밤 연출 규칙 수치를 UI로 보여주지 않고 아래처럼 표현한다. | 부족 축 | 연출 | | --- | --- | | 하연 신뢰 부족 | 하연의 말이 짧아지고, 재윤 독백이 `묻지 못했다`로 끝남 | | 동선 이해 부족 | 하연이 바라본 방향을 재윤이 놓침 | | 기존 관계 미정리 | 해당 인물의 목소리나 메시지가 밤 정산에 끼어듦 | | 사고 단서 부족 | 소무대 이미지가 장소만 남고 이유가 비어 있음 | | 회피 높음 | 선택지 텍스트가 `내일 생각한다`, `괜찮은 척한다`처럼 미루는 말투로 변함 | ## 7. D-Day 낮 보정 D-Day 낮 선택은 한 번만 가능하다. 선택한 축만 보정하고, 다른 축은 그대로 확정한다. ### 7.1 낮 선택별 보정량 | 낮 선택 | 보정 조건 | 성공 보정 | 한계 | | --- | --- | --- | --- | | 하연과 축제를 둘러본다 | `HaYeonTrust >= 5` 또는 `HaYeonPaceRead >= 2` | `HaYeonTrust +1`, `HaYeonPaceRead +1`, 조건 충족 시 `AccidentClueHaYeon = true` | 기존 관계 미해결은 해결하지 못함 | | 소하와 마지막으로 오래된 길을 걷는다 | `SoHaPressure <= 2` | 올바른 선택 시 `SoHaResolved = true`, `AccidentClueSoHa = true` | 하연 신뢰/동선은 보정하지 못함 | | 서린의 방송 마무리를 돕는다 | `SeoRinControl <= 2` | 올바른 선택 시 `SeoRinResolved = true`, `AccidentClueSeoRin = true` | 자기 선택을 서린에게 맡기면 실패 | | 미루의 도움 인원 마무리를 확인한다 | `MiRuDependence <= 2` | 올바른 선택 시 `MiRuResolved = true`, `AccidentClueMiRu = true` | 대신 책임지면 실패 | | 혼자 야외 소무대 쪽을 본다 | `AccidentClueScore == 2` 이상 권장 | 부족한 물리 단서 1개 보강 가능 | `AccidentClueHaYeon`은 단독 조사로 획득 불가. 회피가 높으면 `Avoidance +1` | ### 7.2 낮 선택 실패 처리 | 실패 상황 | 결과 | | --- | --- | | 하연 선택에서 축제 놀이에만 집중 | 하연 신뢰/동선 보정 없음 | | 소하 선택에서 애매하게 말함 | `SoHaResolved` false 유지, `SoHaPressure` 3으로 상승 가능 | | 서린 선택에서 서린 안을 그대로 따름 | `SeoRinResolved` false 유지, `SeoRinControl` 3으로 상승 가능 | | 미루 선택에서 대신 책임짐 | `MiRuResolved` false 유지, `MiRuDependence` 3으로 상승 가능 | | 혼자 선택으로 단서만 확인하고 공유하지 않음 | 물리 단서는 늘 수 있으나 하연 연결 부족. `Avoidance +1` 가능 | ## 8. 폐장 후 최종 판정 D-Day 폐장 후에는 아래 순서로 판정한다. ### 8.1 진엔딩 필수 조건 ```text HaYeonTrust >= 6 HaYeonPaceRead >= 3 D2PremonitionPassed == true SoHaResolved == true SeoRinResolved == true MiRuResolved == true AccidentClueScore >= 3 AccidentClueHaYeon == true Avoidance <= 3 히든 붕괴 조건 미충족 ``` 이 조건을 모두 만족하면 `[하연에게 말하러 간다]` 또는 이후 실제 스크립트에서 사용할 진엔딩 선택지가 열린다. ### 8.2 분기 우선순위 | 우선순위 | 조건 | 분기 | | --- | --- | --- | | 1 | 히든 붕괴 조건 충족 | 히든 세계 붕괴 엔딩 | | 2 | `D2PremonitionPassed == false` 또는 `HaYeonTrust < 6` 또는 `HaYeonPaceRead < 3` | 하연 실패 루프 | | 3 | `SoHaResolved == false` 그리고 `SoHaPressure == 3` | 소하 새드엔딩 | | 4 | `SeoRinResolved == false` 그리고 `SeoRinControl == 3` | 서린 새드엔딩 | | 5 | `MiRuResolved == false` 그리고 `MiRuDependence == 3` | 미루 새드엔딩 | | 6 | 미해결 관계가 1개 이상 남음 | 기존 관계 미정리 루프 또는 해당 인물 새드엔딩 약화판 | | 7 | `AccidentClueScore < 3` 또는 `AccidentClueHaYeon == false` | 사고 의미 미연결 루프 | | 8 | `Avoidance >= 4` | 회피 루프. 하연에게 가려 하지만 마지막 말을 미룸 | | 9 | 모든 필수 조건 충족 | 진엔딩 | 우선순위 6의 약화판은 실제 구현 단계에서 새드엔딩 컷을 짧게 처리할지, D-25 루프 복귀로 처리할지 결정한다. 현재 스토리 기준에서는 강한 압박값 3이 아니면 완전 새드엔딩보다 루프 복귀에 가깝다. ## 9. 선택지 노출 기준 ### 9.1 폐장 후 선택지 세트 | 상태 | 선택지 노출 | | --- | --- | | 모든 조건 충족 | `[하연에게 말하러 간다]` 노출 | | 하연 조건 부족 | `[소무대 쪽으로 가본다]`만 노출. 이유를 모름 | | 기존 관계 압박 높음 | 해당 도피 선택지가 함께 노출. 예: `[예전처럼 돌아간다]` | | 사고 단서 부족 | `[확인하러 간다]`처럼 조사형 선택지만 노출. 마음 고백 선택지 없음 | | 회피 높음 | `[내일 말한다]`, `[아직은 말하지 않는다]` 같은 미루는 선택지 노출 | ### 9.2 진엔딩 선택지 명칭 후보 실제 스크립트 분할 전 기준 후보: ```text [하연에게 말하러 간다] ``` 조금 더 결말 선택지에 가깝게 쓰는 후보: ```text [이번에는 내가 먼저 간다] ``` 최종 진엔딩 선택지 후보: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` D-Day 실제 스크립트 분할 문서에서는 위 셋 중 장면 톤에 맞는 하나를 고른다. ## 10. 예시 케이스 | 케이스 | 상태 | 낮 선택 | 최종 분기 | | --- | --- | --- | --- | | 안정 진엔딩 | 하연 6/3, 세 관계 정리, 단서 3+하연, 회피 2 | 아무 선택이나 확인 장면 | 진엔딩 가능 | | 하연만 1 부족 | 하연 5/3, 세 관계 정리, 단서 충분 | 하연 선택 성공 | 진엔딩 가능 | | 관계 1개 미정리 | 하연 충분, 소하 미정리+압박2, 단서 충분 | 소하 선택 성공 | 진엔딩 가능 | | 단서 1개 부족 | 하연 충분, 관계 정리, 단서2+하연 | 서린/미루/혼자 중 부족 단서 보정 | 진엔딩 가능 | | D-2 실패 | D2PremonitionPassed false | 하연 선택을 해도 회복 불가 | 하연 실패 루프 | | 하연 단서 없음 | 단서3이지만 AccidentClueHaYeon false | 혼자 조사로 회복 불가 | 사고 의미 미연결 루프 또는 하연 실패 루프 | | 미정리 2개 | 소하/미루 미정리 | 낮 한 번으로 모두 해결 불가 | 진엔딩 잠김, 압박 높은 쪽 우선 | | 회피 높음 | Avoidance 4 | 어떤 선택을 해도 말하기 직전 미룸 | 회피 루프 | ## 11. 실제 구현 메모 - `HaYeonTrust`와 `HaYeonPaceRead`는 정수형으로 관리한다. - `Resolved`와 `AccidentClue*`는 우선 불리언으로 관리한다. - `AccidentClueScore`는 저장 변수보다 평가 시 계산값으로 두는 편이 안전하다. - D-1 밤에는 `DDayReadinessGrade` 같은 임시 평가 결과를 생성할 수 있다. - D-Day 낮 선택 후에는 동일 평가 함수를 한 번 더 돌려 최종 분기만 결정한다. - 실제 UI에는 점수와 등급을 노출하지 않고, 선택지 잠김/문장 변화/회상 컷으로만 표현한다. ## 12. 다음 연결 이 문서 기준은 [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md)에 반영했다. 이후 조건 관련 변경은 먼저 이 문서에서 기준을 조정한 뒤, 13의 Scene 라우팅과 평가 함수 초안에 반영한다. 다음 우선 작업: 1. D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다. 2. D-Day 스크립트 분할을 시스템 문서의 StoryFlow Scene/Branch/Transition 설계와 맞춘다. 3. 크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.", "excerpt": "# D-1/D-Day 조건 수치화 이 문서는 D-1 밤 정산과 D-Day 낮 보정, 폐장 후 최종 분기를 실제 게임 시스템으로 옮기기 위한 조건 기준 v0.1이다. 목표는 `충분하다`, `부족하다`로 적혀 있던 감정 조건을 구현 가능한 점수·불리언·우선순위로 정리하는 것이다. 수치는 최종 밸런스가 아니라 스토리 구조를 흔들지 않기 위한 1차 기준이다. ## 1. 기본 원칙 - 수치는 플레이어"}, {"path": "스토리/13_D-Day_스크립트_분할.md", "category": "스토리", "title": "D-Day 실제 게임 스크립트 분할", "id": "스토리-13d-day스크립트분할-md", "html": "<h2 id=\"스토리-13d-day스크립트분할-md-d-day-실제-게임-스크립트-분할\">D-Day 실제 게임 스크립트 분할<\/h2>\n<p>이 문서는 <a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a>의 대본을 실제 게임 스크립트 제작 단위로 쪼갠 문서다.<\/p>\n<p>점수·플래그 판정 기준은 <a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>를 따른다.<\/p>\n<h3 id=\"스토리-13d-day스크립트분할-md-1-문서-목적\">1. 문서 목적<\/h3>\n<ul>\n<li>D-Day를 StoryFlow Scene 또는 VN 스크립트 단위로 나눈다.<\/li>\n<li>각 장면의 진입 조건, 선택지, 상태 변경, 다음 장면을 명확히 한다.<\/li>\n<li>긴 대본 문서인 <code>10<\/code>을 그대로 구현하지 않고, 제작 가능한 스크립트 블록으로 변환한다.<\/li>\n<li>이 문서는 구현용 초안이며, 실제 엔진 스크립트 문법은 이후 StoryFlow 에셋 구조에 맞춰 조정한다.<\/li>\n<\/ul>\n<p>배경 원화와 AI 이미지 생성 기준은 <a href=\"./14_장소와_배경_묘사.md\">장소와 배경 묘사<\/a>를 따른다. 이 문서의 <code>@bg<\/code> 아래 배경 지시는 실제 제작자가 어떤 변형 배경을 호출해야 하는지 빠르게 확인하기 위한 요약이다.<\/p>\n<h3 id=\"스토리-13d-day스크립트분할-md-2-스크립트-표기-규칙\">2. 스크립트 표기 규칙<\/h3>\n<pre><code># SceneID\n@enter 조건\n@bg 배경\n@music 음악\n@sfx 효과음\n@flag 상태 변경\n@choice 선택지\n@goto 다음 SceneID\n@end 종료<\/code><\/pre>\n<p>표기 의미:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>표기<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code># SceneID<\/code><\/td><td>장면 고유 ID 후보<\/td><\/tr><tr><td><code>@enter<\/code><\/td><td>진입 조건<\/td><\/tr><tr><td><code>@bg<\/code><\/td><td>배경/장소<\/td><\/tr><tr><td><code>@music<\/code><\/td><td>음악 방향<\/td><\/tr><tr><td><code>@sfx<\/code><\/td><td>주요 효과음<\/td><\/tr><tr><td><code>@flag<\/code><\/td><td>플래그/점수 변경<\/td><\/tr><tr><td><code>@choice<\/code><\/td><td>플레이어 선택지<\/td><\/tr><tr><td><code>@goto<\/code><\/td><td>다음 장면 이동<\/td><\/tr><tr><td><code>@end<\/code><\/td><td>엔딩/루프/다음 날짜 연결<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-13d-day스크립트분할-md-3-전체-scene-흐름\">3. 전체 Scene 흐름<\/h3>\n<pre><code>DDAY_00_ENTRY_CAFE\n        ↓\nDDAY_01_DAY_CHOICE_HUB\n        ↓\nDDAY_02A_HAYEON_DAY\nDDAY_02B_SOHA_DAY\nDDAY_02C_SEORIN_DAY\nDDAY_02D_MIRU_DAY\nDDAY_02E_ALONE_STAGE_CHECK\n        ↓\nDDAY_03_PRE_CLOSE_ASSESS\n        ↓\nDDAY_04_ROUTE_GATE\n        ├─ DDAY_05_TRUE_APPROACH\n        ├─ DDAY_06_FAIL_HAYEON_MISSING\n        ├─ DDAY_07_SAD_SOHA_ENTRY\n        ├─ DDAY_08_SAD_SEORIN_ENTRY\n        ├─ DDAY_09_SAD_MIRU_ENTRY\n        ├─ DDAY_10_FAIL_ACCIDENT_UNLINKED\n        └─ DDAY_11_FAIL_AVOIDANCE_LOOP<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-4-공통-진입\">4. 공통 진입<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday00entrycafe\">DDAY_00_ENTRY_CAFE<\/h4>\n<pre><code># DDAY_00_ENTRY_CAFE\n@enter Date == DDay\n@enter D1CafeOperated == true\n@enter D2PremonitionSeen == true\n@enter D3RelationshipAssessmentDone == true\n@bg 2학년 5반 쉬어가 카페 / 축제 마지막 날 오전\n@music festival_day_light_low<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>2학년 5반 쉬어가 카페<\/code>와 <code>폐장 후 교실<\/code> 사이 단계.<\/li>\n<li>책상 임시 카운터, 손글씨 메뉴판, 종이컵, 반쯤 떼어진 종이 장식, 입구 문구 카드가 보인다.<\/li>\n<li>오전이지만 이미 정리의 기운이 섞여야 한다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>축제 2일차의 마지막 낮을 시작한다.<\/li>\n<li><code>쉬어가 카페<\/code>가 이제 정리되는 공간임을 보여준다.<\/li>\n<li>하연이 먼저 폐장 후 약속을 잡지 않는다는 원칙을 유지한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>반 친구: 오후엔 부스 닫고 돌아다녀도 된대!\n반 친구: 컵 남은 거 이쪽에 모아줘.\n재윤: 알겠어.\n하연: 이 문구, 떼지 말까?\n재윤: 왜?\n하연: 아직 들어올 사람 있을 수도 있으니까.\n재윤: 축제 끝나기 전까지?\n하연: 응. 끝나기 전까지.<\/code><\/pre>\n<p>내레이션:<\/p>\n<pre><code>문구 카드는 아직 입구에 붙어 있었다.\n\n잠깐 앉아도 괜찮습니다.\n\n오늘은 그 문장이,\n재윤에게 하는 말처럼 보였다.\n\n쉬어가도 되지만,\n머물러 숨으면 안 되는 날이었다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag DDayCafeClosed = true\n@goto DDAY_01_DAY_CHOICE_HUB<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-5-낮-선택-허브\">5. 낮 선택 허브<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday01daychoicehub\">DDAY_01_DAY_CHOICE_HUB<\/h4>\n<pre><code># DDAY_01_DAY_CHOICE_HUB\n@enter DDayCafeClosed == true\n@bg 학교 축제 운동장 / 낮\n@music festival_day_choice<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>축제 낮<\/code> 기준.<\/li>\n<li>밝은 천막과 학생 소음은 유지하되, 화면 한쪽에 조용한 가장자리 동선이 보여야 한다.<\/li>\n<li>선택 허브이므로 어느 캐릭터 방향으로도 갈 수 있는 열린 구도가 좋다.<\/li>\n<\/ul>\n<p>선택지:<\/p>\n<pre><code>@choice [하연과 축제를 둘러본다] -&gt; DDAY_02A_HAYEON_DAY\n@choice [소하와 마지막으로 오래된 길을 걷는다] -&gt; DDAY_02B_SOHA_DAY\n@choice [서린의 방송 마무리를 돕는다] -&gt; DDAY_02C_SEORIN_DAY\n@choice [미루의 도움 인원 마무리를 확인한다] -&gt; DDAY_02D_MIRU_DAY\n@choice [혼자 야외 소무대 쪽을 본다] -&gt; DDAY_02E_ALONE_STAGE_CHECK<\/code><\/pre>\n<p>주의:<\/p>\n<ul>\n<li>낮 선택은 한 번만 가능하다.<\/li>\n<li>선택한 축만 보정한다.<\/li>\n<li><code>DDayDayChoiceUsed = true<\/code>를 공통으로 설정한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-13d-day스크립트분할-md-6-낮-선택-a-하연\">6. 낮 선택 A: 하연<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday02ahayeonday\">DDAY_02A_HAYEON_DAY<\/h4>\n<pre><code># DDAY_02A_HAYEON_DAY\n@enter DDayDayChoiceUsed != true\n@bg 축제 운동장 가장자리 / 낮\n@music hayeon_day_soft<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>운동장과 축제 중심부<\/code> 중 가장자리 기준.<\/li>\n<li>하연은 축제 중심보다 그늘, 사람 흐름이 느슨한 길, 멀리 보이는 소무대 방향과 맞다.<\/li>\n<li>화면은 밝지만 소리가 조금 낮아지는 느낌으로, 하연의 속도를 읽는 장면임을 보여준다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>하연 신뢰와 동선 이해를 마지막으로 보정한다.<\/li>\n<li>하연이 조용한 곳을 보는 감각을 재윤이 다시 확인한다.<\/li>\n<li>낮에는 고백하지 않는다.<\/li>\n<\/ul>\n<p>핵심 대사:<\/p>\n<pre><code>재윤: 사람 많네.\n하연: 어제보다 더 많은 것 같아.\n재윤: 괜찮아?\n하연: 괜찮아. 오래 있으면 조금 시끄럽긴 한데.\n\n재윤: 저쪽으로 돌까?\n하연: 어디?\n재윤: 사람 덜 몰리는 쪽.\n\n하연: 알아봤네.\n재윤: 조금은.\n하연: 조금이면 됐어.<\/code><\/pre>\n<p>D-2 성공 시 추가:<\/p>\n<pre><code>재윤: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 다르다고 했잖아.\n하연: 기억했네.\n재윤: 응.\n하연: 그럼 됐어.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@if HaYeonTrust &gt;= 5 || HaYeonPaceRead &gt;= 2\n  @flag HaYeonTrust += 1\n  @flag HaYeonPaceRead += 1\n  @flag DDayHayeonDaySuccess = true\n@endif\n\n@if D2PremonitionPassed == true &amp;&amp; DDayHayeonDaySuccess == true\n  @flag AccidentClueHaYeon = true\n@endif\n\n@flag DDayDayChoiceUsed = true\n@flag DDayDayChoice = Hayeon\n@goto DDAY_03_PRE_CLOSE_ASSESS<\/code><\/pre>\n<p>실패/약한 진행:<\/p>\n<pre><code>@if HaYeonTrust &lt;= 4 &amp;&amp; HaYeonPaceRead &lt;= 1\n  @flag DDayHayeonDaySuccess = false\n@endif<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-7-낮-선택-b-소하\">7. 낮 선택 B: 소하<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday02bsohaday\">DDAY_02B_SOHA_DAY<\/h4>\n<pre><code># DDAY_02B_SOHA_DAY\n@enter DDayDayChoiceUsed != true\n@bg 운동장 옆 오래된 길 / 낮\n@music soha_memory_warm<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>소하의 오래된 길<\/code> 기준.<\/li>\n<li>따뜻하고 익숙하지만 앞으로 나아가지 못하는 느낌을 준다.<\/li>\n<li>오래된 담장, 색 바랜 표지, 등굣길을 떠올리게 하는 생활감을 넣고, 지나친 데이트 거리처럼 꾸미지 않는다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>과거 도피를 마지막으로 정리한다.<\/li>\n<li>D-3에서 이미 정리했다면 확인 장면으로 사용한다.<\/li>\n<li>D-3에서 정리하지 못했더라도 압박이 너무 높지 않으면 마지막 보정이 가능하다.<\/li>\n<\/ul>\n<p>D-3 정리 성공 시:<\/p>\n<pre><code>소하: 예전 같으면, 너 이런 날엔 나랑 먼저 돌았어.\n재윤: 알아.\n소하: 그럼 오늘은?\n재윤: 마지막에 가야 할 데가 있어.\n소하: 하연이한테?\n재윤: 응.\n소하: 이제야 제대로 말하네.<\/code><\/pre>\n<p>D-3 미정리 보정 선택:<\/p>\n<pre><code>@choice [예전처럼 편한 쪽으로 돌아간다] -&gt; DDAY_07_SAD_SOHA_ENTRY\n@choice [지금 가야 할 사람을 말한다] -&gt; DDAY_02B_SOHA_RESOLVE<\/code><\/pre>\n<h5 id=\"스토리-13d-day스크립트분할-md-dday02bsoharesolve\">DDAY_02B_SOHA_RESOLVE<\/h5>\n<pre><code>재윤: 편해서 돌아가는 거랑, 좋아해서 가는 건 다르잖아.\n소하: 이제 그런 말도 하네.\n재윤: 늦었지.\n소하: 늦었어. 그래도 지금 말했잖아.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@if SoHaResolved == true\n  @flag DDaySoHaConfirmed = true\n@elseif SoHaPressure &lt;= 2\n  @flag SoHaResolved = true\n  @flag AccidentClueSoHa = true\n  @flag DDaySoHaConfirmed = true\n@else\n  @flag SoHaPressure = 3\n@endif\n\n@flag DDayDayChoiceUsed = true\n@flag DDayDayChoice = SoHa\n@goto DDAY_03_PRE_CLOSE_ASSESS<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-8-낮-선택-c-서린\">8. 낮 선택 C: 서린<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday02cseorinday\">DDAY_02C_SEORIN_DAY<\/h4>\n<pre><code># DDAY_02C_SEORIN_DAY\n@enter DDayDayChoiceUsed != true\n@bg 방송실 / 낮\n@music seorin_order_cold<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>방송실과 학생회 업무 공간<\/code> 기준.<\/li>\n<li>믹서, 마이크, 헤드폰, 폐장 큐시트, 라벨링된 케이블, D-9 상담 기준 메모가 보여야 한다.<\/li>\n<li>차가운 통제실이 아니라, 서린이 실제 업무를 정리해 둔 좁고 바쁜 공간이다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>정답과 순서 뒤에 숨는 길을 마지막으로 정리한다.<\/li>\n<li>폐장 방송과 소무대 위험 단서를 보강할 수 있다.<\/li>\n<\/ul>\n<p>D-3 정리 성공 시:<\/p>\n<pre><code>서린: 폐장 방송은 이 순서면 돼.\n재윤: 제가 확인 안 해도 괜찮아요?\n서린: 네가 오늘 확인해야 할 건 이게 아니잖아.\n재윤: 그래도 틀리면요?\n서린: 틀리면 내가 고친다.\n서린: 너는 네가 말해야 할 걸 말해.<\/code><\/pre>\n<p>D-3 미정리 보정 선택:<\/p>\n<pre><code>@choice [서린이 정한 순서를 따른다] -&gt; DDAY_08_SAD_SEORIN_ENTRY\n@choice [내가 확인해야 할 것을 고른다] -&gt; DDAY_02C_SEORIN_RESOLVE<\/code><\/pre>\n<h5 id=\"스토리-13d-day스크립트분할-md-dday02cseorinresolve\">DDAY_02C_SEORIN_RESOLVE<\/h5>\n<pre><code>재윤: 틀리지 않는 쪽만 고르면, 제가 고른 게 아니잖아요.\n서린: 이제야 그걸 말하네요.\n재윤: D-9에 선배가 말했잖아요. 맞는 답이 아니라, 제가 고른 이유를 보라고.\n서린: 기억하고 있었네.\n재윤: 오늘은 제가 확인해야 할 게 따로 있어요.\n서린: 그럼 가요. 방송은 내가 할 테니까.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@if SeoRinResolved == true\n  @flag DDaySeoRinConfirmed = true\n  @flag AccidentClueSeoRin = true\n@elseif SeoRinControl &lt;= 2\n  @flag SeoRinResolved = true\n  @flag AccidentClueSeoRin = true\n  @flag DDaySeoRinConfirmed = true\n@else\n  @flag SeoRinControl = 3\n@endif\n\n@flag DDayDayChoiceUsed = true\n@flag DDayDayChoice = SeoRin\n@goto DDAY_03_PRE_CLOSE_ASSESS<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-9-낮-선택-d-미루\">9. 낮 선택 D: 미루<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday02dmiruday\">DDAY_02D_MIRU_DAY<\/h4>\n<pre><code># DDAY_02D_MIRU_DAY\n@enter DDayDayChoiceUsed != true\n@bg 축제 도움 인원 대기 장소 / 낮\n@music miru_soft_anxious<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>미루의 축제 도움 인원 대기 장소<\/code> 기준.<\/li>\n<li>복도 옆 임시 책상, 체크리스트, 명찰, 여분 안내 표지, 테이프와 끈, 분실물 박스를 배치한다.<\/li>\n<li>미루가 갇힌 느낌보다, 혼자 해보려고 나갈 수 있는 문과 복도 동선이 보여야 한다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>미루의 의존을 대신 책임지지 않고, 미루가 자기 일을 끝낼 수 있게 한다.<\/li>\n<li>출입 제한 표지와 고정끈 단서를 보강할 수 있다.<\/li>\n<\/ul>\n<p>D-3 정리 성공 시:<\/p>\n<pre><code>미루: 저, 표지 확인하고 보고까지 했어요.\n재윤: 잘했네.\n미루: 그래도 마지막에 선배가 한 번 봐주시면—\n재윤: 네가 먼저 본 게 맞아.\n재윤: 내가 다시 정해주지 않아도 돼.\n미루: 그럼 저, 혼자 한 거 맞죠?\n재윤: 응. 네가 한 거야.<\/code><\/pre>\n<p>D-3 미정리 보정 선택:<\/p>\n<pre><code>@choice [마지막까지 대신 봐준다] -&gt; DDAY_09_SAD_MIRU_ENTRY\n@choice [먼저 끝낸 일을 인정한다] -&gt; DDAY_02D_MIRU_RESOLVE<\/code><\/pre>\n<h5 id=\"스토리-13d-day스크립트분할-md-dday02dmiruresolve\">DDAY_02D_MIRU_RESOLVE<\/h5>\n<pre><code>재윤: 내가 확인해줘서 맞는 게 아니야.\n재윤: 네가 확인했고, 네가 보고했으니까 맞는 거야.\n미루: 그래도 불안하면요?\n재윤: 불안해도 네가 한 일이 사라지진 않아.\n미루: 그럼... 저 혼자 끝낸 거네요.\n재윤: 응.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@if MiRuResolved == true\n  @flag DDayMiRuConfirmed = true\n  @flag AccidentClueMiRu = true\n@elseif MiRuDependence &lt;= 2\n  @flag MiRuResolved = true\n  @flag AccidentClueMiRu = true\n  @flag DDayMiRuConfirmed = true\n@else\n  @flag MiRuDependence = 3\n@endif\n\n@flag DDayDayChoiceUsed = true\n@flag DDayDayChoice = MiRu\n@goto DDAY_03_PRE_CLOSE_ASSESS<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-10-낮-선택-e-혼자-소무대-확인\">10. 낮 선택 E: 혼자 소무대 확인<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday02ealonestagecheck\">DDAY_02E_ALONE_STAGE_CHECK<\/h4>\n<pre><code># DDAY_02E_ALONE_STAGE_CHECK\n@enter DDayDayChoiceUsed != true\n@bg 학교 뒤편 야외 소무대 / 낮\n@music stage_empty_day<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>낮의 소무대<\/code> 기준.<\/li>\n<li>낮은 단차, 검은 전선, 임시 조명 프레임, 기울어진 출입 제한 표지가 보이지만 아직 노골적인 사고 장소처럼 보이면 안 된다.<\/li>\n<li>하연 조건이 부족하면 물리 단서만 선명하고, 하연 조건이 충분하면 D-2 창밖 시선과 연결된다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>물리적 사고 단서를 보강한다.<\/li>\n<li>하지만 하연과 공유하지 않으면 감정 연결은 회복되지 않는다.<\/li>\n<li>회피가 높은 상태에서는 오히려 회피가 더 오른다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>소무대는 낮에도 조용했다.\n\n표지는 제대로 붙어 있었고,\n끈은 풀리지 않았고,\n프레임은 아직 제자리에 있었다.\n\n전부 확인했는데도,\n재윤은 여전히 누구에게 가려 했는지 알 수 없었다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@if AccidentClueScore &gt;= 2\n  @flag MissingPhysicalAccidentClueOne = true\n@endif\n\n@if AccidentClueSeoRin == false\n  @flag AccidentClueSeoRin = true\n@elseif AccidentClueMiRu == false\n  @flag AccidentClueMiRu = true\n@endif\n\n@if AccidentClueHaYeon == false\n  @flag DDayAloneCheckNoHeartLink = true\n@endif\n\n@if Avoidance &gt;= 3\n  @flag Avoidance += 1\n@endif\n\n@flag DDayDayChoiceUsed = true\n@flag DDayDayChoice = AloneStage\n@goto DDAY_03_PRE_CLOSE_ASSESS<\/code><\/pre>\n<p>주의:<\/p>\n<ul>\n<li><code>AccidentClueHaYeon<\/code>은 혼자 조사로 획득하지 않는다.<\/li>\n<li>이 선택은 사고를 이해하는 데 도움이 되지만, 하연에게 말하러 가는 감정 조건을 대신하지 않는다.<\/li>\n<\/ul>\n<h3 id=\"스토리-13d-day스크립트분할-md-11-폐장-전-상태-평가\">11. 폐장 전 상태 평가<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday03precloseassess\">DDAY_03_PRE_CLOSE_ASSESS<\/h4>\n<pre><code># DDAY_03_PRE_CLOSE_ASSESS\n@enter DDayDayChoiceUsed == true\n@bg 축제 폐장 직전 / 운동장과 교실 사이\n@music festival_close_fade\n@sfx distant_school_broadcast<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>축제 폐장 직전<\/code>과 <code>폐장 후 교실<\/code> 사이 전환 배경.<\/li>\n<li>운동장 불빛, 접히는 천막, 교실 안에 쌓인 의자, 떼어진 카페 문구 카드가 함께 보여야 한다.<\/li>\n<li>밝은 중심과 어두워지는 학교 뒤편의 대비를 만든다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>낮 선택 이후 상태를 다시 평가한다.<\/li>\n<li>플레이어에게 수치가 아니라 연출로 부족 축을 보여준다.<\/li>\n<li>하연이 조용히 사라지는 순간을 배치한다.<\/li>\n<\/ul>\n<p>공통 스크립트:<\/p>\n<pre><code>축제 마지막 안내 방송이 곧 시작된다고 했다.\n운동장 쪽 불빛은 아직 밝았지만,\n교실 안에는 이미 정리된 의자들이 쌓여 있었다.\n\n재윤은 하연을 찾았다.\n\n조금 전까지 있던 자리에,\n하연은 없었다.<\/code><\/pre>\n<p>상태 평가:<\/p>\n<pre><code>@eval DDayFinalBranch = EvaluateDDayFinalBranch()\n@goto DDAY_04_ROUTE_GATE<\/code><\/pre>\n<p>연출 분기 힌트:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>부족 축<\/th><th>삽입 연출<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰/동선 부족<\/td><td>하연이 사라졌다는 사실을 늦게 알아차림<\/td><\/tr><tr><td>소하 미정리<\/td><td>소하의 메시지가 화면 위에 남음<\/td><\/tr><tr><td>서린 미정리<\/td><td>폐장 방송 순서표가 선택지처럼 보임<\/td><\/tr><tr><td>미루 미정리<\/td><td>미루의 체크리스트 알림이 계속 울림<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>소무대 이미지는 보이지만 문장이 끊김<\/td><\/tr><tr><td>회피 높음<\/td><td><code>내일 말해도 되지 않을까<\/code> 독백이 끼어듦<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-13d-day스크립트분할-md-12-최종-라우팅\">12. 최종 라우팅<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday04routegate\">DDAY_04_ROUTE_GATE<\/h4>\n<pre><code># DDAY_04_ROUTE_GATE\n@enter DDayFinalBranch != None<\/code><\/pre>\n<p>라우팅:<\/p>\n<pre><code>@if DDayFinalBranch == TrueEnding\n  @goto DDAY_05_TRUE_APPROACH\n@elseif DDayFinalBranch == HayeonMissingLoop\n  @goto DDAY_06_FAIL_HAYEON_MISSING\n@elseif DDayFinalBranch == SoHaSad\n  @goto DDAY_07_SAD_SOHA_ENTRY\n@elseif DDayFinalBranch == SeoRinSad\n  @goto DDAY_08_SAD_SEORIN_ENTRY\n@elseif DDayFinalBranch == MiRuSad\n  @goto DDAY_09_SAD_MIRU_ENTRY\n@elseif DDayFinalBranch == AccidentUnlinkedLoop\n  @goto DDAY_10_FAIL_ACCIDENT_UNLINKED\n@elseif DDayFinalBranch == AvoidanceLoop\n  @goto DDAY_11_FAIL_AVOIDANCE_LOOP\n@else\n  @goto DDAY_06_FAIL_HAYEON_MISSING\n@endif<\/code><\/pre>\n<p>분기 평가는 <code>12_D-1_D-Day_조건_수치화.md<\/code>의 우선순위를 따른다.<\/p>\n<h3 id=\"스토리-13d-day스크립트분할-md-13-진엔딩-성공-스크립트\">13. 진엔딩 성공 스크립트<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday05trueapproach\">DDAY_05_TRUE_APPROACH<\/h4>\n<pre><code># DDAY_05_TRUE_APPROACH\n@enter DDayFinalBranch == TrueEnding\n@bg 학교 뒤편 야외 소무대 / 폐장 후\n@music true_end_confession_start\n@sfx distant_festival_shutdown<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>D-Day 폐장 후 소무대<\/code> 진엔딩 구도.<\/li>\n<li>하연은 무대 위 중앙이 아니라 낮은 계단 근처나 무대 옆에 서 있다.<\/li>\n<li>전선, 단차, 조명 프레임, 출입 제한 표지는 보이되, 사고를 낭만화하지 않는다.<\/li>\n<li>두 사람은 화려한 조명이 아니라 축제가 끝난 뒤 남은 조용한 빛 아래에 있어야 한다.<\/li>\n<\/ul>\n<p>도착:<\/p>\n<pre><code>하연: 어떻게 알았어?\n재윤: 네가 있을 것 같았어.\n\n하연은 소무대 쪽을 바라보다가,\n재윤 쪽으로 시선을 돌렸다.\n\n하연: 내가 부른 것도 아닌데.\n재윤: 그래서 온 거야.\n재윤: 이번엔 내가 먼저 와야 할 것 같아서.\n\n하연: 지금은 알아?\n재윤: 응. 누구한테 말하러 왔는지 알아.<\/code><\/pre>\n<p>고백 전 회상 변주:<\/p>\n<pre><code>@if SoHaResolved == true\n  @insert &quot;예전으로 돌아가 숨고 싶었던 마음을 지나서 왔어.&quot;\n@endif\n@if SeoRinResolved == true\n  @insert &quot;맞는 답이 아니라, 내가 고른 답이라고 말하려고 왔어.&quot;\n@endif\n@if MiRuResolved == true\n  @insert &quot;누군가에게 필요한 사람인 척하면서 내 마음을 미루지 않으려고 왔어.&quot;\n@endif\n@if D2PremonitionPassed == true\n  @insert &quot;네가 조용한 데서 숨을 고르는 사람이라는 걸, 이제는 조금 알아.&quot;\n@endif<\/code><\/pre>\n<p>재윤 선고백:<\/p>\n<pre><code>재윤: 오래된 쪽으로 돌아가면 편했어.\n재윤: 맞는 답을 찾는 척하면 덜 무서웠고.\n재윤: 누가 나를 필요로 하면,\n재윤: 내가 뭘 원하는지 안 봐도 됐어.\n\n재윤: 그런데 그러면,\n재윤: 나는 계속 아무 데도 못 가.\n\n재윤: 이번에는 너한테 가고 싶었어.\n재윤: 누가 시켜서도 아니고,\n재윤: 네가 먼저 말해줘서도 아니고.\n\n재윤: 내가 고른 거라고 말하고 싶어서.\n재윤: 하연아, 나는 너를 좋아해.<\/code><\/pre>\n<p>하연 마음 확인:<\/p>\n<pre><code>하연: 나도 말하려고 했어.\n재윤: 오늘?\n하연: 응. 끝나고, 조금 조용해지면.\n\n재윤: 왜 말 안 했어?\n하연: 네가 올 수 있으면... 좋겠다고 생각했어.\n재윤: 내가?\n하연: 응.\n\n하연: 네가 나를 기다려준 적이 있었잖아.\n하연: 억지로 끌고 오지 않고,\n하연: 들어와도 된다고 말해준 적.\n\n하연: 그래서 나도 기다렸어.\n하연: 네가 돌아보는 걸.\n하연: 네가 네 발로 오는 걸.\n\n재윤: 많이 늦었지.\n하연: 늦었어.\n재윤: 미안.\n하연: 그 말보다...\n재윤: 응.\n하연: 와줘서 다행이야.\n\n하연: 나도... 좋아해.<\/code><\/pre>\n<p>사고 기억 회복:<\/p>\n<pre><code>폐장 안내 방송의 끝부분이 다시 들렸다.\n\n조명 프레임.\n출입 제한 표지.\n풀리지 않은 고정끈.\n낮게 남은 소무대의 단차.\n\n전부 같은 자리에 있었다.\n\n사고는 사라지지 않았다.\n아픈 기억도 사라지지 않았다.\n\n다만 이번에는,\n재윤이 어디로 가려 했는지 알았다.\n\n하연에게.\n말하기 위해서.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag HayeonMutualHeartConfirmed = true\n@flag HayeonMissingFromAccidentMemory = false\n@flag DDayTrueEndingReached = true\n@flag SundayWakeUpAfterDDay = true\n@end TrueEndingWakeUpSunday<\/code><\/pre>\n<p>다음 연결:<\/p>\n<ul>\n<li>D+2 일요일 병실 기상 컷신<\/li>\n<li>D+3 월요일 방학식 컷신<\/li>\n<li>진엔딩 크레딧<\/li>\n<\/ul>\n<h3 id=\"스토리-13d-day스크립트분할-md-14-하연-실패-루프-스크립트\">14. 하연 실패 루프 스크립트<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday06failhayeonmissing\">DDAY_06_FAIL_HAYEON_MISSING<\/h4>\n<pre><code># DDAY_06_FAIL_HAYEON_MISSING\n@enter DDayFinalBranch == HayeonMissingLoop\n@bg 학교 뒤편 야외 소무대 / 폐장 후\n@music loop_fail_empty\n@sfx distant_metal_creak<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>D-Day 폐장 후 소무대<\/code> 실패 구도.<\/li>\n<li>진엔딩과 같은 장소지만 하연이 없다.<\/li>\n<li>전선, 단차, 표지, 조명 프레임만 선명하고, 재윤이 왜 왔는지 설명하는 감정 단서는 비어 있어야 한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>축제 마지막 안내 방송이 끝났다.\n운동장 쪽 불빛이 하나씩 꺼졌다.\n\n재윤은 학교 뒤편 야외 소무대 앞에 서 있었다.\n\n왜 여기까지 왔는지,\n기억나지 않았다.\n\n누가 불렀는지도,\n누구에게 가려 했는지도,\n떠오르지 않았다.<\/code><\/pre>\n<p>반복:<\/p>\n<pre><code>표지는 제대로 붙어 있었다.\n끈은 묶여 있었다.\n프레임은 제자리에 있었다.\n\n그러니까 이상했다.\n\n전부 제자리에 있는데,\n재윤만 왜 여기 서 있는지 알 수 없었다.\n\n폐장 안내 방송의 끝부분이\n멀리서 다시 울리는 것 같았다.\n\n발밑이 비었다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag HayeonMissingFromAccidentMemory = true\n@flag DDayTrueEndingReached = false\n@flag LoopCount += 1\n@flag ReturnDate = D25\n@end LoopToD25<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-15-소하-새드엔딩-진입-스크립트\">15. 소하 새드엔딩 진입 스크립트<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday07sadsohaentry\">DDAY_07_SAD_SOHA_ENTRY<\/h4>\n<pre><code># DDAY_07_SAD_SOHA_ENTRY\n@enter DDayFinalBranch == SoHaSad || SoHaPressure == 3\n@bg 오래된 등굣길처럼 보이는 축제장 가장자리\n@music sad_soha_warm_loop<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>소하의 오래된 길<\/code>을 축제장 가장자리와 겹쳐 보이게 한다.<\/li>\n<li>따뜻한 색감은 유지하되, 같은 길을 반복하는 정체감이 있어야 한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>소하: 그냥 가자.\n재윤: 어디로?\n소하: 늘 가던 데.\n소하: 축제 같은 거 끝나도, 우린 별로 달라질 거 없잖아.\n\n재윤은 대답하지 못했다.\n\n운동장의 불빛은 아직 밝았지만,\n길 끝은 이상하게 월요일 아침처럼 환했다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag EndingSoHaSadSeen = true\n@flag SoHaSadCount += 1\n@flag LoopCount += 1\n@end SadEndingSoHaOrLoop<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-16-서린-새드엔딩-진입-스크립트\">16. 서린 새드엔딩 진입 스크립트<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday08sadseorinentry\">DDAY_08_SAD_SEORIN_ENTRY<\/h4>\n<pre><code># DDAY_08_SAD_SEORIN_ENTRY\n@enter DDayFinalBranch == SeoRinSad || SeoRinControl == 3\n@bg 방송실 / 폐장 직전\n@music sad_seorin_ordered<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>방송실<\/code>을 폐장 직전 버전으로 사용한다.<\/li>\n<li>큐시트와 장비는 정돈되어 있지만, 창밖 축제 소리가 멀어지고 선택지가 닫히는 느낌을 준다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>서린: 이 순서면 안전해.\n재윤: 안전한 쪽이요?\n서린: 네. 틀리지 않는 쪽.\n\n모니터에는 폐장 안내 문구가 떠 있었다.\n그러나 문장 아래의 선택지는 하나뿐이었다.\n\n[정해진 순서를 따른다]<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag EndingSeoRinSadSeen = true\n@flag SeoRinSadCount += 1\n@flag LoopCount += 1\n@end SadEndingSeoRinOrLoop<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-17-미루-새드엔딩-진입-스크립트\">17. 미루 새드엔딩 진입 스크립트<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday09sadmiruentry\">DDAY_09_SAD_MIRU_ENTRY<\/h4>\n<pre><code># DDAY_09_SAD_MIRU_ENTRY\n@enter DDayFinalBranch == MiRuSad || MiRuDependence == 3\n@bg 축제 도움 인원 대기실 / 문이 닫힌 복도\n@music sad_miru_musicbox<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>미루의 축제 도움 인원 대기 장소<\/code> 실패 변형.<\/li>\n<li>평소에는 열려 있던 복도 동선이 문과 그림자 때문에 좁아 보인다.<\/li>\n<li>그래도 공포 공간이 아니라, 도움을 기다리며 멈춘 공간으로 보여야 한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>미루: 선배, 마지막으로 한 번만 더 봐주시면 안 돼요?\n재윤: 마지막?\n미루: 네. 방학식 지나면 끝나잖아요.\n미루: 그러니까 오늘만요.\n\n문밖에는 여름빛이 있었다.\n그러나 재윤은 문손잡이를 잡지 못했다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag EndingMiRuSadSeen = true\n@flag MiRuSadCount += 1\n@flag LoopCount += 1\n@end SadEndingMiRuOrLoop<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-18-사고-의미-미연결-루프\">18. 사고 의미 미연결 루프<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday10failaccidentunlinked\">DDAY_10_FAIL_ACCIDENT_UNLINKED<\/h4>\n<pre><code># DDAY_10_FAIL_ACCIDENT_UNLINKED\n@enter DDayFinalBranch == AccidentUnlinkedLoop\n@bg 야외 소무대 / 폐장 후\n@music loop_accident_unlinked<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 실패 소무대 구도.<\/li>\n<li>장소와 사고 단서는 충분히 보이지만, 하연에게 가려던 의미만 빠진 상태다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>장소와 단서는 충분히 보이지만 <code>누구에게 가려 했는지<\/code>가 비어 있는 실패다.<\/li>\n<li>하연 조건이 완전히 부족한 실패와 달리, 물리 단서가 오히려 빈자리를 강조한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>조명 프레임.\n출입 제한 표지.\n묶여 있는 고정끈.\n폐장 안내 방송의 끝부분.\n\n재윤은 그것들을 모두 보았다.\n\n전부 여기 있었다.\n전부 맞았다.\n\n그런데 왜 여기 왔는지만,\n끝내 떠오르지 않았다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag AccidentMeaningUnlinked = true\n@flag LoopCount += 1\n@flag ReturnDate = D25\n@end LoopToD25<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-19-회피-루프\">19. 회피 루프<\/h3>\n<h4 id=\"스토리-13d-day스크립트분할-md-dday11failavoidanceloop\">DDAY_11_FAIL_AVOIDANCE_LOOP<\/h4>\n<pre><code># DDAY_11_FAIL_AVOIDANCE_LOOP\n@enter DDayFinalBranch == AvoidanceLoop\n@bg 축제 폐장 후 복도\n@music loop_avoidance_quiet<\/code><\/pre>\n<p>배경 지시:<\/p>\n<ul>\n<li><code>14<\/code>의 <code>루프/실패 복도<\/code> 기준.<\/li>\n<li>평범한 학교 복도지만 사람이 빠져 있고, 형광등과 발소리가 과하게 또렷하다.<\/li>\n<li>공포물처럼 만들지 말고 의미가 빠진 현실처럼 보이게 한다.<\/li>\n<\/ul>\n<p>목적:<\/p>\n<ul>\n<li>조건은 거의 맞지만 재윤이 마지막 말을 또 미루는 실패다.<\/li>\n<li>하연에게 갈 수 있는 길을 알지만, 직접 말하지 못한다.<\/li>\n<\/ul>\n<p>스크립트:<\/p>\n<pre><code>재윤은 하연이 어디 있을지 알 것 같았다.\n\n조용한 곳.\n사람들이 다 빠져나간 뒤에도,\n잠깐 숨을 고를 수 있는 자리.\n\n알고 있었다.\n\n그런데 발이 움직이지 않았다.\n\n내일 말해도 되지 않을까.\n그런 생각이 든 순간,\n복도의 불이 하나씩 꺼졌다.<\/code><\/pre>\n<p>상태 처리:<\/p>\n<pre><code>@flag AvoidanceLoopSeen = true\n@flag LoopCount += 1\n@flag ReturnDate = D25\n@end LoopToD25<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-20-평가-함수-초안\">20. 평가 함수 초안<\/h3>\n<p>실제 구현 시 사용할 평가 함수 의사코드다.<\/p>\n<pre><code>function EvaluateDDayFinalBranch():\n    if HiddenCollapseCondition == true:\n        return HiddenCollapse\n\n    if D2PremonitionPassed == false:\n        return HayeonMissingLoop\n\n    if HaYeonTrust &lt; 6 or HaYeonPaceRead &lt; 3:\n        return HayeonMissingLoop\n\n    if SoHaResolved == false and SoHaPressure == 3:\n        return SoHaSad\n\n    if SeoRinResolved == false and SeoRinControl == 3:\n        return SeoRinSad\n\n    if MiRuResolved == false and MiRuDependence == 3:\n        return MiRuSad\n\n    if SoHaResolved == false or SeoRinResolved == false or MiRuResolved == false:\n        return RelationshipUnresolvedLoop\n\n    if AccidentClueScore &lt; 3 or AccidentClueHaYeon == false:\n        return AccidentUnlinkedLoop\n\n    if Avoidance &gt;= 4:\n        return AvoidanceLoop\n\n    return TrueEnding<\/code><\/pre>\n<h3 id=\"스토리-13d-day스크립트분할-md-21-실제-제작-시-분리-권장-에셋\">21. 실제 제작 시 분리 권장 에셋<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>에셋 후보<\/th><th>포함 Scene<\/th><\/tr><\/thead><tbody><tr><td><code>SF_DDay_Common<\/code><\/td><td><code>DDAY_00_ENTRY_CAFE<\/code>, <code>DDAY_01_DAY_CHOICE_HUB<\/code>, <code>DDAY_03_PRE_CLOSE_ASSESS<\/code>, <code>DDAY_04_ROUTE_GATE<\/code><\/td><\/tr><tr><td><code>SF_DDay_DayChoice_Hayeon<\/code><\/td><td><code>DDAY_02A_HAYEON_DAY<\/code><\/td><\/tr><tr><td><code>SF_DDay_DayChoice_Soha<\/code><\/td><td><code>DDAY_02B_SOHA_DAY<\/code>, <code>DDAY_02B_SOHA_RESOLVE<\/code><\/td><\/tr><tr><td><code>SF_DDay_DayChoice_Seorin<\/code><\/td><td><code>DDAY_02C_SEORIN_DAY<\/code>, <code>DDAY_02C_SEORIN_RESOLVE<\/code><\/td><\/tr><tr><td><code>SF_DDay_DayChoice_Miru<\/code><\/td><td><code>DDAY_02D_MIRU_DAY<\/code>, <code>DDAY_02D_MIRU_RESOLVE<\/code><\/td><\/tr><tr><td><code>SF_DDay_DayChoice_Alone<\/code><\/td><td><code>DDAY_02E_ALONE_STAGE_CHECK<\/code><\/td><\/tr><tr><td><code>SF_DDay_TrueEnding<\/code><\/td><td><code>DDAY_05_TRUE_APPROACH<\/code><\/td><\/tr><tr><td><code>SF_DDay_FailLoops<\/code><\/td><td><code>DDAY_06_FAIL_HAYEON_MISSING<\/code>, <code>DDAY_10_FAIL_ACCIDENT_UNLINKED<\/code>, <code>DDAY_11_FAIL_AVOIDANCE_LOOP<\/code><\/td><\/tr><tr><td><code>SF_DDay_SadEntries<\/code><\/td><td><code>DDAY_07_SAD_SOHA_ENTRY<\/code>, <code>DDAY_08_SAD_SEORIN_ENTRY<\/code>, <code>DDAY_09_SAD_MIRU_ENTRY<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-13d-day스크립트분할-md-22-다음-연결\">22. 다음 연결<\/h3>\n<p>이 문서 이후 우선 작업은 두 갈래다.<\/p>\n<ol>\n<li>진엔딩 이후 <a href=\"./05_엔딩과_루프.md\">엔딩과 루프<\/a>의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다.<\/li>\n<li>이 스크립트 분할을 시스템 문서의 StoryFlow Scene/Branch/Transition 설계와 맞춘다.<\/li>\n<\/ol>\n<p>현재 기준에서는 D+2/D+3 컷신 분리가 더 먼저다. 그래야 <code>DDAY_05_TRUE_APPROACH<\/code> 이후의 연결이 완성된다.<\/p>", "headings": [{"level": 1, "text": "D-Day 실제 게임 스크립트 분할", "id": "스토리-13d-day스크립트분할-md-d-day-실제-게임-스크립트-분할"}, {"level": 2, "text": "1. 문서 목적", "id": "스토리-13d-day스크립트분할-md-1-문서-목적"}, {"level": 2, "text": "2. 스크립트 표기 규칙", "id": "스토리-13d-day스크립트분할-md-2-스크립트-표기-규칙"}, {"level": 2, "text": "3. 전체 Scene 흐름", "id": "스토리-13d-day스크립트분할-md-3-전체-scene-흐름"}, {"level": 2, "text": "4. 공통 진입", "id": "스토리-13d-day스크립트분할-md-4-공통-진입"}, {"level": 3, "text": "DDAY_00_ENTRY_CAFE", "id": "스토리-13d-day스크립트분할-md-dday00entrycafe"}, {"level": 2, "text": "5. 낮 선택 허브", "id": "스토리-13d-day스크립트분할-md-5-낮-선택-허브"}, {"level": 3, "text": "DDAY_01_DAY_CHOICE_HUB", "id": "스토리-13d-day스크립트분할-md-dday01daychoicehub"}, {"level": 2, "text": "6. 낮 선택 A: 하연", "id": "스토리-13d-day스크립트분할-md-6-낮-선택-a-하연"}, {"level": 3, "text": "DDAY_02A_HAYEON_DAY", "id": "스토리-13d-day스크립트분할-md-dday02ahayeonday"}, {"level": 2, "text": "7. 낮 선택 B: 소하", "id": "스토리-13d-day스크립트분할-md-7-낮-선택-b-소하"}, {"level": 3, "text": "DDAY_02B_SOHA_DAY", "id": "스토리-13d-day스크립트분할-md-dday02bsohaday"}, {"level": 4, "text": "DDAY_02B_SOHA_RESOLVE", "id": "스토리-13d-day스크립트분할-md-dday02bsoharesolve"}, {"level": 2, "text": "8. 낮 선택 C: 서린", "id": "스토리-13d-day스크립트분할-md-8-낮-선택-c-서린"}, {"level": 3, "text": "DDAY_02C_SEORIN_DAY", "id": "스토리-13d-day스크립트분할-md-dday02cseorinday"}, {"level": 4, "text": "DDAY_02C_SEORIN_RESOLVE", "id": "스토리-13d-day스크립트분할-md-dday02cseorinresolve"}, {"level": 2, "text": "9. 낮 선택 D: 미루", "id": "스토리-13d-day스크립트분할-md-9-낮-선택-d-미루"}, {"level": 3, "text": "DDAY_02D_MIRU_DAY", "id": "스토리-13d-day스크립트분할-md-dday02dmiruday"}, {"level": 4, "text": "DDAY_02D_MIRU_RESOLVE", "id": "스토리-13d-day스크립트분할-md-dday02dmiruresolve"}, {"level": 2, "text": "10. 낮 선택 E: 혼자 소무대 확인", "id": "스토리-13d-day스크립트분할-md-10-낮-선택-e-혼자-소무대-확인"}, {"level": 3, "text": "DDAY_02E_ALONE_STAGE_CHECK", "id": "스토리-13d-day스크립트분할-md-dday02ealonestagecheck"}, {"level": 2, "text": "11. 폐장 전 상태 평가", "id": "스토리-13d-day스크립트분할-md-11-폐장-전-상태-평가"}, {"level": 3, "text": "DDAY_03_PRE_CLOSE_ASSESS", "id": "스토리-13d-day스크립트분할-md-dday03precloseassess"}, {"level": 2, "text": "12. 최종 라우팅", "id": "스토리-13d-day스크립트분할-md-12-최종-라우팅"}, {"level": 3, "text": "DDAY_04_ROUTE_GATE", "id": "스토리-13d-day스크립트분할-md-dday04routegate"}, {"level": 2, "text": "13. 진엔딩 성공 스크립트", "id": "스토리-13d-day스크립트분할-md-13-진엔딩-성공-스크립트"}, {"level": 3, "text": "DDAY_05_TRUE_APPROACH", "id": "스토리-13d-day스크립트분할-md-dday05trueapproach"}, {"level": 2, "text": "14. 하연 실패 루프 스크립트", "id": "스토리-13d-day스크립트분할-md-14-하연-실패-루프-스크립트"}, {"level": 3, "text": "DDAY_06_FAIL_HAYEON_MISSING", "id": "스토리-13d-day스크립트분할-md-dday06failhayeonmissing"}, {"level": 2, "text": "15. 소하 새드엔딩 진입 스크립트", "id": "스토리-13d-day스크립트분할-md-15-소하-새드엔딩-진입-스크립트"}, {"level": 3, "text": "DDAY_07_SAD_SOHA_ENTRY", "id": "스토리-13d-day스크립트분할-md-dday07sadsohaentry"}, {"level": 2, "text": "16. 서린 새드엔딩 진입 스크립트", "id": "스토리-13d-day스크립트분할-md-16-서린-새드엔딩-진입-스크립트"}, {"level": 3, "text": "DDAY_08_SAD_SEORIN_ENTRY", "id": "스토리-13d-day스크립트분할-md-dday08sadseorinentry"}, {"level": 2, "text": "17. 미루 새드엔딩 진입 스크립트", "id": "스토리-13d-day스크립트분할-md-17-미루-새드엔딩-진입-스크립트"}, {"level": 3, "text": "DDAY_09_SAD_MIRU_ENTRY", "id": "스토리-13d-day스크립트분할-md-dday09sadmiruentry"}, {"level": 2, "text": "18. 사고 의미 미연결 루프", "id": "스토리-13d-day스크립트분할-md-18-사고-의미-미연결-루프"}, {"level": 3, "text": "DDAY_10_FAIL_ACCIDENT_UNLINKED", "id": "스토리-13d-day스크립트분할-md-dday10failaccidentunlinked"}, {"level": 2, "text": "19. 회피 루프", "id": "스토리-13d-day스크립트분할-md-19-회피-루프"}, {"level": 3, "text": "DDAY_11_FAIL_AVOIDANCE_LOOP", "id": "스토리-13d-day스크립트분할-md-dday11failavoidanceloop"}, {"level": 2, "text": "20. 평가 함수 초안", "id": "스토리-13d-day스크립트분할-md-20-평가-함수-초안"}, {"level": 2, "text": "21. 실제 제작 시 분리 권장 에셋", "id": "스토리-13d-day스크립트분할-md-21-실제-제작-시-분리-권장-에셋"}, {"level": 2, "text": "22. 다음 연결", "id": "스토리-13d-day스크립트분할-md-22-다음-연결"}], "plain": "# D-Day 실제 게임 스크립트 분할 이 문서는 [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md)의 대본을 실제 게임 스크립트 제작 단위로 쪼갠 문서다. 점수·플래그 판정 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)를 따른다. ## 1. 문서 목적 - D-Day를 StoryFlow Scene 또는 VN 스크립트 단위로 나눈다. - 각 장면의 진입 조건, 선택지, 상태 변경, 다음 장면을 명확히 한다. - 긴 대본 문서인 `10`을 그대로 구현하지 않고, 제작 가능한 스크립트 블록으로 변환한다. - 이 문서는 구현용 초안이며, 실제 엔진 스크립트 문법은 이후 StoryFlow 에셋 구조에 맞춰 조정한다. 배경 원화와 AI 이미지 생성 기준은 [장소와 배경 묘사](./14_장소와_배경_묘사.md)를 따른다. 이 문서의 `@bg` 아래 배경 지시는 실제 제작자가 어떤 변형 배경을 호출해야 하는지 빠르게 확인하기 위한 요약이다. ## 2. 스크립트 표기 규칙 ```text # SceneID @enter 조건 @bg 배경 @music 음악 @sfx 효과음 @flag 상태 변경 @choice 선택지 @goto 다음 SceneID @end 종료 ``` 표기 의미: | 표기 | 의미 | | --- | --- | | `# SceneID` | 장면 고유 ID 후보 | | `@enter` | 진입 조건 | | `@bg` | 배경/장소 | | `@music` | 음악 방향 | | `@sfx` | 주요 효과음 | | `@flag` | 플래그/점수 변경 | | `@choice` | 플레이어 선택지 | | `@goto` | 다음 장면 이동 | | `@end` | 엔딩/루프/다음 날짜 연결 | ## 3. 전체 Scene 흐름 ```text DDAY_00_ENTRY_CAFE ↓ DDAY_01_DAY_CHOICE_HUB ↓ DDAY_02A_HAYEON_DAY DDAY_02B_SOHA_DAY DDAY_02C_SEORIN_DAY DDAY_02D_MIRU_DAY DDAY_02E_ALONE_STAGE_CHECK ↓ DDAY_03_PRE_CLOSE_ASSESS ↓ DDAY_04_ROUTE_GATE ├─ DDAY_05_TRUE_APPROACH ├─ DDAY_06_FAIL_HAYEON_MISSING ├─ DDAY_07_SAD_SOHA_ENTRY ├─ DDAY_08_SAD_SEORIN_ENTRY ├─ DDAY_09_SAD_MIRU_ENTRY ├─ DDAY_10_FAIL_ACCIDENT_UNLINKED └─ DDAY_11_FAIL_AVOIDANCE_LOOP ``` ## 4. 공통 진입 ### DDAY_00_ENTRY_CAFE ```text # DDAY_00_ENTRY_CAFE @enter Date == DDay @enter D1CafeOperated == true @enter D2PremonitionSeen == true @enter D3RelationshipAssessmentDone == true @bg 2학년 5반 쉬어가 카페 / 축제 마지막 날 오전 @music festival_day_light_low ``` 배경 지시: - `14`의 `2학년 5반 쉬어가 카페`와 `폐장 후 교실` 사이 단계. - 책상 임시 카운터, 손글씨 메뉴판, 종이컵, 반쯤 떼어진 종이 장식, 입구 문구 카드가 보인다. - 오전이지만 이미 정리의 기운이 섞여야 한다. 목적: - 축제 2일차의 마지막 낮을 시작한다. - `쉬어가 카페`가 이제 정리되는 공간임을 보여준다. - 하연이 먼저 폐장 후 약속을 잡지 않는다는 원칙을 유지한다. 스크립트: ```text 반 친구: 오후엔 부스 닫고 돌아다녀도 된대! 반 친구: 컵 남은 거 이쪽에 모아줘. 재윤: 알겠어. 하연: 이 문구, 떼지 말까? 재윤: 왜? 하연: 아직 들어올 사람 있을 수도 있으니까. 재윤: 축제 끝나기 전까지? 하연: 응. 끝나기 전까지. ``` 내레이션: ```text 문구 카드는 아직 입구에 붙어 있었다. 잠깐 앉아도 괜찮습니다. 오늘은 그 문장이, 재윤에게 하는 말처럼 보였다. 쉬어가도 되지만, 머물러 숨으면 안 되는 날이었다. ``` 상태 처리: ```text @flag DDayCafeClosed = true @goto DDAY_01_DAY_CHOICE_HUB ``` ## 5. 낮 선택 허브 ### DDAY_01_DAY_CHOICE_HUB ```text # DDAY_01_DAY_CHOICE_HUB @enter DDayCafeClosed == true @bg 학교 축제 운동장 / 낮 @music festival_day_choice ``` 배경 지시: - `14`의 `축제 낮` 기준. - 밝은 천막과 학생 소음은 유지하되, 화면 한쪽에 조용한 가장자리 동선이 보여야 한다. - 선택 허브이므로 어느 캐릭터 방향으로도 갈 수 있는 열린 구도가 좋다. 선택지: ```text @choice [하연과 축제를 둘러본다] -> DDAY_02A_HAYEON_DAY @choice [소하와 마지막으로 오래된 길을 걷는다] -> DDAY_02B_SOHA_DAY @choice [서린의 방송 마무리를 돕는다] -> DDAY_02C_SEORIN_DAY @choice [미루의 도움 인원 마무리를 확인한다] -> DDAY_02D_MIRU_DAY @choice [혼자 야외 소무대 쪽을 본다] -> DDAY_02E_ALONE_STAGE_CHECK ``` 주의: - 낮 선택은 한 번만 가능하다. - 선택한 축만 보정한다. - `DDayDayChoiceUsed = true`를 공통으로 설정한다. ## 6. 낮 선택 A: 하연 ### DDAY_02A_HAYEON_DAY ```text # DDAY_02A_HAYEON_DAY @enter DDayDayChoiceUsed != true @bg 축제 운동장 가장자리 / 낮 @music hayeon_day_soft ``` 배경 지시: - `14`의 `운동장과 축제 중심부` 중 가장자리 기준. - 하연은 축제 중심보다 그늘, 사람 흐름이 느슨한 길, 멀리 보이는 소무대 방향과 맞다. - 화면은 밝지만 소리가 조금 낮아지는 느낌으로, 하연의 속도를 읽는 장면임을 보여준다. 목적: - 하연 신뢰와 동선 이해를 마지막으로 보정한다. - 하연이 조용한 곳을 보는 감각을 재윤이 다시 확인한다. - 낮에는 고백하지 않는다. 핵심 대사: ```text 재윤: 사람 많네. 하연: 어제보다 더 많은 것 같아. 재윤: 괜찮아? 하연: 괜찮아. 오래 있으면 조금 시끄럽긴 한데. 재윤: 저쪽으로 돌까? 하연: 어디? 재윤: 사람 덜 몰리는 쪽. 하연: 알아봤네. 재윤: 조금은. 하연: 조금이면 됐어. ``` D-2 성공 시 추가: ```text 재윤: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 다르다고 했잖아. 하연: 기억했네. 재윤: 응. 하연: 그럼 됐어. ``` 상태 처리: ```text @if HaYeonTrust >= 5 || HaYeonPaceRead >= 2 @flag HaYeonTrust += 1 @flag HaYeonPaceRead += 1 @flag DDayHayeonDaySuccess = true @endif @if D2PremonitionPassed == true && DDayHayeonDaySuccess == true @flag AccidentClueHaYeon = true @endif @flag DDayDayChoiceUsed = true @flag DDayDayChoice = Hayeon @goto DDAY_03_PRE_CLOSE_ASSESS ``` 실패/약한 진행: ```text @if HaYeonTrust <= 4 && HaYeonPaceRead <= 1 @flag DDayHayeonDaySuccess = false @endif ``` ## 7. 낮 선택 B: 소하 ### DDAY_02B_SOHA_DAY ```text # DDAY_02B_SOHA_DAY @enter DDayDayChoiceUsed != true @bg 운동장 옆 오래된 길 / 낮 @music soha_memory_warm ``` 배경 지시: - `14`의 `소하의 오래된 길` 기준. - 따뜻하고 익숙하지만 앞으로 나아가지 못하는 느낌을 준다. - 오래된 담장, 색 바랜 표지, 등굣길을 떠올리게 하는 생활감을 넣고, 지나친 데이트 거리처럼 꾸미지 않는다. 목적: - 과거 도피를 마지막으로 정리한다. - D-3에서 이미 정리했다면 확인 장면으로 사용한다. - D-3에서 정리하지 못했더라도 압박이 너무 높지 않으면 마지막 보정이 가능하다. D-3 정리 성공 시: ```text 소하: 예전 같으면, 너 이런 날엔 나랑 먼저 돌았어. 재윤: 알아. 소하: 그럼 오늘은? 재윤: 마지막에 가야 할 데가 있어. 소하: 하연이한테? 재윤: 응. 소하: 이제야 제대로 말하네. ``` D-3 미정리 보정 선택: ```text @choice [예전처럼 편한 쪽으로 돌아간다] -> DDAY_07_SAD_SOHA_ENTRY @choice [지금 가야 할 사람을 말한다] -> DDAY_02B_SOHA_RESOLVE ``` #### DDAY_02B_SOHA_RESOLVE ```text 재윤: 편해서 돌아가는 거랑, 좋아해서 가는 건 다르잖아. 소하: 이제 그런 말도 하네. 재윤: 늦었지. 소하: 늦었어. 그래도 지금 말했잖아. ``` 상태 처리: ```text @if SoHaResolved == true @flag DDaySoHaConfirmed = true @elseif SoHaPressure <= 2 @flag SoHaResolved = true @flag AccidentClueSoHa = true @flag DDaySoHaConfirmed = true @else @flag SoHaPressure = 3 @endif @flag DDayDayChoiceUsed = true @flag DDayDayChoice = SoHa @goto DDAY_03_PRE_CLOSE_ASSESS ``` ## 8. 낮 선택 C: 서린 ### DDAY_02C_SEORIN_DAY ```text # DDAY_02C_SEORIN_DAY @enter DDayDayChoiceUsed != true @bg 방송실 / 낮 @music seorin_order_cold ``` 배경 지시: - `14`의 `방송실과 학생회 업무 공간` 기준. - 믹서, 마이크, 헤드폰, 폐장 큐시트, 라벨링된 케이블, D-9 상담 기준 메모가 보여야 한다. - 차가운 통제실이 아니라, 서린이 실제 업무를 정리해 둔 좁고 바쁜 공간이다. 목적: - 정답과 순서 뒤에 숨는 길을 마지막으로 정리한다. - 폐장 방송과 소무대 위험 단서를 보강할 수 있다. D-3 정리 성공 시: ```text 서린: 폐장 방송은 이 순서면 돼. 재윤: 제가 확인 안 해도 괜찮아요? 서린: 네가 오늘 확인해야 할 건 이게 아니잖아. 재윤: 그래도 틀리면요? 서린: 틀리면 내가 고친다. 서린: 너는 네가 말해야 할 걸 말해. ``` D-3 미정리 보정 선택: ```text @choice [서린이 정한 순서를 따른다] -> DDAY_08_SAD_SEORIN_ENTRY @choice [내가 확인해야 할 것을 고른다] -> DDAY_02C_SEORIN_RESOLVE ``` #### DDAY_02C_SEORIN_RESOLVE ```text 재윤: 틀리지 않는 쪽만 고르면, 제가 고른 게 아니잖아요. 서린: 이제야 그걸 말하네요. 재윤: D-9에 선배가 말했잖아요. 맞는 답이 아니라, 제가 고른 이유를 보라고. 서린: 기억하고 있었네. 재윤: 오늘은 제가 확인해야 할 게 따로 있어요. 서린: 그럼 가요. 방송은 내가 할 테니까. ``` 상태 처리: ```text @if SeoRinResolved == true @flag DDaySeoRinConfirmed = true @flag AccidentClueSeoRin = true @elseif SeoRinControl <= 2 @flag SeoRinResolved = true @flag AccidentClueSeoRin = true @flag DDaySeoRinConfirmed = true @else @flag SeoRinControl = 3 @endif @flag DDayDayChoiceUsed = true @flag DDayDayChoice = SeoRin @goto DDAY_03_PRE_CLOSE_ASSESS ``` ## 9. 낮 선택 D: 미루 ### DDAY_02D_MIRU_DAY ```text # DDAY_02D_MIRU_DAY @enter DDayDayChoiceUsed != true @bg 축제 도움 인원 대기 장소 / 낮 @music miru_soft_anxious ``` 배경 지시: - `14`의 `미루의 축제 도움 인원 대기 장소` 기준. - 복도 옆 임시 책상, 체크리스트, 명찰, 여분 안내 표지, 테이프와 끈, 분실물 박스를 배치한다. - 미루가 갇힌 느낌보다, 혼자 해보려고 나갈 수 있는 문과 복도 동선이 보여야 한다. 목적: - 미루의 의존을 대신 책임지지 않고, 미루가 자기 일을 끝낼 수 있게 한다. - 출입 제한 표지와 고정끈 단서를 보강할 수 있다. D-3 정리 성공 시: ```text 미루: 저, 표지 확인하고 보고까지 했어요. 재윤: 잘했네. 미루: 그래도 마지막에 선배가 한 번 봐주시면— 재윤: 네가 먼저 본 게 맞아. 재윤: 내가 다시 정해주지 않아도 돼. 미루: 그럼 저, 혼자 한 거 맞죠? 재윤: 응. 네가 한 거야. ``` D-3 미정리 보정 선택: ```text @choice [마지막까지 대신 봐준다] -> DDAY_09_SAD_MIRU_ENTRY @choice [먼저 끝낸 일을 인정한다] -> DDAY_02D_MIRU_RESOLVE ``` #### DDAY_02D_MIRU_RESOLVE ```text 재윤: 내가 확인해줘서 맞는 게 아니야. 재윤: 네가 확인했고, 네가 보고했으니까 맞는 거야. 미루: 그래도 불안하면요? 재윤: 불안해도 네가 한 일이 사라지진 않아. 미루: 그럼... 저 혼자 끝낸 거네요. 재윤: 응. ``` 상태 처리: ```text @if MiRuResolved == true @flag DDayMiRuConfirmed = true @flag AccidentClueMiRu = true @elseif MiRuDependence <= 2 @flag MiRuResolved = true @flag AccidentClueMiRu = true @flag DDayMiRuConfirmed = true @else @flag MiRuDependence = 3 @endif @flag DDayDayChoiceUsed = true @flag DDayDayChoice = MiRu @goto DDAY_03_PRE_CLOSE_ASSESS ``` ## 10. 낮 선택 E: 혼자 소무대 확인 ### DDAY_02E_ALONE_STAGE_CHECK ```text # DDAY_02E_ALONE_STAGE_CHECK @enter DDayDayChoiceUsed != true @bg 학교 뒤편 야외 소무대 / 낮 @music stage_empty_day ``` 배경 지시: - `14`의 `낮의 소무대` 기준. - 낮은 단차, 검은 전선, 임시 조명 프레임, 기울어진 출입 제한 표지가 보이지만 아직 노골적인 사고 장소처럼 보이면 안 된다. - 하연 조건이 부족하면 물리 단서만 선명하고, 하연 조건이 충분하면 D-2 창밖 시선과 연결된다. 목적: - 물리적 사고 단서를 보강한다. - 하지만 하연과 공유하지 않으면 감정 연결은 회복되지 않는다. - 회피가 높은 상태에서는 오히려 회피가 더 오른다. 스크립트: ```text 소무대는 낮에도 조용했다. 표지는 제대로 붙어 있었고, 끈은 풀리지 않았고, 프레임은 아직 제자리에 있었다. 전부 확인했는데도, 재윤은 여전히 누구에게 가려 했는지 알 수 없었다. ``` 상태 처리: ```text @if AccidentClueScore >= 2 @flag MissingPhysicalAccidentClueOne = true @endif @if AccidentClueSeoRin == false @flag AccidentClueSeoRin = true @elseif AccidentClueMiRu == false @flag AccidentClueMiRu = true @endif @if AccidentClueHaYeon =
