"id": "스토리-05엔딩과루프-md-히든-엔딩-이후-복구-이벤트"}], "plain": "# 엔딩과 루프 ## 진엔딩 축제 마지막 밤이 다시 재현된다. 처음 선택지는 회피와 미련에 묶여 있다. ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 일반 히로인 루트에서 얻은 단서들이 개입한다. - 한소하: 거짓 과거가 아니라 진짜 기억을 보게 해준다. - 백서린: 정해진 선택지가 아니라 주인공 자신의 선택을 돌려준다. - 나미루: 꿈속에 붙잡지 않고 현실로 나아가게 해준다. 마지막에 새로운 선택지가 생긴다. ```text [하연에게 말하러 간다] ``` 완전 조건 충족 시 선택지는 더 선명해진다. ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 주인공은 사고의 진실을 받아들이고, 내면세계에서 하연에게 먼저 자기 마음과 선택을 말한다. 이 고백은 꿈속에 남기 위한 고백이 아니라, 현실에서 다시 만나기 위한 약속이다. 핵심 문장 후보: > 아무 일도 없던 날로 돌아가고 싶은 게 아니야. > 다친 것도, 무서웠던 것도 기억한 채로 너에게 갈게. ### 현실 복귀 구조 진엔딩은 금요일 밤에서 토요일을 표기하지 않고 바로 일요일 오후로 점프한다. ```text D-Day 금요일 밤 사고 기억 수용 암전 일요일 오후 병실 ``` 토요일은 플레이어 경험에서 빠진다. 재윤은 그 시간을 기억하지 못한다. 병실에서 재윤은 일요일 오후에 눈을 뜬다. 큰 외상은 없지만, 알 수 없는 이유로 금요일 밤부터 계속 깨어나지 못한 상태였다. ```text 재윤: 오늘… 며칠이야? 하연: 일요일. 재윤: 하루가 지났어? 하연: 하루 넘게. 계속 안 일어났어. ``` 하연은 재윤이 크게 다친 것은 아니라고 말한다. ```text 재윤: 나… 많이 다쳤어? 하연: 아니. 재윤: 아닌데 왜 병원이야? 하연: 안 일어났어. 재윤: 얼마나? 하연: 금요일 밤부터… 계속. ``` 의사는 검사상 큰 이상을 찾지 못한다. ```text 의사: 외상은 크지 않습니다. 의사: 그런데 의식이 돌아오지 않는 이유를 설명하기 어려웠습니다. ``` 이 구조의 의미: - 재윤은 외상 때문에 못 깨어난 것이 아니다. - 돌아올 이유를 찾지 못해서 내면세계에 머물렀다. - 진엔딩에서 돌아올 이유를 찾았기 때문에 일요일에 깨어난다. ### 일요일 병실 장면 하연: > 늦었어. 재윤: > 이번엔 기억하고 왔어. ### D+3 월요일 방학식 진엔딩 이후 재윤은 월요일 방학식에 겨우 참석한다. 조건: - 오래 머물 수 없다. - 몸은 무겁고 걸음은 느리다. - 얼굴이나 팔에는 작은 밴드와 처치 흔적이 남아 있다. - 주변 사람들은 무리하지 말라고 한다. 방학식 참석은 `루프에서 도달하지 못하던 다음 월요일에 처음 도달했다`는 증거다. ```text 처음으로, 금요일 다음의 월요일이 왔다. ``` 방학식 장면 후보: ```text 하연: 진짜 왔네. 재윤: 월요일이 왔으니까. ``` ```text 소하: 야, 유재윤. 누가 이런 데까지 오랬냐. 재윤: 너라면 올 줄 알았잖아. ``` ```text 서린: 오래 있으면 안 돼. 재윤: 네. 서린: 그래도… 와줘서 다행이야. ``` ```text 미루: 선배, 멘토링 끝나도… 가끔 인사해도 되죠? 재윤: 당연하지. ``` 마지막 문장 후보: > 축제는 끝났다. > 방학식도 끝났다. > 그래도 월요일은 사라지지 않았다. > 그리고 여름은, 아직 남아 있었다. ### 방학으로 이어지는 엔딩 여운 진엔딩은 방학식에서 관계를 끝내지 않는다. 오히려 방학식이 끝난 직후부터, 하연과 재윤이 현실의 시간 속에서 계속 만날 수 있음을 암시해야 한다. 연출 기준: - 방학식 직후 두 사람은 병원 재검사, 학교 도서관, 카페, 짧은 산책처럼 작고 현실적인 다음 약속을 나눈다. - 약속은 거창한 연애 선언이 아니라 `내일`, `모레`, `방학 중 어느 오전`처럼 실제 시간이 앞으로 흐르고 있음을 보여주는 장치다. - 하연은 먼저 끌고 가는 사람이 아니라 조용히 기다리는 사람으로 보인다. - 재윤은 무리해서 밝아진 것이 아니라 천천히 회복 중인 사람으로 보인다. - 핵심 감정은 `이제 도망치지 않는다`보다 한 걸음 더 나아간 `이제 다음을 말할 수 있다`다. ### 엔딩 크레딧 연출 진엔딩 후 엔딩 크레딧에는 음악과 짧은 애니메이션 컷을 넣는다. 이 섹션은 방향성 요약이고, 컷 구성의 초안은 [진엔딩 크레딧 콘티 초안](./11_진엔딩_크레딧_콘티_초안.md)에서 관리한다. 음악 방향: - 시작: 느린 피아노 단독. 병실, 방학식, 월요일의 여운을 남긴다. - 중반: 얇은 어쿠스틱 기타 또는 스트링 패드가 들어오며 여름의 온기를 더한다. - 배경 질감: 매미 소리, 멀리서 들리는 학교 방송, 종이 넘기는 소리처럼 현실적인 생활음을 작게 섞는다. - 감정: 슬픈 이별곡이 아니라, 상처를 안고도 다시 일상을 시작하는 따뜻한 후일담. 짧은 애니메이션 컷 구성 요약: 1. 병원 대기실에서 하연이 재윤에게 물병을 건네는 컷. 2. 방학 중 학교 도서관 앞에서 하연이 먼저 기다리고, 재윤이 천천히 걸어오는 컷. 3. 버스 정류장에서 하연이 먼저 타지 않고 재윤을 기다리는 컷. 4. 작은 카페 창가에서 둘이 같은 책이나 안내문을 보는 컷. 5. 학교 뒤편 산책길에서 소무대 방향이 아니라 밝은 길 쪽으로 함께 걷는 컷. 6. 마지막으로 하연의 휴대폰 캘린더에 `병원`, `도서관`, `카페`, `천천히 걷기` 같은 방학 약속이 작게 표시된 컷. 주의점: - 사고가 없던 일이 된 것처럼 연출하지 않는다. 재윤의 회복 흔적과 하연의 조심스러운 태도는 남긴다. - 방학 약속은 과하게 달콤한 데이트 몽타주가 아니라, 둘이 현실에서 계속 만난다는 암시로 사용한다. - 소무대는 직접 낭만화하지 않는다. 마지막 산책 컷에서는 소무대가 있던 방향을 피하거나, 어둡지 않은 길로 전환한다. ## 비진엔딩 공통 처리 진엔딩이 아닌 경우의 핵심은 `방학이 시작되지 않는다`이다. 진엔딩만이 금요일 다음 월요일, 즉 D+3 방학식 이후의 여름에 도달한다. 다른 엔딩은 모두 그 문턱에서 멈추거나, 방학식에 닿은 것처럼 보여도 시간이 앞으로 흐르지 않는다. | 엔딩 | 방학 도달 | 크레딧 처리 | 핵심 감정 | | --- | --- | --- | --- | | 진엔딩 | 도달 | 완성된 엔딩곡 + 방학 후일담 애니메이션 | 상처를 안고도 다음을 말할 수 있음 | | 하연 실패 루프 | 미도달 | 없음 또는 끊긴 피아노 몇 음 | 월요일이 오지 않음 | | 소하 새드엔딩 | 왜곡 | 짧은 가짜 크레딧 | 따뜻하지만 앞으로 가지 못하는 과거 | | 서린 새드엔딩 | 정지 | 차갑고 정돈된 가짜 크레딧 | 안전하지만 선택이 없는 세계 | | 미루 새드엔딩 | 닫힘 | 달콤하지만 불안한 가짜 크레딧 | 필요한 사람으로 남기 위해 현실을 미룸 | | 히든 붕괴 | 붕괴 | 깨진 크레딧 | 너무 많이 도망쳐 세계가 망가짐 | 비진엔딩 크레딧 원칙: - 완성된 엔딩곡과 밝은 방학 후일담 컷은 진엔딩 전용 보상으로 남긴다. - 새드엔딩에는 엔딩곡의 짧은 변주나 미완성 버전만 사용한다. - 방학식 안내문, 월요일 칠판, 여름 햇빛은 등장할 수 있지만 `앞으로 흐르는 시간`으로 사용하지 않는다. - 비진엔딩에서 하연과 재윤이 방학 동안 계속 만나는 컷은 넣지 않는다. - 하연 실패 루프는 엔딩이라기보다 루프 실패에 가깝게 처리한다. 공통 문장 후보: > 금요일 밤은 끝났다. > 하지만 월요일은 오지 않았다. ## 기본 새드엔딩 ### 소하 엔딩 주인공이 익숙한 과거를 선택한다. 내면세계는 평화로운 소꿉친구 미연시로 고정되지만, 현실의 주인공은 깨어나지 못한다. 방학식 안내문은 골목 끝이나 교실 게시판에 보이지만, 날짜는 흐리거나 매번 같은 등굣길로 되돌아간다. 연출 기준: - 등굣길, 편의점, 오래된 골목처럼 따뜻한 컷으로 시작한다. - 크레딧이 있다면 짧고 따뜻한 가짜 크레딧으로 처리한다. - 같은 아침 햇빛과 같은 농담이 반복되어, 행복해 보이지만 앞으로 가지 못하는 과거임을 보여준다. - 방학은 시작되지 않고, 소하와 함께 있던 익숙한 과거만 계속된다. 획득 조각 후보: `아무 일도 없던 날` ### 서린 엔딩 주인공이 모든 선택권을 서린에게 넘긴다. 내면세계는 안전하지만 정지된 상태가 되고, 주인공은 사고의 책임감에서 벗어나지 못한다. 월요일 일정표는 완벽히 정리되어 있지만 아무도 그 날짜로 이동하지 않는다. 연출 기준: - 방송실, 체크리스트, 정돈된 큐시트, 닫힌 선택지 UI를 중심으로 보여준다. - 크레딧이 있다면 차갑고 정돈된 가짜 크레딧으로 처리한다. - 음악은 정확한 박자와 짧은 전자음/피아노 음형으로 반복되어 안전하지만 멈춘 느낌을 준다. - 사고는 피한 것처럼 보이지만, 재윤 자신의 선택은 사라진다. 획득 조각 후보: `정해진 선택지` ### 미루 엔딩 주인공이 꿈속에 남는다. 가장 달콤하지만 가장 위험한 새드엔딩이다. 방학식 안내문은 문밖에 있지만, 재윤은 그 문을 열지 못하고 계속 미루에게 필요한 사람으로 남는다. 연출 기준: - 작은 방, 끝나지 않는 체크리스트, 가방끈을 잡는 미루의 손을 중심으로 보여준다. - 크레딧이 있다면 달콤하지만 불안한 가짜 크레딧으로 처리한다. - 음악은 부드러운 오르골처럼 시작하지만 같은 마디가 끊기지 않고 반복된다. - 방학은 문밖에만 있고, 재윤은 누군가에게 필요한 사람이라는 역할 안에 남는다. 획득 조각 후보: `닫힌 문` ### 하연 실패 엔딩 하연과 서로의 마음을 확인하지 못한 상태로 내부 기준 D-Day 금요일 밤에 도달하면, 주인공은 사고의 진실을 온전히 연결하지 못한다. 하연의 목소리와 서로 말하려던 문장이 기억에서 빠지고, 재윤은 폐장 후 학교 뒤편 야외 소무대에 혼자 서 있다. ```text 폐장 후. 학교 뒤편 야외 소무대. 재윤은 혼자 서 있다. 누가 불렀는지 기억나지 않는다. 누구에게 가려 했는지도 기억나지 않는다. 금속이 삐걱인다. 암전. ``` 이 엔딩은 하연에게 거절당하는 엔딩이 아니라, 하연과 마음을 확인하지 못해 재윤의 내면세계가 하연을 사고 기억에서 지워버리는 실패다. 예정되어 있던 D+3 월요일 방학식에는 도달하지 못한 채 루프가 시작된다. 크레딧은 넣지 않거나, 검은 화면 위에 끊긴 피아노 몇 음과 금속음만 남긴다. 연출 문장 후보: > 금요일 밤은 끝났다. > 하지만 월요일은 오지 않았다. 획득 조각 후보: `멀어지는 목소리` ## 반복 새드엔딩 처리 | 상황 | 처리 | | --- | --- | | 새드엔딩 첫 관람 | 풀 연출 | | 같은 새드엔딩 2회차 | 압축 연출 | | 같은 새드엔딩 3회차 | 특수 대사 / 메타 루프 이벤트 | | 새드엔딩 누적 반복 | 기억 혼선과 루프 피로 증가 | | 과도한 반복 | 히든 세계 붕괴 엔딩 진입 | ## 히든 세계 붕괴 엔딩 조건 예시: - 새드엔딩 총 6회 이상 - 같은 새드엔딩 3회 이상 - 하연 이벤트를 계속 무시 히든 엔딩에서는 기억 혼선과 루프 피로가 누적되어 내면세계가 더 이상 정상적인 D-25로 돌아가지 못한다. 도달하지 못한 방학식의 흔적이 월요일 교실과 축제 마지막 밤을 뒤섞는다. 크레딧이 나온다면 이름, 날짜, 음악, 배경 컷이 깨지는 붕괴 크레딧으로 처리한다. ## 히든 엔딩 이후 복구 이벤트 히든 세계 붕괴 엔딩 이후에는 완전 게임오버로 막지 않는다. 대신 다음 시작이 평소 D-25가 아니라 `망가진 D-25`로 바뀐다. ```text D-25? 교실 칠판의 날짜가 지워져 있음 방학식 안내문이 반쯤 찢겨 있음 책상 수가 맞지 않음 창밖은 축제 마지막 밤처럼 어두움 ``` 담임은 같은 말을 반복한다. > 오늘 전학생이 왔다. > 오늘 전학생이 왔다. > 오늘 전학생이 왔다. 하지만 하연은 들어오지 않는다. 복구 목표: - 소하의 팔찌 또는 오래된 사진 - 서린의 점검표 조각 - 미루의 키링 또는 고정끈 - 하연의 이름표 마지막 선택지: ```text [은하연의 이름을 부른다] ``` 하연: > ...불렀어? 이후 정상 D-25 루프로 복귀한다.", "excerpt": "# 엔딩과 루프 ## 진엔딩 축제 마지막 밤이 다시 재현된다. 처음 선택지는 회피와 미련에 묶여 있다. ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 일반 히로인 루트에서 얻은 단서들이 개입한다. - 한소하: 거짓 과거가 아니라 진짜 기억을 보게 해준다. - 백서린: 정해진 선택지가 아니라 주인공 자신의 선택을 돌려준다. - 나미루: 꿈속에 붙잡"}, {"path": "스토리/06_날짜별_진행_달력.md", "category": "스토리", "title": "날짜별 진행 달력", "id": "스토리-06날짜별진행달력-md", "html": "<h2 id=\"스토리-06날짜별진행달력-md-날짜별-진행-달력\">날짜별 진행 달력<\/h2>\n<h3 id=\"스토리-06날짜별진행달력-md-목적\">목적<\/h3>\n<p>이 문서는 전체 스토리의 날짜별 배치 기준을 한눈에 확인하기 위한 마스터 달력이다.<\/p>\n<p>개별 장면의 긴 대본을 모두 담기보다, 각 날짜가 어떤 감정 축·플래그·후속 문서와 연결되는지 정리한다. 실제 대본 수준으로 확장된 클라이맥스는 아래 문서를 우선 기준으로 삼는다.<\/p>\n<ul>\n<li><a href=\"./08_D-3_관계정리_클라이맥스.md\">D-3 관계 정리 클라이맥스<\/a><\/li>\n<li><a href=\"./09_D-2_말하지_못한_예감.md\">D-2 말하지 못한 예감<\/a><\/li>\n<li><a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a><\/li>\n<li><a href=\"./11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a><\/li>\n<li><a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a><\/li>\n<li><a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a><\/li>\n<\/ul>\n<h3 id=\"스토리-06날짜별진행달력-md-확정-시간-구조\">확정 시간 구조<\/h3>\n<pre><code>첫 회차 시작: D-32 월요일\n은하연 전학 / 루프 시작점: D-25 월요일\n축제 이틀 일정 공지: D-23 수요일\n축제 1일차: D-1 목요일\n축제 2일차 / 사고 / 엔딩 분기: D-Day 금요일\nD+1 토요일: 날짜 카드로 보여주지 않음. 현실에서는 혼수 상태가 이어짐\nD+2 일요일: 진엔딩에서 병실 기상\nD+3 월요일: 진엔딩에서만 방학식 도달<\/code><\/pre>\n<p>첫 회차에서는 D-32부터 D-26까지 기존 히로인들과의 관계를 먼저 보여준다. 루프 이후에는 이 프롤로그 주간을 반복하지 않고 D-25 은하연 전학 직전으로 돌아간다.<\/p>\n<p>실패 루프에서는 D-Day 금요일 사고 이후 D+1, D+2, D+3을 플레이어가 정상적으로 경험하지 못한다. 진엔딩에서만 토요일을 날짜 카드 없이 건너뛰고 D+2 일요일 병실 기상, D+3 월요일 방학식으로 이어진다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-표기-원칙\">표기 원칙<\/h3>\n<ul>\n<li><code>D-Day<\/code>는 내부 기획/시스템 기준일 이름이다.<\/li>\n<li>게임 내 대사와 UI에서는 <code>D-Day<\/code>라고 부르지 않는다.<\/li>\n<li>게임 내에서는 <code>축제 2일차<\/code>, <code>축제 마지막 날<\/code>, <code>금요일<\/code>, <code>폐장 후<\/code>처럼 표현한다.<\/li>\n<li><code>D-1<\/code>도 게임 내에서는 <code>축제 1일차<\/code>, <code>축제 첫날<\/code>, <code>목요일<\/code>처럼 표현한다.<\/li>\n<li>D+1 토요일은 별도 날짜 카드로 보여주지 않는다. 진엔딩에서는 암전 뒤 D+2 일요일 오후 병실로 바로 연결한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-06날짜별진행달력-md-전체-설계-원칙\">전체 설계 원칙<\/h3>\n<ul>\n<li>하연 루트는 억지 고백이나 약속 예약이 아니라, 재윤이 하연의 속도와 동선을 이해해 직접 찾아가는 구조다.<\/li>\n<li>하연이 먼저 <code>축제가 끝나고 보자<\/code>고 약속을 잡지 않는다.<\/li>\n<li>D-3은 소하/서린/미루와의 관계를 끝내는 날이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 도피처를 정리하는 날이다.<\/li>\n<li>D-2는 고백도 약속도 아니다. 재윤이 하연의 침묵과 조용한 자리 선호를 이해하는 예감의 날이다.<\/li>\n<li>D-Day 낮 선택은 부족한 축의 마지막 보정 기회다.<\/li>\n<li>D-Day 폐장 후 성공은 하연의 호출 보상이 아니라, 재윤이 직접 하연에게 말하러 가는 선택의 결과다.<\/li>\n<li>사고 단서는 사고를 막기 위한 정보가 아니라, 다친 기억까지 안고 현실로 돌아가기 위한 기억 조각이다.<\/li>\n<li>비진엔딩에서는 방학이 실제로 시작되지 않는다. 완성된 엔딩 크레딧과 방학 후일담 컷은 진엔딩 전용이다.<\/li>\n<\/ul>\n<h3 id=\"스토리-06날짜별진행달력-md-핵심-플래그-축\">핵심 플래그 축<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>축<\/th><th>대표 플래그<\/th><th>의미<\/th><th>주요 날짜<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰<\/td><td><code>HaYeonTrust<\/code><\/td><td>하연이 재윤을 불편해하지 않고 자기 속도를 보여줄 수 있는지<\/td><td>D-25~D-1<\/td><\/tr><tr><td>하연 동선 이해<\/td><td><code>HaYeonPaceRead<\/code><\/td><td>하연이 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해했는지<\/td><td>D-17, D-16, D-2, D-Day<\/td><\/tr><tr><td>하연 기억 연결<\/td><td><code>HaYeonMemoryLink<\/code><\/td><td>사고 기억에서 하연이 빠지지 않도록 연결되는 감각<\/td><td>D-5, D-2, D-Day<\/td><\/tr><tr><td>소하 정리<\/td><td><code>SoHaResolved<\/code><\/td><td>익숙한 과거로 돌아가 숨는 길을 정리했는지<\/td><td>D-13, D-7, D-3, D-Day<\/td><\/tr><tr><td>서린 정리<\/td><td><code>SeoRinResolved<\/code><\/td><td>정답과 순서 뒤에 숨는 길을 정리했는지<\/td><td>D-12, D-9, D-3, D-Day<\/td><\/tr><tr><td>미루 정리<\/td><td><code>MiRuResolved<\/code><\/td><td>필요한 사람으로 남기 위해 자기 마음을 미루는 길을 정리했는지<\/td><td>D-12, D-8, D-3, D-Day<\/td><\/tr><tr><td>사고 단서<\/td><td><code>AccidentClue*<\/code><\/td><td>소무대, 조명 프레임, 표지, 고정끈, 폐장 방송이 연결되는지<\/td><td>D-9~D-Day<\/td><\/tr><tr><td>회피 누적<\/td><td><code>Avoidance<\/code><\/td><td>답장 미루기, 혼자 확인하기, 중요한 말을 피하는 선택의 누적<\/td><td>전 구간<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-06날짜별진행달력-md-마스터-달력\">마스터 달력<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>요일<\/th><th>구간<\/th><th>큰 이벤트<\/th><th>핵심 역할<\/th><th>주요 연결<\/th><\/tr><\/thead><tbody><tr><td>D-32<\/td><td>월<\/td><td>첫 회차 프롤로그<\/td><td>소하와 등교<\/td><td>오래된 일상 기준점. 소하의 익숙함과 재윤의 무심한 미루기 제시<\/td><td>소하 과거 축 시작<\/td><\/tr><tr><td>D-31<\/td><td>화<\/td><td>첫 회차 프롤로그<\/td><td>방송실의 서린, 복도의 미루<\/td><td>서린의 정답/순서, 미루의 의존/멘토링 종료 기준점 제시<\/td><td>서린/미루 축 시작, D+3 방학식 첫 언급 가능<\/td><\/tr><tr><td>D-30<\/td><td>수<\/td><td>첫 회차 프롤로그<\/td><td>세 관계가 모두 익숙한 하루<\/td><td>재윤의 생활권 안에 세 기존 관계가 이미 들어와 있음을 보여줌<\/td><td>회피 축 시작<\/td><\/tr><tr><td>D-29<\/td><td>목<\/td><td>첫 회차 프롤로그<\/td><td>내일의 선택지 예고<\/td><td>기존 히로인 중 누구와 시간을 보낼지 의식하게 함<\/td><td>D-28 선택 예고<\/td><\/tr><tr><td>D-28<\/td><td>금<\/td><td>첫 회차 프롤로그<\/td><td>첫 번째 선택<\/td><td>미연시처럼 보이지만 실제로는 재윤의 도피 성향을 드러냄<\/td><td>소하/서린/미루/혼자 축 가중<\/td><\/tr><tr><td>D-27<\/td><td>토<\/td><td>첫 회차 프롤로그<\/td><td>선택의 잔향<\/td><td>전날 선택이 메시지·물건·회상으로 남음<\/td><td>선택하지 않은 관계도 사라지지 않음<\/td><\/tr><tr><td>D-26<\/td><td>일<\/td><td>첫 회차 프롤로그<\/td><td>하연이 오기 전 마지막 평온함<\/td><td>아이스하키로 <code>빠른 몸<\/code>과 <code>늦은 마음<\/code>을 대비<\/td><td>D-25 짧은 꿈 피로의 원인<\/td><\/tr><tr><td>D-25<\/td><td>월<\/td><td>Week 1<\/td><td>짧은 꿈과 은하연 전학<\/td><td>하연 등장, 루프 시작점, 첫눈에 반함<\/td><td><code>HaYeonTrust<\/code> 시작<\/td><\/tr><tr><td>D-24<\/td><td>화<\/td><td>Week 1<\/td><td>말을 걸 수 있는 두 번째 기회<\/td><td>억지 접근이 아니라 하연의 속도를 기다리는 방식 시작<\/td><td><code>HaYeonTrust<\/code> 보정<\/td><\/tr><tr><td>D-23<\/td><td>수<\/td><td>Week 1<\/td><td>축제 이틀 일정 공지<\/td><td>축제 1일차/2일차와 D+3 방학식 예정이 공식화됨<\/td><td>목표 기간 고정<\/td><\/tr><tr><td>D-22<\/td><td>목<\/td><td>Week 1<\/td><td>우리 반은 뭘 할까<\/td><td>2학년 5반 반행사가 하연과 재윤의 기본 접점이 됨<\/td><td><code>쉬어가 카페<\/code> 전조<\/td><\/tr><tr><td>D-21<\/td><td>금<\/td><td>Week 1<\/td><td>처음 고르는 방과후<\/td><td>하연/소하/서린/미루/혼자 선택 구조 개방<\/td><td>병렬 루트 시작<\/td><\/tr><tr><td>D-20<\/td><td>토<\/td><td>Week 1<\/td><td>메신저에 쌓인 주말<\/td><td>여러 연락 중 하나만 선택하는 시간 제약 체감<\/td><td>회피/균형 관리<\/td><\/tr><tr><td>D-19<\/td><td>일<\/td><td>Week 1<\/td><td>빙판 위에서 정리한 것<\/td><td>하키를 통해 재윤의 자기 감각을 회복<\/td><td>Week 2 진입 완충<\/td><\/tr><tr><td>D-18<\/td><td>월<\/td><td>Week 2<\/td><td>2학년 5반 <code>쉬어가 카페<\/code> 확정<\/td><td>하연의 조용한 취향과 반행사 연결<\/td><td>하연 생활 접점 본격화<\/td><\/tr><tr><td>D-17<\/td><td>화<\/td><td>Week 2<\/td><td>들어와도 되고, 안 들어와도 되는 곳<\/td><td>하연이 편안함을 느끼는 공간 감각 제시<\/td><td><code>HaYeonPaceRead<\/code> 전조<\/td><\/tr><tr><td>D-16<\/td><td>수<\/td><td>Week 2<\/td><td>카페 문구와 서로의 속도<\/td><td>안내 문구와 배려를 통해 신뢰 형성<\/td><td>하연 신뢰 상승<\/td><\/tr><tr><td>D-15<\/td><td>목<\/td><td>Week 2<\/td><td>한 박자 늦게 돌아오는 대답<\/td><td>관계와 기억의 미세한 어긋남 시작<\/td><td>하연에게 감각을 말할 수 있는지 확인<\/td><\/tr><tr><td>D-14<\/td><td>금<\/td><td>Week 2<\/td><td>조금 빠른 대답들<\/td><td>기존 관계들이 재윤보다 먼저 반응하는 압박<\/td><td>주말 선택 예고<\/td><\/tr><tr><td>D-13<\/td><td>토<\/td><td>Week 2<\/td><td>먼저 와 있던 마음<\/td><td>하연 또는 소하 주말 이벤트<\/td><td>하연 신뢰 진전 또는 소하 과거 압박 강화<\/td><\/tr><tr><td>D-12<\/td><td>일<\/td><td>Week 2<\/td><td>먼저 준비된 답<\/td><td>서린 또는 미루 주말 이벤트<\/td><td>정답/의존 축 강화<\/td><\/tr><tr><td>D-11<\/td><td>월<\/td><td>Week 3<\/td><td>웃는 얼굴로 날이 서 있었다<\/td><td>축제 준비 언어가 관계 감정처럼 들리기 시작<\/td><td>관계 균열 진입<\/td><\/tr><tr><td>D-10<\/td><td>화<\/td><td>Week 3<\/td><td>익숙한 것들이 먼저 움직였다<\/td><td>소하/서린/미루가 재윤보다 먼저 움직이는 압박<\/td><td>기존 관계 압박 강화<\/td><\/tr><tr><td>D-9<\/td><td>수<\/td><td>Week 3<\/td><td>먼저 정리된 위험 / 정답을 물으러 간 방송실<\/td><td>방송 문구, 장비 체크표, 조명 프레임 단서와 서린 상담<\/td><td><code>AccidentClueSeoRin<\/code>, <code>SeoRinControl<\/code> 보정<\/td><\/tr><tr><td>D-8<\/td><td>목<\/td><td>Week 3<\/td><td>선을 붙잡고 있는 손<\/td><td>출입 제한 표지, 고정끈, 보고 대상 단서<\/td><td><code>AccidentClueMiRu<\/code><\/td><\/tr><tr><td>D-7<\/td><td>금<\/td><td>Week 3<\/td><td>하연에게 가려는 첫 큰 장애물<\/td><td>하연 선택과 기존 관계 압박이 동시에 부딪힘. D-9 상담 성공 시 재윤이 <code>정답<\/code> 대신 자기 이유를 말하려 함<\/td><td>하연 루트 중간 관문<\/td><\/tr><tr><td>D-6<\/td><td>토<\/td><td>Week 3<\/td><td>누구를 만나고 싶은지 고르는 주말<\/td><td>학교 밖 큰 이벤트<\/td><td>하연 신뢰 또는 기존 관계 정리 조건 확보<\/td><\/tr><tr><td>D-5<\/td><td>일<\/td><td>Week 3<\/td><td>혼자 선 무대의 예감<\/td><td>하연 신뢰에 따라 소무대 기억이 다르게 보임<\/td><td><code>HaYeonMemoryLink<\/code> 전조<\/td><\/tr><tr><td>D-4<\/td><td>월<\/td><td>Final Week<\/td><td>단서 정리 시작<\/td><td>소무대, 조명, 표지, 고정끈이 하나의 사고 그림으로 맞물림<\/td><td>Final Week 진입<\/td><\/tr><tr><td>D-3<\/td><td>화<\/td><td>Final Week<\/td><td>기존 관계 정리 클라이맥스<\/td><td>소하/서린/미루의 도피처를 정리하는 마지막 큰 구간<\/td><td><a href=\"./08_D-3_관계정리_클라이맥스.md\">08<\/a><\/td><\/tr><tr><td>D-2<\/td><td>수<\/td><td>Final Week<\/td><td>말하지 못한 예감<\/td><td>하연이 직접 약속하지 않고, 재윤이 하연의 동선을 이해함<\/td><td><a href=\"./09_D-2_말하지_못한_예감.md\">09<\/a><\/td><\/tr><tr><td>D-1<\/td><td>목<\/td><td>Final Week<\/td><td>축제 1일차 / <code>쉬어가 카페<\/code> 운영<\/td><td>하연의 속도, 단서 공유, 운영 협력을 최종 정산<\/td><td>D-Day 조건 직전 확인<\/td><\/tr><tr><td>D-Day<\/td><td>금<\/td><td>Final Week<\/td><td>축제 2일차 / 폐장 후 사고 / 엔딩 분기<\/td><td>낮 선택 보정 후, 폐장 후 성공/실패 분기<\/td><td><a href=\"./10_D-Day_축제마지막날_분기.md\">10<\/a><\/td><\/tr><tr><td>D+1<\/td><td>토<\/td><td>진엔딩 후<\/td><td>날짜 카드 없음<\/td><td>현실에서는 혼수 상태가 이어지지만 플레이어에게 별도 날짜로 강조하지 않음<\/td><td>암전 유지<\/td><\/tr><tr><td>D+2<\/td><td>일<\/td><td>진엔딩 후<\/td><td>병실 기상<\/td><td>진엔딩에서만 재윤이 일요일 오후 깨어남<\/td><td><a href=\"./05_엔딩과_루프.md\">05<\/a><\/td><\/tr><tr><td>D+3<\/td><td>월<\/td><td>진엔딩 후<\/td><td>방학식 / 처음 도달하는 월요일<\/td><td>실패 루프에서는 도달하지 못한 월요일을 진엔딩에서만 증명<\/td><td>크레딧 초안 <a href=\"./11_진엔딩_크레딧_콘티_초안.md\">11<\/a><\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-06날짜별진행달력-md-구간별-상세-배치\">구간별 상세 배치<\/h3>\n<h3 id=\"스토리-06날짜별진행달력-md-첫-회차-전용-프롤로그-d-32-d-26\">첫 회차 전용 프롤로그: D-32 ~ D-26<\/h3>\n<p>첫 회차 전용 프롤로그는 하연이 등장하기 전의 관계 지형을 보여준다. 루프 이후에는 반복하지 않는다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>목적<\/th><th>주요 장면<\/th><th>선택/정산<\/th><\/tr><\/thead><tbody><tr><td>D-32<\/td><td>소하 관계 소개<\/td><td>집 앞 등교, 오래된 습관, 교문 앞에서 2반/5반으로 갈라짐<\/td><td>소하와 같이 돌아가기 / 먼저 집에 가기. 소하의 미뤄둔 감정 기준점 생성<\/td><\/tr><tr><td>D-31<\/td><td>서린·미루 관계 소개<\/td><td>방송실 큐시트, 멘토링 노트, D+3 방학식 언급<\/td><td>서린을 돕기 / 미루를 돕기. 재윤이 책임을 떠안는 방식 제시<\/td><\/tr><tr><td>D-30<\/td><td>관계 교차<\/td><td>소하의 익숙함, 서린의 신뢰, 미루의 확인 욕구가 하루 안에 교차<\/td><td>누구에게 먼저 답하는지에 따라 초기 축 가중<\/td><\/tr><tr><td>D-29<\/td><td>첫 선택 예고<\/td><td>소하의 오래된 장소, 서린의 방송실, 미루의 질문, 혼자 보내기 예고<\/td><td>D-28 방과후 선택지를 정리<\/td><\/tr><tr><td>D-28<\/td><td>첫 선택 착각<\/td><td>기존 히로인 중 한 명 또는 혼자 보내기<\/td><td>연애 확정이 아니라 도피 성향 확인<\/td><\/tr><tr><td>D-27<\/td><td>선택의 잔향<\/td><td>전날 선택의 메시지, 물건, 회상<\/td><td>선택하지 않은 관계도 남아 있음을 보여줌<\/td><\/tr><tr><td>D-26<\/td><td>마지막 평온함<\/td><td>아이스하키 연습, 몸은 빠르지만 마음은 늦은 재윤<\/td><td>D-25 짧은 꿈과 피로로 연결<\/td><\/tr><\/tbody><\/table><\/div>\n<p>프롤로그의 핵심은 <code>재윤은 나쁜 의도로 거짓말하지 않지만, 누구에게도 분명히 말하지 않는 사람<\/code>이라는 점을 심는 것이다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-week-1-d-25-d-19-하연-등장과-축제-목표-고정\">Week 1: D-25 ~ D-19 / 하연 등장과 축제 목표 고정<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>목적<\/th><th>주요 장면<\/th><th>선택/정산<\/th><\/tr><\/thead><tbody><tr><td>D-25<\/td><td>하연 등장<\/td><td>짧은 꿈 후 피로한 등교, 은하연 전학, 재윤의 첫눈에 반함<\/td><td>억지 도움은 신뢰 상승 없음. 조용한 배려가 <code>HaYeonTrust<\/code> 시작점<\/td><\/tr><tr><td>D-24<\/td><td>두 번째 기회<\/td><td>하연에게 다시 말을 걸 수 있지만, 하연은 빠르게 가까워지지 않음<\/td><td>기다림을 선택하면 하연의 속도 이해 시작<\/td><\/tr><tr><td>D-23<\/td><td>축제 일정 공지<\/td><td>담임이 목·금 축제와 월요일 방학식을 안내<\/td><td>실패 루프에서 도달하지 못할 월요일이 처음 의미를 가짐<\/td><\/tr><tr><td>D-22<\/td><td>반행사 논의<\/td><td>2학년 5반 반행사 후보 논의<\/td><td>하연의 조용한 취향이 <code>쉬어가 카페<\/code> 방향으로 연결<\/td><\/tr><tr><td>D-21<\/td><td>병렬 선택 개방<\/td><td>하연/소하/서린/미루/혼자 방과후 선택<\/td><td>다섯 축을 모두 열고, 이후 균형 관리 시작<\/td><\/tr><tr><td>D-20<\/td><td>주말 연락<\/td><td>여러 연락이 쌓이고 하나만 고를 수 있음<\/td><td>시간 제약과 회피 누적을 체감<\/td><\/tr><tr><td>D-19<\/td><td>하키 완충<\/td><td>빙판 위에서 자기 몸의 속도를 회복<\/td><td>다음 주 카페 확정 전 자기 감각 보강<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Week 1의 목표는 하연을 특별한 선택지로 등장시키되, 기존 관계가 사라지지 않는다는 구조를 확정하는 것이다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-week-2-d-18-d-12-쉬어가-카페와-관계-확장\">Week 2: D-18 ~ D-12 / 쉬어가 카페와 관계 확장<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>목적<\/th><th>주요 장면<\/th><th>선택/정산<\/th><\/tr><\/thead><tbody><tr><td>D-18<\/td><td>카페 확정<\/td><td>2학년 5반 <code>쉬어가 카페<\/code> 확정<\/td><td>하연과 같은 반이라는 생활 접점 본격화<\/td><\/tr><tr><td>D-17<\/td><td>공간 감각<\/td><td>하연이 편안함을 느끼는 조용한 자리 제시<\/td><td><code>HaYeonPaceRead<\/code> 전조<\/td><\/tr><tr><td>D-16<\/td><td>문구 조율<\/td><td><code>쉬어가도 괜찮다<\/code>는 방향의 안내 문구 조율<\/td><td>하연의 말투와 재윤의 배려가 맞물림<\/td><\/tr><tr><td>D-15<\/td><td>어긋남 시작<\/td><td>한 박자 늦게 돌아오는 대답, 기억의 미세한 흔들림<\/td><td>감각을 하연에게 말할 수 있는지 확인<\/td><\/tr><tr><td>D-14<\/td><td>기존 관계 압박<\/td><td>소하/서린/미루가 재윤보다 먼저 반응<\/td><td>주말 이벤트 전 선택 압박 상승<\/td><\/tr><tr><td>D-13<\/td><td>하연/소하 주말<\/td><td>하연은 조용한 신뢰, 소하는 익숙한 과거<\/td><td>하연 신뢰 상승 또는 소하 압박 강화<\/td><\/tr><tr><td>D-12<\/td><td>서린/미루 주말<\/td><td>서린은 정답과 순서, 미루는 멘토링 종료 불안<\/td><td>Week 3 전 정답/의존 축 강화<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Week 2의 목표는 하연과의 관계를 <code>고백 직행<\/code>이 아니라 <code>편히 머무를 수 있는 공간을 함께 만드는 경험<\/code>으로 쌓는 것이다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-week-3-d-11-d-5-관계-균열과-사고-단서\">Week 3: D-11 ~ D-5 / 관계 균열과 사고 단서<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>목적<\/th><th>주요 장면<\/th><th>선택/정산<\/th><\/tr><\/thead><tbody><tr><td>D-11<\/td><td>균열 진입<\/td><td>축제 준비 언어가 감정 압박처럼 들리기 시작<\/td><td>학교 일상 안에서 관계 균열 체감<\/td><\/tr><tr><td>D-10<\/td><td>기존 관계 압박<\/td><td>세 기존 관계가 재윤보다 먼저 움직임<\/td><td>하연 선택 전 붙잡는 힘 강화<\/td><\/tr><tr><td>D-9<\/td><td>서린 단서와 상담<\/td><td>방송실, 큐시트, 장비 체크표, 조명 프레임, 마음 기준 상담<\/td><td><code>AccidentClueSeoRin<\/code> 획득 가능. <code>[정답이 아니라, 내가 고를 이유를 찾는다]<\/code> 선택 시 <code>SeoRinControl<\/code> 감소<\/td><\/tr><tr><td>D-8<\/td><td>미루 단서<\/td><td>출입 제한 표지, 고정끈, 보고 대상<\/td><td><code>AccidentClueMiRu<\/code> 획득 가능<\/td><\/tr><tr><td>D-7<\/td><td>하연 관문<\/td><td>하연에게 가려는 선택과 기존 관계 압박이 충돌. D-9 상담 결과에 따라 재윤이 자기 이유를 말할 수 있는지가 달라짐<\/td><td>하연 루트 중간 관문, <code>HaYeonTrust<\/code> 중요<\/td><\/tr><tr><td>D-6<\/td><td>큰 주말 선택<\/td><td>하연 또는 기존 관계의 학교 밖 큰 이벤트<\/td><td>하연 신뢰 또는 D-3 정리 조건 확보<\/td><\/tr><tr><td>D-5<\/td><td>소무대 예감<\/td><td>신뢰 부족 시 혼자 선 무대, 충분 시 누군가와 함께 있던 밤의 감각<\/td><td><code>HaYeonMemoryLink<\/code> 전조<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Week 3의 목표는 사고 단서를 정보로만 주지 않고, 관계를 정리하지 못하면 단서의 의미가 비어 보이게 만드는 것이다.<\/p>\n<p>D-9의 서린 상담은 이 구간의 감정 축을 보강한다. 재윤은 하연에게 가고 싶은 마음을 <code>좋아함<\/code>, 소하에게 느끼는 미안함을 <code>의무<\/code>, 미루를 챙기는 습관을 <code>책임감<\/code>으로 구분하지 못한 채 서린에게 정답을 묻는다. 여기서 서린이 기준을 나눠주되 결론을 대신 고르지 않으면, D-7 하연 관문에서 재윤은 하연에게 가는 이유를 남에게 빌리지 않고 말할 수 있다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-final-week-d-4-d-day-최종-정리와-분기\">Final Week: D-4 ~ D-Day / 최종 정리와 분기<\/h3>\n<p>Final Week는 최신 상세 문서와 반드시 함께 본다.<\/p>\n<h4 id=\"스토리-06날짜별진행달력-md-d-4-월요일-단서-정리-시작\">D-4 월요일: 단서 정리 시작<\/h4>\n<ul>\n<li>소무대, 조명 프레임, 출입 제한 표지, 고정끈, 폐장 안내 방송이 하나의 사고 그림으로 맞물리기 시작한다.<\/li>\n<li>단서가 충분해도 하연과 공유하지 않으면 진엔딩 조건이 완성되지 않는다.<\/li>\n<li>D-3 관계 정리 전에 플레이어가 어떤 축이 부족한지 감정적으로 느끼게 한다.<\/li>\n<\/ul>\n<p>정산:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>D-3 영향<\/th><\/tr><\/thead><tbody><tr><td>사고 단서 충분 + 관계 압박 높음<\/td><td>D-3 클라이맥스에서 단서와 감정 압박이 함께 등장<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>D-Day 낮의 <code>혼자 야외 소무대 쪽을 본다<\/code> 선택 필요성이 커짐<\/td><\/tr><tr><td>하연 신뢰 부족<\/td><td>D-2에서 하연의 침묵을 읽기 어려움<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-06날짜별진행달력-md-d-3-화요일-기존-관계-정리-클라이맥스\">D-3 화요일: 기존 관계 정리 클라이맥스<\/h4>\n<p>상세 기준 문서: <a href=\"./08_D-3_관계정리_클라이맥스.md\">D-3 관계 정리 클라이맥스<\/a><\/p>\n<p>D-3의 목적은 소하/서린/미루를 탈락시키는 것이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 세 가지 도피처를 정리하는 것이다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>관계<\/th><th>도피처<\/th><th>성공 선택 의미<\/th><th>실패 시 위험<\/th><\/tr><\/thead><tbody><tr><td>소하<\/td><td>아무 일도 없던 과거<\/td><td>지금의 마음까지 말한다<\/td><td>예전처럼 돌아가는 따뜻한 새드엔딩 강화<\/td><\/tr><tr><td>서린<\/td><td>정답과 순서<\/td><td>내가 선택할게<\/td><td>안전하지만 선택 없는 새드엔딩 강화<\/td><\/tr><tr><td>미루<\/td><td>필요한 사람 역할<\/td><td>먼저 해보게 한다<\/td><td>닫힌 방과 멘토링 미종료 새드엔딩 강화<\/td><\/tr><\/tbody><\/table><\/div>\n<p>D-3 정산:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>결과<\/th><th>D-2 영향<\/th><th>D-Day 영향<\/th><\/tr><\/thead><tbody><tr><td>세 관계 모두 정리<\/td><td>하연의 시선, 침묵, 소무대 방향이 선명하게 읽힘<\/td><td><code>[하연에게 말하러 간다]<\/code> 조건 안정<\/td><\/tr><tr><td>한 축 미정리<\/td><td>D-2 장면에 해당 인물의 왜곡 이미지가 끼어듦<\/td><td>D-Day 낮 선택에서 마지막 보정 가능<\/td><\/tr><tr><td>둘 이상 미정리<\/td><td>하연 동선 이해가 크게 약화<\/td><td>성공 선택지가 잠기거나 새드엔딩 우선<\/td><\/tr><tr><td>하연 신뢰 부족 + 관계 미정리<\/td><td>하연의 침묵을 도피처럼 오해<\/td><td>하연 실패 루프 우선<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-06날짜별진행달력-md-d-2-수요일-말하지-못한-예감\">D-2 수요일: 말하지 못한 예감<\/h4>\n<p>상세 기준 문서: <a href=\"./09_D-2_말하지_못한_예감.md\">D-2 말하지 못한 예감<\/a><\/p>\n<p>D-2의 핵심은 고백도 약속도 아니다. 하연이 먼저 <code>축제가 끝나고 보자<\/code>고 말하지 않는다. 대신 재윤이 하연의 침묵과 조용한 동선을 이해한다.<\/p>\n<p>핵심 장면:<\/p>\n<ul>\n<li>축제 준비가 거의 끝난 2학년 5반 교실<\/li>\n<li>하연이 시끄러운 축제 중심보다 조용한 가장자리를 바라봄<\/li>\n<li>방학식과 폐장 후 이야기가 지나가지만, 명시적 약속은 잡히지 않음<\/li>\n<li>재윤이 하연의 속도를 이해하면 <code>HaYeonPaceRead<\/code>와 <code>AccidentClueHaYeon<\/code>이 강화됨<\/li>\n<\/ul>\n<p>D-2 성공 기준:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>조건<\/th><th>성공 의미<\/th><\/tr><\/thead><tbody><tr><td>D-3 관계 정리 충분<\/td><td>하연의 침묵을 도피가 아니라 마음을 정리하는 방식으로 이해<\/td><\/tr><tr><td>하연 신뢰 충분<\/td><td>하연이 조용한 자리와 폐장 후 감각을 자연스럽게 드러냄<\/td><\/tr><tr><td>재윤이 성급히 묻지 않음<\/td><td>하연을 불러내는 약속이 아니라, 하연을 이해하는 감각 획득<\/td><\/tr><\/tbody><\/table><\/div>\n<p>D-2 실패 시:<\/p>\n<ul>\n<li>재윤은 하연이 왜 조용한 곳을 보는지 읽지 못한다.<\/li>\n<li>폐장 후 하연이 보이지 않아도 어디로 갔는지 알아차리지 못한다.<\/li>\n<li>D-Day에서 하연 실패 루프 조건이 강해진다.<\/li>\n<\/ul>\n<h4 id=\"스토리-06날짜별진행달력-md-d-1-목요일-축제-1일차-쉬어가-카페-운영\">D-1 목요일: 축제 1일차 / <code>쉬어가 카페<\/code> 운영<\/h4>\n<p>D-1은 하연과 재윤이 같은 운영 시간대에서 실제로 협력하는 날이다.<\/p>\n<p>주요 역할:<\/p>\n<ul>\n<li><code>쉬어가 카페<\/code>가 하연의 취향과 반 분위기를 동시에 담는 공간으로 완성된다.<\/li>\n<li>하연의 조용한 자리 선호와 재윤의 배려가 실제 운영 속에서 확인된다.<\/li>\n<li>기존 관계 정리 여부가 짧은 방문/대화로 확인된다.<\/li>\n<li>사고 단서를 혼자만 들고 있지 않고 하연과 공유할 수 있는지 마지막으로 본다.<\/li>\n<\/ul>\n<p>D-1 밤 정산:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>정산 축<\/th><th>충분할 때<\/th><th>부족할 때<\/th><\/tr><\/thead><tbody><tr><td>혼자 들지 않은 단서<\/td><td>하연과 사고 감각이 연결됨<\/td><td>단서는 있어도 하연이 사고 기억에서 빠질 위험<\/td><\/tr><tr><td>숨지 않은 관계<\/td><td>소하/서린/미루가 하연 선택을 흐리지 않음<\/td><td>D-Day 낮에 마지막 보정 필요<\/td><\/tr><tr><td>직접 말하러 갈 마음<\/td><td>폐장 후 선택의 주체가 재윤이 됨<\/td><td>하연이 먼저 불러주기를 기다리는 상태로 흔들림<\/td><\/tr><\/tbody><\/table><\/div>\n<p>D-1의 끝은 고백이 아니라 <code>내일 직접 말해야 한다<\/code>는 압박으로 끝난다.<\/p>\n<h4 id=\"스토리-06날짜별진행달력-md-d-day-금요일-축제-2일차-폐장-후-사고-엔딩-분기\">D-Day 금요일: 축제 2일차 / 폐장 후 사고 / 엔딩 분기<\/h4>\n<p>상세 기준 문서: <a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a> / 실제 스크립트 단위: <a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a><\/p>\n<p>D-Day 낮에는 부족한 축을 마지막으로 보정할 수 있다. 밤에는 더 이상 보정하지 않고 성공/실패를 판정한다. 점수와 우선순위 기준은 <a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>를 따른다.<\/p>\n<p>낮 선택:<\/p>\n<pre><code>[하연과 축제를 둘러본다]\n[소하와 마지막으로 오래된 길을 걷는다]\n[서린의 방송 마무리를 돕는다]\n[미루의 도움 인원 마무리를 확인한다]\n[혼자 야외 소무대 쪽을 본다]<\/code><\/pre>\n<p>낮 선택 역할:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>낮 선택<\/th><th>보정/확정되는 것<\/th><th>폐장 후 영향<\/th><\/tr><\/thead><tbody><tr><td>하연<\/td><td>상호 신뢰, 단서 공유, 하연 동선 이해<\/td><td>충분하면 하연이 있을 곳을 스스로 알아차림<\/td><\/tr><tr><td>소하<\/td><td>과거 미련 정리 또는 잔류 확정<\/td><td>실패 시 하연 선택이 새 관계 도피처럼 흔들림<\/td><\/tr><tr><td>서린<\/td><td>정답 의존 정리 또는 잔류 확정<\/td><td>실패 시 자기 선택 확신 약화<\/td><\/tr><tr><td>미루<\/td><td>의존 미련 정리 또는 잔류 확정<\/td><td>실패 시 필요한 사람 역할에 붙잡힘<\/td><\/tr><tr><td>혼자<\/td><td>사고 단서 직접 보강<\/td><td>하연과 공유하지 않으면 가장 중요한 연결이 비어 있음<\/td><\/tr><\/tbody><\/table><\/div>\n<p>폐장 후 성공:<\/p>\n<ul>\n<li>하연이 먼저 약속 장소를 지정하지 않는다.<\/li>\n<li>재윤이 하연의 동선을 이해해 직접 찾아간다.<\/li>\n<li>재윤이 먼저 자기 마음과 선택을 말한다.<\/li>\n<li>하연도 기다렸고 말하려 했음을 확인한다.<\/li>\n<li>사고는 사라지지 않지만, <code>하연에게 말하러 가던 선택의 결과<\/code>로 기억된다.<\/li>\n<li>D+2 일요일 병실 기상, D+3 월요일 방학식, 진엔딩 크레딧으로 이어진다.<\/li>\n<\/ul>\n<p>폐장 후 실패:<\/p>\n<ul>\n<li>하연이 사고 기억에서 빠진다.<\/li>\n<li>재윤은 왜 소무대에 왔는지, 누구에게 말하려 했는지 기억하지 못한다.<\/li>\n<li>장소와 단서는 남지만 가장 중요한 사람이 비어 있다.<\/li>\n<li>사고 후 D-25 월요일 아침으로 루프한다.<\/li>\n<li>완성된 엔딩 크레딧과 방학 후일담은 나오지 않는다.<\/li>\n<\/ul>\n<h3 id=\"스토리-06날짜별진행달력-md-진엔딩-후-날짜-처리\">진엔딩 후 날짜 처리<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>날짜<\/th><th>플레이어 체감<\/th><th>실제 의미<\/th><th>연출 기준<\/th><\/tr><\/thead><tbody><tr><td>D+1 토요일<\/td><td>날짜 카드 없음<\/td><td>재윤은 아직 깨어나지 못함<\/td><td>암전 또는 소리만 남기고 지나감<\/td><\/tr><tr><td>D+2 일요일<\/td><td>병실 기상<\/td><td>재윤이 돌아올 이유를 찾아 깨어남<\/td><td>하연의 존재와 현실 회복을 조용히 확인<\/td><\/tr><tr><td>D+3 월요일<\/td><td>방학식<\/td><td>루프에서 도달하지 못한 다음 월요일에 처음 도달<\/td><td>짧고 무리하지 않는 참석, 이후 방학 후일담 암시<\/td><\/tr><\/tbody><\/table><\/div>\n<p>D+3 방학식 이후에는 <a href=\"./11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a>으로 연결한다.<\/p>\n<p>크레딧 연결 기준:<\/p>\n<ul>\n<li>병원 재검사<\/li>\n<li>학교 도서관<\/li>\n<li>버스 정류장<\/li>\n<li>작은 카페<\/li>\n<li>밝은 산책길<\/li>\n<li>휴대폰 캘린더의 작은 약속<\/li>\n<\/ul>\n<p>이 컷들은 <code>연애가 완성되었다<\/code>가 아니라 <code>방학 동안 두 사람이 계속 만날 수 있다<\/code>는 암시로 사용한다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-비진엔딩-날짜-처리\">비진엔딩 날짜 처리<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>엔딩<\/th><th>D+1~D+3 처리<\/th><th>크레딧 처리<\/th><\/tr><\/thead><tbody><tr><td>하연 실패 루프<\/td><td>D+3 방학식 미도달. D-25 월요일 아침으로 복귀<\/td><td>없음 또는 끊긴 피아노 몇 음<\/td><\/tr><tr><td>소하 새드엔딩<\/td><td>방학식 안내문은 보이나 날짜가 앞으로 흐르지 않음<\/td><td>짧고 따뜻한 가짜 크레딧 가능<\/td><\/tr><tr><td>서린 새드엔딩<\/td><td>월요일까지 적힌 일정표는 있으나 시계가 멈춤<\/td><td>차갑고 정돈된 가짜 크레딧 가능<\/td><\/tr><tr><td>미루 새드엔딩<\/td><td>방학식은 문밖에 있지만 문을 열지 못함<\/td><td>달콤하지만 불안한 가짜 크레딧 가능<\/td><\/tr><tr><td>히든 붕괴<\/td><td>월요일 교실과 축제 마지막 밤이 뒤섞임<\/td><td>이름, 날짜, 음악이 깨지는 붕괴 크레딧 가능<\/td><\/tr><\/tbody><\/table><\/div>\n<p>완성된 엔딩곡과 방학 후일담 애니메이션은 진엔딩 전용 보상으로 남긴다.<\/p>\n<h3 id=\"스토리-06날짜별진행달력-md-날짜별-의존-관계\">날짜별 의존 관계<\/h3>\n<pre><code>D-32 ~ D-26\n기존 관계 기준점 형성\n        ↓\nD-25 ~ D-19\n하연 등장, 축제 목표 고정, 병렬 선택 개방\n        ↓\nD-18 ~ D-12\n쉬어가 카페, 하연 신뢰, 기존 관계 압박 확대\n        ↓\nD-11 ~ D-5\n관계 균열, 사고 단서, 소무대 예감\n        ↓\nD-4\n단서 정리 시작\n        ↓\nD-3\n소하/서린/미루 도피처 정리\n        ↓\nD-2\n하연의 침묵과 동선 이해\n        ↓\nD-1\n쉬어가 카페 운영, 단서 공유, 직접 말할 마음 정산\n        ↓\nD-Day 낮\n부족한 축 마지막 보정\n        ↓\nD-Day 폐장 후\n재윤이 직접 찾아가면 진엔딩 / 하연이 빠지면 실패 루프\n        ↓\nD+2, D+3\n진엔딩에서만 현실 복귀와 방학식 도달<\/code><\/pre>\n<h3 id=\"스토리-06날짜별진행달력-md-다음-설계-과제\">다음 설계 과제<\/h3>\n<ol>\n<li>진엔딩의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다.<\/li>\n<li>D-Day 스크립트 분할을 시스템 설계 문서의 StoryFlow Scene/Branch/Transition 구조와 맞춘다.<\/li>\n<li>크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "날짜별 진행 달력", "id": "스토리-06날짜별진행달력-md-날짜별-진행-달력"}, {"level": 2, "text": "목적", "id": "스토리-06날짜별진행달력-md-목적"}, {"level": 2, "text": "확정 시간 구조", "id": "스토리-06날짜별진행달력-md-확정-시간-구조"}, {"level": 2, "text": "표기 원칙", "id": "스토리-06날짜별진행달력-md-표기-원칙"}, {"level": 2, "text": "전체 설계 원칙", "id": "스토리-06날짜별진행달력-md-전체-설계-원칙"}, {"level": 2, "text": "핵심 플래그 축", "id": "스토리-06날짜별진행달력-md-핵심-플래그-축"}, {"level": 2, "text": "마스터 달력", "id": "스토리-06날짜별진행달력-md-마스터-달력"}, {"level": 2, "text": "구간별 상세 배치", "id": "스토리-06날짜별진행달력-md-구간별-상세-배치"}, {"level": 2, "text": "첫 회차 전용 프롤로그: D-32 ~ D-26", "id": "스토리-06날짜별진행달력-md-첫-회차-전용-프롤로그-d-32-d-26"}, {"level": 2, "text": "Week 1: D-25 ~ D-19 / 하연 등장과 축제 목표 고정", "id": "스토리-06날짜별진행달력-md-week-1-d-25-d-19-하연-등장과-축제-목표-고정"}, {"level": 2, "text": "Week 2: D-18 ~ D-12 / 쉬어가 카페와 관계 확장", "id": "스토리-06날짜별진행달력-md-week-2-d-18-d-12-쉬어가-카페와-관계-확장"}, {"level": 2, "text": "Week 3: D-11 ~ D-5 / 관계 균열과 사고 단서", "id": "스토리-06날짜별진행달력-md-week-3-d-11-d-5-관계-균열과-사고-단서"}, {"level": 2, "text": "Final Week: D-4 ~ D-Day / 최종 정리와 분기", "id": "스토리-06날짜별진행달력-md-final-week-d-4-d-day-최종-정리와-분기"}, {"level": 3, "text": "D-4 월요일: 단서 정리 시작", "id": "스토리-06날짜별진행달력-md-d-4-월요일-단서-정리-시작"}, {"level": 3, "text": "D-3 화요일: 기존 관계 정리 클라이맥스", "id": "스토리-06날짜별진행달력-md-d-3-화요일-기존-관계-정리-클라이맥스"}, {"level": 3, "text": "D-2 수요일: 말하지 못한 예감", "id": "스토리-06날짜별진행달력-md-d-2-수요일-말하지-못한-예감"}, {"level": 3, "text": "D-1 목요일: 축제 1일차 / `쉬어가 카페` 운영", "id": "스토리-06날짜별진행달력-md-d-1-목요일-축제-1일차-쉬어가-카페-운영"}, {"level": 3, "text": "D-Day 금요일: 축제 2일차 / 폐장 후 사고 / 엔딩 분기", "id": "스토리-06날짜별진행달력-md-d-day-금요일-축제-2일차-폐장-후-사고-엔딩-분기"}, {"level": 2, "text": "진엔딩 후 날짜 처리", "id": "스토리-06날짜별진행달력-md-진엔딩-후-날짜-처리"}, {"level": 2, "text": "비진엔딩 날짜 처리", "id": "스토리-06날짜별진행달력-md-비진엔딩-날짜-처리"}, {"level": 2, "text": "날짜별 의존 관계", "id": "스토리-06날짜별진행달력-md-날짜별-의존-관계"}, {"level": 2, "text": "다음 설계 과제", "id": "스토리-06날짜별진행달력-md-다음-설계-과제"}], "plain": "# 날짜별 진행 달력 ## 목적 이 문서는 전체 스토리의 날짜별 배치 기준을 한눈에 확인하기 위한 마스터 달력이다. 개별 장면의 긴 대본을 모두 담기보다, 각 날짜가 어떤 감정 축·플래그·후속 문서와 연결되는지 정리한다. 실제 대본 수준으로 확장된 클라이맥스는 아래 문서를 우선 기준으로 삼는다. - [D-3 관계 정리 클라이맥스](./08_D-3_관계정리_클라이맥스.md) - [D-2 말하지 못한 예감](./09_D-2_말하지_못한_예감.md) - [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md) - [진엔딩 크레딧 콘티 초안](./11_진엔딩_크레딧_콘티_초안.md) - [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md) - [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md) ## 확정 시간 구조 ```text 첫 회차 시작: D-32 월요일 은하연 전학 / 루프 시작점: D-25 월요일 축제 이틀 일정 공지: D-23 수요일 축제 1일차: D-1 목요일 축제 2일차 / 사고 / 엔딩 분기: D-Day 금요일 D+1 토요일: 날짜 카드로 보여주지 않음. 현실에서는 혼수 상태가 이어짐 D+2 일요일: 진엔딩에서 병실 기상 D+3 월요일: 진엔딩에서만 방학식 도달 ``` 첫 회차에서는 D-32부터 D-26까지 기존 히로인들과의 관계를 먼저 보여준다. 루프 이후에는 이 프롤로그 주간을 반복하지 않고 D-25 은하연 전학 직전으로 돌아간다. 실패 루프에서는 D-Day 금요일 사고 이후 D+1, D+2, D+3을 플레이어가 정상적으로 경험하지 못한다. 진엔딩에서만 토요일을 날짜 카드 없이 건너뛰고 D+2 일요일 병실 기상, D+3 월요일 방학식으로 이어진다. ## 표기 원칙 - `D-Day`는 내부 기획/시스템 기준일 이름이다. - 게임 내 대사와 UI에서는 `D-Day`라고 부르지 않는다. - 게임 내에서는 `축제 2일차`, `축제 마지막 날`, `금요일`, `폐장 후`처럼 표현한다. - `D-1`도 게임 내에서는 `축제 1일차`, `축제 첫날`, `목요일`처럼 표현한다. - D+1 토요일은 별도 날짜 카드로 보여주지 않는다. 진엔딩에서는 암전 뒤 D+2 일요일 오후 병실로 바로 연결한다. ## 전체 설계 원칙 - 하연 루트는 억지 고백이나 약속 예약이 아니라, 재윤이 하연의 속도와 동선을 이해해 직접 찾아가는 구조다. - 하연이 먼저 `축제가 끝나고 보자`고 약속을 잡지 않는다. - D-3은 소하/서린/미루와의 관계를 끝내는 날이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 도피처를 정리하는 날이다. - D-2는 고백도 약속도 아니다. 재윤이 하연의 침묵과 조용한 자리 선호를 이해하는 예감의 날이다. - D-Day 낮 선택은 부족한 축의 마지막 보정 기회다. - D-Day 폐장 후 성공은 하연의 호출 보상이 아니라, 재윤이 직접 하연에게 말하러 가는 선택의 결과다. - 사고 단서는 사고를 막기 위한 정보가 아니라, 다친 기억까지 안고 현실로 돌아가기 위한 기억 조각이다. - 비진엔딩에서는 방학이 실제로 시작되지 않는다. 완성된 엔딩 크레딧과 방학 후일담 컷은 진엔딩 전용이다. ## 핵심 플래그 축 | 축 | 대표 플래그 | 의미 | 주요 날짜 | | --- | --- | --- | --- | | 하연 신뢰 | `HaYeonTrust` | 하연이 재윤을 불편해하지 않고 자기 속도를 보여줄 수 있는지 | D-25~D-1 | | 하연 동선 이해 | `HaYeonPaceRead` | 하연이 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해했는지 | D-17, D-16, D-2, D-Day | | 하연 기억 연결 | `HaYeonMemoryLink` | 사고 기억에서 하연이 빠지지 않도록 연결되는 감각 | D-5, D-2, D-Day | | 소하 정리 | `SoHaResolved` | 익숙한 과거로 돌아가 숨는 길을 정리했는지 | D-13, D-7, D-3, D-Day | | 서린 정리 | `SeoRinResolved` | 정답과 순서 뒤에 숨는 길을 정리했는지 | D-12, D-9, D-3, D-Day | | 미루 정리 | `MiRuResolved` | 필요한 사람으로 남기 위해 자기 마음을 미루는 길을 정리했는지 | D-12, D-8, D-3, D-Day | | 사고 단서 | `AccidentClue*` | 소무대, 조명 프레임, 표지, 고정끈, 폐장 방송이 연결되는지 | D-9~D-Day | | 회피 누적 | `Avoidance` 말하지 않지만, 누구에게도 분명히 말하지 않는 사람`이라는 점을 심는 것이다. ## Week 1: D-25 ~ D-19 / 하연 등장과 축제 목표 고정 | 날짜 | 목적 | 주요 장면 | 선택/정산 | | --- | --- | --- | --- | | D-25 | 하연 등장 | 짧은 꿈 후 피로한 등교, 은하연 전학, 재윤의 첫눈에 반함 | 억지 도움은 신뢰 상승 없음. 조용한 배려가 `HaYeonTrust` 시작점 | | D-24 | 두 번째 기회 | 하연에게 다시 말을 걸 수 있지만, 하연은 빠르게 가까워지지 않음 | 기다림을 선택하면 하연의 속도 이해 시작 | | D-23 | 축제 일정 공지 | 담임이 목·금 축제와 월요일 방학식을 안내 | 실패 루프에서 도달하지 못할 월요일이 처음 의미를 가짐 | | D-22 | 반행사 논의 | 2학년 5반 반행사 후보 논의 | 하연의 조용한 취향이 `쉬어가 카페` 방향으로 연결 | | D-21 | 병렬 선택 개방 | 하연/소하/서린/미루/혼자 방과후 선택 | 다섯 축을 모두 열고, 이후 균형 관리 시작 | | D-20 | 주말 연락 | 여러 연락이 쌓이고 하나만 고를 수 있음 | 시간 제약과 회피 누적을 체감 | | D-19 | 하키 완충 | 빙판 위에서 자기 몸의 속도를 회복 | 다음 주 카페 확정 전 자기 감각 보강 | Week 1의 목표는 하연을 특별한 선택지로 등장시키되, 기존 관계가 사라지지 않는다는 구조를 확정하는 것이다. ## Week 2: D-18 ~ D-12 / 쉬어가 카페와 관계 확장 | 날짜 | 목적 | 주요 장면 | 선택/정산 | | --- | --- | --- | --- | | D-18 | 카페 확정 | 2학년 5반 `쉬어가 카페` 확정 | 하연과 같은 반이라는 생활 접점 본격화 | | D-17 | 공간 감각 | 하연이 편안함을 느끼는 조용한 자리 제시 | `HaYeonPaceRead` 전조 | | D-16 | 문구 조율 | `쉬어가도 괜찮다`는 방향의 안내 문구 조율 | 하연의 말투와 재윤의 배려가 맞물림 | | D-15 | 어긋남 시작 | 한 박자 늦게 돌아오는 대답, 기억의 미세한 흔들림 | 감각을 하연에게 말할 수 있는지 확인 | | D-14 | 기존 관계 압박 | 소하/서린/미루가 재윤보다 먼저 반응 | 주말 이벤트 전 선택 압박 상승 | | D-13 | 하연/소하 주말 | 하연은 조용한 신뢰, 소하는 익숙한 과거 | 하연 신뢰 상승 또는 소하 압박 강화 | | D-12 | 서린/미루 주말 | 서린은 정답과 순서, 미루는 멘토링 종료 불안 | Week 3 전 정답/의존 축 강화 | Week 2의 목표는 하연과의 관계를 `고백 직행`이 아니라 `편히 머무를 수 있는 공간을 함께 만드는 경험`으로 쌓는 것이다. ## Week 3: D-11 ~ D-5 / 관계 균열과 사고 단서 | 날짜 | 목적 | 주요 장면 | 선택/정산 | | --- | --- | --- | --- | | D-11 | 균열 진입 | 축제 준비 언어가 감정 압박처럼 들리기 시작 | 학교 일상 안에서 관계 균열 체감 | | D-10 | 기존 관계 압박 | 세 기존 관계가 재윤보다 먼저 움직임 | 하연 선택 전 붙잡는 힘 강화 | | D-9 | 서린 단서와 상담 | 방송실, 큐시트, 장비 체크표, 조명 프레임, 마음 기준 상담 | `AccidentClueSeoRin` 획득 가능. `[정답이 아니라, 내가 고를 이유를 찾는다]` 선택 시 `SeoRinControl` 감소 | | D-8 | 미루 단서 | 출입 제한 표지, 고정끈, 보고 대상 | `AccidentClueMiRu` 획득 가능 | | D-7 | 하연 관문 | 하연에게 가려는 선택과 기존 관계 압박이 충돌. D-9 상담 결과에 따라 재윤이 자기 이유를 말할 수 있는지가 달라짐 | 하연 루트 중간 관문, `HaYeonTrust` 중요 | | D-6 | 큰 주말 선택 | 하연 또는 기존 관계의 학교 밖 큰 이벤트 | 하연 신뢰 또는 D-3 정리 조건 확보 | | D-5 | 소무대 예감 | 신뢰 부족 시 혼자 선 무대, 충분 시 누군가와 함께 있던 밤의 감각 | `HaYeonMemoryLink` 전조 | Week 3의 목표는 사고 단서를 정보로만 주지 않고, 관계를 정리하지 못하면 단서의 의미가 비어 보이게 만드는 것이다. D-9의 서린 상담은 이 구간의 감정 축을 보강한다. 재윤은 하연에게 가고 싶은 마음을 `좋아함`, 소하에게 느끼는 미안함을 `의무`, 미루를 챙기는 습관을 `책임감`으로 구분하지 못한 채 서린에게 정답을 묻는다. 여기서 서린이 기준을 나눠주되 결론을 대신 고르지 않으면, D-7 하연 관문에서 재윤은 하연에게 가는 이유를 남에게 빌리지 않고 말할 수 있다. ## Final Week: D-4 ~ D-Day / 최종 정리와 분기 Final Week는 최신 상세 문서와 반드시 함께 본다. ### D-4 월요일: 단서 정리 시작 - 소무대, 조명 프레임, 출입 제한 표지, 고정끈, 폐장 안내 방송이 하나의 사고 그림으로 맞물리기 시작한다. - 단서가 충분해도 하연과 공유하지 않으면 진엔딩 조건이 완성되지 않는다. - D-3 관계 정리 전에 플레이어가 어떤 축이 부족한지 감정적으로 느끼게 한다. 정산: | 상태 | D-3 영향 | | --- | --- | | 사고 단서 충분 + 관계 압박 높음 | D-3 클라이맥스에서 단서와 감정 압박이 함께 등장 | | 사고 단서 부족 | D-Day 낮의 `혼자 야외 소무대 쪽을 본다` 선택 필요성이 커짐 | | 하연 신뢰 부족 | D-2에서 하연의 침묵을 읽기 어려움 | ### D-3 화요일: 기존 관계 정리 클라이맥스 상세 기준 문서: [D-3 관계 정리 클라이맥스](./08_D-3_관계정리_클라이맥스.md) D-3의 목적은 소하/서린/미루를 탈락시키는 것이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 세 가지 도피처를 정리하는 것이다. | 관계 | 도피처 | 성공 선택 의미 | 실패 시 위험 | | --- | --- | --- | --- | | 소하 | 아무 일도 없던 과거 | 지금의 마음까지 말한다 | 예전처럼 돌아가는 따뜻한 새드엔딩 강화 | | 서린 | 정답과 순서 | 내가 선택할게 | 안전하지만 선택 없는 새드엔딩 강화 | | 미루 | 필요한 사람 역할 | 먼저 해보게 한다 | 닫힌 방과 멘토링 미종료 새드엔딩 강화 | D-3 정산: | 결과 | D-2 영향 | D-Day 영향 | | --- | --- | --- | | 세 관계 모두 정리 | 하연의 시선, 침묵, 소무대 방향이 선명하게 읽힘 | `[하연에게 말하러 간다]` 조건 안정 | | 한 축 미정리 | D-2 장면에 해당 인물의 왜곡 이미지가 끼어듦 | D-Day 낮 선택에서 마지막 보정 가능 | | 둘 이상 미정리 | 하연 동선 이해가 크게 약화 | 성공 선택지가 잠기거나 새드엔딩 우선 | | 하연 신뢰 부족 + 관계 미정리 | 하연의 침묵을 도피처럼 오해 | 하연 실패 루프 우선 | ### D-2 수요일: 말하지 못한 예감 상세 기준 문서: [D-2 말하지 못한 예감](./09_D-2_말하지_못한_예감.md) D-2의 핵심은 고백도 약속도 아니다. 하연이 먼저 `축제가 끝나고 보자`고 말하지 않는다. 대신 재윤이 하연의 침묵과 조용한 동선을 이해한다. 핵심 장면: - 축제 준비가 거의 끝난 2학년 5반 교실 - 하연이 시끄러운 축제 중심보다 조용한 가장자리를 바라봄 - 방학식과 폐장 후 이야기가 지나가지만, 명시적 약속은 잡히지 않음 - 재윤이 하연의 속도를 이해하면 `HaYeonPaceRead`와 `AccidentClueHaYeon`이 강화됨 D-2 성공 기준: | 조건 | 성공 의미 | | --- | --- | | D-3 관계 정리 충분 | 하연의 침묵을 도피가 아니라 마음을 정리하는 방식으로 이해 | | 하연 신뢰 충분 | 하연이 조용한 자리와 폐장 후 감각을 자연스럽게 드러냄 | | 재윤이 성급히 묻지 않음 | 하연을 불러내는 약속이 아니라, 하연을 이해하는 감각 획득 | D-2 실패 시: - 재윤은 하연이 왜 조용한 곳을 보는지 읽지 못한다. - 폐장 후 하연이 보이지 않아도 어디로 갔는지 알아차리지 못한다. - D-Day에서 하연 실패 루프 조건이 강해진다. ### D-1 목요일: 축제 1일차 / `쉬어가 카페` 운영 D-1은 하연과 재윤이 같은 운영 시간대에서 실제로 협력하는 날이다. 주요 역할: - `쉬어가 카페`가 하연의 취향과 반 분위기를 동시에 담는 공간으로 완성된다. - 하연의 조용한 자리 선호와 재윤의 배려가 실제 운영 속에서 확인된다. - 기존 관계 정리 여부가 짧은 방문/대화로 확인된다. - 사고 단서를 혼자만 들고 있지 않고 하연과 공유할 수 있는지 마지막으로 본다. D-1 밤 정산: | 정산 축 | 충분할 때 | 부족할 때 | | --- | --- | --- | | 혼자 들지 않은 단서 | 하연과 사고 감각이 연결됨 | 단서는 있어도 하연이 사고 기억에서 빠질 위험 | | 숨지 않은 관계 | 소하/서린/미루가 하연 선택을 흐리지 않음 | D-Day 낮에 마지막 보정 필요 | | 직접 말하러 갈 마음 | 폐장 후 선택의 주체가 재윤이 됨 | 하연이 먼저 불러주기를 기다리는 상태로 흔들림 | D-1의 끝은 고백이 아니라 `내일 직접 말해야 한다`는 압박으로 끝난다. ### D-Day 금요일: 축제 2일차 / 폐장 후 사고 / 엔딩 분기 상세 기준 문서: [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md) / 실제 스크립트 단위: [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md) D-Day 낮에는 부족한 축을 마지막으로 보정할 수 있다. 밤에는 더 이상 보정하지 않고 성공/실패를 판정한다. 점수와 우선순위 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)를 따른다. 낮 선택: ```text [하연과 축제를 둘러본다] [소하와 마지막으로 오래된 길을 걷는다] [서린의 방송 마무리를 돕는다] [미루의 도움 인원 마무리를 확인한다] [혼자 야외 소무대 쪽을 본다] ``` 낮 선택 역할: | 낮 선택 | 보정/확정되는 것 | 폐장 후 영향 | | --- | --- | --- | | 하연 | 상호 신뢰, 단서 공유, 하연 동선 이해 | 충분하면 하연이 있을 곳을 스스로 알아차림 | | 소하 | 과거 미련 정리 또는 잔류 확정 | 실패 시 하연 선택이 새 관계 도피처럼 흔들림 | | 서린 | 정답 의존 정리 또는 잔류 확정 | 실패 시 자기 선택 확신 약화 | | 미루 | 의존 미련 정리 또는 잔류 확정 | 실패 시 필요한 사람 역할에 붙잡힘 | | 혼자 | 사고 단서 직접 보강 | 하연과 공유하지 않으면 가장 중요한 연결이 비어 있음 | 폐장 후 성공: - 하연이 먼저 약속 장소를 지정하지 않는다. - 재윤이 하연의 동선을 이해해 직접 찾아간다. - 재윤이 먼저 자기 마음과 선택을 말한다. - 하연도 기다렸고 말하려 했음을 확인한다. - 사고는 사라지지 않지만, `하연에게 말하러 가던 선택의 결과`로 기억된다. - D+2 일요일 병실 기상, D+3 월요일 방학식, 진엔딩 크레딧으로 이어진다. 폐장 후 실패: - 하연이 사고 기억에서 빠진다. - 재윤은 왜 소무대에 왔는지, 누구에게 말하려 했는지 기억하지 못한다. - 장소와 단서는 남지만 가장 중요한 사람이 비어 있다. - 사고 후 D-25 월요일 아침으로 루프한다. - 완성된 엔딩 크레딧과 방학 후일담은 나오지 않는다. ## 진엔딩 후 날짜 처리 | 날짜 | 플레이어 체감 | 실제 의미 | 연출 기준 | | --- | --- | --- | --- | | D+1 토요일 | 날짜 카드 없음 | 재윤은 아직 깨어나지 못함 | 암전 또는 소리만 남기고 지나감 | | D+2 일요일 | 병실 기상 | 재윤이 돌아올 이유를 찾아 깨어남 | 하연의 존재와 현실 회복을 조용히 확인 | | D+3 월요일 | 방학식 | 루프에서 도달하지 못한 다음 월요일에 처음 도달 | 짧고 무리하지 않는 참석, 이후 방학 후일담 암시 | D+3 방학식 이후에는 [진엔딩 크레딧 콘티 초안](./11_진엔딩_크레딧_콘티_초안.md)으로 연결한다. 크레딧 연결 기준: - 병원 재검사 - 학교 도서관 - 버스 정류장 - 작은 카페 - 밝은 산책길 - 휴대폰 캘린더의 작은 약속 이 컷들은 `연애가 완성되었다`가 아니라 `방학 동안 두 사람이 계속 만날 수 있다`는 암시로 사용한다. ## 비진엔딩 날짜 처리 | 엔딩 | D+1~D+3 처리 | 크레딧 처리 | | --- | --- | --- | | 하연 실패 루프 | D+3 방학식 미도달. D-25 월요일 아침으로 복귀 | 없음 또는 끊긴 피아노 몇 음 | | 소하 새드엔딩 | 방학식 안내문은 보이나 날짜가 앞으로 흐르지 않음 | 짧고 따뜻한 가짜 크레딧 가능 | | 서린 새드엔딩 | 월요일까지 적힌 일정표는 있으나 시계가 멈춤 | 차갑고 정돈된 가짜 크레딧 가능 | | 미루 새드엔딩 | 방학식은 문밖에 있지만 문을 열지 못함 | 달콤하지만 불안한 가짜 크레딧 가능 | | 히든 붕괴 | 월요일 교실과 축제 마지막 밤이 뒤섞임 | 이름, 날짜, 음악이 깨지는 붕괴 크레딧 가능 | 완성된 엔딩곡과 방학 후일담 애니메이션은 진엔딩 전용 보상으로 남긴다. ## 날짜별 의존 관계 ```text D-32 ~ D-26 기존 관계 기준점 형성 ↓ D-25 ~ D-19 하연 등장, 축제 목표 고정, 병렬 선택 개방 ↓ D-18 ~ D-12 쉬어가 카페, 하연 신뢰, 기존 관계 압박 확대 ↓ D-11 ~ D-5 관계 균열, 사고 단서, 소무대 예감 ↓ D-4 단서 정리 시작 ↓ D-3 소하/서린/미루 도피처 정리 ↓ D-2 하연의 침묵과 동선 이해 ↓ D-1 쉬어가 카페 운영, 단서 공유, 직접 말할 마음 정산 ↓ D-Day 낮 부족한 축 마지막 보정 ↓ D-Day 폐장 후 재윤이 직접 찾아가면 진엔딩 / 하연이 빠지면 실패 루프 ↓ D+2, D+3 진엔딩에서만 현실 복귀와 방학식 도달 ``` ## 다음 설계 과제 1. 진엔딩의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다. 2. D-Day 스크립트 분할을 시스템 설계 문서의 StoryFlow Scene/Branch/Transition 구조와 맞춘다. 3. 크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.", "excerpt": "# 날짜별 진행 달력 ## 목적 이 문서는 전체 스토리의 날짜별 배치 기준을 한눈에 확인하기 위한 마스터 달력이다. 개별 장면의 긴 대본을 모두 담기보다, 각 날짜가 어떤 감정 축·플래그·후속 문서와 연결되는지 정리한다. 실제 대본 수준으로 확장된 클라이맥스는 아래 문서를 우선 기준으로 삼는다. - [D-3 관계 정리 클라이맥스](./08_D-3_관계정리_클라이맥스.md) - [D-2 말하지"}, {"path": "스토리/07_전체_스토리_외전_실패루프.md", "category": "스토리", "title": "전체 스토리 외전: 실패 루프와 새드엔딩", "id": "스토리-07전체스토리외전실패루프-md", "html": "<h2 id=\"스토리-07전체스토리외전실패루프-md-전체-스토리-외전-실패-루프와-새드엔딩\">전체 스토리 외전: 실패 루프와 새드엔딩<\/h2>\n<p>이 문서는 진엔딩 정본 흐름에서 벗어난 실패 루프와 새드엔딩을 외전처럼 모아 둔 문서다.<\/p>\n<p>본편의 기준은 <a href=\"./00_전체_스토리.md\">전체 스토리<\/a>의 진엔딩 루트다. 이 외전은 본편을 대체하지 않고, 재윤이 어떤 방식으로 현실 복귀를 피하려 하는지 짧고 선명하게 보여준다.<\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-분량-원칙\">분량 원칙<\/h3>\n<p>실패 루프와 새드엔딩은 길게 끌지 않는다.<\/p>\n<ul>\n<li>첫 관람은 한 장면의 감정이 남을 정도로만 보여준다.<\/li>\n<li>반복 관람은 압축한다.<\/li>\n<li>같은 실패를 여러 번 보여줄 때는 설명보다 변형된 한 문장, 빠진 목소리, 어긋난 배경으로 루프 피로를 표현한다.<\/li>\n<li>전체 분량은 진엔딩 본편보다 작게 유지한다.<\/li>\n<\/ul>\n<p>핵심 역할:<\/p>\n<blockquote>실패 루프와 새드엔딩은 또 다른 본편이 아니라, 진엔딩 선택의 의미를 더 선명하게 만드는 그림자다.<\/blockquote>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-방학과-크레딧-처리-원칙\">방학과 크레딧 처리 원칙<\/h3>\n<p>진엔딩만 방학이 실제로 시작된다.<\/p>\n<p>비진엔딩에서 방학식, 월요일, 여름 햇빛, 크레딧이 등장하더라도 그것은 <code>다음 시간<\/code>이 아니라 멈춤·왜곡·닫힘·붕괴의 표시로 사용한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>흐름<\/th><th>방학 처리<\/th><th>크레딧 처리<\/th><\/tr><\/thead><tbody><tr><td>하연 실패 루프<\/td><td>월요일 미도달<\/td><td>없음 또는 끊긴 피아노 몇 음<\/td><\/tr><tr><td>소하 새드엔딩<\/td><td>등굣길/골목의 과거로 왜곡<\/td><td>따뜻하지만 짧은 가짜 크레딧<\/td><\/tr><tr><td>서린 새드엔딩<\/td><td>일정표 안에서 정지<\/td><td>차갑고 정돈된 가짜 크레딧<\/td><\/tr><tr><td>미루 새드엔딩<\/td><td>문밖에만 있는 방학<\/td><td>달콤하지만 불안한 가짜 크레딧<\/td><\/tr><tr><td>히든 붕괴<\/td><td>월요일과 축제 밤이 뒤섞임<\/td><td>이름과 음악이 깨지는 붕괴 크레딧<\/td><\/tr><\/tbody><\/table><\/div>\n<p>진엔딩의 완성된 엔딩곡, 방학 후일담 애니메이션, 하연과 재윤이 계속 만나는 암시는 이 외전에서 사용하지 않는다.<\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-1-하연이-사라진-소무대\">외전 1: 하연이 사라진 소무대<\/h3>\n<p>폐장 후.<\/p>\n<p>학교 뒤편 야외 소무대에는 아무도 없었다.<\/p>\n<p>낮 동안 축제를 밝히던 조명은 대부분 꺼져 있었고, 천막을 접는 소리도 이제는 들리지 않았다. 재윤은 무대 앞에 서서 자신이 왜 이곳에 왔는지 생각했다.<\/p>\n<p>누군가를 만나기로 했던 것 같았다.<\/p>\n<p>아니, 누군가에게 말하려 했던 것 같았다.<\/p>\n<p>하지만 이름이 떠오르지 않았다.<\/p>\n<p>바람이 불었다. 무대 옆에 세워진 임시 조명 프레임이 작게 흔들렸다. 재윤은 그 소리를 듣고도 움직이지 못했다. 몸이 먼저 반응해야 하는 순간인데, 이번에는 아무것도 밀어낼 사람이 없었다.<\/p>\n<p>금속이 삐걱였다.<\/p>\n<p>재윤은 뒤늦게 고개를 들었다.<\/p>\n<p>떨어지는 그림자 아래에서, 그는 자신이 누구를 기다리고 있었는지 끝내 기억하지 못했다.<\/p>\n<p>암전.<\/p>\n<p>다음 순간, 담임의 목소리가 들렸다.<\/p>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>D-25 월요일이었다.<\/p>\n<p>하연은 교실 문 앞에 서 있었다. 하지만 재윤은 방금 전까지 자신이 그녀의 이름을 잊고 있었다는 사실을 기억하지 못했다.<\/p>\n<p>획득 조각 후보: <code>멀어지는 목소리<\/code><\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-2-아무-일도-없던-날\">외전 2: 아무 일도 없던 날<\/h3>\n<p>소하는 익숙한 얼굴로 웃었다.<\/p>\n<p>등굣길은 평소와 같았다. 편의점 앞을 지나고, 횡단보도 신호를 기다리고, 소하가 어제 본 드라마 이야기를 꺼냈다. 재윤은 맞장구를 쳤다. 이상할 만큼 마음이 편했다.<\/p>\n<p>학교에는 축제 안내문이 붙어 있지 않았다.<\/p>\n<p>하연의 자리는 비어 있었다.<\/p>\n<p>재윤은 이상하다고 생각해야 했다. 그런데 이상하지 않았다. 오히려 이쪽이 원래의 세계였던 것처럼 느껴졌다. 소하와 함께 있으면 시간은 부드럽게 이어졌다. 낯선 전학생도, 흔들리는 조명도, 병실 냄새도 없었다.<\/p>\n<p>소하는 물었다.<\/p>\n<blockquote>그냥 이대로 있으면 안 돼?<\/blockquote>\n<p>재윤은 대답하지 못했다.<\/p>\n<p>소하는 웃었다. 오래전부터 알고 지낸 사람만이 지을 수 있는 웃음이었다.<\/p>\n<p>그날은 끝나지 않았다.<\/p>\n<p>아침 조회가 지나도 점심시간이 오지 않았고, 점심시간이 지나도 하교 시간이 오지 않았다. 소하와 재윤은 계속 같은 등굣길을 걸었다. 같은 편의점을 지나고, 같은 횡단보도 앞에 섰다.<\/p>\n<p>소하는 다시 물었다.<\/p>\n<blockquote>그냥 이대로 있으면 안 돼?<\/blockquote>\n<p>재윤은 그제야 깨달았다.<\/p>\n<p>이곳은 아무 일도 없던 날이 아니라, 아무 일도 일어나지 못하게 만든 날이었다.<\/p>\n<p>획득 조각 후보: <code>아무 일도 없던 날<\/code><\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-3-정해진-선택지\">외전 3: 정해진 선택지<\/h3>\n<p>서린은 선택지를 정리해 주었다.<\/p>\n<p>왼쪽 복도는 위험하다. 방송실에 먼저 가야 한다. 소무대 주변에는 가지 않는 편이 좋다. 누군가를 만나야 한다면 공개된 장소를 고른다. 감정적으로 움직이지 않는다. 확인되지 않은 약속은 취소한다.<\/p>\n<p>재윤은 고개를 끄덕였다.<\/p>\n<p>서린이 말하는 길은 모두 안전해 보였다. 그녀의 수첩에는 해야 할 일과 하지 말아야 할 일이 깔끔하게 나뉘어 있었다. 재윤은 그 목록을 따라가기만 하면 될 것 같았다.<\/p>\n<p>축제 마지막 날은 사고 없이 지나갔다.<\/p>\n<p>아무도 다치지 않았다.<\/p>\n<p>그런데 월요일도 오지 않았다.<\/p>\n<p>서린은 다음 날에도 같은 수첩을 들고 있었다. 날짜는 금요일이었다. 축제 마지막 날. 해야 할 일은 어제와 같았다. 가지 말아야 할 장소도, 만나지 말아야 할 사람도, 말하지 말아야 할 감정도 같았다.<\/p>\n<p>재윤은 물었다.<\/p>\n<blockquote>이러면 정말 괜찮아지는 거야?<\/blockquote>\n<p>서린은 잠시 대답하지 못했다.<\/p>\n<p>그녀의 수첩에는 그 질문에 대한 선택지가 없었다.<\/p>\n<p>획득 조각 후보: <code>정해진 선택지<\/code><\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-4-닫힌-문\">외전 4: 닫힌 문<\/h3>\n<p>미루는 문 앞에 서 있었다.<\/p>\n<p>교실도 아니고, 복도도 아니었다. 어느새 학교는 미루의 방처럼 좁아져 있었다. 책상 위에는 제출물 목록, 수행평가 계획표, 멘토링 체크리스트가 쌓여 있었다.<\/p>\n<p>미루는 말했다.<\/p>\n<blockquote>선배, 오늘까지만 도와주면 안 돼요?<\/blockquote>\n<p>재윤은 오늘까지만이라고 생각했다.<\/p>\n<p>하지만 체크리스트는 줄어들지 않았다. 하나를 끝내면 두 개가 생겼고, 마감일은 계속 내일로 밀렸다. 방학식 안내문은 벽에 붙어 있었지만 날짜가 번져 읽을 수 없었다.<\/p>\n<p>미루는 안심한 얼굴로 웃었다.<\/p>\n<blockquote>역시 선배가 있으면 괜찮아요.<\/blockquote>\n<p>그 말은 따뜻했다.<\/p>\n<p>그래서 더 위험했다.<\/p>\n<p>재윤은 문 쪽을 바라보았다. 문밖에는 복도가 있을 것이다. 방학식이 있고, 하연이 있고, 끝나야 할 1학기가 있을 것이다. 하지만 미루가 재윤의 옷자락을 잡았다.<\/p>\n<blockquote>나가면, 저 혼자 해야 하잖아요.<\/blockquote>\n<p>재윤은 한참 동안 손을 떼지 못했다.<\/p>\n<p>문은 조용히 닫혔다.<\/p>\n<p>획득 조각 후보: <code>닫힌 문<\/code><\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-5-반복되는-짧은-실패\">외전 5: 반복되는 짧은 실패<\/h3>\n<p>첫 번째 실패는 길었다.<\/p>\n<p>소무대의 어둠, 기억나지 않는 이름, 금속이 무너지는 소리, D-25 월요일의 교실까지 모두 보여주었다.<\/p>\n<p>두 번째 실패는 짧았다.<\/p>\n<p>재윤은 소무대에 서 있었다.<\/p>\n<blockquote>누굴… 기다렸더라.<\/blockquote>\n<p>금속음.<\/p>\n<p>암전.<\/p>\n<p>세 번째 실패에서는 하연의 목소리가 한 글자만 남았다.<\/p>\n<blockquote>재...<\/blockquote>\n<p>그 뒤는 들리지 않았다.<\/p>\n<p>네 번째 실패에서는 교실 칠판의 날짜가 조금 어긋났다. D-25라고 적혀 있었지만, 그 아래에 지워지다 만 <code>방학식<\/code>이라는 글자가 보였다.<\/p>\n<p>다섯 번째 실패에서는 담임이 전학생을 소개하기 전에 같은 말을 두 번 했다.<\/p>\n<blockquote>오늘 전학생이 왔다.  <\/blockquote>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>재윤은 처음으로 이상하다고 생각했다.<\/p>\n<p>하지만 하연이 교실로 들어오는 순간, 그 생각은 사라졌다.<\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전-6-망가진-d-25\">외전 6: 망가진 D-25<\/h3>\n<p>너무 많은 실패 뒤, 세계는 정상적인 D-25로 돌아가지 못했다.<\/p>\n<p>교실에는 책상 수가 맞지 않았다. 창밖은 아침이어야 하는데 축제 마지막 밤처럼 어두웠다. 칠판에는 날짜가 적혀 있었지만, 누군가 여러 번 덧쓴 듯 글자가 겹쳐 있었다.<\/p>\n<p>D-25?<\/p>\n<p>담임은 교탁 앞에 서 있었다.<\/p>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>잠시 뒤, 담임은 같은 말을 반복했다.<\/p>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>문은 열리지 않았다.<\/p>\n<p>하연은 들어오지 않았다.<\/p>\n<p>재윤은 그제야 자리에서 일어났다. 무언가 잘못되었다는 것을 알았다. 소하의 오래된 사진, 서린의 점검표 조각, 미루의 키링, 그리고 하연의 이름표가 교실 곳곳에 흩어져 있었다.<\/p>\n<p>재윤은 하나씩 주웠다.<\/p>\n<p>사진 속 소하는 웃고 있었다. 점검표에는 소무대라는 단어가 붉게 표시되어 있었다. 키링에는 작은 고정끈이 묶여 있었다. 이름표에는 은하연이라고 적혀 있었다.<\/p>\n<p>재윤은 그 이름을 읽었다.<\/p>\n<p>그리고 처음으로, 전학생이 들어오지 않은 교실에서 그녀의 이름을 불렀다.<\/p>\n<blockquote>은하연.<\/blockquote>\n<p>문밖에서 아주 작은 목소리가 들렸다.<\/p>\n<blockquote>...불렀어?<\/blockquote>\n<p>그 순간 칠판의 날짜가 다시 D-25 월요일로 돌아갔다. 크레딧처럼 보이던 글자들은 이름이 아니라 깨진 날짜와 지워진 방학식 안내문으로 흘러내렸다.<\/p>\n<p>이번에는 문이 열렸다.<\/p>\n<h3 id=\"스토리-07전체스토리외전실패루프-md-외전의-사용-기준\">외전의 사용 기준<\/h3>\n<p>이 외전들은 플레이어에게 모두 긴 분량으로 반복 제공하지 않는다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>장면<\/th><th>첫 관람<\/th><th>반복 관람<\/th><\/tr><\/thead><tbody><tr><td>하연 실패 루프<\/td><td>짧은 풀 연출<\/td><td>금속음, 빠진 이름, 암전 중심 압축<\/td><\/tr><tr><td>소하 새드엔딩<\/td><td>한 장면 완결<\/td><td>등굣길 반복 한 줄 처리<\/td><\/tr><tr><td>서린 새드엔딩<\/td><td>수첩/선택지 장면<\/td><td>선택지 없음 한 줄 처리<\/td><\/tr><tr><td>미루 새드엔딩<\/td><td>닫힌 방 장면<\/td><td>닫힌 문 이미지 중심 처리<\/td><\/tr><tr><td>히든 붕괴<\/td><td>예외적으로 길게<\/td><td>복구 후 정상 D-25로 복귀<\/td><\/tr><\/tbody><\/table><\/div>\n<p>본편의 감정 중심은 언제나 진엔딩에 둔다. 외전은 플레이어가 실패의 무게를 이해하게 만들되, 이야기가 실패에 머물지 않도록 짧고 선명하게 사용한다.<\/p>", "headings": [{"level": 1, "text": "전체 스토리 외전: 실패 루프와 새드엔딩", "id": "스토리-07전체스토리외전실패루프-md-전체-스토리-외전-실패-루프와-새드엔딩"}, {"level": 2, "text": "분량 원칙", "id": "스토리-07전체스토리외전실패루프-md-분량-원칙"}, {"level": 2, "text": "방학과 크레딧 처리 원칙", "id": "스토리-07전체스토리외전실패루프-md-방학과-크레딧-처리-원칙"}, {"level": 2, "text": "외전 1: 하연이 사라진 소무대", "id": "스토리-07전체스토리외전실패루프-md-외전-1-하연이-사라진-소무대"}, {"level": 2, "text": "외전 2: 아무 일도 없던 날", "id": "스토리-07전체스토리외전실패루프-md-외전-2-아무-일도-없던-날"}, {"level": 2, "text": "외전 3: 정해진 선택지", "id": "스토리-07전체스토리외전실패루프-md-외전-3-정해진-선택지"}, {"level": 2, "text": "외전 4: 닫힌 문", "id": "스토리-07전체스토리외전실패루프-md-외전-4-닫힌-문"}, {"level": 2, "text": "외전 5: 반복되는 짧은 실패", "id": "스토리-07전체스토리외전실패루프-md-외전-5-반복되는-짧은-실패"}, {"level": 2, "text": "외전 6: 망가진 D-25", "id": "스토리-07전체스토리외전실패루프-md-외전-6-망가진-d-25"}, {"level": 2, "text": "외전의 사용 기준", "id": "스토리-07전체스토리외전실패루프-md-외전의-사용-기준"}], "plain": "# 전체 스토리 외전: 실패 루프와 새드엔딩 이 문서는 진엔딩 정본 흐름에서 벗어난 실패 루프와 새드엔딩을 외전처럼 모아 둔 문서다. 본편의 기준은 [전체 스토리](./00_전체_스토리.md)의 진엔딩 루트다. 이 외전은 본편을 대체하지 않고, 재윤이 어떤 방식으로 현실 복귀를 피하려 하는지 짧고 선명하게 보여준다. ## 분량 원칙 실패 루프와 새드엔딩은 길게 끌지 않는다. - 첫 관람은 한 장면의 감정이 남을 정도로만 보여준다. - 반복 관람은 압축한다. - 같은 실패를 여러 번 보여줄 때는 설명보다 변형된 한 문장, 빠진 목소리, 어긋난 배경으로 루프 피로를 표현한다. - 전체 분량은 진엔딩 본편보다 작게 유지한다. 핵심 역할: > 실패 루프와 새드엔딩은 또 다른 본편이 아니라, 진엔딩 선택의 의미를 더 선명하게 만드는 그림자다. ## 방학과 크레딧 처리 원칙 진엔딩만 방학이 실제로 시작된다. 비진엔딩에서 방학식, 월요일, 여름 햇빛, 크레딧이 등장하더라도 그것은 `다음 시간`이 아니라 멈춤·왜곡·닫힘·붕괴의 표시로 사용한다. | 흐름 | 방학 처리 | 크레딧 처리 | | --- | --- | --- | | 하연 실패 루프 | 월요일 미도달 | 없음 또는 끊긴 피아노 몇 음 | | 소하 새드엔딩 | 등굣길/골목의 과거로 왜곡 | 따뜻하지만 짧은 가짜 크레딧 | | 서린 새드엔딩 | 일정표 안에서 정지 | 차갑고 정돈된 가짜 크레딧 | | 미루 새드엔딩 | 문밖에만 있는 방학 | 달콤하지만 불안한 가짜 크레딧 | | 히든 붕괴 | 월요일과 축제 밤이 뒤섞임 | 이름과 음악이 깨지는 붕괴 크레딧 | 진엔딩의 완성된 엔딩곡, 방학 후일담 애니메이션, 하연과 재윤이 계속 만나는 암시는 이 외전에서 사용하지 않는다. ## 외전 1: 하연이 사라진 소무대 폐장 후. 학교 뒤편 야외 소무대에는 아무도 없었다. 낮 동안 축제를 밝히던 조명은 대부분 꺼져 있었고, 천막을 접는 소리도 이제는 들리지 않았다. 재윤은 무대 앞에 서서 자신이 왜 이곳에 왔는지 생각했다. 누군가를 만나기로 했던 것 같았다. 아니, 누군가에게 말하려 했던 것 같았다. 하지만 이름이 떠오르지 않았다. 바람이 불었다. 무대 옆에 세워진 임시 조명 프레임이 작게 흔들렸다. 재윤은 그 소리를 듣고도 움직이지 못했다. 몸이 먼저 반응해야 하는 순간인데, 이번에는 아무것도 밀어낼 사람이 없었다. 금속이 삐걱였다. 재윤은 뒤늦게 고개를 들었다. 떨어지는 그림자 아래에서, 그는 자신이 누구를 기다리고 있었는지 끝내 기억하지 못했다. 암전. 다음 순간, 담임의 목소리가 들렸다. > 오늘 전학생이 왔다. D-25 월요일이었다. 하연은 교실 문 앞에 서 있었다. 하지만 재윤은 방금 전까지 자신이 그녀의 이름을 잊고 있었다는 사실을 기억하지 못했다. 획득 조각 후보: `멀어지는 목소리` ## 외전 2: 아무 일도 없던 날 소하는 익숙한 얼굴로 웃었다. 등굣길은 평소와 같았다. 편의점 앞을 지나고, 횡단보도 신호를 기다리고, 소하가 어제 본 드라마 이야기를 꺼냈다. 재윤은 맞장구를 쳤다. 이상할 만큼 마음이 편했다. 학교에는 축제 안내문이 붙어 있지 않았다. 하연의 자리는 비어 있었다. 재윤은 이상하다고 생각해야 했다. 그런데 이상하지 않았다. 오히려 이쪽이 원래의 세계였던 것처럼 느껴졌다. 소하와 함께 있으면 시간은 부드럽게 이어졌다. 낯선 전학생도, 흔들리는 조명도, 병실 냄새도 없었다. 소하는 물었다. > 그냥 이대로 있으면 안 돼? 재윤은 대답하지 못했다. 소하는 웃었다. 오래전부터 알고 지낸 사람만이 지을 수 있는 웃음이었다. 그날은 끝나지 않았다. 아침 조회가 지나도 점심시간이 오지 않았고, 점심시간이 지나도 하교 시간이 오지 않았다. 소하와 재윤은 계속 같은 등굣길을 걸었다. 같은 편의점을 지나고, 같은 횡단보도 앞에 섰다. 소하는 다시 물었다. > 그냥 이대로 있으면 안 돼? 재윤은 그제야 깨달았다. 이곳은 아무 일도 없던 날이 아니라, 아무 일도 일어나지 못하게 만든 날이었다. 획득 조각 후보: `아무 일도 없던 날` ## 외전 3: 정해진 선택지 서린은 선택지를 정리해 주었다. 왼쪽 복도는 위험하다. 방송실에 먼저 가야 한다. 소무대 주변에는 가지 않는 편이 좋다. 누군가를 만나야 한다면 공개된 장소를 고른다. 감정적으로 움직이지 않는다. 확인되지 않은 약속은 취소한다. 재윤은 고개를 끄덕였다. 서린이 말하는 길은 모두 안전해 보였다. 그녀의 수첩에는 해야 할 일과 하지 말아야 할 일이 깔끔하게 나뉘어 있었다. 재윤은 그 목록을 따라가기만 하면 될 것 같았다. 축제 마지막 날은 사고 없이 지나갔다. 아무도 다치지 않았다. 그런데 월요일도 오지 않았다. 서린은 다음 날에도 같은 수첩을 들고 있었다. 날짜는 금요일이었다. 축제 마지막 날. 해야 할 일은 어제와 같았다. 가지 말아야 할 장소도, 만나지 말아야 할 사람도, 말하지 말아야 할 감정도 같았다. 재윤은 물었다. > 이러면 정말 괜찮아지는 거야? 서린은 잠시 대답하지 못했다. 그녀의 수첩에는 그 질문에 대한 선택지가 없었다. 획득 조각 후보: `정해진 선택지` ## 외전 4: 닫힌 문 미루는 문 앞에 서 있었다. 교실도 아니고, 복도도 아니었다. 어느새 학교는 미루의 방처럼 좁아져 있었다. 책상 위에는 제출물 목록, 수행평가 계획표, 멘토링 체크리스트가 쌓여 있었다. 미루는 말했다. > 선배, 오늘까지만 도와주면 안 돼요? 재윤은 오늘까지만이라고 생각했다. 하지만 체크리스트는 줄어들지 않았다. 하나를 끝내면 두 개가 생겼고, 마감일은 계속 내일로 밀렸다. 방학식 안내문은 벽에 붙어 있었지만 날짜가 번져 읽을 수 없었다. 미루는 안심한 얼굴로 웃었다. > 역시 선배가 있으면 괜찮아요. 그 말은 따뜻했다. 그래서 더 위험했다. 재윤은 문 쪽을 바라보았다. 문밖에는 복도가 있을 것이다. 방학식이 있고, 하연이 있고, 끝나야 할 1학기가 있을 것이다. 하지만 미루가 재윤의 옷자락을 잡았다. > 나가면, 저 혼자 해야 하잖아요. 재윤은 한참 동안 손을 떼지 못했다. 문은 조용히 닫혔다. 획득 조각 후보: `닫힌 문` ## 외전 5: 반복되는 짧은 실패 첫 번째 실패는 길었다. 소무대의 어둠, 기억나지 않는 이름, 금속이 무너지는 소리, D-25 월요일의 교실까지 모두 보여주었다. 두 번째 실패는 짧았다. 재윤은 소무대에 서 있었다. > 누굴… 기다렸더라. 금속음. 암전. 세 번째 실패에서는 하연의 목소리가 한 글자만 남았다. > 재... 그 뒤는 들리지 않았다. 네 번째 실패에서는 교실 칠판의 날짜가 조금 어긋났다. D-25라고 적혀 있었지만, 그 아래에 지워지다 만 `방학식`이라는 글자가 보였다. 다섯 번째 실패에서는 담임이 전학생을 소개하기 전에 같은 말을 두 번 했다. > 오늘 전학생이 왔다. > 오늘 전학생이 왔다. 재윤은 처음으로 이상하다고 생각했다. 하지만 하연이 교실로 들어오는 순간, 그 생각은 사라졌다. ## 외전 6: 망가진 D-25 너무 많은 실패 뒤, 세계는 정상적인 D-25로 돌아가지 못했다. 교실에는 책상 수가 맞지 않았다. 창밖은 아침이어야 하는데 축제 마지막 밤처럼 어두웠다. 칠판에는 날짜가 적혀 있었지만, 누군가 여러 번 덧쓴 듯 글자가 겹쳐 있었다. D-25? 담임은 교탁 앞에 서 있었다. > 오늘 전학생이 왔다. 잠시 뒤, 담임은 같은 말을 반복했다. > 오늘 전학생이 왔다. 문은 열리지 않았다. 하연은 들어오지 않았다. 재윤은 그제야 자리에서 일어났다. 무언가 잘못되었다는 것을 알았다. 소하의 오래된 사진, 서린의 점검표 조각, 미루의 키링, 그리고 하연의 이름표가 교실 곳곳에 흩어져 있었다. 재윤은 하나씩 주웠다. 사진 속 소하는 웃고 있었다. 점검표에는 소무대라는 단어가 붉게 표시되어 있었다. 키링에는 작은 고정끈이 묶여 있었다. 이름표에는 은하연이라고 적혀 있었다. 재윤은 그 이름을 읽었다. 그리고 처음으로, 전학생이 들어오지 않은 교실에서 그녀의 이름을 불렀다. > 은하연. 문밖에서 아주 작은 목소리가 들렸다. > ...불렀어? 그 순간 칠판의 날짜가 다시 D-25 월요일로 돌아갔다. 크레딧처럼 보이던 글자들은 이름이 아니라 깨진 날짜와 지워진 방학식 안내문으로 흘러내렸다. 이번에는 문이 열렸다. ## 외전의 사용 기준 이 외전들은 플레이어에게 모두 긴 분량으로 반복 제공하지 않는다. | 장면 | 첫 관람 | 반복 관람 | | --- | --- | --- | | 하연 실패 루프 | 짧은 풀 연출 | 금속음, 빠진 이름, 암전 중심 압축 | | 소하 새드엔딩 | 한 장면 완결 | 등굣길 반복 한 줄 처리 | | 서린 새드엔딩 | 수첩/선택지 장면 | 선택지 없음 한 줄 처리 | | 미루 새드엔딩 | 닫힌 방 장면 | 닫힌 문 이미지 중심 처리 | | 히든 붕괴 | 예외적으로 길게 | 복구 후 정상 D-25로 복귀 | 본편의 감정 중심은 언제나 진엔딩에 둔다. 외전은 플레이어가 실패의 무게를 이해하게 만들되, 이야기가 실패에 머물지 않도록 짧고 선명하게 사용한다.", "excerpt": "# 전체 스토리 외전: 실패 루프와 새드엔딩 이 문서는 진엔딩 정본 흐름에서 벗어난 실패 루프와 새드엔딩을 외전처럼 모아 둔 문서다. 본편의 기준은 [전체 스토리](./00_전체_스토리.md)의 진엔딩 루트다. 이 외전은 본편을 대체하지 않고, 재윤이 어떤 방식으로 현실 복귀를 피하려 하는지 짧고 선명하게 보여준다. ## 분량 원칙 실패 루프와 새드엔딩은 길게 끌지 않는다. - 첫 관람은 한"}, {"path": "스토리/08_D-3_관계정리_클라이맥스.md", "category": "스토리", "title": "D-3 관계 정리 클라이맥스", "id": "스토리-08d-3관계정리클라이맥스-md", "html": "<h2 id=\"스토리-08d-3관계정리클라이맥스-md-d-3-관계-정리-클라이맥스\">D-3 관계 정리 클라이맥스<\/h2>\n<p>이 문서는 D-3 화요일에 배치되는 소하/서린/미루 관계 정리 클라이맥스를 대본 수준으로 정리한다.<\/p>\n<p>D-3의 목적은 서브히로인 결론을 내는 것이 아니라, 재윤이 하연에게 가기 전에 숨을 수 있는 세 가지 도피처를 끝내는 것이다.<\/p>\n<ul>\n<li>소하: 아무 일도 없던 과거<\/li>\n<li>서린: 대신 골라주는 정답<\/li>\n<li>미루: 필요한 사람으로 남는 의존<\/li>\n<\/ul>\n<p>D-3을 통과해야 D-2의 <code>말하지 못한 예감<\/code>과 D-Day의 <code>[하연에게 말하러 간다]<\/code>가 감정적으로 설득된다.<\/p>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-공통-연출-원칙\">공통 연출 원칙<\/h3>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-날짜와-분위기\">날짜와 분위기<\/h4>\n<ul>\n<li>내부 기준일: D-3 화요일<\/li>\n<li>게임 내 표기: 축제 전 주 화요일 / 축제 준비 막바지<\/li>\n<li>날씨: 습하고 더운 흐린 오후. 비는 오지 않지만 공기가 무겁다.<\/li>\n<li>학교 분위기: 축제 준비가 거의 마무리되어 모두 바쁘지만, 재윤에게는 소음이 멀게 들린다.<\/li>\n<li>UI: 같은 시간대에 세 관계 정리 이벤트 중 필요한 축이 발생한다. 조건이 충분하면 선택지를 통해 정리할 수 있고, 조건이 부족하면 새드엔딩 쪽 선택지가 강해진다.<\/li>\n<\/ul>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-공통-구조\">공통 구조<\/h4>\n<ol>\n<li>축제 준비 소음에서 재윤이 잠시 떨어진다.<\/li>\n<li>해당 인물이 재윤을 붙잡거나, 재윤이 미뤄둔 약속을 떠올리고 찾아간다.<\/li>\n<li>초반에는 현실적인 대화로 시작한다.<\/li>\n<li>중반부터 내면세계가 인물의 감정 방어기제에 맞게 왜곡된다.<\/li>\n<li>실패 선택지는 편하고 달콤하지만 시간이 멈춘다.<\/li>\n<li>성공 선택지는 상처를 주는 말이 아니라, 관계를 거짓으로 만들지 않는 말이어야 한다.<\/li>\n<li>성공 시 각 인물은 진엔딩에 필요한 단서 조각을 준다.<\/li>\n<\/ol>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-공통-성공-조건\">공통 성공 조건<\/h4>\n<ul>\n<li>재윤이 상대를 부정하지 않는다.<\/li>\n<li>상대가 자신에게 중요했음을 인정한다.<\/li>\n<li>그러나 그 관계를 하연에게 가는 마음의 대체물로 쓰지 않는다.<\/li>\n<li><code>미안해<\/code>만 반복하지 않고, 지금 무엇을 선택할지 말한다.<\/li>\n<\/ul>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-공통-실패-조건\">공통 실패 조건<\/h4>\n<ul>\n<li>재윤이 미안함 때문에 상대가 원하는 세계에 남는다.<\/li>\n<li>상대가 상처받지 않게 하려고 현재의 마음을 숨긴다.<\/li>\n<li><code>나중에 말할게<\/code>, <code>지금은 모르겠어<\/code>, <code>네가 정해줘<\/code>, <code>내가 계속 있을게<\/code>처럼 선택을 미룬다.<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-한소하-클라이맥스-아무-일도-없던-골목\">한소하 클라이맥스: 아무 일도 없던 골목<\/h3>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-진입-조건\">진입 조건<\/h4>\n<p>발생 조건:<\/p>\n<ul>\n<li><code>SoHaPressure<\/code>가 일정 이상이거나, 소하 이벤트를 충분히 진행했다.<\/li>\n<li>D-7 이전에 하연에 대한 마음을 소하 앞에서 얼버무린 적이 있다.<\/li>\n<li>D-13 주말 소하 이벤트를 봤거나, D-28/D-21에서 소하 선택을 한 적이 있다.<\/li>\n<\/ul>\n<p>정리 가능 조건:<\/p>\n<ul>\n<li>재윤이 하연에게 마음이 향하고 있음을 최소 한 번 자각했다.<\/li>\n<li>소하에게 거짓 약속을 하지 않았다.<\/li>\n<li>소하 이벤트에서 오래된 관계를 소중히 여기되, 현재 마음을 회피하지 않는 선택을 1회 이상 했다.<\/li>\n<\/ul>\n<p>부족 시:<\/p>\n<ul>\n<li>성공 선택지가 흐리게 보이거나 늦게 나타난다.<\/li>\n<li>실패 선택지 <code>[예전처럼 돌아간다]<\/code>가 먼저 떠오른다.<\/li>\n<\/ul>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장소\">장소<\/h4>\n<p>오래된 등굣길 골목.<\/p>\n<p>학교에서 시작하지만, 대화가 깊어질수록 배경은 첫 회차 D-32 월요일 아침의 골목처럼 바뀐다. 하늘은 오후인데 골목의 빛은 아침이다. 편의점 앞에는 예전에 같이 마셨던 음료가 놓여 있고, 전광판 날짜는 읽히지 않는다.<\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장면-시작\">장면 시작<\/h4>\n<p>축제 준비가 끝나갈 무렵, 소하가 재윤을 복도에서 붙잡는다.<\/p>\n<pre><code>소하: 야, 유재윤.\n재윤: 어?\n소하: 잠깐만 나와.\n재윤: 지금? 반 정리 아직...\n소하: 네가 그런 말 할 때마다 진짜 웃긴 거 알아?\n재윤: 뭐가.\n소하: 항상 바쁜 척은 하는데, 정작 중요한 말은 제일 늦게 하잖아.<\/code><\/pre>\n<p>소하는 장난스럽게 말하지만, 눈은 웃지 않는다.<\/p>\n<pre><code>재윤: 무슨 일인데.\n소하: 모르겠어?\n재윤: ...미안.\n소하: 그 말 말고.<\/code><\/pre>\n<p><code>미안<\/code>이라는 말이 나오자 복도 소리가 한 번 작아진다. 소하는 재윤의 손목을 잡지는 않는다. 대신 먼저 걸어간다. 재윤은 따라갈 수밖에 없다.<\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-중반-왜곡\">중반 왜곡<\/h4>\n<p>둘이 계단을 내려가면 학교 현관이 아니라 오래된 골목이 나온다.<\/p>\n<pre><code>재윤: 여긴...\n소하: 이상해?\n재윤: 학교였는데.\n소하: 우리한텐 여기가 더 익숙하잖아.<\/code><\/pre>\n<p>편의점 앞 벤치. 소하는 재윤이 예전에 좋아하던 음료를 들어 보인다.<\/p>\n<pre><code>소하: 아직도 이거 마시지?\n재윤: 가끔.\n소하: 가끔 아니잖아. 너 시험 전날엔 꼭 이거 마셨고, 하키 연습 늦게 끝난 날엔 단 거 싫다면서 이것만 마셨고, 비 오는 날엔...\n재윤: 소하야.\n소하: 봐. 나는 다 기억해.<\/code><\/pre>\n<p>소하는 웃으려 하지만 목소리가 떨린다.<\/p>\n<pre><code>소하: 그러니까 이상하잖아.\n재윤: 뭐가.\n소하: 네가 갑자기 모르는 사람처럼 굴잖아.<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-핵심-압박\">핵심 압박<\/h4>\n<pre><code>소하: 그 애가 오기 전엔 괜찮았어.\n재윤: 하연이 때문만은 아니야.\n소하: 이름 바로 나오네.\n재윤: ...\n소하: 봐. 너는 대답이 느린 애였는데, 그 이름은 빠르네.<\/code><\/pre>\n<p>소하가 웃는다. 이번엔 확실히 아프게 웃는다.<\/p>\n<pre><code>소하: 여기 있으면 아무 일도 일어나지 않아.\n재윤: 소하야.\n소하: 우리가 원래부터 행복했던 걸로 하면 되잖아.\n재윤: 그건...\n소하: 왜 안 돼?<\/code><\/pre>\n<p>골목의 빛이 더 따뜻해진다. 멀리서 첫 회차 아침의 소음이 들린다.<\/p>\n<pre><code>소하: 나랑 가면 돼. 내일도 같이 등교하고, 모레도 같이 장난치고, 축제 같은 건 적당히 지나가고.\n소하: 네가 다치는 일도 없고, 누가 울면서 널 부르는 일도 없고.\n재윤: ...\n소하: 아무 일도 없던 날로 돌아가자.<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-선택지\">선택지<\/h4>\n<p>조건 부족 시:<\/p>\n<pre><code>[예전처럼 돌아간다]\n[아무 말도 하지 못한다]<\/code><\/pre>\n<p>조건 충족 시:<\/p>\n<pre><code>[예전처럼 돌아간다]\n[지금의 마음까지 말한다]<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-실패-분기-예전처럼-돌아간다\">실패 분기: 예전처럼 돌아간다<\/h4>\n<pre><code>재윤: ...그래.\n소하: 뭐?\n재윤: 그냥, 예전처럼 있자.<\/code><\/pre>\n<p>소하는 안도한 듯 웃는다. 하지만 그 웃음은 첫 회차의 웃음처럼 고정된다.<\/p>\n<pre><code>소하: 그럴 줄 알았어.<\/code><\/pre>\n<p>화면은 다음 아침으로 넘어간다. 같은 골목, 같은 음료, 같은 농담.<\/p>\n<pre><code>소하: 야, 유재윤. 또 늦었냐?\n재윤: 미안.\n소하: 됐어. 빨리 와.<\/code><\/pre>\n<p>칠판에는 방학식 안내문이 붙어 있지만 날짜가 흐릿하다. 크레딧이 나온다면 짧고 따뜻한 가짜 크레딧이다.<\/p>\n<p>핵심 문장:<\/p>\n<blockquote>아무 일도 없던 날은 따뜻했다.  <\/blockquote>\n<blockquote>그래서 재윤은, 자신이 깨어나지 않았다는 사실을 오래 모를 수 있었다.<\/blockquote>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-성공-분기-지금의-마음까지-말한다\">성공 분기: 지금의 마음까지 말한다<\/h4>\n<p>재윤은 음료를 받지 않는다.<\/p>\n<pre><code>재윤: 소하야.\n소하: 응.\n재윤: 나 너랑 같이 있던 시간, 아무렇지 않았던 거 아니야.\n소하: ...\n재윤: 네가 나 챙겨준 것도, 내가 당연하게 받은 것도, 전부 진짜였어.\n소하: 그럼 여기 있으면 되잖아.\n재윤: 근데 그걸 아무 일도 없던 걸로 만들면 안 될 것 같아.<\/code><\/pre>\n<p>소하의 손이 멈춘다.<\/p>\n<pre><code>소하: 왜.\n재윤: 내가 지금 좋아하는 사람이 있어서.\n소하: ...\n재윤: 그 마음 때문에 무서워도, 그걸 네 옆에 숨기면 안 될 것 같아.<\/code><\/pre>\n<p>소하는 한참 말하지 않는다. 골목의 아침빛이 조금씩 오후빛으로 돌아온다.<\/p>\n<pre><code>소하: 진짜 짜증난다.\n재윤: 미안.\n소하: 미안하다고 하지 말랬지.\n재윤: 응.\n소하: 나한테도 솔직하지, 처음부터.<\/code><\/pre>\n<p>재윤은 고개를 숙인다.<\/p>\n<pre><code>재윤: 늦어서 미안해.\n소하: 그건 받아줄게.<\/code><\/pre>\n<p>소하는 음료를 자기 쪽으로 가져간다.<\/p>\n<pre><code>소하: 나도 바보는 아니야.\n재윤: 알아.\n소하: 아니, 몰랐잖아. 너는 늘 내가 장난치면 괜찮은 줄 알았잖아.\n재윤: ...응.<\/code><\/pre>\n<p>소하는 숨을 고른다.<\/p>\n<pre><code>소하: 축제날.\n재윤: 응?\n소하: 네가 기다리던 사람은 내가 아니었어.<\/code><\/pre>\n<p>재윤의 귀에 멀리서 금속이 삐걱이는 소리가 아주 작게 들린다.<\/p>\n<pre><code>재윤: 그걸 네가 어떻게...\n소하: 모르겠어. 근데 알아. 계속 그런 느낌이었어.\n소하: 네가 어딘가로 가려고 했는데, 나는 그걸 못 본 척하고 싶었던 것 같아.<\/code><\/pre>\n<p>소하는 뒤돌아선다.<\/p>\n<pre><code>소하: 가.\n재윤: 소하야.\n소하: 지금 안 가면 또 늦잖아.<\/code><\/pre>\n<p>성공 결과:<\/p>\n<ul>\n<li><code>SoHaResolved = true<\/code><\/li>\n<li><code>AccidentClueSoHa = true<\/code><\/li>\n<li><code>SoHaPressure<\/code> 감소<\/li>\n<li>소하 새드엔딩 차단<\/li>\n<\/ul>\n<p>마지막 내레이션:<\/p>\n<blockquote>오래된 길은 사라지지 않았다.  <\/blockquote>\n<blockquote>다만 재윤은, 그 길을 핑계로 지금의 마음을 지우지 않기로 했다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-백서린-클라이맥스-정답이-닫힌-방송실\">백서린 클라이맥스: 정답이 닫힌 방송실<\/h3>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-진입-조건-2\">진입 조건<\/h4>\n<p>발생 조건:<\/p>\n<ul>\n<li>D-9 야외 소무대 점검표 또는 방송/학생회 지원 이벤트를 봤다.<\/li>\n<li>D-9 방송실 상담에서 마음의 기준을 묻거나, <code>선배가 보기엔 누가 맞아요?<\/code>처럼 선택을 서린에게 맡기려 했다.<\/li>\n<li>재윤이 선택을 서린에게 맡긴 적이 있다.<\/li>\n<li>D-Day 위험 단서 중 하나가 서린 문서에서 나온 상태다.<\/li>\n<\/ul>\n<p>정리 가능 조건:<\/p>\n<ul>\n<li><code>AccidentClueSeoRin<\/code>을 확인했거나, 소무대 위험 문서를 직접 읽었다.<\/li>\n<li>재윤이 적어도 한 번 서린에게 자기 의견을 말한 적이 있다.<\/li>\n<li>D-9 상담에서 <code>[정답이 아니라, 내가 고를 이유를 찾는다]<\/code>를 선택했거나, 그에 준하는 자기 이유를 말하려 했다.<\/li>\n<li>하연에게 가려는 마음을 <code>위험하니까 안 된다<\/code>는 말만으로 덮지 않는다.<\/li>\n<\/ul>\n<p>부족 시:<\/p>\n<ul>\n<li>선택지 UI가 서린의 문장처럼 정리된다.<\/li>\n<li><code>[내가 선택할게]<\/code>가 잠겨 있거나 노이즈가 낀다.<\/li>\n<\/ul>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장소-2\">장소<\/h4>\n<p>방송실.<\/p>\n<p>처음에는 현실의 방송실이다. 모니터, 큐시트, 마이크, 케이블, 축제 안내 멘트가 놓여 있다. 대화가 깊어질수록 방송실 밖 복도 소리가 사라지고, 모든 문서가 같은 문장으로 바뀐다.<\/p>\n<p><code>위험하므로 접근 금지.<\/code><\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장면-시작-2\">장면 시작<\/h4>\n<p>재윤은 D-Day 방송 큐시트를 확인하러 방송실에 들른다. 서린은 이미 모든 자료를 정리해두었다. 책상 한쪽에는 D-9 상담 때 재윤이 보았던 메모가 남아 있다. <code>좋아하는 마음 / 미안한 마음 / 책임감 / 익숙함<\/code>이라는 네 줄은, 대화가 깊어질수록 <code>정답 / 정답 / 정답 / 정답<\/code>으로 번져 보인다.<\/p>\n<pre><code>서린: 늦었어.\n재윤: 미안해요. 반 정리가 좀 늦어서.\n서린: 알고 있어. 그래서 네 몫까지 정리해뒀어.\n재윤: 제 몫까지요?<\/code><\/pre>\n<p>서린은 검은 바인더를 연다.<\/p>\n<pre><code>서린: 축제 2일차 동선. 방송 장비 회수 시간. 야외 소무대 접근 제한. 네가 하지 않아도 되는 일.\n재윤: 하지 않아도 되는 일?\n서린: 위험한 곳에 가지 않는 것.<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-중반-왜곡-2\">중반 왜곡<\/h4>\n<p>모니터에 축제 안내 문구가 뜬다.<\/p>\n<pre><code>[안전한 동선을 따르십시오]\n[지정된 선택지만 선택하십시오]\n[위험한 감정은 폐장 후 정리하지 마십시오]<\/code><\/pre>\n<p>재윤은 눈을 깜빡인다.<\/p>\n<pre><code>재윤: 방금...\n서린: 피곤한 거야.\n재윤: 선배.\n서린: 유재윤.<\/code><\/pre>\n<p>서린이 이름을 부르면 방송실 스피커에서도 같은 목소리가 나온다.<\/p>\n<pre><code>방송: 유재윤 학생은 지정된 위치에서 대기하십시오.<\/code><\/pre>\n<p>서린은 놀라지 않는다.<\/p>\n<pre><code>서린: 넌 늘 늦게 고르고, 늦게 말하고, 늦게 후회해.\n재윤: ...\n서린: 그러니까 이번엔 내가 먼저 정리할게.<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-핵심-압박-2\">핵심 압박<\/h4>\n<p>서린은 점검표를 재윤에게 내민다.<\/p>\n<pre><code>서린: 야외 소무대 임시 조명 프레임. 고정 상태 불안정. 폐장 후 접근 제한 필요.\n재윤: 이거...\n서린: 네가 봤어도 달라지는 건 없어.\n재윤: 제가 알아야 하는 일이에요.\n서린: 알아서 뭘 하려고?<\/code><\/pre>\n<p>재윤은 대답하지 못한다.<\/p>\n<pre><code>서린: 하연에게 갈 거야?\n재윤: ...\n서린: 위험하다는 걸 알면서?\n재윤: 그건...\n서린: 그럼 답은 정해졌어.<\/code><\/pre>\n<p>모니터에 선택지가 뜬다.<\/p>\n<pre><code>[서린이 정한 길을 따른다]<\/code><\/pre>\n<p>다른 선택지는 없다.<\/p>\n<pre><code>서린: 내가 정리해줄게. 너는 틀리지 않아도 돼.\n재윤: 선배는 왜 그렇게까지...\n서린: 네가 또 다치는 꼴 보기 싫으니까.<\/code><\/pre>\n<p>D-9 상담 실패 상태라면 재윤의 머릿속에 <code>선배가 보기엔 누가 맞아요?<\/code>라고 묻던 자기 목소리가 먼저 떠오른다. 성공 상태라면 서린의 말이 겹친다.<\/p>\n<pre><code>서린: 맞는 답이 아니라, 네가 고른 이유를 가져와.<\/code><\/pre>\n<p>이 말은 차갑지 않다. 그래서 더 위험하다.<\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-선택지-2\">선택지<\/h4>\n<p>조건 부족 시:<\/p>\n<pre><code>[서린이 정한 길을 따른다]\n[선택하지 않는다]<\/code><\/pre>\n<p>조건 충족 시, 화면이 한 번 흔들린 뒤 새 선택지가 생긴다.<\/p>\n<pre><code>[서린이 정한 길을 따른다]\n[내가 선택할게]<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-실패-분기-서린이-정한-길을-따른다\">실패 분기: 서린이 정한 길을 따른다<\/h4>\n<pre><code>재윤: ...선배 말이 맞아요.\n서린: 그래.\n재윤: 제가 고르면, 또 늦을 것 같아요.\n서린: 괜찮아. 내가 고르면 돼.<\/code><\/pre>\n<p>방송실은 완벽하게 조용해진다. 큐시트에는 모든 시간이 정리되어 있다.<\/p>\n<pre><code>방송: 모든 일정은 정상 진행됩니다.\n방송: 모든 위험은 통제되었습니다.\n방송: 모든 선택은 완료되었습니다.<\/code><\/pre>\n<p>하지만 창밖은 계속 같은 시간이다. 방학식 일정표는 월요일까지 적혀 있으나 시계 바늘은 움직이지 않는다.<\/p>\n<p>핵심 문장:<\/p>\n<blockquote>모든 순서는 맞았다.  <\/blockquote>\n<blockquote>그런데 재윤이 고른 것은 하나도 없었다.<\/blockquote>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-성공-분기-내가-선택할게\">성공 분기: 내가 선택할게<\/h4>\n<p>재윤은 바인더를 닫지 않는다. 대신 점검표를 자기 손으로 잡는다.<\/p>\n<pre><code>재윤: 선배.\n서린: 말해.\n재윤: 저, 틀릴 수도 있어요.\n서린: 알아.\n재윤: 늦을 수도 있고요.\n서린: 그것도 알아.\n재윤: 그래도 제가 골라야 해요.<\/code><\/pre>\n<p>방송실 스피커에서 노이즈가 난다.<\/p>\n<pre><code>방송: 지정된 선택지가 아닙니다.<\/code><\/pre>\n<p>재윤은 모니터를 보지 않는다.<\/p>\n<pre><code>재윤: 위험하니까 안 가는 게 정답일 수도 있어요.\n서린: 그렇지.\n재윤: 근데 그게 제가 마음을 숨기는 이유가 되면, 그건 정답이 아니에요.<\/code><\/pre>\n<p>서린의 표정이 아주 조금 무너진다.<\/p>\n<pre><code>서린: 너는 네가 다친 게 네 선택 때문이라고 생각해?\n재윤: 모르겠어요.\n서린: 아니야.<\/code><\/pre>\n<p>서린은 큐시트에서 한 장을 빼낸다. 야외 소무대 점검표다.<\/p>\n<pre><code>서린: 네가 틀린 선택을 해서 그 애가 다친 게 아니야.\n재윤: ...\n서린: 네가 선택했기 때문에, 그 애가 살아 있는 거야.<\/code><\/pre>\n<p>재윤은 숨을 멈춘다.<\/p>\n<pre><code>재윤: 그 애...\n서린: 이름은 네가 말해야지.<\/code><\/pre>\n<p>스피커 노이즈가 멈춘다. 방송실 밖 복도 소리가 돌아온다.<\/p>\n<pre><code>서린: 이건 네가 가져가.\n재윤: 괜찮아요?\n서린: 원본은 내가 갖고 있어.\n재윤: 역시 선배답네요.\n서린: 농담할 상태 아니야.<\/code><\/pre>\n<p>잠깐 침묵.<\/p>\n<pre><code>서린: 그날 네가 물었지. 어떻게 해야 맞냐고.\n재윤: 네.\n서린: 지금도 같은 대답이야. 맞는 걸 찾지 말고, 네가 고른 이유를 봐.\n재윤: ...그래서 하연에게 가려고요.\n서린: 그래도, 네가 고른 답이면 끝까지 봐.\n재윤: 네.\n서린: 중간에 나한테 떠넘기지 말고.\n재윤: 안 그럴게요.<\/code><\/pre>\n<p>성공 결과:<\/p>\n<ul>\n<li><code>SeoRinResolved = true<\/code><\/li>\n<li><code>AccidentClueSeoRin = true<\/code><\/li>\n<li><code>SeoRinControl<\/code> 감소<\/li>\n<li>서린 새드엔딩 차단<\/li>\n<\/ul>\n<p>마지막 내레이션:<\/p>\n<blockquote>정답은 사라지지 않았다.  <\/blockquote>\n<blockquote>다만 재윤은, 정답 뒤에 숨어 선택하지 않는 일을 그만두기로 했다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-나미루-클라이맥스-문밖에-있는-방학식\">나미루 클라이맥스: 문밖에 있는 방학식<\/h3>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-진입-조건-3\">진입 조건<\/h4>\n<p>발생 조건:<\/p>\n<ul>\n<li>미루 멘토링 이벤트를 진행했다.<\/li>\n<li>도움 인원 신청서, 체크리스트, 출입 제한 표지 중 하나를 확인했다.<\/li>\n<li>D+3 방학식이 멘토링 종료일이라는 사실이 강조된 상태다.<\/li>\n<\/ul>\n<p>정리 가능 조건:<\/p>\n<ul>\n<li>재윤이 미루에게 답을 대신 주기보다 먼저 해보게 한 적이 있다.<\/li>\n<li>미루가 축제 도움 인원으로 스스로 맡은 일이 있다.<\/li>\n<li><code>AccidentClueMiRu<\/code> 또는 그 전조를 확인했다.<\/li>\n<\/ul>\n<p>부족 시:<\/p>\n<ul>\n<li><code>[먼저 해보게 한다]<\/code> 선택지가 미루의 울먹임 때문에 흔들린다.<\/li>\n<li>체크리스트가 계속 늘어나며 실패 선택지가 달콤하게 보인다.<\/li>\n<\/ul>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장소-3\">장소<\/h4>\n<p>학교 복도에서 시작한다.<\/p>\n<p>미루가 들고 있던 체크리스트를 떨어뜨리고, 재윤이 주워주려는 순간 복도 문들이 하나씩 사라진다. 벽에는 방학식 안내문이 붙어 있지만 문밖에만 있다. 복도 끝 교실은 미루의 방처럼 좁은 공간으로 변한다.<\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-장면-시작-3\">장면 시작<\/h4>\n<pre><code>미루: 선배.\n재윤: 미루야? 아직 안 갔어?\n미루: 확인만 받으면 돼요.\n재윤: 뭘?\n미루: 이것도요. 이것도. 이것도요.<\/code><\/pre>\n<p>미루는 체크리스트를 내민다.<\/p>\n<pre><code>재윤: 이거 축제 도움 인원 체크리스트잖아. 대부분 네가 이미 했는데?\n미루: 그래도 선배가 봐줘야 확실하잖아요.\n재윤: 네가 확인해도 돼.\n미루: 제가요?<\/code><\/pre>\n<p>미루는 진심으로 놀란다.<\/p>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-중반-왜곡-3\">중반 왜곡<\/h4>\n<p>프린트가 바닥에 떨어진다. 재윤이 줍는 사이 항목이 늘어난다.<\/p>\n<pre><code>[신청서 확인]\n[보고 대상 확인]\n[출입 제한 확인]\n[고정끈 확인]\n[선배가 떠나지 않는지 확인]\n[방학식이 오지 않는지 확인]<\/code><\/pre>\n<p>재윤은 마지막 항목을 본다.<\/p>\n<pre><code>재윤: 이건 뭐야.\n미루: 보면 안 돼요.\n재윤: 미루야.\n미루: 보면 선배가 가버릴 것 같아서요.<\/code><\/pre>\n<p>복도 끝 문에 <code>방학식<\/code>이라고 적힌 안내문이 붙어 있다. 문틈으로 여름 햇빛이 보인다.<\/p>\n<pre><code>재윤: 방학식은 와야 해.\n미루: 왜요?\n재윤: 그래야 이번 학기가 끝나니까.\n미루: 끝나면요?<\/code><\/pre>\n<p>미루는 체크리스트를 가슴에 안는다.<\/p>\n<pre><code>미루: 끝나면 멘토링도 끝나잖아요.\n재윤: 응.\n미루: 그러면 선배도 끝나는 거잖아요.<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-핵심-압박-3\">핵심 압박<\/h4>\n<p>공간이 점점 좁아진다.<\/p>\n<pre><code>미루: 여기에 있으면 아무 일도 일어나지 않은 걸로 할 수 있어요.\n재윤: 아니야.\n미루: 선배가 다치지도 않고, 병원에 누워 있지도 않고.\n재윤: ...\n미루: 제가 계속 모르는 걸 만들게요.<\/code><\/pre>\n<p>미루는 웃으려 하지만 눈물이 맺힌다.<\/p>\n<pre><code>미루: 그러니까 계속 가르쳐주세요.\n재윤: 미루야.\n미루: 선배가 없으면 저는 아직 아무것도 못 해요.<\/code><\/pre>\n<p>잠깐 뒤, 더 작은 목소리.<\/p>\n<pre><code>미루: 방학식만 안 오면, 아직 멘토링 끝난 거 아니죠?<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-선택지-3\">선택지<\/h4>\n<p>조건 부족 시:<\/p>\n<pre><code>[계속 옆에 있어준다]\n[오늘만 더 도와준다]<\/code><\/pre>\n<p>조건 충족 시:<\/p>\n<pre><code>[계속 옆에 있어준다]\n[먼저 해보게 한다]<\/code><\/pre>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-실패-분기-계속-옆에-있어준다\">실패 분기: 계속 옆에 있어준다<\/h4>\n<pre><code>재윤: 알았어. 오늘은 내가 봐줄게.\n미루: 정말요?\n재윤: 응. 괜찮아.<\/code><\/pre>\n<p>미루는 안심한 얼굴로 웃는다. 체크리스트 첫 줄이 지워지고, 곧 두 줄이 새로 생긴다.<\/p>\n<pre><code>미루: 그럼 이것도요.\n재윤: ...응.\n미루: 내일도요?\n재윤: 응.<\/code><\/pre>\n<p>문밖의 방학식 안내문이 흐려진다. 오르골 같은 음악이 같은 마디를 반복한다.<\/p>\n<p>핵심 문장:<\/p>\n<blockquote>필요한 사람이 되는 건 따뜻했다.  <\/blockquote>\n<blockquote>하지만 그 따뜻함은 문을 닫고 있었다.<\/blockquote>\n<h4 id=\"스토리-08d-3관계정리클라이맥스-md-성공-분기-먼저-해보게-한다\">성공 분기: 먼저 해보게 한다<\/h4>\n<p>재윤은 체크리스트를 받지 않는다. 대신 미루가 볼 수 있게 책상 위에 내려놓는다.<\/p>\n<pre><code>재윤: 미루야.\n미루: 네.\n재윤: 내가 봐주면 당장은 편할 거야.\n미루: 그럼 봐주세요.\n재윤: 근데 그러면 네가 한 게 아니게 돼.<\/code><\/pre>\n<p>미루의 표정이 무너진다.<\/p>\n<pre><code>미루: 저는 아직...\n재윤: 아직 무서운 거 알아.\n미루: 선배는 모르잖아요.\n재윤: 몰라. 다는 몰라.<\/code><\/pre>\n<p>재윤은 천천히 말한다.<\/p>\n<pre><code>재윤: 그래도 네가 못 한다고 정해버리는 건, 내가 하면 안 되는 일이야.\n미루: ...\n재윤: 먼저 해봐. 틀리면 그때 물어봐.\n미루: 그럼 선배는요?\n재윤: 사라지는 게 아니야.<\/code><\/pre>\n<p>미루가 고개를 든다.<\/p>\n<pre><code>미루: 멘토링 끝나도요?\n재윤: 응.\n미루: 방학식 지나도요?\n재윤: 응. 끝나야 다음에 또 인사하지.<\/code><\/pre>\n<p>문밖의 빛이 조금 선명해진다.<\/p>\n<p>미루는 체크리스트를 자기 쪽으로 가져간다. 손은 떨리지만, 품에 숨기지 않는다.<\/p>\n<pre><code>미루: 그럼... 제가 먼저 읽어볼게요.\n재윤: 응.\n미루: 보고 대상은 학생회 운영본부. 출입 제한 표지는 소무대 뒤편. 고정끈은...<\/code><\/pre>\n<p>미루가 멈춘다.<\/p>\n<pre><code>재윤: 왜?\n미루: 이거, 이상해요.\n재윤: 뭐가.\n미루: 고정끈이 끊어진 게 아니라... 누가 임시로 묶어둔 것 같아요.<\/code><\/pre>\n<p>재윤의 시야에 금속 프레임이 아주 짧게 스친다.<\/p>\n<pre><code>미루: 그리고...\n재윤: 응.\n미루: 밖에서 누군가 계속 선배 이름을 부르고 있어요.<\/code><\/pre>\n<p>재윤은 숨을 멈춘다.<\/p>\n<pre><code>미루: 저는 그 목소리가 싫었어요.\n재윤: 왜?\n미루: 그 목소리가 들리면, 선배가 저 말고 다른 데로 갈 것 같아서요.<\/code><\/pre>\n<p>미루는 울지만 체크리스트를 놓지 않는다.<\/p>\n<pre><code>미루: 그래도... 가야 하는 거죠?\n재윤: 응.\n미루: 그럼 저도 제 거 해볼게요.<\/code><\/pre>\n<p>성공 결과:<\/p>\n<ul>\n<li><code>MiRuResolved = true<\/code><\/li>\n<li><code>AccidentClueMiRu = true<\/code><\/li>\n<li><code>MiRuDependence<\/code> 감소<\/li>\n<li>미루 새드엔딩 차단<\/li>\n<\/ul>\n<p>마지막 내레이션:<\/p>\n<blockquote>끝나는 관계가 모두 사라지는 것은 아니었다.  <\/blockquote>\n<blockquote>어떤 관계는 끝났기 때문에, 다음 인사를 남길 수 있었다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-d-3-정산-규칙\">D-3 정산 규칙<\/h3>\n<p>D-3 종료 시 다음 상태를 정산한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>세 관계 모두 정리<\/td><td>D-2 하연 예감 장면에서 재윤의 시야가 가장 선명해짐<\/td><\/tr><tr><td>한 축 미정리<\/td><td>D-2 장면에 해당 인물의 왜곡 이미지가 끼어듦<\/td><\/tr><tr><td>둘 이상 미정리<\/td><td>D-Day 성공 선택지가 잠기거나, 하연 동선 이해가 크게 약화됨<\/td><\/tr><tr><td>하연 신뢰 부족 + 관계 미정리<\/td><td>하연 실패 루프 우선<\/td><\/tr><tr><td>기존 관계 중 하나가 강하게 미정리<\/td><td>해당 새드엔딩 선택지가 D-Day에 재등장<\/td><\/tr><\/tbody><\/table><\/div>\n<p>D-3에서 정리한 관계는 D-Day 낮 축제 선택에서도 짧게 확인된다.<\/p>\n<ul>\n<li>소하 정리 성공: 소하가 장난스럽게 재윤을 보내주되, 눈으로는 하연 쪽을 확인한다.<\/li>\n<li>서린 정리 성공: 서린이 폐장 후 방송 큐시트를 넘기며 <code>네가 직접 확인해<\/code>라고 말한다.<\/li>\n<li>미루 정리 성공: 미루가 도움 인원 체크리스트를 스스로 들고 와 <code>먼저 해봤어요<\/code>라고 말한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-08d-3관계정리클라이맥스-md-다음-연결\">다음 연결<\/h3>\n<p>D-3을 통과하면 <a href=\"./09_D-2_말하지_못한_예감.md\">D-2 말하지 못한 예감<\/a>으로 이어진다.<\/p>\n<p>D-2에서 하연은 직접 약속을 잡지 않는다. 대신 재윤은 D-3에서 정리한 관계들 덕분에, 하연의 침묵과 조용한 동선을 도피가 아니라 마음을 정리하는 방식으로 이해할 수 있게 된다.<\/p>\n<p>핵심 연결 문장:<\/p>\n<blockquote>붙잡는 목소리들이 조금씩 멀어지자, 재윤은 비로소 하연이 아무 말 없이 바라보던 방향을 볼 수 있었다.<\/blockquote>", "headings": [{"level": 1, "text": "D-3 관계 정리 클라이맥스", "id": "스토리-08d-3관계정리클라이맥스-md-d-3-관계-정리-클라이맥스"}, {"level": 2, "text": "공통 연출 원칙", "id": "스토리-08d-3관계정리클라이맥스-md-공통-연출-원칙"}, {"level": 3, "text": "날짜와 분위기", "id": "스토리-08d-3관계정리클라이맥스-md-날짜와-분위기"}, {"level": 3, "text": "공통 구조", "id": "스토리-08d-3관계정리클라이맥스-md-공통-구조"}, {"level": 3, "text": "공통 성공 조건", "id": "스토리-08d-3관계정리클라이맥스-md-공통-성공-조건"}, {"level": 3, "text": "공통 실패 조건", "id": "스토리-08d-3관계정리클라이맥스-md-공통-실패-조건"}, {"level": 2, "text": "한소하 클라이맥스: 아무 일도 없던 골목", "id": "스토리-08d-3관계정리클라이맥스-md-한소하-클라이맥스-아무-일도-없던-골목"}, {"level": 3, "text": "진입 조건", "id": "스토리-08d-3관계정리클라이맥스-md-진입-조건"}, {"level": 3, "text": "장소", "id": "스토리-08d-3관계정리클라이맥스-md-장소"}, {"level": 3, "text": "장면 시작", "id": "스토리-08d-3관계정리클라이맥스-md-장면-시작"}, {"level": 3, "text": "중반 왜곡", "id": "스토리-08d-3관계정리클라이맥스-md-중반-왜곡"}, {"level": 3, "text": "핵심 압박", "id": "스토리-08d-3관계정리클라이맥스-md-핵심-압박"}, {"level": 3, "text": "선택지", "id": "스토리-08d-3관계정리클라이맥스-md-선택지"}, {"level": 3, "text": "실패 분기: 예전처럼 돌아간다", "id": "스토리-08d-3관계정리클라이맥스-md-실패-분기-예전처럼-돌아간다"}, {"level": 3, "text": "성공 분기: 지금의 마음까지 말한다", "id": "스토리-08d-3관계정리클라이맥스-md-성공-분기-지금의-마음까지-말한다"}, {"level": 2, "text": "백서린 클라이맥스: 정답이 닫힌 방송실", "id": "스토리-08d-3관계정리클라이맥스-md-백서린-클라이맥스-정답이-닫힌-방송실"}, {"level": 3, "text": "진입 조건", "id": "스토리-08d-3관계정리클라이맥스-md-진입-조건-2"}, {"level": 3, "text": "장소", "id": "스토리-08d-3관계정리클라이맥스-md-장소-2"}, {"level": 3, "text": "장면 시작", "id": "스토리-08d-3관계정리클라이맥스-md-장면-시작-2"}, {"level": 3, "text": "중반 왜곡", "id": "스토리-08d-3관계정리클라이맥스-md-중반-왜곡-2"}, {"level": 3, "text": "핵심 압박", "id": "스토리-08d-3관계정리클라이맥스-md-핵심-압박-2"}, {"level": 3, "text": "선택지", "id": "스토리-08d-3관계정리클라이맥스-md-선택지-2"}, {"level": 3, "text": "실패 분기: 서린이 정한 길을 따른다", "id": "스토리-08d-3관계정리클라이맥스-md-실패-분기-서린이-정한-길을-따른다"}, {"level": 3, "text": "성공 분기: 내가 선택할게", "id": "스토리-08d-3관계정리클라이맥스-md-성공-분기-내가-선택할게"}, {"level": 2, "text": "나미루 클라이맥스: 문밖에 있는 방학식", "id": "스토리-08d-3관계정리클라이맥스-md-나미루-클라이맥스-문밖에-있는-방학식"}, {"level": 3, "text": "진입 조건", "id": "스토리-08d-3관계정리클라이맥스-md-진입-조건-3"}, {"level": 3, "text": "장소", "id": "스토리-08d-3관계정리클라이맥스-md-장소-3"}, {"level": 3, "text": "장면 시작", "id": "스토리-08d-3관계정리클라이맥스-md-장면-시작-3"}, {"level": 3, "text": "중반 왜곡", "id": "스토리-08d-3관계정리클라이맥스-md-중반-왜곡-3"}, {"level": 3, "text": "핵심 압박", "id": "스토리-08d-3관계정리클라이맥스-md-핵심-압박-3"}, {"level": 3, "text": "선택지", "id": "스토리-08d-3관계정리클라이맥스-md-선택지-3"}, {"level": 3, "text": "실패 분기: 계속 옆에 있어준다", "id": "스토리-08d-3관계정리클라이맥스-md-실패-분기-계속-옆에-있어준다"}, {"level": 3, "text": "성공 분기: 먼저 해보게 한다", "id": "스토리-08d-3관계정리클라이맥스-md-성공-분기-먼저-해보게-한다"}, {"level": 2, "text": "D-3 정산 규칙", "id": "스토리-08d-3관계정리클라이맥스-md-d-3-정산-규칙"}, {"level": 2, "text": "다음 연결", "id": "스토리-08d-3관계정리클라이맥스-md-다음-연결"}], "plain": "# D-3 관계 정리 클라이맥스 이 문서는 D-3 화요일에 배치되는 소하/서린/미루 관계 정리 클라이맥스를 대본 수준으로 정리한다. D-3의 목적은 서브히로인 결론을 내는 것이 아니라, 재윤이 하연에게 가기 전에 숨을 수 있는 세 가지 도피처를 끝내는 것이다. - 소하: 아무 일도 없던 과거 - 서린: 대신 골라주는 정답 - 미루: 필요한 사람으로 남는 의존 D-3을 통과해야 D-2의 `말하지 못한 예감`과 D-Day의 `[하연에게 말하러 간다]`가 감정적으로 설득된다. ## 공통 연출 원칙 ### 날짜와 분위기 - 내부 기준일: D-3 화요일 - 게임 내 표기: 축제 전 주 화요일 / 축제 준비 막바지 - 날씨: 습하고 더운 흐린 오후. 비는 오지 않지만 공기가 무겁다. - 학교 분위기: 축제 준비가 거의 마무리되어 모두 바쁘지만, 재윤에게는 소음이 멀게 들린다. - UI: 같은 시간대에 세 관계 정리 이벤트 중 필요한 축이 발생한다. 조건이 충분하면 선택지를 통해 정리할 수 있고, 조건이 부족하면 새드엔딩 쪽 선택지가 강해진다. ### 공통 구조 1. 축제 준비 소음에서 재윤이 잠시 떨어진다. 2. 해당 인물이 재윤을 붙잡거나, 재윤이 미뤄둔 약속을 떠올리고 찾아간다. 3. 초반에는 현실적인 대화로 시작한다. 4. 중반부터 내면세계가 인물의 감정 방어기제에 맞게 왜곡된다. 5. 실패 선택지는 편하고 달콤하지만 시간이 멈춘다. 6. 성공 선택지는 상처를 주는 말이 아니라, 관계를 거짓으로 만들지 않는 말이어야 한다. 7. 성공 시 각 인물은 진엔딩에 필요한 단서 조각을 준다. ### 공통 성공 조건 - 재윤이 상대를 부정하지 않는다. - 상대가 자신에게 중요했음을 인정한다. - 그러나 그 관계를 하연에게 가는 마음의 대체물로 쓰지 않는다. - `미안해`만 반복하지 않고, 지금 무엇을 선택할지 말한다. ### 공통 실패 조건 - 재윤이 미안함 때문에 상대가 원하는 세계에 남는다. - 상대가 상처받지 않게 하려고 현재의 마음을 숨긴다. - `나중에 말할게`, `지금은 모르겠어`, `네가 정해줘`, `내가 계속 있을게`처럼 선택을 미룬다. --- ## 한소하 클라이맥스: 아무 일도 없던 골목 ### 진입 조건 발생 조건: - `SoHaPressure`가 일정 이상이거나, 소하 이벤트를 충분히 진행했다. - D-7 이전에 하연에 대한 마음을 소하 앞에서 얼버무린 적이 있다. - D-13 주말 소하 이벤트를 봤거나, D-28/D-21에서 소하 선택을 한 적이 있다. 정리 가능 조건: - 재윤이 하연에게 마음이 향하고 있음을 최소 한 번 자각했다. - 소하에게 거짓 약속을 하지 않았다. - 소하 이벤트에서 오래된 관계를 소중히 여기되, 현재 마음을 회피하지 않는 선택을 1회 이상 했다. 부족 시: - 성공 선택지가 흐리게 보이거나 늦게 나타난다. - 실패 선택지 `[예전처럼 돌아간다]`가 먼저 떠오른다. ### 장소 오래된 등굣길 골목. 학교에서 시작하지만, 대화가 깊어질수록 배경은 첫 회차 D-32 월요일 아침의 골목처럼 바뀐다. 하늘은 오후인데 골목의 빛은 아침이다. 편의점 앞에는 예전에 같이 마셨던 음료가 놓여 있고, 전광판 날짜는 읽히지 않는다. ### 장면 시작 축제 준비가 끝나갈 무렵, 소하가 재윤을 복도에서 붙잡는다. ```text 소하: 야, 유재윤. 재윤: 어? 소하: 잠깐만 나와. 재윤: 지금? 반 정리 아직... 소하: 네가 그런 말 할 때마다 진짜 웃긴 거 알아? 재윤: 뭐가. 소하: 항상 바쁜 척은 하는데, 정작 중요한 말은 제일 늦게 하잖아. ``` 소하는 장난스럽게 말하지만, 눈은 웃지 않는다. ```text 재윤: 무슨 일인데. 소하: 모르겠어? 재윤: ...미안. 소하: 그 말 말고. ``` `미안`이라는 말이 나오자 복도 소리가 한 번 작아진다. 소하는 재윤의 손목을 잡지는 않는다. 대신 먼저 걸어간다. 재윤은 따라갈 수밖에 없다. ### 중반 왜곡 둘이 계단을 내려가면 학교 현관이 아니라 오래된 골목이 나온다. ```text 재윤: 여긴... 소하: 이상해? 재윤: 학교였는데. 소하: 우리한텐 여기가 더 익숙하잖아. ``` 편의점 앞 벤치. 소하는 재윤이 예전에 좋아하던 음료를 들어 보인다. ```text 소하: 아직도 이거 마시지? 재윤: 가끔. 소하: 가끔 아니잖아. 너 시험 전날엔 꼭 이거 마셨고, 하키 연습 늦게 끝난 날엔 단 거 싫다면서 이것만 마셨고, 비 오는 날엔... 재윤: 소하야. 소하: 봐. 나는 다 기억해. ``` 소하는 웃으려 하지만 목소리가 떨린다. ```text 소하: 그러니까 이상하잖아. 재윤: 뭐가. 소하: 네가 갑자기 모르는 사람처럼 굴잖아. ``` ### 핵심 압박 ```text 소하: 그 애가 오기 전엔 괜찮았어. 재윤: 하연이 때문만은 아니야. 소하: 이름 바로 나오네. 재윤: ... 소하: 봐. 너는 대답이 느린 애였는데, 그 이름은 빠르네. ``` 소하가 웃는다. 이번엔 확실히 아프게 웃는다. ```text 소하: 여기 있으면 아무 일도 일어나지 않아. 재윤: 소하야. 소하: 우리가 원래부터 행복했던 걸로 하면 되잖아. 재윤: 그건... 소하: 왜 안 돼? ``` 골목의 빛이 더 따뜻해진다. 멀리서 첫 회차 아침의 소음이 들린다. ```text 소하: 나랑 가면 돼. 내일도 같이 등교하고, 모레도 같이 장난치고, 축제 같은 건 적당히 지나가고. 소하: 네가 다치는 일도 없고, 누가 울면서 널 부르는 일도 없고. 재윤: ... 소하: 아무 일도 없던 날로 돌아가자. ``` ### 선택지 조건 부족 시: ```text [예전처럼 돌아간다] [아무 말도 하지 못한다] ``` 조건 충족 시: ```text [예전처럼 돌아간다] [지금의 마음까지 말한다] ``` ### 실패 분기: 예전처럼 돌아간다 ```text 재윤: ...그래. 소하: 뭐? 재윤: 그냥, 예전처럼 있자. ``` 소하는 안도한 듯 웃는다. 하지만 그 웃음은 첫 회차의 웃음처럼 고정된다. ```text 소하: 그럴 줄 알았어. ``` 화면은 다음 아침으로 넘어간다. 같은 골목, 같은 음료, 같은 농담. ```text 소하: 야, 유재윤. 또 늦었냐? 재윤: 미안. 소하: 됐어. 빨리 와. ``` 칠판에는 방학식 안내문이 붙어 있지만 날짜가 흐릿하다. 크레딧이 나온다면 짧고 따뜻한 가짜 크레딧이다. 핵심 문장: > 아무 일도 없던 날은 따뜻했다. > 그래서 재윤은, 자신이 깨어나지 않았다는 사실을 오래 모를 수 있었다. ### 성공 분기: 지금의 마음까지 말한다 재윤은 음료를 받지 않는다. ```text 재윤: 소하야. 소하: 응. 재윤: 나 너랑 같이 있던 시간, 아무렇지 않았던 거 아니야. 소하: ... 재윤: 네가 나 챙겨준 것도, 내가 당연하게 받은 것도, 전부 진짜였어. 소하: 그럼 여기 있으면 되잖아. 재윤: 근데 그걸 아무 일도 없던 걸로 만들면 안 될 것 같아. ``` 소하의 손이 멈춘다. ```text 소하: 왜. 재윤: 내가 지금 좋아하는 사람이 있어서. 소하: ... 재윤: 그 마음 때문에 무서워도, 그걸 네 옆에 숨기면 안 될 것 같아. ``` 소하는 한참 말하지 않는다. 골목의 아침빛이 조금씩 오후빛으로 돌아온다. ```text 소하: 진짜 짜증난다. 재윤: 미안. 소하: 미안하다고 하지 말랬지. 재윤: 응. 소하: 나한테도 솔직하지, 처음부터. ``` 재윤은 고개를 숙인다. ```text 재윤: 늦어서 미안해. 소하: 그건 받아줄게. ``` 소하는 음료를 자기 쪽으로 가져간다. ```text 소하: 나도 바보는 아니야. 재윤: 알아. 소하: 아니, 몰랐잖아. 너는 늘 내가 장난치면 괜찮은 줄 알았잖아. 재윤: ...응. ``` 소하는 숨을 고른다. ```text 소하: 축제날. 재윤: 응? 소하: 네가 기다리던 사람은 내가 아니었어. ``` 재윤의 귀에 멀리서 금속이 삐걱이는 소리가 아주 작게 들린다. ```text 재윤: 그걸 네가 어떻게... 소하: 모르겠어. 근데 알아. 계속 그런 느낌이었어. 소하: 네가 어딘가로 가려고 했는데, 나는 그걸 못 본 척하고 싶었던 것 같아. ``` 소하는 뒤돌아선다. ```text 소하: 가. 재윤: 소하야. 소하: 지금 안 가면 또 늦잖아. ``` 성공 결과: - `SoHaResolved = true` - `AccidentClueSoHa = true` - `SoHaPressure` 감소 - 소하 새드엔딩 차단 마지막 내레이션: > 오래된 길은 사라지지 않았다. > 다만 재윤은, 그 길을 핑계로 지금의 마음을 지우지 않기로 했다. --- ## 백서린 클라이맥스: 정답이 닫힌 방송실 ### 진입 조건 발생 조건: - D-9 야외 소무대 점검표 또는 방송/학생회 지원 이벤트를 봤다. - D-9 방송실 상담에서 마음의 기준을 묻거나, `선배가 보기엔 누가 맞아요?`처럼 선택을 서린에게 맡기려 했다. - 재윤이 선택을 서린에게 맡긴 적이 있다. - D-Day 위험 단서 중 하나가 서린 문서에서 나온 상태다. 정리 가능 조건: - `AccidentClueSeoRin`을 확인했거나, 소무대 위험 문서를 직접 읽었다. - 재윤이 적어도 한 번 서린에게 자기 의견을 말한 적이 있다. - D-9 상담에서 `[정답이 아니라, 내가 고를 이유를 찾는다]`를 선택했거나, 그에 준하는 자기 이유를 말하려 했다. - 하연에게 가려는 마음을 `위험하니까 안 된다`는 말만으로 덮지 않는다. 부족 시: - 선택지 UI가 서린의 문장처럼 정리된다. - `[내가 선택할게]`가 잠겨 있거나 노이즈가 낀다. ### 장소 방송실. 처음에는 현실의 방송실이다. 모니터, 큐시트, 마이크, 케이블, 축제 안내 멘트가 놓여 있다. 대화가 깊어질수록 방송실 밖 복도 소리가 사라지고, 모든 문서가 같은 문장으로 바뀐다. `위험하므로 접근 금지.` ### 장면 시작 재윤은 D-Day 방송 큐시트를 확인하러 방송실에 들른다. 서린은 이미 모든 자료를 정리해두었다. 책상 한쪽에는 D-9 상담 때 재윤이 보았던 메모가 남아 있다. `좋아하는 마음 / 미안한 마음 / 책임감 / 익숙함`이라는 네 줄은, 대화가 깊어질수록 `정답 / 정답 / 정답 / 정답`으로 번져 보인다. ```text 서린: 늦었어. 재윤: 미안해요. 반 정리가 좀 늦어서. 서린: 알고 있어. 그래서 네 몫까지 정리해뒀어. 재윤: 제 몫까지요? ``` 서린은 검은 바인더를 연다. ```text 서린: 축제 2일차 동선. 방송 장비 회수 시간. 야외 소무대 접근 제한. 네가 하지 않아도 되는 일. 재윤: 하지 않아도 되는 일? 서린: 위험한 곳에 가지 않는 것. ``` ### 중반 왜곡 모니터에 축제 안내 문구가 뜬다. ```text [안전한 동선을 따르십시오] [지정된 선택지만 선택하십시오] [위험한 감정은 폐장 후 정리하지 마십시오] ``` 재윤은 눈을 깜빡인다. ```text 재윤: 방금... 서린: 피곤한 거야. 재윤: 선배. 서린: 유재윤. ``` 서린이 이름을 부르면 방송실 스피커에서도 같은 목소리가 나온다. ```text 방송: 유재윤 학생은 지정된 위치에서 대기하십시오. ``` 서린은 놀라지 않는다. ```text 서린: 넌 늘 늦게 고르고, 늦게 말하고, 늦게 후회해. 재윤: ... 서린: 그러니까 이번엔 내가 먼저 정리할게. ``` ### 핵심 압박 서린은 점검표를 재윤에게 내민다. ```text 서린: 야외 소무대 임시 조명 프레임. 고정 상태 불안정. 폐장 후 접근 제한 필요. 재윤: 이거... 서린: 네가 봤어도 달라지는 건 없어. 재윤: 제가 알아야 하는 일이에요. 서린: 알아서 뭘 하려고? ``` 재윤은 대답하지 못한다. ```text 서린: 하연에게 갈 거야? 재윤: ... 서린: 위험하다는 걸 알면서? 재윤: 그건... 서린: 그럼 답은 정해졌어. ``` 모니터에 선택지가 뜬다. ```text [서린이 정한 길을 따른다] ``` 다른 선택지는 없다. ```text 서린: 내가 정리해줄게. 너는 틀리지 않아도 돼. 재윤: 선배는 왜 그렇게까지... 서린: 네가 또 다치는 꼴 보기 싫으니까. ``` D-9 상담 실패 상태라면 재윤의 머릿속에 `선배가 보기엔 누가 맞아요?`라고 묻던 자기 목소리가 먼저 떠오른다. 성공 상태라면 서린의 말이 겹친다. ```text 서린: 맞는 답이 아니라, 네가 고른 이유를 가져와. ``` 이 말은 차갑지 않다. 그래서 더 위험하다. ### 선택지 조건 부족 시: ```text [서린이 정한 길을 따른다] [선택하지 않는다] ``` 조건 충족 시, 화면이 한 번 흔들린 뒤 새 선택지가 생긴다. ```text [서린이 정한 길을 따른다] [내가 선택할게] ``` ### 실패 분기: 서린이 정한 길을 따른다 ```text 재윤: ...선배 말이 맞아요. 서린: 그래. 재윤: 제가 고르면, 또 늦을 것 같아요. 서린: 괜찮아. 내가 고르면 돼. ``` 방송실은 완벽하게 조용해진다. 큐시트에는 모든 시간이 정리되어 있다. ```text 방송: 모든 일정은 정상 진행됩니다. 방송: 모든 위험은 통제되었습니다. 방송: 모든 선택은 완료되었습니다. ``` 하지만 창밖은 계속 같은 시간이다. 방학식 일정표는 월요일까지 적혀 있으나 시계 바늘은 움직이지 않는다. 핵심 문장: > 모든 순서는 맞았다. > 그런데 재윤이 고른 것은 하나도 없었다. ### 성공 분기: 내가 선택할게 재윤은 바인더를 닫지 않는다. 대신 점검표를 자기 손으로 잡는다. ```text 재윤: 선배. 서린: 말해. 재윤: 저, 틀릴 수도 있어요. 서린: 알아. 재윤: 늦을 수도 있고요. 서린: 그것도 알아. 재윤: 그래도 제가 골라야 해요. ``` 방송실 스피커에서 노이즈가 난다. ```text 방송: 지정된 선택지가 아닙니다. ``` 재윤은 모니터를 보지 않는다. ```text 재윤: 위험하니까 안 가는 게 정답일 수도 있어요. 서린: 그렇지. 재윤: 근데 그게 제가 마음을 숨기는 이유가 되면, 그건 정답이 아니에요. ``` 서린의 표정이 아주 조금 무너진다. ```text 서린: 너는 네가 다친 게 네 선택 때문이라고 생각해? 재윤: 모르겠어요. 서린: 아니야. ``` 서린은 큐시트에서 한 장을 빼낸다. 야외 소무대 점검표다. ```text 서린: 네가 틀린 선택을 해서 그 애가 다친 게 아니야. 재윤: ... 서린: 네가 선택했기 때문에, 그 애가 살아 있는 거야. ``` 재윤은 숨을 멈춘다. ```text 재윤: 그 애... 서린: 이름은 네가 말해야지. ``` 스피커 노이즈가 멈춘다. 방송실 밖 복도 소리가 돌아온다. ```text 서린: 이건 네가 가져가. 재윤: 괜찮아요? 서린: 원본은 내가 갖고 있어. 재윤: 역시 선배답네요. 서린: 농담할 상태 아니야. ``` 잠깐 침묵. ```text 서린: 그날 네가 물었지. 어떻게 해야 맞냐고. 재윤: 네. 서린: 지금도 같은 대답이야. 맞는 걸 찾지 말고, 네가 고른 이유를 봐. 재윤: ...그래서 하연에게 가려고요. 서린: 그래도, 네가 고른 답이면 끝까지 봐. 재윤: 네. 서린: 중간에 나한테 떠넘기지 말고. 재윤: 안 그럴게요. ``` 성공 결과: - `SeoRinResolved = true` - `AccidentClueSeoRin = true` - `SeoRinControl` 감소 - 서린 새드엔딩 차단 마지막 내레이션: > 정답은 사라지지 않았다. > 다만 재윤은, 정답 뒤에 숨어 선택하지 않는 일을 그만두기로 했다. --- ## 나미루 클라이맥스: 문밖에 있는 방학식 ### 진입 조건 발생 조건: - 미루 멘토링 이벤트를 진행했다. - 도움 인원 신청서, 체크리스트, 출입 제한 표지 중 하나를 확인했다. - D+3 방학식이 멘토링 종료일이라는 사실이 강조된 상태다. 정리 가능 조건: - 재윤이 미루에게 답을 대신 주기보다 먼저 해보게 한 적이 있다. - 미루가 축제 도움 인원으로 스스로 맡은 일이 있다. - `AccidentClueMiRu` 또는 그 전조를 확인했다. 부족 시: - `[먼저 해보게 한다]` 선택지가 미루의 울먹임 때문에 흔들린다. - 체크리스트가 계속 늘어나며 실패 선택지가 달콤하게 보인다. ### 장소 학교 복도에서 시작한다. 미루가 들고 있던 체크리스트를 떨어뜨리고, 재윤이 주워주려는 순간 복도 문들이 하나씩 사라진다. 벽에는 방학식 안내문이 붙어 있지만 문밖에만 있다. 복도 끝 교실은 미루의 방처럼 좁은 공간으로 변한다. ### 장면 시작 ```text 미루: 선배. 재윤: 미루야? 아직 안 갔어? 미루: 확인만 받으면 돼요. 재윤: 뭘? 미루: 이것도요. 이것도. 이것도요. ``` 미루는 체크리스트를 내민다. ```text 재윤: 이거 축제 도움 인원 체크리스트잖아. 대부분 네가 이미 했는데? 미루: 그래도 선배가 봐줘야 확실하잖아요. 재윤: 네가 확인해도 돼. 미루: 제가요? ``` 미루는 진심으로 놀란다. ### 중반 왜곡 프린트가 바닥에 떨어진다. 재윤이 줍는 사이 항목이 늘어난다. ```text [신청서 확인] [보고 대상 확인] [출입 제한 확인] [고정끈 확인] [선배가 떠나지 않는지 확인] [방학식이 오지 않는지 확인] ``` 재윤은 마지막 항목을 본다. ```text 재윤: 이건 뭐야. 미루: 보면 안 돼요. 재윤: 미루야. 미루: 보면 선배가 가버릴 것 같아서요. ``` 복도 끝 문에 `방학식`이라고 적힌 안내문이 붙어 있다. 문틈으로 여름 햇빛이 보인다. ```text 재윤: 방학식은 와야 해. 미루: 왜요? 재윤: 그래야 이번 학기가 끝나니까. 미루: 끝나면요? ``` 미루는 체크리스트를 가슴에 안는다. ```text 미루: 끝나면 멘토링도 끝나잖아요. 재윤: 응. 미루: 그러면 선배도 끝나는 거잖아요. ``` ### 핵심 압박 공간이 점점 좁아진다. ```text 미루: 여기에 있으면 아무 일도 일어나지 않은 걸로 할 수 있어요. 재윤: 아니야. 미루: 선배가 다치지도 않고, 병원에 누워 있지도 않고. 재윤: ... 미루: 제가 계속 모르는 걸 만들게요. ``` 미루는 웃으려 하지만 눈물이 맺힌다. ```text 미루: 그러니까 계속 가르쳐주세요. 재윤: 미루야. 미루: 선배가 없으면 저는 아직 아무것도 못 해요. ``` 잠깐 뒤, 더 작은 목소리. ```text 미루: 방학식만 안 오면, 아직 멘토링 끝난 거 아니죠? ``` ### 선택지 조건 부족 시: ```text [계속 옆에 있어준다] [오늘만 더 도와준다] ``` 조건 충족 시: ```text [계속 옆에 있어준다
