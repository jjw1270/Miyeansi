] [먼저 해보게 한다] ``` ### 실패 분기: 계속 옆에 있어준다 ```text 재윤: 알았어. 오늘은 내가 봐줄게. 미루: 정말요? 재윤: 응. 괜찮아. ``` 미루는 안심한 얼굴로 웃는다. 체크리스트 첫 줄이 지워지고, 곧 두 줄이 새로 생긴다. ```text 미루: 그럼 이것도요. 재윤: ...응. 미루: 내일도요? 재윤: 응. ``` 문밖의 방학식 안내문이 흐려진다. 오르골 같은 음악이 같은 마디를 반복한다. 핵심 문장: > 필요한 사람이 되는 건 따뜻했다. > 하지만 그 따뜻함은 문을 닫고 있었다. ### 성공 분기: 먼저 해보게 한다 재윤은 체크리스트를 받지 않는다. 대신 미루가 볼 수 있게 책상 위에 내려놓는다. ```text 재윤: 미루야. 미루: 네. 재윤: 내가 봐주면 당장은 편할 거야. 미루: 그럼 봐주세요. 재윤: 근데 그러면 네가 한 게 아니게 돼. ``` 미루의 표정이 무너진다. ```text 미루: 저는 아직... 재윤: 아직 무서운 거 알아. 미루: 선배는 모르잖아요. 재윤: 몰라. 다는 몰라. ``` 재윤은 천천히 말한다. ```text 재윤: 그래도 네가 못 한다고 정해버리는 건, 내가 하면 안 되는 일이야. 미루: ... 재윤: 먼저 해봐. 틀리면 그때 물어봐. 미루: 그럼 선배는요? 재윤: 사라지는 게 아니야. ``` 미루가 고개를 든다. ```text 미루: 멘토링 끝나도요? 재윤: 응. 미루: 방학식 지나도요? 재윤: 응. 끝나야 다음에 또 인사하지. ``` 문밖의 빛이 조금 선명해진다. 미루는 체크리스트를 자기 쪽으로 가져간다. 손은 떨리지만, 품에 숨기지 않는다. ```text 미루: 그럼... 제가 먼저 읽어볼게요. 재윤: 응. 미루: 보고 대상은 학생회 운영본부. 출입 제한 표지는 소무대 뒤편. 고정끈은... ``` 미루가 멈춘다. ```text 재윤: 왜? 미루: 이거, 이상해요. 재윤: 뭐가. 미루: 고정끈이 끊어진 게 아니라... 누가 임시로 묶어둔 것 같아요. ``` 재윤의 시야에 금속 프레임이 아주 짧게 스친다. ```text 미루: 그리고... 재윤: 응. 미루: 밖에서 누군가 계속 선배 이름을 부르고 있어요. ``` 재윤은 숨을 멈춘다. ```text 미루: 저는 그 목소리가 싫었어요. 재윤: 왜? 미루: 그 목소리가 들리면, 선배가 저 말고 다른 데로 갈 것 같아서요. ``` 미루는 울지만 체크리스트를 놓지 않는다. ```text 미루: 그래도... 가야 하는 거죠? 재윤: 응. 미루: 그럼 저도 제 거 해볼게요. ``` 성공 결과: - `MiRuResolved = true` - `AccidentClueMiRu = true` - `MiRuDependence` 감소 - 미루 새드엔딩 차단 마지막 내레이션: > 끝나는 관계가 모두 사라지는 것은 아니었다. > 어떤 관계는 끝났기 때문에, 다음 인사를 남길 수 있었다. --- ## D-3 정산 규칙 D-3 종료 시 다음 상태를 정산한다. | 상태 | 결과 | | --- | --- | | 세 관계 모두 정리 | D-2 하연 예감 장면에서 재윤의 시야가 가장 선명해짐 | | 한 축 미정리 | D-2 장면에 해당 인물의 왜곡 이미지가 끼어듦 | | 둘 이상 미정리 | D-Day 성공 선택지가 잠기거나, 하연 동선 이해가 크게 약화됨 | | 하연 신뢰 부족 + 관계 미정리 | 하연 실패 루프 우선 | | 기존 관계 중 하나가 강하게 미정리 | 해당 새드엔딩 선택지가 D-Day에 재등장 | D-3에서 정리한 관계는 D-Day 낮 축제 선택에서도 짧게 확인된다. - 소하 정리 성공: 소하가 장난스럽게 재윤을 보내주되, 눈으로는 하연 쪽을 확인한다. - 서린 정리 성공: 서린이 폐장 후 방송 큐시트를 넘기며 `네가 직접 확인해`라고 말한다. - 미루 정리 성공: 미루가 도움 인원 체크리스트를 스스로 들고 와 `먼저 해봤어요`라고 말한다. ## 다음 연결 D-3을 통과하면 [D-2 말하지 못한 예감](./09_D-2_말하지_못한_예감.md)으로 이어진다. D-2에서 하연은 직접 약속을 잡지 않는다. 대신 재윤은 D-3에서 정리한 관계들 덕분에, 하연의 침묵과 조용한 동선을 도피가 아니라 마음을 정리하는 방식으로 이해할 수 있게 된다. 핵심 연결 문장: > 붙잡는 목소리들이 조금씩 멀어지자, 재윤은 비로소 하연이 아무 말 없이 바라보던 방향을 볼 수 있었다.", "excerpt": "# D-3 관계 정리 클라이맥스 이 문서는 D-3 화요일에 배치되는 소하/서린/미루 관계 정리 클라이맥스를 대본 수준으로 정리한다. D-3의 목적은 서브히로인 결론을 내는 것이 아니라, 재윤이 하연에게 가기 전에 숨을 수 있는 세 가지 도피처를 끝내는 것이다. - 소하: 아무 일도 없던 과거 - 서린: 대신 골라주는 정답 - 미루: 필요한 사람으로 남는 의존 D-3을 통과해야 D-2의 `말하"}, {"path": "스토리/09_D-2_말하지_못한_예감.md", "category": "스토리", "title": "D-2 말하지 못한 예감", "id": "스토리-09d-2말하지못한예감-md", "html": "<h2 id=\"스토리-09d-2말하지못한예감-md-d-2-말하지-못한-예감\">D-2 말하지 못한 예감<\/h2>\n<p>이 문서는 D-2 수요일 하연 컷신을 대본 수준으로 정리한다.<\/p>\n<p>D-2의 핵심은 고백도 약속도 아니다. 하연이 먼저 <code>축제가 끝나고 보자<\/code>고 말하지 않는다. 대신 재윤이 D-3에서 소하/서린/미루의 도피처를 정리한 뒤, 하연이 어떤 방식으로 마음을 정리하는 사람인지 이해하게 되는 장면이다.<\/p>\n<p>D-2가 성공적으로 성립해야 D-Day 폐장 후 재윤이 하연을 <code>불려서<\/code> 가는 것이 아니라, 하연이 있을 곳을 스스로 알아차려 찾아갈 수 있다.<\/p>\n<h3 id=\"스토리-09d-2말하지못한예감-md-장면-목적\">장면 목적<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>목적<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td>하연의 동선 이해<\/td><td>하연은 시끄러운 중심이 아니라 조용한 가장자리에서 마음을 정리하는 사람임을 보여준다.<\/td><\/tr><tr><td>약속 없는 예감<\/td><td>시간/장소를 정하지 않고도, 재윤이 하연이 향할 곳을 이해하게 만든다.<\/td><\/tr><tr><td>D-3 정산 반영<\/td><td>기존 관계를 정리했을수록 재윤의 시야가 선명해지고, 미정리 축은 장면에 왜곡으로 끼어든다.<\/td><\/tr><tr><td>D-Day 조건 예고<\/td><td><code>HaYeonPaceRead<\/code>와 <code>AccidentClueHaYeon<\/code>을 강화하고, 폐장 후 성공/실패 분기의 감정 근거가 된다.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-09d-2말하지못한예감-md-발생-조건\">발생 조건<\/h3>\n<p>기본 발생:<\/p>\n<ul>\n<li>D-2 수요일, 축제 1일차 전날.<\/li>\n<li><code>쉬어가 카페<\/code> 준비가 거의 끝난 상태.<\/li>\n<li>재윤과 하연이 교실에 남아 마지막 장식, 메뉴판, 안내 문구를 정리한다.<\/li>\n<\/ul>\n<p>장면 선명도 조건:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>조건<\/th><th>장면 변화<\/th><\/tr><\/thead><tbody><tr><td>D-3 세 관계 모두 정리<\/td><td>하연의 시선, 침묵, 소무대 방향이 선명하게 읽힌다.<\/td><\/tr><tr><td>소하 미정리<\/td><td>교실 밖에서 소하의 익숙한 목소리가 끼어들어 재윤이 하연을 바라보는 시간이 짧아진다.<\/td><\/tr><tr><td>서린 미정리<\/td><td><code>위험하니까 가지 말라<\/code>는 방송/점검표 이미지가 하연의 동선을 안전 문제로만 보이게 한다.<\/td><\/tr><tr><td>미루 미정리<\/td><td><code>가지 말아 달라<\/code>는 의존 이미지가 하연의 침묵과 겹쳐 재윤이 기다림을 부담으로 오해한다.<\/td><\/tr><tr><td>하연 신뢰 부족<\/td><td>하연의 말이 단순 혼잣말처럼 지나가고, 재윤은 폐장 후 동선을 기억하지 못한다.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-09d-2말하지못한예감-md-장소와-분위기\">장소와 분위기<\/h3>\n<p>배경 정본: <a href=\"./14_장소와_배경_묘사.md\">장소와 배경 묘사<\/a>의 <code>2학년 5반 교실<\/code>, <code>쉬어가 카페 준비 상태<\/code>, <code>D-2 창밖으로 보이는 소무대<\/code> 기준을 따른다.<\/p>\n<p>장소:<\/p>\n<ul>\n<li>2학년 5반 교실<\/li>\n<li><code>쉬어가 카페<\/code> 준비가 거의 끝난 상태<\/li>\n<li>창밖으로 운동장과 학교 뒤편 야외 소무대 방향이 멀리 보인다<\/li>\n<\/ul>\n<p>시간:<\/p>\n<ul>\n<li>해가 기울기 시작한 방과후<\/li>\n<li>창문으로 들어오는 노을빛이 교실 안 장식 종이와 메뉴판에 닿는다<\/li>\n<\/ul>\n<p>소품:<\/p>\n<ul>\n<li><code>쉬어가 카페<\/code> 메뉴판<\/li>\n<li>손글씨 안내 문구<\/li>\n<li>종이컵, 빈 테이프, 접힌 천막 안내문<\/li>\n<li>반별 축제 일정표<\/li>\n<li>창가에 붙이다 만 작은 장식<\/li>\n<li>멀리 보이는 야외 소무대 임시 조명 프레임<\/li>\n<\/ul>\n<p>소리:<\/p>\n<ul>\n<li>다른 반에서 망치질, 웃음소리, 테이프 뜯는 소리<\/li>\n<li>운동장 스피커 점검음<\/li>\n<li>가끔 들리는 방송실 테스트 음성<\/li>\n<li>장면 중반 이후 두 사람 주변만 조용해지는 느낌<\/li>\n<\/ul>\n<p>배경 이미지 핵심:<\/p>\n<ul>\n<li>상업 카페처럼 완성된 공간이 아니라, 학생들이 손으로 만든 임시 부스여야 한다.<\/li>\n<li>교실 안은 노을빛과 종이 장식으로 따뜻하지만, 창밖 소무대 방향은 조금 차분한 그림자로 분리한다.<\/li>\n<li>하연은 교실 중심보다 창가와 가장자리 쪽이 어울린다.<\/li>\n<li>소무대는 이 시점에서 목적지가 아니라, 하연이 마음을 정리하는 조용한 방향으로만 보인다.<\/li>\n<\/ul>\n<h3 id=\"스토리-09d-2말하지못한예감-md-컷신-대본\">컷신 대본<\/h3>\n<h4 id=\"스토리-09d-2말하지못한예감-md-1-교실에-남은-두-사람\">1. 교실에 남은 두 사람<\/h4>\n<p>방과후. 2학년 5반 교실.<\/p>\n<p>대부분의 학생은 돌아갔거나 다른 준비 장소로 흩어졌다. 교실 안에는 종이 장식, 메뉴판, 임시 카운터, 아직 정리하지 못한 종이컵이 남아 있다.<\/p>\n<p>재윤은 의자 위에 올라가 창가 장식을 붙이고 있다. 하연은 메뉴판 한쪽의 문구를 조용히 고친다.<\/p>\n<pre><code>재윤: 이쪽 높이 괜찮아?\n하연: 조금만 오른쪽.\n재윤: 이 정도?\n하연: 아니. 너무 많이.\n재윤: 어렵네.\n하연: 장식 붙이는 데도 성격 나와.\n재윤: 내 성격이 어떤데?\n하연: 한 박자 늦게 맞추는 쪽.<\/code><\/pre>\n<p>재윤은 웃으려다 멈춘다. 그 말이 농담처럼 들리지만, 이상하게 오래 남는다.<\/p>\n<pre><code>재윤: 그거 좋은 뜻이야?\n하연: 나쁜 뜻은 아니야.\n재윤: 좋은 뜻도 아니고?\n하연: 아직은.<\/code><\/pre>\n<p>하연은 다시 메뉴판을 본다.<\/p>\n<p>메뉴판에는 처음에 이렇게 적혀 있다.<\/p>\n<pre><code>축제에 지친 여러분을 위한 쉼터.\n반드시 쉬어가세요.<\/code><\/pre>\n<p>하연은 <code>반드시<\/code>라는 말을 지운다.<\/p>\n<pre><code>재윤: 그거 지우게?\n하연: 응.\n재윤: 왜?\n하연: 쉬는 것도 강요처럼 보이면 싫어서.<\/code><\/pre>\n<p>재윤은 의자에서 내려온다.<\/p>\n<pre><code>재윤: 그럼 뭐라고 쓰지?\n하연: 잠깐 앉아도 괜찮습니다.\n재윤: 괜찮다?\n하연: 응. 들어와도 되고, 안 들어와도 되는 느낌.<\/code><\/pre>\n<p>재윤은 그 말을 받아 적는다.<\/p>\n<pre><code>재윤: 잠깐 앉아도 괜찮습니다.\n하연: ...응.<\/code><\/pre>\n<p>하연의 표정이 아주 조금 풀린다.<\/p>\n<h4 id=\"스토리-09d-2말하지못한예감-md-2-방학식과-폐장-후-이야기\">2. 방학식과 폐장 후 이야기<\/h4>\n<p>반별 축제 일정표가 바닥에 떨어져 있다. 재윤은 그것을 주워 책상 위에 올린다.<\/p>\n<p>일정표에는 이렇게 적혀 있다.<\/p>\n<pre><code>목요일: 축제 1일차\n금요일: 축제 2일차\n주말\n월요일: 방학식<\/code><\/pre>\n<p>하연은 월요일 글자를 잠깐 본다.<\/p>\n<pre><code>하연: 축제 끝나면, 다 바로 가?\n재윤: 아마. 금요일엔 다 지쳐 있을걸.\n하연: 그렇겠지.\n재윤: 왜?\n하연: 그냥.<\/code><\/pre>\n<p>하연은 대답을 끝내고도 일정표에서 눈을 떼지 못한다.<\/p>\n<pre><code>재윤: 방학식 때문이야?\n하연: 아니.\n재윤: 축제 끝나는 게 싫어?\n하연: 그것도 아니야.<\/code><\/pre>\n<p>재윤은 더 묻지 않는다.<\/p>\n<p>D-3에서 관계 정리를 성공했다면, 이때 재윤은 소하/서린/미루의 목소리를 떠올리되 붙잡히지 않는다.<\/p>\n<ul>\n<li>소하: <code>지금 안 가면 또 늦잖아.<\/code><\/li>\n<li>서린: <code>네가 고른 답이면 끝까지 봐.<\/code><\/li>\n<li>미루: <code>저도 제 거 해볼게요.<\/code><\/li>\n<\/ul>\n<p>그 목소리들이 멀어지고, 하연의 침묵만 남는다.<\/p>\n<pre><code>재윤: 말하기 어려운 거면, 지금 안 해도 돼.\n하연: ...\n재윤: 그냥, 그런가 해서.<\/code><\/pre>\n<p>하연은 재윤을 잠깐 본다.<\/p>\n<pre><code>하연: 넌 가끔 이상하게 기다려.\n재윤: 이상하게?\n하연: 보통은 더 묻거나, 아예 모르는 척하잖아.\n재윤: 나도 예전엔 그랬던 것 같은데.\n하연: 지금은?\n재윤: 지금은... 기다리는 게 도망치는 거랑 다르다는 걸 조금 알 것 같아.<\/code><\/pre>\n<p>하연은 대답하지 않는다.<\/p>\n<h4 id=\"스토리-09d-2말하지못한예감-md-3-창밖의-소무대\">3. 창밖의 소무대<\/h4>\n<p>하연은 메뉴판을 내려놓고 창가로 간다.<\/p>\n<p>창밖에는 축제 천막이 반쯤 세워져 있고, 운동장 끝에는 학교 뒤편 야외 소무대 방향이 보인다. 낮에는 아무렇지 않은 장소다. 하지만 임시 조명 프레임이 서 있고, 주변에는 아직 정리되지 않은 케이블이 있다.<\/p>\n<p>배경 연출 기준:<\/p>\n<ul>\n<li>카메라는 교실 안쪽에서 창밖을 보는 구도가 좋다.<\/li>\n<li>창틀, 붙이다 만 장식, 손글씨 메뉴판 일부가 전경에 걸리고, 멀리 작은 조명 프레임이 보인다.<\/li>\n<li>소무대는 위험을 노골적으로 드러내기보다, 하연의 시선이 오래 머무는 조용한 가장자리처럼 보여야 한다.<\/li>\n<li>조건이 부족한 경우에는 복도 소음이나 소하의 목소리가 이 구도를 끊어, 재윤이 하연의 시선을 끝까지 읽지 못하게 한다.<\/li>\n<\/ul>\n<p>하연은 그 방향을 오래 본다.<\/p>\n<pre><code>재윤: 저기 신경 쓰여?\n하연: ...조용해 보여서.\n재윤: 소무대?\n하연: 낮엔 시끄러운데, 끝나면 조용해질 것 같아.<\/code><\/pre>\n<p>재윤은 창밖을 본다.<\/p>\n<pre><code>재윤: 폐장 후엔 위험할 수도 있어.\n하연: 알아.\n재윤: 서린 선배가 점검표 보여줬어. 임시 프레임이랑 고정끈.\n하연: 그럼 가지 말아야겠네.<\/code><\/pre>\n<p>하연의 말은 평범하지만, 목소리에는 약간의 흔들림이 있다.<\/p>\n<pre><code>재윤: 그런데 계속 보고 있네.\n하연: 응.\n재윤: 왜?\n하연: 조용해지면...<\/code><\/pre>\n<p>하연은 말을 멈춘다.<\/p>\n<pre><code>재윤: 조용해지면?\n하연: 말하기 쉬워질까 해서.<\/code><\/pre>\n<p>재윤은 바로 대답하지 않는다.<\/p>\n<p>이 장면에서 중요한 것은 재윤이 <code>그럼 축제 끝나고 거기서 보자<\/code>라고 말하지 않는 것이다. 하연도 <code>기다릴게<\/code>라고 말하지 않는다.<\/p>\n<pre><code>재윤: 나한테?\n하연: 모르겠어.\n재윤: ...\n하연: 아직은.<\/code><\/pre>\n<p>하연은 창가 장식을 손끝으로 만진다.<\/p>\n<pre><code>하연: 말하려고 하면, 자꾸 시끄러워져.\n재윤: 주변이?\n하연: 아니. 내가.<\/code><\/pre>\n<p>재윤은 그 말을 이해하려고 한다.<\/p>\n<pre><code>재윤: 그래서 조용한 데가 필요해?\n하연: 아마.\n재윤: 혼자 있고 싶다는 뜻이야?\n하연: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라.<\/code><\/pre>\n<p>재윤은 그 차이를 천천히 받아들인다.<\/p>\n<h4 id=\"스토리-09d-2말하지못한예감-md-4-조건별-장면-흔들림\">4. 조건별 장면 흔들림<\/h4>\n<h5 id=\"스토리-09d-2말하지못한예감-md-조건-충족-시야가-선명한-경우\">조건 충족: 시야가 선명한 경우<\/h5>\n<p>D-3 관계 정리가 충분하고 <code>HaYeonTrust<\/code>가 높다면, 재윤은 하연의 말을 붙잡아 약속으로 만들지 않고도 이해한다.<\/p>\n<pre><code>재윤: 네가 조용한 데로 가면.\n하연: 응.\n재윤: 그게 도망치는 건 아닐 수도 있겠네.\n하연: ...\n재윤: 그냥, 말할 준비를 하는 걸 수도 있고.<\/code><\/pre>\n<p>하연은 재윤을 본다.<\/p>\n<pre><code>하연: 그렇게 생각해?\n재윤: 응.\n하연: 왜?\n재윤: 나도 그랬던 것 같아서.<\/code><\/pre>\n<p>하연의 눈가가 조금 풀린다.<\/p>\n<pre><code>하연: 한 박자 늦게 맞추는 쪽이라서?\n재윤: 그 말, 오래 가네.\n하연: 너한테 어울려.\n재윤: 좋은 뜻이야?\n하연: 이번엔.<\/code><\/pre>\n<p>이 경우 <code>HaYeonPaceRead<\/code>가 상승한다.<\/p>\n<h5 id=\"스토리-09d-2말하지못한예감-md-조건-부족-기존-관계가-끼어드는-경우\">조건 부족: 기존 관계가 끼어드는 경우<\/h5>\n<p>소하 미정리:<\/p>\n<p>복도에서 소하의 목소리가 들린다.<\/p>\n<pre><code>소하의 목소리: 야, 유재윤. 아직도 거기 있어?<\/code><\/pre>\n<p>재윤이 돌아보는 사이 하연은 창가에서 한 걸음 물러난다. 소무대 방향을 보던 시선이 끊긴다.<\/p>\n<p>서린 미정리:<\/p>\n<p>방송 스피커에서 테스트 음성이 흐른다.<\/p>\n<pre><code>방송: 폐장 후 야외 소무대 접근을 금지합니다.<\/code><\/pre>\n<p>재윤은 하연의 침묵을 <code>가면 안 되는 곳에 대한 불안<\/code>으로만 해석한다. 하연이 마음을 정리하는 방식이라는 감각이 흐려진다.<\/p>\n<p>미루 미정리:<\/p>\n<p>책상 위 체크리스트에 없는 문장이 보인다.<\/p>\n<pre><code>[가지 말아 주세요]<\/code><\/pre>\n<p>재윤은 하연의 <code>혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라<\/code>라는 말을 부담스럽게 받아들이고, 기다림과 의존을 구분하지 못한다.<\/p>\n<p>하연 신뢰 부족:<\/p>\n<p>하연은 창밖을 오래 보지 않는다.<\/p>\n<pre><code>하연: 아무것도 아니야.<\/code><\/pre>\n<p>그 말과 함께 장면은 평범한 축제 준비로 돌아간다. 플레이어는 소무대 방향을 보지만, 재윤은 기억하지 못한다.<\/p>\n<h4 id=\"스토리-09d-2말하지못한예감-md-5-말하지-못한-문장\">5. 말하지 못한 문장<\/h4>\n<p>조건이 충분한 경우, 하연은 다시 메뉴판 앞으로 돌아온다.<\/p>\n<pre><code>하연: 문구, 이걸로 할래.\n재윤: 잠깐 앉아도 괜찮습니다?\n하연: 응.\n재윤: 더 붙일 말은 없어?\n하연: 없어.<\/code><\/pre>\n<p>재윤은 잠깐 망설인다.<\/p>\n<pre><code>재윤: 나는 있는 것 같은데.\n하연: 어떤 말?\n재윤: 아직은 못 하겠어.<\/code><\/pre>\n<p>하연은 웃지 않는다. 실망하지도 않는다.<\/p>\n<pre><code>하연: 그럼 아직 하지 마.\n재윤: 그래도 돼?\n하연: 대신, 없던 말처럼 만들지는 마.<\/code><\/pre>\n<p>재윤은 그 말에 대답하지 못한다.<\/p>\n<pre><code>재윤: 너도?\n하연: 응.\n재윤: 없던 말처럼 만들지 않을 거야?\n하연: 노력할게.<\/code><\/pre>\n<p>두 사람은 서로를 본다.<\/p>\n<p>이 장면은 고백이 아니다. 하지만 서로에게 아직 말하지 못한 마음이 있다는 사실을 처음으로 함께 인정하는 장면이다.<\/p>\n<h4 id=\"스토리-09d-2말하지못한예감-md-6-마지막-정리\">6. 마지막 정리<\/h4>\n<p>교실 문 앞에서 하연은 잠깐 멈춘다.<\/p>\n<pre><code>하연: 재윤아.\n재윤: 응.\n하연: 내일 바쁘겠다.\n재윤: 축제 첫날이니까.\n하연: 모레는 더 바쁘겠네.\n재윤: 축제 마지막 날이니까.<\/code><\/pre>\n<p>하연은 고개를 끄덕인다.<\/p>\n<pre><code>하연: 그렇지.<\/code><\/pre>\n<p>하연은 더 말하지 않는다. 시간도 장소도 정하지 않는다.<\/p>\n<p>재윤도 묻지 않는다.<\/p>\n<p>대신 재윤은 창밖을 다시 본다. 운동장 뒤편, 낮에도 사람이 많지 않은 소무대 방향. 해가 거의 지면서 그쪽만 잠깐 조용한 그림자에 잠긴다.<\/p>\n<p>내레이션:<\/p>\n<blockquote>약속은 없었다.  <\/blockquote>\n<blockquote>하지만 재윤은 이상하게 알 것 같았다.  <\/blockquote>\n<blockquote>하연이 마음을 꺼내야 한다면, 어디에서 숨을 고를지.<\/blockquote>\n<p>하연은 복도로 나간다.<\/p>\n<p>재윤은 메뉴판 아래에 작게 덧붙인다.<\/p>\n<pre><code>잠깐 앉아도 괜찮습니다.\n말하지 못한 것도, 잠깐은 괜찮습니다.<\/code><\/pre>\n<p>쓴 직후 재윤은 두 번째 문장을 지운다.<\/p>\n<p>아직은 메뉴판에 남길 말이 아니었다.<\/p>\n<p>하지만 그 문장은 재윤 안에 남는다.<\/p>\n<h3 id=\"스토리-09d-2말하지못한예감-md-선택지-정리\">선택지 정리<\/h3>\n<h4 id=\"스토리-09d-2말하지못한예감-md-기본-선택지\">기본 선택지<\/h4>\n<pre><code>[더 묻는다]\n[기다린다]\n[농담으로 넘긴다]<\/code><\/pre>\n<p>결과:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>선택<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>더 묻는다<\/td><td>접점은 생기지만 하연의 속도를 침범한다. <code>HaYeonTrust<\/code> 소폭 상승 또는 변화 없음.<\/td><\/tr><tr><td>기다린다<\/td><td>하연이 직접 말할 수 있는 틈을 준다. <code>HaYeonTrust<\/code>, <code>HaYeonPaceRead<\/code> 상승.<\/td><\/tr><tr><td>농담으로 넘긴다<\/td><td>분위기는 가벼워지지만 말하지 못한 예감이 약해진다.<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-09d-2말하지못한예감-md-조건-충족-시-추가-선택지\">조건 충족 시 추가 선택지<\/h4>\n<pre><code>[조용한 데가 필요한 거구나]<\/code><\/pre>\n<p>결과:<\/p>\n<ul>\n<li>하연이 재윤을 신뢰하는 표정을 보인다.<\/li>\n<li><code>HaYeonPaceRead<\/code> 크게 상승.<\/li>\n<li>D-Day 폐장 후 하연의 동선을 알아차리는 조건에 반영.<\/li>\n<\/ul>\n<h4 id=\"스토리-09d-2말하지못한예감-md-조건-부족-시-대체-선택지\">조건 부족 시 대체 선택지<\/h4>\n<pre><code>[위험하니까 가지 마]\n[나중에 말해]\n[모르는 척한다]<\/code><\/pre>\n<p>결과:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>선택<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>위험하니까 가지 마<\/td><td>안전 단서는 기억하지만 하연의 마음 정리 방식은 이해하지 못한다.<\/td><\/tr><tr><td>나중에 말해<\/td><td>말하지 못한 예감을 미루는 선택. D-Day 성공 조건 약화.<\/td><\/tr><tr><td>모르는 척한다<\/td><td><code>Avoidance<\/code> 상승. 하연 실패 루프 위험 증가.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-09d-2말하지못한예감-md-획득-변화-플래그\">획득/변화 플래그<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>조건<\/th><th>획득/변화<\/th><\/tr><\/thead><tbody><tr><td>하연의 속도를 기다림<\/td><td><code>HaYeonTrust +1<\/code><\/td><\/tr><tr><td>조용한 장소의 의미를 이해<\/td><td><code>HaYeonPaceRead +1~2<\/code><\/td><\/tr><tr><td>소무대 방향을 하연의 마음 정리 동선으로 인식<\/td><td><code>AccidentClueHaYeon +1<\/code><\/td><\/tr><tr><td>D-3 세 관계 정리 완료<\/td><td>D-Day 폐장 후 성공 선택지 가시성 상승<\/td><\/tr><tr><td>하연에게 강요하거나 농담으로 회피<\/td><td><code>Avoidance +1<\/code>, 하연 동선 이해 약화<\/td><\/tr><tr><td>위험만 강조하고 마음을 보지 못함<\/td><td>사고 단서는 남지만 하연 기억 연결 약화<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-09d-2말하지못한예감-md-실패-시-d-day-영향\">실패 시 D-Day 영향<\/h3>\n<p>D-2가 실패하거나 약하게 지나가면 D-Day 폐장 후 다음 변화가 생긴다.<\/p>\n<ul>\n<li>재윤은 하연이 사라진 것을 알아차려도, 어디로 갔을지 확신하지 못한다.<\/li>\n<li>소무대는 단순 위험 장소 또는 사고 단서로만 남는다.<\/li>\n<li>하연의 <code>혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라<\/code>라는 말이 떠오르지 않는다.<\/li>\n<li>조건이 더 부족하면 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선다.<\/li>\n<\/ul>\n<p>실패 내레이션 후보:<\/p>\n<blockquote>말하지 못한 것은 남았지만, 재윤은 그것이 향한 방향을 보지 못했다.<\/blockquote>\n<h3 id=\"스토리-09d-2말하지못한예감-md-성공-시-d-day-연결\">성공 시 D-Day 연결<\/h3>\n<p>D-2가 성공하면 D-Day 폐장 후 재윤은 하연이 보이지 않는 순간, 다음 장면들을 순서대로 떠올린다.<\/p>\n<ol>\n<li>하연이 <code>반드시<\/code>라는 말을 지우던 손.<\/li>\n<li><code>들어와도 되고, 안 들어와도 되는 곳<\/code>이라는 말.<\/li>\n<li>창밖으로 보이던 소무대 방향.<\/li>\n<li><code>혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라<\/code>라는 말.<\/li>\n<li>D-3에서 정리한 세 관계의 배웅.<\/li>\n<\/ol>\n<p>이때 선택지는 하연의 호출 보상이 아니라 재윤의 이해 결과로 열린다.<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>완전 조건 충족 시:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>성공 내레이션 후보:<\/p>\n<blockquote>하연은 약속하지 않았다.  <\/blockquote>\n<blockquote>그래도 재윤은 알았다.  <\/blockquote>\n<blockquote>이번에는, 누가 불러서 가는 게 아니었다.<\/blockquote>\n<h3 id=\"스토리-09d-2말하지못한예감-md-다음-연결\">다음 연결<\/h3>\n<p>다음 문서는 <a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a>다.<\/p>\n<p>D-2에서 쌓은 <code>말하지 못한 예감<\/code>은 D-Day의 두 갈래를 만든다.<\/p>\n<ul>\n<li>성공: 재윤이 하연의 동선을 알아차려 직접 찾아간다.<\/li>\n<li>실패: 장소와 단서는 남지만, 하연이 빠진 사고 기억으로 혼자 소무대에 선다.<\/li>\n<\/ul>", "headings": [{"level": 1, "text": "D-2 말하지 못한 예감", "id": "스토리-09d-2말하지못한예감-md-d-2-말하지-못한-예감"}, {"level": 2, "text": "장면 목적", "id": "스토리-09d-2말하지못한예감-md-장면-목적"}, {"level": 2, "text": "발생 조건", "id": "스토리-09d-2말하지못한예감-md-발생-조건"}, {"level": 2, "text": "장소와 분위기", "id": "스토리-09d-2말하지못한예감-md-장소와-분위기"}, {"level": 2, "text": "컷신 대본", "id": "스토리-09d-2말하지못한예감-md-컷신-대본"}, {"level": 3, "text": "1. 교실에 남은 두 사람", "id": "스토리-09d-2말하지못한예감-md-1-교실에-남은-두-사람"}, {"level": 3, "text": "2. 방학식과 폐장 후 이야기", "id": "스토리-09d-2말하지못한예감-md-2-방학식과-폐장-후-이야기"}, {"level": 3, "text": "3. 창밖의 소무대", "id": "스토리-09d-2말하지못한예감-md-3-창밖의-소무대"}, {"level": 3, "text": "4. 조건별 장면 흔들림", "id": "스토리-09d-2말하지못한예감-md-4-조건별-장면-흔들림"}, {"level": 4, "text": "조건 충족: 시야가 선명한 경우", "id": "스토리-09d-2말하지못한예감-md-조건-충족-시야가-선명한-경우"}, {"level": 4, "text": "조건 부족: 기존 관계가 끼어드는 경우", "id": "스토리-09d-2말하지못한예감-md-조건-부족-기존-관계가-끼어드는-경우"}, {"level": 3, "text": "5. 말하지 못한 문장", "id": "스토리-09d-2말하지못한예감-md-5-말하지-못한-문장"}, {"level": 3, "text": "6. 마지막 정리", "id": "스토리-09d-2말하지못한예감-md-6-마지막-정리"}, {"level": 2, "text": "선택지 정리", "id": "스토리-09d-2말하지못한예감-md-선택지-정리"}, {"level": 3, "text": "기본 선택지", "id": "스토리-09d-2말하지못한예감-md-기본-선택지"}, {"level": 3, "text": "조건 충족 시 추가 선택지", "id": "스토리-09d-2말하지못한예감-md-조건-충족-시-추가-선택지"}, {"level": 3, "text": "조건 부족 시 대체 선택지", "id": "스토리-09d-2말하지못한예감-md-조건-부족-시-대체-선택지"}, {"level": 2, "text": "획득/변화 플래그", "id": "스토리-09d-2말하지못한예감-md-획득-변화-플래그"}, {"level": 2, "text": "실패 시 D-Day 영향", "id": "스토리-09d-2말하지못한예감-md-실패-시-d-day-영향"}, {"level": 2, "text": "성공 시 D-Day 연결", "id": "스토리-09d-2말하지못한예감-md-성공-시-d-day-연결"}, {"level": 2, "text": "다음 연결", "id": "스토리-09d-2말하지못한예감-md-다음-연결"}], "plain": "# D-2 말하지 못한 예감 이 문서는 D-2 수요일 하연 컷신을 대본 수준으로 정리한다. D-2의 핵심은 고백도 약속도 아니다. 하연이 먼저 `축제가 끝나고 보자`고 말하지 않는다. 대신 재윤이 D-3에서 소하/서린/미루의 도피처를 정리한 뒤, 하연이 어떤 방식으로 마음을 정리하는 사람인지 이해하게 되는 장면이다. D-2가 성공적으로 성립해야 D-Day 폐장 후 재윤이 하연을 `불려서` 가는 것이 아니라, 하연이 있을 곳을 스스로 알아차려 찾아갈 수 있다. ## 장면 목적 | 목적 | 설명 | | --- | --- | | 하연의 동선 이해 | 하연은 시끄러운 중심이 아니라 조용한 가장자리에서 마음을 정리하는 사람임을 보여준다. | | 약속 없는 예감 | 시간/장소를 정하지 않고도, 재윤이 하연이 향할 곳을 이해하게 만든다. | | D-3 정산 반영 | 기존 관계를 정리했을수록 재윤의 시야가 선명해지고, 미정리 축은 장면에 왜곡으로 끼어든다. | | D-Day 조건 예고 | `HaYeonPaceRead`와 `AccidentClueHaYeon`을 강화하고, 폐장 후 성공/실패 분기의 감정 근거가 된다. | ## 발생 조건 기본 발생: - D-2 수요일, 축제 1일차 전날. - `쉬어가 카페` 준비가 거의 끝난 상태. - 재윤과 하연이 교실에 남아 마지막 장식, 메뉴판, 안내 문구를 정리한다. 장면 선명도 조건: | 조건 | 장면 변화 | | --- | --- | | D-3 세 관계 모두 정리 | 하연의 시선, 침묵, 소무대 방향이 선명하게 읽힌다. | | 소하 미정리 | 교실 밖에서 소하의 익숙한 목소리가 끼어들어 재윤이 하연을 바라보는 시간이 짧아진다. | | 서린 미정리 | `위험하니까 가지 말라`는 방송/점검표 이미지가 하연의 동선을 안전 문제로만 보이게 한다. | | 미루 미정리 | `가지 말아 달라`는 의존 이미지가 하연의 침묵과 겹쳐 재윤이 기다림을 부담으로 오해한다. | | 하연 신뢰 부족 | 하연의 말이 단순 혼잣말처럼 지나가고, 재윤은 폐장 후 동선을 기억하지 못한다. | ## 장소와 분위기 배경 정본: [장소와 배경 묘사](./14_장소와_배경_묘사.md)의 `2학년 5반 교실`, `쉬어가 카페 준비 상태`, `D-2 창밖으로 보이는 소무대` 기준을 따른다. 장소: - 2학년 5반 교실 - `쉬어가 카페` 준비가 거의 끝난 상태 - 창밖으로 운동장과 학교 뒤편 야외 소무대 방향이 멀리 보인다 시간: - 해가 기울기 시작한 방과후 - 창문으로 들어오는 노을빛이 교실 안 장식 종이와 메뉴판에 닿는다 소품: - `쉬어가 카페` 메뉴판 - 손글씨 안내 문구 - 종이컵, 빈 테이프, 접힌 천막 안내문 - 반별 축제 일정표 - 창가에 붙이다 만 작은 장식 - 멀리 보이는 야외 소무대 임시 조명 프레임 소리: - 다른 반에서 망치질, 웃음소리, 테이프 뜯는 소리 - 운동장 스피커 점검음 - 가끔 들리는 방송실 테스트 음성 - 장면 중반 이후 두 사람 주변만 조용해지는 느낌 배경 이미지 핵심: - 상업 카페처럼 완성된 공간이 아니라, 학생들이 손으로 만든 임시 부스여야 한다. - 교실 안은 노을빛과 종이 장식으로 따뜻하지만, 창밖 소무대 방향은 조금 차분한 그림자로 분리한다. - 하연은 교실 중심보다 창가와 가장자리 쪽이 어울린다. - 소무대는 이 시점에서 목적지가 아니라, 하연이 마음을 정리하는 조용한 방향으로만 보인다. ## 컷신 대본 ### 1. 교실에 남은 두 사람 방과후. 2학년 5반 교실. 대부분의 학생은 돌아갔거나 다른 준비 장소로 흩어졌다. 교실 안에는 종이 장식, 메뉴판, 임시 카운터, 아직 정리하지 못한 종이컵이 남아 있다. 재윤은 의자 위에 올라가 창가 장식을 붙이고 있다. 하연은 메뉴판 한쪽의 문구를 조용히 고친다. ```text 재윤: 이쪽 높이 괜찮아? 하연: 조금만 오른쪽. 재윤: 이 정도? 하연: 아니. 너무 많이. 재윤: 어렵네. 하연: 장식 붙이는 데도 성격 나와. 재윤: 내 성격이 어떤데? 하연: 한 박자 늦게 맞추는 쪽. ``` 재윤은 웃으려다 멈춘다. 그 말이 농담처럼 들리지만, 이상하게 오래 남는다. ```text 재윤: 그거 좋은 뜻이야? 하연: 나쁜 뜻은 아니야. 재윤: 좋은 뜻도 아니고? 하연: 아직은. ``` 하연은 다시 메뉴판을 본다. 메뉴판에는 처음에 이렇게 적혀 있다. ```text 축제에 지친 여러분을 위한 쉼터. 반드시 쉬어가세요. ``` 하연은 `반드시`라는 말을 지운다. ```text 재윤: 그거 지우게? 하연: 응. 재윤: 왜? 하연: 쉬는 것도 강요처럼 보이면 싫어서. ``` 재윤은 의자에서 내려온다. ```text 재윤: 그럼 뭐라고 쓰지? 하연: 잠깐 앉아도 괜찮습니다. 재윤: 괜찮다? 하연: 응. 들어와도 되고, 안 들어와도 되는 느낌. ``` 재윤은 그 말을 받아 적는다. ```text 재윤: 잠깐 앉아도 괜찮습니다. 하연: ...응. ``` 하연의 표정이 아주 조금 풀린다. ### 2. 방학식과 폐장 후 이야기 반별 축제 일정표가 바닥에 떨어져 있다. 재윤은 그것을 주워 책상 위에 올린다. 일정표에는 이렇게 적혀 있다. ```text 목요일: 축제 1일차 금요일: 축제 2일차 주말 월요일: 방학식 ``` 하연은 월요일 글자를 잠깐 본다. ```text 하연: 축제 끝나면, 다 바로 가? 재윤: 아마. 금요일엔 다 지쳐 있을걸. 하연: 그렇겠지. 재윤: 왜? 하연: 그냥. ``` 하연은 대답을 끝내고도 일정표에서 눈을 떼지 못한다. ```text 재윤: 방학식 때문이야? 하연: 아니. 재윤: 축제 끝나는 게 싫어? 하연: 그것도 아니야. ``` 재윤은 더 묻지 않는다. D-3에서 관계 정리를 성공했다면, 이때 재윤은 소하/서린/미루의 목소리를 떠올리되 붙잡히지 않는다. - 소하: `지금 안 가면 또 늦잖아.` - 서린: `네가 고른 답이면 끝까지 봐.` - 미루: `저도 제 거 해볼게요.` 그 목소리들이 멀어지고, 하연의 침묵만 남는다. ```text 재윤: 말하기 어려운 거면, 지금 안 해도 돼. 하연: ... 재윤: 그냥, 그런가 해서. ``` 하연은 재윤을 잠깐 본다. ```text 하연: 넌 가끔 이상하게 기다려. 재윤: 이상하게? 하연: 보통은 더 묻거나, 아예 모르는 척하잖아. 재윤: 나도 예전엔 그랬던 것 같은데. 하연: 지금은? 재윤: 지금은... 기다리는 게 도망치는 거랑 다르다는 걸 조금 알 것 같아. ``` 하연은 대답하지 않는다. ### 3. 창밖의 소무대 하연은 메뉴판을 내려놓고 창가로 간다. 창밖에는 축제 천막이 반쯤 세워져 있고, 운동장 끝에는 학교 뒤편 야외 소무대 방향이 보인다. 낮에는 아무렇지 않은 장소다. 하지만 임시 조명 프레임이 서 있고, 주변에는 아직 정리되지 않은 케이블이 있다. 배경 연출 기준: - 카메라는 교실 안쪽에서 창밖을 보는 구도가 좋다. - 창틀, 붙이다 만 장식, 손글씨 메뉴판 일부가 전경에 걸리고, 멀리 작은 조명 프레임이 보인다. - 소무대는 위험을 노골적으로 드러내기보다, 하연의 시선이 오래 머무는 조용한 가장자리처럼 보여야 한다. - 조건이 부족한 경우에는 복도 소음이나 소하의 목소리가 이 구도를 끊어, 재윤이 하연의 시선을 끝까지 읽지 못하게 한다. 하연은 그 방향을 오래 본다. ```text 재윤: 저기 신경 쓰여? 하연: ...조용해 보여서. 재윤: 소무대? 하연: 낮엔 시끄러운데, 끝나면 조용해질 것 같아. ``` 재윤은 창밖을 본다. ```text 재윤: 폐장 후엔 위험할 수도 있어. 하연: 알아. 재윤: 서린 선배가 점검표 보여줬어. 임시 프레임이랑 고정끈. 하연: 그럼 가지 말아야겠네. ``` 하연의 말은 평범하지만, 목소리에는 약간의 흔들림이 있다. ```text 재윤: 그런데 계속 보고 있네. 하연: 응. 재윤: 왜? 하연: 조용해지면... ``` 하연은 말을 멈춘다. ```text 재윤: 조용해지면? 하연: 말하기 쉬워질까 해서. ``` 재윤은 바로 대답하지 않는다. 이 장면에서 중요한 것은 재윤이 `그럼 축제 끝나고 거기서 보자`라고 말하지 않는 것이다. 하연도 `기다릴게`라고 말하지 않는다. ```text 재윤: 나한테? 하연: 모르겠어. 재윤: ... 하연: 아직은. ``` 하연은 창가 장식을 손끝으로 만진다. ```text 하연: 말하려고 하면, 자꾸 시끄러워져. 재윤: 주변이? 하연: 아니. 내가. ``` 재윤은 그 말을 이해하려고 한다. ```text 재윤: 그래서 조용한 데가 필요해? 하연: 아마. 재윤: 혼자 있고 싶다는 뜻이야? 하연: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라. ``` 재윤은 그 차이를 천천히 받아들인다. ### 4. 조건별 장면 흔들림 #### 조건 충족: 시야가 선명한 경우 D-3 관계 정리가 충분하고 `HaYeonTrust`가 높다면, 재윤은 하연의 말을 붙잡아 약속으로 만들지 않고도 이해한다. ```text 재윤: 네가 조용한 데로 가면. 하연: 응. 재윤: 그게 도망치는 건 아닐 수도 있겠네. 하연: ... 재윤: 그냥, 말할 준비를 하는 걸 수도 있고. ``` 하연은 재윤을 본다. ```text 하연: 그렇게 생각해? 재윤: 응. 하연: 왜? 재윤: 나도 그랬던 것 같아서. ``` 하연의 눈가가 조금 풀린다. ```text 하연: 한 박자 늦게 맞추는 쪽이라서? 재윤: 그 말, 오래 가네. 하연: 너한테 어울려. 재윤: 좋은 뜻이야? 하연: 이번엔. ``` 이 경우 `HaYeonPaceRead`가 상승한다. #### 조건 부족: 기존 관계가 끼어드는 경우 소하 미정리: 복도에서 소하의 목소리가 들린다. ```text 소하의 목소리: 야, 유재윤. 아직도 거기 있어? ``` 재윤이 돌아보는 사이 하연은 창가에서 한 걸음 물러난다. 소무대 방향을 보던 시선이 끊긴다. 서린 미정리: 방송 스피커에서 테스트 음성이 흐른다. ```text 방송: 폐장 후 야외 소무대 접근을 금지합니다. ``` 재윤은 하연의 침묵을 `가면 안 되는 곳에 대한 불안`으로만 해석한다. 하연이 마음을 정리하는 방식이라는 감각이 흐려진다. 미루 미정리: 책상 위 체크리스트에 없는 문장이 보인다. ```text [가지 말아 주세요] ``` 재윤은 하연의 `혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라`라는 말을 부담스럽게 받아들이고, 기다림과 의존을 구분하지 못한다. 하연 신뢰 부족: 하연은 창밖을 오래 보지 않는다. ```text 하연: 아무것도 아니야. ``` 그 말과 함께 장면은 평범한 축제 준비로 돌아간다. 플레이어는 소무대 방향을 보지만, 재윤은 기억하지 못한다. ### 5. 말하지 못한 문장 조건이 충분한 경우, 하연은 다시 메뉴판 앞으로 돌아온다. ```text 하연: 문구, 이걸로 할래. 재윤: 잠깐 앉아도 괜찮습니다? 하연: 응. 재윤: 더 붙일 말은 없어? 하연: 없어. ``` 재윤은 잠깐 망설인다. ```text 재윤: 나는 있는 것 같은데. 하연: 어떤 말? 재윤: 아직은 못 하겠어. ``` 하연은 웃지 않는다. 실망하지도 않는다. ```text 하연: 그럼 아직 하지 마. 재윤: 그래도 돼? 하연: 대신, 없던 말처럼 만들지는 마. ``` 재윤은 그 말에 대답하지 못한다. ```text 재윤: 너도? 하연: 응. 재윤: 없던 말처럼 만들지 않을 거야? 하연: 노력할게. ``` 두 사람은 서로를 본다. 이 장면은 고백이 아니다. 하지만 서로에게 아직 말하지 못한 마음이 있다는 사실을 처음으로 함께 인정하는 장면이다. ### 6. 마지막 정리 교실 문 앞에서 하연은 잠깐 멈춘다. ```text 하연: 재윤아. 재윤: 응. 하연: 내일 바쁘겠다. 재윤: 축제 첫날이니까. 하연: 모레는 더 바쁘겠네. 재윤: 축제 마지막 날이니까. ``` 하연은 고개를 끄덕인다. ```text 하연: 그렇지. ``` 하연은 더 말하지 않는다. 시간도 장소도 정하지 않는다. 재윤도 묻지 않는다. 대신 재윤은 창밖을 다시 본다. 운동장 뒤편, 낮에도 사람이 많지 않은 소무대 방향. 해가 거의 지면서 그쪽만 잠깐 조용한 그림자에 잠긴다. 내레이션: > 약속은 없었다. > 하지만 재윤은 이상하게 알 것 같았다. > 하연이 마음을 꺼내야 한다면, 어디에서 숨을 고를지. 하연은 복도로 나간다. 재윤은 메뉴판 아래에 작게 덧붙인다. ```text 잠깐 앉아도 괜찮습니다. 말하지 못한 것도, 잠깐은 괜찮습니다. ``` 쓴 직후 재윤은 두 번째 문장을 지운다. 아직은 메뉴판에 남길 말이 아니었다. 하지만 그 문장은 재윤 안에 남는다. ## 선택지 정리 ### 기본 선택지 ```text [더 묻는다] [기다린다] [농담으로 넘긴다] ``` 결과: | 선택 | 결과 | | --- | --- | | 더 묻는다 | 접점은 생기지만 하연의 속도를 침범한다. `HaYeonTrust` 소폭 상승 또는 변화 없음. | | 기다린다 | 하연이 직접 말할 수 있는 틈을 준다. `HaYeonTrust`, `HaYeonPaceRead` 상승. | | 농담으로 넘긴다 | 분위기는 가벼워지지만 말하지 못한 예감이 약해진다. | ### 조건 충족 시 추가 선택지 ```text [조용한 데가 필요한 거구나] ``` 결과: - 하연이 재윤을 신뢰하는 표정을 보인다. - `HaYeonPaceRead` 크게 상승. - D-Day 폐장 후 하연의 동선을 알아차리는 조건에 반영. ### 조건 부족 시 대체 선택지 ```text [위험하니까 가지 마] [나중에 말해] [모르는 척한다] ``` 결과: | 선택 | 결과 | | --- | --- | | 위험하니까 가지 마 | 안전 단서는 기억하지만 하연의 마음 정리 방식은 이해하지 못한다. | | 나중에 말해 | 말하지 못한 예감을 미루는 선택. D-Day 성공 조건 약화. | | 모르는 척한다 | `Avoidance` 상승. 하연 실패 루프 위험 증가. | ## 획득/변화 플래그 | 조건 | 획득/변화 | | --- | --- | | 하연의 속도를 기다림 | `HaYeonTrust +1` | | 조용한 장소의 의미를 이해 | `HaYeonPaceRead +1~2` | | 소무대 방향을 하연의 마음 정리 동선으로 인식 | `AccidentClueHaYeon +1` | | D-3 세 관계 정리 완료 | D-Day 폐장 후 성공 선택지 가시성 상승 | | 하연에게 강요하거나 농담으로 회피 | `Avoidance +1`, 하연 동선 이해 약화 | | 위험만 강조하고 마음을 보지 못함 | 사고 단서는 남지만 하연 기억 연결 약화 | ## 실패 시 D-Day 영향 D-2가 실패하거나 약하게 지나가면 D-Day 폐장 후 다음 변화가 생긴다. - 재윤은 하연이 사라진 것을 알아차려도, 어디로 갔을지 확신하지 못한다. - 소무대는 단순 위험 장소 또는 사고 단서로만 남는다. - 하연의 `혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라`라는 말이 떠오르지 않는다. - 조건이 더 부족하면 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선다. 실패 내레이션 후보: > 말하지 못한 것은 남았지만, 재윤은 그것이 향한 방향을 보지 못했다. ## 성공 시 D-Day 연결 D-2가 성공하면 D-Day 폐장 후 재윤은 하연이 보이지 않는 순간, 다음 장면들을 순서대로 떠올린다. 1. 하연이 `반드시`라는 말을 지우던 손. 2. `들어와도 되고, 안 들어와도 되는 곳`이라는 말. 3. 창밖으로 보이던 소무대 방향. 4. `혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라`라는 말. 5. D-3에서 정리한 세 관계의 배웅. 이때 선택지는 하연의 호출 보상이 아니라 재윤의 이해 결과로 열린다. ```text [하연에게 말하러 간다] ``` 완전 조건 충족 시: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 성공 내레이션 후보: > 하연은 약속하지 않았다. > 그래도 재윤은 알았다. > 이번에는, 누가 불러서 가는 게 아니었다. ## 다음 연결 다음 문서는 [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md)다. D-2에서 쌓은 `말하지 못한 예감`은 D-Day의 두 갈래를 만든다. - 성공: 재윤이 하연의 동선을 알아차려 직접 찾아간다. - 실패: 장소와 단서는 남지만, 하연이 빠진 사고 기억으로 혼자 소무대에 선다.", "excerpt": "# D-2 말하지 못한 예감 이 문서는 D-2 수요일 하연 컷신을 대본 수준으로 정리한다. D-2의 핵심은 고백도 약속도 아니다. 하연이 먼저 `축제가 끝나고 보자`고 말하지 않는다. 대신 재윤이 D-3에서 소하/서린/미루의 도피처를 정리한 뒤, 하연이 어떤 방식으로 마음을 정리하는 사람인지 이해하게 되는 장면이다. D-2가 성공적으로 성립해야 D-Day 폐장 후 재윤이 하연을 `불려서` 가"}, {"path": "스토리/10_D-Day_축제마지막날_분기.md", "category": "스토리", "title": "D-Day 축제 마지막 날 분기", "id": "스토리-10d-day축제마지막날분기-md", "html": "<h2 id=\"스토리-10d-day축제마지막날분기-md-d-day-축제-마지막-날-분기\">D-Day 축제 마지막 날 분기<\/h2>\n<p>이 문서는 내부 기준 D-Day 금요일, 게임 내 표기 <code>축제 2일차 / 축제 마지막 날 / 폐장 후<\/code>의 낮 선택과 폐장 후 성공·실패 분기를 대본 수준으로 정리한다. 점수·플래그 판정 기준은 <a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>를 따르고, 실제 제작 단위 분할은 <a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a>을 따른다.<\/p>\n<p>장소와 배경의 시각 기준은 <a href=\"./14_장소와_배경_묘사.md\">장소와 배경 묘사<\/a>를 따른다. 이 문서의 장소 지시는 감정 대본용 요약이며, 배경 원화/AI 이미지 생성 기준은 14번 문서를 우선한다.<\/p>\n<p>D-Day의 핵심은 사고를 피하는 것이 아니다. 재윤이 하연을 충분히 이해했는지, 기존 관계 뒤에 숨지 않았는지, 사고 단서를 <code>하연에게 가려던 선택의 결과<\/code>로 받아들일 수 있는지 확인하는 최종 분기다.<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-장면-목적\">장면 목적<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>목적<\/th><th>설명<\/th><\/tr><\/thead><tbody><tr><td>낮 선택 정산<\/td><td>하연 신뢰, 기존 관계 정리, 사고 단서를 마지막으로 보정하거나 확정한다.<\/td><\/tr><tr><td>하연 동선 인식<\/td><td>하연이 부르지 않아도 재윤이 폐장 후 하연이 있을 곳을 알아차리게 한다.<\/td><\/tr><tr><td>선고백<\/td><td>재윤이 먼저 자기 마음과 선택을 말한다.<\/td><\/tr><tr><td>사고 의미 회복<\/td><td>사고는 사라지지 않지만, 혼자 다친 사고가 아니라 하연에게 가려던 선택의 결과로 기억된다.<\/td><\/tr><tr><td>실패 루프<\/td><td>조건 부족 시 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선 이유를 잊은 채 루프한다.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-진입-조건\">진입 조건<\/h3>\n<p>기본 진입:<\/p>\n<ul>\n<li>D-1 축제 1일차 <code>쉬어가 카페<\/code> 운영 완료.<\/li>\n<li>D-2 <code>말하지 못한 예감<\/code> 장면을 봄.<\/li>\n<li>D-3 관계 정리 결과가 정산됨.<\/li>\n<\/ul>\n<p>주요 조건:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>조건<\/th><th>성공 쪽 의미<\/th><th>부족 시 영향<\/th><\/tr><\/thead><tbody><tr><td><code>HaYeonTrust<\/code><\/td><td>하연이 자신의 침묵을 재윤에게 맡길 수 있음<\/td><td>하연의 말이 단순 혼잣말처럼 사라짐<\/td><\/tr><tr><td><code>HaYeonPaceRead<\/code><\/td><td>폐장 후 하연이 조용한 곳으로 향할 것을 재윤이 알아차림<\/td><td>하연이 보이지 않아도 어디로 갔는지 모름<\/td><\/tr><tr><td><code>SoHaResolved<\/code><\/td><td>과거 도피 차단<\/td><td>하연에게 가는 마음이 새 관계 도피처럼 흔들림<\/td><\/tr><tr><td><code>SeoRinResolved<\/code><\/td><td>정답 의존 차단<\/td><td>위험하니 가지 않는 것이 정답처럼 보임<\/td><\/tr><tr><td><code>MiRuResolved<\/code><\/td><td>필요한 사람 도피 차단<\/td><td>누군가를 두고 가는 죄책감으로 선택을 미룸<\/td><\/tr><tr><td>사고 단서<\/td><td>소무대 위험과 병실 기억 연결<\/td><td>장소와 물건만 남고, 누구에게 가려 했는지가 비어 있음<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-전체-흐름-요약\">전체 흐름 요약<\/h3>\n<ol>\n<li>오전~이른 오후: <code>쉬어가 카페<\/code> 축소 운영.<\/li>\n<li>낮 선택: 하연/소하/서린/미루/혼자 중 하나를 선택해 마지막 보정.<\/li>\n<li>폐장 직전: 조건 정산. 하연이 조용히 사라짐.<\/li>\n<li>성공: 재윤이 하연의 동선을 알아차려 소무대로 직접 찾아감.<\/li>\n<li>실패: 장소와 단서만 따라가지만 하연이 사고 기억에서 빠짐.<\/li>\n<li>성공 분기: 선고백, 하연 마음 확인, 사고 의미 회복, 일요일 병실로 점프.<\/li>\n<li>실패 분기: 혼자 소무대, 사고 반복, D-25 월요일로 루프.<\/li>\n<\/ol>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-1-오전-공통-쉬어가-카페의-마지막-운영\">1. 오전 공통: 쉬어가 카페의 마지막 운영<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-장소와-분위기\">장소와 분위기<\/h4>\n<ul>\n<li>2학년 5반 <code>쉬어가 카페<\/code><\/li>\n<li>전날보다 손님은 적고, 부스는 오전~이른 오후까지만 축소 운영<\/li>\n<li>컵, 메뉴판, 문구 카드, 손님용 의자가 조금씩 정리되는 중<\/li>\n<li>교실 밖은 축제 마지막 날의 들뜬 소음이 있음<\/li>\n<li>하연은 카페가 끝나가는 모습을 조용히 바라본다<\/li>\n<li>책상을 붙여 만든 임시 카운터, 종이컵, 손글씨 메뉴판, 반쯤 떼어진 종이 장식이 보여야 한다.<\/li>\n<li>카페는 상업적으로 예쁜 공간이 아니라 학생들이 만든 어설픈 임시 부스다.<\/li>\n<li>창문 쪽에는 운동장 빛이 들어오지만, 교실 안은 이미 정리의 기운이 섞인다.<\/li>\n<\/ul>\n<p>입구 문구:<\/p>\n<pre><code>잠깐 앉아도 괜찮습니다.<\/code><\/pre>\n<p>재윤은 그 문구를 본다.<\/p>\n<p>내레이션:<\/p>\n<blockquote>오늘은 그 문장이, 재윤에게 하는 말처럼 보였다.  <\/blockquote>\n<blockquote>쉬어가도 되지만, 머물러 숨으면 안 되는 날이었다.<\/blockquote>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-공통-대화\">공통 대화<\/h4>\n<pre><code>반 친구: 오후엔 부스 닫고 돌아다녀도 된대!\n반 친구: 컵 남은 거 이쪽에 모아줘.\n재윤: 알겠어.\n하연: 이 문구, 떼지 말까?\n재윤: 왜?\n하연: 아직 들어올 사람 있을 수도 있으니까.\n재윤: 축제 끝나기 전까지?\n하연: 응. 끝나기 전까지.<\/code><\/pre>\n<p>재윤은 <code>끝나기 전까지<\/code>라는 말을 오래 듣는다.<\/p>\n<pre><code>재윤: 끝나면?\n하연: 끝나면... 정리해야지.<\/code><\/pre>\n<p>하연은 그렇게 말하고 메뉴판 쪽으로 시선을 돌린다. 이 시점에서 고백이나 약속은 없다.<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-2-낮-선택-진입\">2. 낮 선택 진입<\/h3>\n<p>카페 축소 운영이 끝나면 선택지가 열린다.<\/p>\n<pre><code>[하연과 축제를 둘러본다]\n[소하와 마지막으로 오래된 길을 걷는다]\n[서린의 방송 마무리를 돕는다]\n[미루의 도움 인원 마무리를 확인한다]\n[혼자 야외 소무대 쪽을 본다]<\/code><\/pre>\n<p>선택지는 단순 데이트 선택이 아니라, 밤 분기 직전의 마지막 보정이다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>선택<\/th><th>보정/확정<\/th><th>위험<\/th><\/tr><\/thead><tbody><tr><td>하연<\/td><td>상호 신뢰, 하연 동선 이해, 말하지 못한 예감 보강<\/td><td>기존 관계 정리 부족은 해결하지 못함<\/td><\/tr><tr><td>소하<\/td><td>과거 미련 최종 확인<\/td><td>하연 신뢰 부족은 해결하지 못함<\/td><\/tr><tr><td>서린<\/td><td>선택권/위험 단서 최종 확인<\/td><td>마음 확인 부족은 해결하지 못함<\/td><\/tr><tr><td>미루<\/td><td>의존/도움 인원 단서 최종 확인<\/td><td>하연 동선 이해 부족은 해결하지 못함<\/td><\/tr><tr><td>혼자<\/td><td>사고 단서 직접 보강<\/td><td>단서 공유가 없으면 하연이 기억에서 빠질 위험<\/td><\/tr><\/tbody><\/table><\/div>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-3-낮-선택-하연과-축제를-둘러본다\">3. 낮 선택: 하연과 축제를 둘러본다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-보정-목적\">성공/보정 목적<\/h4>\n<ul>\n<li><code>HaYeonTrust<\/code> 최종 보정<\/li>\n<li><code>HaYeonPaceRead<\/code> 최종 보정<\/li>\n<li>D-2의 예감을 D-Day 낮에 다시 확인<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본\">대본<\/h4>\n<p>축제 마지막 날의 운동장. 음악은 밝고 사람들은 들떠 있다. 하연은 재윤 옆을 걷지만, 축제 중심으로 깊게 들어가지는 않는다.<\/p>\n<p>배경은 운동장 중심의 밝은 천막과 가장자리의 조용한 그늘을 함께 보여준다. 하연은 축제 중심부보다 사람 흐름이 느슨한 가장자리에 시선이 머무르고, 멀리 소무대 방향이 작은 프레임처럼 보이면 좋다.<\/p>\n<pre><code>재윤: 사람 많네.\n하연: 어제보다 더 많은 것 같아.\n재윤: 괜찮아?\n하연: 괜찮아. 오래 있으면 조금 시끄럽긴 한데.<\/code><\/pre>\n<p>재윤은 바로 <code>그럼 나갈까?<\/code>라고 묻지 않는다. 대신 하연의 걸음이 느려지는 방향을 본다.<\/p>\n<pre><code>재윤: 저쪽으로 돌까?\n하연: 어디?\n재윤: 사람 덜 몰리는 쪽.<\/code><\/pre>\n<p>하연은 잠깐 재윤을 본다.<\/p>\n<pre><code>하연: 알아봤네.\n재윤: 조금은.\n하연: 조금이면 됐어.<\/code><\/pre>\n<p>두 사람은 운동장 가장자리로 걷는다. 멀리 학교 뒤편 소무대가 보인다.<\/p>\n<pre><code>재윤: 이상하게 계속 저쪽이 걸려.\n하연: 나도 가끔 봐.\n재윤: 왜?\n하연: 시끄러운 데서 잠깐 빠져나가고 싶을 때, 저쪽이 제일 조용해 보여서.<\/code><\/pre>\n<p>D-2 성공 시 추가 대사:<\/p>\n<pre><code>재윤: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 다르다고 했잖아.\n하연: 기억했네.\n재윤: 응.\n하연: 그럼 됐어.<\/code><\/pre>\n<p>이 장면에서는 고백하지 않는다. 낮에는 아직 축제 속에 있고, 말해야 할 시간은 폐장 후에 온다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-결과\">결과<\/h4>\n<p>성공:<\/p>\n<ul>\n<li><code>HaYeonTrust +1<\/code><\/li>\n<li><code>HaYeonPaceRead +1<\/code><\/li>\n<li>폐장 후 하연 동선 인식 강화<\/li>\n<\/ul>\n<p>실패/약한 진행:<\/p>\n<ul>\n<li>재윤이 하연의 시선을 보지 못하고 축제 놀이에만 집중하면 동선 이해 보정 없음<\/li>\n<li>하연이 <code>괜찮아<\/code>만 반복하고, 소무대 방향이 의미 없이 지나감<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-4-낮-선택-소하와-마지막으로-오래된-길을-걷는다\">4. 낮 선택: 소하와 마지막으로 오래된 길을 걷는다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-보정-목적-2\">성공/보정 목적<\/h4>\n<ul>\n<li><code>SoHaResolved<\/code> 최종 확인 또는 보정<\/li>\n<li>과거 도피 잔류 여부 확정<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본-2\">대본<\/h4>\n<p>소하는 2학년 2반 부스 정리를 마치고 재윤을 부른다.<\/p>\n<pre><code>소하: 야, 유재윤.\n재윤: 정리 끝났어?\n소하: 대충. 넌?\n재윤: 우리도 거의.\n소하: 그럼 잠깐 걸어.<\/code><\/pre>\n<p>두 사람은 운동장 옆 오래된 길로 걷는다. 축제 소리는 뒤에서 들리고, 이 길은 이상할 만큼 프롤로그의 등굣길과 닮아 있다.<\/p>\n<p>D-3 소하 정리 성공 시:<\/p>\n<pre><code>소하: 예전 같으면, 너 이런 날엔 나랑 먼저 돌았어.\n재윤: 알아.\n소하: 그럼 오늘은?\n재윤: 마지막에 가야 할 데가 있어.\n소하: 하연이한테?\n재윤: 응.\n소하: 이제야 제대로 말하네.<\/code><\/pre>\n<p>소하는 웃으려다 한숨을 쉰다.<\/p>\n<pre><code>소하: 짜증나는데, 그래도 그게 낫다.\n재윤: 뭐가?\n소하: 네가 모른 척하는 것보다.<\/code><\/pre>\n<p>D-3 소하 미정리 시:<\/p>\n<pre><code>소하: 아직도 말 안 할 거야?\n재윤: 뭘.\n소하: 그 애한테 가고 싶은 거.\n재윤: 지금 그런 얘기 할 때는...\n소하: 너는 항상 그런 식이야. 말할 때가 아니래.<\/code><\/pre>\n<p>보정 선택지:<\/p>\n<pre><code>[하연에게 갈 거라고 말한다]\n[예전처럼 웃어넘긴다]<\/code><\/pre>\n<p>성공 시:<\/p>\n<pre><code>재윤: 하연이한테 갈 거야.\n소하: ...그래.\n재윤: 그래도 너랑 있던 시간이 가짜였다는 뜻은 아니야.\n소하: 그건 내가 정해.\n재윤: 응.\n소하: 근데 지금은 가. 또 늦지 말고.<\/code><\/pre>\n<p>실패 시:<\/p>\n<pre><code>재윤: 그냥 축제잖아.\n소하: 그래. 그냥 축제지.<\/code><\/pre>\n<p>소하의 웃음이 프롤로그의 아침처럼 고정된다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-결과-2\">결과<\/h4>\n<p>성공:<\/p>\n<ul>\n<li><code>SoHaResolved = true<\/code> 또는 유지<\/li>\n<li>과거 도피 선택지 약화<\/li>\n<\/ul>\n<p>실패:<\/p>\n<ul>\n<li>D-Day 밤에 <code>[아무 일도 없었던 것으로 한다]<\/code> 선택지가 강해짐<\/li>\n<li>소하 새드엔딩 진입 위험 상승<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-5-낮-선택-서린의-방송-마무리를-돕는다\">5. 낮 선택: 서린의 방송 마무리를 돕는다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-보정-목적-3\">성공/보정 목적<\/h4>\n<ul>\n<li><code>SeoRinResolved<\/code> 최종 확인 또는 보정<\/li>\n<li>폐장 방송/소무대 위험 단서 보강<\/li>\n<li>정답 의존 잔류 여부 확정<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본-3\">대본<\/h4>\n<p>방송실. 서린은 폐장 안내 멘트와 장비 회수 큐시트를 확인하고 있다.<\/p>\n<p>방송실은 차가운 통제실이 아니라, 학생회와 방송반 업무가 실제로 쌓인 좁은 공간이다. 믹서, 마이크, 헤드폰, 라벨링된 케이블, 폐장 안내 큐시트, D-9 상담 때 적었던 기준 메모가 함께 보여야 한다.<\/p>\n<pre><code>서린: 왔네.\n재윤: 도와드릴 거 있어요?\n서린: 네가 도와야 할 일인지, 네가 피하려고 온 일인지 먼저 구분해.\n재윤: ...들켰네요.<\/code><\/pre>\n<p>서린은 큐시트를 넘긴다. 큐시트 여백에는 D-9 상담 때 나눴던 네 기준이 작게 적혀 있다.<\/p>\n<pre><code>서린: 폐장 방송은 이 순서면 돼.\n재윤: 제가 확인 안 해도 괜찮아요?\n서린: 네가 오늘 확인해야 할 건 이게 아니잖아.\n재윤: 맞는 답 말고, 제가 고른 이유요.\n서린: 기억하네.<\/code><\/pre>\n<p>D-3 서린 정리 성공 시:<\/p>\n<pre><code>재윤: 그래도 틀리면요?\n서린: 틀리면 내가 고친다.\n서린: 너는 네가 말해야 할 걸 말해.<\/code><\/pre>\n<p>서린은 점검표 일부를 건넨다.<\/p>\n<pre><code>서린: 소무대 쪽은 폐장 후 철거 예정이야. 위험한 건 맞아.\n재윤: 그럼 가지 말라고 하실 줄 알았는데요.\n서린: 가도 된다고 말하는 것도 아니야.\n재윤: 네.\n서린: 알고 고르라는 거야.<\/code><\/pre>\n<p>D-3 서린 미정리 시:<\/p>\n<pre><code>서린: 네가 정 못 고르겠으면, 내가 정해줄 수 있어.\n재윤: 그게 편하긴 해요.\n서린: 편한 게 정답은 아니야.<\/code><\/pre>\n<p>보정 선택지:<\/p>\n<pre><code>[제가 고를게요]\n[선배가 정해주세요]<\/code><\/pre>\n<p>성공 시:<\/p>\n<pre><code>재윤: 제가 고를게요.\n서린: 위험해도?\n재윤: 위험하다는 걸 알고도, 제가 왜 가려는지 말해야 할 것 같아요.\n서린: 그럼 가서 말해. 대신 변명하지 말고.<\/code><\/pre>\n<p>실패 시:<\/p>\n<pre><code>재윤: 선배가 정해주세요.\n서린: ...그럼 가지 마.<\/code><\/pre>\n<p>방송실 스피커에 폐장 멘트가 미리 울린다.<\/p>\n<pre><code>방송: 지정된 동선을 따라 이동하십시오.<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-결과-3\">결과<\/h4>\n<p>성공:<\/p>\n<ul>\n<li><code>SeoRinResolved = true<\/code> 또는 유지<\/li>\n<li><code>AccidentClueSeoRin<\/code> 보강<\/li>\n<li>폐장 후 선택 확신 상승<\/li>\n<\/ul>\n<p>실패:<\/p>\n<ul>\n<li><code>[선택하지 않는다]<\/code>, <code>[정해진 길을 따른다]<\/code> 계열 선택지 강화<\/li>\n<li>서린 새드엔딩 진입 위험 상승<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-6-낮-선택-미루의-도움-인원-마무리를-확인한다\">6. 낮 선택: 미루의 도움 인원 마무리를 확인한다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-보정-목적-4\">성공/보정 목적<\/h4>\n<ul>\n<li><code>MiRuResolved<\/code> 최종 확인 또는 보정<\/li>\n<li>출입 제한 표지/고정끈 단서 보강<\/li>\n<li>의존 잔류 여부 확정<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본-4\">대본<\/h4>\n<p>축제 도움 인원 대기 장소. 미루는 체크리스트를 품에 숨기지 않고 들고 있다.<\/p>\n<p>대기 장소는 막힌 방이 아니라 복도 옆 임시 책상에 가깝다. 체크리스트, 명찰, 여분 안내 표지, 테이프와 끈, 분실물 박스가 보이고, 미루가 원하면 직접 나갈 수 있는 문이나 복도 동선이 보여야 한다.<\/p>\n<p>D-3 미루 정리 성공 시:<\/p>\n<pre><code>미루: 선배.\n재윤: 어, 미루야.\n미루: 저, 표지 확인하고 보고까지 했어요.\n재윤: 잘했네.\n미루: 그래도 마지막에 선배가 한 번 봐주시면—\n재윤: 네가 먼저 본 게 맞아.\n재윤: 내가 다시 정해주지 않아도 돼.\n미루: 그럼 저, 혼자 한 거 맞죠?\n재윤: 응. 네가 한 거야.<\/code><\/pre>\n<p>미루는 웃다가 울 것 같은 얼굴이 된다.<\/p>\n<pre><code>미루: 그럼 저 이제 보고하러 갈게요.\n재윤: 응.\n미루: 선배도... 가야 하는 데 가세요.<\/code><\/pre>\n<p>D-3 미루 미정리 시:<\/p>\n<pre><code>미루: 선배, 이것만 봐주시면 안 돼요?\n재윤: 미루야.\n미루: 마지막이잖아요. 방학식 지나면 멘토링 끝나니까.<\/code><\/pre>\n<p>보정 선택지:<\/p>\n<pre><code>[네가 먼저 확인한 걸 믿는다]\n[마지막이니까 대신 봐준다]<\/code><\/pre>\n<p>성공 시:<\/p>\n<pre><code>재윤: 네가 먼저 확인한 걸 믿을게.\n미루: 틀렸으면요?\n재윤: 그럼 고치면 돼. 네가 한 게 없어지는 건 아니야.\n미루: ...알겠어요.<\/code><\/pre>\n<p>미루는 체크리스트를 넘긴다.<\/p>\n<pre><code>미루: 소무대 뒤편 표지는 다시 붙였고요.\n미루: 고정끈은 임시로 묶인 흔적이 있었어요.\n미루: 보고는 학생회 운영본부로 하면 된대요.<\/code><\/pre>\n<p>실패 시:<\/p>\n<pre><code>재윤: 줘. 내가 볼게.\n미루: 역시 선배가 봐줘야 안심돼요.<\/code><\/pre>\n<p>체크리스트 항목이 늘어난다.<\/p>\n<pre><code>[마지막 확인]\n[마지막의 마지막 확인]\n[선배가 떠나지 않는지 확인]<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-결과-4\">결과<\/h4>\n<p>성공:<\/p>\n<ul>\n<li><code>MiRuResolved = true<\/code> 또는 유지<\/li>\n<li><code>AccidentClueMiRu<\/code> 보강<\/li>\n<li>의존 도피 선택지 약화<\/li>\n<\/ul>\n<p>실패:<\/p>\n<ul>\n<li>미루 새드엔딩 위험 상승<\/li>\n<li>하연에게 가는 선택이 누군가를 버리는 것처럼 흔들림<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-7-낮-선택-혼자-야외-소무대-쪽을-본다\">7. 낮 선택: 혼자 야외 소무대 쪽을 본다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-보정-목적-5\">성공/보정 목적<\/h4>\n<ul>\n<li>사고 단서 직접 보강<\/li>\n<li>단, 하연 신뢰와 공유가 부족하면 오히려 빈자리를 강조<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본-5\">대본<\/h4>\n<p>재윤은 혼자 학교 뒤편으로 향한다. 낮의 소무대는 조용하다.<\/p>\n<p>낮의 소무대는 아직 사고 장소처럼 보이지 않는다. 낮은 단차, 검은 전선, 임시 조명 프레임, 기울어진 출입 제한 표지는 보이지만, 햇빛 아래에서는 평범한 행사 시설처럼 지나칠 수 있어야 한다.<\/p>\n<pre><code>소무대는 낮에도 조용했다.\n\n표지는 제대로 붙어 있었고,\n끈은 풀리지 않았고,\n프레임은 아직 제자리에 있었다.<\/code><\/pre>\n<p>재윤은 점검표와 미루의 보고를 떠올린다.<\/p>\n<pre><code>재윤: 전부 제자리에 있는데...<\/code><\/pre>\n<p>바람이 불고, 임시 조명 프레임이 아주 작게 운다.<\/p>\n<p>하연 신뢰가 충분한 경우:<\/p>\n<pre><code>재윤은 하연이 창밖으로 이곳을 바라보던 얼굴을 떠올렸다.\n\n혼자 있고 싶은 거랑,\n아무도 오지 않았으면 하는 건 달라.<\/code><\/pre>\n<p>하연 신뢰가 부족한 경우:<\/p>\n<pre><code>전부 확인했는데도,\n재윤은 여전히 누구에게 가려 했는지 알 수 없었다.<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-결과-5\">결과<\/h4>\n<p>성공:<\/p>\n<ul>\n<li>사고 단서 보강<\/li>\n<li><code>AccidentClueSeoRin<\/code>, <code>AccidentClueMiRu<\/code>, <code>AccidentClueHaYeon<\/code> 중 부족분 일부 보정<\/li>\n<\/ul>\n<p>실패:<\/p>\n<ul>\n<li>정보는 있지만 마음 연결이 부족<\/li>\n<li>폐장 후 혼자 소무대에 설 위험 상승<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-8-폐장-후-진입\">8. 폐장 후 진입<\/h3>\n<p>축제 마지막 안내 방송이 끝난다.<\/p>\n<pre><code>방송: 이상으로 축제 2일차 운영을 종료합니다.\n방송: 각 반은 정리 후 지정된 동선으로 이동해 주시기 바랍니다.<\/code><\/pre>\n<p>운동장 쪽 불빛이 하나씩 꺼진다. 교실 장식이 내려가고, 카페 문구 카드도 떼어진다.<\/p>\n<p>폐장 후 배경은 밝은 축제 중심부와 먼저 어두워지는 학교 뒤편을 대비한다. 운동장에는 아직 정리하는 학생과 접히는 천막이 남아 있지만, 소무대 쪽은 소리가 먼저 빠져나간다.<\/p>\n<p>재윤은 문구 카드를 손에 든다.<\/p>\n<pre><code>잠깐 앉아도 괜찮습니다.<\/code><\/pre>\n<p>재윤은 문구를 접어 주머니에 넣는다.<\/p>\n<p>하연이 보이지 않는다.<\/p>\n<p>처음에는 화장실, 교실 밖, 운동장 가장자리라고 생각한다. 하지만 어디에도 없다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-조건-정산\">조건 정산<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>폐장 후 인식<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰 충분 + D-2 성공<\/td><td>하연이 조용한 소무대 쪽으로 갔음을 알아차림<\/td><\/tr><tr><td>하연 신뢰 부족<\/td><td>하연이 사라진 것을 늦게 알아차리거나, 알아차려도 동선을 모름<\/td><\/tr><tr><td>관계 정리 부족<\/td><td>하연에게 가는 마음이 죄책감/도피/정답 문제로 흔들림<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>소무대가 위험 장소라는 것만 남고, 마음의 장소로 연결되지 않음<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-쪽-내레이션\">성공 쪽 내레이션<\/h4>\n<pre><code>하연이 보이지 않았다.\n\n재윤은 낮에 하연이 바라보던 방향을 떠올렸다.\n시끄러운 곳에서 한 걸음 물러난 자리.\n들어와도 되고, 안 들어와도 되는 곳.\n혼자 있고 싶은 것과,\n아무도 오지 않았으면 하는 것은 다르다는 말.\n\n학교 뒤편 야외 소무대.\n\n이번에는,\n누가 불러서 가는 게 아니었다.<\/code><\/pre>\n<p>성공 선택지:<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>완전 조건 충족 시:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-실패-쪽-내레이션\">실패 쪽 내레이션<\/h4>\n<pre><code>하연이 보이지 않았다.\n\n재윤은 소무대 쪽이 신경 쓰였다.\n왜인지는 알 수 없었다.\n\n표지.\n고정끈.\n임시 프레임.\n폐장 안내 방송.\n\n장소와 물건은 떠올랐다.\n하지만 그곳에 있어야 할 사람의 이름이 떠오르지 않았다.<\/code><\/pre>\n<p>실패 선택지:<\/p>\n<pre><code>[소무대 쪽으로 간다]\n[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-9-폐장-후-성공-분기-하연에게-말하러-간다\">9. 폐장 후 성공 분기: 하연에게 말하러 간다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-장소\">장소<\/h4>\n<p>학교 뒤편 야외 소무대.<\/p>\n<p>낮에는 축제의 일부였지만, 밤에는 조용하다. 무대 위 조명은 꺼져 있고, 임시 프레임은 아직 철거되지 않았다. 바람이 불면 금속이 작게 운다.<\/p>\n<p>하연은 무대 위가 아니라, 무대 옆 낮은 계단 근처에 서 있다. 위험한 구조물 안쪽으로 깊게 들어가 있지는 않다. 그녀는 재윤을 부른 적이 없다.<\/p>\n<p>배경 핵심 소품은 낮은 단차, 검은 전선, 임시 조명 프레임, 출입 제한 표지, 철거 대기 장비 박스다. 진엔딩 구도에서는 이 소품들이 두 사람을 위협하는 장치로만 보이지 않고, 재윤이 되찾은 사고 기억의 조각으로도 읽혀야 한다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-도착\">도착<\/h4>\n<pre><code>하연: 어떻게 알았어?\n재윤: 네가 있을 것 같았어.<\/code><\/pre>\n<p>하연은 소무대 쪽을 바라보다가 재윤 쪽으로 시선을 돌린다.<\/p>\n<pre><code>하연: 내가 부른 것도 아닌데.\n재윤: 그래서 온 거야.\n재윤: 이번엔 내가 먼저 와야 할 것 같아서.<\/code><\/pre>\n<p>하연은 바로 대답하지 않는다.<\/p>\n<pre><code>하연: 지금은 알아?\n재윤: 응.\n하연: 뭘?\n재윤: 누구한테 말하러 왔는지.<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-재윤-선고백\">재윤 선고백<\/h4>\n<pre><code>재윤: 오래된 쪽으로 돌아가면 편했어.\n재윤: 맞는 답을 찾는 척하면 덜 무서웠고.\n재윤: 누가 나를 필요로 하면,\n재윤: 내가 뭘 원하는지 안 봐도 됐어.<\/code><\/pre>\n<p>D-3 정리 결과에 따라 짧은 회상 컷이 끼어든다.<\/p>\n<ul>\n<li>소하: 오래된 골목에서 돌아서며 <code>지금 안 가면 또 늦잖아.<\/code><\/li>\n<li>서린: 방송실에서 <code>네가 고른 답이면 끝까지 봐.<\/code><\/li>\n<li>미루: 체크리스트를 들고 <code>저도 제 거 해볼게요.<\/code><\/li>\n<\/ul>\n<pre><code>재윤: 그런데 그러면,\n재윤: 나는 계속 아무 데도 못 가.\n\n재윤: 이번에는 너한테 가고 싶었어.\n재윤: 누가 시켜서도 아니고,\n재윤: 네가 먼저 말해줘서도 아니고.\n\n재윤: 내가 고른 거라고 말하고 싶어서.<\/code><\/pre>\n<p>재윤은 한 번 숨을 고른다.<\/p>\n<pre><code>재윤: 하연아.\n재윤: 나는 너를 좋아해.<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-선택-정리-변주\">선택 정리 변주<\/h4>\n<p>조건에 따라 고백 전후에 한 줄씩 추가할 수 있다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>정리한 축<\/th><th>추가 대사<\/th><\/tr><\/thead><tbody><tr><td>소하 정리<\/td><td><code>예전으로 돌아가 숨고 싶었던 마음을 지나서 왔어.<\/code><\/td><\/tr><tr><td>서린 정리<\/td><td><code>맞는 답이 아니라, 내가 고른 답이라고 말하려고 왔어.<\/code><\/td><\/tr><tr><td>미루 정리<\/td><td><code>누군가에게 필요한 사람인 척하면서 내 마음을 미루지 않으려고 왔어.<\/code><\/td><\/tr><tr><td>D-2 성공<\/td><td><code>네가 조용한 데서 숨을 고르는 사람이라는 걸, 이제는 조금 알아.<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-하연-마음-확인\">하연 마음 확인<\/h4>\n<p>하연은 시선을 피하지 않는다. 다만 바로 웃지도 않는다.<\/p>\n<pre><code>하연: 나도 말하려고 했어.\n재윤: 오늘?\n하연: 응. 끝나고, 조금 조용해지면.<\/code><\/pre>\n<p>재윤의 표정이 흔들린다.<\/p>\n<pre><code>재윤: 왜 말 안 했어?\n하연: 네가 올 수 있으면... 좋겠다고 생각했어.\n재윤: 내가?\n하연: 응.<\/code><\/pre>\n<p>하연은 아주 천천히 말한다.<\/p>\n<pre><code>하연: 네가 나를 기다려준 적이 있었잖아.\n하연: 억지로 끌고 오지 않고,\n하연: 들어와도 된다고 말해준 적.\n\n하연: 그래서 나도 기다렸어.\n하연: 네가 돌아보는 걸.\n하연: 네가 네 발로 오는 걸.<\/code><\/pre>\n<pre><code>재윤: 많이 늦었지.\n하연: 늦었어.\n재윤: 미안.\n하연: 그 말보다...\n재윤: 응.\n하연: 와줘서 다행이야.<\/code><\/pre>\n<p>하연도 말한다.<\/p>\n<pre><code>하연: 나도... 좋아해.\n하연: 말하는 게 늦었지만,\n하연: 없던 말로 만들고 싶지는 않았어.<\/code><\/pre>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-사고-기억-회복\">사고 기억 회복<\/h4>\n<p>마음 확인 직후, 세계가 잠깐 조용해진다.<\/p>\n<p>폐장 안내 방송의 끝부분이 다시 들린다.<\/p>\n<pre><code>방송: ...정리 후 지정된 동선으로 이동해 주시기 바랍니다.<\/code><\/pre>\n<p>재윤의 시야에 단서들이 겹친다.<\/p>\n<pre><code>조명 프레임.\n출입 제한 표지.\n풀리지 않은 고정끈.\n낮게 남은 소무대의 단차.\n\n전부 같은 자리에 있었다.<\/code><\/pre>\n<p>하연이 한 걸음 움직인다. 바람이 불고, 임시 조명 프레임이 크게 흔들린다.<\/p>\n<pre><code>하연: 재윤아?<\/code><\/pre>\n<p>재윤은 이미 알고 있다. 이 다음에 무슨 일이 오는지.<\/p>\n<pre><code>재윤: 하연아, 뒤로.<\/code><\/pre>\n<p>그는 하연을 밀어내거나 감싸려 손을 뻗는다. 사고는 사라지지 않는다.<\/p>\n<p>내레이션:<\/p>\n<blockquote>사고는 사라지지 않았다.  <\/blockquote>\n<blockquote>아픈 기억도 사라지지 않았다.  <\/blockquote>\n<blockquote>다만 이번에는, 재윤이 어디로 가려 했는지 알았다.  <\/blockquote>\n<blockquote>하연에게.  <\/blockquote>\n<blockquote>말하기 위해서.<\/blockquote>\n<p>선택지:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>선택 후 암전.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-성공-결과\">성공 결과<\/h4>\n<ul>\n<li>사고 기억 수용<\/li>\n<li>일요일 오후 병실로 점프<\/li>\n<li>D+3 월요일 방학식 도달<\/li>\n<li>진엔딩 크레딧 조건 충족<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-10-폐장-후-실패-분기-혼자-소무대에-선다\">10. 폐장 후 실패 분기: 혼자 소무대에 선다<\/h3>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-실패-조건\">실패 조건<\/h4>\n<p>아래 중 하나 이상이 결정적으로 부족할 때 발생한다.<\/p>\n<ul>\n<li><code>HaYeonTrust<\/code> 부족<\/li>\n<li><code>HaYeonPaceRead<\/code> 부족<\/li>\n<li>D-2 예감 실패<\/li>\n<li>기존 관계 정리 부족<\/li>\n<li>사고 단서와 하연 기억을 연결하지 못함<\/li>\n<\/ul>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-장소-2\">장소<\/h4>\n<p>같은 학교 뒤편 야외 소무대.<\/p>\n<p>하지만 하연은 없다. 하연이 서 있던 계단 옆 자리도 비어 있다. 바람 소리와 폐장 방송만 남는다.<\/p>\n<p>실패 구도에서는 같은 소품이 남아도 의미가 빠져 있어야 한다. 전선, 단차, 표지, 조명 프레임은 선명하지만, 하연이 머물던 자리와 말하려던 이유가 비어 있어 재윤이 장소만 따라온 느낌을 준다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-대본-6\">대본<\/h4>\n<pre><code>축제 마지막 안내 방송이 끝났다.\n운동장 쪽 불빛이 하나씩 꺼졌다.\n\n재윤은 학교 뒤편 야외 소무대 앞에 서 있었다.<\/code><\/pre>\n<p>재윤은 주변을 본다.<\/p>\n<pre><code>재윤: ...왜 여기까지 왔지?<\/code><\/pre>\n<p>표지, 고정끈, 프레임, 단차가 보인다.<\/p>\n<pre><code>표지는 제대로 붙어 있었다.\n끈은 묶여 있었다.\n프레임은 제자리에 있었다.\n\n그러니까 이상했다.\n\n전부 제자리에 있는데,\n재윤만 왜 여기 서 있는지 알 수 없었다.<\/code><\/pre>\n<p>기억 조각이 떠오르려다 사라진다.<\/p>\n<pre><code>누군가의 목소리.\n말하려던 문장.\n창밖을 보던 옆얼굴.\n\n하지만 이름이 떠오르지 않았다.<\/code><\/pre>\n<p>실패 선택지:<\/p>\n<pre><code>[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>선택지와 상관없이 하연이 빠진 사고 기억으로 수렴한다. 선택지는 재윤의 회피 양상을 보여주기 위한 연출이다.<\/p>\n<pre><code>재윤: 누가...\n재윤: 누가 있었던 것 같은데.<\/code><\/pre>\n<p>폐장 안내 방송의 끝부분이 멀리서 다시 울리는 것 같다.<\/p>\n<pre><code>방송: ...이동해 주시기 바랍니다.<\/code><\/pre>\n<p>금속이 삐걱인다.<\/p>\n<pre><code>재윤: 나는...<\/code><\/pre>\n<p>발밑이 비는 감각.<\/p>\n<p>암전.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-실패-후-루프\">실패 후 루프<\/h4>\n<p>사고 직후를 길게 설명하지 않는다.<\/p>\n<pre><code>눈을 떴을 때,\n창밖은 월요일 아침이었다.\n\n교실에는 아직 오지 않은 이름이 있었고,\n재윤은 다시 같은 하루 앞에 서 있었다.<\/code><\/pre>\n<p>내부적으로 D-25 월요일로 복귀한다. 게임 내 표기는 <code>월요일 아침<\/code>으로 처리한다.<\/p>\n<h4 id=\"스토리-10d-day축제마지막날분기-md-실패-결과\">실패 결과<\/h4>\n<ul>\n<li>하연 실패 루프<\/li>\n<li>D+3 방학식 미도달<\/li>\n<li>완성된 엔딩 크레딧 없음<\/li>\n<li>다음 루프에서 하연 관련 기억 일부가 더 흐려지거나, 소무대 단서만 강하게 남음<\/li>\n<\/ul>\n<p>---<\/p>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-11-d-day-분기-판정표\">11. D-Day 분기 판정표<\/h3>\n<p>상세 수치 기준: <a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a><\/p>\n<p>요약 우선순위:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>우선순위<\/th><th>조건<\/th><th>분기<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>히든 붕괴 조건 충족<\/td><td>히든 세계 붕괴 엔딩<\/td><\/tr><tr><td>2<\/td><td>D-2 예감 실패, <code>HaYeonTrust &lt; 6<\/code>, <code>HaYeonPaceRead &lt; 3<\/code><\/td><td>하연 실패 루프<\/td><\/tr><tr><td>3<\/td><td><code>SoHaResolved == false<\/code> + <code>SoHaPressure == 3<\/code><\/td><td>소하 새드엔딩<\/td><\/tr><tr><td>4<\/td><td><code>SeoRinResolved == false<\/code> + <code>SeoRinControl == 3<\/code><\/td><td>서린 새드엔딩<\/td><\/tr><tr><td>5<\/td><td><code>MiRuResolved == false<\/code> + <code>MiRuDependence == 3<\/code><\/td><td>미루 새드엔딩<\/td><\/tr><tr><td>6<\/td><td>기존 관계 미해결이 남음<\/td><td>기존 관계 미정리 루프 또는 약화 새드엔딩<\/td><\/tr><tr><td>7<\/td><td><code>AccidentClueScore &lt; 3<\/code> 또는 <code>AccidentClueHaYeon == false<\/code><\/td><td>사고 의미 미연결 루프<\/td><\/tr><tr><td>8<\/td><td><code>Avoidance &gt;= 4<\/code><\/td><td>회피 루프<\/td><\/tr><tr><td>9<\/td><td>모든 필수 조건 충족<\/td><td>진엔딩<\/td><\/tr><\/tbody><\/table><\/div>\n<p>동점 처리:<\/p>\n<ul>\n<li>하연 조건 부족은 항상 다른 새드엔딩보다 우선한다.<\/li>\n<li>기존 관계 미해결이 여럿이면 가장 압박 수치가 높은 인물의 새드엔딩 또는 루프로 보낸다.<\/li>\n<li>사고 단서 부족은 기존 관계 정리가 끝났지만 기억 의미 연결이 부족할 때 발생한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-12-d-day-이후-연결\">12. D-Day 이후 연결<\/h3>\n<p>성공 후:<\/p>\n<ul>\n<li>금요일 밤 사고 기억 수용<\/li>\n<li>토요일 표기 없이 일요일 오후 병실로 점프<\/li>\n<li>D+3 월요일 방학식 도달<\/li>\n<li>방학 후일담과 완성된 엔딩 크레딧으로 연결<\/li>\n<\/ul>\n<p>실패 후:<\/p>\n<ul>\n<li>D+3 월요일 미도달<\/li>\n<li>D-25 월요일 아침으로 복귀<\/li>\n<li>완성된 크레딧 없음<\/li>\n<li>실패 반복 시 <code>07_전체_스토리_외전_실패루프.md<\/code>의 반복 실패/히든 붕괴 규칙 적용<\/li>\n<\/ul>\n<h3 id=\"스토리-10d-day축제마지막날분기-md-다음-연결\">다음 연결<\/h3>\n<p>D-1 밤 정산과 D-Day 낮 보정 기준은 <a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>로 분리했고, 실제 게임 스크립트 단위는 <a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a>로 분리했다. 현재 문서는 감정 대본과 분기 의도를 설명하는 상위 대본 정본으로 유지한다.<\/p>\n<p>권장 순서:<\/p>\n<ol>\n<li>D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리<\/li>\n<li>D-Day 스크립트 분할을 StoryFlow Scene/Branch/Transition 설계와 맞춤<\/li>\n<li>크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "D-Day 축제 마지막 날 분기", "id": "스토리-10d-day축제마지막날분기-md-d-day-축제-마지막-날-분기"}, {"level": 2, "text": "장면 목적", "id": "스토리-10d-day축제마지막날분기-md-장면-목적"}, {"level": 2, "text": "진입 조건", "id": "스토리-10d-day축제마지막날분기-md-진입-조건"}, {"level": 2, "text": "전체 흐름 요약", "id": "스토리-10d-day축제마지막날분기-md-전체-흐름-요약"}, {"level": 2, "text": "1. 오전 공통: 쉬어가 카페의 마지막 운영", "id": "스토리-10d-day축제마지막날분기-md-1-오전-공통-쉬어가-카페의-마지막-운영"}, {"level": 3, "text": "장소와 분위기", "id": "스토리-10d-day축제마지막날분기-md-장소와-분위기"}, {"level": 3, "text": "공통 대화", "id": "스토리-10d-day축제마지막날분기-md-공통-대화"}, {"level": 2, "text": "2. 낮 선택 진입", "id": "스토리-10d-day축제마지막날분기-md-2-낮-선택-진입"}, {"level": 2, "text": "3. 낮 선택: 하연과 축제를 둘러본다", "id": "스토리-10d-day축제마지막날분기-md-3-낮-선택-하연과-축제를-둘러본다"}, {"level": 3, "text": "성공/보정 목적", "id": "스토리-10d-day축제마지막날분기-md-성공-보정-목적"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본"}, {"level": 3, "text": "결과", "id": "스토리-10d-day축제마지막날분기-md-결과"}, {"level": 2, "text": "4. 낮 선택: 소하와 마지막으로 오래된 길을 걷는다", "id": "스토리-10d-day축제마지막날분기-md-4-낮-선택-소하와-마지막으로-오래된-길을-걷는다"}, {"level": 3, "text": "성공/보정 목적", "id": "스토리-10d-day축제마지막날분기-md-성공-보정-목적-2"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본-2"}, {"level": 3, "text": "결과", "id": "스토리-10d-day축제마지막날분기-md-결과-2"}, {"level": 2, "text": "5. 낮 선택: 서린의 방송 마무리를 돕는다", "id": "스토리-10d-day축제마지막날분기-md-5-낮-선택-서린의-방송-마무리를-돕는다"}, {"level": 3, "text": "성공/보정 목적", "id": "스토리-10d-day축제마지막날분기-md-성공-보정-목적-3"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본-3"}, {"level": 3, "text": "결과", "id": "스토리-10d-day축제마지막날분기-md-결과-3"}, {"level": 2, "text": "6. 낮 선택: 미루의 도움 인원 마무리를 확인한다", "id": "스토리-10d-day축제마지막날분기-md-6-낮-선택-미루의-도움-인원-마무리를-확인한다"}, {"level": 3, "text": "성공/보정 목적", "id": "스토리-10d-day축제마지막날분기-md-성공-보정-목적-4"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본-4"}, {"level": 3, "text": "결과", "id": "스토리-10d-day축제마지막날분기-md-결과-4"}, {"level": 2, "text": "7. 낮 선택: 혼자 야외 소무대 쪽을 본다", "id": "스토리-10d-day축제마지막날분기-md-7-낮-선택-혼자-야외-소무대-쪽을-본다"}, {"level": 3, "text": "성공/보정 목적", "id": "스토리-10d-day축제마지막날분기-md-성공-보정-목적-5"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본-5"}, {"level": 3, "text": "결과", "id": "스토리-10d-day축제마지막날분기-md-결과-5"}, {"level": 2, "text": "8. 폐장 후 진입", "id": "스토리-10d-day축제마지막날분기-md-8-폐장-후-진입"}, {"level": 3, "text": "조건 정산", "id": "스토리-10d-day축제마지막날분기-md-조건-정산"}, {"level": 3, "text": "성공 쪽 내레이션", "id": "스토리-10d-day축제마지막날분기-md-성공-쪽-내레이션"}, {"level": 3, "text": "실패 쪽 내레이션", "id": "스토리-10d-day축제마지막날분기-md-실패-쪽-내레이션"}, {"level": 2, "text": "9. 폐장 후 성공 분기: 하연에게 말하러 간다", "id": "스토리-10d-day축제마지막날분기-md-9-폐장-후-성공-분기-하연에게-말하러-간다"}, {"level": 3, "text": "장소", "id": "스토리-10d-day축제마지막날분기-md-장소"}, {"level": 3, "text": "도착", "id": "스토리-10d-day축제마지막날분기-md-도착"}, {"level": 3, "text": "재윤 선고백", "id": "스토리-10d-day축제마지막날분기-md-재윤-선고백"}, {"level": 3, "text": "선택 정리 변주", "id": "스토리-10d-day축제마지막날분기-md-선택-정리-변주"}, {"level": 3, "text": "하연 마음 확인", "id": "스토리-10d-day축제마지막날분기-md-하연-마음-확인"}, {"level": 3, "text": "사고 기억 회복", "id": "스토리-10d-day축제마지막날분기-md-사고-기억-회복"}, {"level": 3, "text": "성공 결과", "id": "스토리-10d-day축제마지막날분기-md-성공-결과"}, {"level": 2, "text": "10. 폐장 후 실패 분기: 혼자 소무대에 선다", "id": "스토리-10d-day축제마지막날분기-md-10-폐장-후-실패-분기-혼자-소무대에-선다"}, {"level": 3, "text": "실패 조건", "id": "스토리-10d-day축제마지막날분기-md-실패-조건"}, {"level": 3, "text": "장소", "id": "스토리-10d-day축제마지막날분기-md-장소-2"}, {"level": 3, "text": "대본", "id": "스토리-10d-day축제마지막날분기-md-대본-6"}, {"level": 3, "text": "실패 후 루프", "id": "스토리-10d-day축제마지막날분기-md-실패-후-루프"}, {"level": 3, "text": "실패 결과", "id": "스토리-10d-day축제마지막날분기-md-실패-결과"}, {"level": 2, "text": "11. D-Day 분기 판정표", "id": "스토리-10d-day축제마지막날분기-md-11-d-day-분기-판정표"}, {"level": 2, "text": "12. D-Day 이후 연결", "id": "스토리-10d-day축제마지막날분기-md-12-d-day-이후-연결"}, {"level": 2, "text": "다음 연결", "id": "스토리-10d-day축제마지막날분기-md-다음-연결"}], "plain": "# D-Day 축제 마지막 날 분기 이 문서는 내부 기준 D-Day 금요일, 게임 내 표기 `축제 2일차 / 축제 마지막 날 / 폐장 후`의 낮 선택과 폐장 후 성공·실패 분기를 대본 수준으로 정리한다. 점수·플래그 판정 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)를 따르고, 실제 제작 단위 분할은 [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md)을 따른다. 장소와 배경의 시각 기준은 [장소와 배경 묘사](./14_장소와_배경_묘사.md)를 따른다. 이 문서의 장소 지시는 감정 대본용 요약이며, 배경 원화/AI 이미지 생성 기준은 14번 문서를 우선한다. D-Day의 핵심은 사고를 피하는 것이 아니다. 재윤이 하연을 충분히 이해했는지, 기존 관계 뒤에 숨지 않았는지, 사고 단서를 `하연에게 가려던 선택의 결과`로 받아들일 수 있는지 확인하는 최종 분기다. ## 장면 목적 | 목적 | 설명 | | --- | --- | | 낮 선택 정산 | 하연 신뢰, 기존 관계 정리, 사고 단서를 마지막으로 보정하거나 확정한다. | | 하연 동선 인식 | 하연이 부르지 않아도 재윤이 폐장 후 하연이 있을 곳을 알아차리게 한다. | | 선고백 | 재윤이 먼저 자기 마음과 선택을 말한다. | | 사고 의미 회복 | 사고는 사라지지 않지만, 혼자 다친 사고가 아니라 하연에게 가려던 선택의 결과로 기억된다. | | 실패 루프 | 조건 부족 시 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선 이유를 잊은 채 루프한다. | ## 진입 조건 기본 진입: - D-1 축제 1일차 `쉬어가 카페` 운영 완료. - D-2 `말하지 못한 예감` 장면을 봄. - D-3 관계 정리 결과가 정산됨. 주요 조건: | 조건 | 성공 쪽 의미 | 부족 시 영향 | | --- | --- | --- | | `HaYeonTrust` | 하연이 자신의 침묵을 재윤에게 맡길 수 있음 | 하연의 말이 단순 혼잣말처럼 사라짐 | | `HaYeonPaceRead` | 폐장 후 하연이 조용한 곳으로 향할 것을 재윤이 알아차림 | 하연이 보이지 않아도 어디로 갔는지 모름 | | `SoHaResolved` | 과거 도피 차단 | 하연에게 가는 마음이 새 관계 도피처럼 흔들림 | | `SeoRinResolved` | 정답 의존 차단 | 위험하니 가지 않는 것이 정답처럼 보임 | | `MiRuResolved` | 필요한 사람 도피 차단 | 누군가를 두고 가는 죄책감으로 선택을 미룸 | | 사고 단서 | 소무대 위험과 병실 기억 연결 | 장소와 물건만 남고, 누구에게 가려 했는지가 비어 있음 | ## 전체 흐름 요약 1. 오전~이른 오후: `쉬어가 카페` 축소 운영. 2. 낮 선택: 하연/소하/서린/미루/혼자 중 하나를 선택해 마지막 보정. 3. 폐장 직전: 조건 정산. 하연이 조용히 사라짐. 4. 성공: 재윤이 하연의 동선을 알아차려 소무대로 직접 찾아감. 5. 실패: 장소와 단서만 따라가지만 하연이 사고 기억에서 빠짐. 6. 성공 분기: 선고백, 하연 마음 확인, 사고 의미 회복, 일요일 병실로 점프. 7. 실패 분기: 혼자 소무대, 사고 반복, D-25 월요일로 루프. --- ## 1. 오전 공통: 쉬어가 카페의 마지막 운영 ### 장소와 분위기 - 2학년 5반 `쉬어가 카페` - 전날보다 손님은 적고, 부스는 오전~이른 오후까지만 축소 운영 - 컵, 메뉴판, 문구 카드, 손님용 의자가 조금씩 정리되는 중 - 교실 밖은 축제 마지막 날의 들뜬 소음이 있음 - 하연은 카페가 끝나가는 모습을 조용히 바라본다 - 책상을 붙여 만든 임시 카운터, 종이컵, 손글씨 메뉴판, 반쯤 떼어진 종이 장식이 보여야 한다. - 카페는 상업적으로 예쁜 공간이 아니라 학생들이 만든 어설픈 임시 부스다. - 창문 쪽에는 운동장 빛이 들어오지만, 교실 안은 이미 정리의 기운이 섞인다. 입구 문구: ```text 잠깐 앉아도 괜찮습니다. ``` 재윤은 그 문구를 본다. 내레이션: > 오늘은 그 문장이, 재윤에게 하는 말처럼 보였다. > 쉬어가도 되지만, 머물러 숨으면 안 되는 날이었다. ### 공통 대화 ```text 반 친구: 오후엔 부스 닫고 돌아다녀도 된대! 반 친구: 컵 남은 거 이쪽에 모아줘. 재윤: 알겠어. 하연: 이 문구, 떼지 말까? 재윤: 왜? 하연: 아직 들어올 사람 있을 수도 있으니까. 재윤: 축제 끝나기 전까지? 하연: 응. 끝나기 전까지. ``` 재윤은 `끝나기 전까지`라는 말을 오래 듣는다. ```text 재윤: 끝나면? 하연: 끝나면... 정리해야지. ``` 하연은 그렇게 말하고 메뉴판 쪽으로 시선을 돌린다. 이 시점에서 고백이나 약속은 없다. ## 2. 낮 선택 진입 카페 축소 운영이 끝나면 선택지가 열린다. ```text [하연과 축제를 둘러본다] [소하와 마지막으로 오래된 길을 걷는다] [서린의 방송 마무리를 돕는다] [미루의 도움 인원 마무리를 확인한다] [혼자 야외 소무대 쪽을 본다] ``` 선택지는 단순 데이트 선택이 아니라, 밤 분기 직전의 마지막 보정이다. | 선택 | 보정/확정 | 위험 | | --- | --- | --- | | 하연 | 상호 신뢰, 하연 동선 이해, 말하지 못한 예감 보강 | 기존 관계 정리 부족은 해결하지 못함 | | 소하 | 과거 미련 최종 확인 | 하연 신뢰 부족은 해결하지 못함 | | 서린 | 선택권/위험 단서 최종 확인 | 마음 확인 부족은 해결하지 못함 | | 미루 | 의존/도움 인원 단서 최종 확인 | 하연 동선 이해 부족은 해결하지 못함 | | 혼자 | 사고 단서 직접 보강 | 단서 공유가 없으면 하연이 기억에서 빠질 위험 | --- ## 3. 낮 선택: 하연과 축제를 둘러본다 ### 성공/보정 목적 - `HaYeonTrust` 최종 보정 - `HaYeonPaceRead` 최종 보정 - D-2의 예감을 D-Day 낮에 다시 확인 ### 대본 축제 마지막 날의 운동장. 음악은 밝고 사람들은 들떠 있다. 하연은 재윤 옆을 걷지만, 축제 중심으로 깊게 들어가지는 않는다. 배경은 운동장 중심의 밝은 천막과 가장자리의 조용한 그늘을 함께 보여준다. 하연은 축제 중심부보다 사람 흐름이 느슨한 가장자리에 시선이 머무르고, 멀리 소무대 방향이 작은 프레임처럼 보이면 좋다. ```text 재윤: 사람 많네. 하연: 어제보다 더 많은 것 같아. 재윤: 괜찮아? 하연: 괜찮아. 오래 있으면 조금 시끄럽긴 한데. ``` 재윤은 바로 `그럼 나갈까?`라고 묻지 않는다. 대신 하연의 걸음이 느려지는 방향을 본다. ```text 재윤: 저쪽으로 돌까? 하연: 어디? 재윤: 사람 덜 몰리는 쪽. ``` 하연은 잠깐 재윤을 본다. ```text 하연: 알아봤네. 재윤: 조금은. 하연: 조금이면 됐어. ``` 두 사람은 운동장 가장자리로 걷는다. 멀리 학교 뒤편 소무대가 보인다. ```text 재윤: 이상하게 계속 저쪽이 걸려. 하연: 나도 가끔 봐. 재윤: 왜? 하연: 시끄러운 데서 잠깐 빠져나가고 싶을 때, 저쪽이 제일 조용해 보여서. ``` D-2 성공 시 추가 대사: ```text 재윤: 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 다르다고 했잖아. 하연: 기억했네. 재윤: 응. 하연: 그럼 됐어. ``` 이 장면에서는 고백하지 않는다. 낮에는 아직 축제 속에 있고, 말해야 할 시간은 폐장 후에 온다. ### 결과 성공: - `HaYeonTrust +1` - `HaYeonPaceRead +1` - 폐장 후 하연 동선 인식 강화 실패/약한 진행: - 재윤이 하연의 시선을 보지 못하고 축제 놀이에만 집중하면 동선 이해 보정 없음 - 하연이 `괜찮아`만 반복하고, 소무대 방향이 의미 없이 지나감 --- ## 4. 낮 선택: 소하와 마지막으로 오래된 길을 걷는다 ### 성공/보정 목적 - `SoHaResolved` 최종 확인 또는 보정 - 과거 도피 잔류 여부 확정 ### 대본 소하는 2학년 2반 부스 정리를 마치고 재윤을 부른다. ```text 소하: 야, 유재윤. 재윤: 정리 끝났어? 소하: 대충. 넌? 재윤: 우리도 거의. 소하: 그럼 잠깐 걸어. ``` 두 사람은 운동장 옆 오래된 길로 걷는다. 축제 소리는 뒤에서 들리고, 이 길은 이상할 만큼 프롤로그의 등굣길과 닮아 있다. D-3 소하 정리 성공 시: ```text 소하: 예전 같으면, 너 이런 날엔 나랑 먼저 돌았어. 재윤: 알아. 소하: 그럼 오늘은? 재윤: 마지막에 가야 할 데가 있어. 소하: 하연이한테? 재윤: 응. 소하: 이제야 제대로 말하네. ``` 소하는 웃으려다 한숨을 쉰다. ```text 소하: 짜증나는데, 그래도 그게 낫다. 재윤: 뭐가? 소하: 네가 모른 척하는 것보다. ``` D-3 소하 미정리 시: ```text 소하: 아직도 말 안 할 거야? 재윤: 뭘. 소하: 그 애한테 가고 싶은 거. 재윤: 지금 그런 얘기 할 때는... 소하: 너는 항상 그런 식이야. 말할 때가 아니래. ``` 보정 선택지: ```text [하연에게 갈 거라고 말한다] [예전처럼 웃어넘긴다] ``` 성공 시: ```text 재윤: 하연이한테 갈 거야. 소하: ...그래. 재윤: 그래도 너랑 있던 시간이 가짜였다는 뜻은 아니야. 소하: 그건 내가 정해. 재윤: 응. 소하: 근데 지금은 가. 또 늦지 말고. ``` 실패 시: ```text 재윤: 그냥 축제잖아. 소하: 그래. 그냥 축제지. ``` 소하의 웃음이 프롤로그의 아침처럼 고정된다. ### 결과 성공: - `SoHaResolved = true` 또는 유지 - 과거 도피 선택지 약화 실패: - D-Day 밤에 `[아무 일도 없었던 것으로 한다]` 선택지가 강해짐 - 소하 새드엔딩 진입 위험 상승 --- ## 5. 낮 선택: 서린의 방송 마무리를 돕는다 ### 성공/보정 목적 - `SeoRinResolved` 최종 확인 또는 보정 - 폐장 방송/소무대 위험 단서 보강 - 정답 의존 잔류 여부 확정 ### 대본 방송실. 서린은 폐장 안내 멘트와 장비 회수 큐시트를 확인하고 있다. 방송실은 차가운 통제실이 아니라, 학생회와 방송반 업무가 실제로 쌓인 좁은 공간이다. 믹서, 마이크, 헤드폰, 라벨링된 케이블, 폐장 안내 큐시트, D-9 상담 때 적었던 기준 메모가 함께 보여야 한다. ```text 서린: 왔네. 재윤: 도와드릴 거 있어요? 서린: 네가 도와야 할 일인지, 네가 피하려고 온 일인지 먼저 구분해. 재윤: ...들켰네요. ``` 서린은 큐시트를 넘긴다. 큐시트 여백에는 D-9 상담 때 나눴던 네 기준이 작게 적혀 있다. ```text 서린: 폐장 방송은 이 순서면 돼. 재윤: 제가 확인 안 해도 괜찮아요? 서린: 네가 오늘 확인해야 할 건 이게 아니잖아. 재윤: 맞는 답 말고, 제가 고른 이유요. 서린: 기억하네. ``` D-3 서린 정리 성공 시: ```text 재윤: 그래도 틀리면요? 서린: 틀리면 내가 고친다. 서린: 너는 네가 말해야 할 걸 말해. ``` 서린은 점검표 일부를 건넨다. ```text 서린: 소무대 쪽은 폐장 후 철거 예정이야. 위험한 건 맞아. 재윤: 그럼 가지 말라고 하실 줄 알았는데요. 서린: 가도 된다고 말하는 것도 아니야. 재윤: 네. 서린: 알고 고르라는 거야. ``` D-3 서린 미정리 시: ```text 서린: 네가 정 못 고르겠으면, 내가 정해줄 수 있어. 재윤: 그게 편하긴 해요. 서린: 편한 게 정답은 아니야. ``` 보정 선택지: ```text [제가 고를게요] [선배가 정해주세요] ``` 성공 시: ```text 재윤: 제가 고를게요. 서린: 위험해도? 재윤: 위험하다는 걸 알고도, 제가 왜 가려는지 말해야 할 것 같아요. 서린: 그럼 가서 말해. 대신 변명하지 말고. ``` 실패 시: ```text 재윤: 선배가 정해주세요. 서린: ...그럼 가지 마. ``` 방송실 스피커에 폐장 멘트가 미리 울린다. ```text 방송: 지정된 동선을 따라 이동하십시오. ``` ### 결과 성공: - `SeoRinResolved = true` 또는 유지 - `AccidentClueSeoRin` 보강 - 폐장 후 선택 확신 상승 실패: - `[선택하지 않는다]`, `[정해진 길을 따른다]` 계열 선택지 강화 - 서린 새드엔딩 진입 위험 상승 --- ## 6. 낮 선택: 미루의 도움 인원 마무리를 확인한다 ### 성공/보정 목적 - `MiRuResolved` 최종 확인 또는 보정 - 출입 제한 표지/고정끈 단서 보강 - 의존 잔류 여부 확정 ### 대본 축제 도움 인원 대기 장소. 미루는 체크리스트를 품에 숨기지 않고 들고 있다. 대기 장소는 막힌 방이 아니라 복도 옆 임시 책상에 가깝다. 체크리스트, 명찰, 여분 안내 표지, 테이프와 끈, 분실물 박스가 보이고, 미루가 원하면 직접 나갈 수 있는 문이나 복도 동선이 보여야 한다. D-3 미루 정리 성공 시: ```text 미루: 선배. 재윤: 어, 미루야. 미루: 저, 표지 확인하고 보고까지 했어요. 재윤: 잘했네. 미루: 그래도 마지막에 선배가 한 번 봐주시면— 재윤: 네가 먼저 본 게 맞아. 재윤: 내가 다시 정해주지 않아도 돼. 미루: 그럼 저, 혼자 한 거 맞죠? 재윤: 응. 네가 한 거야. ``` 미루는 웃다가 울 것 같은 얼굴이 된다. ```text 미루: 그럼 저 이제 보고하러 갈게요. 재윤: 응. 미루: 선배도... 가야 하는 데 가세요. ``` D-3 미루 미정리 시: ```text 미루: 선배, 이것만 봐주시면 안 돼요? 재윤: 미루야. 미루: 마지막이잖아요. 방학식 지나면 멘토링 끝나니까. ``` 보정 선택지: ```text [네가 먼저 확인한 걸 믿는다] [마지막이니까 대신 봐준다] ``` 성공 시: ```text 재윤: 네가 먼저 확인한 걸 믿을게. 미루: 틀렸으면요? 재윤: 그럼 고치면 돼. 네가 한 게 없어지는 건 아니야. 미루: ...알겠어요. ``` 미루는 체크리스트를 넘긴다. ```text 미루: 소무대 뒤편 표지는 다시 붙였고요. 미루: 고정끈은 임시로 묶인 흔적이 있었어요. 미루: 보고는 학생회 운영본부로 하면 된대요. ``` 실패 시: ```text 재윤: 줘. 내가 볼게. 미루: 역시 선배가 봐줘야 안심돼요. ``` 체크리스트 항목이 늘어난다. ```text [마지막 확인] [마지막의 마지막 확인] [선배가 떠나지 않는지 확인] ``` ### 결과 성공: - `MiRuResolved = true` 또는 유지 - `AccidentClueMiRu` 보강 - 의존 도피 선택지 약화 실패: - 미루 새드엔딩 위험 상승 - 하연에게 가는 선택이 누군가를 버리는 것처럼 흔들림 --- ## 7. 낮 선택: 혼자 야외 소무대 쪽을 본다 ### 성공/보정 목적 - 사고 단서 직접 보강 - 단, 하연 신뢰와 공유가 부족하면 오히려 빈자리를 강조 ### 대본 재윤은 혼자 학교 뒤편으로 향한다. 낮의 소무대는 조용하다. 낮의 소무대는 아직 사고 장소처럼 보이지 않는다. 낮은 단차, 검은 전선, 임시 조명 프레임, 기울어진 출입 제한 표지는 보이지만, 햇빛 아래에서는 평범한 행사 시설처럼 지나칠 수 있어야 한다. ```text 소무대는 낮에도 조용했다. 표지는 제대로 붙어 있었고, 끈은 풀리지 않았고, 프레임은 아직 제자리에 있었다. ``` 재윤은 점검표와 미루의 보고를 떠올린다. ```text 재윤: 전부 제자리에 있는데... ``` 바람이 불고, 임시 조명 프레임이 아주 작게 운다. 하연 신뢰가 충분한 경우: ```text 재윤은 하연이 창밖으로 이곳을 바라보던 얼굴을 떠올렸다. 혼자 있고 싶은 거랑, 아무도 오지 않았으면 하는 건 달라. ``` 하연 신뢰가 부족한 경우: ```text 전부 확인했는데도, 재윤은 여전히 누구에게 가려 했는지 알 수 없었다. ``` ### 결과 성공: - 사고 단서 보강 - `AccidentClueSeoRin`, `AccidentClueMiRu`, `AccidentClueHaYeon` 중 부족분 일부 보정 실패: - 정보는 있지만 마음 연결이 부족 - 폐장 후 혼자 소무대에 설 위험 상승 --- ## 8. 폐장 후 진입 축제 마지막 안내 방송이 끝난다. ```text 방송: 이상으로 축제 2일차 운영을 종료합니다. 방송: 각 반은 정리 후 지정된 동선으로 이동해 주시기 바랍니다. ``` 운동장 쪽 불빛이 하나씩 꺼진다. 교실 장식이 내려가고, 카페 문구 카드도 떼어진다. 폐장 후 배경은 밝은 축제 중심부와 먼저 어두워지는 학교 뒤편을 대비한다. 운동장에는 아직 정리하는 학생과 접히는 천막이 남아 있지만, 소무대 쪽은 소리가 먼저 빠져나간다. 재윤은 문구 카드를 손에 든다. ```text 잠깐 앉아도 괜찮습니다. ``` 재윤은 문구를 접어 주머니에 넣는다. 하연이 보이지 않는다. 처음에는 화장실, 교실 밖, 운동장 가장자리라고 생각한다. 하지만 어디에도 없다. ### 조건 정산 | 상태 | 폐장 후 인식 | | --- | --- | | 하연 신뢰 충분 + D-2 성공 | 하연이 조용한 소무대 쪽으로 갔음을 알아차림 | | 하연 신뢰 부족 | 하연이 사라진 것을 늦게 알아차리거나, 알아차려도 동선을 모름 | | 관계 정리 부족 | 하연에게 가는 마음이 죄책감/도피/정답 문제로 흔들림 | | 사고 단서 부족 | 소무대가 위험 장소라는 것만 남고, 마음의 장소로 연결되지 않음 | ### 성공 쪽 내레이션 ```text 하연이 보이지 않았다. 재윤은 낮에 하연이 바라보던 방향을 떠올렸다. 시끄러운 곳에서 한 걸음 물러난 자리. 들어와도 되고, 안 들어와도 되는 곳. 혼자 있고 싶은 것과, 아무도 오지 않았으면 하는 것은 다르다는 말. 학교 뒤편 야외 소무대. 이번에는, 누가 불러서 가는 게 아니었다. ``` 성공 선택지: ```text [하연에게 말하러 간다] ``` 완전 조건 충족 시: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` ### 실패 쪽 내레이션 ```text 하연이 보이지 않았다. 재윤은 소무대 쪽이 신경 쓰였다. 왜인지는 알 수 없었다. 표지. 고정끈. 임시 프레임. 폐장 안내 방송. 장소와 물건은 떠올랐다. 하지만 그곳에 있어야 할 사람의 이름이 떠오르지 않았다. ``` 실패 선택지: ```text [소무대 쪽으로 간다] [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` --- ## 9. 폐장 후 성공 분기: 하연에게 말하러 간다 ### 장소 학교 뒤편 야외 소무대. 낮에는 축제의 일부였지만, 밤에는 조용하다. 무대 위 조명은 꺼져 있고, 임시 프레임은 아직 철거되지 않았다. 바람이 불면 금속이 작게 운다. 하연은 무대 위가 아니라, 무대 옆 낮은 계단 근처에 서 있다. 위험한 구조물 안쪽으로 깊게 들어가 있지는 않다. 그녀는 재윤을 부른 적이 없다. 배경 핵심 소품은 낮은 단차, 검은 전선, 임시 조명 프레임, 출입 제한 표지, 철거 대기 장비 박스다. 진엔딩 구도에서는 이 소품들이 두 사람을 위협하는 장치로만 보이지 않고, 재윤이 되찾은 사고 기억의 조각으로도 읽혀야 한다. ### 도착 ```text 하연: 어떻게 알았어? 재윤: 네가 있을 것 같았어. ``` 하연은 소무대 쪽을 바라보다가 재윤 쪽으로 시선을 돌린다. ```text 하연: 내가 부른 것도 아닌데. 재윤: 그래서 온 거야. 재윤: 이번엔 내가 먼저 와야 할 것 같아서. ``` 하연은 바로 대답하지 않는다. ```text 하연: 지금은 알아? 재윤: 응. 하연: 뭘? 재윤: 누구한테 말하러 왔는지. ``` ### 재윤 선고백 ```text 재윤: 오래된 쪽으로 돌아가면 편했어. 재윤: 맞는 답을 찾는 척하면 덜 무서웠고. 재윤: 누가 나를 필요로 하면, 재윤: 내가 뭘 원하는지 안 봐도 됐어. ``` D-3 정리 결과에 따라 짧은 회상 컷이 끼어든다. - 소하: 오래된 골목에서 돌아서며 `지금 안 가면 또 늦잖아.` - 서린: 방송실에서 `네가 고른 답이면 끝까지 봐.` - 미루: 체크리스트를 들고 `저도 제 거 해볼게요.` ```text 재윤: 그런데 그러면, 재윤: 나는 계속 아무 데도 못 가. 재윤: 이번에는 너한테 가고 싶었어. 재윤: 누가 시켜서도 아니고, 재윤: 네가 먼저 말해줘서도 아니고. 재윤: 내가 고른 거라고 말하고 싶어서. ``` 재윤은 한 번 숨을 고른다. ```text 재윤: 하연아. 재윤: 나는 너를 좋아해. ``` ### 선택 정리 변주 조건에 따라 고백 전후에 한 줄씩 추가할 수 있다. | 정리한 축 | 추가 대사 | | --- | --- | | 소하 정리 | `예전으로 돌아가 숨고 싶었던 마음을 지나서 왔어.` | | 서린 정리 | `맞는 답이 아니라, 내가 고른 답이라고 말하려고 왔어.` | | 미루 정리 | `누군가에게 필요한 사람인 척하면서 내 마음을 미루지 않으려고 왔어.` | | D-2 성공 | `네가 조용한 데서 숨을 고르는 사람이라는 걸, 이제는 조금 알아.` | ### 하연 마음 확인 하연은 시선을 피하지 않는다. 다만 바로 웃지도 않는다. ```text 하연: 나도 말하려고 했어. 재윤: 오늘? 하연: 응. 끝나고, 조금 조용해지면. ``` 재윤의 표정이 흔들린다. ```text 재윤: 왜 말 안 했어? 하연: 네가 올 수 있으면... 좋겠다고 생각했어. 재윤: 내가? 하연: 응. ``` 하연은 아주 천천히 말한다. ```text 하연: 네가 나를 기다려준 적이 있었잖아. 하연: 억지로 끌고 오지 않고, 하연: 들어와도 된다고 말해준 적. 하연: 그래서 나도 기다렸어. 하연: 네가 돌아보는 걸. 하연: 네가 네 발로 오는 걸. ``` ```text 재윤: 많이 늦었지. 하연: 늦었어. 재윤: 미안. 하연: 그 말보다... 재윤: 응. 하연: 와줘서 다행이야. ``` 하연도 말한다. ```text 하연: 나도... 좋아해. 하연: 말하는 게 늦었지만, 하연: 없던 말로 만들고 싶지는 않았어. ``` ### 사고 기억 회복 마음 확인 직후, 세계가 잠깐 조용해진다. 폐장 안내 방송의 끝부분이 다시 들린다. ```text 방송: ...정리 후 지정된 동선으로 이동해 주시기 바랍니다. ``` 재윤의 시야에 단서들이 겹친다. ```text 조명 프레임. 출입 제한 표지. 풀리지 않은 고정끈. 낮게 남은 소무대의 단차. 전부 같은 자리에 있었다. ``` 하연이 한 걸음 움직인다. 바람이 불고, 임시 조명 프레임이 크게 흔들린다. ```text 하연: 재윤아? ``` 재윤은 이미 알고 있다. 이 다음에 무슨 일이 오는지. ```text 재윤: 하연아, 뒤로. ``` 그는 하연을 밀어내거나 감싸려 손을 뻗는다. 사고는 사라지지 않는다. 내레이션: > 사고는 사라지지 않았다. > 아픈 기억도 사라지지 않았다. > 다만 이번에는, 재윤이 어디로 가려 했는지 알았다. > 하연에게. > 말하기 위해서. 선택지: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 선택 후 암전. ### 성공 결과 - 사고 기억 수용 - 일요일 오후 병실로 점프 - D+3 월요일 방학식 도달 - 진엔딩 크레딧 조건 충족 --- ## 10. 폐장 후 실패 분기: 혼자 소무대에 선다 ### 실패 조건 아래 중 하나 이상이 결정적으로 부족할 때 발생한다. - `HaYeonTrust` 부족 - `HaYeonPaceRead` 부족 - D-2 예감 실패 - 기존 관계 정리 부족 - 사고 단서와 하연 기억을 연결하지 못함 ### 장소 같은 학교 뒤편 야외 소무대. 하지만 하연은 없다. 하연이 서 있던 계단 옆 자리도 비어 있다. 바람 소리와 폐장 방송만 남는다. 실패 구도에서는 같은 소품이 남아도 의미가 빠져 있어야 한다. 전선, 단차, 표지, 조명 프레임은 선명하지만, 하연이 머물던 자리와 말하려던 이유가 비어 있어 재윤이 장소만 따라온 느낌을 준다. ### 대본 ```text 축제 마지막 안내 방송이 끝났다. 운동장 쪽 불빛이 하나씩 꺼졌다. 재윤은 학교 뒤편 야외 소무대 앞에 서 있었다. ``` 재윤은 주변을 본다. ```text 재윤: ...왜 여기까지 왔지? ``` 표지, 고정끈, 프레임, 단차가 보인다. ```text 표지는 제대로 붙어 있었다. 끈은 묶여 있었다. 프레임은 제자리에 있었다. 그러니까 이상했다. 전부 제자리에 있는데, 재윤만 왜 여기 서 있는지 알 수 없었다. ``` 기억 조각이 떠오르려다 사라진다. ```text 누군가의 목소리. 말하려던 문장. 창밖을 보던 옆얼굴. 하지만 이름이 떠오르지 않았다. ``` 실패 선택지: ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 선택지와 상관없이 하연이 빠진 사고 기억으로 수렴한다. 선택지는 재윤의 회피 양상을 보여주기 위한 연출이다. ```text 재윤: 누가... 재윤: 누가 있었던 것 같은데. ``` 폐장 안내 방송의 끝부분이 멀리서 다시 울리는 것 같다. ```text 방송: ...이동해 주시기 바랍니다. ``` 금속이 삐걱인다. ```text 재윤: 나는... ``` 발밑이 비는 감각. 암전. ### 실패 후 루프 사고 직후를 길게 설명하지 않는다. ```text 눈을 떴을 때, 창밖은 월요일 아침이었다. 교실에는 아직 오지 않은 이름이 있었고, 재윤은 다시 같은 하루 앞에 서 있었다. ``` 내부적으로 D-25 월요일로 복귀한다. 게임 내 표기는 `월요일 아침`으로 처리한다. ### 실패 결과 - 하연 실패 루프 - D+3 방학식 미도달 - 완성된 엔딩 크레딧 없음 - 다음 루프에서 하연 관련 기억 일부가 더 흐려지거나, 소무대 단서만 강하게 남음 --- ## 11. D-Day 분기 판정표 상세 수치 기준: [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md) 요약 우선순위: | 우선순위 | 조건 | 분기 | | --- | --- | --- | | 1 | 히든 붕괴 조건 충족 | 히든 세계 붕괴 엔딩 | | 2 | D-2 예감 실패, `HaYeonTrust < 6`, `HaYeonPaceRead < 3` | 하연 실패 루프 | | 3 | `SoHaResolved == false` + `SoHaPressure == 3` | 소하 새드엔딩 | | 4 | `SeoRinResolved == false` + `SeoRinControl == 3` | 서린 새드엔딩 | | 5 | `MiRuResolved == false` + `MiRuDependence == 3` | 미루 새드엔딩 | | 6 | 기존 관계 미해결이 남음 | 기존 관계 미정리 루프 또는 약화 새드엔딩 | | 7 | `AccidentClueScore < 3` 또는 `AccidentClueHaYeon == false` | 사고 의미 미연결 루프 | | 8 | `Avoidance >= 4` | 회피 루프 | | 9 | 모든 필수 조건 충족 | 진엔딩 | 동점 처리: - 하연 조건 부족은 항상 다른 새드엔딩보다 우선한다. - 기존 관계 미해결이 여럿이면 가장 압박 수치가 높은 인물의 새드엔딩 또는 루프로 보낸다. - 사고 단서 부족은 기존 관계 정리가 끝났지만 기억 의미 연결이 부족할 때 발생한다. ## 12. D-Day 이후 연결 성공 후: - 금요일 밤 사고 기억 수용 - 토요일 표기 없이 일요일 오후 병실로 점프 - D+3 월요일 방학식 도달 - 방학 후일담과 완성된 엔딩 크레딧으로 연결 실패 후: - D+3 월요일 미도달 - D-25 월요일 아침으로 복귀 - 완성된 크레딧 없음 - 실패 반복 시 `07_전체_스토리_외전_실패루프.md`의 반복 실패/히든 붕괴 규칙 적용 ## 다음 연결 D-1 밤 정산과 D-Day 낮 보정 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)로 분리했고, 실제 게임 스크립트 단위는 [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md)로 분리했다. 현재 문서는 감정 대본과 분기 의도를 설명하는 상위 대본 정본으로 유지한다. 권장 순서: 1. D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리 2. D-Day 스크립트 분할을 StoryFlow Scene/Branch/Transition 설계와 맞춤 3. 크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정", "excerpt": "# D-Day 축제 마지막 날 분기 이 문서는 내부 기준 D-Day 금요일, 게임 내 표기 `축제 2일차 / 축제 마지막 날 / 폐장 후`의 낮 선택과 폐장 후 성공·실패 분기를 대본 수준으로 정리한다. 점수·플래그 판정 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)를 따르고, 실제 제작 단위 분할은 [D-Day 스크립트 분할](./13_D-Day_스"}, {"path": "스토리/11_진엔딩_크레딧_콘티_초안.md", "category": "스토리", "title": "진엔딩 크레딧 콘티 초안", "id": "스토리-11진엔딩크레딧콘티초안-md", "html": "<h2 id=\"스토리-11진엔딩크레딧콘티초안-md-진엔딩-크레딧-콘티-초안\">진엔딩 크레딧 콘티 초안<\/h2>\n<p>이 문서는 진엔딩 이후 들어갈 엔딩 크레딧의 방향을 잡기 위한 초안이다. 확정 콘티가 아니라, 이후 음악 러닝타임·원화·애니메이션 리소스·크레딧 레이아웃을 정할 때 기준으로 삼는 러프 설계 문서다.<\/p>\n<p>크레딧은 본편의 감정 결말을 다시 설명하는 장면이 아니라, 진엔딩을 통과한 플레이어에게 <code>방학이 실제로 시작되었다<\/code>는 감각을 주는 짧은 보상 연출이다.<\/p>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-1-크레딧-목표\">1. 크레딧 목표<\/h3>\n<ul>\n<li>진엔딩 전용 보상으로 사용한다.<\/li>\n<li>방학식 직후에도 하연과 재윤이 서로 계속 만날 수 있음을 암시한다.<\/li>\n<li>두 사람이 갑자기 완전히 행복해졌다는 결론이 아니라, 현실의 시간 속에서 천천히 회복하고 있다는 인상을 준다.<\/li>\n<li>사고가 없던 일이 된 것처럼 보이지 않게 한다.<\/li>\n<li>소무대 사고를 낭만화하지 않고, 그 장소를 지나 다음 길로 향하는 감각을 준다.<\/li>\n<li>대사는 최소화하고, 컷·음악·짧은 문장으로 여운을 만든다.<\/li>\n<\/ul>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-2-음악-방향-초안\">2. 음악 방향 초안<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>구간<\/th><th>음악<\/th><th>감정<\/th><\/tr><\/thead><tbody><tr><td>시작<\/td><td>느린 피아노 단독<\/td><td>병실과 방학식의 여운, 조심스러운 회복<\/td><\/tr><tr><td>중반<\/td><td>얇은 어쿠스틱 기타 또는 스트링 패드 추가<\/td><td>여름의 온기, 앞으로 흐르는 시간<\/td><\/tr><tr><td>후반<\/td><td>피아노 선율을 유지하되 리듬을 조금 더 안정적으로 정리<\/td><td>불안의 소멸이 아니라, 불안과 함께 걸어가는 감각<\/td><\/tr><tr><td>종료<\/td><td>생활음만 잠깐 남긴 뒤 페이드아웃<\/td><td>크레딧 이후에도 일상이 계속된다는 암시<\/td><\/tr><\/tbody><\/table><\/div>\n<p>배경 질감 후보:<\/p>\n<ul>\n<li>매미 소리<\/li>\n<li>멀리서 들리는 학교 방송<\/li>\n<li>종이 넘기는 소리<\/li>\n<li>버스 정류장 안내음<\/li>\n<li>카페 컵이 테이블에 닿는 작은 소리<\/li>\n<li>여름 바람에 커튼이나 나뭇잎이 움직이는 소리<\/li>\n<\/ul>\n<p>음악의 기본 감정은 슬픈 이별곡이 아니다. 상처가 남아 있지만, 그 상처를 없애지 않은 채 다시 일상을 시작하는 따뜻한 후일담이어야 한다.<\/p>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-3-컷-초안\">3. 컷 초안<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>순서<\/th><th>장소<\/th><th>화면<\/th><th>핵심 감정<\/th><th>비고<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>병원 대기실<\/td><td>재윤의 손목 밴드와 물병. 하연이 말없이 물병을 건넨다.<\/td><td>사고 이후의 현실이 남아 있음<\/td><td>재윤의 회복 흔적을 지우지 않는다.<\/td><\/tr><tr><td>2<\/td><td>재검사 후 병원 복도/출구<\/td><td>하연이 앞서가지 않고, 재윤의 느린 걸음에 맞춰 걷는다.<\/td><td>무리하지 않는 속도<\/td><td>손을 잡을지 여부는 이후 연출 단계에서 결정한다.<\/td><\/tr><tr><td>3<\/td><td>학교 도서관 입구<\/td><td>방학 중 운영 시간 안내문. 하연이 먼저 와서 기다린다.<\/td><td>방학이 실제로 시작됨<\/td><td>기다림은 부담이 아니라 배려로 보인다.<\/td><\/tr><tr><td>4<\/td><td>버스 정류장<\/td><td>버스가 도착하지만 하연이 먼저 타지 않고 재윤을 돌아본다.<\/td><td>함께 시간을 맞춤<\/td><td>과한 로맨틱 연출보다 생활감 우선.<\/td><\/tr><tr><td>5<\/td><td>작은 카페 창가<\/td><td>같은 책이나 병원 안내문, 종이컵 두 개가 테이블에 놓여 있다.<\/td><td>다음 약속이 자연스럽게 이어짐<\/td><td>대화 내용은 들리지 않게 처리 가능.<\/td><\/tr><tr><td>6<\/td><td>밝은 산책길<\/td><td>학교 뒤편 방향을 지나치되, 소무대 쪽이 아니라 밝은 길로 걷는다.<\/td><td>사고 장소에 머물지 않음<\/td><td>소무대 자체를 낭만 컷으로 쓰지 않는다.<\/td><\/tr><tr><td>7<\/td><td>휴대폰 캘린더<\/td><td><code>병원<\/code>, <code>도서관<\/code>, <code>카페<\/code>, <code>천천히 걷기<\/code> 같은 일정이 작게 보인다.<\/td><td>방학 동안 계속 만남<\/td><td>하연 또는 재윤의 휴대폰 중 어느 쪽인지는 추후 결정.<\/td><\/tr><tr><td>8<\/td><td>여름 하늘<\/td><td>밝은 하늘과 흔들리는 나뭇잎. 음악이 생활음으로 옅어진다.<\/td><td>여름은 아직 남아 있음<\/td><td>최종 타이틀 또는 마지막 문장 후보와 연결.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-4-짧은-크레딧-문장-후보\">4. 짧은 크레딧 문장 후보<\/h3>\n<p>크레딧 중간 또는 마지막에 들어갈 수 있는 짧은 문장 후보.<\/p>\n<pre><code>축제는 끝났다.<\/code><\/pre>\n<pre><code>방학식도 끝났다.<\/code><\/pre>\n<pre><code>그래도 월요일은 사라지지 않았다.<\/code><\/pre>\n<pre><code>그리고 여름은, 아직 남아 있었다.<\/code><\/pre>\n<p>문장은 모두 사용할 필요가 없다. 최종 연출 단계에서는 음악 길이와 컷 수에 맞춰 1~4개만 선택한다.<\/p>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-5-금지-주의-사항\">5. 금지/주의 사항<\/h3>\n<ul>\n<li>과하게 달콤한 데이트 몽타주로 만들지 않는다.<\/li>\n<li>사고가 완전히 해결되었거나 없던 일이 된 것처럼 보이게 하지 않는다.<\/li>\n<li>재윤이 갑자기 완치된 사람처럼 뛰거나 장난치는 컷은 넣지 않는다.<\/li>\n<li>하연이 재윤을 일방적으로 끌고 가는 구도로 만들지 않는다.<\/li>\n<li>소무대 사고 장소를 아름다운 추억 장소처럼 낭만화하지 않는다.<\/li>\n<li>비진엔딩 크레딧에는 이 콘티의 컷을 사용하지 않는다.<\/li>\n<li>새드엔딩의 가짜 크레딧과 진엔딩의 완성 크레딧은 음악, 색감, 컷의 시간감이 명확히 달라야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-6-나중-작업-todo\">6. 나중 작업 TODO<\/h3>\n<ul>\n<li>음악 러닝타임 확정<\/li>\n<li>컷별 실제 초 단위 타이밍 확정<\/li>\n<li>배경 원화 레퍼런스 정리<\/li>\n<li>캐릭터 원화/복장 레퍼런스 정리<\/li>\n<li>컷별 카메라 구도와 애니메이션 범위 확정<\/li>\n<li>크레딧 텍스트 레이아웃 확정<\/li>\n<li>엔딩곡 가사 사용 여부 결정<\/li>\n<li>비진엔딩 가짜 크레딧과의 색감/음악 차이 정리<\/li>\n<\/ul>\n<h3 id=\"스토리-11진엔딩크레딧콘티초안-md-7-현재-확정-기준\">7. 현재 확정 기준<\/h3>\n<p>현재 단계에서는 아래까지만 확정한다.<\/p>\n<ul>\n<li>진엔딩 크레딧은 <code>방학 동안 두 사람이 계속 만난다<\/code>는 암시를 담는다.<\/li>\n<li>크레딧은 완성된 연애 보상이 아니라, 현실로 돌아온 뒤에도 다음을 말할 수 있게 된 두 사람의 후일담이다.<\/li>\n<li>사고 흔적과 회복 속도는 남긴다.<\/li>\n<li>세부 콘티, 초 단위 타이밍, 원화 레퍼런스, 엔딩곡 구성은 다음 제작 단계에서 별도로 확정한다.<\/li>\n<\/ul>", "headings": [{"level": 1, "text": "진엔딩 크레딧 콘티 초안", "id": "스토리-11진엔딩크레딧콘티초안-md-진엔딩-크레딧-콘티-초안"}, {"level": 2, "text": "1. 크레딧 목표", "id": "스토리-11진엔딩크레딧콘티초안-md-1-크레딧-목표"}, {"level": 2, "text": "2. 음악 방향 초안", "id": "스토리-11진엔딩크레딧콘티초안-md-2-음악-방향-초안"}, {"level": 2, "text": "3. 컷 초안", "id": "스토리-11진엔딩크레딧콘티초안-md-3-컷-초안"}, {"level": 2, "text": "4. 짧은 크레딧 문장 후보", "id": "스토리-11진엔딩크레딧콘티초안-md-4-짧은-크레딧-문장-후보"}, {"level": 2, "text": "5. 금지/주의 사항", "id": "스토리-11진엔딩크레딧콘티초안-md-5-금지-주의-사항"}, {"level": 2, "text": "6. 나중 작업 TODO", "id": "스토리-11진엔딩크레딧콘티초안-md-6-나중-작업-todo"}, {"level": 2, "text": "7. 현재 확정 기준", "id": "스토리-11진엔딩크레딧콘티초안-md-7-현재-확정-기준"}], "plain": "# 진엔딩 크레딧 콘티 초안 이 문서는 진엔딩 이후 들어갈 엔딩 크레딧의 방향을 잡기 위한 초안이다. 확정 콘티가 아니라, 이후 음악 러닝타임·원화·애니메이션 리소스·크레딧 레이아웃을 정할 때 기준으로 삼는 러프 설계 문서다. 크레딧은 본편의 감정 결말을 다시 설명하는 장면이 아니라, 진엔딩을 통과한 플레이어에게 `방학이 실제로 시작되었다`는 감각을 주는 짧은 보상 연출이다. ## 1. 크레딧 목표 - 진엔딩 전용 보상으로 사용한다. - 방학식 직후에도 하연과 재윤이 서로 계속 만날 수 있음을 암시한다. - 두 사람이 갑자기 완전히 행복해졌다는 결론이 아니라, 현실의 시간 속에서 천천히 회복하고 있다는 인상을 준다. - 사고가 없던 일이 된 것처럼 보이지 않게 한다. - 소무대 사고를 낭만화하지 않고, 그 장소를 지나 다음 길로 향하는 감각을 준다. - 대사는 최소화하고, 컷·음악·짧은 문장으로 여운을 만든다. ## 2. 음악 방향 초안 | 구간 | 음악 | 감정 | | --- | --- | --- | | 시작 | 느린 피아노 단독 | 병실과 방학식의 여운, 조심스러운 회복 | | 중반 | 얇은 어쿠스틱 기타 또는 스트링 패드 추가 | 여름의 온기, 앞으로 흐르는 시간 | | 후반 | 피아노 선율을 유지하되 리듬을 조금 더 안정적으로 정리 | 불안의 소멸이 아니라, 불안과 함께 걸어가는 감각 | | 종료 | 생활음만 잠깐 남긴 뒤 페이드아웃 | 크레딧 이후에도 일상이 계속된다는 암시 | 배경 질감 후보: - 매미 소리 - 멀리서 들리는 학교 방송 - 종이 넘기는 소리 - 버스 정류장 안내음 - 카페 컵이 테이블에 닿는 작은 소리 - 여름 바람에 커튼이나 나뭇잎이 움직이는 소리 음악의 기본 감정은 슬픈 이별곡이 아니다. 상처가 남아 있지만, 그 상처를 없애지 않은 채 다시 일상을 시작하는 따뜻한 후일담이어야 한다. ## 3. 컷 초안 | 순서 | 장소 | 화면 | 핵심 감정 | 비고 | | --- | --- | --- | --- | --- | | 1 | 병원 대기실 | 재윤의 손목 밴드와 물병. 하연이 말없이 물병을 건넨다. | 사고 이후의 현실이 남아 있음 | 재윤의 회복 흔적을 지우지 않는다. | | 2 | 재검사 후 병원 복도/출구 | 하연이 앞서가지 않고, 재윤의 느린 걸음에 맞춰 걷는다. | 무리하지 않는 속도 | 손을 잡을지 여부는 이후 연출 단계에서 결정한다. | | 3 | 학교 도서관 입구 | 방학 중 운영 시간 안내문. 하연이 먼저 와서 기다린다. | 방학이 실제로 시작됨 | 기다림은 부담이 아니라 배려로 보인다. | | 4 | 버스 정류장 | 버스가 도착하지만 하연이 먼저 타지 않고 재윤을 돌아본다. | 함께 시간을 맞춤 | 과한 로맨틱 연출보다 생활감 우선. | | 5 | 작은 카페 창가 | 같은 책이나 병원 안내문, 종이컵 두 개가 테이블에 놓여 있다. | 다음 약속이 자연스럽게 이어짐 | 대화 내용은 들리지 않게 처리 가능. | | 6 | 밝은 산책길 | 학교 뒤편 방향을 지나치되, 소무대 쪽이 아니라 밝은 길로 걷는다. | 사고 장소에 머물지 않음 | 소무대 자체를 낭만 컷으로 쓰지 않는다. | | 7 | 휴대폰 캘린더 | `병원`, `도서관`, `카페`, `천천히 걷기` 같은 일정이 작게 보인다. | 방학 동안 계속 만남 | 하연 또는 재윤의 휴대폰 중 어느 쪽인지는 추후 결정. | | 8 | 여름 하늘 | 밝은 하늘과 흔들리는 나뭇잎. 음악이 생활음으로 옅어진다. | 여름은 아직 남아 있음 | 최종 타이틀 또는 마지막 문장 후보와 연결. | ## 4. 짧은 크레딧 문장 후보 크레딧 중간 또는 마지막에 들어갈 수 있는 짧은 문장 후보. ```text 축제는 끝났다. ``` ```text 방학식도 끝났다. ``` ```text 그래도 월요일은 사라지지 않았다. ``` ```text 그리고 여름은, 아직 남아 있었다. ``` 문장은 모두 사용할 필요가 없다. 최종 연출 단계에서는 음악 길이와 컷 수에 맞춰 1~4개만 선택한다. ## 5. 금지/주의 사항 - 과하게 달콤한 데이트 몽타주로 만들지 않는다. - 사고가 완전히 해결되었거나 없던 일이 된 것처럼 보이게 하지 않는다. - 재윤이 갑자기 완치된 사람처럼 뛰거나 장난치는 컷은 넣지 않는다. - 하연이 재윤을 일방적으로 끌고 가는 구도로 만들지 않는다. - 소무대 사고 장소를 아름다운 추억 장소처럼 낭만화하지 않는다. - 비진엔딩 크레딧에는 이 콘티의 컷을 사용하지 않는다. - 새드엔딩의 가짜 크레딧과 진엔딩의 완성 크레딧은 음악, 색감, 컷의 시간감이 명확히 달라야 한다. ## 6. 나중 작업 TODO - 음악 러닝타임 확정 - 컷별 실제 초 단위 타이밍 확정 - 배경 원화 레퍼런스 정리 - 캐릭터 원화/복장 레퍼런스 정리 - 컷별 카메라 구도와 애니메이션 범위 확정 - 크레딧 텍스트 레이아웃 확정 - 엔딩곡 가사 사용 여부 결정 - 비진엔딩 가짜 크레딧과의 색감/음악 차이 정리 ## 7. 현재 확정 기준 현재 단계에서는 아래까지만 확정한다. - 진엔딩 크레딧은 `방학 동안 두 사람이 계속 만난다`는 암시를 담는다. - 크레딧은 완성된 연애 보상이 아니라, 현실로 돌아온 뒤에도 다음을 말할 수 있게 된 두 사람의 후일담이다. - 사고 흔적과 회복 속도는 남긴다. - 세부 콘티, 초 단위 타이밍, 원화 레퍼런스, 엔딩곡 구성은 다음 제작 단계에서 별도로 확정한다.", "excerpt": "# 진엔딩 크레딧 콘티 초안 이 문서는 진엔딩 이후 들어갈 엔딩 크레딧의 방향을 잡기 위한 초안이다. 확정 콘티가 아니라, 이후 음악 러닝타임·원화·애니메이션 리소스·크레딧 레이아웃을 정할 때 기준으로 삼는 러프 설계 문서다. 크레딧은 본편의 감정 결말을 다시 설명하는 장면이 아니라, 진엔딩을 통과한 플레이어에게 `방학이 실제로 시작되었다`는 감각을 주는 짧은 보상 연출이다. ## 1. 크레"}, {"path": "스토리/12_D-1_D-Day_조건_수치화.md", "category": "스토리", "title": "D-1/D-Day 조건 수치화", "id": "스토리-12d-1d-day조건수치화-md", "html": "<h2 id=\"스토리-12d-1d-day조건수치화-md-d-1-d-day-조건-수치화\">D-1/D-Day 조건 수치화<\/h2>\n<p>이 문서는 D-1 밤 정산과 D-Day 낮 보정, 폐장 후 최종 분기를 실제 게임 시스템으로 옮기기 위한 조건 기준 v0.1이다.<\/p>\n<p>목표는 <code>충분하다<\/code>, <code>부족하다<\/code>로 적혀 있던 감정 조건을 구현 가능한 점수·불리언·우선순위로 정리하는 것이다. 수치는 최종 밸런스가 아니라 스토리 구조를 흔들지 않기 위한 1차 기준이다.<\/p>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-1-기본-원칙\">1. 기본 원칙<\/h3>\n<ul>\n<li>수치는 플레이어에게 직접 노출하지 않는다.<\/li>\n<li>게임 내에서는 재윤의 독백, 하연의 반응, 기존 인물의 대사, 선택지 잠김/변형으로만 상태를 보여준다.<\/li>\n<li>D-1 밤은 <code>현재 상태 진단<\/code>이다.<\/li>\n<li>D-Day 낮은 <code>마지막 보정<\/code>이다.<\/li>\n<li>D-Day 폐장 후에는 더 이상 보정하지 않고 분기만 판정한다.<\/li>\n<li>진엔딩은 하연 점수만 높다고 열리지 않는다. 하연 신뢰, 하연 동선 이해, 기존 관계 정리, 사고 단서, 회피 누적이 모두 기준을 통과해야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-2-상태-변수-기준\">2. 상태 변수 기준<\/h3>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-2-1-하연-축\">2.1 하연 축<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>변수<\/th><th>범위<\/th><th>의미<\/th><th>주요 상승 시점<\/th><\/tr><\/thead><tbody><tr><td><code>HaYeonTrust<\/code><\/td><td>0~8<\/td><td>하연이 재윤에게 자기 침묵과 속도를 맡길 수 있는 신뢰<\/td><td>D-25, D-24, D-18~D-16, D-13, D-7, D-2, D-1, D-Day 낮 하연 선택<\/td><\/tr><tr><td><code>HaYeonPaceRead<\/code><\/td><td>0~4<\/td><td>재윤이 하연의 조용한 자리 선호와 동선을 읽는 정도<\/td><td>D-17, D-16, D-2, D-1, D-Day 낮 하연 선택<\/td><\/tr><tr><td><code>D2PremonitionPassed<\/code><\/td><td>true/false<\/td><td>D-2 말하지 못한 예감에서 하연을 성급히 몰아붙이지 않고 이해했는지<\/td><td>D-2<\/td><\/tr><tr><td><code>AccidentClueHaYeon<\/code><\/td><td>true/false<\/td><td>사고 기억이 <code>하연에게 가려던 선택<\/code>과 연결되는 핵심 조각<\/td><td>D-2, D-1, D-Day 낮 하연 선택<\/td><\/tr><\/tbody><\/table><\/div>\n<p>하연 축 판정:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>조건<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>안정<\/td><td><code>HaYeonTrust &gt;= 6<\/code> 그리고 <code>HaYeonPaceRead &gt;= 3<\/code><\/td><td>폐장 후 하연이 있을 곳을 알아차릴 수 있음<\/td><\/tr><tr><td>보정 가능<\/td><td><code>HaYeonTrust == 5<\/code> 또는 <code>HaYeonPaceRead == 2<\/code><\/td><td>D-Day 낮 하연 선택으로 보정 가능<\/td><\/tr><tr><td>위험<\/td><td><code>HaYeonTrust &lt;= 4<\/code> 또는 <code>HaYeonPaceRead &lt;= 1<\/code><\/td><td>D-Day 낮 한 번으로는 회복이 어려움<\/td><\/tr><tr><td>실패 확정<\/td><td><code>D2PremonitionPassed == false<\/code><\/td><td>하연의 침묵과 동선을 읽지 못해 폐장 후 실패 쪽으로 기움<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-3-기존-관계-축\">3. 기존 관계 축<\/h3>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-3-1-관계-정리-변수\">3.1 관계 정리 변수<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>변수<\/th><th>범위<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>SoHaResolved<\/code><\/td><td>true/false<\/td><td>과거로 돌아가 숨는 길을 정리했는지<\/td><\/tr><tr><td><code>SeoRinResolved<\/code><\/td><td>true/false<\/td><td>정답과 순서 뒤에 숨는 길을 정리했는지<\/td><\/tr><tr><td><code>MiRuResolved<\/code><\/td><td>true/false<\/td><td>필요한 사람 역할 뒤에 숨는 길을 정리했는지<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-3-2-압박-변수\">3.2 압박 변수<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>변수<\/th><th>범위<\/th><th>의미<\/th><th>높을 때<\/th><\/tr><\/thead><tbody><tr><td><code>SoHaPressure<\/code><\/td><td>0~3<\/td><td>소하와의 과거 미련 압박<\/td><td>예전처럼 돌아가는 선택지가 강해짐<\/td><\/tr><tr><td><code>SeoRinControl<\/code><\/td><td>0~3<\/td><td>서린에게 선택권을 맡기는 정도<\/td><td>안전한 정답 뒤에 숨는 선택지가 강해짐<\/td><\/tr><tr><td><code>MiRuDependence<\/code><\/td><td>0~3<\/td><td>미루에게 필요한 사람으로 남으려는 정도<\/td><td>누군가를 두고 가는 죄책감이 강해짐<\/td><\/tr><\/tbody><\/table><\/div>\n<p>기존 관계 판정:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>조건<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>정리 완료<\/td><td>세 <code>Resolved<\/code> 모두 true<\/td><td>진엔딩 조건 B 충족<\/td><\/tr><tr><td>1축 보정 가능<\/td><td>미해결 1개 + 해당 압박값 <code>&lt;= 2<\/code><\/td><td>D-Day 낮 해당 인물 선택으로 마지막 보정 가능<\/td><\/tr><tr><td>위험<\/td><td>미해결 1개 + 해당 압박값 <code>3<\/code><\/td><td>D-Day 낮 실패 시 해당 새드엔딩 우선<\/td><\/tr><tr><td>실패 위험 큼<\/td><td>미해결 2개 이상<\/td><td>D-Day 낮 한 번으로 모두 보정 불가. 진엔딩 선택지 잠김<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-4-사고-단서-축\">4. 사고 단서 축<\/h3>\n<p>사고 단서는 단순 정보가 아니라 <code>다친 기억까지 안고 현실로 돌아갈 수 있는 기억 조각<\/code>이다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>변수<\/th><th>범위<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>AccidentClueSoHa<\/code><\/td><td>true/false<\/td><td>재윤이 축제날 하연을 향했다는 감정 단서<\/td><\/tr><tr><td><code>AccidentClueSeoRin<\/code><\/td><td>true/false<\/td><td>소무대 임시 구조물/조명 프레임 위험 단서<\/td><\/tr><tr><td><code>AccidentClueMiRu<\/code><\/td><td>true/false<\/td><td>출입 제한 표지/고정끈/보고 대상 단서<\/td><\/tr><tr><td><code>AccidentClueHaYeon<\/code><\/td><td>true/false<\/td><td>서로 말하려던 장소와 끊긴 문장 단서<\/td><\/tr><tr><td><code>AccidentClueScore<\/code><\/td><td>0~4<\/td><td>위 네 단서의 true 개수<\/td><\/tr><\/tbody><\/table><\/div>\n<p>사고 단서 판정:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>조건<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>안정<\/td><td><code>AccidentClueScore &gt;= 3<\/code> 그리고 <code>AccidentClueHaYeon == true<\/code><\/td><td>사고를 하연에게 가려던 선택의 결과로 연결 가능<\/td><\/tr><tr><td>보정 가능<\/td><td><code>AccidentClueScore == 2<\/code> 그리고 <code>AccidentClueHaYeon == true<\/code><\/td><td>D-Day 낮 조사/인물 선택으로 1개 보강 가능<\/td><\/tr><tr><td>감정 연결 부족<\/td><td><code>AccidentClueScore &gt;= 3<\/code> 하지만 <code>AccidentClueHaYeon == false<\/code><\/td><td>장소와 물건은 알아도 하연에게 가려던 의미가 비어 있음<\/td><\/tr><tr><td>정보 부족<\/td><td><code>AccidentClueScore &lt;= 1<\/code><\/td><td>D-Day 낮 한 번으로는 사고 의미 연결이 어려움<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-5-회피-축\">5. 회피 축<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>변수<\/th><th>범위<\/th><th>의미<\/th><th>주요 상승<\/th><\/tr><\/thead><tbody><tr><td><code>Avoidance<\/code><\/td><td>0~5<\/td><td>중요한 선택과 대화를 미룬 누적치<\/td><td>답장 미루기, 혼자 확인하기, 애매한 대답, 하연/기존 관계 모두 회피<\/td><\/tr><\/tbody><\/table><\/div>\n<p>회피 판정:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>조건<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>안정<\/td><td><code>Avoidance &lt;= 2<\/code><\/td><td>폐장 후 자기 선택을 말할 수 있음<\/td><\/tr><tr><td>경고<\/td><td><code>Avoidance == 3<\/code><\/td><td>다른 조건이 충분하면 통과하지만 고백 전 흔들림 대사 추가<\/td><\/tr><tr><td>위험<\/td><td><code>Avoidance &gt;= 4<\/code><\/td><td>하연 조건이 충분해도 중요한 말을 미룰 위험. 실패/루프 쪽 선택지가 강해짐<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-12d-1d-day조건수치화-md-6-d-1-밤-정산\">6. D-1 밤 정산<\/h3>\n<p>D-1 밤은 축제 1일차 <code>쉬어가 카페<\/code> 운영이 끝난 뒤 실행한다.<\/p>\n<h4 id=\"스토리-12d-1d-day조건수치화-md-6-1-정산-항목\">6.1 정산 항목<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>정산 항목<\/th><th>안정 기준<\/th><th>D-Day 낮 보정 가능 기준<\/th><th>위험 기준<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰<\/td><td><code>HaYeonTrust &gt;= 6<\/code><\/td><td><code>HaYeonTrust == 5<\/code><\/td><td><code>HaYeonTrust &lt;= 4<\/code><\/td><\/tr><tr><td>하연 동선 이해<\/td><td><code>HaYeonPaceRead &gt;= 3<\/code><\/td><td><code>HaYeonPaceRead == 2<\/code><\/td><td><code>HaYeonPaceRead &lt;= 1<\/code><\/td><\/tr><tr><td>D-2 예감<\/td><td><code>D2PremonitionPassed == true<\/code><\/td><td>없음<\/td><td>false면 실패 위험 큼<\/td><\/tr><tr><td>기존 관계 정리<\/td><td>세 <code>Resolved<\/code> true<\/td><td>미해결 1개 + 압박 <code>&lt;= 2<\/code><\/td><td>미해결 2개 이상 또는 압박 3<\/td><\/tr><tr><td>사고 단서<\/td><td><code>AccidentClueScore &gt;= 3<\/code> + <code>AccidentClueHaYeon<\/code><\/td><td><code>Score == 2<\/code> + <code>AccidentClueHaYeon<\/code><\/td><td><code>Score &lt;= 1<\/code> 또는 하연 단서 없음<\/td><\/tr><tr><td>회피<\/td><td><code>Avoidance &lt;= 2<\/code><\/td><td><code>Avoidance == 3<\/code><\/td><td><code>Avoidance &gt;= 4<\/cod
