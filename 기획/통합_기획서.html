l_creak ``` 배경 지시: - `14`의 `D-Day 폐장 후 소무대` 실패 구도. - 진엔딩과 같은 장소지만 하연이 없다. - 전선, 단차, 표지, 조명 프레임만 선명하고, 재윤이 왜 왔는지 설명하는 감정 단서는 비어 있어야 한다. 스크립트: ```text 축제 마지막 안내 방송이 끝났다. 운동장 쪽 불빛이 하나씩 꺼졌다. 재윤은 학교 뒤편 야외 소무대 앞에 서 있었다. 왜 여기까지 왔는지, 기억나지 않았다. 누가 불렀는지도, 누구에게 가려 했는지도, 떠오르지 않았다. ``` 반복: ```text 표지는 제대로 붙어 있었다. 끈은 묶여 있었다. 프레임은 제자리에 있었다. 그러니까 이상했다. 전부 제자리에 있는데, 재윤만 왜 여기 서 있는지 알 수 없었다. 폐장 안내 방송의 끝부분이 멀리서 다시 울리는 것 같았다. 발밑이 비었다. ``` 상태 처리: ```text @flag HayeonMissingFromAccidentMemory = true @flag DDayTrueEndingReached = false @flag LoopCount += 1 @flag ReturnDate = D25 @end LoopToD25 ``` ## 15. 소하 새드엔딩 진입 스크립트 ### DDAY_07_SAD_SOHA_ENTRY ```text # DDAY_07_SAD_SOHA_ENTRY @enter DDayFinalBranch == SoHaSad || SoHaPressure == 3 @bg 오래된 등굣길처럼 보이는 축제장 가장자리 @music sad_soha_warm_loop ``` 배경 지시: - `14`의 `소하의 오래된 길`을 축제장 가장자리와 겹쳐 보이게 한다. - 따뜻한 색감은 유지하되, 같은 길을 반복하는 정체감이 있어야 한다. 스크립트: ```text 소하: 그냥 가자. 재윤: 어디로? 소하: 늘 가던 데. 소하: 축제 같은 거 끝나도, 우린 별로 달라질 거 없잖아. 재윤은 대답하지 못했다. 운동장의 불빛은 아직 밝았지만, 길 끝은 이상하게 월요일 아침처럼 환했다. ``` 상태 처리: ```text @flag EndingSoHaSadSeen = true @flag SoHaSadCount += 1 @flag LoopCount += 1 @end SadEndingSoHaOrLoop ``` ## 16. 서린 새드엔딩 진입 스크립트 ### DDAY_08_SAD_SEORIN_ENTRY ```text # DDAY_08_SAD_SEORIN_ENTRY @enter DDayFinalBranch == SeoRinSad || SeoRinControl == 3 @bg 방송실 / 폐장 직전 @music sad_seorin_ordered ``` 배경 지시: - `14`의 `방송실`을 폐장 직전 버전으로 사용한다. - 큐시트와 장비는 정돈되어 있지만, 창밖 축제 소리가 멀어지고 선택지가 닫히는 느낌을 준다. 스크립트: ```text 서린: 이 순서면 안전해. 재윤: 안전한 쪽이요? 서린: 네. 틀리지 않는 쪽. 모니터에는 폐장 안내 문구가 떠 있었다. 그러나 문장 아래의 선택지는 하나뿐이었다. [정해진 순서를 따른다] ``` 상태 처리: ```text @flag EndingSeoRinSadSeen = true @flag SeoRinSadCount += 1 @flag LoopCount += 1 @end SadEndingSeoRinOrLoop ``` ## 17. 미루 새드엔딩 진입 스크립트 ### DDAY_09_SAD_MIRU_ENTRY ```text # DDAY_09_SAD_MIRU_ENTRY @enter DDayFinalBranch == MiRuSad || MiRuDependence == 3 @bg 축제 도움 인원 대기실 / 문이 닫힌 복도 @music sad_miru_musicbox ``` 배경 지시: - `14`의 `미루의 축제 도움 인원 대기 장소` 실패 변형. - 평소에는 열려 있던 복도 동선이 문과 그림자 때문에 좁아 보인다. - 그래도 공포 공간이 아니라, 도움을 기다리며 멈춘 공간으로 보여야 한다. 스크립트: ```text 미루: 선배, 마지막으로 한 번만 더 봐주시면 안 돼요? 재윤: 마지막? 미루: 네. 방학식 지나면 끝나잖아요. 미루: 그러니까 오늘만요. 문밖에는 여름빛이 있었다. 그러나 재윤은 문손잡이를 잡지 못했다. ``` 상태 처리: ```text @flag EndingMiRuSadSeen = true @flag MiRuSadCount += 1 @flag LoopCount += 1 @end SadEndingMiRuOrLoop ``` ## 18. 사고 의미 미연결 루프 ### DDAY_10_FAIL_ACCIDENT_UNLINKED ```text # DDAY_10_FAIL_ACCIDENT_UNLINKED @enter DDayFinalBranch == AccidentUnlinkedLoop @bg 야외 소무대 / 폐장 후 @music loop_accident_unlinked ``` 배경 지시: - `14`의 실패 소무대 구도. - 장소와 사고 단서는 충분히 보이지만, 하연에게 가려던 의미만 빠진 상태다. 목적: - 장소와 단서는 충분히 보이지만 `누구에게 가려 했는지`가 비어 있는 실패다. - 하연 조건이 완전히 부족한 실패와 달리, 물리 단서가 오히려 빈자리를 강조한다. 스크립트: ```text 조명 프레임. 출입 제한 표지. 묶여 있는 고정끈. 폐장 안내 방송의 끝부분. 재윤은 그것들을 모두 보았다. 전부 여기 있었다. 전부 맞았다. 그런데 왜 여기 왔는지만, 끝내 떠오르지 않았다. ``` 상태 처리: ```text @flag AccidentMeaningUnlinked = true @flag LoopCount += 1 @flag ReturnDate = D25 @end LoopToD25 ``` ## 19. 회피 루프 ### DDAY_11_FAIL_AVOIDANCE_LOOP ```text # DDAY_11_FAIL_AVOIDANCE_LOOP @enter DDayFinalBranch == AvoidanceLoop @bg 축제 폐장 후 복도 @music loop_avoidance_quiet ``` 배경 지시: - `14`의 `루프/실패 복도` 기준. - 평범한 학교 복도지만 사람이 빠져 있고, 형광등과 발소리가 과하게 또렷하다. - 공포물처럼 만들지 말고 의미가 빠진 현실처럼 보이게 한다. 목적: - 조건은 거의 맞지만 재윤이 마지막 말을 또 미루는 실패다. - 하연에게 갈 수 있는 길을 알지만, 직접 말하지 못한다. 스크립트: ```text 재윤은 하연이 어디 있을지 알 것 같았다. 조용한 곳. 사람들이 다 빠져나간 뒤에도, 잠깐 숨을 고를 수 있는 자리. 알고 있었다. 그런데 발이 움직이지 않았다. 내일 말해도 되지 않을까. 그런 생각이 든 순간, 복도의 불이 하나씩 꺼졌다. ``` 상태 처리: ```text @flag AvoidanceLoopSeen = true @flag LoopCount += 1 @flag ReturnDate = D25 @end LoopToD25 ``` ## 20. 평가 함수 초안 실제 구현 시 사용할 평가 함수 의사코드다. ```text function EvaluateDDayFinalBranch(): if HiddenCollapseCondition == true: return HiddenCollapse if D2PremonitionPassed == false: return HayeonMissingLoop if HaYeonTrust < 6 or HaYeonPaceRead < 3: return HayeonMissingLoop if SoHaResolved == false and SoHaPressure == 3: return SoHaSad if SeoRinResolved == false and SeoRinControl == 3: return SeoRinSad if MiRuResolved == false and MiRuDependence == 3: return MiRuSad if SoHaResolved == false or SeoRinResolved == false or MiRuResolved == false: return RelationshipUnresolvedLoop if AccidentClueScore < 3 or AccidentClueHaYeon == false: return AccidentUnlinkedLoop if Avoidance >= 4: return AvoidanceLoop return TrueEnding ``` ## 21. 실제 제작 시 분리 권장 에셋 | 에셋 후보 | 포함 Scene | | --- | --- | | `SF_DDay_Common` | `DDAY_00_ENTRY_CAFE`, `DDAY_01_DAY_CHOICE_HUB`, `DDAY_03_PRE_CLOSE_ASSESS`, `DDAY_04_ROUTE_GATE` | | `SF_DDay_DayChoice_Hayeon` | `DDAY_02A_HAYEON_DAY` | | `SF_DDay_DayChoice_Soha` | `DDAY_02B_SOHA_DAY`, `DDAY_02B_SOHA_RESOLVE` | | `SF_DDay_DayChoice_Seorin` | `DDAY_02C_SEORIN_DAY`, `DDAY_02C_SEORIN_RESOLVE` | | `SF_DDay_DayChoice_Miru` | `DDAY_02D_MIRU_DAY`, `DDAY_02D_MIRU_RESOLVE` | | `SF_DDay_DayChoice_Alone` | `DDAY_02E_ALONE_STAGE_CHECK` | | `SF_DDay_TrueEnding` | `DDAY_05_TRUE_APPROACH` | | `SF_DDay_FailLoops` | `DDAY_06_FAIL_HAYEON_MISSING`, `DDAY_10_FAIL_ACCIDENT_UNLINKED`, `DDAY_11_FAIL_AVOIDANCE_LOOP` | | `SF_DDay_SadEntries` | `DDAY_07_SAD_SOHA_ENTRY`, `DDAY_08_SAD_SEORIN_ENTRY`, `DDAY_09_SAD_MIRU_ENTRY` | ## 22. 다음 연결 이 문서 이후 우선 작업은 두 갈래다. 1. 진엔딩 이후 [엔딩과 루프](./05_엔딩과_루프.md)의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다. 2. 이 스크립트 분할을 시스템 문서의 StoryFlow Scene/Branch/Transition 설계와 맞춘다. 현재 기준에서는 D+2/D+3 컷신 분리가 더 먼저다. 그래야 `DDAY_05_TRUE_APPROACH` 이후의 연결이 완성된다.", "excerpt": "# D-Day 실제 게임 스크립트 분할 이 문서는 [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md)의 대본을 실제 게임 스크립트 제작 단위로 쪼갠 문서다. 점수·플래그 판정 기준은 [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md)를 따른다. ## 1. 문서 목적 - D-Day를 StoryFlow Scene 또는 VN 스크립트 단위로"}, {"path": "스토리/14_장소와_배경_묘사.md", "category": "스토리", "title": "장소와 배경 묘사", "id": "스토리-14장소와배경묘사-md", "html": "<h2 id=\"스토리-14장소와배경묘사-md-장소와-배경-묘사\">장소와 배경 묘사<\/h2>\n<p>이 문서는 주요 장소의 시각 기준, 분위기, 반복 소품, 시간대별 변화, AI 이미지 생성용 묘사 기준을 정리한다.<\/p>\n<p>스토리의 장소는 단순한 배경이 아니라 재윤의 감정 상태를 보여주는 장치다. 같은 장소도 루프 진행도, 관계 정리 여부, 시간대에 따라 다르게 보인다.<\/p>\n<h3 id=\"스토리-14장소와배경묘사-md-1-전체-배경-원칙\">1. 전체 배경 원칙<\/h3>\n<h4 id=\"스토리-14장소와배경묘사-md-기본-톤\">기본 톤<\/h4>\n<ul>\n<li>배경은 현실적인 한국 고등학교와 소도시 생활권을 기준으로 한다.<\/li>\n<li>과장된 판타지 학교, 초호화 사립학교, 비현실적인 유럽풍 캠퍼스는 피한다.<\/li>\n<li>계절은 1학기 말, 여름방학 직전이다.<\/li>\n<li>공기는 약간 덥고 습하지만, 진엔딩 후에는 같은 여름빛이 더 가볍고 밝게 보인다.<\/li>\n<li>색감은 평상시에는 자연광과 형광등 중심, 루프/실패 구간에서는 같은 색이 조금 탁하고 낮게 가라앉는다.<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-장소-감정-규칙\">장소 감정 규칙<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>상태<\/th><th>장소가 주는 느낌<\/th><\/tr><\/thead><tbody><tr><td>평상시<\/td><td>현실적이고 익숙한 학교. 학생 소음, 생활감, 수행평가와 축제 준비의 어수선함<\/td><\/tr><tr><td>하연 접근<\/td><td>시끄러운 중심보다 가장자리, 창가, 조용한 복도, 숨을 고를 수 있는 자리<\/td><\/tr><tr><td>기존 관계 미정리<\/td><td>익숙한 길, 반복되는 자리, 오래된 물건이 많아짐<\/td><\/tr><tr><td>사고 단서 접근<\/td><td>소무대, 전선, 조명 프레임, 출입 제한 표지처럼 물리적 위험이 선명해짐<\/td><\/tr><tr><td>실패 루프<\/td><td>장소는 맞지만 사람이 빠져 있음. 이유 없이 비어 있고 소리가 멀어짐<\/td><\/tr><tr><td>진엔딩<\/td><td>같은 장소를 지나가되, 머무르지 않고 다음 장소로 이동하는 느낌<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-14장소와배경묘사-md-ai-이미지-생성-공통-프롬프트-기준\">AI 이미지 생성 공통 프롬프트 기준<\/h4>\n<p>장소 이미지를 만들 때는 아래 요소를 조합한다.<\/p>\n<pre><code>realistic Korean high school, late June summer, visual novel background, soft natural light, lived-in classroom or school facility, subtle emotional atmosphere, detailed props, no fantasy architecture, no exaggerated luxury, cinematic but grounded<\/code><\/pre>\n<p>필요에 따라 추가한다.<\/p>\n<pre><code>slightly humid summer air, quiet after school mood, paper festival decorations, fluorescent lights, warm sunset through windows, distant schoolyard, empty corridor, soft shadows, understated romance mystery mood<\/code><\/pre>\n<p>피해야 할 요소:<\/p>\n<pre><code>fantasy castle school, overly futuristic building, cyberpunk neon, luxury academy, gothic cathedral interior, empty white void, horror blood, dramatic ruin, unrealistically huge classroom<\/code><\/pre>\n<h3 id=\"스토리-14장소와배경묘사-md-2-2학년-5반-교실\">2. 2학년 5반 교실<\/h3>\n<h4 id=\"스토리-14장소와배경묘사-md-기본-형태\">기본 형태<\/h4>\n<p>2학년 5반은 재윤과 하연이 처음 현실적인 접점을 쌓는 중심 장소다. 평범한 한국 고등학교 교실이며, 책상과 의자가 규칙적으로 놓여 있지만 완전히 정돈되어 있지는 않다. 창문은 운동장 쪽을 향하고, 창가 자리에서는 축제 준비가 진행되는 운동장과 멀리 학교 뒤편 소무대 방향이 희미하게 보인다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>연한 나무색 책상과 회색 금속 다리 의자<\/li>\n<li>칠판, 분필 가루, 지우개 자국<\/li>\n<li>교실 뒤 게시판의 수행평가 안내, 축제 일정표, 방학식 공지<\/li>\n<li>창가 커튼, 여름빛에 조금 바랜 천<\/li>\n<li>학생들이 붙인 포스트잇, 낙서, 임시 역할표<\/li>\n<li>책상 위 필통, 문제집, 빈 물병, 접힌 유인물<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-평상시-교실\">평상시 교실<\/h4>\n<p>평상시 교실은 시끄럽고 산만하다. 누군가는 수행평가 이야기를 하고, 누군가는 축제 이야기를 한다. 하연이 전학 온 날에는 교실 자체는 평범하지만, 재윤에게는 창밖 빛과 교실 소음이 살짝 멀게 느껴진다.<\/p>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>ordinary Korean high school classroom, late June morning, rows of wooden desks, green chalkboard with faint chalk marks, festival and summer vacation notices on the back bulletin board, soft sunlight through cream curtains, slightly messy but lived-in, visual novel background<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-쉬어가-카페-준비-상태\"><code>쉬어가 카페<\/code> 준비 상태<\/h4>\n<p>D-18 이후 교실은 반행사 준비 공간으로 바뀐다. 완성된 카페라기보다 학생들이 만든 임시 부스다. 손맛과 어설픔이 있어야 한다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>칠판 한쪽의 <code>쉬어가 카페<\/code> 문구<\/li>\n<li>손글씨 메뉴판<\/li>\n<li>색종이와 종이 꽃 장식<\/li>\n<li>책상을 붙여 만든 임시 카운터<\/li>\n<li>종이컵, 컵받침, 투명 테이프, 가위, 매직<\/li>\n<li>아직 정리되지 않은 박스와 음료 재료<\/li>\n<li>창문 쪽에 기대어 둔 여분 의자<\/li>\n<\/ul>\n<p>분위기:<\/p>\n<ul>\n<li>밝지만 완성된 상업 카페가 아니라 학생 축제 특유의 어설픈 따뜻함<\/li>\n<li>하연에게는 “시끄러운 학교 안에서 잠깐 숨을 고르는 자리”<\/li>\n<li>재윤에게는 “도망치는 곳이 아니라 다시 걸어가기 전 쉬는 곳”<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>Korean high school classroom transformed into a handmade festival cafe booth, hand-written menu board, paper flower decorations, desks pushed together as a counter, paper cups and tape on desks, warm late afternoon sunlight, modest student-made atmosphere, not a real commercial cafe<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-폐장-후-교실\">폐장 후 교실<\/h4>\n<p>D-Day 폐장 후의 2학년 5반은 카페가 끝난 뒤의 공간이다. 낮의 밝음이 빠져나가고, 남은 물건들이 하루가 끝났음을 보여준다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>지우다 만 메뉴판<\/li>\n<li>한쪽에 쌓인 의자<\/li>\n<li>쓰레기봉투 옆 종이컵<\/li>\n<li>떨어진 종이 장식<\/li>\n<li>칠판 한쪽에 아직 남은 <code>잠깐 쉬어가도 괜찮은 곳<\/code><\/li>\n<li>복도로 새는 희미한 형광등 빛<\/li>\n<\/ul>\n<p>연출 의미:<\/p>\n<ul>\n<li>하연이 먼저 약속을 잡지 않는 구조와 연결된다. 장소는 비어 있지만, 하연이 어떤 공간을 편하게 느끼는지 재윤이 읽을 수 있어야 한다.<\/li>\n<li>실패 루프에서는 이 교실이 단순히 닫힌 부스로 보이고, 진엔딩 흐름에서는 하연의 조용한 동선을 떠올리게 하는 단서가 된다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-3-복도와-계단\">3. 복도와 계단<\/h3>\n<p>복도는 재윤이 누구에게 향할지 결정하기 전 잠깐 멈추는 장소다. 선택의 중간 지점이며, 루프가 진행될수록 발소리와 방송 소리가 더 크게 느껴진다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-기본-복도\">기본 복도<\/h4>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>긴 직선 복도<\/li>\n<li>창문 아래 낮은 벽<\/li>\n<li>교실 번호판<\/li>\n<li>축제 홍보 포스터<\/li>\n<li>학생들이 지나가며 떨어뜨린 종이 장식<\/li>\n<li>바닥에 반사되는 형광등<\/li>\n<li>끝부분의 계단과 비상구 표시등<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>Korean high school corridor, long hallway with classroom doors, festival posters on walls, cream floor reflecting fluorescent lights, late afternoon summer light from windows, slightly messy paper decorations, quiet visual novel background<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-루프-실패-복도\">루프/실패 복도<\/h4>\n<p>실패 루프의 복도는 같은 구조지만 사람이 적고, 빛이 조금 낮다. 공포 배경처럼 과장하지 않고, “평범한데 비어 있어서 이상한” 느낌을 준다.<\/p>\n<p>차이:<\/p>\n<ul>\n<li>멀리서 들리던 학생 소리가 갑자기 줄어듦<\/li>\n<li>형광등 하나가 미세하게 깜빡임<\/li>\n<li>게시판 날짜가 이상하게 눈에 들어옴<\/li>\n<li>발소리가 실제보다 크게 울림<\/li>\n<li>창밖 운동장 소리가 물속처럼 멀게 들림<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-4-운동장과-축제-중심부\">4. 운동장과 축제 중심부<\/h3>\n<p>운동장은 축제의 가장 밝은 중심이다. 하지만 이 작품에서 재윤과 하연의 핵심 감정은 운동장 한가운데보다 가장자리에서 더 잘 드러난다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-축제-낮\">축제 낮<\/h4>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>반별 천막<\/li>\n<li>현수막, 풍선, 종이 장식<\/li>\n<li>임시 안내판<\/li>\n<li>학생들이 들고 다니는 음료와 간식<\/li>\n<li>운동장 가장자리의 그늘<\/li>\n<li>멀리 보이는 학교 뒤편 방향<\/li>\n<\/ul>\n<p>분위기:<\/p>\n<ul>\n<li>밝고 소란스럽다.<\/li>\n<li>소하는 중심부에서도 자연스럽게 움직인다.<\/li>\n<li>하연은 중심부에 오래 머물기보다 가장자리, 그늘, 조금 조용한 방향을 본다.<\/li>\n<li>재윤은 하연을 공략할수록 그 시선을 알아차린다.<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>Korean high school festival on the schoolyard, modest class tents, handmade banners, students walking with drinks, bright late June sunlight, lively but not crowded like a concert, visible quiet edge of the schoolyard in the distance<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-축제-폐장-직전\">축제 폐장 직전<\/h4>\n<p>낮의 활기는 남아 있지만 정리의 기운이 섞인다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>접히기 시작한 천막<\/li>\n<li>반쯤 내려간 현수막<\/li>\n<li>쓰레기봉투와 정리 박스<\/li>\n<li>멀리 꺼져가는 스피커<\/li>\n<li>방송으로 흘러나오는 폐장 안내<\/li>\n<li>운동장 중심은 아직 밝지만, 뒤편 소무대 쪽은 먼저 어두워짐<\/li>\n<\/ul>\n<p>연출 의미:<\/p>\n<ul>\n<li>재윤이 밝은 중심에 머무를지, 하연이 향했을 조용한 가장자리를 알아차릴지 갈리는 구간이다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-5-학교-뒤편-야외-소무대\">5. 학교 뒤편 야외 소무대<\/h3>\n<p>소무대는 가장 중요한 장소다. 이곳은 고백 장소이자 사고 장소이며, 실패 루프에서는 하연이 빠진 채 위험만 남는 장소다.<\/p>\n<p>중요 원칙:<\/p>\n<ul>\n<li>소무대를 낭만적인 데이트 명소처럼 꾸미지 않는다.<\/li>\n<li>낮에는 평범한 행사 시설, 폐장 후에는 조용하고 위험한 임시 구조물로 보인다.<\/li>\n<li>진엔딩에서도 이 장소에 머무는 것이 아니라, 이 장소에서 있었던 선택과 사고를 받아들인 뒤 현실로 돌아간다.<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-기본-구조\">기본 구조<\/h4>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>학교 뒤편의 낮은 임시 무대<\/li>\n<li>낮은 단차<\/li>\n<li>검은 고무 전선<\/li>\n<li>임시 조명 프레임<\/li>\n<li>금속 지지대<\/li>\n<li>출입 제한 표지<\/li>\n<li>철거 대기 중인 장비 박스<\/li>\n<li>운동장 중심부와는 떨어진 조용한 위치<\/li>\n<li>뒤쪽 나무나 담장, 어두운 그늘<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>small temporary outdoor stage behind a Korean high school, low platform, metal lighting frame, black cables on the ground, access restriction sign, equipment boxes, quiet edge of school festival area, realistic and slightly tense, not romanticized<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-낮의-소무대\">낮의 소무대<\/h4>\n<p>낮에는 위험이 완전히 드러나지 않는다. 학생들이 사진을 찍거나 잠깐 쉬어갈 수 있는 평범한 장소처럼 보인다. 다만 자세히 보면 전선과 임시 프레임이 신경 쓰인다.<\/p>\n<p>연출 요소:<\/p>\n<ul>\n<li>햇빛 아래에서는 단차가 잘 보이지 않음<\/li>\n<li>전선은 정리된 듯하지만 일부가 느슨함<\/li>\n<li>출입 제한 표지가 한쪽으로 밀려 있거나 기울어 있음<\/li>\n<li>멀리서 보면 평범하지만 가까이 보면 불안함<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-d-2-창밖으로-보이는-소무대\">D-2 창밖으로 보이는 소무대<\/h4>\n<p>D-2에는 소무대가 직접 목적지가 아니라 “하연이 조용한 곳을 바라보는 방향”으로 쓰인다.<\/p>\n<p>구도:<\/p>\n<ul>\n<li>2학년 5반 창문 안쪽에서 운동장 너머로 보이는 작은 프레임<\/li>\n<li>교실 안의 따뜻한 노을빛과 바깥의 차가운 그림자 대비<\/li>\n<li>하연의 시선이 창밖 가장자리로 향함<\/li>\n<li>재윤이 그 방향을 이해하는지 여부가 중요<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-d-day-폐장-후-소무대\">D-Day 폐장 후 소무대<\/h4>\n<p>폐장 후 소무대는 밝은 축제와 분리된 장소다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>운동장 쪽 불빛은 멀고, 소무대 주변은 부분적으로 어두움<\/li>\n<li>임시 조명 일부만 켜져 있거나 꺼지는 중<\/li>\n<li>철제 프레임 그림자가 바닥에 길게 생김<\/li>\n<li>전선과 단차가 더 선명하게 보임<\/li>\n<li>출입 제한 표지가 바람에 흔들림<\/li>\n<li>금속 지지대가 바람에 작게 울림<\/li>\n<\/ul>\n<p>진엔딩 구도:<\/p>\n<ul>\n<li>하연은 무대 가장자리 또는 무대 앞 낮은 단차 근처에 서 있다.<\/li>\n<li>하연은 재윤을 부른 것이 아니라, 조용한 곳에서 자기 말을 정리하고 있었다.<\/li>\n<li>재윤이 직접 찾아온다.<\/li>\n<li>두 사람 사이에는 무대 중심부보다 약간 옆으로 비켜선 공간이 좋다.<\/li>\n<li>고백은 화려한 조명 아래가 아니라, 축제가 끝난 뒤 남은 조용한 빛 아래에서 이루어진다.<\/li>\n<\/ul>\n<p>실패 루프 구도:<\/p>\n<ul>\n<li>하연이 없다.<\/li>\n<li>같은 장소지만 의미가 사라져 전선, 단차, 표지, 조명 프레임만 남는다.<\/li>\n<li>재윤은 자신이 왜 여기에 왔는지 모른다.<\/li>\n<li>배경은 무섭기보다 비어 있고 건조해야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-6-방송실과-학생회-업무-공간\">6. 방송실과 학생회 업무 공간<\/h3>\n<p>서린의 장소는 질서와 통제의 공간이다. 그러나 서린이 악역처럼 보이지 않도록, 차갑기만 한 공간이 아니라 실제로 누군가 정리하지 않으면 무너질 것 같은 업무의 흔적이 있어야 한다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-방송실\">방송실<\/h4>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>좁은 방송실<\/li>\n<li>믹서, 마이크, 헤드폰<\/li>\n<li>폐장 안내 큐시트<\/li>\n<li>학교 방송 시간표<\/li>\n<li>케이블과 라벨링 테이프<\/li>\n<li>벽의 흡음재 또는 오래된 게시물<\/li>\n<li>작은 창문 너머 보이는 운동장 일부<\/li>\n<li>서린이 정리한 체크리스트<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>small Korean high school broadcasting room, audio mixer, microphone, headphones, printed cue sheets, labeled cables, student council documents, fluorescent light, organized but cramped, realistic visual novel background<\/code><\/pre>\n<p>서린 상담 장면에서는 방송실이 정답을 알려주는 장소가 아니라, 재윤이 자기 선택의 이유를 확인하는 장소가 되어야 한다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-학생회-업무-공간\">학생회 업무 공간<\/h4>\n<p>방송실보다 조금 더 개방된 업무 공간이다. 책상 위에 축제 자료, 안전 안내문, 반별 일정표가 쌓여 있다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>파일철<\/li>\n<li>체크리스트<\/li>\n<li>축제 배치도<\/li>\n<li>무전기 또는 학생회 명찰<\/li>\n<li>테이프, 가위, 펜, 스탬프<\/li>\n<li>반납해야 할 장비 목록<\/li>\n<\/ul>\n<p>분위기:<\/p>\n<ul>\n<li>완벽히 깨끗한 사무실이 아니라, 학생들이 임시로 쓰는 공간<\/li>\n<li>서린의 정리 습관 덕분에 겨우 질서가 유지되는 느낌<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-7-소하의-오래된-길\">7. 소하의 오래된 길<\/h3>\n<p>소하와의 장소는 과거와 익숙함을 상징한다. 재윤이 편하게 숨을 수 있는 길이지만, 진엔딩에서는 그 길에 머무르지 않고 돌아서야 한다.<\/p>\n<p>주요 후보:<\/p>\n<ul>\n<li>학교 옆 오래된 골목<\/li>\n<li>등굣길의 낮은 담장<\/li>\n<li>오래된 문방구 앞<\/li>\n<li>동네 분식집 근처<\/li>\n<li>작은 놀이터<\/li>\n<li>햇빛에 색이 바랜 표지판<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>quiet old neighborhood street near a Korean high school, small stationery shop, faded signs, low walls, summer afternoon light, nostalgic but ordinary, familiar childhood route, visual novel background<\/code><\/pre>\n<p>분위기:<\/p>\n<ul>\n<li>소하는 이 길에서 자연스럽고 빠르게 걷는다.<\/li>\n<li>재윤은 편하지만 동시에 앞으로 나아가지 못하는 느낌을 받는다.<\/li>\n<li>색감은 따뜻하지만, 실패 루트에서는 같은 따뜻함이 정체된 느낌으로 바뀐다.<\/li>\n<\/ul>\n<p>금지:<\/p>\n<ul>\n<li>지나치게 낭만적인 데이트 거리로 만들지 않는다.<\/li>\n<li>소하를 방해자처럼 보이게 하지 않는다. 장소는 과거가 나쁜 것이 아니라, 거기에 숨는 것이 문제임을 보여줘야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-8-미루의-축제-도움-인원-대기-장소\">8. 미루의 축제 도움 인원 대기 장소<\/h3>\n<p>미루의 장소는 “혼자 해보려는 사람의 불안”을 보여준다. 너무 어둡거나 불쌍하게 만들지 말고, 해야 할 일이 많아 작은 실수가 커 보이는 공간으로 잡는다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>도움 인원 대기 책상<\/li>\n<li>체크리스트<\/li>\n<li>명찰<\/li>\n<li>여분 안내 표지<\/li>\n<li>끈, 테이프, 클립보드<\/li>\n<li>분실물 박스<\/li>\n<li>임시 보관용 의자<\/li>\n<li>학생들이 드나드는 문 옆 공간<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>temporary volunteer waiting area at a Korean school festival, folding table with checklists, name tags, tape, extra signs, clipboards, slightly cluttered but functional, young student helper atmosphere, soft daylight from corridor<\/code><\/pre>\n<p>분위기:<\/p>\n<ul>\n<li>미루는 물건을 품에 숨기기보다, 성장 흐름에서는 체크리스트를 밖으로 꺼내 들고 있다.<\/li>\n<li>실패 흐름에서는 같은 체크리스트가 의존과 불안의 상징이 된다.<\/li>\n<li>공간은 좁지만 막힌 방처럼 답답하게 만들지 않는다. 미루가 나갈 수 있는 문이 보여야 한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-9-병실과-병원-복도\">9. 병실과 병원 복도<\/h3>\n<p>진엔딩 후 D+2 일요일 병실은 현실로 돌아왔음을 처음 확인하는 장소다. 충격적인 중환자실보다, 큰 외상은 없지만 의식이 돌아오지 않았던 상태를 보여주는 조용한 병실이 적합하다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-병실\">병실<\/h4>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>흰 침대<\/li>\n<li>얇은 병원 커튼<\/li>\n<li>작은 심박 모니터 또는 기본 장비<\/li>\n<li>창문으로 들어오는 일요일 오후 햇빛<\/li>\n<li>침대 옆 의자<\/li>\n<li>물컵, 보호자용 담요, 접힌 가디건<\/li>\n<li>꽃다발보다는 실용적인 물건이 좋음<\/li>\n<\/ul>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>quiet Korean hospital room, Sunday afternoon sunlight through window, white bed, pale curtains, small medical monitor, chair beside the bed, water cup, folded cardigan, calm recovery mood, realistic visual novel background<\/code><\/pre>\n<p>분위기:<\/p>\n<ul>\n<li>극적인 죽음의 문턱보다, 긴 잠에서 막 깨어난 조심스러운 현실감<\/li>\n<li>하연이 밤새 버틴 흔적은 과장된 눈물보다 의자, 접힌 옷, 반쯤 식은 물 같은 소품으로 보여준다.<\/li>\n<li>진엔딩이므로 공포보다 회복의 시작이 중요하다.<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-병원-복도와-출구\">병원 복도와 출구<\/h4>\n<p>크레딧 컷에서 병원 복도는 “다시 걸어 나가는 곳”이다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>긴 복도<\/li>\n<li>안내 표지판<\/li>\n<li>자동문 너머 밝은 여름빛<\/li>\n<li>하연이 앞서가지 않고 재윤의 속도에 맞춰 걷는 구도<\/li>\n<li>병원 냄새와 현실감을 주는 차분한 색<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-10-방학식-후-학교와-방학-장소\">10. 방학식 후 학교와 방학 장소<\/h3>\n<p>진엔딩 후 장소는 사고 장소에 머무르지 않고, 방학 동안 계속 만날 미래를 암시해야 한다.<\/p>\n<h4 id=\"스토리-14장소와배경묘사-md-방학식-교실\">방학식 교실<\/h4>\n<p>방학식 교실은 축제가 끝난 뒤의 현실이다. 학생들은 들떠 있지만, 재윤은 오래 머물 수 없다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>방학식 안내문<\/li>\n<li>걷힌 축제 장식의 흔적<\/li>\n<li>책상 위 짐과 종이가방<\/li>\n<li>창문 밖 밝은 여름 하늘<\/li>\n<li>하연이 먼 자리에서 조용히 재윤을 확인하는 시선<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-학교-도서관\">학교 도서관<\/h4>\n<p>도서관은 방학 중에도 열리는 조용한 약속 장소다. 하연의 성격과 잘 맞는다.<\/p>\n<p>AI 이미지 묘사:<\/p>\n<pre><code>small Korean high school library during summer vacation, quiet shelves, reading desks, operation hours notice, warm daylight, two students implied but not centered, calm future promise mood<\/code><\/pre>\n<h4 id=\"스토리-14장소와배경묘사-md-작은-카페\">작은 카페<\/h4>\n<p>방학 중 카페는 <code>쉬어가 카페<\/code>와 대비되는 실제 외부 장소다. 상업적으로 화려한 카페보다 동네의 작은 창가 좌석이 좋다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>창가 두 자리<\/li>\n<li>물방울 맺힌 차가운 음료<\/li>\n<li>병원 안내문이나 책 한 권<\/li>\n<li>너무 꾸미지 않은 나무 테이블<\/li>\n<li>여름 오후의 밝은 거리<\/li>\n<\/ul>\n<h4 id=\"스토리-14장소와배경묘사-md-산책길\">산책길<\/h4>\n<p>산책길은 소무대를 낭만화하지 않고 지나가는 장소다.<\/p>\n<p>주요 시각 요소:<\/p>\n<ul>\n<li>학교 뒤편 방향을 멀리 지나치지만 소무대에 머물지 않음<\/li>\n<li>나무 그늘<\/li>\n<li>낮은 담장<\/li>\n<li>여름 하늘<\/li>\n<li>느린 걸음<\/li>\n<\/ul>\n<p>연출 원칙:<\/p>\n<ul>\n<li>손을 잡는지 여부보다, 서로의 속도를 맞추는 것이 중요하다.<\/li>\n<li>방학 동안 계속 만날 암시는 장소의 반복 예약으로 보여준다.<\/li>\n<\/ul>\n<h3 id=\"스토리-14장소와배경묘사-md-11-장소별-캐릭터-배치-기준\">11. 장소별 캐릭터 배치 기준<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>인물<\/th><th>잘 맞는 장소<\/th><th>어긋나는 장소 처리<\/th><\/tr><\/thead><tbody><tr><td>재윤<\/td><td>교실, 복도, 선택 직전의 중간 지점, 소무대 앞<\/td><td>익숙한 장소에 숨을수록 루프/회피 느낌이 강해짐<\/td><\/tr><tr><td>하연<\/td><td>창가, 교실 가장자리, 운동장 가장자리, 조용한 소무대 방향, 도서관<\/td><td>축제 중심부에 오래 세우면 피로감이 보여야 함<\/td><\/tr><tr><td>소하<\/td><td>등굣길, 오래된 골목, 운동장 중심, 익숙한 학교 동선<\/td><td>너무 어두운 장소보다 따뜻하지만 정체된 장소가 맞음<\/td><\/tr><tr><td>서린<\/td><td>방송실, 학생회 업무 공간, 안내판 앞<\/td><td>냉혹한 통제실처럼 만들지 말고 업무 흔적을 남김<\/td><\/tr><tr><td>미루<\/td><td>도움 인원 대기 장소, 복도 옆 임시 책상, 체크리스트가 있는 자리<\/td><td>갇힌 방보다 나갈 수 있는 문이 보이는 공간이 좋음<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-14장소와배경묘사-md-12-배경-이미지-제작-우선순위\">12. 배경 이미지 제작 우선순위<\/h3>\n<ol>\n<li>2학년 5반 평상시<\/li>\n<li>2학년 5반 <code>쉬어가 카페<\/code><\/li>\n<li>2학년 5반 폐장 후<\/li>\n<li>학교 복도/계단<\/li>\n<li>축제 운동장 낮<\/li>\n<li>축제 폐장 직전 운동장<\/li>\n<li>학교 뒤편 야외 소무대 낮<\/li>\n<li>학교 뒤편 야외 소무대 폐장 후<\/li>\n<li>방송실<\/li>\n<li>축제 도움 인원 대기 장소<\/li>\n<li>소하의 오래된 길<\/li>\n<li>병실<\/li>\n<li>방학식 교실<\/li>\n<li>학교 도서관<\/li>\n<li>작은 카페 창가<\/li>\n<li>밝은 산책길<\/li>\n<\/ol>\n<h3 id=\"스토리-14장소와배경묘사-md-13-문서-적용-기준\">13. 문서 적용 기준<\/h3>\n<ul>\n<li>장면 대본에서 장소 묘사가 부족할 때는 이 문서의 장소별 기준을 우선한다.<\/li>\n<li>이미지 생성 프롬프트는 이 문서의 AI 묘사를 기본으로 하되, 시간대와 감정 상태를 추가한다.<\/li>\n<li>장소가 캐릭터 성격을 압도하면 안 된다. 하연은 조용한 가장자리, 소하는 익숙한 길, 서린은 정리된 업무 공간, 미루는 스스로 해보는 임시 공간과 맞아야 한다.<\/li>\n<li>실패 루프의 장소는 공포물이 아니라 “의미가 빠진 현실”처럼 보여야 한다.<\/li>\n<li>진엔딩 이후 장소는 사고를 지우는 장소가 아니라, 다친 기억을 안고 다음으로 걸어가는 장소여야 한다.<\/li>\n<\/ul>", "headings": [{"level": 1, "text": "장소와 배경 묘사", "id": "스토리-14장소와배경묘사-md-장소와-배경-묘사"}, {"level": 2, "text": "1. 전체 배경 원칙", "id": "스토리-14장소와배경묘사-md-1-전체-배경-원칙"}, {"level": 3, "text": "기본 톤", "id": "스토리-14장소와배경묘사-md-기본-톤"}, {"level": 3, "text": "장소 감정 규칙", "id": "스토리-14장소와배경묘사-md-장소-감정-규칙"}, {"level": 3, "text": "AI 이미지 생성 공통 프롬프트 기준", "id": "스토리-14장소와배경묘사-md-ai-이미지-생성-공통-프롬프트-기준"}, {"level": 2, "text": "2. 2학년 5반 교실", "id": "스토리-14장소와배경묘사-md-2-2학년-5반-교실"}, {"level": 3, "text": "기본 형태", "id": "스토리-14장소와배경묘사-md-기본-형태"}, {"level": 3, "text": "평상시 교실", "id": "스토리-14장소와배경묘사-md-평상시-교실"}, {"level": 3, "text": "`쉬어가 카페` 준비 상태", "id": "스토리-14장소와배경묘사-md-쉬어가-카페-준비-상태"}, {"level": 3, "text": "폐장 후 교실", "id": "스토리-14장소와배경묘사-md-폐장-후-교실"}, {"level": 2, "text": "3. 복도와 계단", "id": "스토리-14장소와배경묘사-md-3-복도와-계단"}, {"level": 3, "text": "기본 복도", "id": "스토리-14장소와배경묘사-md-기본-복도"}, {"level": 3, "text": "루프/실패 복도", "id": "스토리-14장소와배경묘사-md-루프-실패-복도"}, {"level": 2, "text": "4. 운동장과 축제 중심부", "id": "스토리-14장소와배경묘사-md-4-운동장과-축제-중심부"}, {"level": 3, "text": "축제 낮", "id": "스토리-14장소와배경묘사-md-축제-낮"}, {"level": 3, "text": "축제 폐장 직전", "id": "스토리-14장소와배경묘사-md-축제-폐장-직전"}, {"level": 2, "text": "5. 학교 뒤편 야외 소무대", "id": "스토리-14장소와배경묘사-md-5-학교-뒤편-야외-소무대"}, {"level": 3, "text": "기본 구조", "id": "스토리-14장소와배경묘사-md-기본-구조"}, {"level": 3, "text": "낮의 소무대", "id": "스토리-14장소와배경묘사-md-낮의-소무대"}, {"level": 3, "text": "D-2 창밖으로 보이는 소무대", "id": "스토리-14장소와배경묘사-md-d-2-창밖으로-보이는-소무대"}, {"level": 3, "text": "D-Day 폐장 후 소무대", "id": "스토리-14장소와배경묘사-md-d-day-폐장-후-소무대"}, {"level": 2, "text": "6. 방송실과 학생회 업무 공간", "id": "스토리-14장소와배경묘사-md-6-방송실과-학생회-업무-공간"}, {"level": 3, "text": "방송실", "id": "스토리-14장소와배경묘사-md-방송실"}, {"level": 3, "text": "학생회 업무 공간", "id": "스토리-14장소와배경묘사-md-학생회-업무-공간"}, {"level": 2, "text": "7. 소하의 오래된 길", "id": "스토리-14장소와배경묘사-md-7-소하의-오래된-길"}, {"level": 2, "text": "8. 미루의 축제 도움 인원 대기 장소", "id": "스토리-14장소와배경묘사-md-8-미루의-축제-도움-인원-대기-장소"}, {"level": 2, "text": "9. 병실과 병원 복도", "id": "스토리-14장소와배경묘사-md-9-병실과-병원-복도"}, {"level": 3, "text": "병실", "id": "스토리-14장소와배경묘사-md-병실"}, {"level": 3, "text": "병원 복도와 출구", "id": "스토리-14장소와배경묘사-md-병원-복도와-출구"}, {"level": 2, "text": "10. 방학식 후 학교와 방학 장소", "id": "스토리-14장소와배경묘사-md-10-방학식-후-학교와-방학-장소"}, {"level": 3, "text": "방학식 교실", "id": "스토리-14장소와배경묘사-md-방학식-교실"}, {"level": 3, "text": "학교 도서관", "id": "스토리-14장소와배경묘사-md-학교-도서관"}, {"level": 3, "text": "작은 카페", "id": "스토리-14장소와배경묘사-md-작은-카페"}, {"level": 3, "text": "산책길", "id": "스토리-14장소와배경묘사-md-산책길"}, {"level": 2, "text": "11. 장소별 캐릭터 배치 기준", "id": "스토리-14장소와배경묘사-md-11-장소별-캐릭터-배치-기준"}, {"level": 2, "text": "12. 배경 이미지 제작 우선순위", "id": "스토리-14장소와배경묘사-md-12-배경-이미지-제작-우선순위"}, {"level": 2, "text": "13. 문서 적용 기준", "id": "스토리-14장소와배경묘사-md-13-문서-적용-기준"}], "plain": "# 장소와 배경 묘사 이 문서는 주요 장소의 시각 기준, 분위기, 반복 소품, 시간대별 변화, AI 이미지 생성용 묘사 기준을 정리한다. 스토리의 장소는 단순한 배경이 아니라 재윤의 감정 상태를 보여주는 장치다. 같은 장소도 루프 진행도, 관계 정리 여부, 시간대에 따라 다르게 보인다. ## 1. 전체 배경 원칙 ### 기본 톤 - 배경은 현실적인 한국 고등학교와 소도시 생활권을 기준으로 한다. - 과장된 판타지 학교, 초호화 사립학교, 비현실적인 유럽풍 캠퍼스는 피한다. - 계절은 1학기 말, 여름방학 직전이다. - 공기는 약간 덥고 습하지만, 진엔딩 후에는 같은 여름빛이 더 가볍고 밝게 보인다. - 색감은 평상시에는 자연광과 형광등 중심, 루프/실패 구간에서는 같은 색이 조금 탁하고 낮게 가라앉는다. ### 장소 감정 규칙 | 상태 | 장소가 주는 느낌 | | --- | --- | | 평상시 | 현실적이고 익숙한 학교. 학생 소음, 생활감, 수행평가와 축제 준비의 어수선함 | | 하연 접근 | 시끄러운 중심보다 가장자리, 창가, 조용한 복도, 숨을 고를 수 있는 자리 | | 기존 관계 미정리 | 익숙한 길, 반복되는 자리, 오래된 물건이 많아짐 | | 사고 단서 접근 | 소무대, 전선, 조명 프레임, 출입 제한 표지처럼 물리적 위험이 선명해짐 | | 실패 루프 | 장소는 맞지만 사람이 빠져 있음. 이유 없이 비어 있고 소리가 멀어짐 | | 진엔딩 | 같은 장소를 지나가되, 머무르지 않고 다음 장소로 이동하는 느낌 | ### AI 이미지 생성 공통 프롬프트 기준 장소 이미지를 만들 때는 아래 요소를 조합한다. ```text realistic Korean high school, late June summer, visual novel background, soft natural light, lived-in classroom or school facility, subtle emotional atmosphere, detailed props, no fantasy architecture, no exaggerated luxury, cinematic but grounded ``` 필요에 따라 추가한다. ```text slightly humid summer air, quiet after school mood, paper festival decorations, fluorescent lights, warm sunset through windows, distant schoolyard, empty corridor, soft shadows, understated romance mystery mood ``` 피해야 할 요소: ```text fantasy castle school, overly futuristic building, cyberpunk neon, luxury academy, gothic cathedral interior, empty white void, horror blood, dramatic ruin, unrealistically huge classroom ``` ## 2. 2학년 5반 교실 ### 기본 형태 2학년 5반은 재윤과 하연이 처음 현실적인 접점을 쌓는 중심 장소다. 평범한 한국 고등학교 교실이며, 책상과 의자가 규칙적으로 놓여 있지만 완전히 정돈되어 있지는 않다. 창문은 운동장 쪽을 향하고, 창가 자리에서는 축제 준비가 진행되는 운동장과 멀리 학교 뒤편 소무대 방향이 희미하게 보인다. 주요 시각 요소: - 연한 나무색 책상과 회색 금속 다리 의자 - 칠판, 분필 가루, 지우개 자국 - 교실 뒤 게시판의 수행평가 안내, 축제 일정표, 방학식 공지 - 창가 커튼, 여름빛에 조금 바랜 천 - 학생들이 붙인 포스트잇, 낙서, 임시 역할표 - 책상 위 필통, 문제집, 빈 물병, 접힌 유인물 ### 평상시 교실 평상시 교실은 시끄럽고 산만하다. 누군가는 수행평가 이야기를 하고, 누군가는 축제 이야기를 한다. 하연이 전학 온 날에는 교실 자체는 평범하지만, 재윤에게는 창밖 빛과 교실 소음이 살짝 멀게 느껴진다. AI 이미지 묘사: ```text ordinary Korean high school classroom, late June morning, rows of wooden desks, green chalkboard with faint chalk marks, festival and summer vacation notices on the back bulletin board, soft sunlight through cream curtains, slightly messy but lived-in, visual novel background ``` ### `쉬어가 카페` 준비 상태 D-18 이후 교실은 반행사 준비 공간으로 바뀐다. 완성된 카페라기보다 학생들이 만든 임시 부스다. 손맛과 어설픔이 있어야 한다. 주요 시각 요소: - 칠판 한쪽의 `쉬어가 카페` 문구 - 손글씨 메뉴판 - 색종이와 종이 꽃 장식 - 책상을 붙여 만든 임시 카운터 - 종이컵, 컵받침, 투명 테이프, 가위, 매직 - 아직 정리되지 않은 박스와 음료 재료 - 창문 쪽에 기대어 둔 여분 의자 분위기: - 밝지만 완성된 상업 카페가 아니라 학생 축제 특유의 어설픈 따뜻함 - 하연에게는 “시끄러운 학교 안에서 잠깐 숨을 고르는 자리” - 재윤에게는 “도망치는 곳이 아니라 다시 걸어가기 전 쉬는 곳” AI 이미지 묘사: ```text Korean high school classroom transformed into a handmade festival cafe booth, hand-written menu board, paper flower decorations, desks pushed together as a counter, paper cups and tape on desks, warm late afternoon sunlight, modest student-made atmosphere, not a real commercial cafe ``` ### 폐장 후 교실 D-Day 폐장 후의 2학년 5반은 카페가 끝난 뒤의 공간이다. 낮의 밝음이 빠져나가고, 남은 물건들이 하루가 끝났음을 보여준다. 주요 시각 요소: - 지우다 만 메뉴판 - 한쪽에 쌓인 의자 - 쓰레기봉투 옆 종이컵 - 떨어진 종이 장식 - 칠판 한쪽에 아직 남은 `잠깐 쉬어가도 괜찮은 곳` - 복도로 새는 희미한 형광등 빛 연출 의미: - 하연이 먼저 약속을 잡지 않는 구조와 연결된다. 장소는 비어 있지만, 하연이 어떤 공간을 편하게 느끼는지 재윤이 읽을 수 있어야 한다. - 실패 루프에서는 이 교실이 단순히 닫힌 부스로 보이고, 진엔딩 흐름에서는 하연의 조용한 동선을 떠올리게 하는 단서가 된다. ## 3. 복도와 계단 복도는 재윤이 누구에게 향할지 결정하기 전 잠깐 멈추는 장소다. 선택의 중간 지점이며, 루프가 진행될수록 발소리와 방송 소리가 더 크게 느껴진다. ### 기본 복도 주요 시각 요소: - 긴 직선 복도 - 창문 아래 낮은 벽 - 교실 번호판 - 축제 홍보 포스터 - 학생들이 지나가며 떨어뜨린 종이 장식 - 바닥에 반사되는 형광등 - 끝부분의 계단과 비상구 표시등 AI 이미지 묘사: ```text Korean high school corridor, long hallway with classroom doors, festival posters on walls, cream floor reflecting fluorescent lights, late afternoon summer light from windows, slightly messy paper decorations, quiet visual novel background ``` ### 루프/실패 복도 실패 루프의 복도는 같은 구조지만 사람이 적고, 빛이 조금 낮다. 공포 배경처럼 과장하지 않고, “평범한데 비어 있어서 이상한” 느낌을 준다. 차이: - 멀리서 들리던 학생 소리가 갑자기 줄어듦 - 형광등 하나가 미세하게 깜빡임 - 게시판 날짜가 이상하게 눈에 들어옴 - 발소리가 실제보다 크게 울림 - 창밖 운동장 소리가 물속처럼 멀게 들림 ## 4. 운동장과 축제 중심부 운동장은 축제의 가장 밝은 중심이다. 하지만 이 작품에서 재윤과 하연의 핵심 감정은 운동장 한가운데보다 가장자리에서 더 잘 드러난다. ### 축제 낮 주요 시각 요소: - 반별 천막 - 현수막, 풍선, 종이 장식 - 임시 안내판 - 학생들이 들고 다니는 음료와 간식 - 운동장 가장자리의 그늘 - 멀리 보이는 학교 뒤편 방향 분위기: - 밝고 소란스럽다. - 소하는 중심부에서도 자연스럽게 움직인다. - 하연은 중심부에 오래 머물기보다 가장자리, 그늘, 조금 조용한 방향을 본다. - 재윤은 하연을 공략할수록 그 시선을 알아차린다. AI 이미지 묘사: ```text Korean high school festival on the schoolyard, modest class tents, handmade banners, students walking with drinks, bright late June sunlight, lively but not crowded like a concert, visible quiet edge of the schoolyard in the distance ``` ### 축제 폐장 직전 낮의 활기는 남아 있지만 정리의 기운이 섞인다. 주요 시각 요소: - 접히기 시작한 천막 - 반쯤 내려간 현수막 - 쓰레기봉투와 정리 박스 - 멀리 꺼져가는 스피커 - 방송으로 흘러나오는 폐장 안내 - 운동장 중심은 아직 밝지만, 뒤편 소무대 쪽은 먼저 어두워짐 연출 의미: - 재윤이 밝은 중심에 머무를지, 하연이 향했을 조용한 가장자리를 알아차릴지 갈리는 구간이다. ## 5. 학교 뒤편 야외 소무대 소무대는 가장 중요한 장소다. 이곳은 고백 장소이자 사고 장소이며, 실패 루프에서는 하연이 빠진 채 위험만 남는 장소다. 중요 원칙: - 소무대를 낭만적인 데이트 명소처럼 꾸미지 않는다. - 낮에는 평범한 행사 시설, 폐장 후에는 조용하고 위험한 임시 구조물로 보인다. - 진엔딩에서도 이 장소에 머무는 것이 아니라, 이 장소에서 있었던 선택과 사고를 받아들인 뒤 현실로 돌아간다. ### 기본 구조 주요 시각 요소: - 학교 뒤편의 낮은 임시 무대 - 낮은 단차 - 검은 고무 전선 - 임시 조명 프레임 - 금속 지지대 - 출입 제한 표지 - 철거 대기 중인 장비 박스 - 운동장 중심부와는 떨어진 조용한 위치 - 뒤쪽 나무나 담장, 어두운 그늘 AI 이미지 묘사: ```text small temporary outdoor stage behind a Korean high school, low platform, metal lighting frame, black cables on the ground, access restriction sign, equipment boxes, quiet edge of school festival area, realistic and slightly tense, not romanticized ``` ### 낮의 소무대 낮에는 위험이 완전히 드러나지 않는다. 학생들이 사진을 찍거나 잠깐 쉬어갈 수 있는 평범한 장소처럼 보인다. 다만 자세히 보면 전선과 임시 프레임이 신경 쓰인다. 연출 요소: - 햇빛 아래에서는 단차가 잘 보이지 않음 - 전선은 정리된 듯하지만 일부가 느슨함 - 출입 제한 표지가 한쪽으로 밀려 있거나 기울어 있음 - 멀리서 보면 평범하지만 가까이 보면 불안함 ### D-2 창밖으로 보이는 소무대 D-2에는 소무대가 직접 목적지가 아니라 “하연이 조용한 곳을 바라보는 방향”으로 쓰인다. 구도: - 2학년 5반 창문 안쪽에서 운동장 너머로 보이는 작은 프레임 - 교실 안의 따뜻한 노을빛과 바깥의 차가운 그림자 대비 - 하연의 시선이 창밖 가장자리로 향함 - 재윤이 그 방향을 이해하는지 여부가 중요 ### D-Day 폐장 후 소무대 폐장 후 소무대는 밝은 축제와 분리된 장소다. 주요 시각 요소: - 운동장 쪽 불빛은 멀고, 소무대 주변은 부분적으로 어두움 - 임시 조명 일부만 켜져 있거나 꺼지는 중 - 철제 프레임 그림자가 바닥에 길게 생김 - 전선과 단차가 더 선명하게 보임 - 출입 제한 표지가 바람에 흔들림 - 금속 지지대가 바람에 작게 울림 진엔딩 구도: - 하연은 무대 가장자리 또는 무대 앞 낮은 단차 근처에 서 있다. - 하연은 재윤을 부른 것이 아니라, 조용한 곳에서 자기 말을 정리하고 있었다. - 재윤이 직접 찾아온다. - 두 사람 사이에는 무대 중심부보다 약간 옆으로 비켜선 공간이 좋다. - 고백은 화려한 조명 아래가 아니라, 축제가 끝난 뒤 남은 조용한 빛 아래에서 이루어진다. 실패 루프 구도: - 하연이 없다. - 같은 장소지만 의미가 사라져 전선, 단차, 표지, 조명 프레임만 남는다. - 재윤은 자신이 왜 여기에 왔는지 모른다. - 배경은 무섭기보다 비어 있고 건조해야 한다. ## 6. 방송실과 학생회 업무 공간 서린의 장소는 질서와 통제의 공간이다. 그러나 서린이 악역처럼 보이지 않도록, 차갑기만 한 공간이 아니라 실제로 누군가 정리하지 않으면 무너질 것 같은 업무의 흔적이 있어야 한다. ### 방송실 주요 시각 요소: - 좁은 방송실 - 믹서, 마이크, 헤드폰 - 폐장 안내 큐시트 - 학교 방송 시간표 - 케이블과 라벨링 테이프 - 벽의 흡음재 또는 오래된 게시물 - 작은 창문 너머 보이는 운동장 일부 - 서린이 정리한 체크리스트 AI 이미지 묘사: ```text small Korean high school broadcasting room, audio mixer, microphone, headphones, printed cue sheets, labeled cables, student council documents, fluorescent light, organized but cramped, realistic visual novel background ``` 서린 상담 장면에서는 방송실이 정답을 알려주는 장소가 아니라, 재윤이 자기 선택의 이유를 확인하는 장소가 되어야 한다. ### 학생회 업무 공간 방송실보다 조금 더 개방된 업무 공간이다. 책상 위에 축제 자료, 안전 안내문, 반별 일정표가 쌓여 있다. 주요 시각 요소: - 파일철 - 체크리스트 - 축제 배치도 - 무전기 또는 학생회 명찰 - 테이프, 가위, 펜, 스탬프 - 반납해야 할 장비 목록 분위기: - 완벽히 깨끗한 사무실이 아니라, 학생들이 임시로 쓰는 공간 - 서린의 정리 습관 덕분에 겨우 질서가 유지되는 느낌 ## 7. 소하의 오래된 길 소하와의 장소는 과거와 익숙함을 상징한다. 재윤이 편하게 숨을 수 있는 길이지만, 진엔딩에서는 그 길에 머무르지 않고 돌아서야 한다. 주요 후보: - 학교 옆 오래된 골목 - 등굣길의 낮은 담장 - 오래된 문방구 앞 - 동네 분식집 근처 - 작은 놀이터 - 햇빛에 색이 바랜 표지판 AI 이미지 묘사: ```text quiet old neighborhood street near a Korean high school, small stationery shop, faded signs, low walls, summer afternoon light, nostalgic but ordinary, familiar childhood route, visual novel background ``` 분위기: - 소하는 이 길에서 자연스럽고 빠르게 걷는다. - 재윤은 편하지만 동시에 앞으로 나아가지 못하는 느낌을 받는다. - 색감은 따뜻하지만, 실패 루트에서는 같은 따뜻함이 정체된 느낌으로 바뀐다. 금지: - 지나치게 낭만적인 데이트 거리로 만들지 않는다. - 소하를 방해자처럼 보이게 하지 않는다. 장소는 과거가 나쁜 것이 아니라, 거기에 숨는 것이 문제임을 보여줘야 한다. ## 8. 미루의 축제 도움 인원 대기 장소 미루의 장소는 “혼자 해보려는 사람의 불안”을 보여준다. 너무 어둡거나 불쌍하게 만들지 말고, 해야 할 일이 많아 작은 실수가 커 보이는 공간으로 잡는다. 주요 시각 요소: - 도움 인원 대기 책상 - 체크리스트 - 명찰 - 여분 안내 표지 - 끈, 테이프, 클립보드 - 분실물 박스 - 임시 보관용 의자 - 학생들이 드나드는 문 옆 공간 AI 이미지 묘사: ```text temporary volunteer waiting area at a Korean school festival, folding table with checklists, name tags, tape, extra signs, clipboards, slightly cluttered but functional, young student helper atmosphere, soft daylight from corridor ``` 분위기: - 미루는 물건을 품에 숨기기보다, 성장 흐름에서는 체크리스트를 밖으로 꺼내 들고 있다. - 실패 흐름에서는 같은 체크리스트가 의존과 불안의 상징이 된다. - 공간은 좁지만 막힌 방처럼 답답하게 만들지 않는다. 미루가 나갈 수 있는 문이 보여야 한다. ## 9. 병실과 병원 복도 진엔딩 후 D+2 일요일 병실은 현실로 돌아왔음을 처음 확인하는 장소다. 충격적인 중환자실보다, 큰 외상은 없지만 의식이 돌아오지 않았던 상태를 보여주는 조용한 병실이 적합하다. ### 병실 주요 시각 요소: - 흰 침대 - 얇은 병원 커튼 - 작은 심박 모니터 또는 기본 장비 - 창문으로 들어오는 일요일 오후 햇빛 - 침대 옆 의자 - 물컵, 보호자용 담요, 접힌 가디건 - 꽃다발보다는 실용적인 물건이 좋음 AI 이미지 묘사: ```text quiet Korean hospital room, Sunday afternoon sunlight through window, white bed, pale curtains, small medical monitor, chair beside the bed, water cup, folded cardigan, calm recovery mood, realistic visual novel background ``` 분위기: - 극적인 죽음의 문턱보다, 긴 잠에서 막 깨어난 조심스러운 현실감 - 하연이 밤새 버틴 흔적은 과장된 눈물보다 의자, 접힌 옷, 반쯤 식은 물 같은 소품으로 보여준다. - 진엔딩이므로 공포보다 회복의 시작이 중요하다. ### 병원 복도와 출구 크레딧 컷에서 병원 복도는 “다시 걸어 나가는 곳”이다. 주요 시각 요소: - 긴 복도 - 안내 표지판 - 자동문 너머 밝은 여름빛 - 하연이 앞서가지 않고 재윤의 속도에 맞춰 걷는 구도 - 병원 냄새와 현실감을 주는 차분한 색 ## 10. 방학식 후 학교와 방학 장소 진엔딩 후 장소는 사고 장소에 머무르지 않고, 방학 동안 계속 만날 미래를 암시해야 한다. ### 방학식 교실 방학식 교실은 축제가 끝난 뒤의 현실이다. 학생들은 들떠 있지만, 재윤은 오래 머물 수 없다. 주요 시각 요소: - 방학식 안내문 - 걷힌 축제 장식의 흔적 - 책상 위 짐과 종이가방 - 창문 밖 밝은 여름 하늘 - 하연이 먼 자리에서 조용히 재윤을 확인하는 시선 ### 학교 도서관 도서관은 방학 중에도 열리는 조용한 약속 장소다. 하연의 성격과 잘 맞는다. AI 이미지 묘사: ```text small Korean high school library during summer vacation, quiet shelves, reading desks, operation hours notice, warm daylight, two students implied but not centered, calm future promise mood ``` ### 작은 카페 방학 중 카페는 `쉬어가 카페`와 대비되는 실제 외부 장소다. 상업적으로 화려한 카페보다 동네의 작은 창가 좌석이 좋다. 주요 시각 요소: - 창가 두 자리 - 물방울 맺힌 차가운 음료 - 병원 안내문이나 책 한 권 - 너무 꾸미지 않은 나무 테이블 - 여름 오후의 밝은 거리 ### 산책길 산책길은 소무대를 낭만화하지 않고 지나가는 장소다. 주요 시각 요소: - 학교 뒤편 방향을 멀리 지나치지만 소무대에 머물지 않음 - 나무 그늘 - 낮은 담장 - 여름 하늘 - 느린 걸음 연출 원칙: - 손을 잡는지 여부보다, 서로의 속도를 맞추는 것이 중요하다. - 방학 동안 계속 만날 암시는 장소의 반복 예약으로 보여준다. ## 11. 장소별 캐릭터 배치 기준 | 인물 | 잘 맞는 장소 | 어긋나는 장소 처리 | | --- | --- | --- | | 재윤 | 교실, 복도, 선택 직전의 중간 지점, 소무대 앞 | 익숙한 장소에 숨을수록 루프/회피 느낌이 강해짐 | | 하연 | 창가, 교실 가장자리, 운동장 가장자리, 조용한 소무대 방향, 도서관 | 축제 중심부에 오래 세우면 피로감이 보여야 함 | | 소하 | 등굣길, 오래된 골목, 운동장 중심, 익숙한 학교 동선 | 너무 어두운 장소보다 따뜻하지만 정체된 장소가 맞음 | | 서린 | 방송실, 학생회 업무 공간, 안내판 앞 | 냉혹한 통제실처럼 만들지 말고 업무 흔적을 남김 | | 미루 | 도움 인원 대기 장소, 복도 옆 임시 책상, 체크리스트가 있는 자리 | 갇힌 방보다 나갈 수 있는 문이 보이는 공간이 좋음 | ## 12. 배경 이미지 제작 우선순위 1. 2학년 5반 평상시 2. 2학년 5반 `쉬어가 카페` 3. 2학년 5반 폐장 후 4. 학교 복도/계단 5. 축제 운동장 낮 6. 축제 폐장 직전 운동장 7. 학교 뒤편 야외 소무대 낮 8. 학교 뒤편 야외 소무대 폐장 후 9. 방송실 10. 축제 도움 인원 대기 장소 11. 소하의 오래된 길 12. 병실 13. 방학식 교실 14. 학교 도서관 15. 작은 카페 창가 16. 밝은 산책길 ## 13. 문서 적용 기준 - 장면 대본에서 장소 묘사가 부족할 때는 이 문서의 장소별 기준을 우선한다. - 이미지 생성 프롬프트는 이 문서의 AI 묘사를 기본으로 하되, 시간대와 감정 상태를 추가한다. - 장소가 캐릭터 성격을 압도하면 안 된다. 하연은 조용한 가장자리, 소하는 익숙한 길, 서린은 정리된 업무 공간, 미루는 스스로 해보는 임시 공간과 맞아야 한다. - 실패 루프의 장소는 공포물이 아니라 “의미가 빠진 현실”처럼 보여야 한다. - 진엔딩 이후 장소는 사고를 지우는 장소가 아니라, 다친 기억을 안고 다음으로 걸어가는 장소여야 한다.", "excerpt": "# 장소와 배경 묘사 이 문서는 주요 장소의 시각 기준, 분위기, 반복 소품, 시간대별 변화, AI 이미지 생성용 묘사 기준을 정리한다. 스토리의 장소는 단순한 배경이 아니라 재윤의 감정 상태를 보여주는 장치다. 같은 장소도 루프 진행도, 관계 정리 여부, 시간대에 따라 다르게 보인다. ## 1. 전체 배경 원칙 ### 기본 톤 - 배경은 현실적인 한국 고등학교와 소도시 생활권을 기준으로 한"}, {"path": "스토리/README.md", "category": "스토리", "title": "스토리 기획 문서 안내", "id": "스토리-readme-md", "html": "<h2 id=\"스토리-readme-md-스토리-기획-문서-안내\">스토리 기획 문서 안내<\/h2>\n<p>스토리 기획은 세부 단계로 넘어가면서 문서를 주제별로 분리한다.<\/p>\n<h3 id=\"스토리-readme-md-정본-기준\">정본 기준<\/h3>\n<ul>\n<li>이 폴더의 번호 문서가 스토리 세부 정본이다.<\/li>\n<li>상위 <code>../스토리_컨셉.md<\/code>는 요약 인덱스이며, 세부 기준은 이 README와 00~14 문서를 따른다.<\/li>\n<li>문서 운용과 오래된 문서 삭제 기준은 <a href=\"../문서_정본_가이드.md\">기획 문서 정본 가이드<\/a>를 따른다.<\/li>\n<li>같은 내용이 여러 문서에 있을 경우, 조건 수치는 <code>12<\/code>, 날짜 흐름은 <code>06<\/code>, D-Day 대본은 <code>10<\/code>, 실제 스크립트 분할은 <code>13<\/code>, 장소/배경 묘사는 <code>14<\/code>, 전체 줄거리는 <code>00<\/code>을 우선한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-readme-md-문서-목록\">문서 목록<\/h3>\n<ol>\n<li><a href=\"./00_전체_스토리.md\">전체 스토리<\/a><\/li>\n<\/ol>\n<ul>\n<li>게임의 처음부터 진엔딩 이후까지 확정된 본편 흐름을 소설형으로 읽는 정본 스토리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./01_스토리_컨셉_개요.md\">스토리 컨셉 개요<\/a><\/li>\n<\/ol>\n<ul>\n<li>핵심 컨셉, 전체 시간 구조, 오프닝, 현실 사고<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./02_캐릭터와_관계.md\">캐릭터와 관계<\/a><\/li>\n<\/ol>\n<ul>\n<li>주인공 유재윤, 은하연, 한소하, 백서린, 나미루의 성격 기준, 외형, 현실 관계, 내면세계의 감정적 변형<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./03_진행구조_진엔딩조건.md\">진행 구조와 진엔딩 조건<\/a><\/li>\n<\/ol>\n<ul>\n<li>병렬 진행, 4주 이벤트 단계, 진엔딩 조건<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./04_루트_세부기획.md\">루트 세부 기획<\/a><\/li>\n<\/ol>\n<ul>\n<li>하연/소하/서린/미루 루트의 주차별 이벤트, 선택지, 단서, 새드엔딩 조건, D-Day 분기 우선순위<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./05_엔딩과_루프.md\">엔딩과 루프<\/a><\/li>\n<\/ol>\n<ul>\n<li>새드엔딩, 히든 엔딩, 루프, 복구 이벤트<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./06_날짜별_진행_달력.md\">날짜별 진행 달력<\/a><\/li>\n<\/ol>\n<ul>\n<li>D-32 시작부터 D+3 방학식까지의 마스터 달력. D-3/D-2/D-Day 핵심 문서 기준으로 날짜별 의존 관계를 재정렬<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./07_전체_스토리_외전_실패루프.md\">전체 스토리 외전: 실패 루프와 새드엔딩<\/a><\/li>\n<\/ol>\n<ul>\n<li>하연 실패 루프, 소하/서린/미루 새드엔딩, 반복 실패, 히든 붕괴를 짧은 외전 장면으로 정리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./08_D-3_관계정리_클라이맥스.md\">D-3 관계 정리 클라이맥스<\/a><\/li>\n<\/ol>\n<ul>\n<li>소하/서린/미루 관계 정리 클라이맥스를 선택지, 대사, 성공/실패 분기, 획득 단서까지 대본형으로 정리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./09_D-2_말하지_못한_예감.md\">D-2 말하지 못한 예감<\/a><\/li>\n<\/ol>\n<ul>\n<li>하연이 직접 약속을 잡지 않는 대신, 재윤이 하연의 조용한 동선과 말하지 못한 마음을 이해하는 컷신 대본<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a><\/li>\n<\/ol>\n<ul>\n<li>축제 2일차 낮 선택, 폐장 후 하연 성공 분기, 혼자 소무대 실패 루프, D-Day 분기 판정표를 대본형으로 정리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a><\/li>\n<\/ol>\n<ul>\n<li>진엔딩 전용 엔딩 크레딧의 음악 방향, 방학 후일담 컷, 금지/주의 사항을 초안 수준으로 정리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a><\/li>\n<\/ol>\n<ul>\n<li>D-1 밤 정산, D-Day 낮 보정, 폐장 후 최종 분기를 점수·플래그·우선순위 기준으로 정리<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a><\/li>\n<\/ol>\n<ul>\n<li>D-Day 공통 진입, 낮 선택, 폐장 후 평가, 진엔딩/실패/새드 분기를 실제 게임 스크립트 단위로 분할<\/li>\n<\/ul>\n<ol>\n<li><a href=\"./14_장소와_배경_묘사.md\">장소와 배경 묘사<\/a><\/li>\n<\/ol>\n<ul>\n<li>학교, 교실, 쉬어가 카페, 소무대, 방송실, 병실, 방학 후 장소의 시각 기준과 AI 이미지 생성용 배경 묘사 정본<\/li>\n<\/ul>\n<h3 id=\"스토리-readme-md-현재-확정된-핵심\">현재 확정된 핵심<\/h3>\n<ul>\n<li>장르: 미연시처럼 시작하는 루프 로맨스 미스터리 비주얼노벨<\/li>\n<li>실제 정체: 축제 사고 후 혼수상태에 빠진 주인공의 내면세계<\/li>\n<li>첫 회차: 1학기 말 D-32 월요일 시작, 기존 히로인 관계를 보여주는 1주 프롤로그 + 하연 등장 후 약 4주<\/li>\n<li>은하연 전학: D-25 월요일<\/li>\n<li>축제 이틀 일정 공지: D-23 수요일, 2학년 5반의 반 단위 참여 확정<\/li>\n<li>2학년 5반 반행사: D-18 월요일 <code>쉬어가 카페<\/code>로 확정<\/li>\n<li>축제 1일차: D-1 목요일. 부스 운영 중심, 하연과 <code>쉬어가 카페<\/code> 운영으로 관계 강화<\/li>\n<li>D-2 수요일: 하연이 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해하기 시작하는 <code>말하지 못한 예감<\/code>. 하연은 직접 약속을 잡지 않고, 재윤이 D-3 관계 정리 이후 하연의 침묵과 동선을 스스로 읽어야 한다.<\/li>\n<li>축제 2일차 / 사고: D-Day 금요일. 부스 축소 운영 후 히로인들과 축제를 둘러보고, 하연 공략이 충분하면 폐장 후 재윤이 하연의 동선을 알아차려 직접 소무대로 찾아가 마음과 선택을 말한다. 부족하면 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선 이유를 잊은 채 루프한다.<\/li>\n<li>방학식 예정: D+3 월요일. 실패 루프에서는 도달하지 못하는 다음 월요일<\/li>\n<li>현재 날짜별 상세 확정 범위: D-32 월요일부터 D-Day 금요일, 진엔딩 후 D+3 월요일 방학식까지<\/li>\n<li>루프 이후: 첫 회차 전용 1주를 건너뛰고 D-25 하연 등장 직전부터 재시작<\/li>\n<li>진엔딩 조건: 하연과의 상호 마음 확인, 기존 관계 정리, 사고 단서 확보. 핵심은 하연을 충분히 이해해 폐장 후 동선을 알아차리고, 미루던 선택과 기억을 받아들인 재윤이 먼저 하연을 찾아가 말하는 것. 세부 수치 기준은 <code>D-1/D-Day 조건 수치화<\/code> 문서를 따른다.<\/li>\n<li>진엔딩: 금요일 밤 사고 후 D+1 토요일은 날짜 카드로 보여주지 않고, D+2 일요일 오후 병실에서 깨어난 뒤 D+3 월요일 방학식에 겨우 참석해 현실의 은하연과 다시 만남. 방학식 직후에는 병원 재검사, 도서관, 카페, 산책 같은 작은 약속으로 방학 동안 두 사람이 계속 만날 것을 암시하고, 음악과 짧은 애니메이션 컷이 들어간 엔딩 크레딧으로 마무리함<\/li>\n<li>하연 실패 루프: 하연과 서로의 마음을 확인하지 못하면, 재윤은 하연이 있던 사고 기억을 잃고 혼자 야외 소무대에서 사고를 반복함. 방학식과 완성된 크레딧에는 도달하지 않음<\/li>\n<li>이야기의 핵심 질문: 다치지 않은 과거로 돌아갈 것인가, 다친 기억까지 안고 서로 선택한 마음을 인정할 것인가<\/li>\n<li>루프 이유: 재윤이 하연을 좋아했다는 마음과 그 선택 끝에 다쳤다는 기억을 동시에 받아들이지 못하기 때문에, 금요일 다음 월요일로 넘어가지 못함<\/li>\n<li>비진엔딩 처리: 진엔딩만 방학이 실제로 시작된다. 소하/서린/미루 새드엔딩은 각각 왜곡·정지·닫힘의 가짜 크레딧으로 처리하고, 히든 붕괴는 이름과 음악이 깨지는 크레딧으로 처리한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-readme-md-현재-스토리-완성-기준\">현재 스토리 완성 기준<\/h3>\n<ul>\n<li>하연 루트는 서로 마음을 확인할 수 있는 신뢰를 형성하는 과정이다.<\/li>\n<li>D-2는 하연이 먼저 마음을 말하거나 만남을 예약하는 날이 아니라, 재윤이 하연의 속도와 조용한 자리 선호를 이해하는 <code>말하지 못한 예감<\/code>이다.<\/li>\n<li>축제 마지막 날 폐장 후 성공 분기에서는 하연이 먼저 약속을 잡지 않는다. 재윤이 하연 공략으로 쌓은 이해를 바탕으로 하연이 있을 곳을 알아차려 직접 찾아가 자기 마음과 선택을 말하고, 하연은 자신도 기다리고 있었다는 마음을 확인한다.<\/li>\n<li>하연 실패 루프에서는 하연이 사고 기억에서 빠지고, 재윤은 누구에게 무엇을 말하려 했는지 모른 채 혼자 야외 소무대 사고를 반복한다.<\/li>\n<li>소하/서린/미루 이벤트는 실제 연애 결론이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 과거/정답/의존의 길을 정리하는 과정이다. D-3에는 세 관계의 클라이맥스가 발생하며, 각 성공 분기는 진엔딩에 필요한 감정 단서와 사고 단서를 제공한다.<\/li>\n<li>사고 단서는 사고를 없애기 위한 정보가 아니라, 다친 기억까지 안고 현실로 돌아가기 위한 기억 조각이다.<\/li>\n<li>게임 내 대사/UI에서는 <code>D-Day<\/code>라고 부르지 않고 <code>축제 2일차<\/code>, <code>축제 마지막 날<\/code>, <code>금요일<\/code>, <code>폐장 후<\/code>처럼 표현한다.<\/li>\n<li>장소/배경 묘사는 <code>14_장소와_배경_묘사.md<\/code>를 우선한다. 장소는 캐릭터 성격을 압도하지 않고, 하연은 조용한 가장자리, 소하는 익숙한 길, 서린은 업무의 질서, 미루는 스스로 해보는 임시 공간과 맞아야 한다.<\/li>\n<\/ul>", "headings": [{"level": 1, "text": "스토리 기획 문서 안내", "id": "스토리-readme-md-스토리-기획-문서-안내"}, {"level": 2, "text": "정본 기준", "id": "스토리-readme-md-정본-기준"}, {"level": 2, "text": "문서 목록", "id": "스토리-readme-md-문서-목록"}, {"level": 2, "text": "현재 확정된 핵심", "id": "스토리-readme-md-현재-확정된-핵심"}, {"level": 2, "text": "현재 스토리 완성 기준", "id": "스토리-readme-md-현재-스토리-완성-기준"}], "plain": "# 스토리 기획 문서 안내 스토리 기획은 세부 단계로 넘어가면서 문서를 주제별로 분리한다. ## 정본 기준 - 이 폴더의 번호 문서가 스토리 세부 정본이다. - 상위 `../스토리_컨셉.md`는 요약 인덱스이며, 세부 기준은 이 README와 00~14 문서를 따른다. - 문서 운용과 오래된 문서 삭제 기준은 [기획 문서 정본 가이드](../문서_정본_가이드.md)를 따른다. - 같은 내용이 여러 문서에 있을 경우, 조건 수치는 `12`, 날짜 흐름은 `06`, D-Day 대본은 `10`, 실제 스크립트 분할은 `13`, 장소/배경 묘사는 `14`, 전체 줄거리는 `00`을 우선한다. ## 문서 목록 0. [전체 스토리](./00_전체_스토리.md) - 게임의 처음부터 진엔딩 이후까지 확정된 본편 흐름을 소설형으로 읽는 정본 스토리 1. [스토리 컨셉 개요](./01_스토리_컨셉_개요.md) - 핵심 컨셉, 전체 시간 구조, 오프닝, 현실 사고 2. [캐릭터와 관계](./02_캐릭터와_관계.md) - 주인공 유재윤, 은하연, 한소하, 백서린, 나미루의 성격 기준, 외형, 현실 관계, 내면세계의 감정적 변형 3. [진행 구조와 진엔딩 조건](./03_진행구조_진엔딩조건.md) - 병렬 진행, 4주 이벤트 단계, 진엔딩 조건 4. [루트 세부 기획](./04_루트_세부기획.md) - 하연/소하/서린/미루 루트의 주차별 이벤트, 선택지, 단서, 새드엔딩 조건, D-Day 분기 우선순위 5. [엔딩과 루프](./05_엔딩과_루프.md) - 새드엔딩, 히든 엔딩, 루프, 복구 이벤트 6. [날짜별 진행 달력](./06_날짜별_진행_달력.md) - D-32 시작부터 D+3 방학식까지의 마스터 달력. D-3/D-2/D-Day 핵심 문서 기준으로 날짜별 의존 관계를 재정렬 7. [전체 스토리 외전: 실패 루프와 새드엔딩](./07_전체_스토리_외전_실패루프.md) - 하연 실패 루프, 소하/서린/미루 새드엔딩, 반복 실패, 히든 붕괴를 짧은 외전 장면으로 정리 8. [D-3 관계 정리 클라이맥스](./08_D-3_관계정리_클라이맥스.md) - 소하/서린/미루 관계 정리 클라이맥스를 선택지, 대사, 성공/실패 분기, 획득 단서까지 대본형으로 정리 9. [D-2 말하지 못한 예감](./09_D-2_말하지_못한_예감.md) - 하연이 직접 약속을 잡지 않는 대신, 재윤이 하연의 조용한 동선과 말하지 못한 마음을 이해하는 컷신 대본 10. [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md) - 축제 2일차 낮 선택, 폐장 후 하연 성공 분기, 혼자 소무대 실패 루프, D-Day 분기 판정표를 대본형으로 정리 11. [진엔딩 크레딧 콘티 초안](./11_진엔딩_크레딧_콘티_초안.md) - 진엔딩 전용 엔딩 크레딧의 음악 방향, 방학 후일담 컷, 금지/주의 사항을 초안 수준으로 정리 12. [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md) - D-1 밤 정산, D-Day 낮 보정, 폐장 후 최종 분기를 점수·플래그·우선순위 기준으로 정리 13. [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md) - D-Day 공통 진입, 낮 선택, 폐장 후 평가, 진엔딩/실패/새드 분기를 실제 게임 스크립트 단위로 분할 14. [장소와 배경 묘사](./14_장소와_배경_묘사.md) - 학교, 교실, 쉬어가 카페, 소무대, 방송실, 병실, 방학 후 장소의 시각 기준과 AI 이미지 생성용 배경 묘사 정본 ## 현재 확정된 핵심 - 장르: 미연시처럼 시작하는 루프 로맨스 미스터리 비주얼노벨 - 실제 정체: 축제 사고 후 혼수상태에 빠진 주인공의 내면세계 - 첫 회차: 1학기 말 D-32 월요일 시작, 기존 히로인 관계를 보여주는 1주 프롤로그 + 하연 등장 후 약 4주 - 은하연 전학: D-25 월요일 - 축제 이틀 일정 공지: D-23 수요일, 2학년 5반의 반 단위 참여 확정 - 2학년 5반 반행사: D-18 월요일 `쉬어가 카페`로 확정 - 축제 1일차: D-1 목요일. 부스 운영 중심, 하연과 `쉬어가 카페` 운영으로 관계 강화 - D-2 수요일: 하연이 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해하기 시작하는 `말하지 못한 예감`. 하연은 직접 약속을 잡지 않고, 재윤이 D-3 관계 정리 이후 하연의 침묵과 동선을 스스로 읽어야 한다. - 축제 2일차 / 사고: D-Day 금요일. 부스 축소 운영 후 히로인들과 축제를 둘러보고, 하연 공략이 충분하면 폐장 후 재윤이 하연의 동선을 알아차려 직접 소무대로 찾아가 마음과 선택을 말한다. 부족하면 하연이 사고 기억에서 빠지고, 재윤은 혼자 소무대에 선 이유를 잊은 채 루프한다. - 방학식 예정: D+3 월요일. 실패 루프에서는 도달하지 못하는 다음 월요일 - 현재 날짜별 상세 확정 범위: D-32 월요일부터 D-Day 금요일, 진엔딩 후 D+3 월요일 방학식까지 - 루프 이후: 첫 회차 전용 1주를 건너뛰고 D-25 하연 등장 직전부터 재시작 - 진엔딩 조건: 하연과의 상호 마음 확인, 기존 관계 정리, 사고 단서 확보. 핵심은 하연을 충분히 이해해 폐장 후 동선을 알아차리고, 미루던 선택과 기억을 받아들인 재윤이 먼저 하연을 찾아가 말하는 것. 세부 수치 기준은 `D-1/D-Day 조건 수치화` 문서를 따른다. - 진엔딩: 금요일 밤 사고 후 D+1 토요일은 날짜 카드로 보여주지 않고, D+2 일요일 오후 병실에서 깨어난 뒤 D+3 월요일 방학식에 겨우 참석해 현실의 은하연과 다시 만남. 방학식 직후에는 병원 재검사, 도서관, 카페, 산책 같은 작은 약속으로 방학 동안 두 사람이 계속 만날 것을 암시하고, 음악과 짧은 애니메이션 컷이 들어간 엔딩 크레딧으로 마무리함 - 하연 실패 루프: 하연과 서로의 마음을 확인하지 못하면, 재윤은 하연이 있던 사고 기억을 잃고 혼자 야외 소무대에서 사고를 반복함. 방학식과 완성된 크레딧에는 도달하지 않음 - 이야기의 핵심 질문: 다치지 않은 과거로 돌아갈 것인가, 다친 기억까지 안고 서로 선택한 마음을 인정할 것인가 - 루프 이유: 재윤이 하연을 좋아했다는 마음과 그 선택 끝에 다쳤다는 기억을 동시에 받아들이지 못하기 때문에, 금요일 다음 월요일로 넘어가지 못함 - 비진엔딩 처리: 진엔딩만 방학이 실제로 시작된다. 소하/서린/미루 새드엔딩은 각각 왜곡·정지·닫힘의 가짜 크레딧으로 처리하고, 히든 붕괴는 이름과 음악이 깨지는 크레딧으로 처리한다. ## 현재 스토리 완성 기준 - 하연 루트는 서로 마음을 확인할 수 있는 신뢰를 형성하는 과정이다. - D-2는 하연이 먼저 마음을 말하거나 만남을 예약하는 날이 아니라, 재윤이 하연의 속도와 조용한 자리 선호를 이해하는 `말하지 못한 예감`이다. - 축제 마지막 날 폐장 후 성공 분기에서는 하연이 먼저 약속을 잡지 않는다. 재윤이 하연 공략으로 쌓은 이해를 바탕으로 하연이 있을 곳을 알아차려 직접 찾아가 자기 마음과 선택을 말하고, 하연은 자신도 기다리고 있었다는 마음을 확인한다. - 하연 실패 루프에서는 하연이 사고 기억에서 빠지고, 재윤은 누구에게 무엇을 말하려 했는지 모른 채 혼자 야외 소무대 사고를 반복한다. - 소하/서린/미루 이벤트는 실제 연애 결론이 아니라, 재윤이 하연에게 가기 전 숨을 수 있는 과거/정답/의존의 길을 정리하는 과정이다. D-3에는 세 관계의 클라이맥스가 발생하며, 각 성공 분기는 진엔딩에 필요한 감정 단서와 사고 단서를 제공한다. - 사고 단서는 사고를 없애기 위한 정보가 아니라, 다친 기억까지 안고 현실로 돌아가기 위한 기억 조각이다. - 게임 내 대사/UI에서는 `D-Day`라고 부르지 않고 `축제 2일차`, `축제 마지막 날`, `금요일`, `폐장 후`처럼 표현한다. - 장소/배경 묘사는 `14_장소와_배경_묘사.md`를 우선한다. 장소는 캐릭터 성격을 압도하지 않고, 하연은 조용한 가장자리, 소하는 익숙한 길, 서린은 업무의 질서, 미루는 스스로 해보는 임시 공간과 맞아야 한다.", "excerpt": "# 스토리 기획 문서 안내 스토리 기획은 세부 단계로 넘어가면서 문서를 주제별로 분리한다. ## 정본 기준 - 이 폴더의 번호 문서가 스토리 세부 정본이다. - 상위 `../스토리_컨셉.md`는 요약 인덱스이며, 세부 기준은 이 README와 00~14 문서를 따른다. - 문서 운용과 오래된 문서 삭제 기준은 [기획 문서 정본 가이드](../문서_정본_가이드.md)를 따른다. - 같은 내용이"}, {"path": "시스템/README.md", "category": "시스템", "title": "시스템 기획 문서 안내", "id": "시스템-readme-md", "html": "<h2 id=\"시스템-readme-md-시스템-기획-문서-안내\">시스템 기획 문서 안내<\/h2>\n<h3 id=\"시스템-readme-md-문서-목록\">문서 목록<\/h3>\n<ul>\n<li><a href=\"./미연시_코어_시스템_요구사항.md\">미연시 코어 시스템 요구사항<\/a><\/li>\n<li><a href=\"./하루_행동_시스템.md\">하루 행동 시스템<
