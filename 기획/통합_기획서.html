은 10대 고등학생으로 보이되, 선정적 표현 없이 깨끗하고 자연스럽게 그린다. - 선은 부드럽고, 색은 과포화보다 차분한 파스텔/내추럴 톤을 우선한다. 고정/가변 원칙: - 고정 요소: 나이대, 체형 실루엣, 얼굴 인상, 머리 길이와 기본 색, 눈빛, 캐릭터별 분위기. - 가변 요소: 복장 상태, 겉옷, 가방, 액세서리, 손에 든 물건, 상처/피로도, 배경 소품. - 같은 캐릭터라도 등교길, 수업 중, 방과후, 축제 준비, D-Day, 병실/루프 장면에서는 복장과 소품이 달라질 수 있다. - 프롬프트를 만들 때는 의상 후보와 소품 후보를 전부 넣지 말고, 장면에 맞는 1~3개만 선택한다. - 교복은 기본 생활권을 보여주는 기준일 뿐이며, 하복/춘추복/체육복/트레이닝복/축제 스태프 표식/병원복에 가까운 편한 옷 등으로 상황에 맞게 변형할 수 있다. - 단, 어떤 변형도 캐릭터의 취향·성격·생활 습관 안에서만 선택한다. 예쁘거나 화려하다는 이유만으로 뜬금없는 복장을 입히지 않는다. - AI 이미지 프롬프트에서 의상을 고를 때는 먼저 이 인물이 스스로 골랐을 법한가?, 이 장면에서 실제로 입을 이유가 있는가?를 확인한다. ### 유재윤 역할/인상: - 주인공. 조용히 배려하지만 자기 마음을 말하는 데 한 박자 늦는 남학생. - 교실에서는 평범하고 약간 피곤해 보이지만, 운동할 때는 빠르고 단단한 인상. - `착하지만 애매한 사람`이 아니라, 자기 마음을 미루는 습관 때문에 표정에 생각이 많은 느낌이 남아야 한다. 기본 프롬프트: ```text Korean high school boy, 17 years old, slightly tall, lean athletic build from ice hockey, short dark brown almost black hair, natural messy bangs slightly covering eyebrows, gentle dark eyes, thoughtful and slightly tired expression, scene-appropriate practical Korean high school outfit, understated and slightly worn styling, optional athletic wrist tape or small bandage only when the scene needs it, visual novel character art, soft natural lighting, realistic school romance mystery mood ``` 세부 외형: - 키/체형: 같은 학년 남학생 중 약간 큰 편. 어깨와 허벅지는 운동부답게 단단하지만, 과한 근육질은 아니다. 마른 운동부 실루엣. - 얼굴형: 날카롭기보다 부드러운 턱선. 무표정일 때는 멍해 보일 수 있지만, 가까이 보면 주변을 신경 쓰는 눈이다. - 머리: 검은색에 가까운 짙은 갈색. 손질을 많이 하지 않은 짧은 머리. 앞머리는 가끔 눈썹을 살짝 덮고, 운동 후에는 조금 흐트러진다. - 눈: 짙은 갈색. 눈매는 순하고, 피곤하거나 생각이 많을 때 초점이 늦게 따라온다. - 피부/상처: 건강한 피부톤. 손등, 손목, 팔에 작은 멍, 반창고, 운동 테이프 흔적이 가끔 있다. - 의상 후보: 하복/춘추복 교복, 흰 셔츠와 어두운 바지, 학교 넥타이, 조끼, 체육복, 어두운 트레이닝복, 하키 보호 장비 일부. 넥타이와 소매 상태는 장면의 피로도에 맞춰 조절한다. - 소품 후보: 아이스하키 스틱 가방, 낡은 스포츠백, 손목 테이프, 작은 반창고, 구겨진 프린트, 병원 팔찌, 휴대폰. 장면마다 필요한 것만 고른다. - 복장 취향/선택 기준: 재윤은 옷으로 자신을 드러내려 하지 않는다. 편하고 움직이기 쉬운 옷, 오래 입은 듯한 실용적인 옷, 살짝 흐트러졌지만 불량해 보이지 않는 상태가 어울린다. 하키 관련 소품은 운동 장면이나 피로 누적을 보여줄 때만 사용한다. - 어울리지 않는 복장: 화려한 스트리트 패션, 과한 액세서리, 완벽하게 꾸민 모델식 교복, 불량학생처럼 과장된 착장, 아이돌풍 의상. 색감: - 메인 색: 짙은 갈색, 네이비, 흰 셔츠, 회색 그림자. - 포인트 색: 손목 테이프의 흰색, 작은 반창고의 살구색. - 조명: 교실에서는 오후 햇빛, 병실 이후에는 차가운 흰빛과 창가 햇빛을 섞는다. 표정/포즈: - 기본 표정: 말하려다 멈춘 듯한 생각 많은 표정. - 하연 앞: 조심스럽게 시선을 맞추거나, 대답을 기다리는 얼굴. - 소하 앞: 편하고 장난스럽지만 완전히 풀어지지는 않음. - 서린 앞: 지적을 듣고 살짝 찔린 듯한 표정. - 미루 앞: 투덜대지만 챙겨주는 부드러운 표정. - 포즈: 한 손으로 뒷목을 만지거나, 손목 테이프를 감거나, 교실 창가에 기대어 바깥을 보는 자세. 장면별 변형: - 루프 반복: 눈 밑 피로감, 셔츠 구김, 손의 작은 상처가 조금씩 강조된다. - 빙판/하키 장면: 교복 대신 어두운 트레이닝복 또는 하키 보호 장비 일부. 관계 장면보다 눈빛이 빠르고 확실하다. - 진엔딩 후: 팔과 얼굴에 작은 처치 흔적. 큰 외상은 없지만, 병원에서 막 돌아온 듯한 창백함과 무거운 걸음. 금지 요소: - 지나치게 냉미남, 불량학생, 과한 근육질, 판타지 기사, 아이돌 스타일 금지. - 상처를 과하게 피투성이로 그리지 않는다. 핵심은 큰 외상보다 깨어나지 못한 상태다. ### 은하연 역할/인상: - 진히로인. 말수가 적고 감정 표현이 느리지만, 무심한 사람은 아니다. - 시끄러운 중심보다 조용한 가장자리에 서 있는 인물. - 전학생이지만 튀는 전학생이 아니라, 조용히 들어와 오래 시선에 남는 사람. 기본 프롬프트: ```text Korean high school girl, 17 years old, slightly below average height, slender and quiet posture, dark ash brown or soft black straight hair falling just below shoulders, neat see-through bangs not covering eyes, deep dark brown eyes, calm reserved expression with subtle sadness, scene-appropriate neat Korean high school outfit in quiet muted colors, optional thin cardigan or minimal accessory only when the scene needs it, standing near a quiet classroom window or edge of a school festival, visual novel heroine character art, soft muted colors, quiet melancholy romance mood ``` 세부 외형: - 키/체형: 평균보다 약간 작은 편. 체형은 가늘고 움직임이 조용하다. 존재감은 크지 않지만 시선이 오래 남는다. - 얼굴형: 작고 단정한 얼굴. 표정 변화가 적어 처음에는 차가워 보일 수 있다. - 머리: 어깨 아래로 살짝 내려오는 차분한 생머리. 검은색 또는 어두운 애쉬 브라운. 빛을 받으면 아주 약하게 갈색이 돈다. - 앞머리/옆머리: 앞머리는 눈을 가리지 않게 가볍게 정리. 고개를 숙이면 옆머리가 얼굴선을 조금 가린다. - 눈: 크기보다 깊이가 먼저 느껴지는 짙은 갈색 눈. 오래 응시하기보다 잠깐 보고 피하는 시선. - 의상 후보: 기본 교복, 얇은 크림색 또는 연회색 가디건, 단정한 리본/넥타이, 축제 당일의 간단한 스태프 표식, 병실 장면의 얇은 겉옷. 가디건은 하연의 대표 이미지지만 모든 장면에 반드시 넣지는 않는다. - 소품 후보: 작은 무광 머리핀, 얇은 손목끈, 구겨진 손수건, 문구 카드, 작은 메모지, 책 한 권, 접힌 축제 안내지. 장면마다 필요한 것만 고른다. - 복장 취향/선택 기준: 하연은 눈에 띄기보다 조용히 배경에 섞이는 옷을 고른다. 단정하고 얇고 가벼운 소재, 크림·회색·흰색처럼 낮은 채도의 색, 작은 장식 하나 정도가 어울린다. 가디건은 대표 선택지지만, 더운 날이나 축제 동선에서는 단정한 간 왜곡으로 불안감을 준다. - 프롬프트에서 특정 유명 작품명, 작가명, 실존 배우명, 유명 캐릭터명은 쓰지 않는다. 고유한 원작 캐릭터로 유지한다. ## 성격 기준 이 섹션은 캐릭터 대사, 이벤트 선택지, 이미지 프롬프트, 새드엔딩 왜곡을 판단하는 기준이다. 외형·복장·소품은 장면마다 달라질 수 있지만, 아래 성격 기준을 벗어나면 안 된다. | 인물 | 한 줄 성격 | 핵심 욕망 | 핵심 두려움 | 관계 왜곡 | | --- | --- | --- | --- | --- | | 유재윤 | 남의 마음을 배려하느라 자기 마음을 미루는 사람 | 아무도 상처 입히지 않고 옳은 선택을 하고 싶음 | 내가 고른 선택 때문에 누군가 다치는 것 | 회피와 유예 | | 은하연 | 조용히 느리게 마음을 여는 사람 | 자신의 속도를 존중받은 상태에서 마음을 말하고 싶음 | 시끄러운 관계 속에서 자기 마음이 지워지는 것 | 사고 기억에서 사라짐 | | 한소하 | 밝고 빠르지만 오래된 관계를 놓기 어려운 사람 | 재윤과의 익숙한 일상이 계속 의미 있기를 바람 | 재윤이 낯선 미래로 가며 자신을 두고 가는 것 | 과거 도피 | | 백서린 | 필요한 말을 먼저 정리해두는 책임감 강한 사람 | 모두가 덜 다치도록 상황을 통제하고 싶음 | 통제하지 못한 선택이 다시 사고로 이어지는 것 | 정답 의존 | | 나미루 | 불안하지만 혼자 해내고 싶은 마음이 있는 후배 | 도움받던 사람이 아니라 해낼 수 있는 사람이 되고 싶음 | 멘토링이 끝나면 자신도 관계도 버려지는 것 | 의존 고착 | ### 유재윤 성격 기준 > 남의 마음을 배려하느라 자기 마음을 미루던 사람. 기본 성격: - 조용히 배려하고, 상대의 불편함을 빨리 알아차린다. - 갈등을 크게 만들지 않으려고 말끝을 흐리거나 답을 미룬다. - 작은 책임은 잘 떠안지만, 큰 선택의 책임은 오래 미룬다. - 반 행사나 공동 작업에서는 먼저 주도하기보다 듣고 있다가 떠밀리듯 역할을 맡는 편이다. - 자기 마음을 직접 말하는 것은 서툴지만, 몸을 움직여 도와주는 일에는 빠르다. 장점: - 눈치가 빠르고, 상대가 말하지 않은 불안을 실무적인 도움으로 줄여준다. - 위급한 순간에는 계산보다 몸이 먼저 움직인다. - 누군가를 얕게 대하지 않고, 오래 이어진 관계를 쉽게 버리지 않는다. 결함: - 누군가를 상처 입히지 않기 위해 선택을 미루지만, 그 결과 모두에게 애매한 희망을 남긴다. - 갈등을 만들지 않으려는 태도가 때로는 갈등을 더 오래 지속시킨다. - `나중에 말해도 된다`는 생각으로 중요한 감정 표현을 늦춘다. - 자신이 다치거나 불편해지는 것은 감수하면서도, 상대가 상처받는 장면은 과하게 피하려 한다. 말투: - 평소에는 짧고 부드럽다. “아, 괜찮아.”, “내가 할게.”, “나중에 말해도 돼?”처럼 상대를 먼저 살피는 문장이 많다. - 당황하면 농담이나 변명보다 침묵이 먼저 나온다. - 진심을 말할 때는 문장이 길어지기보다, 짧은 문장을 끊어서 반복한다. - 하연 앞에서는 조심스럽게 묻고 기다린다. - 소하 앞에서는 편하게 받아치지만, 중요한 이야기가 나오면 말을 흐린다. - 서린 앞에서는 정답을 묻는 말투가 나오기 쉽다. - 미루 앞에서는 투덜대면서도 행동으로 먼저 챙긴다. 취미/대비: - 학교 밖 지역 아이스링크에서 아이스하키를 한다. - 포지션은 윙어. - 빠른 가속과 측면 돌파를 좋아하지만, 무리한 슛보다 패스를 자주 고른다. - 평소에는 선택을 미루는 편이지만, 빙판 위에서는 오래 망설이지 않는다. 빙판 위에서는 틈을 보면 바로 들어가지만, 사람 마음 앞에서는 늘 한 박자 늦는다. 빙판 위에서는 위험한 순간 몸을 던질 수 있지만, 관계에서는 마음을 말해야 하는 순간을 자주 미룬다. 관계별로 재윤이 남긴 유예: | 인물 | 재윤이 미룬 것 | 루프 안에서의 의미 | | --- | --- | --- | | 한소하 | 오래된 관계에 분명한 선을 긋지 않음 | 아무 일도 없던 과거로 돌아가고 싶은 회피 | | 백서린 | 스스로 고르기보다 정답을 맡기려 함 | 선택의 책임을 넘기고 싶은 마음 | | 나미루 | `언제든 도와줄게`라는 말로 멘토링 종료를 흐리게 함 | 필요한 사람으로 남아 현실 복귀를 늦추고 싶은 마음 | | 은하연 | 좋아한다는 마음을 제때 말하지 못함 | 루프를 끝내기 위해 인정해야 하는 진짜 선택 | 진엔딩 변화: - 처음으로 자기 선택을 끝까지 책임진다. - `[하연에게 돌아간다]`는 단순히 깨어나는 선택이 아니라, 이번엔 자기 마음을 미루지 않겠다는 선택이다. - 진엔딩 후에는 무리하게 씩씩한 척하지 않고, 늦더라도 직접 말하려는 사람으로 남는다. ### 은하연 성격 기준 고등학교 2학년 1학기 말, 축제 약 4주 전 2학년 5반으로 전학 온 학생. 주인공은 전학 첫날 하연에게 첫눈에 반한다. 기본 성격: - 말수가 적고 감정 표현이 느리다. - 차가워 보일 수 있지만 무심한 것은 아니다. - 사람 많은 중심보다 가장자리에서 상황을 관찰하는 편이다. - 작은 배려를 크게 드러내지 않고 조용히 한다. - 자신의 속도를 침범받으면 물러나지만, 기다려주는 사람에게는 조금씩 마음을 연다. - 시끄럽고 과하게 들뜬 분위기보다 오래 있어도 피곤하지 않은 조용한 공간을 선호한다. 장점: - 말은 적지만, 한 번 마음에 둔 말과 행동을 오래 기억한다. - 상대가 자신을 억지로 끌고 가지 않는지 민감하게 알아차린다. - 직접 나서서 분위기를 장악하지 않아도, 조용한 방향성을 제안할 수 있다. - 재윤이 기다려주면 그 기다림을 허투루 넘기지 않는다. 결함/취약점: - 중요한 말을 바로 꺼내지 못하고, 먼저 조용한 곳으로 물러나는 습관이 있다. - 자기 마음을 강하게 주장하는 데 익숙하지 않아, 반 분위기나 다른 사람의 속도에 쉽게 묻힌다. - 상대가 알아차려주기를 기다리는 시간이 길어질 수 있다. - 상처받았을 때 화를 내기보다 조용히 멀어져, 오해가 오래 남을 수 있다. 말투: - 짧고 낮은 문장을 쓴다. “괜찮아.”, “그쪽이 조용해서.”, “조금만.”처럼 설명을 많이 붙이지 않는다. - 친밀도가 낮을 때는 필요한 답만 하고 시선을 오래 두지 않는다. - 친밀도가 오르면 말수가 크게 늘기보다, 같은 짧은 말 안에 이유를 조금 더 붙인다. - 고백이나 진심 장면에서도 감정을 과하게 터뜨리지 않는다. 대신 멈춤, 숨 고르기, 늦은 한 문장으로 마음을 드러낸다. 관계 변화: | 단계 | 태도 | | --- | --- | | 초반 | 전학생으로서 가장자리에 머물고, 반 행사에도 적극적으로 나서지 않는다. | | 신뢰 상승 | 재윤에게 짧은 취향과 동선을 흘리고, 그가 알아차리는지 본다. | | D-2 예감 | 직접 약속하지 않고, 조용한 곳에서 마음을 정리하는 사람임을 재윤이 이해하게 만든다. | | D-Day | 하연이 부르는 것이 아니라, 재윤이 하연이 있을 곳을 알아차려 찾아와야 한다. | | 진엔딩 후 | 여전히 조용하지만, 다음 약속을 피하지 않고 작게 받아들인다. | 루프 왜곡: - 하연과 서로의 마음을 확인하지 못하면, 내면세계는 사고 기억에서 하연을 지워버린다. - 이때 재윤은 폐장 후 야외 소무대에 혼자 서 있고, 자신이 누구에게 가려 했는지 기억하지 못한 채 사고를 반복한다. - 하연은 사라진 히로인이 아니라, 재윤이 선택을 기억하지 못해 놓친 목적지다. ### 한소하 성격 기준 주인공을 오래 좋아해 온 진짜 소꿉친구. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니다. 등굣길과 쉬는 시간, 방과후에 자연스럽게 마주치는 관계다. 기본 성격: - 밝고 활동적이며, 오래 알고 지낸 사람에게는 거리감이 거의 없다. - 재윤의 작은 변화와 거짓말을 빨리 눈치챈다. - 장난스럽고 투덜대는 말투 뒤에 서운함을 숨긴다. - 자기 반 행사나 공동 작업에서는 후보를 줄이고 사람들을 움직이는 생활력이 있다. - 익숙한 관계를 소중히 여기지만, 그 익숙함이 흔들릴 때 방어적으로 굴 수 있다. 장점: - 분위기를 빠르게 읽고 먼저 움직인다. - 오래된 관계를 가볍게 여기지 않는다. - 재윤이 도망치는 말을 할 때 가장 먼저 이상함을 알아차린다. - 감정이 깊지만, 상대를 악역으로 몰아세우지 않을 여지가 있다. 결함/취약점: - 오래된 친밀함을 근거로 재윤의 현재 마음도 당연히 자신이 잘 안다고 생각하기 쉽다. - 불안할수록 더 장난스럽게 굴거나, 평소처럼 굴어 문제를 덮으려 한다. - 하연을 직접 공격하기보다 재윤이 변했다는 사실 자체에 서운함을 느낀다. - `예전처럼`이라는 말이 따뜻한 추억이 아니라 도피처가 될 수 있다. 말투: - 재윤에게는 편하고 조금 거친 호칭을 쓴다. “야, 유재윤.”이 기본이다. - 농담, 핀잔, 반말이 많지만 악의적이지 않다. - 서운할수록 웃는 말투가 짧아지고, 장난 뒤에 날이 선다. - 중요한 장면에서는 일부러 아무렇지 않은 척하다가 끝에 진심이 새어 나온다. 관계 변화: | 단계 | 태도 | | --- | --- | | 초반 | 오래된 등굣길과 편한 장난으로 재윤의 일상 기준점이 된다. | | 하연 등장 후 | 하연을 노골적으로 견제하기보다, 재윤이 달라진 것을 먼저 눈치챈다. | | 압박 상승 | `예전처럼` 돌아가자는 말이 많아지고, 익숙한 장소와 습관으로 재윤을 붙잡는다. | | 정리 성공 | 재윤이 하연을 좋아했다는 사실을 인정하고, 오래된 관계를 거짓 과거로 만들지 않는다. | | 진엔딩 후 | 잔소리와 장난은 남지만, 재윤을 붙잡는 과거가 아니라 돌아올 수 있는 자리로 남는다. | 새드엔딩 왜곡: - 따뜻한 등굣길, 오래된 편의점, 같은 햇빛이 반복된다. - 편안하지만 날짜가 앞으로 나아가지 않는다. - 소하는 악역이 아니라, 아무 일도 없던 과거에 머물고 싶은 마음의 얼굴이다. ### 백서린 성격 기준 3학년 7반. 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배. 축제 기간에는 말과 순서, 방송 흐름, 지원 동선을 정리한다. 기본 성격: - 침착하고 책임감이 강하다. - 감정을 크게 드러내기보다 필요한 일과 필요한 말을 먼저 정리한다. - 압박이 큰 상황에서 먼저 판단하고, 다른 사람이 당황하지 않도록 순서를 제공한다. - 틀리는 것보다 애매한 상태로 방치되는 것을 더 불안해한다. - 차갑게 보이지만, 실제로는 누군가가 덜 다치게 하려는 책임감이 강하다. 장점: - 복잡한 상황을 구조화하고 우선순위를 잡는 데 능하다. - 재윤이 당황했을 때 실제로 도움을 준 경험이 있어 신뢰의 근거가 있다. - 감정 상담도 즉흥 위로보다 기준을 나눠주는 방식으로 한다. - 진짜 성장은 재윤이 정답을 받는 것이 아니라 자기 이유를 찾게 만드는 방향으로 이끈다. 결함/취약점: - 책임감이 커질수록 선택권까지 대신 쥐려 한다. - 상대가 틀릴 가능성을 견디기 어려워, 안전한 답을 먼저 제시한다. - 자신의 불안과 죄책감을 `관리`와 `순서`로 덮는다. - 다정함을 직접 표현하기보다 지시나 점검으로 바꾸기 때문에 오해받기 쉽다. 말투: - 짧고 정확하다. 불필요한 수식어가 적다. - “정리해.”, “구분해.”, “그 질문은 틀렸어.”처럼 기준을 세우는 문장이 많다. - 화가 나도 목소리를 높이기보다 문장이 더 차가워진다. - 인정할 때도 칭찬을 길게 하지 않고, 자료를 넘기거나 다음 행동을 맡기는 방식으로 표현한다. - 상담 장면에서는 감정을 대신 결론 내리지 않고, 감정을 분류할 기준을 준다. 관계 변화: | 단계 | 태도 | | --- | --- | | 초반 | 재윤에게 정확한 순서와 안정감을 주는 선배다. | | 의존 상승 | 재윤이 스스로 고르지 않아도 되게 선택지를 정리해준다. | | D-9 상담 | 좋아함, 미안함, 책임감, 익숙함을 구분하게 하지만 결론은 대신 고르지 않는다. | | D-3 정리 | `정답`이 아니라 재윤이 고른 이유를 끝까지 보라고 말한다. | | 진엔딩 보조 | 점검표와 단서를 넘기며 통제 대신 선택권을 돌려준다. | 새드엔딩 왜곡: - 방송실, 학생회실, 일정표가 지나치게 정돈된다. - 모든 위험은 통제되지만, 재윤이 고른 것은 없다. - 서린은 냉혹한 악역이 아니라, 다시 다치게 만들지 않기 위해 선택을 대신하려는 책임감의 얼굴이다. ### 나미루 성격 기준 1학년 3반. 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원. 재윤의 `1학기 한정 학습·학교생활 적응 멘토링` 대상이다. 기본 성격: - 불안이 많고, 질문하기 전에 먼저 미안해한다. - 도움받는 일에 익숙하지만, 마음속에는 혼자 해내고 싶은 욕구가 있다. - 칭찬이나 작은 성공에 크게 안심한다. - 상대의 반응을 살피며, 거절당할 가능성을 과하게 걱정한다. - 준비물을 꼼꼼히 챙기려 하지만, 긴장하면 순서를 놓치기 쉽다. 장점: - 배운 것을 기억하려고 노력하고, 작은 메모와 체크리스트를 성실히 쓴다. - 겁이 많아도 완전히 포기하지 않는다. - 자신이 해낸 일을 인정받으면 다음 행동으로 이어갈 수 있다. - 진엔딩 쪽에서는 `도움받는 후배`에서 `혼자 해보는 후배`로 성장할 수 있다. 결함/취약점: - 불안할수록 스스로 확인하기보다 재윤에게 마지막 판단을 맡기려 한다. - `선배가 없으면 못 한다`는 생각이 강해지면, 멘토링 종료를 관계의 끝으로 착각한다. - 상대가 자신을 떠날까 봐 먼저 붙잡고, 그 붙잡음이 죄책감으로 변할 수 있다. - 작은 실수도 크게 받아들여 자신이 사고를 만들었다고 믿기 쉽다. 말투: - 조심스럽고 사과가 앞선다. “죄송한데요.”, “이거 맞아요?”, “제가 해도 돼요?” 같은 문장이 많다. - 재윤에게는 `선배` 호칭을 자주 붙인다. - 불안하면 말이 길어지고, 같은 확인을 반복한다. - 성장 후에는 “제가 먼저 해봤어요.”처럼 결과를 들고 온다. - 감정이 터질 때도 공격적이기보다 울먹이며 붙잡는 쪽에 가깝다. 관계 변화: | 단계 | 태도 | | --- | --- | | 초반 | 재윤에게 확인받아야 안심하는 후배다. | | 의존 상승 | 과제, 발표, 행사 신청처럼 스스로 할 수 있는 일도 재윤에게 맡기려 한다. | | 단서 획득 | 출입 제한 표지, 고정끈, 도움 인원 동선처럼 사고 현장과 연결된 작은 단서를 가져온다. | | 정리 성공 | 재윤이 대신 해주지 않아도, 자신이 먼저 해볼 수 있음을 받아들인다. | | 진엔딩 후 | 멘토링 종료를 이별이 아니라 다음 관계로 넘어가는 약속으로 받아들인다. | 새드엔딩 왜곡: - 학교 복도와 교실이 미루의 방처럼 좁아진다. - 체크리스트는 끝나지 않고, 방학식 안내문은 문밖에만 있다. - 미루는 약한 아이가 아니라, 끝나는 관계를 견디지 못해 재윤을 꿈속에 붙잡는 의존의 얼굴이다. ## 일반 히로인 구조 한소하, 백서린, 나미루는 현실에도 존재하며 주인공과 인연이 있는 사람들이다. 내면세계의 이들은 다음 요소가 합쳐진 존재다. > 현실 인물의 관계 기억 + 주인공의 감정 방어기제 + 사고 이후 혼수상태에서 굳어진 미련과 회피 일반 히로인 진행은 현실 인물과 실제 연애를 완성하는 것이 아니다. 진행의 의미: - 현실 인연을 떠올림 - 내면세계가 덧씌운 미련, 회피, 의존을 분리함 - 사고의 진실과 하연에게 돌아가야 할 이유를 회복함 ## 관계 축 | 캐릭터 | 관계 축 | 의미 | | --- | --- | --- | | 한소하 | 과거 | 오래된 소꿉친구, 익숙한 관계로 돌아가고 싶은 마음 | | 백서린 | 정답 | 흔들릴 때 방향을 잡아주던 선배에게 선택을 맡기고 싶은 마음 | | 나미루 | 의존 | 자신을 믿고 따르던 후배를 지켜줘야 한다는 책임감 | | 은하연 | 선택 | 처음으로 자기 마음을 미루지 않고 향해야 하는 사람 | ## 캐릭터별 현실 관계 ### 한소하 주인공을 오래 좋아해 온 진짜 소꿉친구. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니다. 등굣길과 쉬는 시간, 방과후에 자연스럽게 마주치는 관계다. 소하는 재윤보다 적극적으로 움직이는 편이다. 축제 같은 공동 행사에서는 자기 반 안에서 후보를 줄이고 사람들을 움직이려 하며, 가만히 듣고만 있는 재윤과 대비된다. 다만 하연 전학 직후에는 하연을 직접 견제하기보다 재윤이 평소와 다르게 멍한 것을 눈치채는 정도에 머문다. 내면세계에서는 `돌아가고 싶은 평범한 과거`와 `하연에게 향한 마음을 회피하고 싶은 마음`을 상징한다. ### 백서린 3학년 7반. 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배. 3학년은 축제 반 행사를 직접 준비하지 않고 참가하며, 서린은 학생회/방송반 소속으로 축제 진행 지원과 방송 흐름을 맡고 있다. 축제 기간 서린의 역할은 단순 안내 방송 하나가 아니라, 축제 전체의 말과 순서를 정리하는 쪽에 가깝다. - 교내 방송 멘트 정리 - 각 반 행사 소개 문구 취합 - 방송 큐시트 작성 - 진행 순서 확인 - 분실물 / 호출 방송 문구 준비 - 방송 장비 체크 - 학생회 쪽 동선 공지와 방송 문구 연결 - 당일 돌발 상황용 멘트 템플릿 준비 현실의 서린은 들뜬 사람들을 통제하려는 사람이 아니라, 축제처럼 말이 많고 순서가 쉽게 꼬이는 상황에서 필요한 말을 먼저 준비해두는 사람이다. 이 장점이 내면세계에서는 `사람들이 말하기 전에 필요한 말을 미리 정해두는 통제`로 뒤틀릴 수 있다. 재윤은 방송반에서 마이크 앞에 서는 아나운서 역할이 아니다. 앞에서 말하는 사람보다, 방송이 끊기지 않도록 뒤에서 받쳐주는 기술/대본 보조 역할에 가깝다. - 마이크 테스트 - 스피커 출력 확인 - 케이블 연결과 장비 전원 순서 확인 - 믹서 / 볼륨 확인 - 반별 행사 소개 문구 취합 - 대본 순서 정렬 - 수정본 / 최종본 구분 - 인쇄본 번호 붙이기 - 큐시트와 대본 매칭 - 리허설 중 빠진 멘트 표시 - 방송실 안에서 다음 멘트와 장비 상태를 조용히 준비 주인공은 1학년 때 방송반에 들어갔고, 첫 방송이나 행사 안내에서 장비 전원 순서와 대본 넘기는 타이밍을 놓칠 뻔한 적이 있다. 그때 서린이 침착하게 상황을 수습해주었다. > 괜찮아. 당황하지 말고, 내가 말하는 순서대로 해. 이후 주인공에게 서린은 `당황했을 때 정답을 알려주는 사람`, `실수해도 상황을 바로잡아주는 사람`, `내가 틀리지 않게 해주는 선배`로 각인되었다. 재윤에게 방송반 일은 앞에 나서서 말하는 일이 아니라, 정해진 순서가 끊기지 않게 뒤에서 맞추는 일이 되었다. 이런 경험 때문에 서린은 재윤에게 유능하지만 차가운 사람이 아니라, 압박이 큰 상황에서 먼저 판단하고 책임지는 사람으로 남아 있다. 다만 내면세계에서는 그 신뢰가 `선택을 대신해주는 통제`로 뒤틀린다. 내면세계에서는 `선택을 잘못했다는 불안`, `서린에게 의지하던 기억`, `그 밤을 통제하지 못했다는 서린의 책임감`이 합쳐진 존재다. ### 나미루 1학년 3반. 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원. 현실의 미루는 1학년 초반 학교생활 적응과 성적 문제로 힘들어했고, 주인공은 선생님 또는 학생회 부탁으로 미루의 `1학기 한정 학습·학교생활 적응 멘토`를 맡았다. 이 멘토링은 단순한 학교생활 안내만이 아니라, 학교 안에서 혼자 해내야 하는 일들을 처음 몇 달 동안 재윤이 옆에서 같이 정리해준 관계다. 현재는 1학기 말이라 멘토링 종료까지 얼마 남지 않았고, 축제 2일차 뒤 D+3 월요일 방학식이 오면 공식적으로 끝난다. 미루는 선배에게 계속 기대고 싶은 마음과 혼자 해내야 한다는 부담을 동시에 느낀다. 멘토링 범위: - 수학이나 영어 기초 보충 - 수행평가 정리 - 발표문 준비와 발표 연습 - 시험 전 공부 계획 확인 - 제출물, 준비물, 마감일 정리 - 학교생활 적응 - 선생님이나 선배에게 질문하는 법 - 동아리, 봉사활동, 행사 신청 도움 - 행사 도움 인원 역할 이해 - 모르는 일이 생겼을 때 누구에게 보고할지 정하기 멘토링은 사적인 보호자 역할이나 매일 붙어 다니는 관계가 아니다. 학교 안에서 혼자 해야 할 일을 처음부터 모두 떠안기지 않고, 질문하는 법과 정리하는 법을 같이 연습해준 관계에 가깝다. 방학식 이후에는 재윤과 미루가 완전히 남이 되는 것이 아니라, `멘토링 관계`가 끝나고 평범한 선후배 관계로 바뀐다. 미루가 주인공을 특별하게 따르는 이유는 단순한 선후배 호감이 아니라, 힘들 때 실제로 도와준 사람이 주인공이었기 때문이다. 축제 도움 인원에 참여하게 된 것도 주인공의 격려와, 멘토링이 끝나기 전에 혼자 해낼 수 있는 일을 만들어보고 싶은 마음이 계기다. > 너도 할 수 있어. 너무 겁먹지 마. 이 말은 현실에서는 미루를 앞으로 나아가게 한 말이지만, 사고 이후 내면세계에서는 미루의 죄책감으로 뒤틀린다. 미루의 작은 실수는 안전 관리 부실, 철거 지연, 우연한 바람과 겹쳐 사고에 일부 연결된다. 내면세계에서는 `깨어나기 싫은 마음`, `곧 끝나는 멘토링을 끝내고 싶지 않은 마음`, `미루가 주인공에게 의지하던 관계`, `사고에 대한 미루의 죄책감`이 합쳐진 존재다. 루프 안에서 의존이 굳어진 미루는 주인공에게 이렇게 매달린다. > 선배가 없으면 저는 아무것도 못 해요.", "excerpt": "# 캐릭터와 관계 ## 유재윤 / 주인공 고등학교 2학년 5반 남학생. 이름은 유재윤. 평소 서술에서는 `주인공`으로 부르되, 인물 간 대사와 감정 장면에서는 `재윤`이라는 이름을 사용한다. 호칭 예시: - 은하연: 재윤아 - 한소하: 야, 유재윤 - 백서린: 재윤아 - 나미루: 재윤 선배 학년/반 기준: | 인물 | 학년/반 | 비고 | | --- | --- | --- | | 유재윤 | 2"}, {"path": "스토리/03_진행구조_진엔딩조건.md", "category": "스토리", "title": "진행 구조와 진엔딩 조건", "id": "스토리-03진행구조진엔딩조건-md", "html": "<h2 id=\"스토리-03진행구조진엔딩조건-md-진행-구조와-진엔딩-조건\">진행 구조와 진엔딩 조건<\/h2>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-병렬-진행-구조\">병렬 진행 구조<\/h3>\n<p>일반 히로인 루트는 병렬적으로 진행된다. 한 명씩 완전히 끝내고 다음으로 넘어가는 구조가 아니다.<\/p>\n<p>플레이어는 날짜별로 누구와 시간을 보낼지 선택한다.<\/p>\n<pre><code>[하연과 시간을 보낸다]\n[소하와 등교한다]\n[서린을 돕는다]\n[미루의 멘토링을 봐준다]\n[축제 준비를 조사한다]<\/code><\/pre>\n<p>하연 등장 후 약 4주 안에 다음 조건을 충분히 채워야 한다.<\/p>\n<ol>\n<li>하연과의 상호 마음 확인<\/li>\n<li>기존 관계 정리<\/li>\n<li>사고 단서 확보<\/li>\n<\/ol>\n<p>조건을 만족하면 은하연 진엔딩 루트와 해피엔딩 선택지가 열린다. 조건을 만족하지 못하면 내부 기준 D-Day 금요일 사고 후, 예정된 D+3 월요일 방학식에 도달하지 못하고 루프한다.<\/p>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-루프가-반복되는-이유\">루프가 반복되는 이유<\/h3>\n<p>루프는 사고를 완벽히 피할 정답을 찾기 위한 장치가 아니다. 재윤이 <code>하연을 좋아했다<\/code>는 마음, <code>하연 역시 마음을 전하려 했다<\/code>는 사실, <code>그 선택 끝에 다쳤다<\/code>는 기억을 동시에 받아들이지 못하기 때문에, 내면세계는 D-Day 금요일 다음의 D+3 월요일 방학식으로 넘어가지 못한다.<\/p>\n<p>하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 사고 기억에서 하연을 잃는다. 폐장 후 학교 뒤편 야외 소무대에 혼자 서 있고, 누가 자신을 불렀는지 또는 누구에게 가려 했는지 기억하지 못한 채 사고를 반복한다.<\/p>\n<p>재윤이 끝내지 못한 것들:<\/p>\n<ol>\n<li>한소하와의 오래된 관계를 아무 일도 없던 과거로 덮지 않기<\/li>\n<li>백서린에게 맡겨두던 선택권을 되찾기<\/li>\n<li>나미루의 멘토링 종료와 독립을 받아들이기<\/li>\n<li>은하연과 서로의 마음을 확인하고, 그 마음을 늦추지 않고 인정하기<\/li>\n<li>사고의 결과까지 기억하고 현실로 돌아가기<\/li>\n<\/ol>\n<p>따라서 루프의 종료 조건은 <code>가장 안전한 선택<\/code>을 찾는 것이 아니라, 재윤이 미뤄온 관계와 기억을 끝내고 금요일 다음 월요일을 받아들이는 것이다.<\/p>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-진엔딩-조건\">진엔딩 조건<\/h3>\n<p>진엔딩은 하연만 따라간다고 열리지 않는다.<\/p>\n<p>주인공은 하연에게 도달하는 동시에, 기존 관계에 남은 미련과 후회, 사고의 진실도 마주해야 한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>축<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td>하연과의 상호 마음 확인<\/td><td>하연과 서로 마음을 확인할 만큼 신뢰와 관계를 쌓았는가<\/td><\/tr><tr><td>관계 정리<\/td><td>소하/서린/미루에게 남은 미련, 회피, 의존을 외면하지 않았는가<\/td><\/tr><tr><td>사고 단서<\/td><td>축제 마지막 날 사고의 진실과 그 밤의 선택 의미에 도달했는가<\/td><\/tr><\/tbody><\/table><\/div>\n<p>세 조건의 의미:<\/p>\n<ul>\n<li>하연과의 상호 마음 확인: 재윤이 정말 향하고 싶었던 마음을 인정하고, 하연도 그 마음을 말할 수 있을 만큼 가까워졌는가.<\/li>\n<li>기존 관계 정리: 아무 일도 없던 과거, 대신 정해주는 정답, 누군가에게 필요한 사람으로 남는 도피를 정리했는가.<\/li>\n<li>사고 단서 확보: 자신이 선택한 마음의 결과까지 기억했는가.<\/li>\n<\/ul>\n<h4 id=\"스토리-03진행구조진엔딩조건-md-조건-a-하연과의-상호-마음-확인\">조건 A: 하연과의 상호 마음 확인<\/h4>\n<p>예시:<\/p>\n<ol>\n<li>첫 대화<\/li>\n<li>하연이 조용한 공간과 자기 속도를 말하는 핵심 대화<\/li>\n<li>축제 1일차 부스 운영과 축제 2일차의 말하지 못한 예감<\/li>\n<li>축제 마지막 날 하연의 감정과 동선을 알아차릴 만큼의 신뢰 형성. 하연을 충분히 공략해야 폐장 후 하연이 있을 곳을 짐작하고 재윤이 먼저 찾아갈 수 있음<\/li>\n<\/ol>\n<h4 id=\"스토리-03진행구조진엔딩조건-md-조건-b-기존-관계-정리\">조건 B: 기존 관계 정리<\/h4>\n<ul>\n<li>한소하: 익숙한 과거에 머무르지 않음.<\/li>\n<li>백서린: 누군가가 대신 정해주는 선택지를 거부하고 선택권을 되찾음.<\/li>\n<li>나미루: 곧 끝나는 멘토링의 불안을 대신 책임지지 않고, 끝나도 사라지지 않는 관계로 정리함.<\/li>\n<\/ul>\n<h4 id=\"스토리-03진행구조진엔딩조건-md-조건-c-사고-단서-확보\">조건 C: 사고 단서 확보<\/h4>\n<ul>\n<li>한소하 단서: 주인공이 하연을 좋아했다는 사실.<\/li>\n<li>백서린 단서: 소무대 임시 구조물의 위험.<\/li>\n<li>나미루 단서: 출입금지 표지 / 고정끈 문제.<\/li>\n<li>하연 단서: 서로 말하려던 장소, 끊긴 문장, 혼자가 아니었던 사고 기억.<\/li>\n<\/ul>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-4주-병렬-이벤트-단계표\">4주 병렬 이벤트 단계표<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>기간<\/th><th>목표<\/th><th>주요 변화<\/th><\/tr><\/thead><tbody><tr><td>Week 1: D-25 ~ D-19<\/td><td>하연 등장 / 적응 / 관계 변화 시작<\/td><td>하연에게 첫눈에 반함. D-23에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공지하며 목표 기간이 명확해짐. 기존 히로인들은 아직 비교적 정상.<\/td><\/tr><tr><td>Week 2: D-18 ~ D-12<\/td><td>2학년 5반 반행사 <code>쉬어가 카페<\/code> 확정 / 축제 준비 진입 / 관계 확장 / 기억과 감정의 미세한 어긋남<\/td><td>2학년 5반 축제 준비를 통해 하연과 가까워지고, 선택 결과가 세계에 조금씩 반영되며 아주 약한 어긋남이 시작됨. 기존 히로인들이 하연을 의식하기 시작함. 주말 학교 밖 이벤트로 사적인 면을 보여줌.<\/td><\/tr><tr><td>Week 3: D-11 ~ D-5<\/td><td>관계 균열 심화 / 사고 단서 구체화<\/td><td>소하/서린/미루에게 남은 미련, 선택 회피, 의존이 눈에 띄고, 소무대와 안전 단서가 구체화됨.<\/td><\/tr><tr><td>Final Week: D-4 ~ D-1<\/td><td>기억 회복 심화 / 관계 정리 클라이맥스 / 축제 1일차<\/td><td>소하/서린/미루 관계 정리 클라이맥스 해결. D-2에는 하연이 조용한 곳에서 마음을 정리하는 사람이라는 감각을 남기고, D-1 목요일 축제 1일차에는 부스 운영 중심으로 재윤과 하연이 <code>쉬어가 카페<\/code>를 함께 운영하며 가까워지고, 축제 마지막 날 선택 가능 조건을 최종 확인함.<\/td><\/tr><tr><td>D-Day<\/td><td>축제 2일차 / 사고 재현 / 엔딩 분기<\/td><td>부스는 축소 운영되고, 재윤은 히로인들과 축제를 둘러보는 선택을 한다. 하연 공략이 충분하면 폐장 후 하연이 조용한 소무대 쪽으로 향했다는 것을 재윤이 알아차려 직접 찾아가며, 부족하면 하연의 동선과 사고 기억이 비어 혼자 소무대 사고로 루프한다. 조건에 따라 진엔딩, 새드엔딩, 루프, 히든 엔딩 방향으로 분기한다. 진엔딩에서는 금요일 밤 이후 토요일 표기 없이 일요일 오후 병실로 점프함.<\/td><\/tr><tr><td>D+3 월요일<\/td><td>방학식 예정 / 도달하지 못하는 다음 월요일 / 방학으로 이어지는 진엔딩<\/td><td>첫 회차 표면상으로는 축제 2일차 뒤 주말을 지나 맞는 방학식. 실패 루프에서는 도달하지 못하며, 진엔딩에서는 방학 동안 하연과 재윤이 계속 만날 작은 약속과 엔딩 크레딧으로 이어짐.<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-축제-마지막-날-선택지\">축제 마지막 날 선택지<\/h3>\n<p>조건이 부족하면 회피와 미련에 묶인 선택지만 보인다.<\/p>\n<pre><code>[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>조건을 충족하면 진엔딩 선택지가 열린다.<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>완전 조건 충족 시:<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<h3 id=\"스토리-03진행구조진엔딩조건-md-조건-부족-시-분기-의미\">조건 부족 시 분기 의미<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>부족한 조건<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>하연 이해/상호 마음 확인 부족<\/td><td>재윤이 폐장 후 하연의 동선을 알아차리지 못하고, 하연이 사고 기억에서 빠진다. 재윤은 혼자 야외 소무대에서 왜 왔는지 모른 채 사고를 반복한 뒤 루프함. 방학식과 크레딧에는 도달하지 않음<\/td><\/tr><tr><td>소하 관계 정리 부족<\/td><td>아무 일도 없던 과거에 머무르는 새드엔딩. 방학은 따뜻한 과거의 등굣길로 왜곡되고, 짧은 가짜 크레딧만 허용<\/td><\/tr><tr><td>서린 관계 정리 부족<\/td><td>정해진 선택지와 안전한 순서에 갇히는 새드엔딩. 방학은 일정표 안에서 정지되고, 차갑고 정돈된 가짜 크레딧만 허용<\/td><\/tr><tr><td>미루 관계 정리 부족<\/td><td>필요한 사람으로 남기 위해 꿈속에 머무르는 새드엔딩. 방학은 문밖에만 있고, 달콤하지만 불안한 가짜 크레딧만 허용<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>사고를 떠올려도 하연에게 가려던 선택의 의미를 연결하지 못하고 루프함<\/td><\/tr><tr><td>모든 조건 충족<\/td><td>재윤이 먼저 하연에게 마음과 선택을 말하고, 하연과 마음을 확인한 밤을 기억한 채 다친 기억까지 안고 현실로 돌아감. D+3 방학식 이후에는 둘이 방학 동안 계속 만날 것을 암시하는 후일담과 엔딩 크레딧으로 연결됨<\/td><\/tr><\/tbody><\/table><\/div>", "headings": [{"level": 1, "text": "진행 구조와 진엔딩 조건", "id": "스토리-03진행구조진엔딩조건-md-진행-구조와-진엔딩-조건"}, {"level": 2, "text": "병렬 진행 구조", "id": "스토리-03진행구조진엔딩조건-md-병렬-진행-구조"}, {"level": 2, "text": "루프가 반복되는 이유", "id": "스토리-03진행구조진엔딩조건-md-루프가-반복되는-이유"}, {"level": 2, "text": "진엔딩 조건", "id": "스토리-03진행구조진엔딩조건-md-진엔딩-조건"}, {"level": 3, "text": "조건 A: 하연과의 상호 마음 확인", "id": "스토리-03진행구조진엔딩조건-md-조건-a-하연과의-상호-마음-확인"}, {"level": 3, "text": "조건 B: 기존 관계 정리", "id": "스토리-03진행구조진엔딩조건-md-조건-b-기존-관계-정리"}, {"level": 3, "text": "조건 C: 사고 단서 확보", "id": "스토리-03진행구조진엔딩조건-md-조건-c-사고-단서-확보"}, {"level": 2, "text": "4주 병렬 이벤트 단계표", "id": "스토리-03진행구조진엔딩조건-md-4주-병렬-이벤트-단계표"}, {"level": 2, "text": "축제 마지막 날 선택지", "id": "스토리-03진행구조진엔딩조건-md-축제-마지막-날-선택지"}, {"level": 2, "text": "조건 부족 시 분기 의미", "id": "스토리-03진행구조진엔딩조건-md-조건-부족-시-분기-의미"}], "plain": "# 진행 구조와 진엔딩 조건 ## 병렬 진행 구조 일반 히로인 루트는 병렬적으로 진행된다. 한 명씩 완전히 끝내고 다음으로 넘어가는 구조가 아니다. 플레이어는 날짜별로 누구와 시간을 보낼지 선택한다. ```text [하연과 시간을 보낸다] [소하와 등교한다] [서린을 돕는다] [미루의 멘토링을 봐준다] [축제 준비를 조사한다] ``` 하연 등장 후 약 4주 안에 다음 조건을 충분히 채워야 한다. 1. 하연과의 상호 마음 확인 2. 기존 관계 정리 3. 사고 단서 확보 조건을 만족하면 은하연 진엔딩 루트와 해피엔딩 선택지가 열린다. 조건을 만족하지 못하면 내부 기준 D-Day 금요일 사고 후, 예정된 D+3 월요일 방학식에 도달하지 못하고 루프한다. ## 루프가 반복되는 이유 루프는 사고를 완벽히 피할 정답을 찾기 위한 장치가 아니다. 재윤이 `하연을 좋아했다`는 마음, `하연 역시 마음을 전하려 했다`는 사실, `그 선택 끝에 다쳤다`는 기억을 동시에 받아들이지 못하기 때문에, 내면세계는 D-Day 금요일 다음의 D+3 월요일 방학식으로 넘어가지 못한다. 하연과 서로의 마음을 확인하지 못한 루프에서 재윤은 사고 기억에서 하연을 잃는다. 폐장 후 학교 뒤편 야외 소무대에 혼자 서 있고, 누가 자신을 불렀는지 또는 누구에게 가려 했는지 기억하지 못한 채 사고를 반복한다. 재윤이 끝내지 못한 것들: 1. 한소하와의 오래된 관계를 아무 일도 없던 과거로 덮지 않기 2. 백서린에게 맡겨두던 선택권을 되찾기 3. 나미루의 멘토링 종료와 독립을 받아들이기 4. 은하연과 서로의 마음을 확인하고, 그 마음을 늦추지 않고 인정하기 5. 사고의 결과까지 기억하고 현실로 돌아가기 따라서 루프의 종료 조건은 `가장 안전한 선택`을 찾는 것이 아니라, 재윤이 미뤄온 관계와 기억을 끝내고 금요일 다음 월요일을 받아들이는 것이다. ## 진엔딩 조건 진엔딩은 하연만 따라간다고 열리지 않는다. 주인공은 하연에게 도달하는 동시에, 기존 관계에 남은 미련과 후회, 사고의 진실도 마주해야 한다. | 축 | 의미 | | --- | --- | | 하연과의 상호 마음 확인 | 하연과 서로 마음을 확인할 만큼 신뢰와 관계를 쌓았는가 | | 관계 정리 | 소하/서린/미루에게 남은 미련, 회피, 의존을 외면하지 않았는가 | | 사고 단서 | 축제 마지막 날 사고의 진실과 그 밤의 선택 의미에 도달했는가 | 세 조건의 의미: - 하연과의 상호 마음 확인: 재윤이 정말 향하고 싶었던 마음을 인정하고, 하연도 그 마음을 말할 수 있을 만큼 가까워졌는가. - 기존 관계 정리: 아무 일도 없던 과거, 대신 정해주는 정답, 누군가에게 필요한 사람으로 남는 도피를 정리했는가. - 사고 단서 확보: 자신이 선택한 마음의 결과까지 기억했는가. ### 조건 A: 하연과의 상호 마음 확인 예시: 1. 첫 대화 2. 하연이 조용한 공간과 자기 속도를 말하는 핵심 대화 3. 축제 1일차 부스 운영과 축제 2일차의 말하지 못한 예감 4. 축제 마지막 날 하연의 감정과 동선을 알아차릴 만큼의 신뢰 형성. 하연을 충분히 공략해야 폐장 후 하연이 있을 곳을 짐작하고 재윤이 먼저 찾아갈 수 있음 ### 조건 B: 기존 관계 정리 - 한소하: 익숙한 과거에 머무르지 않음. - 백서린: 누군가가 대신 정해주는 선택지를 거부하고 선택권을 되찾음. - 나미루: 곧 끝나는 멘토링의 불안을 대신 책임지지 않고, 끝나도 사라지지 않는 관계로 정리함. ### 조건 C: 사고 단서 확보 - 한소하 단서: 주인공이 하연을 좋아했다는 사실. - 백서린 단서: 소무대 임시 구조물의 위험. - 나미루 단서: 출입금지 표지 / 고정끈 문제. - 하연 단서: 서로 말하려던 장소, 끊긴 문장, 혼자가 아니었던 사고 기억. ## 4주 병렬 이벤트 단계표 | 기간 | 목표 | 주요 변화 | | --- | --- | --- | | Week 1: D-25 ~ D-19 | 하연 등장 / 적응 / 관계 변화 시작 | 하연에게 첫눈에 반함. D-23에 담임이 축제 이틀 일정과 2학년 5반의 반 단위 참여를 공지하며 목표 기간이 명확해짐. 기존 히로인들은 아직 비교적 정상. | | Week 2: D-18 ~ D-12 | 2학년 5반 반행사 `쉬어가 카페` 확정 / 축제 준비 진입 / 관계 확장 / 기억과 감정의 미세한 어긋남 | 2학년 5반 축제 준비를 통해 하연과 가까워지고, 선택 결과가 세계에 조금씩 반영되며 아주 약한 어긋남이 시작됨. 기존 히로인들이 하연을 의식하기 시작함. 주말 학교 밖 이벤트로 사적인 면을 보여줌. | | Week 3: D-11 ~ D-5 | 관계 균열 심화 / 사고 단서 구체화 | 소하/서린/미루에게 남은 미련, 선택 회피, 의존이 눈에 띄고, 소무대와 안전 단서가 구체화됨. | | Final Week: D-4 ~ D-1 | 기억 회복 심화 / 관계 정리 클라이맥스 / 축제 1일차 | 소하/서린/미루 관계 정리 클라이맥스 해결. D-2에는 하연이 조용한 곳에서 마음을 정리하는 사람이라는 감각을 남기고, D-1 목요일 축제 1일차에는 부스 운영 중심으로 재윤과 하연이 `쉬어가 카페`를 함께 운영하며 가까워지고, 축제 마지막 날 선택 가능 조건을 최종 확인함. | | D-Day | 축제 2일차 / 사고 재현 / 엔딩 분기 | 부스는 축소 운영되고, 재윤은 히로인들과 축제를 둘러보는 선택을 한다. 하연 공략이 충분하면 폐장 후 하연이 조용한 소무대 쪽으로 향했다는 것을 재윤이 알아차려 직접 찾아가며, 부족하면 하연의 동선과 사고 기억이 비어 혼자 소무대 사고로 루프한다. 조건에 따라 진엔딩, 새드엔딩, 루프, 히든 엔딩 방향으로 분기한다. 진엔딩에서는 금요일 밤 이후 토요일 표기 없이 일요일 오후 병실로 점프함. | | D+3 월요일 | 방학식 예정 / 도달하지 못하는 다음 월요일 / 방학으로 이어지는 진엔딩 | 첫 회차 표면상으로는 축제 2일차 뒤 주말을 지나 맞는 방학식. 실패 루프에서는 도달하지 못하며, 진엔딩에서는 방학 동안 하연과 재윤이 계속 만날 작은 약속과 엔딩 크레딧으로 이어짐. | ## 축제 마지막 날 선택지 조건이 부족하면 회피와 미련에 묶인 선택지만 보인다. ```text [아무 일도 없었던 것으로 한다] [선택하지 않는다] [여기에 남는다] ``` 조건을 충족하면 진엔딩 선택지가 열린다. ```text [하연에게 말하러 간다] ``` 완전 조건 충족 시: ```text [다친 기억까지 안고 하연에게 돌아간다] ``` ## 조건 부족 시 분기 의미 | 부족한 조건 | 결과 | | --- | --- | | 하연 이해/상호 마음 확인 부족 | 재윤이 폐장 후 하연의 동선을 알아차리지 못하고, 하연이 사고 기억에서 빠진다. 재윤은 혼자 야외 소무대에서 왜 왔는지 모른 채 사고를 반복한 뒤 루프함. 방학식과 크레딧에는 도달하지 않음 | | 소하 관계 정리 부족 | 아무 일도 없던 과거에 머무르는 새드엔딩. 방학은 따뜻한 과거의 등굣길로 왜곡되고, 짧은 가짜 크레딧만 허용 | | 서린 관계 정리 부족 | 정해진 선택지와 안전한 순서에 갇히는 새드엔딩. 방학은 일정표 안에서 정지되고, 차갑고 정돈된 가짜 크레딧만 허용 | | 미루 관계 정리 부족 | 필요한 사람으로 남기 위해 꿈속에 머무르는 새드엔딩. 방학은 문밖에만 있고, 달콤하지만 불안한 가짜 크레딧만 허용 | | 사고 단서 부족 | 사고를 떠올려도 하연에게 가려던 선택의 의미를 연결하지 못하고 루프함 | | 모든 조건 충족 | 재윤이 먼저 하연에게 마음과 선택을 말하고, 하연과 마음을 확인한 밤을 기억한 채 다친 기억까지 안고 현실로 돌아감. D+3 방학식 이후에는 둘이 방학 동안 계속 만날 것을 암시하는 후일담과 엔딩 크레딧으로 연결됨 |", "excerpt": "# 진행 구조와 진엔딩 조건 ## 병렬 진행 구조 일반 히로인 루트는 병렬적으로 진행된다. 한 명씩 완전히 끝내고 다음으로 넘어가는 구조가 아니다. 플레이어는 날짜별로 누구와 시간을 보낼지 선택한다. ```text [하연과 시간을 보낸다] [소하와 등교한다] [서린을 돕는다] [미루의 멘토링을 봐준다] [축제 준비를 조사한다] ``` 하연 등장 후 약 4주 안에 다음 조건을 충분히 채워야 한"}, {"path": "스토리/04_루트_세부기획.md", "category": "스토리", "title": "루트 세부 기획", "id": "스토리-04루트세부기획-md", "html": "<h2 id=\"스토리-04루트세부기획-md-루트-세부-기획\">루트 세부 기획<\/h2>\n<p>이 문서는 각 히로인 루트의 세부 이벤트, 선택지, 획득 단서, 실패/스킵 시 변화를 정리한다.<\/p>\n<p>루트는 일반 미연시처럼 한 명을 골라 연애 결론을 보는 구조가 아니다. 하연 진엔딩에 도달하기 위해, 재윤이 기존 관계에 숨지 않고 각 관계의 미뤄둔 감정을 정리하는 병렬 구조다.<\/p>\n<h3 id=\"스토리-04루트세부기획-md-루트-설계-원칙\">루트 설계 원칙<\/h3>\n<h4 id=\"스토리-04루트세부기획-md-1-하연-루트는-목적지-기존-히로인-루트는-정리해야-할-도피처\">1. 하연 루트는 목적지, 기존 히로인 루트는 정리해야 할 도피처<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>축<\/th><th>인물<\/th><th>겉보기 역할<\/th><th>내면세계에서의 위험<\/th><th>진엔딩에서의 역할<\/th><\/tr><\/thead><tbody><tr><td>상호 마음 확인<\/td><td>은하연<\/td><td>전학생 / 진히로인<\/td><td>신뢰 부족 시 사고 기억에서 사라짐<\/td><td>재윤이 직접 찾아가 마음을 말해야 할 사람<\/td><\/tr><tr><td>과거<\/td><td>한소하<\/td><td>소꿉친구<\/td><td>아무 일도 없던 과거에 머무르게 함<\/td><td>재윤이 하연을 좋아했다는 사실을 인정하게 함<\/td><\/tr><tr><td>정답<\/td><td>백서린<\/td><td>방송반/학생회 선배<\/td><td>선택을 대신 정해 안전한 정지 상태에 가둠<\/td><td>재윤이 자기 선택권을 되찾게 함<\/td><\/tr><tr><td>의존<\/td><td>나미루<\/td><td>멘토링 후배<\/td><td>필요한 사람으로 남기 위해 현실 복귀를 미루게 함<\/td><td>재윤이 끝나도 사라지지 않는 관계를 받아들이게 함<\/td><\/tr><tr><td>사고 단서<\/td><td>공통<\/td><td>축제/소무대/병실 기억<\/td><td>사고를 없던 일로 만들려는 회피<\/td><td>다친 기억까지 안고 현실로 돌아가게 함<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-2-루트는-병렬-진행된다\">2. 루트는 병렬 진행된다<\/h4>\n<ul>\n<li>한 명씩 완전히 끝내고 다음으로 넘어가지 않는다.<\/li>\n<li>플레이어는 날짜별로 누구와 시간을 보낼지 선택한다.<\/li>\n<li>기존 히로인 이벤트를 모두 무시하면 진엔딩에 필요한 <code>관계 정리<\/code>와 <code>사고 단서<\/code>가 부족해진다.<\/li>\n<li>반대로 기존 히로인에게만 머무르면 하연과의 상호 마음 확인이 부족해지고, 하연이 사고 기억에서 빠진다.<\/li>\n<li>핵심은 <code>누구를 좋아하느냐<\/code>보다 <code>어떤 도피를 끝낼 수 있느냐<\/code>다.<\/li>\n<\/ul>\n<h4 id=\"스토리-04루트세부기획-md-3-권장-플래그\">3. 권장 플래그<\/h4>\n<p>실제 구현 변수명은 시스템 설계 단계에서 조정하되, 시나리오 설계에서는 아래 의미 축을 유지한다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>임시 플래그<\/th><th>의미<\/th><th>주요 획득처<\/th><\/tr><\/thead><tbody><tr><td><code>HaYeonTrust<\/code><\/td><td>하연과 서로 마음을 확인할 수 있는 신뢰<\/td><td>하연의 속도 존중, 쉬어가 카페, D-2 예감, D-1 운영<\/td><\/tr><tr><td><code>HaYeonPaceRead<\/code><\/td><td>하연이 조용한 곳에서 마음을 정리한다는 이해<\/td><td>D-17, D-16, D-2<\/td><\/tr><tr><td><code>SoHaResolved<\/code><\/td><td>소하와의 과거를 덮개로 쓰지 않음<\/td><td>소하 D-3 클라이맥스<\/td><\/tr><tr><td><code>SeoRinResolved<\/code><\/td><td>서린에게 선택권을 맡기지 않음<\/td><td>서린 D-3 또는 D-4 클라이맥스<\/td><\/tr><tr><td><code>MiRuResolved<\/code><\/td><td>미루의 의존을 대신 책임지지 않음<\/td><td>미루 D-3 클라이맥스<\/td><\/tr><tr><td><code>AccidentClueSoHa<\/code><\/td><td>재윤이 하연을 기다렸다는 감정 단서<\/td><td>소하 클라이맥스<\/td><\/tr><tr><td><code>AccidentClueSeoRin<\/code><\/td><td>소무대 임시 구조물/조명 프레임 위험<\/td><td>서린 D-9/D-4<\/td><\/tr><tr><td><code>AccidentClueMiRu<\/code><\/td><td>출입금지 표지/고정끈/보고 대상 단서<\/td><td>미루 D-8/D-4<\/td><\/tr><tr><td><code>AccidentClueHaYeon<\/code><\/td><td>서로 말하려던 장소와 끊긴 문장<\/td><td>하연 D-2/D-1/D-Day<\/td><\/tr><tr><td><code>Avoidance<\/code><\/td><td>선택을 미루는 회피 누적<\/td><td>혼자 선택, 답장 미루기, 결정 회피<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-4-진엔딩-판정-요약\">4. 진엔딩 판정 요약<\/h4>\n<p>진엔딩은 아래 세 축을 모두 만족해야 열린다.<\/p>\n<ol>\n<li><code>HaYeonTrust<\/code>와 <code>HaYeonPaceRead<\/code>가 충분하다.<\/li>\n<li><code>SoHaResolved<\/code>, <code>SeoRinResolved<\/code>, <code>MiRuResolved<\/code>가 모두 충족되어 기존 관계 도피를 정리했다.<\/li>\n<li>사고 단서가 충분히 모여 <code>하연에게 가려던 선택의 결과로 다쳤다<\/code>는 의미를 연결할 수 있다.<\/li>\n<\/ol>\n<p>부족 조건별 결과:<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>부족 조건<\/th><th>결과<\/th><\/tr><\/thead><tbody><tr><td>하연 신뢰 부족<\/td><td>폐장 후 하연의 동선을 알아차리지 못함. 하연이 사고 기억에서 빠지고 혼자 소무대 사고 루프<\/td><\/tr><tr><td>소하 정리 부족<\/td><td>따뜻한 과거에 머무르는 소하 새드엔딩<\/td><\/tr><tr><td>서린 정리 부족<\/td><td>안전한 정답/순서에 갇히는 서린 새드엔딩<\/td><\/tr><tr><td>미루 정리 부족<\/td><td>필요한 사람 역할에 남는 미루 새드엔딩<\/td><\/tr><tr><td>사고 단서 부족<\/td><td>마음은 있어도 사고 기억의 의미를 연결하지 못하고 루프<\/td><\/tr><tr><td>모든 조건 충족<\/td><td><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code> 선택지 개방<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-04루트세부기획-md-공통-이벤트-단계\">공통 이벤트 단계<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>단계<\/th><th>기간<\/th><th>설계 목적<\/th><\/tr><\/thead><tbody><tr><td>프롤로그<\/td><td>D-32 ~ D-26<\/td><td>소하/서린/미루가 재윤의 생활권에 이미 있음을 보여주고, 재윤이 관계를 미루는 사람임을 체감시킨다.<\/td><\/tr><tr><td>Week 1<\/td><td>D-25 ~ D-19<\/td><td>하연 등장. 기존 관계와 하연이 같은 선택지 줄에 놓이기 시작한다.<\/td><\/tr><tr><td>Week 2<\/td><td>D-18 ~ D-12<\/td><td><code>쉬어가 카페<\/code>와 축제 준비를 통해 하연과 가까워지고, 기존 관계 축도 각자의 방식으로 흔들린다.<\/td><\/tr><tr><td>Week 3<\/td><td>D-11 ~ D-5<\/td><td>소하/서린/미루의 도피성이 뚜렷해지고, 사고 단서가 구체화된다.<\/td><\/tr><tr><td>Final Week<\/td><td>D-4 ~ D-1<\/td><td>기존 관계 정리 클라이맥스와 하연 신뢰 최종 확인.<\/td><\/tr><tr><td>D-Day<\/td><td>축제 2일차<\/td><td>낮 선택 정산 후 폐장 후 하연을 찾아갈 수 있는지 결정한다.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>---<\/p>\n<h3 id=\"스토리-04루트세부기획-md-한소하-루트\">한소하 루트<\/h3>\n<h4 id=\"스토리-04루트세부기획-md-루트-역할\">루트 역할<\/h4>\n<p>현실의 한소하는 주인공을 오래 좋아해 온 진짜 소꿉친구다. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니어서, 교실 안 상시 반응보다 등굣길과 방과후의 익숙함으로 관계를 보여준다.<\/p>\n<p>소하는 공동 행사에서 비교적 적극적으로 움직이는 타입이다. 자기 반 축제 준비에서는 후보를 줄이고 의견을 모으려 하며, 듣고만 있다가 역할을 떠맡는 재윤과 대비된다. 이 적극성은 초반에는 건강한 생활력으로 보이지만, 이후 소하 루트에서는 <code>예전처럼 돌아가야 한다<\/code>는 미련으로 굳어질 수 있다.<\/p>\n<p>내면세계의 소하는 <code>돌아가고 싶은 평범한 과거<\/code>와 <code>하연에게 향한 마음을 회피하고 싶은 마음<\/code>을 상징한다.<\/p>\n<p>핵심 질문:<\/p>\n<blockquote>익숙한 과거가 아직 소중하더라도, 거기에 숨어 지금의 마음을 지워도 되는가?<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-소하-루트-플래그\">소하 루트 플래그<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>플래그<\/th><th>획득/상승<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>SoHaBond<\/code><\/td><td>등굣길, 편의점, 오래된 사진 이벤트<\/td><td>오래된 관계의 친밀도<\/td><\/tr><tr><td><code>SoHaPressure<\/code><\/td><td>하연 선택 후 소하를 계속 회피하거나 애매하게 답함<\/td><td>과거에 머무르라는 압박<\/td><\/tr><tr><td><code>SoHaResolved<\/code><\/td><td>D-3 클라이맥스에서 현재의 마음을 인정<\/td><td>과거를 소중히 여기되 도피처로 쓰지 않음<\/td><\/tr><tr><td><code>AccidentClueSoHa<\/code><\/td><td>소하가 <code>축제날 네가 기다리던 사람은 내가 아니었어<\/code>를 말함<\/td><td>재윤이 하연을 향했다는 감정 단서<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-주차별-이벤트\">주차별 이벤트<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>시점<\/th><th>이벤트<\/th><th>주요 선택<\/th><th>성공/정리 결과<\/th><th>실패/스킵 변화<\/th><\/tr><\/thead><tbody><tr><td>D-32<\/td><td>소하와 등교<\/td><td>같이 하교한다 / 먼저 간다<\/td><td>오래된 루틴과 소하의 진짜 애정을 보여줌<\/td><td>먼저 가면 소하 메시지가 남고 재윤의 회피 성향이 보임<\/td><\/tr><tr><td>D-28<\/td><td>첫 번째 선택<\/td><td>소하와 방과후 / 다른 인물 / 혼자<\/td><td>소하 선택 시 <code>SoHaBond<\/code> 상승, 오래된 사진 또는 음료 습관 제시<\/td><td>선택하지 않아도 관계는 유지되지만 미뤄둔 감정으로 남음<\/td><\/tr><tr><td>D-21<\/td><td>처음 고르는 방과후<\/td><td>소하의 반 준비 방문<\/td><td>소하가 재윤을 자기 반 준비에 끌어들이며 익숙함을 강화<\/td><td>하연을 고르면 소하가 장난으로 넘기지만 이후 말끝이 날카로워짐<\/td><\/tr><tr><td>D-13<\/td><td>주말 이벤트: 먼저 와 있던 마음<\/td><td>오래된 동네 가게에 간다 / 거절한다<\/td><td>소하가 <code>언제까지 같이 갈 수 있을까<\/code>를 다시 말함<\/td><td>거절하면 소하가 괜찮은 척하지만 <code>SoHaPressure<\/code> 상승<\/td><\/tr><tr><td>D-10<\/td><td>익숙한 것들이 먼저 움직였다<\/td><td>소하의 선제 도움을 받아들인다 / 거리를 둔다<\/td><td>소하가 재윤보다 먼저 필요한 것을 챙김<\/td><td>받아들이기만 하면 하연 쪽 선택을 대신 덮는 감각 발생<\/td><\/tr><tr><td>D-7<\/td><td>하연에게 가려는 첫 큰 장애물<\/td><td>소하에게 솔직히 말한다 / 얼버무린다<\/td><td>솔직히 말하면 D-3 정리 조건 개방<\/td><td>얼버무리면 소하 새드엔딩 진입 위험 상승<\/td><\/tr><tr><td>D-3<\/td><td>기존 관계 정리 클라이맥스<\/td><td><code>[예전처럼 남는다]<\/code> / <code>[지금 마음을 말한다]<\/code><\/td><td><code>SoHaResolved<\/code>, <code>AccidentClueSoHa<\/code> 획득<\/td><td><code>[예전처럼 남는다]<\/code> 선택 시 소하 새드엔딩<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-핵심-장면-설계\">핵심 장면 설계<\/h4>\n<p>프롤로그 D-32에서는 소하와 주인공의 등교 루틴을 보여준다. 소하는 주인공의 오래된 습관을 전부 기억하고 있고, 주인공은 그 익숙함을 너무 당연하게 받아들인다.<\/p>\n<p>핵심 대사:<\/p>\n<blockquote>이렇게 같이 가는 거, 언제까지 할 수 있을까?<\/blockquote>\n<p>첫 회차에서는 소꿉친구의 아련한 대사처럼 보인다. 이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 소하 루트에서는 같은 의미가 <code>계속 예전처럼 남아달라<\/code>는 집착의 문장으로 대비된다.<\/p>\n<p>D-13 주말 이벤트에서는 오래된 동네 가게, 편의점 음료, 오래된 사진을 사용한다. 하연과의 신뢰가 충분히 쌓인 상태라면 재윤은 소하와 있어도 마음 한쪽이 하연에게 향해 있음을 자각한다. 하연 신뢰가 부족하면 이 장면은 <code>소하와 있으면 편하다<\/code>는 도피로 기운다.<\/p>\n<h4 id=\"스토리-04루트세부기획-md-클라이맥스\">클라이맥스<\/h4>\n<p>장소 후보:<\/p>\n<ul>\n<li>오래된 등굣길<\/li>\n<li>편의점 앞 벤치<\/li>\n<li>둘이 자주 지나던 골목<\/li>\n<li>첫 회차 D-32와 같은 집 앞 골목<\/li>\n<\/ul>\n<p>소하는 말한다.<\/p>\n<blockquote>여기 있으면 아무 일도 일어나지 않아. 우리가 원래부터 행복했던 걸로 하면 되잖아.<\/blockquote>\n<p>재윤의 실패 선택지:<\/p>\n<pre><code>[예전처럼 돌아간다]<\/code><\/pre>\n<p>재윤의 정리 선택지:<\/p>\n<pre><code>[지금의 마음까지 말한다]<\/code><\/pre>\n<p>정리 성공 시 소하는 재윤을 붙잡지 않고, 대신 가장 중요한 단서를 준다.<\/p>\n<blockquote>축제날, 네가 기다리던 사람은 내가 아니었어.<\/blockquote>\n<p>이 단서는 재윤이 하연을 향했다는 사실을 감정적으로 확정한다. 소하를 선택하지 않는 장면이지만, 소하를 버리는 장면이 아니라 오래된 관계를 거짓 과거로 만들지 않는 장면이어야 한다.<\/p>\n<h4 id=\"스토리-04루트세부기획-md-새드엔딩-처리\">새드엔딩 처리<\/h4>\n<p>조건:<\/p>\n<ul>\n<li><code>SoHaPressure<\/code>가 높고 <code>SoHaResolved<\/code>가 없다.<\/li>\n<li>하연 이벤트를 충분히 진행하지 않았거나, 하연에 대한 마음을 소하 앞에서 계속 얼버무렸다.<\/li>\n<li>D-3 또는 D-Day 직전 소하의 제안을 받아들인다.<\/li>\n<\/ul>\n<p>연출:<\/p>\n<ul>\n<li>같은 아침, 같은 등굣길, 같은 편의점 음료가 반복된다.<\/li>\n<li>방학식 안내문은 보이지만 날짜가 흐릿하다.<\/li>\n<li>크레딧이 있다면 따뜻하지만 짧은 가짜 크레딧으로 처리한다.<\/li>\n<\/ul>\n<p>핵심 문장:<\/p>\n<blockquote>아무 일도 없던 날은 따뜻했다.  <\/blockquote>\n<blockquote>그래서 더 오래 머무르면 안 되는 곳이었다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-04루트세부기획-md-백서린-루트\">백서린 루트<\/h3>\n<h4 id=\"스토리-04루트세부기획-md-루트-역할-2\">루트 역할<\/h4>\n<p>현실의 백서린은 3학년 7반이며, 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배다. 3학년은 축제 반 행사를 직접 준비하지 않고 참가하며, 서린은 학생회/방송반 소속으로 축제 진행 지원과 방송 흐름을 맡고 있다.<\/p>\n<p>주인공에게 서린은 <code>정답을 알려주는 사람<\/code>으로 각인되어 있다. 내면세계에서 이 관계는 선택권을 대신 넘기는 도피로 변한다.<\/p>\n<p>핵심 질문:<\/p>\n<blockquote>누군가가 알려준 정답이 안전해 보여도, 내 마음까지 대신 고르게 해도 되는가?<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-서린-루트-플래그\">서린 루트 플래그<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>플래그<\/th><th>획득/상승<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>SeoRinTrust<\/code><\/td><td>방송실 업무, 큐시트 검토<\/td><td>서린이 재윤의 판단을 신뢰하는 정도<\/td><\/tr><tr><td><code>SeoRinControl<\/code><\/td><td>재윤이 서린에게 계속 결정을 맡김<\/td><td>선택지 통제 위험<\/td><\/tr><tr><td><code>SeoRinResolved<\/code><\/td><td>재윤이 직접 선택하겠다고 말함<\/td><td>선택권 회복<\/td><\/tr><tr><td><code>AccidentClueSeoRin<\/code><\/td><td>소무대 임시 구조물, 조명 프레임, 점검표<\/td><td>사고의 물리적 단서<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-주차별-이벤트-2\">주차별 이벤트<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>시점<\/th><th>이벤트<\/th><th>주요 선택<\/th><th>성공/정리 결과<\/th><th>실패/스킵 변화<\/th><\/tr><\/thead><tbody><tr><td>D-31<\/td><td>방송실의 정답<\/td><td>대본 흐름에 의견을 낸다 / 지시만 따른다<\/td><td>서린이 재윤의 판단을 인정<\/td><td>지시만 따르면 <code>정답을 받는 관계<\/code>가 강화됨<\/td><\/tr><tr><td>D-21<\/td><td>방과후 방송 일정표<\/td><td>일정표를 같이 고친다 / 서린 안을 따른다<\/td><td><code>SeoRinTrust<\/code> 상승<\/td><td>선택권을 맡기면 <code>SeoRinControl<\/code> 상승<\/td><\/tr><tr><td>D-12<\/td><td>주말 이벤트: 먼저 준비된 답<\/td><td>장비 대여 시간 확인 / 서린이 정한 동선 따름<\/td><td>방송/장비 구조 이해<\/td><td>통제 공간의 안정감이 강해짐<\/td><\/tr><tr><td>D-9<\/td><td>먼저 정리된 위험 / 정답을 물으러 간 방송실<\/td><td>야외 소무대 점검표를 직접 본다 / 서린에게 마음 상담을 한다 / 서린에게 맡긴다<\/td><td><code>AccidentClueSeoRin<\/code> 획득, <code>SeoRinControl<\/code> 감소 가능<\/td><td>사고 위험 단서를 놓치거나, 마음 선택까지 서린에게 맡김<\/td><\/tr><tr><td>D-4<\/td><td>단서 정리 시작<\/td><td>점검표와 하연 기억을 연결한다 / 안전 문제로만 본다<\/td><td>사고 단서가 의미 단서로 전환<\/td><td>사고를 단순 안전 사고로만 오해<\/td><\/tr><tr><td>D-3<\/td><td>기존 관계 정리 클라이맥스<\/td><td><code>[서린이 정한 길을 따른다]<\/code> / <code>[내가 선택할게]<\/code><\/td><td><code>SeoRinResolved<\/code> 획득<\/td><td>서린 새드엔딩 진입<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-핵심-장면-설계-2\">핵심 장면 설계<\/h4>\n<p>프롤로그 D-31에서는 방송실에서 서린의 안내 방송 대본과 장비 체크 순서를 함께 검토한다. 서린은 주인공에게 대본 흐름과 장비 순서를 봐달라고 부탁하고, 주인공의 의견을 실제로 반영한다.<\/p>\n<p>핵심 대사:<\/p>\n<blockquote>정답을 알려주는 건 쉬워. 근데 네가 고른 답이 더 나을 때도 있어.<\/blockquote>\n<p>이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 서린 루트에서는 이 문장과 대비되는 <code>정답은 내가 알려줄게. 너는 고르지 않아도 돼.<\/code>가 등장할 수 있다.<\/p>\n<p>D-9 이벤트에서는 소무대 임시 구조물, 조명 프레임, 케이블 고정, 출입 제한 안내가 문서 형태로 등장한다. 서린은 위험을 <code>관리 가능한 문제<\/code>로 정리하려 하지만, 재윤은 그 문서가 단순 안전 단서가 아니라 자기 사고 기억과 연결된다는 감각을 받아야 한다.<\/p>\n<p>이 장면은 동시에 재윤이 서린에게 마음의 기준을 묻는 고민상담 장면이 된다. 하연에게 끌리는 마음, 소하에게 미안한 마음, 미루를 책임져야 할 것 같은 마음이 한꺼번에 섞이자 재윤은 <code>맞는 답<\/code>을 얻으러 방송실로 간다. 서린의 역할은 여기서 단순 조력자가 아니라, 재윤이 자기 선택권을 다시 붙잡도록 만드는 상담자로 확장된다.<\/p>\n<p>상담 선택지:<\/p>\n<pre><code>[정답이 아니라, 내가 고를 이유를 찾는다]\n[선배가 보기엔 누가 맞아요?]<\/code><\/pre>\n<p>성공 선택인 <code>[정답이 아니라, 내가 고를 이유를 찾는다]<\/code>는 <code>SeoRinTrust +1<\/code>, <code>SeoRinControl -1<\/code>, <code>Avoidance -1<\/code>로 처리한다. 재윤이 하연을 좋아한다는 결론을 바로 확정하는 선택이 아니라, 적어도 <code>누가 정해줘야 움직이는 상태<\/code>에서 벗어나는 선택이다. 실패 선택인 <code>[선배가 보기엔 누가 맞아요?]<\/code>는 <code>SeoRinControl +1<\/code>, <code>Avoidance +1<\/code>로 처리하고, D-3에서 <code>[내가 선택할게]<\/code>가 잠기거나 노이즈가 끼는 조건으로 이어진다.<\/p>\n<p>상담 핵심 대사:<\/p>\n<pre><code>재윤: 선배는 이런 거 어떻게 정해요?\n서린: 이런 거?\n재윤: 누굴 좋아하는지, 아니면 누구한테 미안한 건지.\n재윤: 그게 잘 구분이 안 될 때요.\n\n서린: 기준을 나누면 돼.\n서린: 좋아하는 마음, 미안한 마음, 책임감, 익숙함.\n서린: 네가 지금 헷갈리는 건 전부 같은 이름으로 묶어놨기 때문이야.\n\n재윤: 그럼 저는 어떻게 해야 맞아요?\n서린: 그 질문은 틀렸어.\n서린: 맞는 걸 고르려고 하면, 넌 또 네 선택을 남한테 맡기게 돼.\n\n서린: 내가 정해주면 편하겠지.\n서린: 너는 틀리지 않아도 되고,\n서린: 나는 네가 계속 나를 찾아오게 만들 수 있으니까.\n서린: 그런데 그건 상담이 아니야. 붙잡는 거지.<\/code><\/pre>\n<p>이 대사는 D-3 클라이맥스에서 <code>내가 정해주면 편하겠지<\/code>와 <code>맞는 걸 고르려고 하면 또 맡기게 된다<\/code>는 회상으로 재사용한다. 성공 루트에서는 서린이 재윤에게 <code>맞는 답이 아니라 네가 고른 이유를 가져와<\/code>라고 남기고, 실패 루트에서는 재윤이 끝까지 <code>선배가 정해준 길<\/code>을 안전한 선택으로 착각한다.<\/p>\n<h4 id=\"스토리-04루트세부기획-md-클라이맥스-2\">클라이맥스<\/h4>\n<p>장소 후보:<\/p>\n<ul>\n<li>방송실<\/li>\n<li>학생회실<\/li>\n<li>자료실<\/li>\n<li>축제 운영본부<\/li>\n<\/ul>\n<p>서린이 정한 선택지만 보인다.<\/p>\n<pre><code>[서린이 정한 길을 따른다]<\/code><\/pre>\n<p>재윤이 선택지를 깨뜨리고 새로운 선택지를 만든다.<\/p>\n<pre><code>[내가 선택할게]<\/code><\/pre>\n<p>서린은 재윤이 틀릴까 봐 선택을 대신해주려 한다. 하지만 정리 성공 시, 서린은 재윤에게 사고 단서와 함께 선택권을 돌려준다.<\/p>\n<blockquote>네가 틀린 선택을 해서 그 애가 다친 게 아니야. 네가 선택했기 때문에, 그 애가 살아 있는 거야.<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-새드엔딩-처리-2\">새드엔딩 처리<\/h4>\n<p>조건:<\/p>\n<ul>\n<li><code>SeoRinControl<\/code>이 높고 <code>SeoRinResolved<\/code>가 없다.<\/li>\n<li>위험 단서를 서린의 판단에만 맡기고, 재윤이 스스로 하연에게 갈 이유를 고르지 못한다.<\/li>\n<li>D-3 또는 D-Day 직전 <code>[서린이 정한 길을 따른다]<\/code>를 선택한다.<\/li>\n<\/ul>\n<p>연출:<\/p>\n<ul>\n<li>방송실과 학생회실이 지나치게 정돈된다.<\/li>\n<li>일정표에는 월요일 방학식까지 완벽히 적혀 있지만, 날짜는 넘어가지 않는다.<\/li>\n<li>크레딧이 있다면 차갑고 정돈된 가짜 크레딧으로 처리한다.<\/li>\n<\/ul>\n<p>핵심 문장:<\/p>\n<blockquote>모든 순서는 맞았다.  <\/blockquote>\n<blockquote>그런데 재윤이 고른 것은 하나도 없었다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-04루트세부기획-md-나미루-루트\">나미루 루트<\/h3>\n<h4 id=\"스토리-04루트세부기획-md-루트-역할-3\">루트 역할<\/h4>\n<p>현실의 나미루는 1학년 3반이며, 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원이다.<\/p>\n<p>주인공은 미루의 <code>1학기 한정 학습·학교생활 적응 멘토<\/code>였다. 이 멘토링은 수학/영어 보충, 수행평가 정리, 발표 연습, 제출물과 마감일 정리, 봉사활동이나 행사 신청 도움, 모르는 일이 생겼을 때 누구에게 질문하고 보고할지 정하는 연습까지 포함한다. 축제 2일차 뒤 D+3 월요일 방학식이 오면 공식적으로 끝난다.<\/p>\n<p>현실의 멘토링은 미루가 앞으로 나아가도록 도운 따뜻한 관계다. 이후 내면세계에서는 이 관계가 <code>선배가 없으면 아무것도 못 한다<\/code>, <code>멘토링이 끝나면 선배도 사라진다<\/code>는 의존으로 변한다.<\/p>\n<p>핵심 질문:<\/p>\n<blockquote>누군가에게 필요한 사람으로 남기 위해, 끝나야 할 관계를 끝나지 않게 만들어도 되는가?<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-미루-루트-플래그\">미루 루트 플래그<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>플래그<\/th><th>획득/상승<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>MiRuBond<\/code><\/td><td>멘토링 도움, 신청서, 발표 연습<\/td><td>보호하고 싶은 후배 관계<\/td><\/tr><tr><td><code>MiRuDependence<\/code><\/td><td>재윤이 모든 문제를 대신 해결<\/td><td>의존 위험<\/td><\/tr><tr><td><code>MiRuResolved<\/code><\/td><td>미루가 먼저 해볼 수 있게 지지<\/td><td>멘토링 종료 수용<\/td><\/tr><tr><td><code>AccidentClueMiRu<\/code><\/td><td>출입금지 표지, 고정끈, 보고 대상<\/td><td>사고 현장 접근/고정 관련 단서<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-주차별-이벤트-3\">주차별 이벤트<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>시점<\/th><th>이벤트<\/th><th>주요 선택<\/th><th>성공/정리 결과<\/th><th>실패/스킵 변화<\/th><\/tr><\/thead><tbody><tr><td>D-31<\/td><td>복도의 후배<\/td><td>프린트를 같이 정리 / 대신 전부 정리<\/td><td>미루의 불안과 노력 모두 제시<\/td><td>대신 전부 하면 의존 기준점 형성<\/td><\/tr><tr><td>D-21<\/td><td>도움 인원 신청<\/td><td>신청서 작성법을 설명 / 대신 써준다<\/td><td>미루가 스스로 참여할 수 있음<\/td><td><code>MiRuDependence<\/code> 상승<\/td><\/tr><tr><td>D-12<\/td><td>주말 이벤트: 먼저 준비된 답<\/td><td>발표 연습을 지켜본다 / 답을 외우게 한다<\/td><td>미루가 자기 말로 말하는 경험<\/td><td>정답 의존과 재윤 의존 강화<\/td><\/tr><tr><td>D-8<\/td><td>선을 붙잡고 있는 손<\/td><td>출입 제한 표지와 고정끈을 확인<\/td><td><code>AccidentClueMiRu<\/code> 획득<\/td><td>사고 단서 부족 위험<\/td><\/tr><tr><td>D-6<\/td><td>주말 선택<\/td><td>미루의 혼자 해보기 확인 / 계속 옆에 있어줌<\/td><td>D-3 정리 조건 개방<\/td><td>닫힌 방 새드엔딩 위험 상승<\/td><\/tr><tr><td>D-3<\/td><td>기존 관계 정리 클라이맥스<\/td><td><code>[계속 가르쳐준다]<\/code> / <code>[먼저 해보게 한다]<\/code><\/td><td><code>MiRuResolved<\/code> 획득<\/td><td>미루 새드엔딩 진입<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-핵심-장면-설계-3\">핵심 장면 설계<\/h4>\n<p>프롤로그 D-31에서는 방송실에서 나온 주인공이 복도에서 미루와 마주친다. 미루는 멘토링 자료나 수행평가 프린트 묶음을 떨어뜨리고, 주인공이 자연스럽게 도와준다.<\/p>\n<p>핵심 대사:<\/p>\n<blockquote>선배가 있으면, 저도 할 수 있을 것 같아요.<\/blockquote>\n<p>이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 미루 루트에서는 이 문장과 대비되는 <code>선배가 없으면, 저는 아무것도 못 해요.<\/code>가 등장할 수 있다.<\/p>\n<p>D-8 이벤트에서는 축제 도움 인원 동선, 출입 제한 표지, 고정끈, 보고 대상이 연결된다. 미루가 실수로 알게 된 단서처럼 보이지만, 실제로는 재윤이 사고 기억을 받아들이기 위한 중요한 조각이다.<\/p>\n<h4 id=\"스토리-04루트세부기획-md-클라이맥스-3\">클라이맥스<\/h4>\n<p>장소 후보:<\/p>\n<ul>\n<li>학교 복도처럼 보이다가 미루의 방처럼 좁아지는 공간<\/li>\n<li>멘토링 교실<\/li>\n<li>축제 도움 인원 대기 장소<\/li>\n<li>닫힌 문 앞<\/li>\n<\/ul>\n<p>미루는 말한다.<\/p>\n<blockquote>여기에 있으면 아무 일도 일어나지 않은 걸로 할 수 있어요. 그러니까 깨어나지 마세요.<\/blockquote>\n<p>또는:<\/p>\n<blockquote>선배가 없으면 저는 아직 아무것도 못 해요. 그러니까 오늘도 가르쳐주세요.<\/blockquote>\n<p>또는:<\/p>\n<blockquote>방학식만 안 오면, 아직 멘토링 끝난 거 아니죠?<\/blockquote>\n<p>실패 선택지:<\/p>\n<pre><code>[계속 옆에 있어준다]<\/code><\/pre>\n<p>정리 선택지:<\/p>\n<pre><code>[먼저 해보게 한다]<\/code><\/pre>\n<p>정리 성공 시 미루는 현실 신호에 가까운 단서를 말한다.<\/p>\n<blockquote>밖에서 누군가 계속 네 이름을 부르고 있어요. 저는 그 목소리가 싫었어요.<\/blockquote>\n<p>이 단서는 병실에서 하연이 재윤을 부르고 있었다는 감각과 이어진다.<\/p>\n<h4 id=\"스토리-04루트세부기획-md-새드엔딩-처리-3\">새드엔딩 처리<\/h4>\n<p>조건:<\/p>\n<ul>\n<li><code>MiRuDependence<\/code>가 높고 <code>MiRuResolved<\/code>가 없다.<\/li>\n<li>재윤이 미루의 문제를 계속 대신 해결한다.<\/li>\n<li>D-3 또는 D-Day 직전 <code>[계속 옆에 있어준다]<\/code>를 선택한다.<\/li>\n<\/ul>\n<p>연출:<\/p>\n<ul>\n<li>학교 복도가 미루의 방처럼 좁아진다.<\/li>\n<li>체크리스트는 끝나지 않고, 방학식 안내문은 문밖에만 있다.<\/li>\n<li>크레딧이 있다면 달콤하지만 불안한 가짜 크레딧으로 처리한다.<\/li>\n<\/ul>\n<p>핵심 문장:<\/p>\n<blockquote>필요한 사람이 되는 건 따뜻했다.  <\/blockquote>\n<blockquote>하지만 그 따뜻함은 문을 닫고 있었다.<\/blockquote>\n<p>---<\/p>\n<h3 id=\"스토리-04루트세부기획-md-은하연-진히로인-루트\">은하연 / 진히로인 루트<\/h3>\n<h4 id=\"스토리-04루트세부기획-md-루트-역할-4\">루트 역할<\/h4>\n<p>내면세계의 하연은 처음에는 공허하고 차갑다. 주인공이 아직 하연과 사고를 제대로 기억하지 못하기 때문이다.<\/p>\n<p>초반 하연은 2학년 5반 전학생이라 반 행사에 적극적으로 나서지 않는다. 반 친구들의 소란 속에서 가장자리에 머물고, <code>조용한 것도 나쁘지 않다<\/code>는 식의 작은 취향만 흘린다. 재윤은 하연의 작은 말을 알아차리며, 둘은 주도적으로 움직이기보다 같은 흐름 안에 떠밀려 들어가면서 가까워진다.<\/p>\n<p>하연 루트의 목표는 단순 친밀 수치를 올리는 것이 아니라, 하연과 서로 마음을 확인할 수 있을 만큼 신뢰를 쌓고, 재윤이 기존 관계 뒤에 숨지 않은 채 축제 마지막 날 먼저 자기 마음과 선택을 말하러 가게 만드는 것이다.<\/p>\n<p>핵심 질문:<\/p>\n<blockquote>하연이 먼저 부르지 않아도, 재윤은 스스로 그녀가 있을 곳을 알아차리고 찾아갈 수 있는가?<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-하연-루트-플래그\">하연 루트 플래그<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>플래그<\/th><th>획득/상승<\/th><th>의미<\/th><\/tr><\/thead><tbody><tr><td><code>HaYeonTrust<\/code><\/td><td>하연의 말과 속도를 존중<\/td><td>서로 마음을 확인할 수 있는 신뢰<\/td><\/tr><tr><td><code>HaYeonPaceRead<\/code><\/td><td>조용한 공간, 기다림, 동선 이해<\/td><td>폐장 후 하연이 있을 곳을 알아차리는 조건<\/td><\/tr><tr><td><code>HaYeonMemoryLink<\/code><\/td><td>축제 밤, 소무대, 끊긴 문장 기억<\/td><td>사고 기억에서 하연이 사라지지 않게 함<\/td><\/tr><tr><td><code>AccidentClueHaYeon<\/code><\/td><td>D-2 예감, D-1 운영, D-Day 폐장 후<\/td><td>혼자가 아니었던 사고 기억<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-주차별-이벤트-4\">주차별 이벤트<\/h4>\n<div class=\"table-wrap\"><table><thead><tr><th>시점<\/th><th>이벤트<\/th><th>주요 선택<\/th><th>성공/정리 결과<\/th><th>실패/스킵 변화<\/th><\/tr><\/thead><tbody><tr><td>D-25<\/td><td>은하연 전학<\/td><td>작은 도움을 건넨다 / 지켜본다<\/td><td>하연이 고맙다고 하되 기대지는 않음<\/td><td>억지 접근 시 신뢰 상승 없음<\/td><\/tr><tr><td>D-24<\/td><td>두 번째 기회<\/td><td>위치만 알려준다 / 같이 간다 / 기다린다<\/td><td>하연의 속도를 존중하면 <code>HaYeonTrust<\/code> 상승<\/td><td>과한 동행은 접점은 생기지만 신뢰가 덜 오름<\/td><\/tr><tr><td>D-22<\/td><td>우리 반은 뭘 할까<\/td><td>하연의 짧은 의견을 살린다<\/td><td>하연의 말이 반 안에서 사라지지 않음<\/td><td>실무 효율만 고르면 하연의 감각이 밀림<\/td><\/tr><tr><td>D-21<\/td><td>방과후 선택<\/td><td>하연과 자료 정리<\/td><td>기존 히로인과 같은 선택지 줄에 하연이 놓임<\/td><td>하연 미선택이 누적되면 폐장 후 동선 이해 부족<\/td><\/tr><tr><td>D-18<\/td><td>쉬어가 카페 확정<\/td><td>하연의 말을 반 이름으로 연결<\/td><td>하연의 취향이 공동 공간이 됨<\/td><td>재윤이 혼자 처리하면 신뢰 부족<\/td><\/tr><tr><td>D-17<\/td><td>들어와도 되고, 안 들어와도 되는 곳<\/td><td>동선을 반영 / 손님 수 우선<\/td><td><code>HaYeonPaceRead<\/code> 상승<\/td><td>하연이 편한 공간 감각을 놓침<\/td><\/tr><tr><td>D-16<\/td><td>카페 문구<\/td><td>하연에게 확인받는다 / 혼자 확정<\/td><td>강요하지 않는 관계 방식 확립<\/td><td>좋은 문구여도 하연의 속도를 놓침<\/td><\/tr><tr><td>D-15<\/td><td>한 박자 늦은 대답<\/td><td>이상한 감각을 말한다 / 숨긴다<\/td><td>기억 어긋남을 하연과 공유<\/td><td>혼자 숨기면 하연 기억 연결 약화<\/td><\/tr><tr><td>D-13<\/td><td>주말 이벤트<\/td><td>하연의 조용한 장소를 함께 경험<\/td><td>학교 밖 신뢰 확장<\/td><td>소하 선택 시 과거 도피가 강화될 수 있음<\/td><\/tr><tr><td>D-7<\/td><td>첫 큰 장애물<\/td><td>하연에게 가려는 마음을 인정<\/td><td>상호 마음 확인 조건 강화<\/td><td>기존 관계 압박에 밀리면 하연 루트 약화<\/td><\/tr><tr><td>D-5<\/td><td>혼자 선 무대의 예감<\/td><td>하연과 연결된 밤으로 해석<\/td><td><code>HaYeonMemoryLink<\/code> 상승<\/td><td>신뢰 부족 시 혼자 선 소무대 기억으로 보임<\/td><\/tr><tr><td>D-2<\/td><td>말하지 못한 예감<\/td><td>하연의 조용한 동선을 이해<\/td><td>폐장 후 찾아갈 감각 획득<\/td><td>직접 약속은 잡지 않음. 이해 부족 시 D-Day 실패<\/td><\/tr><tr><td>D-1<\/td><td>쉬어가 카페 운영<\/td><td>하연과 같은 운영 시간대에서 협력<\/td><td>D-Day 조건 최종 정산<\/td><td>하연 감각을 놓치면 동선 파악 실패<\/td><\/tr><tr><td>D-Day<\/td><td>축제 2일차 폐장 후<\/td><td><code>[하연에게 말하러 간다]<\/code><\/td><td>진엔딩 진입<\/td><td>조건 부족 시 하연 실패 루프<\/td><\/tr><\/tbody><\/table><\/div>\n<h4 id=\"스토리-04루트세부기획-md-핵심-장면-설계-4\">핵심 장면 설계<\/h4>\n<p>하연과 서로의 마음을 확인하지 못하면 사고 기억에서 하연이 빠진다. 그 경우 내부 기준 D-Day 금요일 폐장 후 재윤은 자신이 왜 학교 뒤편 야외 소무대에 왔는지 모른 채 혼자 서 있고, 사고를 반복한 뒤 루프한다.<\/p>\n<p>하연과 마음을 확인해야만 그 밤이 <code>혼자 다친 사고<\/code>가 아니라 <code>하연에게 말하러 가던 선택의 결과<\/code>였음을 기억한다.<\/p>\n<p>중반 이후 주인공은 다음 단편을 본다.<\/p>\n<ul>\n<li>축제 마지막 밤<\/li>\n<li>서로 말하려던 학교 뒤편 야외 소무대<\/li>\n<li>하연의 놀란 얼굴<\/li>\n<li>무너지는 임시 조명 프레임<\/li>\n<li>손을 뻗는 주인공<\/li>\n<li>병원 조명<\/li>\n<li>하연이 부르는 목소리<\/li>\n<\/ul>\n<p>하연과의 마음 확인 실패 시에는 이 단편들이 다음처럼 비어 보인다.<\/p>\n<ul>\n<li>축제 마지막 밤<\/li>\n<li>학교 뒤편 야외 소무대<\/li>\n<li>누가 불렀는지 기억나지 않는 침묵<\/li>\n<li>혼자 서 있는 재윤<\/li>\n<li>금속이 삐걱이는 소리<\/li>\n<li>암전<\/li>\n<\/ul>\n<h4 id=\"스토리-04루트세부기획-md-d-2-말하지-못한-예감\">D-2: 말하지 못한 예감<\/h4>\n<p>D-2는 고백이나 약속의 날이 아니다. 하연이 먼저 <code>축제가 끝나고 보자<\/code>고 말하지 않는다.<\/p>\n<p>이 날의 역할은 재윤이 하연을 충분히 이해했을 때만 다음을 알아차리게 만드는 것이다.<\/p>\n<ul>\n<li>하연은 시끄러운 축제 중심보다 조용한 가장자리에서 마음을 정리하는 사람이다.<\/li>\n<li>하연은 중요한 말을 하기 전에 먼저 멀어지는 사람이 아니라, 조용한 곳에서 자기 속도를 맞추는 사람이다.<\/li>\n<li>재윤은 이 감각을 기억해두었다가 D-Day 폐장 후 하연이 있을 곳을 스스로 찾아야 한다.<\/li>\n<\/ul>\n<p>핵심 문장 후보:<\/p>\n<blockquote>하연은 약속하지 않았다.  <\/blockquote>\n<blockquote>하지만 재윤은 알 것 같았다.  <\/blockquote>\n<blockquote>저 애가 혼자 마음을 정리한다면, 어디에 서 있을지.<\/blockquote>\n<h4 id=\"스토리-04루트세부기획-md-d-day-성공-흐름\">D-Day 성공 흐름<\/h4>\n<p>조건이 충분하면 폐장 후 다음 선택지가 열린다.<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>완전 조건 충족 시 선택지는 더 선명해진다.<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>성공 흐름:<\/p>\n<ol>\n<li>낮에는 축제 2일차 선택을 통해 마지막 관계 정산을 한다.<\/li>\n<li>폐장 후 하연은 먼저 약속을 잡지 않는다.<\/li>\n<li>재윤은 하연이 조용한 소무대 쪽으로 향했음을 스스로 알아차린다.<\/li>\n<li>재윤이 먼저 찾아가 자기 마음과 선택을 말한다.<\/li>\n<li>하연도 자신이 기다리고 있었다는 마음을 확인한다.<\/li>\n<li>사고 기억이 재현되지만, 이번에는 <code>혼자 다친 사고<\/code>가 아니라 <code>서로에게 가려던 선택의 결과<\/code>로 의미가 회복된다.<\/li>\n<\/ol>\n<h4 id=\"스토리-04루트세부기획-md-하연-실패-루프\">하연 실패 루프<\/h4>\n<p>조건:<\/p>\n<ul>\n<li><code>HaYeonTrust<\/code> 부족.<\/li>\n<li><code>HaYeonPaceRead<\/code> 부족.<\/li>\n<li>기존 관계 정리가 부족해 하연에게 가려는 마음을 끝까지 인정하지 못함.<\/li>\n<li>사고 단서가 부족해 소무대와 하연의 기억을 연결하지 못함.<\/li>\n<\/ul>\n<p>연출:<\/p>\n<pre><code>폐장 후.\n학교 뒤편 야외 소무대.\n\n재윤은 혼자 서 있다.\n\n누가 불렀는지 기억나지 않는다.\n누구에게 가려 했는지도 기억나지 않는다.\n\n금속이 삐걱인다.\n암전.<\/code><\/pre>\n<p>이 실패는 하연에게 차이는 장면이 아니다. 하연이 사고 기억에서 빠질 만큼, 재윤이 그 마음을 기억하지 못한 결과다.<\/p>\n<p>---<\/p>\n<h3 id=\"스토리-04루트세부기획-md-d-day-분기-우선순위\">D-Day 분기 우선순위<\/h3>\n<p>D-Day에서는 여러 부족 조건이 동시에 존재할 수 있다. 분기 우선순위는 아래처럼 처리한다.<\/p>\n<ol>\n<li>하연 신뢰/동선 이해가 부족하면 하연 실패 루프로 보낸다.<\/li>\n<li>하연 조건은 충분하지만 기존 관계 정리가 부족하면 가장 위험한 미해결 축의 새드엔딩으로 보낸다.<\/li>\n<\/ol>\n<ul>\n<li><code>SoHaPressure<\/code> 최상: 소하 새드엔딩<\/li>\n<li><code>SeoRinControl<\/code> 최상: 서린 새드엔딩<\/li>\n<li><code>MiRuDependence<\/code> 최상: 미루 새드엔딩<\/li>\n<\/ul>\n<ol>\n<li>기존 관계도 정리했지만 사고 단서가 부족하면 사고 의미를 연결하지 못하는 루프로 보낸다.<\/li>\n<li>모든 조건을 만족하면 진엔딩 선택지를 개방한다.<\/li>\n<\/ol>\n<p>동점 처리:<\/p>\n<ul>\n<li>가장 최근에 선택한 기존 히로인 축을 우선한다.<\/li>\n<li>그래도 동점이면 <code>소하 &gt; 서린 &gt; 미루<\/code> 순으로 처리한다. 이유는 과거 도피가 가장 먼저 제시된 축이기 때문이다.<\/li>\n<li>히든 붕괴 조건이 이미 누적되어 있으면 일반 새드엔딩보다 히든 붕괴를 우선할 수 있다.<\/li>\n<\/ul>\n<h3 id=\"스토리-04루트세부기획-md-이벤트-실패-스킵-공통-규칙\">이벤트 실패/스킵 공통 규칙<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>상황<\/th><th>처리<\/th><\/tr><\/thead><tbody><tr><td>하연 이벤트 스킵 누적<\/td><td>하연이 사고 기억에서 흐려지고, D-5의 소무대 예감이 <code>혼자 선 무대<\/code>로 보임<\/td><\/tr><tr><td>소하 정리 스킵<\/td><td>과거 도피 선택지가 D-Day에 더 강하게 등장<\/td><\/tr><tr><td>서린 정리 스킵<\/td><td>선택지 UI가 서린의 말투로 정리되거나 일부 선택지가 잠김<\/td><\/tr><tr><td>미루 정리 스킵<\/td><td>방학식/멘토링 종료 문구가 흐려지고, 닫힌 방 이미지가 반복<\/td><\/tr><tr><td>사고 단서 스킵<\/td><td>소무대 사고가 단순 불운처럼 보이고, 하연에게 가려던 선택 의미가 연결되지 않음<\/td><\/tr><tr><td>혼자 선택 반복<\/td><td>자기 감각은 일부 회복하지만 <code>Avoidance<\/code>가 높아져 중요한 대화를 미루기 쉬워짐<\/td><\/tr><\/tbody><\/table><\/div>\n<p>스킵은 즉시 게임오버가 아니다. 다만 스킵한 축은 Final Week에서 더 강한 압박으로 돌아온다.<\/p>\n<h3 id=\"스토리-04루트세부기획-md-연결-문서\">연결 문서<\/h3>\n<ul>\n<li><a href=\"./08_D-3_관계정리_클라이맥스.md\">D-3 관계 정리 클라이맥스<\/a>: 소하/서린/미루 정리 장면의 선택지, 대사, 성공/실패 분기, 획득 단서를 대본형으로 확장한 문서.<\/li>\n<li><a href=\"./09_D-2_말하지_못한_예감.md\">D-2 말하지 못한 예감<\/a>: 하연이 직접 약속을 잡지 않고, 재윤이 조용한 동선과 말하지 못한 마음을 이해하는 컷신 대본.<\/li>\n<li><a href=\"./10_D-Day_축제마지막날_분기.md\">D-Day 축제 마지막 날 분기<\/a>: 축제 2일차 낮 선택과 폐장 후 하연 성공/실패 분기를 대본형으로 확장한 문서.<\/li>\n<li><a href=\"./11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a>: 진엔딩 전용 크레딧의 음악 방향, 방학 후일담 컷, 금지/주의 사항을 초안 수준으로 분리한 문서.<\/li>\n<li><a href=\"./12_D-1_D-Day_조건_수치화.md\">D-1/D-Day 조건 수치화<\/a>: D-1 밤 정산, D-Day 낮 보정, 폐장 후 최종 분기 기준을 점수·플래그로 정리한 문서.<\/li>\n<li><a href=\"./13_D-Day_스크립트_분할.md\">D-Day 스크립트 분할<\/a>: D-Day 공통 진입, 낮 선택, 폐장 후 평가, 진엔딩/실패/새드 분기를 실제 게임 스크립트 단위로 분리한 문서.<\/li>\n<\/ul>\n<h3 id=\"스토리-04루트세부기획-md-다음-작성-과제\">다음 작성 과제<\/h3>\n<ol>\n<li>진엔딩의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다.<\/li>\n<li>D-Day 스크립트 분할을 시스템 설계 문서의 StoryFlow Scene/Branch/Transition 구조와 맞춘다.<\/li>\n<li>크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.<\/li>\n<\/ol>", "headings": [{"level": 1, "text": "루트 세부 기획", "id": "스토리-04루트세부기획-md-루트-세부-기획"}, {"level": 2, "text": "루트 설계 원칙", "id": "스토리-04루트세부기획-md-루트-설계-원칙"}, {"level": 3, "text": "1. 하연 루트는 목적지, 기존 히로인 루트는 정리해야 할 도피처", "id": "스토리-04루트세부기획-md-1-하연-루트는-목적지-기존-히로인-루트는-정리해야-할-도피처"}, {"level": 3, "text": "2. 루트는 병렬 진행된다", "id": "스토리-04루트세부기획-md-2-루트는-병렬-진행된다"}, {"level": 3, "text": "3. 권장 플래그", "id": "스토리-04루트세부기획-md-3-권장-플래그"}, {"level": 3, "text": "4. 진엔딩 판정 요약", "id": "스토리-04루트세부기획-md-4-진엔딩-판정-요약"}, {"level": 2, "text": "공통 이벤트 단계", "id": "스토리-04루트세부기획-md-공통-이벤트-단계"}, {"level": 2, "text": "한소하 루트", "id": "스토리-04루트세부기획-md-한소하-루트"}, {"level": 3, "text": "루트 역할", "id": "스토리-04루트세부기획-md-루트-역할"}, {"level": 3, "text": "소하 루트 플래그", "id": "스토리-04루트세부기획-md-소하-루트-플래그"}, {"level": 3, "text": "주차별 이벤트", "id": "스토리-04루트세부기획-md-주차별-이벤트"}, {"level": 3, "text": "핵심 장면 설계", "id": "스토리-04루트세부기획-md-핵심-장면-설계"}, {"level": 3, "text": "클라이맥스", "id": "스토리-04루트세부기획-md-클라이맥스"}, {"level": 3, "text": "새드엔딩 처리", "id": "스토리-04루트세부기획-md-새드엔딩-처리"}, {"level": 2, "text": "백서린 루트", "id": "스토리-04루트세부기획-md-백서린-루트"}, {"level": 3, "text": "루트 역할", "id": "스토리-04루트세부기획-md-루트-역할-2"}, {"level": 3, "text": "서린 루트 플래그", "id": "스토리-04루트세부기획-md-서린-루트-플래그"}, {"level": 3, "text": "주차별 이벤트", "id": "스토리-04루트세부기획-md-주차별-이벤트-2"}, {"level": 3, "text": "핵심 장면 설계", "id": "스토리-04루트세부기획-md-핵심-장면-설계-2"}, {"level": 3, "text": "클라이맥스", "id": "스토리-04루트세부기획-md-클라이맥스-2"}, {"level": 3, "text": "새드엔딩 처리", "id": "스토리-04루트세부기획-md-새드엔딩-처리-2"}, {"level": 2, "text": "나미루 루트", "id": "스토리-04루트세부기획-md-나미루-루트"}, {"level": 3, "text": "루트 역할", "id": "스토리-04루트세부기획-md-루트-역할-3"}, {"level": 3, "text": "미루 루트 플래그", "id": "스토리-04루트세부기획-md-미루-루트-플래그"}, {"level": 3, "text": "주차별 이벤트", "id": "스토리-04루트세부기획-md-주차별-이벤트-3"}, {"level": 3, "text": "핵심 장면 설계", "id": "스토리-04루트세부기획-md-핵심-장면-설계-3"}, {"level": 3, "text": "클라이맥스", "id": "스토리-04루트세부기획-md-클라이맥스-3"}, {"level": 3, "text": "새드엔딩 처리", "id": "스토리-04루트세부기획-md-새드엔딩-처리-3"}, {"level": 2, "text": "은하연 / 진히로인 루트", "id": "스토리-04루트세부기획-md-은하연-진히로인-루트"}, {"level": 3, "text": "루트 역할", "id": "스토리-04루트세부기획-md-루트-역할-4"}, {"level": 3, "text": "하연 루트 플래그", "id": "스토리-04루트세부기획-md-하연-루트-플래그"}, {"level": 3, "text": "주차별 이벤트", "id": "스토리-04루트세부기획-md-주차별-이벤트-4"}, {"level": 3, "text": "핵심 장면 설계", "id": "스토리-04루트세부기획-md-핵심-장면-설계-4"}, {"level": 3, "text": "D-2: 말하지 못한 예감", "id": "스토리-04루트세부기획-md-d-2-말하지-못한-예감"}, {"level": 3, "text": "D-Day 성공 흐름", "id": "스토리-04루트세부기획-md-d-day-성공-흐름"}, {"level": 3, "text": "하연 실패 루프", "id": "스토리-04루트세부기획-md-하연-실패-루프"}, {"level": 2, "text": "D-Day 분기 우선순위", "id": "스토리-04루트세부기획-md-d-day-분기-우선순위"}, {"level": 2, "text": "이벤트 실패/스킵 공통 규칙", "id": "스토리-04루트세부기획-md-이벤트-실패-스킵-공통-규칙"}, {"level": 2, "text": "연결 문서", "id": "스토리-04루트세부기획-md-연결-문서"}, {"level": 2, "text": "다음 작성 과제", "id": "스토리-04루트세부기획-md-다음-작성-과제"}], "plain": "# 루트 세부 기획 이 문서는 각 히로인 루트의 세부 이벤트, 선택지, 획득 단서, 실패/스킵 시 변화를 정리한다. 루트는 일반 미연시처럼 한 명을 골라 연애 결론을 보는 구조가 아니다. 하연 진엔딩에 도달하기 위해, 재윤이 기존 관계에 숨지 않고 각 관계의 미뤄둔 감정을 정리하는 병렬 구조다. ## 루트 설계 원칙 ### 1. 하연 루트는 목적지, 기존 히로인 루트는 정리해야 할 도피처 | 축 | 인물 | 겉보기 역할 | 내면세계에서의 위험 | 진엔딩에서의 역할 | | --- | --- | --- | --- | --- | | 상호 마음 확인 | 은하연 | 전학생 / 진히로인 | 신뢰 부족 시 사고 기억에서 사라짐 | 재윤이 직접 찾아가 마음을 말해야 할 사람 | | 과거 | 한소하 | 소꿉친구 | 아무 일도 없던 과거에 머무르게 함 | 재윤이 하연을 좋아했다는 사실을 인정하게 함 | | 정답 | 백서린 | 방송반/학생회 선배 | 선택을 대신 정해 안전한 정지 상태에 가둠 | 재윤이 자기 선택권을 되찾게 함 | | 의존 | 나미루 | 멘토링 후배 | 필요한 사람으로 남기 위해 현실 복귀를 미루게 함 | 재윤이 끝나도 사라지지 않는 관계를 받아들이게 함 | | 사고 단서 | 공통 | 축제/소무대/병실 기억 | 사고를 없던 일로 만들려는 회피 | 다친 기억까지 안고 현실로 돌아가게 함 | ### 2. 루트는 병렬 진행된다 - 한 명씩 완전히 끝내고 다음으로 넘어가지 않는다. - 플레이어는 날짜별로 누구와 시간을 보낼지 선택한다. - 기존 히로인 이벤트를 모두 무시하면 진엔딩에 필요한 `관계 정리`와 `사고 단서`가 부족해진다. - 반대로 기존 히로인에게만 머무르면 하연과의 상호 마음 확인이 부족해지고, 하연이 사고 기억에서 빠진다. - 핵심은 `누구를 좋아하느냐`보다 `어떤 도피를 끝낼 수 있느냐`다. ### 3. 권장 플래그 실제 구현 변수명은 시스템 설계 단계에서 조정하되, 시나리오 설계에서는 아래 의미 축을 유지한다. | 임시 플래그 | 의미 | 주요 획득처 | | --- | --- | --- | | `HaYeonTrust` | 하연과 서로 마음을 확인할 수 있는 신뢰 | 하연의 속도 존중, 쉬어가 카페, D-2 예감, D-1 운영 | | `HaYeonPaceRead` | 하연이 조용한 곳에서 마음을 정리한다는 이해 | D-17, D-16, D-2 | | `SoHaResolved` | 소하와의 과거를 덮개로 쓰지 않음 | 소하 D-3 클라이맥스 | | `SeoRinResolved` | 서린에게 선택권을 맡기지 않음 | 서린 D-3 또는 D-4 클라이맥스 | | `MiRuResolved` | 미루의 의존을 대신 책임지지 않음 | 미루 D-3 클라이맥스 | | `AccidentClueSoHa` | 재윤이 하연을 기다렸다는 감정 단서 | 소하 클라이맥스 | | `AccidentClueSeoRin` | 소무대 임시 구조물/조명 프레임 위험 | 서린 D-9/D-4 | | `AccidentClueMiRu` | 출입금지 표지/고정끈/보고 대상 단서 | 미루 D-8/D-4 | | `AccidentClueHaYeon` | 서로 말하려던 장소와 끊긴 문장 | 하연 D-2/D-1/D-Day | | `Avoidance` | 선택을 미루는 회피 누적 | 혼자 선택, 답장 미루기, 결정 회피 | ### 4. 진엔딩 판정 요약 진엔딩은 아래 세 축을 모두 만족해야 열린다. 1. `HaYeonTrust`와 `HaYeonPaceRead`가 충분하다. 2. `SoHaResolved`, `SeoRinResolved`, `MiRuResolved`가 모두 충족되어 기존 관계 도피를 정리했다. 3. 사고 단서가 충분히 모여 `하연에게 가려던 선택의 결과로 다쳤다`는 의미를 연결할 수 있다. 부족 조건별 결과: | 부족 조건 | 결과 | | --- | --- | | 하연 신뢰 부족 | 폐장 후 하연의 동선을 알아차리지 못함. 하연이 사고 기억에서 빠지고 혼자 소무대 사고 루프 | | 소하 정리 부족 | 따뜻한 과거에 머무르는 소하 새드엔딩 | | 서린 정리 부족 | 안전한 정답/순서에 갇히는 서린 새드엔딩 | | 미루 정리 부족 | 필요한 사람 역할에 남는 미루 새드엔딩 | | 사고 단서 부족 | 마음은 있어도 사고 기억의 의미를 연결하지 못하고 루프 | | 모든 조건 충족 | `[다친 기억까지 안고 하연에게 돌아간다]` 선택지 개방 | ## 공통 이벤트 단계 | 단계 | 기간 | 설계 목적 | | --- | --- | --- | | 프롤로그 | D-32 ~ D-26 | 소하/서린/미루가 재윤의 생활권에 이미 있음을 보여주고, 재윤이 관계를 미루는 사람임을 체감시킨다. | | Week 1 | D-25 ~ D-19 | 하연 등장. 기존 관계와 하연이 같은 선택지 줄에 놓이기 시작한다. | | Week 2 | D-18 ~ D-12 | `쉬어가 카페`와 축제 준비를 통해 하연과 가까워지고, 기존 관계 축도 각자의 방식으로 흔들린다. | | Week 3 | D-11 ~ D-5 | 소하/서린/미루의 도피성이 뚜렷해지고, 사고 단서가 구체화된다. | | Final Week | D-4 ~ D-1 | 기존 관계 정리 클라이맥스와 하연 신뢰 최종 확인. | | D-Day | 축제 2일차 | 낮 선택 정산 후 폐장 후 하연을 찾아갈 수 있는지 결정한다. | --- ## 한소하 루트 ### 루트 역할 현실의 한소하는 주인공을 오래 좋아해 온 진짜 소꿉친구다. 2학년 2반으로, 2학년 5반인 주인공과 같은 학년이지만 같은 반은 아니어서, 교실 안 상시 반응보다 등굣길과 방과후의 익숙함으로 관계를 보여준다. 소하는 공동 행사에서 비교적 적극적으로 움직이는 타입이다. 자기 반 축제 준비에서는 후보를 줄이고 의견을 모으려 하며, 듣고만 있다가 역할을 떠맡는 재윤과 대비된다. 이 적극성은 초반에는 건강한 생활력으로 보이지만, 이후 소하 루트에서는 `예전처럼 돌아가야 한다`는 미련으로 굳어질 수 있다. 내면세계의 소하는 `돌아가고 싶은 평범한 과거`와 `하연에게 향한 마음을 회피하고 싶은 마음`을 상징한다. 핵심 질문: > 익숙한 과거가 아직 소중하더라도, 거기에 숨어 지금의 마음을 지워도 되는가? ### 소하 루트 플래그 | 플래그 | 획득/상승 | 의미 | | --- | --- | --- | | `SoHaBond` | 등굣길, 편의점, 오래된 사진 이벤트 | 오래된 관계의 친밀도 | | `SoHaPressure` | 하연 선택 후 소하를 계속 회피하거나 애매하게 답함 | 과거에 머무르라는 압박 | | `SoHaResolved` | D-3 클라이맥스에서 현재의 마음을 인정 | 과거를 소중히 여기되 도피처로 쓰지 않음 | | `AccidentClueSoHa` | 소하가 `축제날 네가 기다리던 사람은 내가 아니었어`를 말함 | 재윤이 하연을 향했다는 감정 단서 | ### 주차별 이벤트 | 시점 | 이벤트 | 주요 선택 | 성공/정리 결과 | 실패/스킵 변화 | | --- | --- | --- | --- | --- | | D-32 | 소하와 등교 | 같이 하교한다 / 먼저 간다 | 오래된 루틴과 소하의 진짜 애정을 보여줌 | 먼저 가면 소하 메시지가 남고 재윤의 회피 성향이 보임 | | D-28 | 첫 번째 선택 | 소하와 방과후 / 다른 인물 / 혼자 | 소하 선택 시 `SoHaBond` 상승, 오래된 사진 또는 음료 습관 제시 | 선택하지 않아도 관계는 유지되지만 미뤄둔 감정으로 남음 | | D-21 | 처음 고르는 방과후 | 소하의 반 준비 방문 | 소하가 재윤을 자기 반 준비에 끌어들이며 익숙함을 강화 | 하연을 고르면 소하가 장난으로 넘기지만 이후 말끝이 날카로워짐 | | D-13 | 주말 이벤트: 먼저 와 있던 마음 | 오래된 동네 가게에 간다 / 거절한다 | 소하가 `언제까지 같이 갈 수 있을까`를 다시 말함 | 거절하면 소하가 괜찮은 척하지만 `SoHaPressure` 상승 | | D-10 | 익숙한 것들이 먼저 움직였다 | 소하의 선제 도움을 받아들인다 / 거리를 둔다 | 소하가 재윤보다 먼저 필요한 것을 챙김 | 받아들이기만 하면 하연 쪽 선택을 대신 덮는 감각 발생 | | D-7 | 하연에게 가려는 첫 큰 장애물 | 소하에게 솔직히 말한다 / 얼버무린다 | 솔직히 말하면 D-3 정리 조건 개방 | 얼버무리면 소하 새드엔딩 진입 위험 상승 | | D-3 | 기존 관계 정리 클라이맥스 | `[예전처럼 남는다]` / `[지금 마음을 말한다]` | `SoHaResolved`, `AccidentClueSoHa` 획득 | `[예전처럼 남는다]` 선택 시 소하 새드엔딩 | ### 핵심 장면 설계 프롤로그 D-32에서는 소하와 주인공의 등교 루틴을 보여준다. 소하는 주인공의 오래된 습관을 전부 기억하고 있고, 주인공은 그 익숙함을 너무 당연하게 받아들인다. 핵심 대사: > 이렇게 같이 가는 거, 언제까지 할 수 있을까? 첫 회차에서는 소꿉친구의 아련한 대사처럼 보인다. 이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 소하 루트에서는 같은 의미가 `계속 예전처럼 남아달라`는 집착의 문장으로 대비된다. D-13 주말 이벤트에서는 오래된 동네 가게, 편의점 음료, 오래된 사진을 사용한다. 하연과의 신뢰가 충분히 쌓인 상태라면 재윤은 소하와 있어도 마음 한쪽이 하연에게 향해 있음을 자각한다. 하연 신뢰가 부족하면 이 장면은 `소하와 있으면 편하다`는 도피로 기운다. ### 클라이맥스 장소 후보: - 오래된 등굣길 - 편의점 앞 벤치 - 둘이 자주 지나던 골목 - 첫 회차 D-32와 같은 집 앞 골목 소하는 말한다. > 여기 있으면 아무 일도 일어나지 않아. 우리가 원래부터 행복했던 걸로 하면 되잖아. 재윤의 실패 선택지: ```text [예전처럼 돌아간다] ``` 재윤의 정리 선택지: ```text [지금의 마음까지 말한다] ``` 정리 성공 시 소하는 재윤을 붙잡지 않고, 대신 가장 중요한 단서를 준다. > 축제날, 네가 기다리던 사람은 내가 아니었어. 이 단서는 재윤이 하연을 향했다는 사실을 감정적으로 확정한다. 소하를 선택하지 않는 장면이지만, 소하를 버리는 장면이 아니라 오래된 관계를 거짓 과거로 만들지 않는 장면이어야 한다. ### 새드엔딩 처리 조건: - `SoHaPressure`가 높고 `SoHaResolved`가 없다. - 하연 이벤트를 충분히 진행하지 않았거나, 하연에 대한 마음을 소하 앞에서 계속 얼버무렸다. - D-3 또는 D-Day 직전 소하의 제안을 받아들인다. 연출: - 같은 아침, 같은 등굣길, 같은 편의점 음료가 반복된다. - 방학식 안내문은 보이지만 날짜가 흐릿하다. - 크레딧이 있다면 따뜻하지만 짧은 가짜 크레딧으로 처리한다. 핵심 문장: > 아무 일도 없던 날은 따뜻했다. > 그래서 더 오래 머무르면 안 되는 곳이었다. --- ## 백서린 루트 ### 루트 역할 현실의 백서린은 3학년 7반이며, 주인공이 1학년 때부터 동경하고 의지했던 방송반 선배이자 학생회 선배다. 3학년은 축제 반 행사를 직접 준비하지 않고 참가하며, 서린은 학생회/방송반 소속으로 축제 진행 지원과 방송 흐름을 맡고 있다. 주인공에게 서린은 `정답을 알려주는 사람`으로 각인되어 있다. 내면세계에서 이 관계는 선택권을 대신 넘기는 도피로 변한다. 핵심 질문: > 누군가가 알려준 정답이 안전해 보여도, 내 마음까지 대신 고르게 해도 되는가? ### 서린 루트 플래그 | 플래그 | 획득/상승 | 의미 | | --- | --- | --- | | `SeoRinTrust` | 방송실 업무, 큐시트 검토 | 서린이 재윤의 판단을 신뢰하는 정도 | | `SeoRinControl` | 재윤이 서린에게 계속 결정을 맡김 | 선택지 통제 위험 | | `SeoRinResolved` | 재윤이 직접 선택하겠다고 말함 | 선택권 회복 | | `AccidentClueSeoRin` | 소무대 임시 구조물, 조명 프레임, 점검표 | 사고의 물리적 단서 | ### 주차별 이벤트 | 시점 | 이벤트 | 주요 선택 | 성공/정리 결과 | 실패/스킵 변화 | | --- | --- | --- | --- | --- | | D-31 | 방송실의 정답 | 대본 흐름에 의견을 낸다 / 지시만 따른다 | 서린이 재윤의 판단을 인정 | 지시만 따르면 `정답을 받는 관계`가 강화됨 | | D-21 | 방과후 방송 일정표 | 일정표를 같이 고친다 / 서린 안을 따른다 | `SeoRinTrust` 상승 | 선택권을 맡기면 `SeoRinControl` 상승 | | D-12 | 주말 이벤트: 먼저 준비된 답 | 장비 대여 시간 확인 / 서린이 정한 동선 따름 | 방송/장비 구조 이해 | 통제 공간의 안정감이 강해짐 | | D-9 | 먼저 정리된 위험 / 정답을 물으러 간 방송실 | 야외 소무대 점검표를 직접 본다 / 서린에게 마음 상담을 한다 / 서린에게 맡긴다 | `AccidentClueSeoRin` 획득, `SeoRinControl` 감소 가능 | 사고 위험 단서를 놓치거나, 마음 선택까지 서린에게 맡김 | | D-4 | 단서 정리 시작 | 점검표와 하연 기억을 연결한다 / 안전 문제로만 본다 | 사고 단서가 의미 단서로 전환 | 사고를 단순 안전 사고로만 오해 | | D-3 | 기존 관계 정리 클라이맥스 | `[서린이 정한 길을 따른다]` / `[내가 선택할게]` | `SeoRinResolved` 획득 | 서린 새드엔딩 진입 | ### 핵심 장면 설계 프롤로그 D-31에서는 방송실에서 서린의 안내 방송 대본과 장비 체크 순서를 함께 검토한다. 서린은 주인공에게 대본 흐름과 장비 순서를 봐달라고 부탁하고, 주인공의 의견을 실제로 반영한다. 핵심 대사: > 정답을 알려주는 건 쉬워. 근데 네가 고른 답이 더 나을 때도 있어. 이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 서린 루트에서는 이 문장과 대비되는 `정답은 내가 알려줄게. 너는 고르지 않아도 돼.`가 등장할 수 있다. D-9 이벤트에서는 소무대 임시 구조물, 조명 프레임, 케이블 고정, 출입 제한 안내가 문서 형태로 등장한다. 서린은 위험을 `관리 가능한 문제`로 정리하려 하지만, 재윤은 그 문서가 단순 안전 단서가 아니라 자기 사고 기억과 연결된다는 감각을 받아야 한다. 이 장면은 동시에 재윤이 서린에게 마음의 기준을 묻는 고민상담 장면이 된다. 하연에게 끌리는 마음, 소하에게 미안한 마음, 미루를 책임져야 할 것 같은 마음이 한꺼번에 섞이자 재윤은 `맞는 답`을 얻으러 방송실로 간다. 서린의 역할은 여기서 단순 조력자가 아니라, 재윤이 자기 선택권을 다시 붙잡도록 만드는 상담자로 확장된다. 상담 선택지: ```text [정답이 아니라, 내가 고를 이유를 찾는다] [선배가 보기엔 누가 맞아요?] ``` 성공 선택인 `[정답이 아니라, 내가 고를 이유를 찾는다]`는 `SeoRinTrust +1`, `SeoRinControl -1`, `Avoidance -1`로 처리한다. 재윤이 하연을 좋아한다는 결론을 바로 확정하는 선택이 아니라, 적어도 `누가 정해줘야 움직이는 상태`에서 벗어나는 선택이다. 실패 선택인 `[선배가 보기엔 누가 맞아요?]`는 `SeoRinControl +1`, `Avoidance +1`로 처리하고, D-3에서 `[내가 선택할게]`가 잠기거나 노이즈가 끼는 조건으로 이어진다. 상담 핵심 대사: ```text 재윤: 선배는 이런 거 어떻게 정해요? 서린: 이런 거? 재윤: 누굴 좋아하는지, 아니면 누구한테 미안한 건지. 재윤: 그게 잘 구분이 안 될 때요. 서린: 기준을 나누면 돼. 서린: 좋아하는 마음, 미안한 마음, 책임감, 익숙함. 서린: 네가 지금 헷갈리는 건 전부 같은 이름으로 묶어놨기 때문이야. 재윤: 그럼 저는 어떻게 해야 맞아요? 서린: 그 질문은 틀렸어. 서린: 맞는 걸 고르려고 하면, 넌 또 네 선택을 남한테 맡기게 돼. 서린: 내가 정해주면 편하겠지. 서린: 너는 틀리지 않아도 되고, 서린: 나는 네가 계속 나를 찾아오게 만들 수 있으니까. 서린: 그런데 그건 상담이 아니야. 붙잡는 거지. ``` 이 대사는 D-3 클라이맥스에서 `내가 정해주면 편하겠지`와 `맞는 걸 고르려고 하면 또 맡기게 된다`는 회상으로 재사용한다. 성공 루트에서는 서린이 재윤에게 `맞는 답이 아니라 네가 고른 이유를 가져와`라고 남기고, 실패 루트에서는 재윤이 끝까지 `선배가 정해준 길`을 안전한 선택으로 착각한다. ### 클라이맥스 장소 후보: - 방송실 - 학생회실 - 자료실 - 축제 운영본부 서린이 정한 선택지만 보인다. ```text [서린이 정한 길을 따른다] ``` 재윤이 선택지를 깨뜨리고 새로운 선택지를 만든다. ```text [내가 선택할게] ``` 서린은 재윤이 틀릴까 봐 선택을 대신해주려 한다. 하지만 정리 성공 시, 서린은 재윤에게 사고 단서와 함께 선택권을 돌려준다. > 네가 틀린 선택을 해서 그 애가 다친 게 아니야. 네가 선택했기 때문에, 그 애가 살아 있는 거야. ### 새드엔딩 처리 조건: - `SeoRinControl`이 높고 `SeoRinResolved`가 없다. - 위험 단서를 서린의 판단에만 맡기고, 재윤이 스스로 하연에게 갈 이유를 고르지 못한다. - D-3 또는 D-Day 직전 `[서린이 정한 길을 따른다]`를 선택한다. 연출: - 방송실과 학생회실이 지나치게 정돈된다. - 일정표에는 월요일 방학식까지 완벽히 적혀 있지만, 날짜는 넘어가지 않는다. - 크레딧이 있다면 차갑고 정돈된 가짜 크레딧으로 처리한다. 핵심 문장: > 모든 순서는 맞았다. > 그런데 재윤이 고른 것은 하나도 없었다. --- ## 나미루 루트 ### 루트 역할 현실의 나미루는 1학년 3반이며, 주인공이 챙겨주던 1학년 후배이자 축제 도움 인원이다. 주인공은 미루의 `1학기 한정 학습·학교생활 적응 멘토`였다. 이 멘토링은 수학/영어 보충, 수행평가 정리, 발표 연습, 제출물과 마감일 정리, 봉사활동이나 행사 신청 도움, 모르는 일이 생겼을 때 누구에게 질문하고 보고할지 정하는 연습까지 포함한다. 축제 2일차 뒤 D+3 월요일 방학식이 오면 공식적으로 끝난다. 현실의 멘토링은 미루가 앞으로 나아가도록 도운 따뜻한 관계다. 이후 내면세계에서는 이 관계가 `선배가 없으면 아무것도 못 한다`, `멘토링이 끝나면 선배도 사라진다`는 의존으로 변한다. 핵심 질문: > 누군가에게 필요한 사람으로 남기 위해, 끝나야 할 관계를 끝나지 않게 만들어도 되는가? ### 미루 루트 플래그 | 플래그 | 획득/상승 | 의미 | | --- | --- | --- | | `MiRuBond` | 멘토링 도움, 신청서, 발표 연습 | 보호하고 싶은 후배 관계 | | `MiRuDependence` | 재윤이 모든 문제를 대신 해결 | 의존 위험 | | `MiRuResolved` | 미루가 먼저 해볼 수 있게 지지 | 멘토링 종료 수용 | | `AccidentClueMiRu` | 출입금지 표지, 고정끈, 보고 대상 | 사고 현장 접근/고정 관련 단서 | ### 주차별 이벤트 | 시점 | 이벤트 | 주요 선택 | 성공/정리 결과 | 실패/스킵 변화 | | --- | --- | --- | --- | --- | | D-31 | 복도의 후배 | 프린트를 같이 정리 / 대신 전부 정리 | 미루의 불안과 노력 모두 제시 | 대신 전부 하면 의존 기준점 형성 | | D-21 | 도움 인원 신청 | 신청서 작성법을 설명 / 대신 써준다 | 미루가 스스로 참여할 수 있음 | `MiRuDependence` 상승 | | D-12 | 주말 이벤트: 먼저 준비된 답 | 발표 연습을 지켜본다 / 답을 외우게 한다 | 미루가 자기 말로 말하는 경험 | 정답 의존과 재윤 의존 강화 | | D-8 | 선을 붙잡고 있는 손 | 출입 제한 표지와 고정끈을 확인 | `AccidentClueMiRu` 획득 | 사고 단서 부족 위험 | | D-6 | 주말 선택 | 미루의 혼자 해보기 확인 / 계속 옆에 있어줌 | D-3 정리 조건 개방 | 닫힌 방 새드엔딩 위험 상승 | | D-3 | 기존 관계 정리 클라이맥스 | `[계속 가르쳐준다]` / `[먼저 해보게 한다]` | `MiRuResolved` 획득 | 미루 새드엔딩 진입 | ### 핵심 장면 설계 프롤로그 D-31에서는 방송실에서 나온 주인공이 복도에서 미루와 마주친다. 미루는 멘토링 자료나 수행평가 프린트 묶음을 떨어뜨리고, 주인공이 자연스럽게 도와준다. 핵심 대사: > 선배가 있으면, 저도 할 수 있을 것 같아요. 이 시점에는 아직 루프나 기억의 균열이 드러나지 않는다. 이후 미루 루트에서는 이 문장과 대비되는 `선배가 없으면, 저는 아무것도 못 해요.`가 등장할 수 있다. D-8 이벤트에서는 축제 도움 인원 동선, 출입 제한 표지, 고정끈, 보고 대상이 연결된다. 미루가 실수로 알게 된 단서처럼 보이지만, 실제로는 재윤이 사고 기억을 받아들이기 위한 중요한 조각이다. ### 클라이맥스 장소 후보: - 학교 복도처럼 보이다가 미루의 방처럼 좁아지는 공간 - 멘토링 교실 - 축제 도움 인원 대기 장소 - 닫힌 문 앞 미루는 말한다. > 여기에 있으면 아무 일도 일어나지 않은 걸로 할 수 있어요. 그러니까 깨어나지 마세요. 또는: > 선배가 없으면 저는 아직 아무것도 못 해요. 그러니까 오늘도 가르쳐주세요. 또는: > 방학식만 안 오면, 아직 멘토링 끝난 거 아니죠? 실패 선택지: ```text [계속 옆에 있어준다] ``` 정리 선택지: ```text [먼저 해보게 한다] ``` 정리 성공 시 미루는 현실 신호에 가까운 단서를 말한다. > 밖에서 누군가 계속 네 이름을 부르고 있어요. 저는 그 목소리가 싫었어요. 이 단서는 병실에서 하연이 재윤을 부르고 있었다는 감각과 이어진다. ### 새드엔딩 처리 조건: - `MiRuDependence`가 높고 `MiRuResolved`가 없다. - 재윤이 미루의 문제를 계속 대신 해결한다. - D-3 또는 D-Day 직전 `[계속 옆에 있어준다]`를 선택한다. 연출: - 학교 복도가 미루의 방처럼 좁아진다. - 체크리스트는 끝나지 않고, 방학식 안내문은 문밖에만 있다. - 크레딧이 있다면 달콤하지만 불안한 가짜 크레딧으로 처리한다. 핵심 문장: > 필요한 사람이 되는 건 따뜻했다. > 하지만 그 따뜻함은 문을 닫고 있었다. --- ## 은하연 / 진히로인 루트 ### 루트 역할 내면세계의 하연은 처음에는 공허하고 차갑다. 주인공이 아직 하연과 사고를 제대로 기억하지 못하기 때문이다. 초반 하연은 2학년 5반 전학생이라 반 행사에 적극적으로 나서지 않는다. 반 친구들의 소란 속에서 가장자리에 머물고, `조용한 것도 나쁘지 않다`는 식의 작은 취향만 흘린다. 재윤은 하연의 작은 말을 알아차리며, 둘은 주도적으로 움직이기보다 같은 흐름 안에 떠밀려 들어가면서 가까워진다. 하연 루트의 목표는 단순 친밀 수치를 올리는 것이 아니라, 하연과 서로 마음을 확인할 수 있을 만큼 신뢰를 쌓고, 재윤이 기존 관계 뒤에 숨지 않은 채 축제 마지막 날 먼저 자기 마음과 선택을 말하러 가게 만드는 것이다. 핵심 질문: > 하연이 먼저 부르지 않아도, 재윤은 스스로 그녀가 있을 곳을 알아차리고 찾아갈 수 있는가? ### 하연 루트 플래그 | 플래그 | 획득/상승 | 의미 | | --- | --- | --- | | `HaYeonTrust` | 하연의 말과 속도를 존중 | 서로 마음을 확인할 수 있는 신뢰 | | `HaYeonPaceRead` | 조용한 공간, 기다림, 동선 이해 | 폐장 후 하연이 있을 곳을 알아차리는 조건 | | `HaYeonMemoryLink` | 축제 밤, 소무대, 끊긴 문장 기억 | 사고 기억에서 하연이 사라지지 않게 함 | | `AccidentClueHaYeon` | D-2 예감, D-1 운영, D-Day 폐장 후 | 혼자가 아니었던 사고 기억 | ### 주차별 이벤트 | 시점 | 이벤트 | 주요 선택 | 성공/정리 결과 | 실패/스킵 변화 | | --- | --- | --- | --- | --- | | D-25 | 은하연 전학 | 작은 도움을 건넨다 / 지켜본다 | 하연이 고맙다고 하되 기대지는 않음 | 억지 접근 시 신뢰 상승 없음 | | D-24 | 두 번째 기회 | 위치만 알려준다 / 같이 간다 / 기다린다 | 하연의 속도를 존중하면 `HaYeonTrust` 상승 | 과한 동행은 접점은 생기지만 신뢰가 덜 오름 | | D-22 | 우리 반은 뭘 할까 | 하연의 짧은 의견을 살린다 | 하연의 말이 반 안에서 사라지지 않음 | 실무 효율만 고르면 하연의 감각이 밀림 | | D-21 | 방과후 선택 | 하연과 자료 정리 | 기존 히로인과 같은 선택지 줄에 하연이 놓임 | 하연 미선택이 누적되면 폐장 후 동선 이해 부족 | | D-18 | 쉬어가 카페 확정 | 하연의 말을 반 이름으로 연결 | 하연의 취향이 공동 공간이 됨 | 재윤이 혼자 처리하면 신뢰 부족 | | D-17 | 들어와도 되고, 안 들어와도 되는 곳 | 동선을 반영 / 손님 수 우선 | `HaYeonPaceRead` 상승 | 하연이 편한 공간 감각을 놓침 | | D-16 | 카페 문구 | 하연에게 확인받는다 / 혼자 확정 | 강요하지 않는 관계 방식 확립 | 좋은 문구여도 하연의 속도를 놓침 | | D-15 | 한 박자 늦은 대답 | 이상한 감각을 말한다 / 숨긴다 | 기억 어긋남을 하연과 공유 | 혼자 숨기면 하연 기억 연결 약화 | | D-13 | 주말 이벤트 | 하연의 조용한 장소를 함께 경험 | 학교 밖 신뢰 확장 | 소하 선택 시 과거 도피가 강화될 수 있음 | | D-7 | 첫 큰 장애물 | 하연에게 가려는 마음을 인정 | 상호 마음 확인 조건 강화 | 기존 관계 압박에 밀리면 하연 루트 약화 | | D-5 | 혼자 선 무대의 예감 | 하연과 연결된 밤으로 해석 | `HaYeonMemoryLink` 상승 | 신뢰 부족 시 혼자 선 소무대 기억으로 보임 | | D-2 | 말하지 못한 예감 | 하연의 조용한 동선을 이해 | 폐장 후 찾아갈 감각 획득 | 직접 약속은 잡지 않음. 이해 부족 시 D-Day 실패 | | D-1 | 쉬어가 카페 운영 | 하연과 같은 운영 시간대에서 협력 | D-Day 조건 최종 정산 | 하연 감각을 놓치면 동선 파악 실패 | | D-Day | 축제 2일차 폐장 후 | `[하연에게 말하러 간다]` | 진엔딩 진입 | 조건 부족 시 하연 실패 루프 | ### 핵심 장면 설계 하연과 서로의 마음을 확인하지 못하면 사고 기억에서 하연이 빠진다. 그 경우 내부 기준 D-Day 금요일 폐장 후 재윤은 자신이 왜 학교 뒤편 야외 소무대에 왔는지 모른 채 혼자 서 있고, 사고를 반복한 뒤 루프한다. 하연과 마음을 확인해야만 그 밤이 `혼자 다친 사고`가 아니라 `하연에게 말하러 가던 선택의 결과`였음을 기억한다. 중반 이후 주인공은 다음 단편을 본다. - 축제 마지막 밤 - 서로 말하려던 학교 뒤편 야외 소무대 - 하연의 놀란 얼굴 - 무너지는 임시 조명 프레임 - 손을 뻗는 주인공 - 병원 조명 - 하연이 부르는 목소리 하연과의 마음 확인 실패 시에는 이 단편들이 다음처럼 비어 보인다. - 축제 마지막 밤 - 학교 뒤편 야외 소무대 - 누가 불렀는지 기억나지 않는 침묵 - 혼자 서 있는 재윤 - 금속이 삐걱이는 소리 - 암전 ### D-2: 말하지 못한 예감 D-2는 고백이나 약속의 날이 아니다. 하연이 먼저 `축제가 끝나고 보자`고 말하지 않는다. 이 날의 역할은 재윤이 하연을 충분히 이해했을 때만 다음을 알아차리게 만드는 것이다. - 하연은 시끄러운 축제 중심보다 조용한 가장자리에서 마음을 정리하는 사람이다. - 하연은 중요한 말을 하기 전에 먼저 멀어지는 사람이 아니라, 조용한 곳에서 자기 속도를 맞추는 사람이다. - 재윤은 이 감각을 기억해두었다가 D-Day 폐장 후 하연이 있을 곳을 스스로 찾아야 한다. 핵심 문장 후보: > 하연은 약속하지 않았다. > 하지만 재윤은 알 것 같았다. > 저 애가 혼자 마음을 정리한다면, 어디에 서 있을지. ### D-Day 성공 흐름 조건이 충분하면 폐장 후 다음 선택지가 열린다. ```text [하연에게 말하러 간다] ``` 완전 조건 충족 시 선택지는 더 선명해진다. ```text [다친 기억까지 안고 하연에게 돌아간다] ``` 성공 흐름: 1. 낮에는 축제 2일차 선택을 통해 마지막 관계 정산을 한다. 2. 폐장 후 하연은 먼저 약속을 잡지 않는다. 3. 재윤은 하연이 조용한 소무대 쪽으로 향했음을 스스로 알아차린다. 4. 재윤이 먼저 찾아가 자기 마음과 선택을 말한다. 5. 하연도 자신이 기다리고 있었다는 마음을 확인한다. 6. 사고 기억이 재현되지만, 이번에는 `혼자 다친 사고`가 아니라 `서로에게 가려던 선택의 결과`로 의미가 회복된다. ### 하연 실패 루프 조건: - `HaYeonTrust` 부족. - `HaYeonPaceRead` 부족. - 기존 관계 정리가 부족해 하연에게 가려는 마음을 끝까지 인정하지 못함. - 사고 단서가 부족해 소무대와 하연의 기억을 연결하지 못함. 연출: ```text 폐장 후. 학교 뒤편 야외 소무대. 재윤은 혼자 서 있다. 누가 불렀는지 기억나지 않는다. 누구에게 가려 했는지도 기억나지 않는다. 금속이 삐걱인다. 암전. ``` 이 실패는 하연에게 차이는 장면이 아니다. 하연이 사고 기억에서 빠질 만큼, 재윤이 그 마음을 기억하지 못한 결과다. --- ## D-Day 분기 우선순위 D-Day에서는 여러 부족 조건이 동시에 존재할 수 있다. 분기 우선순위는 아래처럼 처리한다. 1. 하연 신뢰/동선 이해가 부족하면 하연 실패 루프로 보낸다. 2. 하연 조건은 충분하지만 기존 관계 정리가 부족하면 가장 위험한 미해결 축의 새드엔딩으로 보낸다. - `SoHaPressure` 최상: 소하 새드엔딩 - `SeoRinControl` 최상: 서린 새드엔딩 - `MiRuDependence` 최상: 미루 새드엔딩 3. 기존 관계도 정리했지만 사고 단서가 부족하면 사고 의미를 연결하지 못하는 루프로 보낸다. 4. 모든 조건을 만족하면 진엔딩 선택지를 개방한다. 동점 처리: - 가장 최근에 선택한 기존 히로인 축을 우선한다. - 그래도 동점이면 `소하 > 서린 > 미루` 순으로 처리한다. 이유는 과거 도피가 가장 먼저 제시된 축이기 때문이다. - 히든 붕괴 조건이 이미 누적되어 있으면 일반 새드엔딩보다 히든 붕괴를 우선할 수 있다. ## 이벤트 실패/스킵 공통 규칙 | 상황 | 처리 | | --- | --- | | 하연 이벤트 스킵 누적 | 하연이 사고 기억에서 흐려지고, D-5의 소무대 예감이 `혼자 선 무대`로 보임 | | 소하 정리 스킵 | 과거 도피 선택지가 D-Day에 더 강하게 등장 | | 서린 정리 스킵 | 선택지 UI가 서린의 말투로 정리되거나 일부 선택지가 잠김 | | 미루 정리 스킵 | 방학식/멘토링 종료 문구가 흐려지고, 닫힌 방 이미지가 반복 | | 사고 단서 스킵 | 소무대 사고가 단순 불운처럼 보이고, 하연에게 가려던 선택 의미가 연결되지 않음 | | 혼자 선택 반복 | 자기 감각은 일부 회복하지만 `Avoidance`가 높아져 중요한 대화를 미루기 쉬워짐 | 스킵은 즉시 게임오버가 아니다. 다만 스킵한 축은 Final Week에서 더 강한 압박으로 돌아온다. ## 연결 문서 - [D-3 관계 정리 클라이맥스](./08_D-3_관계정리_클라이맥스.md): 소하/서린/미루 정리 장면의 선택지, 대사, 성공/실패 분기, 획득 단서를 대본형으로 확장한 문서. - [D-2 말하지 못한 예감](./09_D-2_말하지_못한_예감.md): 하연이 직접 약속을 잡지 않고, 재윤이 조용한 동선과 말하지 못한 마음을 이해하는 컷신 대본. - [D-Day 축제 마지막 날 분기](./10_D-Day_축제마지막날_분기.md): 축제 2일차 낮 선택과 폐장 후 하연 성공/실패 분기를 대본형으로 확장한 문서. - [진엔딩 크레딧 콘티 초안](./11_진엔딩_크레딧_콘티_초안.md): 진엔딩 전용 크레딧의 음악 방향, 방학 후일담 컷, 금지/주의 사항을 초안 수준으로 분리한 문서. - [D-1/D-Day 조건 수치화](./12_D-1_D-Day_조건_수치화.md): D-1 밤 정산, D-Day 낮 보정, 폐장 후 최종 분기 기준을 점수·플래그로 정리한 문서. - [D-Day 스크립트 분할](./13_D-Day_스크립트_분할.md): D-Day 공통 진입, 낮 선택, 폐장 후 평가, 진엔딩/실패/새드 분기를 실제 게임 스크립트 단위로 분리한 문서. ## 다음 작성 과제 1. 진엔딩의 D+2 병실 장면과 D+3 방학식 장면을 실제 컷신 단위로 분리한다. 2. D-Day 스크립트 분할을 시스템 설계 문서의 StoryFlow Scene/Branch/Transition 구조와 맞춘다. 3. 크레딧 콘티 초안의 실제 타이밍, 원화 레퍼런스, 음악 구성을 확정한다.", "excerpt": "# 루트 세부 기획 이 문서는 각 히로인 루트의 세부 이벤트, 선택지, 획득 단서, 실패/스킵 시 변화를 정리한다. 루트는 일반 미연시처럼 한 명을 골라 연애 결론을 보는 구조가 아니다. 하연 진엔딩에 도달하기 위해, 재윤이 기존 관계에 숨지 않고 각 관계의 미뤄둔 감정을 정리하는 병렬 구조다. ## 루트 설계 원칙 ### 1. 하연 루트는 목적지, 기존 히로인 루트는 정리해야 할 도피처 |"}, {"path": "스토리/05_엔딩과_루프.md", "category": "스토리", "title": "엔딩과 루프", "id": "스토리-05엔딩과루프-md", "html": "<h2 id=\"스토리-05엔딩과루프-md-엔딩과-루프\">엔딩과 루프<\/h2>\n<h3 id=\"스토리-05엔딩과루프-md-진엔딩\">진엔딩<\/h3>\n<p>축제 마지막 밤이 다시 재현된다.<\/p>\n<p>처음 선택지는 회피와 미련에 묶여 있다.<\/p>\n<pre><code>[아무 일도 없었던 것으로 한다]\n[선택하지 않는다]\n[여기에 남는다]<\/code><\/pre>\n<p>일반 히로인 루트에서 얻은 단서들이 개입한다.<\/p>\n<ul>\n<li>한소하: 거짓 과거가 아니라 진짜 기억을 보게 해준다.<\/li>\n<li>백서린: 정해진 선택지가 아니라 주인공 자신의 선택을 돌려준다.<\/li>\n<li>나미루: 꿈속에 붙잡지 않고 현실로 나아가게 해준다.<\/li>\n<\/ul>\n<p>마지막에 새로운 선택지가 생긴다.<\/p>\n<pre><code>[하연에게 말하러 간다]<\/code><\/pre>\n<p>완전 조건 충족 시 선택지는 더 선명해진다.<\/p>\n<pre><code>[다친 기억까지 안고 하연에게 돌아간다]<\/code><\/pre>\n<p>주인공은 사고의 진실을 받아들이고, 내면세계에서 하연에게 먼저 자기 마음과 선택을 말한다. 이 고백은 꿈속에 남기 위한 고백이 아니라, 현실에서 다시 만나기 위한 약속이다.<\/p>\n<p>핵심 문장 후보:<\/p>\n<blockquote>아무 일도 없던 날로 돌아가고 싶은 게 아니야.  <\/blockquote>\n<blockquote>다친 것도, 무서웠던 것도 기억한 채로 너에게 갈게.<\/blockquote>\n<h4 id=\"스토리-05엔딩과루프-md-현실-복귀-구조\">현실 복귀 구조<\/h4>\n<p>진엔딩은 금요일 밤에서 토요일을 표기하지 않고 바로 일요일 오후로 점프한다.<\/p>\n<pre><code>D-Day 금요일 밤\n사고 기억 수용\n암전\n\n일요일 오후\n병실<\/code><\/pre>\n<p>토요일은 플레이어 경험에서 빠진다. 재윤은 그 시간을 기억하지 못한다.<\/p>\n<p>병실에서 재윤은 일요일 오후에 눈을 뜬다. 큰 외상은 없지만, 알 수 없는 이유로 금요일 밤부터 계속 깨어나지 못한 상태였다.<\/p>\n<pre><code>재윤: 오늘… 며칠이야?\n하연: 일요일.\n재윤: 하루가 지났어?\n하연: 하루 넘게. 계속 안 일어났어.<\/code><\/pre>\n<p>하연은 재윤이 크게 다친 것은 아니라고 말한다.<\/p>\n<pre><code>재윤: 나… 많이 다쳤어?\n하연: 아니.\n재윤: 아닌데 왜 병원이야?\n하연: 안 일어났어.\n재윤: 얼마나?\n하연: 금요일 밤부터… 계속.<\/code><\/pre>\n<p>의사는 검사상 큰 이상을 찾지 못한다.<\/p>\n<pre><code>의사: 외상은 크지 않습니다.\n의사: 그런데 의식이 돌아오지 않는 이유를 설명하기 어려웠습니다.<\/code><\/pre>\n<p>이 구조의 의미:<\/p>\n<ul>\n<li>재윤은 외상 때문에 못 깨어난 것이 아니다.<\/li>\n<li>돌아올 이유를 찾지 못해서 내면세계에 머물렀다.<\/li>\n<li>진엔딩에서 돌아올 이유를 찾았기 때문에 일요일에 깨어난다.<\/li>\n<\/ul>\n<h4 id=\"스토리-05엔딩과루프-md-일요일-병실-장면\">일요일 병실 장면<\/h4>\n<p>하연:<\/p>\n<blockquote>늦었어.<\/blockquote>\n<p>재윤:<\/p>\n<blockquote>이번엔 기억하고 왔어.<\/blockquote>\n<h4 id=\"스토리-05엔딩과루프-md-d-3-월요일-방학식\">D+3 월요일 방학식<\/h4>\n<p>진엔딩 이후 재윤은 월요일 방학식에 겨우 참석한다.<\/p>\n<p>조건:<\/p>\n<ul>\n<li>오래 머물 수 없다.<\/li>\n<li>몸은 무겁고 걸음은 느리다.<\/li>\n<li>얼굴이나 팔에는 작은 밴드와 처치 흔적이 남아 있다.<\/li>\n<li>주변 사람들은 무리하지 말라고 한다.<\/li>\n<\/ul>\n<p>방학식 참석은 <code>루프에서 도달하지 못하던 다음 월요일에 처음 도달했다<\/code>는 증거다.<\/p>\n<pre><code>처음으로,\n금요일 다음의 월요일이 왔다.<\/code><\/pre>\n<p>방학식 장면 후보:<\/p>\n<pre><code>하연: 진짜 왔네.\n재윤: 월요일이 왔으니까.<\/code><\/pre>\n<pre><code>소하: 야, 유재윤. 누가 이런 데까지 오랬냐.\n재윤: 너라면 올 줄 알았잖아.<\/code><\/pre>\n<pre><code>서린: 오래 있으면 안 돼.\n재윤: 네.\n서린: 그래도… 와줘서 다행이야.<\/code><\/pre>\n<pre><code>미루: 선배, 멘토링 끝나도… 가끔 인사해도 되죠?\n재윤: 당연하지.<\/code><\/pre>\n<p>마지막 문장 후보:<\/p>\n<blockquote>축제는 끝났다.  <\/blockquote>\n<blockquote>방학식도 끝났다.  <\/blockquote>\n<blockquote>그래도 월요일은 사라지지 않았다.  <\/blockquote>\n<blockquote>그리고 여름은, 아직 남아 있었다.<\/blockquote>\n<h4 id=\"스토리-05엔딩과루프-md-방학으로-이어지는-엔딩-여운\">방학으로 이어지는 엔딩 여운<\/h4>\n<p>진엔딩은 방학식에서 관계를 끝내지 않는다. 오히려 방학식이 끝난 직후부터, 하연과 재윤이 현실의 시간 속에서 계속 만날 수 있음을 암시해야 한다.<\/p>\n<p>연출 기준:<\/p>\n<ul>\n<li>방학식 직후 두 사람은 병원 재검사, 학교 도서관, 카페, 짧은 산책처럼 작고 현실적인 다음 약속을 나눈다.<\/li>\n<li>약속은 거창한 연애 선언이 아니라 <code>내일<\/code>, <code>모레<\/code>, <code>방학 중 어느 오전<\/code>처럼 실제 시간이 앞으로 흐르고 있음을 보여주는 장치다.<\/li>\n<li>하연은 먼저 끌고 가는 사람이 아니라 조용히 기다리는 사람으로 보인다.<\/li>\n<li>재윤은 무리해서 밝아진 것이 아니라 천천히 회복 중인 사람으로 보인다.<\/li>\n<li>핵심 감정은 <code>이제 도망치지 않는다<\/code>보다 한 걸음 더 나아간 <code>이제 다음을 말할 수 있다<\/code>다.<\/li>\n<\/ul>\n<h4 id=\"스토리-05엔딩과루프-md-엔딩-크레딧-연출\">엔딩 크레딧 연출<\/h4>\n<p>진엔딩 후 엔딩 크레딧에는 음악과 짧은 애니메이션 컷을 넣는다. 이 섹션은 방향성 요약이고, 컷 구성의 초안은 <a href=\"./11_진엔딩_크레딧_콘티_초안.md\">진엔딩 크레딧 콘티 초안<\/a>에서 관리한다.<\/p>\n<p>음악 방향:<\/p>\n<ul>\n<li>시작: 느린 피아노 단독. 병실, 방학식, 월요일의 여운을 남긴다.<\/li>\n<li>중반: 얇은 어쿠스틱 기타 또는 스트링 패드가 들어오며 여름의 온기를 더한다.<\/li>\n<li>배경 질감: 매미 소리, 멀리서 들리는 학교 방송, 종이 넘기는 소리처럼 현실적인 생활음을 작게 섞는다.<\/li>\n<li>감정: 슬픈 이별곡이 아니라, 상처를 안고도 다시 일상을 시작하는 따뜻한 후일담.<\/li>\n<\/ul>\n<p>짧은 애니메이션 컷 구성 요약:<\/p>\n<ol>\n<li>병원 대기실에서 하연이 재윤에게 물병을 건네는 컷.<\/li>\n<li>방학 중 학교 도서관 앞에서 하연이 먼저 기다리고, 재윤이 천천히 걸어오는 컷.<\/li>\n<li>버스 정류장에서 하연이 먼저 타지 않고 재윤을 기다리는 컷.<\/li>\n<li>작은 카페 창가에서 둘이 같은 책이나 안내문을 보는 컷.<\/li>\n<li>학교 뒤편 산책길에서 소무대 방향이 아니라 밝은 길 쪽으로 함께 걷는 컷.<\/li>\n<li>마지막으로 하연의 휴대폰 캘린더에 <code>병원<\/code>, <code>도서관<\/code>, <code>카페<\/code>, <code>천천히 걷기<\/code> 같은 방학 약속이 작게 표시된 컷.<\/li>\n<\/ol>\n<p>주의점:<\/p>\n<ul>\n<li>사고가 없던 일이 된 것처럼 연출하지 않는다. 재윤의 회복 흔적과 하연의 조심스러운 태도는 남긴다.<\/li>\n<li>방학 약속은 과하게 달콤한 데이트 몽타주가 아니라, 둘이 현실에서 계속 만난다는 암시로 사용한다.<\/li>\n<li>소무대는 직접 낭만화하지 않는다. 마지막 산책 컷에서는 소무대가 있던 방향을 피하거나, 어둡지 않은 길로 전환한다.<\/li>\n<\/ul>\n<h3 id=\"스토리-05엔딩과루프-md-비진엔딩-공통-처리\">비진엔딩 공통 처리<\/h3>\n<p>진엔딩이 아닌 경우의 핵심은 <code>방학이 시작되지 않는다<\/code>이다.<\/p>\n<p>진엔딩만이 금요일 다음 월요일, 즉 D+3 방학식 이후의 여름에 도달한다. 다른 엔딩은 모두 그 문턱에서 멈추거나, 방학식에 닿은 것처럼 보여도 시간이 앞으로 흐르지 않는다.<\/p>\n<div class=\"table-wrap\"><table><thead><tr><th>엔딩<\/th><th>방학 도달<\/th><th>크레딧 처리<\/th><th>핵심 감정<\/th><\/tr><\/thead><tbody><tr><td>진엔딩<\/td><td>도달<\/td><td>완성된 엔딩곡 + 방학 후일담 애니메이션<\/td><td>상처를 안고도 다음을 말할 수 있음<\/td><\/tr><tr><td>하연 실패 루프<\/td><td>미도달<\/td><td>없음 또는 끊긴 피아노 몇 음<\/td><td>월요일이 오지 않음<\/td><\/tr><tr><td>소하 새드엔딩<\/td><td>왜곡<\/td><td>짧은 가짜 크레딧<\/td><td>따뜻하지만 앞으로 가지 못하는 과거<\/td><\/tr><tr><td>서린 새드엔딩<\/td><td>정지<\/td><td>차갑고 정돈된 가짜 크레딧<\/td><td>안전하지만 선택이 없는 세계<\/td><\/tr><tr><td>미루 새드엔딩<\/td><td>닫힘<\/td><td>달콤하지만 불안한 가짜 크레딧<\/td><td>필요한 사람으로 남기 위해 현실을 미룸<\/td><\/tr><tr><td>히든 붕괴<\/td><td>붕괴<\/td><td>깨진 크레딧<\/td><td>너무 많이 도망쳐 세계가 망가짐<\/td><\/tr><\/tbody><\/table><\/div>\n<p>비진엔딩 크레딧 원칙:<\/p>\n<ul>\n<li>완성된 엔딩곡과 밝은 방학 후일담 컷은 진엔딩 전용 보상으로 남긴다.<\/li>\n<li>새드엔딩에는 엔딩곡의 짧은 변주나 미완성 버전만 사용한다.<\/li>\n<li>방학식 안내문, 월요일 칠판, 여름 햇빛은 등장할 수 있지만 <code>앞으로 흐르는 시간<\/code>으로 사용하지 않는다.<\/li>\n<li>비진엔딩에서 하연과 재윤이 방학 동안 계속 만나는 컷은 넣지 않는다.<\/li>\n<li>하연 실패 루프는 엔딩이라기보다 루프 실패에 가깝게 처리한다.<\/li>\n<\/ul>\n<p>공통 문장 후보:<\/p>\n<blockquote>금요일 밤은 끝났다.  <\/blockquote>\n<blockquote>하지만 월요일은 오지 않았다.<\/blockquote>\n<h3 id=\"스토리-05엔딩과루프-md-기본-새드엔딩\">기본 새드엔딩<\/h3>\n<h4 id=\"스토리-05엔딩과루프-md-소하-엔딩\">소하 엔딩<\/h4>\n<p>주인공이 익숙한 과거를 선택한다. 내면세계는 평화로운 소꿉친구 미연시로 고정되지만, 현실의 주인공은 깨어나지 못한다. 방학식 안내문은 골목 끝이나 교실 게시판에 보이지만, 날짜는 흐리거나 매번 같은 등굣길로 되돌아간다.<\/p>\n<p>연출 기준:<\/p>\n<ul>\n<li>등굣길, 편의점, 오래된 골목처럼 따뜻한 컷으로 시작한다.<\/li>\n<li>크레딧이 있다면 짧고 따뜻한 가짜 크레딧으로 처리한다.<\/li>\n<li>같은 아침 햇빛과 같은 농담이 반복되어, 행복해 보이지만 앞으로 가지 못하는 과거임을 보여준다.<\/li>\n<li>방학은 시작되지 않고, 소하와 함께 있던 익숙한 과거만 계속된다.<\/li>\n<\/ul>\n<p>획득 조각 후보: <code>아무 일도 없던 날<\/code><\/p>\n<h4 id=\"스토리-05엔딩과루프-md-서린-엔딩\">서린 엔딩<\/h4>\n<p>주인공이 모든 선택권을 서린에게 넘긴다. 내면세계는 안전하지만 정지된 상태가 되고, 주인공은 사고의 책임감에서 벗어나지 못한다. 월요일 일정표는 완벽히 정리되어 있지만 아무도 그 날짜로 이동하지 않는다.<\/p>\n<p>연출 기준:<\/p>\n<ul>\n<li>방송실, 체크리스트, 정돈된 큐시트, 닫힌 선택지 UI를 중심으로 보여준다.<\/li>\n<li>크레딧이 있다면 차갑고 정돈된 가짜 크레딧으로 처리한다.<\/li>\n<li>음악은 정확한 박자와 짧은 전자음/피아노 음형으로 반복되어 안전하지만 멈춘 느낌을 준다.<\/li>\n<li>사고는 피한 것처럼 보이지만, 재윤 자신의 선택은 사라진다.<\/li>\n<\/ul>\n<p>획득 조각 후보: <code>정해진 선택지<\/code><\/p>\n<h4 id=\"스토리-05엔딩과루프-md-미루-엔딩\">미루 엔딩<\/h4>\n<p>주인공이 꿈속에 남는다. 가장 달콤하지만 가장 위험한 새드엔딩이다. 방학식 안내문은 문밖에 있지만, 재윤은 그 문을 열지 못하고 계속 미루에게 필요한 사람으로 남는다.<\/p>\n<p>연출 기준:<\/p>\n<ul>\n<li>작은 방, 끝나지 않는 체크리스트, 가방끈을 잡는 미루의 손을 중심으로 보여준다.<\/li>\n<li>크레딧이 있다면 달콤하지만 불안한 가짜 크레딧으로 처리한다.<\/li>\n<li>음악은 부드러운 오르골처럼 시작하지만 같은 마디가 끊기지 않고 반복된다.<\/li>\n<li>방학은 문밖에만 있고, 재윤은 누군가에게 필요한 사람이라는 역할 안에 남는다.<\/li>\n<\/ul>\n<p>획득 조각 후보: <code>닫힌 문<\/code><\/p>\n<h4 id=\"스토리-05엔딩과루프-md-하연-실패-엔딩\">하연 실패 엔딩<\/h4>\n<p>하연과 서로의 마음을 확인하지 못한 상태로 내부 기준 D-Day 금요일 밤에 도달하면, 주인공은 사고의 진실을 온전히 연결하지 못한다. 하연의 목소리와 서로 말하려던 문장이 기억에서 빠지고, 재윤은 폐장 후 학교 뒤편 야외 소무대에 혼자 서 있다.<\/p>\n<pre><code>폐장 후.\n학교 뒤편 야외 소무대.\n\n재윤은 혼자 서 있다.\n\n누가 불렀는지 기억나지 않는다.\n누구에게 가려 했는지도 기억나지 않는다.\n\n금속이 삐걱인다.\n암전.<\/code><\/pre>\n<p>이 엔딩은 하연에게 거절당하는 엔딩이 아니라, 하연과 마음을 확인하지 못해 재윤의 내면세계가 하연을 사고 기억에서 지워버리는 실패다. 예정되어 있던 D+3 월요일 방학식에는 도달하지 못한 채 루프가 시작된다. 크레딧은 넣지 않거나, 검은 화면 위에 끊긴 피아노 몇 음과 금속음만 남긴다.<\/p>\n<p>연출 문장 후보:<\/p>\n<blockquote>금요일 밤은 끝났다.  <\/blockquote>\n<blockquote>하지만 월요일은 오지 않았다.<\/blockquote>\n<p>획득 조각 후보: <code>멀어지는 목소리<\/code><\/p>\n<h3 id=\"스토리-05엔딩과루프-md-반복-새드엔딩-처리\">반복 새드엔딩 처리<\/h3>\n<div class=\"table-wrap\"><table><thead><tr><th>상황<\/th><th>처리<\/th><\/tr><\/thead><tbody><tr><td>새드엔딩 첫 관람<\/td><td>풀 연출<\/td><\/tr><tr><td>같은 새드엔딩 2회차<\/td><td>압축 연출<\/td><\/tr><tr><td>같은 새드엔딩 3회차<\/td><td>특수 대사 / 메타 루프 이벤트<\/td><\/tr><tr><td>새드엔딩 누적 반복<\/td><td>기억 혼선과 루프 피로 증가<\/td><\/tr><tr><td>과도한 반복<\/td><td>히든 세계 붕괴 엔딩 진입<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"스토리-05엔딩과루프-md-히든-세계-붕괴-엔딩\">히든 세계 붕괴 엔딩<\/h3>\n<p>조건 예시:<\/p>\n<ul>\n<li>새드엔딩 총 6회 이상<\/li>\n<li>같은 새드엔딩 3회 이상<\/li>\n<li>하연 이벤트를 계속 무시<\/li>\n<\/ul>\n<p>히든 엔딩에서는 기억 혼선과 루프 피로가 누적되어 내면세계가 더 이상 정상적인 D-25로 돌아가지 못한다. 도달하지 못한 방학식의 흔적이 월요일 교실과 축제 마지막 밤을 뒤섞는다. 크레딧이 나온다면 이름, 날짜, 음악, 배경 컷이 깨지는 붕괴 크레딧으로 처리한다.<\/p>\n<h3 id=\"스토리-05엔딩과루프-md-히든-엔딩-이후-복구-이벤트\">히든 엔딩 이후 복구 이벤트<\/h3>\n<p>히든 세계 붕괴 엔딩 이후에는 완전 게임오버로 막지 않는다.<\/p>\n<p>대신 다음 시작이 평소 D-25가 아니라 <code>망가진 D-25<\/code>로 바뀐다.<\/p>\n<pre><code>D-25?\n교실\n칠판의 날짜가 지워져 있음\n방학식 안내문이 반쯤 찢겨 있음\n책상 수가 맞지 않음\n창밖은 축제 마지막 밤처럼 어두움<\/code><\/pre>\n<p>담임은 같은 말을 반복한다.<\/p>\n<blockquote>오늘 전학생이 왔다.  <\/blockquote>\n<blockquote>오늘 전학생이 왔다.  <\/blockquote>\n<blockquote>오늘 전학생이 왔다.<\/blockquote>\n<p>하지만 하연은 들어오지 않는다.<\/p>\n<p>복구 목표:<\/p>\n<ul>\n<li>소하의 팔찌 또는 오래된 사진<\/li>\n<li>서린의 점검표 조각<\/li>\n<li>미루의 키링 또는 고정끈<\/li>\n<li>하연의 이름표<\/li>\n<\/ul>\n<p>마지막 선택지:<\/p>\n<pre><code>[은하연의 이름을 부른다]<\/code><\/pre>\n<p>하연:<\/p>\n<blockquote>...불렀어?<\/blockquote>\n<p>이후 정상 D-25 루프로 복귀한다.<\/p>", "headings": [{"level": 1, "text": "엔딩과 루프", "id": "스토리-05엔딩과루프-md-엔딩과-루프"}, {"level": 2, "text": "진엔딩", "id": "스토리-05엔딩과루프-md-진엔딩"}, {"level": 3, "text": "현실 복귀 구조", "id": "스토리-05엔딩과루프-md-현실-복귀-구조"}, {"level": 3, "text": "일요일 병실 장면", "id": "스토리-05엔딩과루프-md-일요일-병실-장면"}, {"level": 3, "text": "D+3 월요일 방학식", "id": "스토리-05엔딩과루프-md-d-3-월요일-방학식"}, {"level": 3, "text": "방학으로 이어지는 엔딩 여운", "id": "스토리-05엔딩과루프-md-방학으로-이어지는-엔딩-여운"}, {"level": 3, "text": "엔딩 크레딧 연출", "id": "스토리-05엔딩과루프-md-엔딩-크레딧-연출"}, {"level": 2, "text": "비진엔딩 공통 처리", "id": "스토리-05엔딩과루프-md-비진엔딩-공통-처리"}, {"level": 2, "text": "기본 새드엔딩", "id": "스토리-05엔딩과루프-md-기본-새드엔딩"}, {"level": 3, "text": "소하 엔딩", "id": "스토리-05엔딩과루프-md-소하-엔딩"}, {"level": 3, "text": "서린 엔딩", "id": "스토리-05엔딩과루프-md-서린-엔딩"}, {"level": 3, "text": "미루 엔딩", "id": "스토리-05엔딩과루프-md-미루-엔딩"}, {"level": 3, "text": "하연 실패 엔딩", "id": "스토리-05엔딩과루프-md-하연-실패-엔딩"}, {"level": 2, "text": "반복 새드엔딩 처리", "id": "스토리-05엔딩과루프-md-반복-새드엔딩-처리"}, {"level": 2, "text": "히든 세계 붕괴 엔딩", "id": "스토리-05엔딩과루프-md-히든-세계-붕괴-엔딩"}, {"level": 2, "text": "히든 엔딩 이후 복구 이벤트",
